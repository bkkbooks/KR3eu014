body:
  text: 卷之三雜證門下痰飲大婦人風痰者由臟腑風冷水飲停積在於胸膈所成也人皆有痰少者不能為妨多者成患但胸膈有痰飲停於胸中則令眼昏亦令頭眩頭痛者藥隱老人評曰夫痰之為害多因外感五邪五邪者寒暑燥濕風也內傷七氣七氣者喜怒憂思驚恐恚也因五邪而得者得風為風痰得寒為寒痰得暑為暑痰因七氣所傷多因婦人情性執著不能容忍而有些證豈特只因風冷而成哉所以外感五邪內傷七氣則一身之中血液淚汗涕唾身中濕者敗濁變而成痰乘間而為害也經云清則運為精華濁則凝為痰飲此之謂也然有痰涎飲沫四種相類宜仔細詳辨調治因風而生痰者宜服三生飲卒中暴厥星香飲雜病中風青州白丸子雜病中風化痰丸雜病痰飲因寒冷而得者宜服降氣湯雜病氣黑錫丹雜病頭痛養正丹頭目眩暈因熱而得者宜服金沸草散雜病咳嗽柴胡半夏湯本條因暑而得者消暑丸雜病傷暑因氣滯不調鬱結而成者宜服參蘇飲雜病發熱四七湯雜病氣二陳湯雜病痰飲痰在上者以瓜蒂散吐之在下者以控涎丹臂痛利之雖曰可吐可下亦要觀人之盛衰察脈之虛實方可投之切記不可猛吐暴下所以初虞世有金虎碧霞之戒也薛前證若肝經恚怒用小柴胡湯傷寒少陽肝經風熱用釣藤散頭目眩暈肝腎氣虛用川芎散眩暈脾經鬱結用濟生歸脾湯雜病健忘鬱怒傷肝脾用加味逍遙散調經脾虛痰逆用白朮半夏天麻湯雜病眩暈脾氣虛弱用六君子益氣湯肺氣鬱滯用二陳雜病痰飲貝母桔梗陰虧水泛用六味地黃丸雜病虛勞腎虛陰火加減八味丸雜病虛勞腎虛火不歸源八味丸雜病虛勞仍與前證互相用之一婦人內熱口乾勞則頭暈吐痰帶下或用化痰理氣藥前證益盛肢體或麻又用祛風化痰藥肢體常麻手足或冷或熱此脾土不能生肺金也余用補中益氣湯加茯苓半夏炮姜二十餘劑漸愈又用加味逍遙散三十餘劑全愈後因怒吐痰胸痞或用清氣化痰丸食少痰甚胸膈脹滿脈或浮大或微細余以六君倍用參術少加木香而康一婦人咳嗽脅痛或用清肺化痰降火等劑久不愈更加內熱晡熱若兩脅或小腹內熱其咳益甚少便自遺余曰此屬肝經血虛火動用六味丸加五味子滋腎水以生肝血用補中益氣生脾土以滋肺金而尋愈旋覆花湯治婦人風痰嘔逆不下飲食頭目昏悶旋覆花枇杷葉去毛炙川芎細辛去苗藿香桂心枳殼去瓤麩炒前胡去蘆人參去蘆半夏薑製各半兩甘草炙羚羊角屑赤茯苓各七錢半去皮羌活去蘆半兩上㕮咀每服五錢水一盞半生薑五片煎至一大盞去滓溫服食遠日進二服天南星丸治婦人風痰心膈壅滯天南星薑製白附子炮皂角仁炒黃半夏曲各一兩白礬枯五錢上為細末酒煮麵糊丸如梧子大每服二十丸煎生薑薄荷湯送下食後臨臥日進二服大半夏湯治痰飲脾胃不和咳嗽嘔吐飲食不入半夏白茯苓生薑各二錢上姜水煎服胃痞加陳皮四七湯亦善導痰湯治痰涎壅盛胸膈痞塞或咳嗽噁心飲食少思半夏二錢南星枳實麩炒茯苓橘紅一錢甘草五分上用姜十片水煎服瓜蒂散療病痰胸膈痞塞頭不痛項不強寸脈微浮胸中痞硬氣衝喉咽不得息者此為胸中有痰也當吐之宜此法方見柴胡半夏湯治痰熱頭痛利膈除煩悶手足煩熱榮衛不調肢節拘倦身體疼痛嗜臥少力飲食無味兼治五嗽痰癖柴胡八錢半夏三兩半人參去蘆甘草黃芩麥門冬各二兩白朮二兩上㕮咀每服五錢水一盞半姜五片棗一枚煎至八分去滓服咳嗽大婦人咳嗽者由肌體虛外受於寒熱風濕所得也肺為四臟之華蓋內統諸臟之氣外合於皮毛若為寒熱風濕所傷邪氣自皮毛而入於肺中外皆傷故令咳也大抵治咳不可一概治當以脈息辨之其脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者散之濕者燥之熱者涼之寒者溫之虛者補之未有不安者也薛丹溪云春是木氣上升夏是火氣炎上秋是濕熱傷肺冬是風寒外來當發散行痰開腠理用二陳湯加麻黃桔梗杏仁痰飲隨證加藥勞嗽宜四物加竹瀝薑汁乾咳嗽難治此證乃痰鬱火邪也用苦梗開之夏用補陰降火不已則成勞上半日多嗽者胃火也用貝母石膏午後嗽者陰虛也用四物加炒黑黃柏知母黃昏嗽者火氣浮於肺也用五味子五倍子五更嗽者飲食之火流於肺也以貝母軟石膏肺脹而嗽或左或右不得眠此痰挾瘀血氣滯而病宜養血疏肝清痰用四物加桃仁訶子青皮竹瀝之類嗽而脅下痛宜疏肝氣以青皮挾痰實者白芥子之類血礙氣作嗽者桃仁大黃薑汁丸服治嗽多用生薑以其辛散故也痰因火動逆上作嗽者先治火次治痰以知母止嗽清肺滋陰降火夜嗽用清陰分之劑若嗽多用粟殼不必疑但要去病根此乃收後藥也竊謂前證午前嗽屬胃火盛用竹葉石膏湯傷寒瘥後病胃氣虛用補中益氣雜病傷勞倦加炒山梔午後嗽屬陰血虛用四物黃柏知母二味酒拌炒黑腎水虛用六味地黃丸雜病虛勞黃昏嗽用四物五味麥門並前丸五更嗽用六君子雜病虛勞不得眠及兩脅下痛用六味地黃補中益氣若因氣虛腠理不密六淫所浸當祛外邪而實脾土若因心火太過當伐肝木而滋肺金若肺金氣虛當補脾土而生肺氣若因腎水虧損虛火炎上當補肺腎以滋化源大抵風邪胃火此實熱為患易治惟肺腎虧損此真臟為患最難調治一婦人素勤苦冬初咳嗽發熱吐血盜汗通身作痛或寒熱往來用化痰降火之藥口噤筋攣此血本虛而藥復損之耳余用八味丸雜病虛勞為主佐以補中益氣麥門五味山藥年餘而愈一婦人咳嗽發熱嘔吐痰涎日夜約五六碗喘咳胸痞燥渴不食崩血如湧此脾土虛寒用八味丸及附子理中湯雜病中寒而愈一婦人不得於姑患嗽胸膈不利飲食無味此脾肺俱傷痰鬱於中也先用歸脾湯雜病健忘加山梔撫芎貝母桔梗諸證漸愈後以六君加芎歸桔梗間服全愈一婦人咳嗽早間吐痰甚多夜間喘急不寐余謂早間多痰乃脾虛飲食所化夜間喘急乃肺虛陰火上衝用補中益氣加麥門五味而愈一婦人患咳嗽脅痛發熱日晡益甚余曰此肝脾虛熱而傷肺也用加味逍遙散調經加熟地黃治之而愈後因怒氣勞役前證仍作兼太陽痛或寒熱往來或咳嗽遺尿此肺氣虛而尿脬失制也仍用前散及地黃丸而瘥一婦人久咳嗽面色痿黃或時㿠白肢體倦怠飲食少思稍多則瀉此脾土虛而不能生肺金朝用補中益氣湯夕用六君子湯為主間佐以八珍湯雜病虛勞三月餘漸愈後感寒邪喘嗽胸腹作脹飲食不入四肢逆冷此中氣尚虛不能充皮毛肥腠理司開闔之所致也遂用六君加生薑桔梗而愈初虞世曰經曰微寒為嗽寒甚為腸癖古人立方治嗽未有不本於溫藥如乾薑桂心細辛之屬以寒氣入里非辛甘不能發散以此准之未有不因寒而嗽也又曰熱在上焦因咳為肺痿又實則為肺癰虛則為肺痿此人其始或血不足或酒色滋味太過或因服利藥重亡津液燥氣內焚肺金受邪脈數發熱咳嗽膿血病至於此亦已危矣古人立方亦用溫藥如建中之屬今人但見寒熱咳嗽率用柴胡鱉甲門冬葶藶等藥旋踵受弊而不知非可為深戒就使不可進以溫藥亦須妙以湯丸委曲調治無為鹵莽致傷人命薛丹溪云陰分嗽者多屬陰虛肺脹不得眠者難治肺痿專主補氣養血清金肺氣有餘者宜瀉之以桑白皮為主半夏茯苓佐之瀉其有餘補其不足肺燥者當潤之屬熱者大力子桔梗知母雞子清聲啞者屬寒也細辛半夏生薑肺虛者人參阿膠為主陰不足者六味地黃為要藥或知母茯苓湯陰虛氣喘四物加陳皮甘草以降其氣補其陰竊謂前證嗽而鼻塞聲重風邪傷肺也用參蘇飲雜病發熱面赤喘嗽火克肺也人參平肺散雜病喘寒熱交作肝氣不和也四君加知母柴胡桔梗咳喘短氣肺虛也人參補肺湯喘滿體倦少食脾虛也參朮補脾湯本條口乾咽燥虛火上炎也六味丸大凡發熱喘嗽或咳唾膿血飲食不入急補脾肺滋腎水多有得生者脈浮大而面色赤者皆難治脈浮短澀者可療經曰感於寒微則為咳甚則為泄蓋肺主氣合於皮毛邪傷皮毛則咳為肺病傳於各臟以時受邪肺為嫩臟邪易傷而難治其嗽有肺心脾腎肝風寒支飲膽之十種亦有勞嗽者華佗謂之邪嗽孫真人謂之注嗽此因酒色過度勞傷肺經重者咯唾膿血輕者時發時瘥或先嘔血而後嗽或先咳嗽而吐血此又挾邪傳疰孫真人用通氣丸夢與鬼交用四滿丸蛤蚧天靈蓋桃柳枝安息香之類若肺中有蟲入喉癢嗽須以藥含化其蟲即死嗽即止薛仲景先生云咳而兩脅痛不能轉側兩胠滿屬於肝臟用小柴胡湯咳而嘔苦水屬膽腑黃芩半夏生薑湯咳而喉中如梗狀甚則咽腫喉閉屬心臟桔梗湯咳而大便失氣屬小腸腑芍藥甘草湯咳而右胠痛陰引肩背甚則不可動動則咳劇屬脾臟升麻湯咳而嘔嘔甚則出長蟲屬胃腑鳥梅丸咳而喘息有聲甚則唾血屬肺臟升麻湯咳而失尿屬大腸腑麻黃附子細辛湯咳而遺溺屬膀胱茯苓半夏湯咳而不止三焦受之其狀腹滿不食涕唾而目浮腫氣逆異功散用之對證其效如神一婦人患前證晡熱內熱寒熱往來作渴盜汗小便頻數其經兩三月一行此肝脾氣血虛損用八珍湯六味丸六十餘劑諸證漸愈其經兩月一行仍用前二藥間以加味逍遙散各三十餘劑後恚怒適經行去血過多諸證悉至飲食少思腹脹氣促用十全大補湯數劑漸愈仍用前藥調補漸安復因喪子胸腹不利食少內熱盜汗便血無寐用加味歸脾湯仍兼前藥而愈一婦人患前證不時發熱或時寒熱或用清熱之劑其熱益甚盜汗口乾兩足如炙遍身皆熱昏憒如醉良久熱止方蘇或晡熱至旦方止此陰血虛而陽氣弱也余朝用六味丸料夕用十全大補湯月餘諸證稍愈更兼以補中益氣湯兩月餘而愈黃耆散治虛中有熱咳嗽膿血口苦咽乾黃耆四兩甘草二兩上為細末湯點一二錢服日三服一方甘草一兩黃耆六兩名黃耆六一湯只㕮咀水煎服蛤蚧丸治婦人咳嗽不止漸成勞氣蛤蚧一對酥炙紫菀款冬花鱉甲炙貝母去心皂角子仁炒各一兩杏仁炒去皮尖一兩半上為細末煉蜜丸如梧桐子大每服二十丸淡薑湯吞下含化丸昔有婦人患肺熱久嗽身如炙肌瘦將成肺勞服此安寇宗奭方枇杷葉去毛桑白皮款冬花木通紫菀杏仁各等分大黃減半上為細末煉蜜丸如櫻桃大食後夜臥含化一丸貝母湯本事治諸嗽久不瘥貝母生薑汁浸半日北五味子黃芩乾薑熱者減半陳皮各一兩半夏桑白皮桂心北柴胡各半兩熱者加一半木香甘草各二錢半上為粗末每服五錢水一盞半杏仁七枚去皮尖碎之生薑二片煎七分去滓熱服黃師文云戊申冬有姓蔣者其妻積年嗽制此方授之一投而瘥以此治諸嗽悉皆愈定喘湯治丈夫婦人遠年近日肺氣咳嗽上氣喘急喉中涎聲胸滿氣逆坐臥不安飲食不下及治肺感寒邪咳嗽聲重語音不出鼻塞頭昏並皆治之半夏曲炒阿膠炒甘草各錢半罌粟殼制半兩北五味子桑白皮麻黃去節人參各三錢半上㕮咀每服三大錢姜三片烏梅半個水一盞半煎至七分去滓漸漸溫服食後臨臥日二服方同和劑分兩加減不同有效補肺湯治證同前滄州李官人宅又名清金湯罌粟殼制二兩人參粉草各半兩陳皮茯苓杏仁制白朮明阿膠炒北五味子桑白皮薏苡仁紫蘇莖各一兩上㕮咀為末每服三大錢水盞半姜三片棗二枚烏梅半個煎至一盞臨臥溫服更加百合貝母去心半夏曲款冬花各一兩服之良驗金不換散治男子女人肺胃虛寒久嗽不已喘促滿悶咳嗽涎盛腹脅脹滿腰背倦痛或虛勞冷嗽唾紅痰及遠年近日一切喘嗽諸藥不效者並治之罌粟殼半兩制杏仁制甘草各三錢枳殼四錢上㕮咀每服三錢水一盞半姜三片烏梅半個煎至八分食後臨臥漸漸熱服許元林先生方乙卯年七月僕嘗治一婦人咳嗽不已服諸藥無效漸成癆瘵求予診之六脈濡弱以愚考之此是血弱又因憂戚太過而成斯疾合用當歸等藥治之必愈遂先用古今錄驗橘皮湯空心服蘇子降氣湯徐用金釵煎熟地黃丸當歸丸調理得安又治一婦人時行感熱咳嗽遂用小柴胡湯去人參薑棗只加北五味子煎服愈古今錄驗橘皮湯療春冬傷寒秋夏冷濕咳嗽喉中作聲上氣不得下頭痛方陳橘皮紫菀麻黃去根杏仁制當歸桂心甘草黃芩各等分上㕮咀每服五錢水盞半煎至一盞去滓熱服深師四滿丸治上氣嗽飲嗽燥嗽冷嗽邪嗽謂之五嗽乾薑炮桂心躑躅花芎藭紫菀各二兩芫花根皮五錢蜈蚣一條去頭足炙細辛甘草炙鬼督郵人參半夏湯洗各一兩上為末煉蜜丸大豆許每服五丸米飲下日三服未應加至七八丸團魚丸治骨蒸勞嗽累效貝母前胡知母杏仁柴胡各等分生團魚二個上藥與魚同煮熟取肉連汁食之將藥焙乾為末用骨更煮汁一盞和藥丸梧子大每服二十丸煎黃耆六一湯空心送下病既安仍服黃耆六一湯調理參朮調中湯瀉熱補氣止嗽定喘和脾胃進飲食黃耆四分桑白皮五分人參炙甘草青皮白茯苓各三分五味子杵五分白朮三分地骨皮麥門冬陳皮各五分上水煎服噙化丸自制方清肺止嗽定喘化痰薄荷葉四兩桑白皮天門冬去心麥門冬去心知母去皮毛百部貝母去心柿霜各二兩枇杷葉去毛蜜炙訶子肉阿膠橘紅紫菀款冬花各一兩半栝蔞仁去油栝蔞皮穗黃芩杏仁炒去皮尖油取淨霜白茯苓玄明粉鉛白霜桔梗各一兩旋覆花馬兜鈴五味子各七錢半硼砂五錢冰片一錢非真者勿用上為極細末梨膏為丸如無梨膏則以白蜜竹瀝梨汁熬至滴水不散為度丸如龍眼大噙化一丸參耆補脾湯治肺證因脾氣虛弱咳唾膿涎中滿不食宜兼服此藥以補脾土生肺金人參白朮各二錢黃耆炙二錢半茯苓當歸陳皮各一錢升麻三分五味子四分杵炙甘草五分上姜水煎服喘滿岐伯曰夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨當是之時勇者氣行則已怯者則著而為病也原疾之由皆本於肺與氣然感外邪則有太陽證脈浮無汗而喘者宜麻黃湯陽明病汗出不惡寒腹滿而喘有潮熱者宜承氣湯若表邪未解誤服下利藥利遂不止脈促喘而汗出者宜葛根黃芩黃連湯若微喘者桂枝厚朴杏子湯汗出而喘若無大熱者宜麻黃杏子甘草石膏湯若表邪未解心下停水發熱而喘或嘔者小青龍湯去麻黃加杏仁主之若陰證喘促者四肢逆冷脈息沉細或寸大尺小或六脈促疾或心下脹滿結硬若冷汗自出或大便頻數上氣喘促或咽喉不利者此是本氣極虛內外挾寒冷所致使陰寒內消陽氣得復則愈宜返陰丹主之以上諸方並見傷寒準繩大概諸臟相乘而喘者以杏子散本條如感寒伏熱而喘者以華蓋散雜病嗽九寶湯雜病喘若暴寒向火覆衣被過當傷熱肺實而喘促者其狀多有熱證宜洗心散雜病發熱冷水調服若因氣宇不調痰盛喘促者宜四七湯雜病氣兼官局桔梗湯雜病痰飲姜煎服若涎多而喘者宜千緡湯雜病喘橘皮半夏湯本條若不得臥臥即喘者此由水氣逆行上乘於肺肺得水則浮而開使氣不得通流其脈沉大宜神秘湯雜病喘肺之積名曰息賁在右脅下大如杯令人灑淅寒熱喘咳發癰疽宜棗膏丸本條若上氣喘者神授湯本條若上盛下弱而喘促者宜蘇子降氣湯雜病氣吞黑錫丹雜病頭痛若尊年之人素來稟賦太厚不任熱藥者不可輕投丹劑及諸熱藥但以秘傳降氣湯分心氣飲俱雜病氣論之梗概不出於此矣若素有腳氣而喘者當作腳氣治之又有骨蒸勞喘自有專門不敢濫及薛東垣云肺金受邪由脾胃虛弱不能生肺乃所生受病故咳嗽氣短氣上皮毛不能禦寒精神少而渴情慘不樂皆陽氣不足陰氣有餘也治法若肺氣虛弱用四君子雜病虛勞加枳殼半夏脾虛不能生肺補中益氣湯雜病勞倦七情氣結四七湯雜病氣脾經鬱結歸脾湯雜病健忘脾氣虛弱人參補肺散肺經火盛人參平肺散腎水敗濁六味地黃丸雜病虛勞真陽虛損八味丸虛勞或兼小便不利為害尤速非二丸不能救一婦人傷風寒作喘或用表散愈而復患仍用前藥其證益甚飲食少思胸腹不利此因脾肺氣虛也予先用六君子湯加桔梗漸愈又用補中益氣湯而痊一婦人患前證屬命門火虛不能生脾土用補中益氣湯八味地黃丸而痊後復患其喘益甚用前藥不應遂用黑錫丹二服喘止仍用前二藥而諸證痊凡屬邪氣有餘者其證易識治效亦速其屬元氣不足者變證不一效非可以旦夕期也杏子散治諸臟相乘喘急杏仁去皮尖雙仁麩炒黃細研如膏麻黃根為細末等分上和勻煎橘皮湯調下二錢無時橘皮半夏湯和劑治肺胃虛弱好食酸冷寒痰停積嘔逆噁心涎唾稠黏或積吐粥藥不下手足逆冷目眩身重又治傷寒時氣欲吐不吐欲嘔不嘔昏憒悶亂或飲酒過多中寒停飲喉中涎聲乾噦不止陳皮去白半夏煮各七兩上銼為粗散每服三錢生薑三片水二盞煎至一中盞去滓溫服不計時留兩服滓並一服再煎服棗膏丸治息賁在右脅下大如杯令人灑淅寒熱喘咳甜葶藶炒研陳皮苦梗各等分上為末煮棗肉丸桐子大每服數丸白湯下許學士云余常停飲水積食已必嚏漸喘覺肺系急服此良驗神授湯治上氣喘急不得臥橘紅苦梗紫蘇人參各一錢五味子杵炒三分上姜水煎服治婦人喘促虛腫快利小便即癢用生薑二兩取汁白麵三兩以薑汁搜作小劑大半夏十個打研入面中作餅炙熟作黃色為末溫熟水調下一錢以小便通利為度天門冬丸楊氏家傳治婦人喘手足煩熱骨蒸寢汗口乾引飲面目浮腫天門冬十兩去心秤麥門冬去心八兩生地黃三斤取汁熬膏上二味為末入地黃膏和丸如梧桐子大每服五十丸逍遙散中去甘草加人參煎湯送下或服王氏博濟方中人參荊芥散亦可如面腫不已經曰面腫曰風故宜汗麻黃桂枝可發其汗後服柴胡飲子去大黃故論曰治臟者治其俞治腑者治其合浮腫治其經治俞者治其土也治合者亦治其土也如兵家圍魏救趙之法也人參補肺湯治肺癰腎水不足虛火上炎咳唾膿血發熱作渴小便不調人參黃耆炒白朮茯苓陳皮當歸各一兩山茱萸去核山藥各二錢五味子杵麥門冬去心甘草炙各七分熟地黃自制一錢五分牡丹皮一錢上姜水煎服人參平肺散治心火克肺金患肺痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽膈不利人參青皮茯苓天門冬陳皮地骨皮各一錢甘草炙五分知母七分五味子十粒杵桑白皮炒一錢上姜水煎服嘔吐大夫婦人嘔吐者由脾胃有邪冷穀氣不理所為也胃為水穀之海其氣不調而有風冷乘之冷搏於胃胃氣逆則令嘔吐也夫嘔吐之疾非特脾胃虛冷而嘔吐也亦有胃熱而嘔者亦有胃中冷胃口熱而吐者亦有痰盛而嘔者亦有血弱而嘔者經云無陰則嘔是也不可以一概用藥如胃冷而嘔吐宜用局方人參丁香散理中丸及許仁則半夏丸人參七味丸如胃熱而嘔吐者宜用小柴胡湯蘆根湯竹茹湯槐花散如胃中冷胃口熱而嘔吐者宜用局方藿香正氣散生薑棗子煎沉冷服即止如痰盛嘔吐者宜局方半夏湯茯苓湯二陳湯如惡阻兼用茯苓丸自有專門如血不歸源而嘔吐者用十全大補雜病虛勞加陳皮半夏藿香薑棗煎服或有腳氣而嘔者自有專門不濫及薛東垣先生云前證內有故寒與新谷俱入於胃新故真邪相攻氣並相逆復出於胃故為噦補手太陰瀉足少陰又云胃因氣逆為噦夫嘔吐噦者俱屬於胃以其氣血多少為異耳如嘔者陽明也陽明多血多氣故有聲有物血氣俱病也仲景云嘔多雖有陽明證慎不可下孫真人云嘔家多服生薑為嘔家之聖藥也氣逆者必散之故以生薑為主吐者太陽也太陽多血少氣故有物無聲為血病也有食入則吐以橘皮去白主之噦者少陽也多氣少血故有聲無物乃氣病也以薑製半夏為主若脾胃虛弱寒邪所客飲食所傷者用六君丁香藿香生薑之類若胃中有熱膈上有痰用二陳山梔黃連生薑若久病胃虛嘔而不納穀者用生薑參朮黃耆香附之類亦有痰膈中焦食不得下者有氣逆而嘔者有氣鬱於胃口者有食滯於心肺之分而復出者有胃口有火與痰而嘔者若注船大吐渴飲水者即死童便飲之最妙前論云血不歸源而嘔用十全大補湯誠發前人之未發愚常用屢效此論與王安道溯洄集所論少異宜參看之先太宜人飲食後聞外言忤意嘔吐酸水內熱作渴惟飲冷水氣口脈大而無倫面色青赤此肝脾鬱火投之以藥入口即吐第三日吐宿食第七日吐酸黃水十一日吐苦水脈亦洪大仍喜飲冷以黃連煎湯冷飲少許至二十日加白朮茯苓二十五日加陳皮三十七日加當歸炙草至六十日始進米飲半盞漸進薄粥調理得痊府庠沈姬文母患脾虛中滿痰嗽發熱又食濕面冷茶吞酸嘔吐絕食誤服芩連青皮等藥益加寒熱口乾流涎不收聞食則嘔數日矣迎治余曰脾主涎此脾虛不能約制也欲用人參安胃散惑於眾論以為胃經實火宿食治之病日增劇忽思冬瓜食如指甲一塊頓發嘔吐酸水不止仍服前藥愈劇復邀視之則神脫脈絕瀕死矣惟目睛尚動余曰寒淫於內治以辛熱然藥不能下矣急用鹽艾附子炒熱熨臍腹以散寒回陽又以口氣補接母口之氣又以附子作餅熱貼臍間時許神氣少蘇以參朮附子為末仍以是藥加陳皮煎膏為丸如粟米大入五七粒於口隨津液嚥下即不嘔二日後加至十粒諸病少退其涎不止五日後漸服前劑一二匙胃氣少復乃思粥飲後投以參術等藥溫補脾胃五十餘劑而愈孫一婦人三十五歲無子恐夫娶妾致郁經不行者三月矣病腹痛惡心諸醫皆云有孕其夫亦粗知醫舉家欣喜治以安胎行氣止痛之藥服三五十帖不效痛苦益甚凡未申時發寒熱腹中有塊如彈子大者二三十枚翻騰作痛行動則水聲漉漉痛極則吐酸水五六碗吐盡則塊息而寒熱除痛亦不作明日亦然又作瘧治轉劇召予診左手弦尺澀右手濡弱重取則滑尺同左時經已五月不行矣予曰此郁病也豈有澀脈成孕之理若然則前藥當效矣其夫亦悟乃為制方以二陳加香附山梔撫芎玄胡當歸紅花之類藥進而痛止連與四帖皆效但藥止則痛發如故調治一月不能除根予因持脈案見先師黃古潭先生先生乃諭予曰此鬱火病也其病起於肝膽蓋肝主謀慮膽主決斷謀不決則鬱生郁生則木盛木盛則凌脾脾傷則不能運化精微而生氣血以故月水不來也肺金失於母養則降殺之令不行木寡於畏而侮所不勝是以直衝犯清道以作吐也吐後諸證皆減者木升而火息也為裁一方以黃耆五錢柴胡三錢白芍藥二錢甘草一錢陳皮貝母枳實各五分姜三片一劑而寒熱除再劑而痛減吐止水聲亦絕七日不發其夫喜曰是何神速也乃拉予復請命於先生先生曰夫寒熱者少陽膽也吐酸者厥陰肝也痛而腹塊翻騰者火盛激動其水如鍋中湯滾泡浪沸騰是也吐多則肺金愈傷故用黃耆補肺金為君使得以制肝木以柴胡瀉肝為臣以升發其膽火經曰木鬱則達之達是通達之義夫木性上升者也既鬱則不升故用柴胡升發膽肝之清氣使衝開其鬱結以復其常又曰過者折之以其畏也所謂瀉之補肺制肝正謂此也又曰泄其肝者緩其中以甘草緩中為佐又曰木位之主其瀉以酸以白芍藥於脾中瀉木為臣病久生郁郁久則生涎以貝母陳皮枳實開鬱逐涎為裨使然後金得其正木得其平土得其安由是病去而愈速前方用山梔黃連之類皆降下之藥火勢正熾豈區區寒涼所能抑哉故經曰輕者正治重則從其性而升之但凡治病要當識得此意益智子散治婦人脾胃久虛氣弱多欲嘔吐全不下食四肢無力益智一兩附子炮縮砂仁丁香厚朴黃耆白朮白茯苓陳皮川芎良薑藿香葉當歸各七錢半人參桂心各半兩上㕮咀每服三錢姜三片棗一枚水一盞煎至七分去滓無時溫服丁香散治婦人臟腑虛冷脾胃氣弱食則嘔吐水穀不消丁香白朮縮砂仁草果仁橘皮各七錢半當歸白豆蔻藿香葉神麯訶子皮甘草各半兩人參一兩上為細末每服二三錢煎薑棗湯調下竹茹湯治胃熱嘔吐乾葛三兩半夏湯洗七次薑汁半盞漿水一升煮耗一半取七錢半甘草七錢半上㕮咀每服五錢水二盞姜三片竹茹雞蛋大棗子一枚煎至一盞去滓溫服許學士云胃熱者手足心熱政和中一宗人病傷寒得汗身涼數日後忽嘔吐藥與飲食俱不下醫者皆用丁香藿香滑石等藥下咽即吐予曰此正汗後飲熱留胃脘孫兆竹茹湯正相當爾亟治藥與之即時愈良方槐花散皂莢白礬槐花炒令黃黑色甘草各等分上為細末白湯調下二錢許仁則半夏丸療積冷在胃嘔逆不下食方半夏一升真熊州者洗去滑小麥曲一升上搗半夏為散以水搜面丸如彈子大以水煮令面熟則是藥成初吞四五丸日二服稍加至十四五丸旋煮旋服比覺病減欲更合服亦佳忌羊肉餳又依前半夏丸雖覺漸損然病根不除欲多合前丸又慮藥毒不可久服欲不服又恐病滋蔓宜合人參七味丸服之人參七味丸人參白朮各五兩厚朴炙細辛各四兩生薑八兩末橘皮三兩桂心二兩上為細末煉蜜丸如梧桐子大飲下十丸漸加至二十丸與半夏丸間服亦可忌桃李雀肉生蔥生菜補遺治男子婦人一切嘔吐五苓散內除桂加半夏末如桂分兩每服一錢以生薑自然汁調搜和如面候半時久再以白沸湯一小盞調開溫服五苓散方見傷寒準繩渴門青金丹治一切嘔吐不已硫黃二錢水銀一錢入銚內慢火熬化以木篦子撥炒成砂再入乳缽研黑不見星以薑汁糊丸如綠豆大每服二三十丸米飲下人參安胃散治脾胃虛熱嘔吐泄瀉或飲食不入人參一錢黃耆炒二錢生甘草炙甘草各五分白芍藥七分白茯苓四分陳皮三分黃連炒二分上水煎服霍亂大嘔吐而利者名霍亂也原疾之由皆因腸胃虛冷飲食過度觸冒風冷使陰陽不和清濁相干致令揮霍變亂也或先心痛而吐者或先腹痛而利者或吐利俱作者或頭痛身體壯熱而脈浮洪者或陽氣暴絕而手足逆冷而脈息微絕者治之當分陰陽察其虛實辨其冷熱觀其脈息熱者涼之冷者溫之以平為期百問云凡霍亂吐利熱多而渴者五苓散寒多不飲水者理中丸吐利已汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯夏月間中暑霍亂大煩渴四肢逆冷冷汗出腳轉筋者香薷散濃煎沉冷服即效凡霍亂之脈得浮洪者易治微遲者並短氣者難治薛賈元良先生云暑者相火行令也夏月人感之自口齒而入傷心胞絡之經其證頭疼口乾面垢自汗倦怠少氣或背寒惡熱甚者迷悶不省或霍亂吐利嘔痰腹痛或下血發黃生癍等證治法清心火利小便為主若自汗熱甚用白虎湯若頭疼惡寒用十味香薷散泄瀉煩渴飲水吐逆用五苓散熱甚煩渴用益元散清之若表解裡熱甚者用黃連解毒湯脈微下利作渴喜溫或厥冷不省人事宜竹葉石膏湯加熟附半枚冷飲次以來復丹五苓散治之故東垣云脾胃虛弱遇夏月淫雨身重短氣甚則四肢痿軟腳欹眼黑當滋肺氣以補水之源是以五月常服五味子人參麥門冬之劑為熱傷元氣故爾丹溪所謂夏月伏陰在內也蓋人之腹屬地巳月六陽盡出於地之上矣是人之陽氣亦浮於肌表散於皮毛而腹中之陽虛矣又加以涼臺水館大扇風車寒泉水果冰涼之物自內及外不用溫熱病所由生陳無擇云凡中暍切不得用冷藥惟用溫養得冷即死道途無湯即以熱土熨臍中溺以熱尿即蘇概可見矣內經曰脈虛身熱得之傷暑難經曰傷暑得之為正邪火自病也當惡臭其病身熱而煩心痛其脈浮大而散傷寒論曰太陽中暍者身熱頭痛而脈微弱或發熱惡寒而脈弦細芤遲大抵寒傷形熱傷氣蓋傷氣而不傷形則氣消而脈虛弱故先哲立法夏月宜補良有以也前證若內有所積外有所感用二陳湯加減治之或蘿蔔子搗碎服而吐之若飲米湯即死云云同前論若轉筋不住男子以手挽陰女子以手牽乳近兩邊此千金妙法也乾霍亂不得升降死在須臾當以鹽湯吐之後以二陳湯加川芎蒼朮防風白芷姜煎服若登圊而不通加枳殼若食瓜果飲冷乘風霍亂用六和湯倍加藿香大凡中暑而亡者皆因元氣虛弱暑熱乘之以致泄瀉陽氣暴脫實為陰寒之證宜急補其陽庶得保生緩則不救其他執為暑熱投以寒藥鮮不誤事愚故以回陽固本之方繼之於後加減理中丸主霍亂臨時方亦可治男子人參白朮乾薑甘草各一兩上為細末煉蜜為丸每兩作五丸取湯和一丸服之日三服吐多利少者取枳實三枚炙去穰四破水三升煮取一升和一丸服之吐少利多者加乾薑一累吐利乾嘔者取半夏半兩泡洗去滑水二升煮取一升和一丸服若體疼痛不可堪者取棗三枚水二升煮一升和一丸服吐利太極轉筋者以韭汁洗腹腎從胸至足踝勿逆即止若體冷微汗腹中寒取附子一枚炮去皮四破以水二升煮取一升和一丸服吐利悉止脈不出體猶冷者可服諸湯補之四順湯治霍亂吐利腹痛手足逆冷脈微欲絕附子一枚破八塊乾薑三兩人參甘草各一兩上㕮咀水煎服四逆加豬膽汁湯治吐已下斷汗出而厥四肢拘急不解脈微欲絕者甘草二兩乾薑三兩附子一枚生用豬膽汁半合上三味㕮咀每服五錢水三盞煮至二盞去滓納豬膽汁分二次溫服其脈即來香薷散治臟腑冷熱不調飲食不節或食腥鱠生冷過度或起居不節或露臥濕地或當風取涼而風冷之氣歸於三焦傳於脾胃脾胃得冷不能消化水穀致令真邪相干腸胃虛弱因飲食變亂於腸胃之間便至吐利心腹疼痛霍亂氣逆有先心痛而吐者或先腹痛而利者有吐利俱發者有發熱頭痛體疼而後吐利虛煩者或但吐利心腹刺痛者或轉筋拘急疼痛者或但嘔而無物出者或四肢逆冷脈微欲絕者或煩悶昏塞欲死者妊婦霍亂吐利此藥悉能主之香薷葉四兩白扁豆厚朴各二兩上㕮咀每服半兩水一大盞酒一分慢火濃煎至六分去滓井中浸令冰冷頓服無時候連並二三服立見神效蘇沈良方中名香茸散百問同有黃連無扁豆訶子散治老幼霍亂吐利一服取效又治九種心痛及心脾冷痛不可忍訶子皮甘草厚朴乾薑草果仁陳皮良薑茯苓神麯麥門冬各等分上為細末每服二錢候發刺痛不可忍用水一盞煎七分入鹽服急則監點胡椒湯治霍亂吐利甚妙胡椒四十九粒綠豆一百四十九粒上為細末每服二錢木瓜煎湯調下補遺凡霍亂身熱脈浮洪而渴者此必胃有熱宜竹茹湯吐止然後以五苓散不換金正氣散六和湯等治之或若陽氣暴絕四肢逆冷脈微欲絕可用理中湯理中丸治中湯之類甚者加附子如中暑霍亂吐利嘗以香薷散入半夏少許用生薑自然汁搜藥劑入銅銚炒乾再入好紅曲酒又搜潤藥又炒乾卻入水一盞半煎七分去滓井中浸冷服效翻胃吐食薛病機云吐有三曰氣積寒也皆從三焦論之上焦吐者從於氣氣者天之陽也其脈浮而洪食已暴吐渴欲飲水大便燥結氣上衝胸發痛其治法常降氣和中中焦吐者從於積有陰有陽食與氣相假為積而痛其脈浮而匿其證或先痛而後吐或吐而後作痛治法當以小毒藥去其積檳榔木香行其氣下焦吐者從於寒地之道也其脈沉而遲其證朝食暮吐暮食朝吐小便清大便秘而不通治法當以毒藥通其秘塞溫其寒氣大便漸通復以中焦藥和之不令大便秘結而自愈也王太僕曰食不得入是有火也食入反出是無火也又發明曰噎者六腑之所主陽也氣也塞者五臟之所主陰也血也二者皆由陰中伏火而作也劉宗厚先生曰若三焦傳化失常所致主於氣也若血虧胃脘乾槁所致因於血也塞猶填塞不通之義故發明有治幽門不通噎塞不便通幽湯例蓋陽無陰不能通化陰之失位而陽伏其中傳化不變而反上行矣故前證或由飲食起居七情虧損脾胃痰飲停滯中氣不運當以補中益氣湯雜病勞倦為主若鬱結傷脾用歸脾湯雜病健忘加枳殼桔梗若恚怒傷肝用小柴胡湯傷寒少陽加梔苓參術脾氣虛弱用六君子雜病虛勞加山梔枳殼氣血俱虛用八珍湯即雜病八物湯加山梔半夏若用行氣之藥胸膈痞悶用六君芎歸之類若過用香燥之劑而大便結燥用四物通治參術之類若飲食不能入用六君山梔吳茱萸制黃連若食入而反出用六君炮薑白豆蔻黃連制吳茱萸若痰滯而食反出六君枳殼桔梗若飲食少思大便不實胸膈痞悶吞酸噯腐食反不化是為脾胃虛寒用東垣補真丸或八味丸雜病虛勞若發熱煩熱身惡風寒腹畏熱食或手足俱冷胸滿腹脹是內真寒外假熱用神效附子丸本條或八味丸大凡嘔吐善食喜飲冷水是為有火嘔吐少食喜飲熱湯是為無火當審其因而治之一婦人患前證胸腹痞悶得去後或泄氣稍寬余曰此屬脾氣鬱結而虛弱也當調補為善不信乃別用二陳枳實黃連之類不應又用香燥破氣前證益甚形氣愈虛余用加味歸脾湯即本方加柴胡山梔調治半載而痊一婦人患前證胸脅脹悶或小腹不利或時作痛小便澀滯余曰此肝火血虛也當清肝火生肝血養脾土生肺金以余言為迂別服利氣化痰等劑前證益劇虛證蜂起余用加味逍遙散調經加味歸脾湯兼服尋愈一婦人患吐痰甚多手足常冷飲食少思余曰此肝脾鬱怒兼命門火衰不信另服化痰利氣之劑胸腹愈脹又服峻利疏道之劑余曰非其治也必變脾虛發腫之證急服金匱加減腎氣丸庶有可救不信反服沉香化氣等丸果發腫而歿白墡散治婦人翻胃吐食千金翼云不特治婦人男子亦可服一斤以上為妙白墡土以米醋一升煅土令赤入醋內浸令冷再煆再浸以醋乾為度取一兩研乾薑炮二錢半上為細末每服一錢米飲調下甚者二錢白芷散治婦人翻胃吐食上用白芷一兩切作片瓦上炒令黃為細末用豬血二十文切片以沸湯泡七次將血蘸藥吃七片如剩藥末留後次用太倉丸治脾胃虛弱不進飲食反胃嘔吐白豆蔻縮砂仁各二兩丁香一兩陳倉米一升用黃土炒米赤去土不用上為細末薑汁法丸梧子大每服六七十丸食後淡薑湯下青金丹治嘔吐反胃等證每用三十丸煎生薑陳皮湯吞下方見前嘔吐五苓散治反胃發渴加半夏每四錢生薑五片煎溫服方見傷寒渴東垣補真丸肉蓯蓉酒浸焙葫蘆巴炒附子炮去皮陽起石煅肉豆蔻面里煨菟絲子淨洗酒浸蒸川烏炮去皮沉香五味子各五錢鹿茸酒浸炒巴戟去心鍾乳粉各一兩上為細末用羊腰子兩對治如食法蔥椒酒煮搗爛入酒糊丸如梧子大每服七十丸空心米飲鹽湯任下神效附子丸治脾腎虛寒嘔吐或反胃膈噎黑附子重一兩四五錢端正底平尖圓一枚灰火炮皮裂入生薑自然汁內浸潤曬乾仍炮再入汁浸潤仍曬再炮用盡薑汁半碗為度卻去皮臍末之以人參膏和丸如黍米大每服數丸津唾嚥下胃氣稍復飲食稍進投以溫補之劑血膈薛婦人血膈若氣逆而血滯用流氣飲臂痛若恚怒而血逆用小柴胡湯傷寒少陽加山梔丹皮血虛用四物湯通治參朮柴胡山梔丹皮若鬱結而血傷用加味歸脾即歸脾加山梔丹皮兼加味逍遙結核脾虛不能生血用六君子雜病虛勞加歸芎胃虛不能生血用補中益氣湯雜病勞倦若肝虛而不能藏血用補肝散兩脅脹痛如不應兼以六味丸雜病虛勞若因脾肺虛用補中益氣湯如不應用六君子加芎歸一婦人患前證胸膈痞悶余曰此屬脾經血虛遂用四君加芎歸調補脾氣尋愈又因怒兼兩脅痞悶頭目不清月經旬余未竭用加味逍遙散加釣藤治之復瘥一婦人患前證胸膈作痛面青目札小便頻數或時寒熱此肝氣滯而血凝先用失笑散二服痛止又用加味逍遙散而愈一婦人所患同前泛用行氣破血之劑以致不起牡丹煎治婦人血膈牡丹皮苦參貝母去心玄胡索白芍藥各等分為細末煉蜜丸梧子大每服十五二十丸米飲吞下無時抽刀散治婦人血風血氣血膈等候方見血崩鼻衄大夫婦人鼻衄者由傷動血氣所致也凡血氣調和則循環表裡經絡澀則不散若勞傷損動因而生熱氣逆流溢入於鼻者則成鼻衄也只有產後見衄者不可治凡鼻衄雖多因熱而得此疾亦有因怒氣而得之者曾治趙恭人鼻衄不止諸治不瘥召予治之先用蘇合香丸四粒次用五苓散濃煎白茅花湯調服即止次用芎歸湯調理又有一富室男子鼻血不止六脈洪數究竟云服丹藥太過遂用黃連黃芩大黃為末水煎服之愈調服亦可薛前證若熱鬱於胃經用犀角地黃湯若伏暑於內用黃連香薷飲若大怒血蓄於上用小柴胡湯若脾損不能攝血歸源用歸脾湯大凡雜證見血多因陰分鬱熱或內有所傷皆屬五志所動經曰諸見血身熱脈大者難治是火邪勝也身涼脈靜者易治是正氣復也仍與後證同用一婦人經素不調因怒衄血此肝火熾盛用加味小柴胡熱入血室加紅花二劑血止又用加味逍遙散結核八珍湯即八物湯雜病虛勞兼服三十餘劑經行如期一婦人鬱結而患前證用加味歸脾湯即歸脾加山梔丹皮其血漸止飲食漸進用加味逍遙散元氣漸復寒熱漸止後因怒仍衄寒熱往來用小柴胡湯傷寒太陽加芎歸丹皮而愈一婦人因勞衄血服涼血之劑更致便血或以血下為順仍用治血余曰此因脾氣下陷而血從之當升補脾氣庶使血歸其經不信果血益甚余朝用補中益氣雜病勞倦夕用加味歸脾而愈此證用寒涼止血不補脾肺而死者多矣刺薊散治婦人鼻衄血流不止刺薊二兩桑耳亂髮灰艾葉各一兩炒生地黃二兩蒲黃一兩半上為細末每服二錢粥飲調下無時伏龍肝散治男子婦人五臟結熱吐血衄血並皆治之伏龍肝生地黃各一斤竹茹一升芍藥黃芩當歸川芎桂心甘草各二兩上㕮咀以水一斗三升煮竹茹減三升納藥煮取三升分為三服千金方無桂心百問有茅花湯以白茅花濃煎飲之立止一方搗生白茅根取汁一合飲之止又方取生蔥心塞鼻中即定若因刺著並刀斧所傷血不止者並用之立定又方取釜底墨細研入鼻中又方取亂髮灰細研以竹管吹入鼻中立止又方取龍骨為末吹入鼻中立止四物湯加側柏生地黃治虛熱吐血甚效若脾經血虛須用四君加芎歸若脾經氣鬱須用歸脾湯若肝腎虧損須用六味丸若氣血俱虛須用十全大補湯犀角地黃湯主熱鬱不解泛行經絡或流腸胃隨氣湧泄以致衄血吐血或為便血並皆治之若實熱熾甚加炒黃芩若去血過多或脾肺之氣虧損不能攝血歸源者急用四君子湯懷抱鬱結者用歸脾湯枇杷葉散治暑毒攻心衄血嘔血或吐瀉作渴黃連香薷飲亦可吐血大婦人吐血者皆由臟腑傷損所致夫血者外行於經絡內榮於臟腑若傷損氣血經絡則血虛行失於常理氣逆者吐血又怒則氣逆甚則嘔血然憂思驚恐內傷氣逆上者皆吐血也薛前證若脾經鬱熱用犀角地黃湯脾胃伏暑用黃連香薷飲雜病傷暑心脾鬱熱用生地黃湯心氣耗損用茯苓補心湯肺氣勞傷用雞蘇散思慮傷脾用歸脾湯雜病健忘暴怒肝火用加味小柴胡湯熱入血室久怒肝傷六味地黃丸雜病虛勞脾肺虛熱用麥門冬飲肝腎虛熱用六味地黃丸氣血俱虛用十全大補湯經云肺朝百脈之氣肝統諸經之血必用甘溫之劑補其陽氣使血各歸其經如大吐血病毋論其脈急用獨參湯救之若潮熱咳嗽而脈數者元氣虛而假熱之脈也皆由脾胃先損須用人參之類本草云人參治脾胃不足補中溫中瀉脾肺中火東垣先生云脾胃虛者心火亢甚而乘土位肺氣受邪須用黃耆最多人參甘草次之脾胃一虛肺氣先絕故用黃耆以益皮毛而閉腠理當治氣血虛弱用十全大補最善若用寒涼止血胃氣反傷無不致禍一老婦每作先飲食不進或胸膈不利或中脘作痛或大便作瀉或小便不利余以為肝脾之證用逍遙散加山梔茯神遠志木香而愈後鬱結吐紫血每作先倦怠煩熱以前藥加炒黑黃連三分吳茱萸二分頓愈復因怒吐赤血甚多燥渴垂死此血脫也法當補氣乃用人參一兩苓朮當歸各三錢陳皮炮黑乾薑各二錢炙甘草木香各一錢一劑頓止又用加味歸脾湯調理而痊一女子懷抱素郁胸滿食少吐血面赤用六味丸及歸脾加山梔貝母芍藥而愈一婦人為哭母吐血咳嗽發熱盜汗經水不行此悲傷肺思傷脾朝服補中益氣湯雜病勞倦加桔梗貝母知母夕用歸脾湯吞六味丸而愈雞蘇散治婦人吐血心煩昏悶雞蘇葉一兩阿膠刺蘇生地黃各一兩黃耆羚羊角屑茜根甘草各半兩麥門冬黃芩當歸伏龍肝各七錢半上為粗末每服四錢水一盞姜三片竹茹半雞子大煎至六分去滓溫服又方治婦人虛損氣逆吐血不止雞蘇葉黃芩各一兩當歸赤芍藥各半兩伏龍肝阿膠各二兩上為粗末每服四錢水一盞煎六分去滓溫服治婦人熱毒上攻吐血不止生藕汁刺蘇汁生地黃汁各三兩生薑汁半合白蜜一合上和煎三兩沸以一小盞調炒麵一錢服無時千金翼治吐血百方不瘥療十十瘥神驗不傳方詳此藥性治熱毒吐血有效地黃汁半升生大黃末一方寸匕上煎地黃汁三兩沸調大黃末令勻分為三服又方伏龍肝研極細每服二錢新汲水調下頻服取效又方白茅根一握長六寸以水一大盞煎七分去滓服又方桂心為末水調方寸匕日夜可二十服又方生地黃三升切阿膠二兩炒蒲黃六合以水五升煮取三升分三服予嘗治一人吐血診其脈肝部弦氣口濡此因怒極而得之遂用蘇合香丸和雞蘇丸服即效養生必用方云凡吐血須煎乾姜甘草湯與服或四物理中湯亦可如此無不愈者服生地黃竹茹藕汁去生便遠柔脾湯治虛勞吐血衄血下白汗出方出養生必用甘草白芍藥黃耆各一兩熟地黃三兩上為末每服四錢水酒各一盞以上煎至七分去滓取清汁六分溫服食前予嘗治一女人年十九歲月經不行以藥通之遂妄行而嘔血諸藥不效察其人肥脈不大不小投以四生丸即安又治一男子因飽低頭負重吐血諸藥無效亦投四生丸及青餅子即安更不發嘗觀初虞世治吐血不喜用竹茹生地黃藕汁然亦不可拘泥此說如陽乘於陰血得熱則流散經水沸溢宜服涼藥以解之大黃犀角生地黃生艾藕汁等豈得無效若陰乘於陽所謂天寒地凍水凝成冰宜服溫藥以暖之乾薑肉桂豈能無功學者更宜思之四生丸療吐血凡吐血衄血陽乘於陰血熱妄行宜服此藥生荷葉生艾葉生柏葉生地黃各等分上爛研丸如雞子大每服一丸水三盞煎到一盞去滓溫服無時候陳日華云先公紹興初遊福溝靈石寺主僧留飯食將竟侍者赴堂齋罷來侍立見桌子不穩急罄折穩之舉首即嘔血蓋食飽拗傷肺也明年再到寺問舊年嘔血者無恙否主僧云得四生丸服之愈自得此方屢施有驗薛愚意前證乃內熱暴患用之有效若人病久本原不足須補脾以滋化源否則虛火上炎金反受克獲生鮮矣療熱甚嘔血者以犀角地黃湯局方小三黃湯以白茅根煎濃湯飲之極妙犀角地黃湯治內有瘀血鼻衄吐血面黃大便黑芍藥七錢半生地黃半斤牡丹皮去心淨一兩犀角屑一兩如無以川升麻代上㕮咀每服五錢水煎服有熱如狂者加黃芩二兩青餅子治咯血青黛杏仁各一兩華佗方以牡蠣粉炒杏仁去皮尖牡蠣不用上一處同研成膏熔黃蠟和作三十餅子每服一餅子用乾柿半個夾定以濕紙裹煨令香同嚼粥飲下無時乾薑甘草湯若陰乘於陽心肺經寒而嘔血者宜服甘草乾薑各半兩上㕮咀水煮頓服局方理中湯亦妙花蕊石散予嘗見一婦人苦此疾百藥不效以童子小便和酒調下真花蕊石散不數服而愈烏金散治吐血不已每服二錢米飲下即催生如神散方見後濟生雞蘇散治勞傷肺經唾中有血咽喉不利雞蘇葉黃耆炒生地黃阿膠炒貝母白茅根各一錢桔梗炒麥門冬去心蒲黃炒甘草炙各五分上姜水煎服生地黃散治鬱熱衄血咯血吐血陰虛而不能愈者枸杞子柴胡黃連炒地骨皮天門冬去心白芍藥甘草炒黃芩炒黃耆炒生地黃熟地黃自制各五分上水煎服下血加地榆三因茯苓補心湯治面色黃悴五心煩熱咳嗽血半夏前胡紫蘇茯苓人參枳殼麩炒桔梗炒甘草炒乾葛各五分當歸川芎陳皮白芍藥各一錢熟地黃自制一錢半上薑棗水煎服麥門冬飲子治氣虛吐血或氣虛不能攝血五味子杵十個麥門冬去心黃耆炒各一錢當歸身人參生地黃各半錢上水煎服十全大補湯治胃氣虛弱吐血衄血便血不止以致外證惡寒發熱自汗盜汗食少體倦或寒熱作渴頭疼眩暈而似中風或氣血俱虛胸腹脅痛或骨節作痛經候不調或寒熱往來發熱晡熱或五心發熱咽乾舌燥或痰嗽喘促胸膈虛痞或嘔吐泄瀉手足冷熱等證方見雜病虛勞門積聚癥瘕古方有五積六聚七癥八瘕之名五臟之氣積名曰積故積有五六腑之氣聚名曰聚故聚有六雜病準繩言之詳矣若夫七癥八瘕則婦人居多七者火數屬心蓋血生於心八者木數屬肝蓋血歸於肝雖曰強分理似不混夫癥者堅也堅則難破瘕者假也假物成形古人將婦人病為痼疾以蛟龍等為生瘕然亦不必如此執泥婦人癥瘕並屬血病龍蛇魚鱉肉發蝨瘕等事皆出偶然但飲食間誤中之留聚腹臟假血而成自有活性亦猶永徽中僧病噎者腹中有一物其狀如魚即生瘕也與夫宿血停凝結為痞塊雖內外所感之不同治法當以類相從所為醫者意也如以敗梳治蝨瘕銅屑治龍瘕曲糵治米瘕石灰治酒瘕如此等類學者可以理解也大全良方分痃癖諸氣疝瘕八瘕腹中瘀血癥痞食癥血癥凡七門痃者在腹內近臍左右各有一條筋脈急痛大者如臂次者如指因氣而成如弦之狀故名曰痃癖者僻在兩肋之間有時而痛故名曰癖疝者痛也瘕者假也其結聚浮假而痛推移乃動也八瘕者黃瘕青瘕燥瘕血瘕脂瘕狐瘕蛇瘕鱉瘕積在腹內或腸胃之間與臟氣結搏堅牢雖推之不移名曰癥言其病形可徵驗也氣壅塞為痞言其氣痞塞不宣暢也傷食成塊堅而不移名曰食癥瘀血成塊堅而不移名曰血癥若夫腹中瘀血則積而未堅未至於成塊者也大抵以推之不動為癥推之動為瘕也至夫疝與痃癖則與痛俱痛即現不痛即隱在臍左上為痃在兩肋之間為癖在小腹而牽引腰脅為疝恐學者一時難了未免淆濫故總敘敘而條析之張戴人過譙遇一卒說出妻事戴人問其故答曰吾婦為室女時心下有冷積如覆杯按之如水聲以熱手熨之如冰娶來已十五年矣恐斷我嗣是故棄之戴人曰公勿黜也如用吾藥病可除孕可得卒從之戴人診其脈沉而遲尺脈洪大而有力非無子之候也可不逾年而孕其良人笑曰試之先以三聖散吐涎一斗心下平軟次服白朮調中湯五苓散後以四物湯和之不再月氣血合度數月而娠二子戴人嘗曰用吾此法無不子之婦此言不誣三聖散用防風瓜蒂各三兩藜蘆一兩為粗末以齏汁煎服制煎法詳見儒門事親白朮調中湯用白朮茯苓澤瀉橘紅各半兩甘草一兩乾薑官桂砂仁藿香各二錢半為末白湯化蜜調服二錢無時五苓散見傷寒渴門陽夏張主簿之妻病肥氣初如酒杯大發寒熱十五餘年後因性急悲感病益甚惟心下三指許無病滿腹如石片不能坐臥針灸匝矣徒勞人耳乃邀戴人診之曰此肥氣也得之季夏戊巳日在左脅下如覆杯久不愈令人發痎瘧以瓜蒂散吐之魚腥黃涎約一二擊至夜繼用舟車丸通經散投之五更黃涎膿水相半五六行凡有積處皆覺痛後用白朮散當歸散和血流經之藥如斯湧泄凡三四次方愈瓜蒂散舟車丸方見雜病傷食痰飲二門通經散用橘紅當歸甘遂以麵包不令透水煮百餘沸用冷水浸過去面曬乾三味各等分為細未每服三錢臨臥溫淡酒調下白朮散白朮黃芩當歸各等分為末每服二三錢水煎食前服當歸散當歸杜蒺藜等分為末米飲調服食前此吐下兼施且甘遂等逐水太峻用者審之薛新甫云婦人痃癖癥瘕大抵因飲食起居七情失宜虧損臟腑氣血乖違陰絡受傷循行失度所致羅謙甫云養正積自除必先調養使榮衛充實若不消散方可議下但除之不以漸則必有顛覆之害若不守禁忌縱情嗜欲其有不喪身者鮮矣一婦人內熱作渴飲食少思腹內初如雞卵漸大四寸許經水三月一至肢體消瘦齒頰似瘡脈洪數而虛左關尤甚此肝脾鬱結之證外貼阿魏膏午前用補中益氣湯雜病傷勞倦午後用加味歸脾湯即歸脾加山梔丹皮兩月許肝火稍退脾土少健午前補中益氣下六味丸雜病虛勞午後逍遙散調經下歸脾丸又月餘日用蘆薈丸本門之末二服空心以逍遙散下日晡以歸脾湯下喜其謹疾調理年餘而愈一婦人腹內一塊不時上攻或作痛有聲或吞酸痞悶月經不調小便不利二年餘矣面色青黃余以為肝脾氣滯以六君加芎歸柴胡炒連木香吳茱各少許二劑卻與歸脾湯送下蘆薈丸三月餘肝脾和而諸證退又與調中益氣湯加茯苓牡丹皮中氣健而經自調一婦人性多郁善怒勤於女工小腹內結一塊或作痛或痞悶月經不調恪服伐肝之劑內熱寒熱胸膈不利飲食不甘形體日瘦牙齦蝕爛此脾土不能生肺金肺金不能生腎水腎水不能生肝木當滋化源用補中益氣湯六味丸至仲春而愈一婦人經候過期發熱倦怠或用四物黃連之類反兩月一度且少而成塊又用峻藥通之兩目如帛所蔽余曰脾為諸陰之首目為血脈之宗此脾傷五臟皆為失所不能歸於目也遂用補中益氣濟生歸脾二湯專主脾胃年餘而愈松江太守何恭人性善怒腹結一塊年餘上齶蝕透血氣虛極時季冬肝脈洪數按之弦緊或用伐肝木清胃火之藥余曰真氣虛而邪氣實也恐伐肝木至春不能發生耳用八珍湯以生氣血用地黃丸以滋腎水肝脈頓退因大怒耳內出血肝脈仍大煩熱作渴此無根之火也仍以前藥加肉桂二劑脈斂熱退復因大怒果卒於季冬辛巳日乃金剋木故也通治諸積順氣丸簡易治三十六種風七十二般氣去上熱下冷腰腳疼痛四肢困倦減食羸瘦顏色赤黃惡瘡下疰口苦無味憎寒毛聳癥癖氣塊男子世事斷絕女子久無子息久患瘧痢發成勞疾百節痠疼自嬰孩至百歲老人皆可服疏風順氣補精駐顏錦紋大黃五兩一半生用一半濕紙里煨車前子二兩半白檳榔二兩火麻子仁微炒赤退殼取二兩淨另研入川牛膝酒浸三夕郁李仁泡去皮另研山藥菟絲子酒蒸研焙各二兩山茱萸肉防風枳殼麩炒獨活各一兩上為細末煉蜜丸如梧子大茶清粥飲下二十丸百無所忌空心臨臥服一月消食二月去腸內宿滯三月無倦少睡四月精神強盛五月耳目聰明六月腰腳輕健一年消百病如服藥臟腑微動以羊肚肺羹補之勝紅丸簡易治脾積氣滯胸膈滿悶氣促不安嘔吐清水丈夫酒積女人脾血積氣小兒食積陳皮青皮京三菱莪朮二味同醋煮乾薑炮良薑炒各一兩香附子淨炒各二兩一方加神麯麥芽上為末醋糊丸如梧子大每服三十丸薑湯下虛者宜以補藥下之香稜丸濟生治一切積聚破痰癖消癥塊木香丁香各半兩三稜酒浸一夕枳殼麩炒莪朮細銼每一兩用巴豆三十粒去殼同炒待巴豆黃色去巴豆不用青皮制川楝子肉炒蘹香炒各等分上末之醋煮麵糊丸如梧桐子大硃砂為衣每三十丸姜鹽湯或溫酒下無時大消石丸治七癥八瘕聚結杯塊及婦人帶下絕產腹中有癥瘕者當先下此藥但去癥瘕令人不困消石三兩大黃四兩人參甘草各一兩上為末以三年苦酒三升置銅石器中先納大黃微火熬微沸常攪不息至七分納余藥復熬成膏至可丸即丸如梧桐子大每服三十丸米飲下三日服婦人服之或下如雞肝或如米泔赤黑等物二三升後忌風冷阿魏膏治一切痞塊羌活獨活玄參官桂赤芍藥穿山甲生地黃兩頭尖大黃白芷天麻各五錢槐柳桃枝各三錢紅花四錢木鱉子十枚去殼亂髮一團如雞子大上用香油二斤四兩煎黑去渣入發煎發化仍去渣徐下黃丹煎軟硬得中入芒硝阿魏蘇合油乳香沒藥各五錢麝香三錢調勻即成膏矣攤貼患處黃丹須用真正者方效凡貼膏藥先用朴硝隨患處鋪平半指厚以紙蓋用熱熨斗熨良久如硝耗再加熨之二時許方貼膏藥八瘕病源曰八瘕者皆胞胎生產月水往來血脈精氣不調之所生也腎為陰主開閉左為胞門上為子戶主定月水生子之道胞門子戶主子精神氣所出入合於中黃門玉門四邊主持關元禁閉子精臍下三寸名曰關元主藏魂魄婦人之胞三焦之府常所從止然婦人經脈俞絡合調則月水以時來至故能生子而無病婦人榮衛經絡斷絕不通邪氣便得往來入合於臟若經血未盡而合陰陽即令婦人血脈攣急小腹重急支滿胸脅腰背相引四肢痠痛飲食不調結牢惡血不除月水不時或月前月後因生積聚如懷胎狀邪氣甚盛者令人恍惚多夢寒熱四肢不欲動陰中生氣腫內生風甚者小便不利苦痛如淋狀面目黃黑歲月久即不復生子也薛氏曰經云氣主噓之血主濡之若血不流則凝而為瘕也瘕者中雖硬而忽聚忽散多因六淫七情飲食起居動傷臟腑而成當與痃癖諸證治同慎勿復傷元氣黃瘕者婦人月水始下若新傷墮血氣未止臥寢未定五臟六腑虛羸精神不足因向大風便利陰陽開闔關節四遠中於風濕氣從下上入於陰中稽留不去名為陰虛則生黃瘕黃瘕之聚令人苦四肢寒熱身重淋露臥不欲食左脅下有氣結牢不可得抑若腰背相引痛月水不利令人不產小腹急下引陰中如刺不得小便或時寒熱下赤黃汁令人無子當刺開元氣衝行以毒藥瘕下即愈皂莢散聖惠療黃瘕導方皂莢一兩炙去皮子蜀椒一兩去汗細辛一兩半上搗散以三角囊大如指長二寸貯之納陰中欲便悶則出之已則復納之惡血華出乃洗以溫湯三日勿近男子忌生菜等青瘕者婦人新產未滿十日起行以浣洗太早陰陽虛玉門四邊皆解散子戶未安骨肉皆痛手臂不舉飲食未復內臟吸吸又當風臥不自隱蔽若居濕席令人苦寒洒洒入腹煩悶沉淖惡血不除結熱不得散則生青瘕瘕聚在左右脅下藏於背膂上與肩胛腰下攣急腹下有氣起喜唾不可多食四肢不欲動搖手足腫面目黃大小便難其後月水為之不通利或不復禁狀如崩中此自過所致令人少子療之當刺胃管行以毒藥有法瘕當下即愈療青瘕導藥方戎鹽一升皂莢半兩去皮子炙細辛一兩上搗散以三角囊大如指長三寸貯之納陰中但臥瘕當下青如葵汁養之如產法燥瘕者婦人月水下惡血未盡其人虛憊而以夏月熱行疾步若舉重移輕汗出交流氣血未平而卒以恚怒致腹中猥咽不泄經脈攣急內結不舒煩懣少力氣上達胸膈背膂少腹壅急月水與氣俱不通利而反以飲清水快心月水橫流溢入他臟不去有熱則生燥瘕之聚大如半杯上下腹中苦痛還兩脅下上引心而煩害飲食欲嘔吐胸及腹中不得太息腰背重喜臥盜汗足酸削久立而痛小便失時忽然自出若失精月水閉塞大便澀難病如此者其人少子療之以長針按而刺之法度行以毒藥瘕當下即愈療燥瘕方聖惠大黃如雞子許乾薑各二兩黃連三兩雞䏶胵中黃膜一枚炙桂心一尺䗪蟲三枚熬厚朴十顆炙郁李仁一兩去皮尖熬上搗散早朝空腹以溫酒一盞和三錢頓服瘕當下畢養之如產婦法三月勿合陰陽無子者當有血瘕者婦人月水新下未滿日數而中止因飲食過度五穀氣盛溢入他臟若大飢寒吸吸不足呼吸未調而自勞動血下未定左右走腸胃之間留絡不去內有寒熱與月水合會為血瘕之聚令人腰痛不可以俯仰橫骨下有積氣牢如石少腹裡急苦痛背膂疼深達腰腹下攣陰里若生風冷子門僻月水不時乍來乍不來此病令人無子療之瘕當下即愈療婦人血瘕痛方聖惠乾薑烏賊魚骨各一兩炙桃仁一兩去皮尖上搗散酒服二方寸匕日二一方無桃仁又方取古鐵秤錘或大斧頭或鐵杵以炭火燒令赤投好酒三升中飲之療婦人血瘕攻刺腹脅時痛導藥方大黃當歸各半兩山茱萸皂莢去皮弦各一兩細辛戎鹽各二錢半上搗以香脂丸如指大每用一丸綿裹納陰中正坐良久瘕當下養如乳婦法桃仁煎本事治婦人血瘕血積經候不通桃仁大黃各一兩虻蟲半兩炒黑川朴硝另研上四味為末以醇醋二升半銀石器中慢火煎取一升五合下大黃虻蟲桃仁等不住手攪煎至可丸下朴硝攪勻出之丸如梧桐子大前一日不吃晚食五更初用溫酒吞下五丸日午取下如赤豆汁或如雞肝蛤蟆衣之狀未下再作如鮮血來即止續以調補氣血藥補之頃年在毗陵有一貴宦妻患小便不通臍腹脹不可忍眾醫皆作淋治以八正散之類愈甚予診之曰此血瘕也非瞑眩藥不可去用此藥更初服至日午大痛不可忍遂臥少頃下血塊如拳者數枚小便如黑豆汁一二升痛止得愈此藥治病的切然猛烈傷人氣虛血弱者不可輕用也三稜煎選奇治婦人血瘕血症食積痰滯三稜莪朮各二兩青橘皮去白半夏麥芽炒各一兩上用好醋六升煮乾焙為末醋糊丸如梧桐子大每服三四十丸淡醋湯下痰積多薑湯下脂瘕者婦人月水新來若生未滿三十日以合陰陽絡脈分胞門傷子戶失禁關節散五臟六腑津液流行陰道瞤動百脈關樞四解外不見其形子精與血氣相遇犯禁子精化不足成子則生脂瘕之聚令人支滿裡急痹引少腹重腰背如刺狀四肢不舉飲食不甘臥不安席左右走腹中切痛時瘥時甚或時少氣頭眩身體解㑊苦寒惡風膀胱脹月水乍來乍去不如常度大小便血不止如此者令人無子療之當刺以長針行以毒藥瘕當下即愈療脂瘕方聖惠皂莢七錢半去皮子礬石燒二錢半五味子蜀椒去汗細辛乾薑各半兩上搗散以香脂和如大豆著男子陰頭以合陰陽不三行其瘕即愈導散方聖惠皂莢炙去皮子吳茱萸當歸各一兩蜀椒去汗乾薑大黃戎鹽各二兩細辛熬礬石燒五味子各二分上搗篩為散以輕絹袋如指大長三寸盛藥令滿納陰中坐臥隨意勿行走小便時去之別換新者狐瘕者婦人月水當日數來而反悲哀憂恐若以遠行逢暴風疾雨雷電驚恐衣被沉濕罷倦少氣心中恍惚未定四肢懈惰振寒苦寤寐氣絕精神遊亡邪氣入於陰里不去則生狐瘕之聚食人子臟令人月水閉不通少腹瘀滯胸脅腰背痛陰中腫小便難胞門子戶不受男精五臟氣盛令人嗜食欲嘔喜唾多所思如有身狀四肢不舉有此病者終身無子其瘕有手足成形者殺人未成者可療以長針急持刺之行以毒藥有法瘕當下即愈療狐瘕方聖惠上取新死鼠一枚裹以新絮塗以黃土穿地坎足沒鼠形置其中桑薪火灼其上一日一夜出之研為末納桂心末二錢半酒服二方寸匕病當下甚者不過再服瘥蛇瘕者婦人月水已下新止適閉未復胞門子戶勞傷陰陽未平榮衛分行若其中風暴病羸劣飲食未調若起行當風及度泥塗因沖寒太早若坐濕地名陰陽亂腹中虛若遠行道路飲汙井之水食不潔之食吞蛇鼠之精留絡不去因生蛇瘕之聚上食心肝長大其形若漆在臍上下還㽲左右脅不得吐氣兩股脛間苦疼少腹多熱小便赤黃膀胱引陰中攣急腰目俱痛難以動作喜發寒熱月水或多或少有此病者不復生子其瘕手足成形者殺人未成者可治療有法行以毒藥瘕當下即愈療蛇瘕方聖惠大黃黃芩芒硝各半兩甘草大如指一尺炙烏賊魚骨二枚皂莢六枚去皮弦子酥炙上搗以水六升煮之三數沸絞去滓下硝適寒溫服之十日一劑空腹服之瘕即下鱉瘕者婦人月水新至其人劇作罷勞汗出衣服潤濕不以時去之若當風睡足踐濕地恍惚覺悟蹠立未安顏色未平復見所好心為之開魂魄感動五內脫消若入水浣洗沐浴不以時出而神不守水精與邪氣俱人至三焦之中幕玉門先閉津液妄行留絡不去因生鱉瘕之聚大如小柈令人少腹內切痛惡氣左右走上下腹中苦痛若存若亡持之躍手下引陰里腰背亦痛不可以息月水不通面目黃黑脫聲少氣有此病者令人絕子其瘕有手足成形者殺人未成者可治療有法度以長針按療之行以毒藥瘕當下即愈療鱉瘕方聖惠大黃一兩半乾薑側子各半兩附子人參各三錢七分半䗪蟲一寸匕熬桂心一兩二錢半細辛土䱉各七錢半白朮一兩上搗散以酒服方寸匕日三治鱉瘕及心腹宿癥或卒得癥上以白雄雞矢無問多少小便和之於器中火上熬令燥末服方寸匕多服不限度以膏熬飯飼彌佳癥痞大婦人癥痞由飲食失節脾胃虧損邪正相搏積於腹中牢固不動有可徵驗故名曰癥氣道壅塞故名曰痞得冷則發冷入子臟則不孕入胞絡則月水不通薛前證若脾胃虛弱用六君子加芎歸方見雜病虛勞若肝脾虛弱用補中益氣雜病傷勞倦及歸脾湯雜病健忘若肝火鬱滯佐以蘆薈丸方見幼科疳門地黃丸即六味丸雜病虛勞外貼阿魏膏見前患者須慎七情六淫飲食起居治者不時審察病機而藥之庶幾有效穿山甲散大全治婦人癥痞及惡血氣攻心腹疼痛面無顏色四肢瘦弱穿山甲灰炒燥鱉甲醋灸赤芍藥大黃炒乾漆炒令煙盡桂心各一兩川芎芫花醋炒當歸各半兩麝香二錢半另研上為細末入麝和勻每服一錢熱酒調下無時蓬莪朮丸大全治婦人癥痞腹脅妨痛令人體瘦不思飲食莪朮七錢半當歸焙桂心赤芍藥檳榔昆布琥珀研枳殼木香各半兩桃仁鱉甲大黃各一兩上為末爛蜜丸如梧子大食前米飲下二十丸丁香丸大全治婦人癥痞結塊不散心腹疼痛雄雀糞炒黃鱉甲各一兩硇砂當歸焙芫花醋炒乾各半兩巴豆二分半去皮心油上為末研令停醋煮麵糊丸如小豆大當歸酒下三丸桃仁散普濟治婦人癥痞心腹脹滿不能飲食體瘦無力桃仁一兩湯浸去皮尖雙仁者麩炒令微黃訶子皮白朮赤芍藥當歸各七錢半京三稜銼微炒一兩鱉甲醋炙去裙爛一兩半陳皮湯浸去白焙三兩上為散每服三錢水一盞入生薑一錢三分煎至六分去滓食前稍熱服上方皆攻積之藥性多獷猂用者慎之如薛氏食癥婦人臟腑虛弱月候來時食生冷之物脾胃既虛不能消化與臟氣相搏結聚成塊日漸生長盤牢不移故謂之食癥也薛前證若形氣虛弱須先調補脾胃為主而佐以消導若形氣充實當先疏導為主而佐以補脾胃若氣壅血滯而不行者宜用烏藥散散而行之散用烏藥莪朮醋浸炒桂心當歸桃仁青皮木香各等分為末每二錢熱酒調下脾氣虛而血不行者宜用四君芎歸補而行之方見雜病虛勞若脾氣鬱血不行者宜用歸脾湯雜病健忘解而行之若肝脾血燥而不行者宜用加味逍遙散結核清而行之大抵食積痞塊之證為有形蓋邪氣勝則實真氣奪則虛當養正辟邪而積自除矣雖然堅者削之客者除之胃氣未虛或可少用若病久虛弱者不可輕試也硇砂丸大全治婦人食癥久不消令人瘦弱食少硇砂青礞石穿山甲炙三稜炒乾漆炒令煙盡硫黃各半兩巴豆三十枚去皮心炒不去油上為末用軟飯丸如小豆大每服五丸生薑橘皮湯下礞石丸大全治婦人食癥塊久不消攻刺心腹疼痛青礞石末巴豆去皮心油硃砂粉霜並研木香末各二錢半硇砂半兩上研令停以糯米軟飯和丸如綠豆大每服二丸空心溫酒下取下惡物為度上方犯硇砂巴豆非胃氣強壯而積氣堅頑勢不兩立者不可輕用也小三稜煎丸治食癥酒癖血瘕氣塊時發刺痛全不思食及一切積滯不消心腹堅脹痰飲嘔噦噫酸脅肋刺痛脾氣橫泄三稜莪朮各四兩芫花一兩上入瓷器中用米醋五升浸滿封器口以灰火煨令乾取出稜術將芫花以余醋炒令微焦同稜術焙乾為末醋糊丸如綠豆大每服十五丸生薑湯下婦人血分男子脾氣橫泄腫滿如水桑白皮煎湯下血癥婦人寒溫失節臟腑氣虛風冷在內飲食不消與血氣相結漸生顆塊盤牢不移動者是也皆因血氣勞傷月水往來經絡痞塞惡血不除結聚所生久而不瘥則心腹兩脅苦痛害於飲食肌膚羸瘦問癥一也何以知是血癥曰血之外證瞀悶煩躁迷忘驚狂痰嘔汗多骨熱肢冷其蓄在下焦者必臍下結急外熱內痛尺脈洪而數也桃仁靈脂生地黃牛膝大黃甘草祛逐之薛前證多兼七情虧損五臟氣血乖違而致蓋氣主噓之血主濡之脾統血肝藏血故鬱結傷脾恚怒傷肝者多患之腹脅作痛正屬肝脾二經證也潔古云養正積自除東垣云人以胃氣為主治法當主於固元氣而佐以攻伐之劑必需之歲月若期速效投以峻劑反致有誤加減四物湯方見雜病積聚當歸丸牡丹散俱同上大黃煎聖惠治婦人血癥血瘕食積痰滯川大黃七錢半碎微炒鱉甲一兩醋炙黃去裙襴牛膝去蘆一兩乾漆一兩炒煙盡上為末用米醋一升煎為膏每服一錢食前熱酒調下腹中瘀血婦人月經痞澀不通或產後余穢未盡因而乘風取涼為風冷所乘血得冷則成瘀血也血瘀在內則時時體熱面黃瘀久不消則為積聚癥瘕矣薛前證若鬱結傷脾用加味歸脾湯方見雜病健忘若恚怒傷肝用加味逍遙散結核若產後惡露用失笑散方見心痛若肝脾虧損用六君柴胡以補元氣為主方見虛勞胃氣虛弱用補中益氣湯加茯苓半夏為主方見雜病勞倦大凡腹中作痛畏手按者此內有瘀血若形體如常屬病氣元氣俱實用桃仁承氣湯直下之方見傷寒蓄血若痛而肢體倦怠飲食少思此脾胃受傷屬病氣有餘元氣不足用當歸散調和之方見雜病溲血若痛而喜手按腹形體倦怠飲食少思此形氣病氣俱不足用六君炮薑芎歸純補之若痛而大便不實飲食難化此脾腎虛寒用六君炮薑肉果溫補之若痛而作嘔少食此脾胃虛弱用六君炮薑藿香若痛而嘔吐不食泄瀉用六君加薑桂若兼手足逆冷自汗更加附子此證多有因攻伐而致者調榮湯治瘀血不消臍腹引腰背俱痛川芎當歸芍藥地黃生薑各一兩三稜莪朮白芷延胡索蒲黃香附子澤蘭葉細辛川白姜厚朴制半夏制甘草各七錢半炙辣桂桃仁湯浸去皮焙各五錢上銼散每服三錢薑棗煎食前服川當歸散理榮衛消瘀血出聲音治痰嗽川當歸牡丹皮白芍藥子芩木通華陰細辛麥門冬甘草各半兩生地黃一兩上㕮咀每服三錢水一盞姜三片煎至七分去滓溫服大黃湯治婦人血瘀不消及撲損血瘀大黃生用桃仁湯浸去皮尖雙仁各一兩桂去粗皮郁李仁去皮研各半兩生薑地黃各一兩上粗搗節每服三錢水酒各半盞同煎至七分去滓溫服琥珀散治婦人經絡痞塞腹內瘀血痛不可忍琥珀乳香沒藥上三味各研取細末五錢每服二錢水酒各半盞煎至七分入地黃自然汁二合再煎數沸去滓入溫酒服不拘時候地榆散治敗血何首烏肉桂地榆香白芷各等分上為粗末每服二錢米泔一盞半砂糖一小塊煎至八分去滓服空心食前本草單方消瘀血以生藕汁飲之以琥珀刮屑水服之瘀血不散變成癰搗生菴䕡蒿取汁一升服之除腹中宿血以乾柿多食瘥破宿血用磨石燒黑熱投酒中飲之紫荊木濃煮服之痃癖大痃者在腹內近臍左右各有一條筋脈急痛大者如臂次者如指因氣而成如弦之狀名曰痃也癖者為僻側在兩肋之間有時而痛故曰癖也二者皆陰陽不和經絡痞隔飲食停滯不得宣流邪冷之氣搏結不散得冷則發作疼痛麝香丸治婦人痃癖冷氣兼疰氣心腹痛不可忍麝香半兩別研阿魏二錢半麵裹煨令面熟五靈脂桃仁三稜各七錢半芫花醋炒檳榔各一兩莪朮桂心沒藥木香當歸各半兩上為細末入麝香令勻粳米軟飯為丸如梧桐子大每服十丸無時淡醋湯下治婦人痃癖及血氣等神效方上以獖豬肝一具可及十兩者用巴豆五十枚去大皮札在肝內用釅醋三碗慢火熬肝極爛入京三稜末和就得所為丸如梧桐子大每服五丸食前熱酒下肝熟後去巴豆不用夫痃癖癥瘕血氣塊硬發歇刺痛甚則欲死究而言之皆血之所為僕嘗治一婦人血氣刺痛極不可忍甚而死一二日方省醫巫並治數年不愈僕以蔥白散烏雞丸遂安又嘗治一婦人血氣作楚如一小盤樣走注刺痛要一人伏定方少止亦用此二藥而愈尋常小小血氣用此二藥亦有奇效故錄於後蔥白散專治一切冷氣不和及本臟膀胱氣攻衝疼痛大治婦人胎前後腹痛胎不安或血刺痛者兼能治血臟宿冷百節倦痛肌體怯弱勞傷帶癖久服盡除但婦人一切疾病最宜服此川芎當歸枳殼厚朴桂心乾薑芍藥舶上蘹香青皮苦楝子木香熟地黃麥芽三稜莪朮茯苓神麯人參各等分上為細末每服三平錢水一盞連須蔥白二寸拍破鹽半錢煎至七分納大黃訶子宜相度病狀如大便不利入大黃同煎不入鹽如大便自利入訶子煎朱先生云此藥大治心氣脾疼用之見效僕嘗以此藥治浮腫立效陳宜人病血氣作楚痛不可忍服諸藥無效召僕診之兩關脈沉弱為肝脈沉差緊此血氣漸成痃癖也只以此二藥治之愈四明馬朝奉後院亦病此用二藥亦愈烏雞煎丸方見通治諸疾四等丸聖惠治婦人痃癖氣心腹疼痛飲食不消川大黃銼碎微炒訶梨勒去核檳榔木香上各等分為細末酒煮麵糊和丸如梧桐子大每食前以生薑橘皮湯下十五丸溫酒亦得又方鱉甲醋炙黃去裙襴川大黃銼碎微炒京三稜炮裂各等分上為末醋煮麵糊丸如梧桐子大每食前以生薑湯下十丸木香硇砂丸拔粹治婦人痃癖積聚血塊刺痛脾胃虛寒宿食不消久不瘥者木香硇砂丁香官桂附子炮乾漆炒煙盡細墨大黃銼碎為末乳香研廣朮青皮京三稜沒藥研豬牙皂角乾薑炮各等分巴豆霜減半上除硇砂乳香沒藥外同為末以好醋一升化開硇砂去滓銀器中慢火熬次下巴豆霜大黃熬成膏將前藥末與膏子為丸如麻子大每服三五十丸食後溫酒送下加至大便利為度當歸散聖惠治婦人痃癖氣攻心腹痛不能飲食當歸銼微炒檳榔各七錢半木香桂心陳橘皮去白各半兩京三稜郁李仁去皮微炒桃仁去皮炒微黃吳茱萸湯泡七次焙乾各一兩上件粗搗篩每服三錢水一中盞煎至六分去滓不計時候稍熱服上方皆攻積之劑全無補性虛人禁用實者亦須以四君四物湯藥兼服乃可疝瘕大婦人疝瘕由飲食不節寒溫不調氣血勞傷臟腑虛弱風冷入腹與血相結所生疝者痛也瘕者假也結聚浮假而痛推移乃動也婦人之病有異於丈夫者或因產後血虛受寒或因經水往來取冷過度非獨因飲食失節多挾於血氣所成也其脈弦急者生虛弱小者死尺脈澀而浮牢為血實氣虛其發腹痛逆氣上行此為胞中有惡血久則結成血瘕也薛子和云遺溺閉癃陰痿脬痹精滑白淫皆男子之疝也若血涸月事不行行後小腹有塊或時動移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕一婦人小腹痞脹小便時下白帶小水淋瀝此肝經濕熱下注用龍膽瀉肝湯而愈一婦人小腹脹痛小水不利或胸乳作痛或脅肋作脹或氣逆心胸余以為肝火而血傷脾用四物柴胡青皮玄胡索木香而愈一婦人小腹痞悶小便不利內熱體倦懶食用八珍湯加柴胡山梔龍膽草治之而安乾漆散治婦人疝瘕久不消令人黃瘦尫羸兩脅妨悶心腹疼痛乾漆炒令煙盡木香芫花醋炒赤芍藥桂心當歸川芎琥珀各半兩研大黃炒二兩牛膝七錢半桃仁一兩麝香二錢半上為細末無時溫酒調下一錢當歸散治婦人疝瘕及血氣攻刺心腹疼痛不可忍鱉甲醋炙黃二兩當歸銼微炒桂心檳榔川大黃銼微炒各一兩川芎吳茱萸湯泡七次焙乾木香青橘皮去白各半兩蓬莪朮赤芍藥桃仁湯浸去皮尖麩炒微黃各七錢五分上為散每服三錢水一盞姜一錢三分煎至七分去滓稍熱服不計時候硇砂丸治婦人疝瘕及積瘀血在臟時攻腹脅疼痛川芒硝硇砂各一兩當歸雄黃桂心各半兩大黃炮三稜各二兩上為細末米醋一碗熬大黃末為膏次入余藥末和丸如梧桐子大空心溫酒下十丸漸漸加至二十丸以利下惡物為度巴豆丸治婦人疝瘕及血氣疼痛巴豆去皮心醋煮半日二錢半硇砂大黃炒各一兩五靈脂桃仁各七錢半木香半兩各為末煉蜜丸如綠豆大淡醋湯空心下五丸熱酒亦可黑神丸神麯蘹香各四兩木香椒炒香出汗丁香各半兩檳榔四枚漆六兩半生半用重湯煮半日令香上除椒漆五物皆半生半炒為細末用前生熟漆和丸如彈子大用蘹香末十二兩鋪陰地蔭干候外干並蘹香收器中極干去蘹香腎余育腸膀胱痃癖及疝墜五膈血崩產後諸血漏下赤白並一丸分四服死胎一丸皆綿裹酒下難產炒葵子四十九枚搗碎酒煎下一丸諸疾不過三服痃氣十服膈氣癥瘕五服血瘕三丸當瘥予族子婦病腹中有大塊如杯每發痛不可忍時子婦已貴京下善醫者悉集服藥莫愈予應之曰此血瘕也投黑神丸三丸杯氣盡消終身不作蟠蔥散治婦人脾胃虛冷氣滯不行攻刺心腹痛連胸脅間膀胱小腸疝氣及婦人血氣癥瘕痛延胡索肉桂乾薑各二兩甘草炒蒼朮米泔浸一宿縮砂丁皮檳榔各四兩莪朮三稜茯苓青皮各六兩上為末每服三錢水一盞連須蔥白一莖煎空心熱服寶鑑蒺藜湯治陰疝小腹作痛小便不利手足逆冷或腹脅悶痛蒺藜去刺附子炮梔子去皮各半兩上末每三錢水煎溫服食前丹溪定痛散治寒疝疼痛速效枳殼十五枚山梔子炒棠球子吳茱萸炒過荔枝核炮各等分上為末用長流水調下一二錢空心服附蘆薈丸方治疳癖肌肉消瘦發熱潮熱飲食少思口乾作渴或肝疳食積口鼻生瘡牙齦蝕爛等證蘆薈胡黃連黃連炒焦木香白蕪荑炒青皮各五錢當歸茯苓陳皮各一兩半甘草炒七錢上為末米糊丸梧子大每服七八十丸米飲下心腹脹滿大夫婦人心腹脹滿者由臟腑久冷氣血虛損而邪氣客之乘於心脾故也足太陰脾之經也脾虛則脹足少陰腎之經也其脈起於小指之下斜趣足心入跟中上股內後廉貫腎絡膀胱從腎上貫肝膈入肺中其支者從肺出絡於心臟邪氣客於三經與正氣相搏積聚在內氣並於脾脾虛有脹故令心腹煩滿而脹也診其脈遲而滑者脹滿也薛前證脾胃虛痞用六君子湯雜病虛勞脾胃虛寒者用人參理中湯鬱結氣滯者用歸脾湯雜病健忘肝侮脾土用六君柴芍脾氣壅滯用平胃散雜病中食肺氣壅滯用紫蘇飲宿食壅滯用養胃湯脾血虛痞用四物湯加參術上六證當互相參用仍與血風攻脾不食同用一婦人胸膈不利飲食少思腹脹吞酸或用疏利之藥反致中滿不食予以為脾土虛而肝木盛用補中益氣湯雜病傷勞倦加砂仁香附煨姜又以六君子加芎歸桔梗而愈吳江史玄年母久病之後遇事拂意忽胸腹脹滿面目微腫兩腿重滯氣逆上升言語喘促服清氣之劑不效予曰此脾肺虛寒也先用六君子湯一劑病勢頓減後用補中益氣加茯苓半夏乾薑二劑形體頓安後以七情失調夜間腹脹乃用十全大補湯加木香治之而痊白朮散治婦人脾胃氣虛心腹脹滿不欲飲食四肢無力白朮草果仁訶子肉各三分赤茯苓檳榔桂心各半兩陳皮厚朴人參各一兩甘草一分上為粗末每服四錢水一盅姜三片棗一枚煎至七分去滓食前熱服檳榔散治婦人脾胃虛冷心腹脹滿不欲飲食檳榔前胡川芎青皮七錢半赤芍藥桂心大黃苦梗木香枳殼各半兩甘草二錢半上㕮咀每服四錢姜三片煎至七分去滓溫服木香散治證同前木香桂心白朮乾薑炮陳皮去白草果仁訶梨勒人參各一兩神麯炒黃七錢半甘草炙半兩上為細末每服一錢茶清點熱服補遺治心腹脹滿予嘗獨用厚朴薑汁炒過每服五錢姜七片水煎溫服不拘時候間服沉香降氣湯得效見資生經局方分心氣飲亦妙方見雜病氣三腕散亦妙方見兩脅脹痛嘈雜大夫婦人心胸嘈雜此脾胃鬱火滯痰血液淚汗而成用豬血炒食之乃以血導而使之歸源爾旋覆花湯尤善薛前證若因食鬱用六君山楂山梔若因胃熱用二陳姜炒芩連若因六郁用越鞠丸雜病郁若因氣滯用四七湯雜病氣桔梗枳殼大抵此證屬病氣元氣俱不足須用六君為主少佐以治痰之藥若以火治之必變吞酸中滿一婦人飲食少思胸中嘈雜頭暈吐痰此中氣虛而有熱用六君子湯加炒黑山梔桔梗而愈後因勞碌頭暈發熱吐痰用補中益氣湯加半夏茯苓天麻而痊一婦人中脘嘈雜口中辛辣或咳嗽吐痰發喘面色或白或赤此脾氣虛而肺中伏火也用六君子加山梔桔梗柴胡及炒黑片芩治之尋愈一婦人嘈雜吞酸飲食少思大便不實此脾氣虛寒而下陷用補中益氣湯加茯苓半夏炮姜漸愈又常服人參理中丸即安一婦人飲食後嘈雜吞酸此食鬱為痰用六君子湯送越鞠丸漸愈又用加味歸脾湯而痊後因怒兩脅脹痛中脘作酸用四君子湯送左金丸漸安仍用六君子湯送越鞠丸而痊旋覆花湯治婦人心胸嘈雜中脘痰飲冷氣心下汪洋口中清水自出腹脅急脹滿痛不欲飲食旋覆花人參桔梗白芍藥各一錢橘皮去白一錢半赤茯苓半夏各二錢官桂去粗皮細辛甘草各半錢上作一服水二盅生薑五片煎至一盅食前服補遺予嘗以參蘇飲二分四物湯一分交和每四錢生薑七片煎服治一婦人心胸嘈雜而愈亦名茯苓補心湯小便淋瀝大婦人淋瀝由腎虛而膀胱熱也蓋膀胱與腎為表裡主於水行於脬者為小便也若腎虛則小便頻數膀胱熱則小便淋瀝甚則不通腹脹喘急當速治之薛前證若膀胱熱結用五淋散若脾肺虛熱用補中益氣雜病勞倦加山藥五味麥門若脾經鬱熱用加味歸脾湯即歸脾加丹皮山梔若肺經鬱火用黃芩清肺飲若肝經濕熱用龍膽瀉肝湯雜病淋血虛用加味逍遙散結核陰虛用六味丸雜病虛勞加柴胡山梔大抵不渴而不利者熱在下焦血分也用滋腎丸渴而不利者熱在氣分也用清肺飲尺脈數而無力者陰火盛而陽不能化也用六味丸滋腎丸為主尺脈浮而無力者陽氣虛而陰不能生也用加減八味丸雜病消癉滋腎丸為主一婦人素有前患內熱體倦余以為肝火血少脾氣虛弱用八珍逍遙二散兼服月餘而小便利又用八珍湯而血氣復一婦人患前證面青脅脹諸藥不應余以為肝經氣滯而血傷用山梔川芎煎服而愈一婦人小便不利小腹並水道秘悶或時腹脅脹痛余以為肝火用加味逍遙散加龍膽草四劑稍愈乃去膽草佐以八珍散加炒黑山梔兼服而瘥石韋散治婦人小便卒然淋瀝石韋黃芩瞿麥穗榆白皮木通葵子各一錢半甘草半錢上作一服水二盅煎至一盅食前服木通散治婦人五淋木通榆白皮瞿麥穗大麻仁滑石各一兩葵子貝齒白茅根各二兩甘草半兩上為粗末每服五錢水煎空心溫服桃膠散治婦人氣淋勞淋桃膠榆白皮各一兩車前子冬瓜子鯉魚齒葵子瞿麥木通各半兩枳殼二錢半上㕮咀每服四錢重水一盞煎至七分去滓溫服金沙散治婦人諸淋上海金沙草陰乾為末煎生甘草湯調服二錢又方真琥珀研末不以多少研木香白湯調下此二方出陳總領方雞蘇散治婦人血淋雞蘇葉木通各二兩生乾地黃滑石各三兩刺蘇根一兩上為粗末每服半兩水盞半筀竹葉三七片煎至七分去滓食前溫服治婦人血淋及尿血澀痛方生乾地黃三兩鬱金蒲黃各二兩上為細末每服二錢車前子葉煎湯調下以利為度亦有血瘕似淋小便不通臍腹脹滿宜桃仁煎方見前積聚癥瘕門血瘕條後有用亂髮方治脬轉不得小便亦可治血淋尿血火府丹治心經熱小便澀及治五淋加甘草為㕮咀煎名導赤散出本事方生地黃二兩木通黃芩各一兩上為細末煉蜜丸如梧桐子大每服三十丸木通煎湯下兼治淋瀝臍下滿痛許學士云壬戌年一卒渴病一日飲水一斗不食者三月心中煩悶時已十月予謂曾經三伏熱與此藥數服越二日來謝云當日三服渴止又三服飲食如故此本治淋用以治渴可謂通變也治婦人諸般淋苦杖根俗呼為杜牛膝多取洗淨銼碎取一合用水五盞煎至一盞去滓用麝香乳香少許調下鄞縣武尉耿夢得其內人患沙石淋者十三年每漩痛楚不可忍溺器中小便沙石剝剝有聲百方不效偶得此方服之一夕而愈目所視也局方五苓散八正散清心蓮子飲皆可用滋腎丸治熱在血分不渴而小便不利或腎虛足熱腿膝無力不能履地又下焦陰虛小便不利肚腹腫脹或皮膚脹裂眼睛突出此神劑也知母黃柏各酒炒二兩肉桂去粗皮二錢上各另為末水丸如桐子大每服二百丸空心百滾湯下黃芩清肺飲治肺熱小便不利宜用此藥清之黃芩炒山梔炒各一錢上水煎服不利加鹽豉二十粒五淋散治膀胱有熱水道不通淋瀝不出或尿如豆汁或成砂石或如膏汁或熱怫便血赤茯苓一錢半赤芍藥山梔各一錢當歸甘草各一錢二分上入燈心水煎服脬轉不得小便大婦人脬轉之病者由脬為熱所迫或忍小便俱令水氣迫於脬屈闢不得充張外水應入不得入內溲應出不得出內外壅滯脹滿不通故為脬轉其狀少腹急痛不得小便甚者至死不可治也薛前證不問男女孕婦轉脬小便不利命在反掌非八味丸不能救余參前後論主治一婦人小便淋瀝小腹脹悶胸滿喘急諸藥不應余視為轉脬之證用八味丸料煎服小便即利而痊一婦人因鬱怒小便滴瀝漸至小腹腫脹痰咳喘促余用八味丸料煎服小便即利而痊大滑石散千金治婦人丈夫脬轉小便數日不通滑石一兩凝水石二兩葵子一合上為末以水一斗煮取五升時時服一升即利又方亂髮燒灰存性葵子車前子各等分上為細末每服二錢茶湯調下蒻葉散治婦人脬轉小便不通亦可治男子裹茶蒻葉燒灰存性一兩滑石研細半兩上研停沸湯調二錢服石韋湯治證同前石韋去毛車前子各等分上為粗末每服五錢水二盞煎至一盞去滓服治婦人忍小便不得依時而起致令脬轉經四五日困篤欲死滑石二兩亂髮灰一兩上研停取桃白皮一斤熟搗以水三盞絞取汁無時溫半盞調一錢服又方以滑石末蔥湯調下二錢服千金翼方治婦人不得小便杏仁七粒去皮尖上一味麩炒黃細末水調服立通又方以紫草為末井華水調服三指撮立通又云紫菀皆可用若卒暴不通小腹膨急氣上衝心悶絕欲死此由異氣傳並膀胱或從憂驚氣無所伸鬱閉而不流氣衝脬系不正診其脈右手澀小左手急大宜蔥白湯蔥白湯方橘皮三兩葵子一兩蔥白一莖上㕮咀以水五升煮取二升分三服出指迷方補遺紫金皮為末蔥湯調下二錢葵子湯亦可又方胞轉小便不通炒鹽半斤囊之乘熱熨小腹薛滋腎生肝飲山藥山茱萸肉各一錢熟地黃自制二錢澤瀉茯苓牡丹皮各七分五味子杵炒五分柴胡三分白朮當歸甘草各三分上水煎服八味丸治脬轉小便不通殊有神效但世所不用以致誤人多矣方見雜病虛勞一方皂角為末吹鼻內取嚏小便數大婦人小便數者由腎與膀胱俱主於水腎氣通於陰此二經俱虛而有熱乘之則小便澀虛則小便頻數也薛前證若肝經火動用逍遙散調經加龍膽草車前子膀胱火動六味丸雜病虛勞加麥門五味肝腎濕熱龍膽瀉肝湯見便毒郁傷肝脾加味逍遙散加味歸脾湯肝脾肺氣虛補中益氣湯雜病勞倦加麥門五味肝經血虛加味逍遙散腎氣虛敗鹿茸散如不應用八味丸一婦人患前證小便頻數日晡熱甚此肝脾血虛氣滯而兼濕熱也用加味逍遙散加車前子而愈一婦人患前證發熱煩躁面目赤色脈洪大而虛余謂此血虛發躁用當歸補血湯雜病勞倦數劑而痊一婦人久患前證泥屬於火雜用寒涼止血之劑虛證悉具余曰此脾胃虧損而諸經病也當補中氣為主遂以六君補中二湯兼服兩月餘尋愈大鹿茸散治婦人久虛冷小便日夜三五十行鹿茸烏賊魚骨桑寄生龍骨各一兩白芍藥當歸附子各七錢半桑螵蛸半兩上為細末食前溫酒調下二錢桑螵蛸散治婦人虛冷小便數桑螵蛸三十枚炒鹿茸牡蠣粉二兩甘草二兩黃耆半兩上為細末食前薑湯調一錢服補遺縮泉丸治脬氣不足小便頻數天台烏藥益智仁各等分上為末酒煮山藥為糊丸如梧子大臨睡鹽酒吞七十丸或只為末調酒服如不飲酒以米飲調下又法取糯米糍一片臨睡炙令軟熟啖之仍以溫酒吞不飲酒只湯下多啖愈佳行坐良久待心空則睡最驗遺尿失禁大經云膀胱不利為癃不約為遺尿者乃心腎之氣傳送失度之所為也故有小便澀而遺者有失禁而出不自知者又婦人產蓐產理不順致傷膀胱遺尿無時又有脬寒臟冷而遺尿不禁治之各有方薛內經曰胞移熱於膀胱則癃溺血膀胱不利為癃不約為遺溺注曰膀胱為津液之腑水注由之然足三焦脈實約下焦而不通則不得小便足三焦脈虛不約下焦則遺溺也靈樞經曰足三焦者太陽之別也並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺竊謂前證若肝腎虛熱挺孔痿痹用六味丸如不應用加減八味丸陽氣虛憊膀胱積冷用鹿茸丸如不應用八味丸若脾氣虛弱不能禁止用補中益氣湯加山藥山萸五味若肺氣虛寒前湯加桂附此證屬虛熱者多真寒者少治宜審察一婦人小便自遺或時不利日晡益甚此肝熱陰挺不能約制用六味丸料加白朮酒炒黑黃柏七分知母五分數劑諸證悉愈若誤用分利之劑愈損真陰必致不起一老婦患前證惡寒體倦四肢逆冷余以為陽氣虛寒用補中益氣加附子三劑不應遂以參附湯四劑稍應仍以前藥而安附子計用四枚人參三斤許一婦人病愈後小便出屎此陰陽失於傳送名大小腸交也先用五苓散二劑而愈又用補中益氣湯而安大鹿茸丸治婦人久積虛冷小便白濁滑數不禁鹿茸炙椒紅桂心附子炮牡蠣煅補骨脂炒石斛肉蓯蓉酒浸雞䏶胵炙沉香各一兩桑螵蛸炙半兩上為細末酒煮麵糊丸梧桐子大空心溫酒下三十丸又方鹿角屑炒令黃為細末空心溫酒調二錢又方雄雞䏶胵炙為末空心酒調服二錢治婦人遺尿不知出時千金翼方白薇白芍藥各等分上為末酒服方寸匕日三服空心又方以桑螵蛸酒炒為細末每服二錢生薑湯調下又方白礬牡蠣各等分為細末飲服方寸匕亦治丈夫遺尿療婦人遺尿不禁雄雞翎燒灰為末酒服方寸匕補遺秘元丸治內虛自汗小便不禁白龍骨三兩訶子十個去核縮砂仁一兩為末糯米粥丸梧子大每服五十丸空心鹽油吞下又治小便不禁用豬脬洗淨鐵鏟上炙熟食之以酒嚥下小便出血大夫婦人小便出血者由心主於血血之行身通遍經絡循環臟腑血性得寒則凝澀得熱則流散失其常經溢滲入於胞內故小便出血也薛婦人小便尿血或因膏粱炙爆或因醉飽入房或因飲食勞役或因六淫七情以致元氣虧損不能統攝歸源若因怒動肝火者用加味逍遙散調送發灰肝經風熱者送子芩丸久而血虛者用八珍送發灰若膏粱積熱者用清胃散加槐花甘草房勞所傷者用六君加柴胡升麻風熱所傷者用四君加防風枳殼凡久而虧損元氣者用補中益氣為主鬱結傷脾者用濟生歸脾為主一婦人尿血因怒氣寒熱或頭痛或脅脹此肝血虛而肝火盛用加味逍遙散而血脹止補中益氣加蔓荊子而頭痛痊後鬱怒腹痛尿血仍用前散加龍膽草並歸脾湯治之將愈又因飲食所傷復作心忡不寧徹夜不寐仍用前湯而痊一婦人尿血面黃體倦飲食不甘晡熱作渴此脾胃氣虛不能攝血歸經用補中益氣以補胃氣用歸脾湯以解鬱結更用加味逍遙散以調養肝血而痊一婦人小便出血服四物蒲黃之類更加發熱吐痰加芩連之類又飲食少思虛證蜂起肝脈弦而數脾脈弦而緩此因肝經風熱為沉陰之劑脾傷不能統攝其血發生諸臟而然也余用補中益氣湯六味地黃丸而痊鹿茸散大全治婦人勞損虛羸尿血鹿茸當歸熟地黃葵子蒲黃續斷各等分上為細末酒調二錢日三服發灰散治小便尿血或先尿而後血或先血而後尿亦遠近之謂也又治飲食忍小便或走馬房勞皆致脬轉臍下急痛不通兼治肺疽心衄內崩吐血一兩口或舌上血出如針孔若鼻衄吹內立已亂髮燒灰本草云能療瘀血通關格利水道破癥瘕癰疽抓尿刺下疰雜瘡療脬轉通大小便咳嗽鼻衄上一味用米醋二合湯少許調服二錢井華水調亦得服藥訖即炒黑豆葉蹲其上則通生乾地黃散治婦人尿血不止生乾地黃二兩柏葉黃芩各半兩阿膠炒成珠一兩上為粗末每服三錢水一盞姜三片煎七分去滓溫服當歸散治婦人小便出血或時尿血當歸羚羊角屑赤芍藥各半兩生地黃一兩刺薊葉三分上為粗末每服三錢水煎去滓服又方羚羊角屑龍骨當歸蒲黃各一兩生地黃二兩上為細末粥飲調下二錢食前服又方以生地黃搗取汁每服一小盞日二服又方以蒲黃末酒調二錢服之水調亦可又方以鹿角膠二兩炙令黃以水一大盞煎至半盞去滓分為三服食前服補遺小便出血竹茹一大塊水煎服又方川牛膝去蘆濃煎服又方當歸白芷為末米飲下二錢又方催生如神散童子小便和酒調下治婦人卒傷於熱尿血陳總領云余頃在章貢時年二十六忽小便後出鮮血數點不勝驚駭卻全不疼如是一月如不飲酒則血少駭不能止偶有鄉兵告以市醫張康者常療此疾遂延之來供一器清汁云是草藥添少蜜解以水兩服而愈既厚酬之遂詢其藥名乃鏡面草一名螺靨草其色青翠所在石階縫中有之大便下血大婦人臟腑損傷風邪易入凡熱氣在內令人下血風氣在內亦大便血色或如豆汁腹中疼痛若糞後下血者其來遠糞前有血者其來近遠近者言病在上下也婦人面無血色時寒時熱脈浮弱按之絕者為下血也薛前證或飲食起居或六淫七情失宜以致元氣虧損陽絡外傷若膏粱積熱加味清胃散怒氣傷肝六君柴芍芎歸鬱結傷脾加味歸脾湯脾氣虛弱六君子湯思慮傷心妙香散大腸風熱四物側柏荊防枳殼大腸血熱四物丹皮柴胡中氣下陷補中益氣茯苓半夏心脾不能攝血必補脾肺之源舉下陷之氣一婦人下血不已面色痿黃四肢畏冷此中氣下陷用補中益氣湯送四神丸數服而愈光祿張淑人下血煩躁作渴大便重墜後去稍緩用三黃湯加大黃至四兩方應後用三黃湯又二十餘劑而愈此等元氣百中一二韓地官之內脾胃素弱因飲食停滯服克伐之劑自汗身冷氣短喘急腹痛便血或用諸補劑皆不應余用人參炮附子各五錢二劑稍應卻用六君子每劑加炮附子三錢四劑漸安又用前湯每加附子一錢數劑乃瘥一婦人因怒胸痞飲食少思服消導利氣之藥痰喘胸滿大便下血余用補中益氣湯加茯苓半夏炮姜四劑諸證頓愈又用八珍加柴胡炒梔全愈加減四物湯治腸風下血側柏葉炒荊芥槐花炒甘草炒各五分枳殼麩炒生地黃當歸川芎各一錢上姜水煎服腸風黑神散治腸風下血腹疼後重或肛門脫出敗棕燒木饅頭燒烏梅去核粉草炙各一錢上水煎服愚按前二證若病久中氣虛弱者必用培補脾胃為主地榆湯治陰結便血駱龍吉方地榆四兩甘草炒一兩半縮砂仁四十七粒上每服三錢水煎防風如神散治風熱氣滯糞後下血防風枳殼麩炒各等分上每服三錢水煎妙香散治心氣下血溫酒調下見雜病心痛大便不通大婦人大便不通者由五臟不調冷熱之氣結於腸胃則津液燥竭大腸壅塞故大便不通也仲景云婦人經水過多則亡津液亦大便難也大三脘散或四物加青皮或七宣丸麻仁丸選而用之薛前證或大腸津液乾涸或血虛火爍不可計其日期飲食數多必待腹滿脹自欲去而不能者乃用豬膽汁潤之若妄服苦寒辛散之劑元氣愈傷或通而不止或成中痞之證大抵血虛火燥用加味逍遙散氣血俱虛用八珍湯燥藥傷血用四物連翹甘草克伐傷氣用四君川芎當歸內熱作渴飲湯脈實用竹葉黃耆湯雜病消癉內熱作渴飲冷脈澀用四物送潤腸丸肝膽克脾土而不能輸送用小柴胡湯傷寒少陽加山梔郁李仁腸胃氣虛而不能傳送用補中益氣加芍藥厚味積熱而秘結用清胃散加芍藥雜病齒其有熱燥風燥陽結陰結皆不宜損中氣治者審之一婦人痰喘內熱大便不通兩月不寐脈洪大重按微細此屬肝肺腎虧損朝用六味丸夕用逍遙散各三十餘劑計所進飲食百餘碗腹始痞悶正前所謂血虛火爍也以豬膽汁導而通之用十全大補湯調理而安通神散治大便實熱不通其證心腹脹痛手不得近心胸煩悶而欲飲食者大黃炒芒硝檳榔郁李仁湯浸去皮微炒桃仁杵各一兩一方有木香半兩上為末每服二錢空心粥飲調下大麻仁丸治腸胃風結大便常秘而欲飲食者大麻仁別研如膏大黃炒各二兩檳榔木香枳殼麩炒各一兩上為末入麻仁研勻煉蜜丸桐子大每服二十丸溫水下皂角丸治大腸經有風大便秘結而不堅實者皂角炙去子枳殼麩炒各等分上為末煉蜜丸桐子大每服七十丸空心米飲下蘇麻粥順氣滑腸用紫蘇子麻子仁水研取汁煮粥食之潤腸丸治伏火風熱大腸乾燥若因失血或因腎虛當滋腎水最忌此丸麻子仁桃仁去皮尖別研各一兩羌活當歸尾大黃煨皂角仁秦艽各五錢上另研為末煉蜜丸每服五十丸空心白湯送下如直腸乾澀用豬膽汁導之亦忌前藥搜風順氣丸治痔漏腸風風熱秘結元氣充實者車前子一兩五錢大麻子微炒大黃五錢半生半熟牛膝酒浸郁李仁湯泡菟絲子酒浸蒸杵曬為末枳殼麩炒山藥各二錢上為末煉蜜丸桐子大每服三十丸空心白湯下子和脾約丸麻仁一兩二錢半枳殼麩炒厚朴薑製芍藥各一兩大黃蒸四兩杏仁去皮尖炒研爛如膏一兩二錢上為末入杏仁膏煉蜜丸梧子大每服三二十丸空心用滾湯送下初虞世云余歷觀古人用通藥率用降氣等藥蓋肺氣不下降則大腸不能傳送以杏仁枳殼訶子等味是也又老人虛人風人津液少大便秘經云澀者滑之故用胡麻杏仁麻子仁阿膠之類是也今人學不師古妄意斟酌每至大便秘燥即以駛藥盪滌之既走津液氣血大便隨手愈更秘澀兼生他病予昔在魯山日有一譞少自稱太醫曹鎮有寄居王世安少府本京師人始病風淫末疾為此生以駛藥累累利之後為肺痿咯膿血卒至大便不通而死古人服藥尤所謹重不若今人之輕生故舉此以戒後人爾薛前證若胃強脾弱津液不得四布但輸膀胱小便數而大便難者用脾約丸若陰血枯槁內火燔灼脾肺失傳大便秘而小便數者用潤腸丸此丸若用之於熱甚氣實與西北之稟厚者無有不效若用於東南及虛熱而氣血不足者則脾愈弱而腸愈燥反致虛痞矣此東垣先生之治法也其搜風順氣丸中貴及西北人用之多效東南人用之無不致害一老婦大便欲去而難去又不堅實腹內或如故或作脹兩關尺脈浮大余以為腸胃氣血虛弱每服十全大補湯加肉蓯蓉去後始快若間二三日不服腹內仍脹大便仍難一老婦大便月餘不通痰喘內熱不得就枕脈洪大重按微細朝用六味丸夕用逍遙散各五十餘劑計進飲食百餘碗小腹始悶此火燥而消鑠也以豬膽汁潤之用十全大補而安後仍不通用八珍倍加蓯蓉常服而通大便或秘或利大經云春傷於風夏必飧泄蓋木氣刑土也土不能滲泄則木氣勝故泄風氣行精液燥故秘即不可轉以秘燥為風也余家中宗親張公度母氏年七十日下利數十行百方治之不愈又苦腰腳拘攣公度以蒺藜酸棗仁治拘攣而利愈黃魯直母安康郡太夫人苦秘結以公度藥投之而大便利故知秘與利皆出於風公度潞人名騤世有令德承父醫學而克其家清修不妄取真有德君子今見於此薛按前證若因足三陰虧損發熱作渴胸膈不利飲食善消面帶陽色脈洪而虛肢體倦怠者用補中益氣湯六味地黃丸脾肺氣虛補中益氣湯脾經鬱結用加味歸脾湯氣血俱虛者八珍加肉蓯蓉腎經津液不足者六味地黃丸胃火銷鑠津液竹葉黃耆湯肝木侮脾土小柴胡加山梔郁李仁枳殼膏粱積熱清胃散加山梔郁李仁枳殼若燥在直腸用豬膽導之治風人腳氣人大便或秘或利虛人尤宜皂角子三百粒破作兩片慢火炒燥甚入酥一棗大又炒至燥又入酥炒至焦黑為度上細末煉蜜丸如梧桐子大每服三十丸煎蒺藜酸棗仁湯下空腹服兩時久未利再進一服漸加至百丸不妨以通為度蒺藜湯方用蒺藜不以多少炒至赤黑色臼內以木杵舂去刺揀簸淨每蒺藜三兩以酸棗仁一兩炒令香同杵為粗末馬尾羅篩每三錢水一盞煎至七分去滓溫服下前丸子大五柔丸主臟氣不調大便難通榮衛利九竅進飲食大黃鬥米上蒸切焙枳殼去瓤麩炒白芍藥葶藶炒香別研肉蓯蓉酒浸軟溫水洗切焙各一兩桃仁一百枚杏仁四十枚並去皮尖麩炒令黃別杵牛脂去筋膜熬成油與葶藶杏仁等杵上除有油藥併為末入牛脂桃杏仁葶藶杵數千下丸如梧桐子大米飲下三丸日三服腹稍空時服未知稍增以知為度安康郡太苦風秘予為處枳訶二仁丸杏仁去皮尖麩炒黃麻仁別研各二兩枳殼去穰麩炒研訶子慢火炒捶去核上二物各一兩為細末同二仁杵煉蜜和杵丸如梧桐子大溫水下二三十丸未知稍增潞公在北門日盛夏間苦大便不調公隨行醫官李琬本衢州市戶公不獨終始涵容之又教以醫事公病泄利琬以言動搖之又求速效即以赤石脂龍骨乾薑等藥饋公公服之不大便者累日其勢甚苦予方自共城來見公未坐定語及此事公又不喜服大黃藥予告曰此燥糞在直腸藥所不及請以蜜兌導之公為然時七月中苦熱予揮汗為公作蜜兌是夕三用藥下結糞四五十枚黑如橡慄公二三日間飲食已如故世有一種虛人不可服利藥今載其法蜜兌法好蜜四五兩銀石器中微火熬不住手以匙攪候可丸見風硬即以蛤粉塗手捏作人指狀長三寸許坐廁上納之以手掩定候大便通即放手未快再作以上四方出初虞世補遺通氣散治婦人憂怒傷肺肺與大腸為傳送致令秘澀不通或服燥藥過多大便秘亦可用陳皮蘇葉枳殼木通去皮節上等分銼每服四錢水煎溫服皂角丸蘇麻粥亦佳見前泄瀉大泄瀉之證因腸胃虛冷而邪氣乘之經云春傷於風夏必飧泄蓋風傷肝肝木旺而克脾土屬外因也若七情不平臟氣受傷屬內因也若飲食生冷傷脾屬不外內因也大法寒者溫之熱者涼之滑者澀之濕者燥之薛前證若生冷所傷用六君木香砂仁辛熱所傷用二陳炒連山梔麵食所傷用六君神麯米食所傷用六君谷糵飲食不時而傷用四君子湯飲食過多而傷用六君子湯飲食停滯人參養胃湯脾氣虛弱者六君升麻柴胡脾氣虛寒六君木香炮姜肝木乘脾者六君柴胡芍藥肝火克脾者六君芍藥山梔中氣虛而下陷者補中益氣湯鬱結傷脾者濟生歸脾湯腎氣虛者五味子散脾氣虛者二神丸脾腎虛者四神丸命門火衰者八味丸真陽虛敗者固真丸仍與滯下方參用侍御沈東江之內停食腹痛作瀉以六君加木香炮姜而愈後復作傳為腎泄用四神丸而安侍御徐南湖子室瀉屬腎經不信余言專主滲泄以致不起一婦人年逾五十不食夜飯五更作瀉二十年矣後患痢午前用香連丸午後用二神丸各二服而痢止又以二神丸數服而食夜飯不月而形體如故吳江史玄年母素有血疾殆將二紀平居泄瀉飲食少思面黃中滿夏月尤甚治血之藥無慮數百劑未嘗少減余以為脾腎虛損用補中益氣湯送二神丸復用十全大補湯煎送前丸食進便實病勢頓退若泥中滿忌參術痰痞忌熟地便泄忌當歸皆致誤事補遺治瀉風證則胃風湯不換金正氣散寒證則理中湯四柱散大已寒丸暑則五苓散香薷散六和湯濕則藿香正氣戊己丸此大概而論至於通治則有諸方可檢隨證治療然男子婦人久瀉不止無逾固腸丸之效驗香樸丸治腸胃虛冷泄瀉注下無度脾虛氣閉不進飲食大厚朴五兩北蘹香白朮陳皮各三兩訶子赤石脂各一兩半上為細末麵糊丸如梧桐子大空心米飲下五十丸如常服暖脾胃桂香丸治臟腑虛為風濕寒所搏冷滑注下不禁老人虛人危篤累效附子肉豆蔻並炮白茯苓各一兩桂心木香炮白姜炮各半兩丁香二錢半上為細末米糊丸如梧桐子大空心米飲下五十丸豆蔻分氣飲治臟腑虛寒泄瀉無度瘦極及婦人產後瀉洞泄危篤甚藿香葉草豆蔻仁炮青橘皮各四兩甘草丁香各半兩烏梅五十個肉豆蔻十個炮上㕮咀每服四錢水二盞糯米一撮煎七分去滓溫服豆蔻丸治臟寒泄瀉不止服諸藥無效亦可治男子肉豆蔻麵裹煨香不以多少碾細入陳米白飯搗令得所丸如綠豆大空心煮粟米飲吞下百丸本家累以此藥救人有效人參豆蔻散治久瀉不止服諸藥無效此藥屢效人參肉豆蔻乾薑厚朴甘草陳橘皮各一兩川芎桂心訶子北蘹香各半兩上為細末每服三錢水一小盞姜三片棗一枚煎至六分服木香散治臟腑冷極及久冷傷脾口瘡下泄米穀不化飲食無味肌肉瘦悴心多嗔恚婦人產後虛冷下泄及一切水瀉冷痢木香破故紙炒各一兩良薑縮砂仁厚朴制各七錢半赤芍藥橘紅桂心白朮各半兩吳茱萸湯泡七次胡椒各二錢半肉豆蔻四枚檳榔一個上為散每服三錢用不經水豬肝四兩許去筋膜批為薄片重重摻藥置一鼎中入漿水一碗醋一茶腳許蓋覆煮肝熟入鹽一錢蔥白三莖細切生薑彈子許拍破同煮水欲盡空心為一服冷食之初服微瀉不妨亦是逐下冷氣少時自止經年冷痢滑瀉只是一服渴即飲粥湯忌生冷油膩物如不能食冷物即添少漿暖服嘉興謝醫得此方病其繁只用漿水煮豬肝丸如梧桐子大粥飲下五十丸亦效若暴瀉痢只是一服唯熱痢熱瀉不宜服趙府博宜人病泄瀉不止用附子木香訶子肉豆蔻龍骨等藥及諸丹服之皆無效召余診之肝腎脈虛弱此肝腎虛也府博云其說見在何經余曰諸方論泄痢止是言脾胃病不過講風冷濕毒之所侵入及飲食傷滯遇腸虛則泄痢而不知肝腎氣虛亦能為泄痢古書所載甚明不可不辨經曰泄痢前後不止腎虛也又曰諸厥固泄皆屬於下下謂下焦肝腎之氣也門戶束要肝之氣也守司於下腎之氣也肝氣厥而上行故下焦不能禁固而泄痢腎為胃關門戶不要故倉廩不藏也若病泄利其源或出於此而專以脾胃藥治之則膠固千里矣遂用木香散數服而愈香連丸治痢疾並水瀉暑瀉腹痛不問赤白神效黃連淨二十兩吳茱萸去枝梗十兩上先將二味用熱水拌和入瓷器內置熱湯頓一日同炒至黃連紫黃色去茱用連為末每末四兩入木香末一兩淡醋米飲為丸桐子大每服二三十丸滾湯下久痢中氣下陷者用補中益氣下中氣虛者用四君子下中氣虛寒者加薑桂如金丸好川黃連一斤分上中下三等揀開以生薑三斤先刮下皮以皮存一處將姜搗汁如前分浸黃連一宿先用干壁土研細鋪鍋底又鋪厚綿紙一層上放黃連炒燥再拌再炒如此九次方用姜皮同為細末滴水丸防風芍藥湯治飧泄身熱脈弦腹痛及頭痛防風芍藥炒黃芩炒各二錢上用水煎服滲濕湯治寒熱所傷身重腰冷如坐水中或小便秘澀大便溏泄此證多因坐臥濕地或陰雨所襲而致蒼朮白朮炒甘草炒各一兩乾薑炮茯苓各二兩陳皮一兩丁香二錢半上每服四五錢棗水煎茯苓湯治濕熱泄瀉或飲食傷瀉白朮炒茯苓各五錢上用水煎食前服一方有芍藥等分名白朮散白朮芍藥湯治脾經受濕水泄注下體重腹滿形體倦怠不欲飲食或暴泄無數水穀不化白朮芍藥各二錢炒甘草炒一錢上水煎服胃苓散治夏秋之間脾胃傷冷水穀不分泄瀉不止亦治男子五苓散平胃散上和合薑棗煎空心服妙五香散治食魚傷泄瀉不止氣刺奔沖及婦人產前產後腹痛血氣等疾用溫酒下產後敗血衝心用敗蒲煎湯下安胎以糯米飲調下孕婦脾泄瀉痢煎陳米飲調下食前烏藥白芷炒枳殼白朮炒良薑炒甘草莪朮孕者減半上等分為細末每服二錢溫酒調下二神丸加五味子二兩吳茱萸四兩名四神丸治脾腎虛弱侵晨五更作瀉或全不思食或食而不化大便不實神效破故紙四兩炒肉豆蔻二兩上為末用大紅棗四十九枚生薑四兩切碎同棗用水煮熟去姜取棗肉和藥丸桐子大每服五十丸空心鹽湯下五味子散治腎經虛弱大便不實或夜間或五更泄瀉五味子炒二兩吳茱萸半兩上為末每服二錢空心米飲調下其效如神米糊為丸亦可固腸丸人參去蘆蒼朮米泔浸一宿茯苓木香不見火訶子肉煨烏梅肉肉豆蔻麵裹煨罌粟殼去蒂穰上各等分為末麵糊丸如梧桐子大每服四十丸米飲下協熱下利大若下清水其色赤黃或米穀不化但欲飲冷時時嘔逆小便不利得熱則極心胸煩躁脈虛大而數此由乘虛熱入於胃湊滲下焦津液不分並於大腸謂之協熱下利先用五苓散利小便次以玉粉丹四味阿膠丸薛前證若胃氣虛弱用補中益氣湯肝木侮脾土用六君子湯鬱結傷脾土用歸脾湯命門火衰用八味地黃丸余參各論主之一婦人五月間患痢日夜無度小腹墜痛發熱惡寒余以為脾氣虛弱用六君子湯送香連丸二服漸愈仍以前湯送四神丸四服全愈至七月終怠惰嗜臥四肢不收體重節痛口舌乾燥飲食無味大便不實小便頻數灑淅惡寒悽慘不樂此肺與脾胃虛而陽氣不伸也用升陽益胃湯而痊玉粉丹蛤粉硫黃等分上同研細白麵糊和丸如梧桐子大每服五十丸米飲下四味阿膠丸黃連赤茯苓去皮各一兩芍藥三兩阿膠炒燥一兩上先將三味為末卻以好醋熬阿膠成稀膏丸如梧桐子大米飲下三十丸補遺協熱而利活人書黃芩湯赤石脂丸局方益元散皆可滯下男女痢治無異已詳雜病準繩此特摭遺耳大夫赤白痢疾者古人名之滯下是也究疾之原皆因外感五邪之氣內傷生硬冷熱之食其證不一有赤有白有赤白相雜有冷有熱有虛有實大抵四時皆以胃氣為本未有不因外感寒暑燥濕風之氣而傷於脾胃脾胃既虧而又內傷飲食飲食不能克化致令積滯而成滯下古人云無積不成痢者此也經云春傷於風夏生飧泄蓋風喜傷肝然春時肝木正旺而不受邪反移氣克於脾土然脾既受克又不能忌慎口腹恣食生冷黏硬之物致令脾胃不能克化因此積滯又夏秋之間或再感暑濕風冷之氣發動而成痢也其證必先臍腹㽲痛洞泄水瀉裡急後重或有或無或赤或白或赤白相雜日夜無度如有此證不問冷熱虛濕但當先服神朮散可以發散風冷寒濕之氣次服五苓散分利水穀兼用加巴感應丸溫脾胃去積滯或六神丸未有不安者也或曰雖古人有言無積不成痢亦不專以去積為先豈有一歲之內獨於夏秋之間人皆有積而春冬無之蓋風邪入胃木來勝土不為暴下則為痢疾其神朮散要藥也又有一方一郡之內上下傳染疾狀相似或只有一家長幼皆然或上下鄰里間相傳染或有病同而證異亦有證異而治同或用溫劑而安或用涼藥而愈有如此等是毒疫痢也治疫毒痢者雖當察五運六氣之相勝亦不可狎泥此說且如運氣相勝豈獨偏於一方一郡而偏於一家一巷者乎如有此證當先察其虛實冷熱首以敗毒散多加人參甘草陳米薑棗煎服及三黃熟艾湯黃連阿膠丸五苓散駐車丸可選而用之如下痢赤多或純下鮮血裡急後重大便不通身體壯熱手足心熱心煩躁渴腹脅脹痛小便赤澀六脈洪大或緊而數或沉而實此熱痢也宜白頭翁湯及三黃熟艾湯五苓散可選而用之若風痢下血太過宜用胃風湯加木香黑豆煎服若夏秋之間下痢或赤或白或赤白相雜臍腹㽲痛裡急後重憎寒發熱心胸煩悶躁渴引飲嘔逆噁心小便不利及五心煩熱六脈虛弱此等脈證正因伏暑而得此疾宜服香薷散加黃連甘草當歸酒水濃煎沉冷雜病傷暑頓服仍急服酒蒸黃連丸或小柴胡湯加人參煎服必愈沈內翰云治痢之藥極多然無如此藥之妙蓋小柴胡湯能治暑毒如雜證一退而痢尚未止則以四物湯加膠艾煎服以調陰陽未有不安者也如水穀不分小便不利宜用五苓散淡竹葉煎湯調服如煩渴甚者亦宜服之若不明伏暑之證但以脈虛而妄投硫附薑桂丹石之藥而殺之深可嘆息若下痢純白狀如魚腦臍腹冷痛日夜無度手足逆冷或有嘔逆全不入食飲食欲溫而惡冷六脈微細此由臟腑虛冷之極宜木香散加服四味理中湯及鍾乳健脾丸甚者四肢逆冷六脈沉絕當一味峻補兼灸氣海丹田二穴更以助胃之藥此守而不攻之意也宜四順附子湯三建丹白丹加味參附湯姜附湯皆可選用如年尊虛弱之人或素來稟受怯弱亦宜以此法詳酌調理然大宜開胃進食為先食可得入則脾胃運化糟粕便聚糟粕既成垢膩鮮血瘀滯不患其不隕矣如久痢不瘥腸滑不禁溏泄不止諸藥無效方可施之澀腸止痢之劑亦宜先以龍骨肉豆蔻訶子鍾乳胡粉之藥近人多用罌粟殼地榆之屬然此物性太緊澀能損胃氣如少壯之人壯健者服之間奏奇效若是疫毒受暑受濕之證及年尊之人或稟受怯弱服此莫不受其大害若以固秘澀腸為先則風寒暑濕之邪非惟澀而不去而胃管閉而不通禁口不食日見羸瘦糟粕不入腸中所患無由可除矣若有此證宜以參苓白朮散四君子湯及以石蓮山藥之劑治之必愈治痢欲投補藥必須有溫通之意在焉如四君子湯理中湯十全湯加木香白豆蔻茯苓官桂厚朴之屬可以散風邪可以分水道可以開胃管可以治纏擾可以通秘澀此攻守之意兩全也大抵治痢之法虛者補之實者瀉之滑者澀之閉者通之有積者推之風則散之暑則滌之濕則燥之熱則涼之冷則溫之冷熱者調之以平為期不可以過此為大法祭酒林謙之說醫人劉從周治病有功議論殊不凡且有驗云大凡痢疾不問赤白而為冷熱之證若手足和暖則為陽只須服五苓散用粟米飲調下次服感應丸二十丸即愈若覺手足厥冷則為陰當服暖藥如已寒丸附子之類如此治痢無不效此方親曾用有效有人夏月患痢一日六七十行用五苓散兩服止薛東垣云太陰經受濕水瀉變膿血脾傳於腎者謂之賊邪難愈先痢而後瀉者謂之微邪易痊若厥陰經下痢脈沉遲手足厥逆用麻黃小續命湯汗之若身冷自汗小便自利脈微嘔吐用漿水散溫之若脈疾身動下迫聲響用白朮芍藥湯脈沉身靜飲食不入用姜附湯身體沉重四肢不舉用朮附湯竊謂前證若飲食停滯用六君子湯以補脾胃消飲食若胃氣下流用補中益氣湯以補脾胃升元氣若風傷腸胃宜用神朮散以補脾胃解外邪若痰積中焦宜用六神丸以補脾胃化痰滯大凡脾胃虛弱宜補中氣調飲食一老婦食後因怒患痢裡急後重肛門脫下此脾氣下陷用大劑六君加附子肉蔻煨木香各一錢吳茱五分骨脂五味各一錢五分二劑諸證悉退惟小腹脹悶此肝氣滯於脾也與調中益氣加附子木香五分四劑而愈後口內覺咸此腎虛水泛與六味地黃丸二劑頓愈又以飲食失宜大便不實四肢逆冷此脾胃復傷與六君加附子五分及八味丸而愈先太宜人仲夏患痢腹痛去後無度煩渴飲湯手按腹痛稍止脈鼓指而有力此真氣虛而邪氣實也急用人參五錢白朮茯苓各三錢陳皮炙草升麻附子各一錢服之即睡覺而索食脈證頓退再劑而安此取證不取脈也其時同患是證服痢藥者俱致不起惜哉陳曾有一婦人病痢疾閱四十日服諸藥不愈召予診之六脈沉弱大凡下痢之脈宜沉宜弱但以十全大補湯薑棗煎成加白蜜半匙再煎數沸服之愈甲子夏秋間趙經略侄孫病痢甚重召小方脈未至命予診之六脈平細以證觀之云是血痢其實非也只是血水而已予記調中湯治狀云治夏月初秋忽有暴寒折於盛熱結入四肢則壯熱頭痛寒傷於胃則下利或血或水或赤壯熱冥困脈數宜服此遂合之去大黃服之而愈又有一婦女泄瀉不止似痢非痢似血非血其色如濁酒召予診之則六脈沉絕眾用熱藥及丹藥服之則發煩悶僕先用敗毒散數服加陳米煎次用胃風湯加粟米煎服愈又調中湯去大黃亦療此證大白頭翁湯治熱痢下血連月不瘥白頭翁二兩黃連黃柏皮秦皮各三兩上㕮咀每服四錢水一盞半煎至七分去滓無時溫服神朮散治春傷於風夏生飧泄大治傷風頭痛項背拘急鼻流清涕蒼朮一斤藁本川芎各六兩羌活四兩粉草二兩六錢細辛一兩六錢上為粗末每服三錢水一盞姜三片煎七分要出汗加蔥去滓稍熱服無時候六神丸治赤白痢疾神麯別為末留作糊麥芽茯苓枳殼木香煨白痢倍之黃連赤痢倍之各等分為末用神麯末作糊為丸桐子大每服五十丸赤痢甘草湯下白痢乾薑湯下赤白痢乾薑甘草湯下東山堯殿講云是京城醫官見傳予詳此方有黃連可以解暑毒和臟腑厚腸胃有木香能溫脾胃逐邪氣止下利有枳殼能寬腸胃有茯苓能利水道有神麯麥芽可以消滯真痢門之要藥也三黃熟艾湯治傷寒四五日大下熱痢時作白通湯諸藥多不止宜服此湯除熱止痢亦有人作丸子熟水吞下四五十丸治時行毒痢良驗黃芩黃連黃柏各二分熟艾半個雞子大上㕮咀每服三錢水一盞煎七分去滓溫服無時四順附子湯生附子去皮臍白姜炮甘草人參各一兩上㕮咀每服四錢水二盞煎至七分去滓空心服吐瀉腹痛加桂半兩小便不利者加茯苓半兩大凡痢疾雖體寒手足逆冷冷汗自出六脈沉伏不宜輕用附子多因伏暑而得此疾亦有冷汗自出四肢逆冷六脈虛弱但背寒面垢或面如塗油齒乾煩冤躁渴引飲此伏暑證也小柴胡湯五苓散酒蒸黃連丸必能奏效學者宜精思耳三建丹陽起石煅飛半兩鍾乳粉一兩大附子炮取末半兩入藥一半作糊一半上用附子糊丸如梧桐子大每服五丸至十丸空心溫酒下如渴參湯下加味參附湯大附子二兩半炮大人參五兩上二味㕮咀每服四錢水二盞姜十片丁香十五粒米一撮煎至七分空心溫服香茸丸治下痢危困麝香半錢別研臨時入鹿茸一兩火燎去毛酥炙黃為末入麝令勻上以燈心煮棗肉為丸如梧桐子大每服五十丸空心服繆立夫云有醫者每料入滴乳香半兩尤有效紹興中患痢疾多往往而死凡平時所用治痢如罌粟殼之類不可向口惟服此藥及沒石子丸愈調中湯葛根黃芩芍藥桔梗藁本赤茯苓白朮甘草炙各等分上㕮咀每服三錢水一盞煎至七分去滓溫服移時再服胃風湯治風冷乘虛客於腸胃以致水穀不化泄瀉注下或腸胃濕毒下如豆汁或下瘀血人參白茯苓芎藭肉桂當歸白芍藥炒白朮炒各等分上每服三二錢入粟米數粒水煎空心食前熱服水煮木香丸治久痢裡急後重日夜無度罌粟殼去穰三兩青皮去白甘草炒各二兩四錢訶子炮去核八兩當歸木香各六兩上為末煉蜜丸彈子大每服一丸水煎化空心服戊己丸治胃經受熱泄痢不止或飲食不入腹痛不止黃連炒吳茱萸去梗炒白芍藥各五兩上為末麵糊丸桐子大每服三十丸食前米飲下升陽除濕防風湯如大便閉塞或裡急後重數至圊而不能便或有白膿或兼下血此鬱結而不通也以此湯舉其陽則陰氣自降矣慎勿利之蒼朮米泔浸四錢防風二錢白朮炒白茯苓白芍藥炒各一錢先將蒼朮用水一盅半煎至一盅納諸藥同煎至八分食前熱服夫飲食入胃其氣上升輸精心肺然後下降若脾胃有傷不能上升下流肝腎而成泄利法宜升補中氣不可疏下此東垣發前人所未論也三黃丸治熱痢腹痛或口舌生瘡咽喉齒痛及一切實火之證黃芩黃連黃柏各等分上各另為末水糊丸桐子大每服七八十丸白湯下芍藥湯治熱痢便血後重經曰溲而便膿血此氣行而血止也行血則便膿自愈調氣則後重自除芍藥炒一兩當歸黃連炒各半兩檳榔木香甘草炙各二錢桂二錢五分黃芩炒三錢上每服半兩水煎如不減加大黃此證外有因中氣虛弱脾氣鬱結者治當審察酒蒸黃連丸姜附湯小柴胡湯參苓白朮散蕷蓮飲香薷散敗毒散理中丸黃連阿膠丸駐車丸真人養臟湯五苓散感應丸亦有用蘇合香丸和丸服名蘇感丸亦有外加黃蠟丸桐子大十粒兼服以上諸方並見證治類方泄痢各門不復重錄痢後嘔噦大凡滯下病之稍久或欲愈之時多有咳逆及嘔逆之證然咳逆者古人之所謂噦是也噦者腎寒所生此證最危其他病亦惡咳逆如見此證宜用橘皮乾薑湯半夏生薑湯丁香柿蒂湯若陽證咳逆者小柴胡湯橘皮竹茹湯予嘗治一痢疾咳逆不止六脈沉弱諸醫用藥灼艾皆無效僕投退陰散兩服愈又嘗治許主簿痢疾愈後咳逆不止服諸藥無效遂灸期門穴不三壯而愈穴見針灸準繩如有嘔逆之證難經云無陰則嘔然多有胃熱而嘔亦有胃寒而生亦有暑毒而生如胃熱而嘔宜服小柴胡湯孫兆竹茹湯蘆根湯官局桔梗湯竹葉石膏湯加生薑主之嘔而發渴者豬苓湯又嘗治一痢後嘔不止六脈虛弱此胃寒而嘔又似暑毒凝於胃脘投局方香薷丸而愈橘皮乾薑湯治噦橘皮通草乾薑桂心甘草各四錢人參二錢上㕮咀每服四錢水一盞煎至七分去滓溫服半夏生薑湯治噦欲死半夏一兩一分洗生薑二兩切上以水二盞煎至八分去滓分為二服丁香柿蒂湯治咳逆丁香十粒柿蒂十五枚上㕮咀用水一盞半煎至八分去滓熱服橘皮竹茹湯治噦逆橘皮甘草各二兩半夏一兩湯洗人參半兩竹茹一升上㕮咀每服四錢水二盞生薑六片棗一枚煎至七分去滓溫服生薑橘皮湯治乾嘔噦若手足厥冷者橘皮四兩生薑半斤上㕮咀每服半兩水一盞煎至七分去滓溫服退陰散本治陰毒傷寒手足逆冷脈沉細頭痛腰重連進三服小小傷冷每服一字入正元散內同煎加鹽少許陰毒傷寒咳逆煎一服細細熱呷即止乾薑川烏頭各等分上為粗末炒令黃色候冷搗為末每服一錢水一盞鹽一捻煎至半盞服豬苓湯治咳而嘔渴心煩不得眠豬苓赤茯苓澤瀉阿膠炒滑石各半兩上㕮咀每服三錢水一盞煎候膠消盡服補遺倉廩湯治痢疾心煩手足溫頭痛如脾胃脈不弱此乃毒氣上衝心肺所嘔噦而不食宜倉廩湯即敗毒散是每服四錢入陳倉米百粒姜五片棗一枚煎溫服若脈微弱或心腹虛脹手足厥逆初病則不嘔因服罌粟烏梅苦澀過多以致聞食先嘔此乃脾胃虛弱用山藥一味銼小豆大一半生用一半銀瓦銚內炒熟同為末米飲調下又治噤口痢以石蓮子去殼留心並肉為末每二錢陳米飲調下此疾蓋毒上衝心肺藉此以通心氣便思食痔瘻大婦人痔瘻因鬱怒風熱厚味膏粱所致其名有五肛邊如乳出膿者為牝痔腫脹出血者為牡痔癢痛者為脈痔腫核者為腸痔登廁出血者為血痔治宜審之薛前證婦人多因胎產經行飲食起居六淫七情失調所致男子多因醉飽入房筋脈橫解精氣脫泄熱毒乘虛而患或入房強固其精木乘火勢而侮金或炙爆厚味陰虛濕熱宜涼血潤燥疏風潰後當養元氣補陰精不愈即成痔漏有串臀串陰穿腸者其腸頭腫塊者濕熱也作痛者風也便燥者火也潰膿者熱勝血也大便作痛者潤燥除濕肛門墜痛者瀉火導濕小便澀滯者清肝導濕經云因而飽食筋脈橫解腸澼為痔證屬肝腎不足故用加味地黃及六味丸有效慎勿敷毒藥及服寒涼之劑鱉甲散治五種痔漏膿血淋漓或腫痛堅硬下墜鱉甲露蜂房蛇蛻豬後懸蹄蝟皮五味燒存性各二錢麝香一分上為末每服一錢空心生地黃煎湯調下更敷之又方熱痛用寒水石朴硝為末以津調搽治法並方詳雜病痔門茲不重錄脫肛大脫肛者大腸之候也大腸虛寒其氣下陷則肛門翻出或因產努力其肛亦然也薛前證若大腸濕熱用升陽除濕湯若血熱用四物條芩槐花血虛用四物白朮茯苓兼痔痛用四物槐花黃連升麻中風虛弱用補中益氣湯加芍藥白朮中氣虛寒加半夏炮薑五味腎虛用六味丸虛寒用八味丸夫肺與大腸為表裡肛者大腸之門肺實熱則秘結肺虛寒則脫出腎主大便故肺腎虛者多用此證一婦人脫肛用補中益氣加味歸脾各百餘劑而愈後因分娩復脫仍以前藥各二百餘劑始愈升陽除濕湯自下而上者引而竭之升麻柴胡防風神麯炒澤瀉豬苓各半兩蒼朮一兩陳皮甘草炙大麥糵各三錢上每服五錢水煎空心服胃寒腸鳴加益智仁半夏各半錢薑棗同煎服姚和眾以鐵粉敷之良聖惠方亦治陰脫陰腫集驗方以生鐵三斤水一斗煮至五升取水洗日二次孫真人用蛤蟆皮瓶中燒多煙燻功效玄微一方用五倍子煎湯洗以赤石脂末摻上托入或脫長者以兩床相併中空尺許以瓷瓶盛湯令病人仰臥浸瓶中逐日易之收盡為度前陰諸疾陰腫大夫婦人陰腫者是虛損受風邪所為胞絡虛而有風邪客之風氣乘於陰與血氣相搏令氣痞澀腠理壅閉不泄越故令腫也薛前證若氣血虛弱用補中益氣湯舉而補之肝經濕熱用龍膽瀉肝湯滲而清之若陰腫陰癢陰冷陰挺當與後論互相參看一婦人陰中腫悶小便澀滯兩脅作腫內熱晡熱月經不調時或寒熱此因肝脾鬱怒元氣下陷濕熱壅滯朝用歸脾湯加柴胡升麻解鬱結補脾氣升元氣夕用加味逍遙散清肝火生肝血除濕熱各數劑諸證悉愈又用四君芎歸丹皮調補肝脾而經水如期菖蒲散治婦人月水澀滯陰間腫痛菖蒲當歸各一兩炒秦艽半兩吳茱萸半兩上為粗末每服三錢水一盞蔥白五寸煎至六分空心溫服經心錄方治婦人陰中腫痛不可忍艾葉五兩防風三兩大戟二兩上銼細以水一斗煮取五升熱洗日三次切宜避風冷古今錄驗治婦人陰腫或瘡爛者麻黃湯洗方麻黃黃連蛇床子各二兩北艾葉一兩半烏梅十個上銼細以水一斗煮取五升去滓熱洗避風冷又方治婦人陰腫堅痛白礬散白礬半兩甘草半分生大黃一分生上為細末每用棗大綿裹納陰中日兩換肘後方療陰中腫痛枳殼半斤炒令熱以故帛裹熨冷即換之子母秘錄療陰腫鐵精粉敷上補遺方治陰門腫以甘菊苗研爛百沸湯淋洗熏浸又方小麥朴硝白礬五倍子蔥白煮水洗又方陰腫大馬鞭草搗爛塗之陰癢大夫婦人陰癢者是蟲蝕所為三蟲在於腸胃之間因臟虛三蟲動作蝕於陰內其蟲作熱微則為癢重者乃痛也薛前證屬肝經所化當用龍膽瀉肝湯逍遙散以主其內外以桃仁研膏和雄黃末或雞肝納陰中以制其蟲一婦人胸膈不利內熱作渴飲食不甘肢體倦怠陰中悶癢小便赤澀此鬱怒傷肝脾所致用歸脾湯加山梔而愈復因怒患處並小腹脹痛用小柴胡加山梔芎歸芍藥痛止用逍遙散加山梔而愈又因勞役患處腫脹小便仍澀用補中益氣加山梔茯苓丹皮而痊一婦人陰內痛癢不時出水食少體倦此肝脾氣虛濕熱下注用歸脾加丹皮山梔芍藥生草主之而安一婦人陰內癢痛內熱倦怠飲食少思此肝脾鬱怒元氣虧損濕熱所致用參耆歸朮陳皮柴胡炒梔車前升麻芍藥丹皮茯苓而瘥若陰中有蟲癢痛亦屬肝木以桃仁雄黃研納陰中以殺之仍用清肝解鬱之藥有以雞肝納之者乃取蟲之法也一方搗新桃葉綿裹納陰中日三兩易大黃散治婦人陰癢大黃微炒黃芩黃耆炙各一兩赤芍藥玄參丹參山茱萸蛇床子各半兩上為細末食前溫酒調二錢服廣濟方療婦人陰癢不止蚺蛇膽雄黃硫黃硃砂硝石蕪荑各半兩藜蘆二錢半上為細末研停以臘月豬脂和如膏用故布作纏子如指長一寸半以藥塗上納陰中日一易之易時宜用豬椒根三五兩水煮稍熱洗干拭內之效又方小薊不拘多少水煮作湯熱洗日三用之崔氏療陰癢不可忍方杏仁燒作灰承熱綿裹納陰中日二易之又方蒜煮湯洗之一方用枸杞根又方狼牙二兩細銼蛇床子三兩以水三升煮十沸熱服又方取雞肝承熱納陰中如有蟲蟲當盡下又方取牛肝截五寸繩頭納陰中半日蟲入肝出之豬肝亦得聖惠方療陰中有蟲癢且痛目腫身黃欲得男子漏血下白少氣思美食用鯉魚長一尺去頭肉取骨搗末熬黃黑以豬脂和以絹袋盛如常法內陰中至痛處即止蟲當自出陰痛千金療小戶嫁痛連日方甘草生薑各三分白芍藥桂心各二分上細銼以酒二升煮取三沸去滓溫服神良又療小戶嫁痛單行方牛膝五兩上一味切酒三升煮至二升分三服又療婦人嫁痛單行太和湯大黃三兩上一味切以酒一升煮一沸頓服又療婦人小戶嫁痛海螵蛸散烏賊魚骨二枚上一味燒研細末酒服方寸匕日三補遺治陰腫不下小戶嫁痛冬青葉小麥甘草上等分水煎洗危氏方治婦人陰痛用青鹽炒熱以布裹熨之陰瘡大婦人陰瘡者由三蟲或九蟲動作侵蝕所為也諸蟲在人腸胃之間若臟腑調和血氣充實不能為害若勞傷經絡腸胃虛損則動作侵蝕於陰輕者或癢或痛重者生瘡診其少陰之脈滑而數者陰中生瘡也薛前證乃七情鬱火傷損肝脾濕熱下注其外證陰中出如蛇如菌或如雞冠狀或生瘡濕癢或潰爛出水或腫悶墜痛其內證體倦內熱經候不調或飲食無味晡熱發熱胸脅不利小便痞脹或赤白帶下小水淋澀其治法腫痛者四物湯加柴梔丹皮膽草濕癢者歸脾湯加柴梔丹皮淋澀者龍膽瀉肝湯白朮丹皮潰腐者逍遙散山梔川芎腫悶墜痛者補中益氣湯山梔丹皮佐以外治之法一婦人腐潰膿水淋漓腫痛寒熱小便赤澀內熱作渴肢體倦怠胸脅不利飲食少思余以為肝脾虧損用補中益氣納柴胡升麻各用一錢加茯苓一錢山梔二錢數劑少愈又與歸脾湯加山梔川芎茯苓三十餘劑諸證悉退惟內熱尚在再與逍遙散倍用山梔而愈一婦人素性急陰內痛小便赤澀怒而益甚或發熱或寒熱此肝經濕熱所致用芎歸炒梔柴胡苓朮丹皮澤瀉炒芍車前炒連生草數劑漸愈乃去黃連澤瀉又數劑全愈補心湯危氏治陰中生瘡名曰䘌瘡或痛或癢如蟲行狀淋瀝濃水白茯苓人參前胡半夏湯洗七次去滑川芎各三分枳殼去穰麩炒紫蘇桔梗甘草炙橘皮乾薑各半兩當歸一兩三分白芍藥二兩熟地黃一兩半上銼散每服四錢水盞半姜五片棗一枚同煎食前服藿香養胃湯危氏治陽明經虛不榮肌肉陰中生瘡不愈藿香白朮白茯苓神麯炒烏藥去木縮砂仁薏苡仁半夏曲人參各半兩蓽澄茄甘草炙各三錢半上銼散每服四錢水盞半姜五片棗三枚同煎不以時候治陰瘡方千金蕪荑芎藭黃芩甘草礬石雄黃附子白芷黃連各六銖上㕮咀取豬膏四兩合煎敷之治婦人陰瘡與男子妒精瘡大同小異方黃丹枯白礬萹蓄藁本各一兩硫黃半兩白蛇皮一條燒灰荊芥蛇床子各半兩研極細上細末另以荊芥蛇床子煎湯溫洗軟帛滲干清油調塗如瘡濕乾末摻之治疳瘡因月後便行房致成湛濁伏流陰道疳瘡遂生搔癢無時先用胡椒蔥白作湯一日兩三度淋洗卻服後藥赤石脂龍骨黑牽牛炒菟絲子酒浸蒸黃耆鹽水炙沙苑蒺藜炒上為末蜜丸梧桐子大每服二十丸燕窩蒸酒澄上清者吞下肘後方療女人陰中生瘡杏仁雄黃礬石各二分麝香二分半上四味研細敷之又方用硫黃研細敷之古今錄驗療婦人陰中生瘡黃芩湯洗方雄黃當歸黃芩川芎大黃礬石各二分黃連一分上七味切以水五升煮取四升洗瘡日三度雄黃散雄黃川芎辰砂藜蘆北細辛當歸川椒上為末綿裹納陰中又敷外瘡上忌如常法當歸湯治婦人陰蝕瘡凡婦人少陰脈數而滑陰中必生瘡名曰䘌瘡或痛或癢如蟲行狀淋露膿汁陰蝕幾盡者此皆由心神煩郁胃氣虛弱致氣血流滯故經云諸痛癢瘡皆屬於心又云陽明主肌肉癢痛皆屬於心治之當補心養胃外以熏洗坐導藥治之乃可當歸芍藥甘草川芎各二兩地榆三兩上細切以水五升煮取三升去滓熏洗日三夜二一方用蛇床子不用川芎又方五倍子甘草滑石黃丹等分為末先以甘草湯洗然後敷之又方真平胃散加貫眾末每二錢煮熟豬肝拌藥納陰戶數日可安陰痔治婦人陰中生痔凡九竅有肉突出者皆名為痔用烏頭七個燒存性用小瓦罐盛釅醋淬之乘熱熏候通手沃之良洗方治茄子疾用茄皮白礬馬椿頭根朴硝澤蘭煮水熏洗加入炒石灰少許妙敷藥治茄子疾用朴硝為末黃荊柴燒瀝調敷或濃鐵漿水調敷又方治茄子疾用硫黃一兩大鯉魚一尾去頭皮入硫黃魚肚中故紙裹黃泥固濟火煙煅盡為末米糊丸梧桐子大每服二十丸溫酒下如下疽生蟲所下如柿汁臭穢心中㽲痛悶絕虛煩甚者不可治治茄子疾心躁連綿黃水易治白水難愈用生枳殼為散煎湯熏洗卻用絹帛包枳殼滓納入陰中即日漸消陰挺下脫大婦人陰挺下脫或因胞絡傷損或因子臟虛冷或因分娩用力所致薛前證當升補元氣為主若肝脾鬱結氣虛下陷用補中益氣湯若肝火濕熱小便澀滯用龍膽瀉肝湯一婦人陰中突出如菌四圍腫痛小便頻數內熱晡熱似癢似痛小便重墜此肝脾鬱結蓋肝火濕熱而腫痛脾虛下陷而重墜也先以補中益氣加山梔茯苓車前子青皮以清肝火升脾氣更以加味歸脾湯調理脾郁外以生豬脂和藜蘆末塗之而收一婦人陰中挺出五寸許悶痛重墜水出淋漓小便澀滯夕與龍膽瀉肝湯分利濕熱朝與補中益氣湯升補脾氣諸證漸愈再與歸脾湯加山梔茯苓川芎黃柏間服調理而愈後因勞役或怒氣下部濕癢小水不利仍用前藥即愈三茱丸治陰中生一物所大牽引腰腹膨痛至甚不思飲食皆因多服熱藥及煎爆或犯非理房事兼意淫不遂名陰挺食茱萸吳茱萸湯浸微炒桔梗水浸漉出慢火炒白蒺藜青皮去白山茱萸肉微炒舶上蘹香淘去砂土焙乾各一兩五味子淨揀海藻洗焙大腹皮酒洗曬乾川楝子去核玄胡索各一兩二錢半上為末酒糊為丸如梧子大每服三十五丸木通湯下下虛加川烏炮去皮肉桂去粗皮各一兩腰腹痛甚加桃仁去皮尖麩炒別研青皮去白枳實去穰各一兩真南木香七錢半服之一方每服二錢生地黃湯調仍有金毛狗脊五倍子白礬水楊根魚腥草山黃連各一兩為散分作四服以有嘴瓦罐煎熟預以銀錫作一長小筒下透罐嘴嘴上貫挺上先熏後洗立效更服白薇散凌霄花少許煎一捻金丸服前藥未效卻用玄胡索舶上蘹香吳茱萸炒川楝子去核青木香各二兩上為末粳米飲糊丸如梧桐子大每服三十五丸空心木通湯服又用梅花腦子半錢鐵孕粉一錢水調刷上如陰畔生疱以涼血飲每服三錢加凌霄花少許煎空心服見效黃芩散治婦人陰挺脫出黃芩蝟皮炒微焦當歸各半兩赤芍藥一兩牡蠣竹皮各二兩狐莖一具一用狐皮上治下篩飲服方寸匕日三禁舉重房勞冷食一方以酒服二錢妙治婦人陰挺出下脫方桂心一方作川椒吳茱萸一兩生用戎鹽二兩上藥並熬令色變搗羅為末以綿裹如指大納陰中日再易之甚妙又方川椒川烏頭並生用白芨各半兩上搗羅為末綿裹一錢納陰中深三寸腹中熱即止來日再用之一方無川椒又方蛇床子五兩烏梅二七枚以水五升煮取三升去滓稍熱洗之每日夜三五度用又方硫黃烏賊骨各半兩搗羅為末敷之又方鐵精細研以羊脂調布裹炙令熱熨之以瘥為度又方弊帚頭燒為灰酒服方寸匕食前服治婦人陰下脫若肚方用羊脂煎訖適冷暖取塗上以鐵精敷之多少令調以火炙布令暖熨肛上漸塗內之然後末磁石酒服方寸匕日三熏洗法用荊芥穗臭椿樹皮藿香葉煎湯熏洗即入托藥用蓖麻子葉有九角者好飛過白礬為末以紙片攤藥托入摻藥先以淡竹根煎湯洗仍用五倍子白礬為末乾摻立效敷藥用溫鹽水洗軟卻用五靈脂燒煙燻次用蓖麻子研爛塗上吸入如入即洗去陰冷大婦人陰冷因勞傷子臟風冷客之薛前證屬肝經內有濕熱外乘風冷所致若小便澀滯或小腹痞痛用龍膽瀉肝湯若內熱寒熱或經候不調用加味逍遙散若寒熱體倦飲食少思用加味四君子若鬱怒發熱少寐懶食用加味歸脾湯一婦人陰中寒冷小便黃澀內熱寒熱口苦脅脹此因肝經濕熱用龍膽湯祛利濕熱用加味逍遙散調補氣血而安一婦人所患同前更寒熱嘔吐兩股腫痛先用小柴胡加山梔一劑寒熱嘔吐頓止次用龍膽瀉肝湯一劑腫痛頓消一婦人陰中寒冷小便澄清腹中亦冷飲食少思大便不實下元虛寒治以八味丸月餘飲食漸加大便漸實又月餘諸證悉愈五加皮浸酒方聖惠治婦人癖瘦陰冷五加皮熟乾地黃丹參杜仲去粗皮炙微黃蛇床子乾薑各三兩地骨皮二兩天門冬一兩鍾乳四兩上細銼以生絹袋盛以酒一斗五升漬二宿後每服暖一大盞空心及晚食前服一方用枸杞子無地骨皮治婦人陰冷方出大全良方遠志乾薑生用蓮花各半兩蛇床子五味子各一兩上搗羅為末每用兼以兔糞塗陰門用綿裹一錢納陰中熱即為效又方蛇床子三分吳茱萸甜葶藶各半兩沒石子一枚搗羅為末綿裹棗許大納陰中令腹內熱為度又方蛇床子一兩吳茱萸一兩半生搗羅為末煉蜜和丸如酸棗大以綿裹納陰中下惡物為度一方用麝香溫中坐藥用蛇床子為末白粉少許和勻相得如棗大綿裹納之自然溫矣為效八味丸治血弱不能榮養臟腑津液枯澀風寒客於子臟以致陰冷方見雜病虛勞愚按此丸果系肝脾腎虛殊有神效胎前產後方具本門交接輒血出痛薛一婦人每交接出血作痛此肝火動脾而不能攝血用補中益氣濟生歸脾二湯而愈若出血過多而見他證但用前藥調補肝脾千金療女人交接輒血出方桂心伏龍肝各二分為末酒服方寸匕搓止又方黃連六分牛膝甘草各四分上三味細切以水四升煮取二升洗日三四度瘥補遺以熟艾緊裹一團然後以絹裹納陰中交接他物所傷薛治一婦人交接出血作痛發熱口渴欲嘔或用寒涼藥前證益甚不時作嘔飲食少思形體日瘦余曰證屬肝火而藥復傷脾所致也先用六君加山梔柴胡脾胃健而諸證愈又用加味逍遙散而形氣復一婦人陰腫下墜悶痛出水胸腹不利小便頻數內熱晡熱口苦耳鳴此肝脾火證用小柴胡加車前膽草苓朮升麻二劑稍愈又用加味逍遙加升麻數劑漸愈乃以加味歸脾加升麻柴胡並補中益氣加山梔數劑頓愈仍用加味逍遙加味歸脾二藥調理全愈一婦人患前證熱痛或用寒涼敗毒藥飲食不入時欲作嘔小腹重墜余謂此脾胃復損元氣下陷先用補中益氣湯加炮姜二劑重墜頓愈又加茯苓半夏二十餘劑而愈乃以歸脾湯少加柴胡升麻並六味地黃丸而康集驗方療女人交接陽道違理及他物所傷犯血流漓不止方取釜底墨斷葫蘆塗藥納之又療女童交接陽道違理血出不止方燒發並青布末為粉塗之又方割雞冠血塗之補遺以赤石脂末摻之又方五倍子末摻亦良傷丈夫頭痛薛當用補中益氣六味地黃以滋化源為主集驗方療女人傷丈夫四體沉重噓吸頭痛方生地黃八兩芍藥五兩香豉一升蔥白一斤生薑四兩甘草二兩上六味以水七升煮取二升半分三服不得重作忌房事千金翼療諸婦人傷丈夫苦頭痛欲嘔悶桑白皮湯桑白皮半兩乾薑一絫桂心五寸大棗二十枚上四味切以酒一斗煮三四沸去滓分溫服衣適厚薄毋令汗出補遺局方來復丹治婦人與男子交接相傷因而四肢沉重頭痛昏暈米飲吞下五十丸與鬼交通大夫人稟五行秀氣而生承五臟神氣而養若陰陽調和臟腑強盛邪魅安得而干之若攝理失節血氣虛衰則鬼邪干其正隱蔽而不欲見人時獨言笑忽時悲泣是其候也脈息遲伏或如鳥啄或綿綿而來不知度數而面色不改亦其候也薛前證多由七情虧損心血神無所護而然宜用安神定志等藥則正氣復而神自安若脈來乍大乍小乍短乍長亦是鬼祟宜灸鬼哭穴以患人兩手拇指相併用線緊扎當合縫處半肉半甲間灼灸七壯若果是邪祟病者即乞求免灸云我自去矣茯神散大全下同治婦人風虛與鬼交通妄有所見言語雜亂茯神一兩半亦作茯苓人參石菖蒲各一兩赤小豆半兩上㕮咀每服三大錢水一盞煎六分去滓食前溫服一方加茯苓一兩桃仁丸治婦人與鬼魅交通辰砂檳榔當歸桃仁各七錢半水銀二錢半棗肉研令星盡麝香阿魏麵裹煨沉香各半兩上為細末煉蜜丸如梧桐子大空心桃仁湯吞下十丸闢瘟丹治證同前虎頭骨半兩硃砂雄黃雌黃鬼臼皂莢蕪荑仁鬼箭藜蘆各一兩上件生為末煉蜜丸如彈子大囊盛一丸男左女右係臂上及用一丸當病人戶前燒之一切邪鬼不敢近太乙神精丹方見雜病譫妄蘇合香丸方見雜病卒中皆可用也妙香散治心氣不足精神恍惚夜夢顛倒與鬼交通語言錯亂先宜服此補氣養血鎮心安神然後以前後方治之方見雜病心痛殺鬼雄黃散治婦人與鬼交通雄黃丹砂雌黃各一兩俱細研羚羊角屑蕪荑虎頭骨石菖蒲鬼臼鬼箭白頭翁石長生蒼朮馬懸蹄豬糞各半兩上為細末以羊脂蜜蠟和搗為丸如彈子大每用一丸當患人前燒之別離散治婦人風虛與鬼交通悲思喜怒心神不定楊柳樹上寄生白朮各一兩桂心茵芋天雄炮去皮臍薊根菖蒲九節者細辛附子炮去皮臍乾薑炮各半兩上為細末每服一錢食前溫酒調下硃砂散治婦人風虛與鬼交通悲笑無恆言語錯亂心神恍惚睡臥不安硃砂細研水飛過鐵粉各一兩雄黃龍骨各半兩蛇蛻一尺燒虎睛一封炙牛黃麝香各二錢半上同研極細每服一錢以桃符湯調下不計時候治女人與邪物交通獨言笑悲思恍惚者用雄黃末一兩以松脂二兩熔和虎爪攪令如彈丸夜內火籠中燒之令女人踞坐其上以被自蒙唯出頭目未瘥再作不過三劑自斷也又方以安息香和臭黃合為丸燒熏丹穴永斷又方雄黃人參防風各一兩五味子一合上搗篩清旦以井華水服方寸匕三服瘥治婦人夢與鬼交鹿角為末三指撮和清酒服即出鬼精兼治漏下不斷婦人為妖所魅迷惑不肯言狀以水服鹿角屑方寸匕即言實也桃梟一名桃奴是過年樹上不落干桃子味苦微溫主殺百鬼精物療中惡腹痛殺精魅五毒不祥正月採之
