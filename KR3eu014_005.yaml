body:
  text: 卷之五産後門産後將調法大全凡生産畢飲熱童便一盞不得便臥且宜閉目而坐須臾上床宜仰臥不宜側臥宜豎膝未可伸足高倚床頭厚鋪裀褥遮圍四壁使無孔隙免致賊風及以醋塗鼻或用醋炭及燒漆器更以手從心擀至臍下使惡露不滯如此三日以防血暈血逆不問腹痛不痛有病無病以童便和酒半盞溫服五七服妙酒雖行血亦不可多恐引血入四肢且能昏暈宜頻食白粥少許一月之後宜食羊肉豬蹄少許仍慎言語七情寒暑梳頭洗足以百日為度若氣血素弱者不計日月否則患手足腰腿痠痛等證名曰蓐勞最難治療初産時不可問是男女恐因言語而泄氣或以愛憎而動氣皆能致病不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷齒恐致血逆須血氣平復方可治事犯時微若秋毫成病重如山嶽可不戒哉陳藏器云漬苧汁與産婦服之將苧麻與産婦枕之止血暈産婦腹痛以苧安腹上則止産婦將息如法臟腑調和庶無諸疾苦須先服黑神散四物湯四順理中丸七寶散若壯熱頭痛此乳脈將行用玉露散頭目不清是血暈用清魂散粥食不美是胃氣虛用四順理中丸丹或曰初産之婦好血已虧汙血或留彼黑神散非要藥乎答曰至哉坤元萬物資生理之常也初産之婦好血未必虧汙血未必積臟腑未必寒何以藥為飲食起居勤加調護何病之有誠有汙血體怯而寒與之數帖亦自簡便或有他病當求病起何因病在何經氣病治氣血病治血何用拘執此方例令服餌設有性急者形瘦者本有怒火者夏月坐蓐者時有火令薑桂皆為禁藥至於將護之法尤為悖理肉汁發陰經之火易成內傷之病也先哲具有訓戒胡為以羊雞濃汁作糜而又常服當歸丸當歸建中湯四順理中丸雖是補劑並是偏熱臟腑無寒何處消受若夫兒之初生母腹頓寬便啖雞子且吃夥鹽不思雞子難化夥鹽發熱展轉生證不知所因率爾用藥寧不誤人豫每見産婦之無疾者必教之以卻去黑神散與夫雞子夥鹽諸品肉食且與白粥將理間以些少鯗魚煮令淡食之半月後方與少肉若雞子亦須豁開淡煮大能養胃卻疾彼富貴之家驕恣之婦卒有白帶頭風氣痛膈滿痰逆口乾經事不調發禿體倦皆是陽盛陰虛之病天生血氣本自和平曰盛曰虛又烏知非此等繆迷有以兆之耶千金云凡産後滿百日乃可會合不爾至死虛羸百疾滋長慎之凡婦人患風氣臍下虛冷莫不由此早行房故也産後七日內惡血未盡不可服湯候臍下塊散乃進羊肉湯有痛甚切者不在此例候兩三日消息可服澤蘭丸此至滿月丸藥盡為佳不爾虛損不可平復也至極消瘦不可救者服五石澤蘭丸補之服法必七日之外不得早服也凡婦人因暑月産乳取涼太多得風冷腹中積聚百疾競起迄至於死百方療不能瘥桃仁煎主之出蓐後服之婦人總令無病每至秋冬須服一二劑以至年內當將服之佳丹溪云産後以大補氣血為先雖有雜證以末治之産後一切皆不可發表産後不可用芍藥以酸寒伐生髮之氣故也通用方加味四君子湯新産之後雖無疾故宜將息調理脾胃美進飲食則臟腑易平復氣血自然和調百疾不生也人參茯苓白朮甘草陳皮藿香縮砂仁黃耆各等分上銼散每服四錢薑三片棗一枚煎溫服四順理中丸治新産血氣俱傷脾胃不調百日內宜常服人參去蘆乾薑炮白朮各一兩甘草炙半兩為細末上煉蜜丸如桐子大每服五十丸空心米飲送下地黃丸治産後腹痛眼見黑花或發狂如見鬼狀或胎衣不下失音不語心胸脹滿水穀不化口乾煩渴寒熱往來口內生瘡咽喉腫毒心中忪悸夜不得睡産後中風角弓反張面赤牙關緊急或崩中如豚肝臍腹㽱痛煩躁恍惚四肢腫滿及受胎不穩唇口指甲青黑生地黃研取汁留滓生薑各二斤研取汁留滓蒲黃當歸各四兩上於銀石器內取生地黃汁炒生薑滓以薑汁炒地黃滓各令乾四味同焙研為細末醋煮麵糊為丸如彈子大每服一丸食前當歸酒化下一方只用地黃生薑依交加法制為末每服三錢酒下當歸散見前胎墮半産條四味湯治産後一切諸疾才方分娩一服尤妙當歸心膈煩加半錢玄胡索氣悶喘加半錢血竭惡露不快加半錢沒藥心腹撮痛加半錢上等分為細末每服二錢食前以童子小便一盅煎至六分溫服玉露散治産後乳脈不行身體壯熱疼痛頭目昏眩大便澀滯此藥涼膈壓熱下乳人參白茯苓甘草各半兩川芎苦梗炒白芷各一兩當歸二錢半芍藥七錢半上為細末每服二平錢水一盞煎至七分溫服如煩熱甚大便祕者加大黃二錢半地黃煎治産後諸疾生地黃汁生薑汁各一升藕汁半升大麻仁三兩去殼研上和勻以銀器內慢火熬成膏溫酒調服半匙更以北術煎膏入半匙尤佳産寶方無麻仁用白蜜治産後虛憊盜汗嘔吐地黃酒治産後百病未産一月先釀産訖可服地黃汁好曲好淨秫米蒸各二升上先以地黃汁漬曲令發準家法釀之至熟封七日取清者服常服令酒氣相接勿令絶忌蒜生冷鮓滑雞豬肉一切毒物凡婦人皆可服但夏三月不可釀春秋宜作以地黃汁並滓納米中炊合用之若作一石十石準此二升為則先服當歸湯後服此妙桃仁煎療産後百病諸氣桃仁一千二百枚去皮尖及雙仁熬令黃色上搗令極細以上等酒一斗五升同研三四遍如作麥粥法以極細為佳入小長頸瓷瓶中密塞以面封之納湯中煮一伏時不停火亦勿令火猛使瓶口常出在湯上勿令沒之候熟取出溫酒服一合日再服産後醋墨松煙細墨不拘多少用炭火煅通紅以米醋淬之再煅再淬如此七度上研令極細用絹羅過才産了服二錢以童便調下黑神散治婦人産後惡露不盡胞衣不下攻衝心胸痞滿或臍腹堅脹撮痛及血暈神昏眼黑口噤産後瘀血諸疾並皆治之又名烏金散治産後十八證一曰因熱病胎死腹中二曰産難三曰胞衣不下四曰血暈五曰口乾心悶六曰乍寒乍熱七曰虛腫八曰乍見鬼神九曰月內不語十曰腹痛泄瀉兼服止瀉調氣藥十一曰遍身疼痛十二曰血崩十三曰血氣不通咳嗽十四曰寒熱心痛月候不來十五曰腹脹滿嘔逆不定次服硃砂丸三二日炒生薑醋湯下七丸十六曰口鼻黑氣及鼻衄此證不可治十七曰喉中氣喘急死不治十八曰中風熟乾地黃蒲黃炒當歸乾薑炮桂心芍藥甘草各四兩黑豆炒去皮半升上為細末每服二錢酒童便各半盞同煎服琥珀散治産後一切危急之疾琥珀硃砂麝香香墨醋炙殭蠶當歸各二錢半鯉魚鱗炒焦桂心百草霜白附子梁上塵炒令煙出篩淨各半兩細末之炒生薑熱酒調服二錢效千金增損澤蘭丸療産後百病理血氣補虛勞澤蘭甘草當歸川芎各一兩七錢半附子炮乾薑白朮白芷桂心北細辛各一兩北防風人參牛膝各一兩二錢半柏子仁熟地黃石斛各一兩半厚朴藁本蕪夷各五錢麥門冬去心二兩上共為細末煉蜜丸如梧桐子大溫酒下二十丸黑龍丹治産後一切血疾産難胎衣不下危急惡疾垂死者但灌藥得下無不全活當歸五靈脂川芎良薑熟地黃各一兩上細銼以沙合盛赤石脂泥縫紙筋鹽泥固濟炭火十斤煅令通赤去火候冷開看成黑糟色取出細研卻入後藥百草霜五兩硫黃乳香各一錢半花蕊石琥珀各一錢上五味並細研與前五味再研如法修制和勻以米醋煮麵糊丸如彈子大每服一丸炭火燒令通赤投於生薑自然汁與童子小便入酒漉出控乾研細只用此酒調下診婦人生産之後寸口脈洪疾不調者死沉微附骨不絶者生婦人新生乳子脈沉小滑者生實大堅弦急者死胞衣不下大全夫有産兒出胞衣不落者世謂之息胞由産初時用力比産兒出而體已疲憊不復能用力産胞經停之間而外冷乘之則血道澀故胞衣不出須急以方藥救治不妨害於兒所奈者胞緊連兒臍胞不出即不得以時斷臍浴洗冷氣傷兒則成病也舊法胞衣不出恐損兒者依法截臍而已産處須順四時方面並避五行禁忌若有觸犯多令産婦難産郭稽中論曰胎衣不下者何答曰母生子訖流血入衣中衣為血所脹故不得下治之稍緩脹滿腹以次上衝心胸疼痛喘急者但服奪命丹以逐去衣中之血血散脹消胎衣自下牛膝湯亦效薛有因惡露入衣脹而不能出有因元氣虧損而不能送出其惡露流衣中者腹中脹痛用奪命丹或失笑散以消瘀血緩則不救其元氣不能送者腹中不脹痛用保生無憂散以補固元氣或用萆麻子肉一兩細研成膏塗母右腳心衣下即洗去緩則腸亦出如腸不上仍用此膏塗腦頂則腸自入益母丸亦效家人婦胎衣不出胸腹脹痛手不敢近此瘀血為患用熱酒下失笑散一劑惡露胎衣並下一産婦胎衣不出腹不脹痛手按之痛稍緩此是氣虛而不能送出用無憂散而下前證余詢諸穩婆云宜服益母草丸或就以産婦頭髮入口作嘔胎衣自出其不出者必死授與前法甚效一産婦産後面赤五心煩熱敗血入胞胞衣不下熱有冷汗思但去其敗血其衣自下遂用烏豆二合炒透然後燒紅鐵稱錘同豆淬其酒將豆淋酒化下益母丹二丸胞衣從血而出餘證盡平奪命丹附子半兩泡牡丹皮一兩乾漆二錢半碎之炒煙盡上為細末以釅醋一升大黃末一兩同熬成膏和藥丸如梧子大溫酒吞五七丸不拘時花蕊石散治産後氣欲絶緣敗血不盡血迷血暈惡血奔心胎死腹中胎衣不下至死者但心頭暖急以童子小便調一錢取下惡物如豬肝終身無血風血氣疾膈上有血化為黃水即吐出或小便中出也若先下胎衣則泛泛之藥不能達若先治血悶則尋常之藥無此功無如此藥有兩全之效花蕊石一斤上色硫黃四兩各研細上二味相拌令勻先用紙和膠泥固瓦罐子一個內可容藥候泥干入藥在內密泥封口了焙籠內焙令透熱安在四方磚上磚上書八卦五行字用炭一稱籠疊周匝自巳午時從下生火令漸漸上徹有墜下火放夾火上直至經宿炭消火冷又放經宿冷定取出細研以絹羅至細瓷合內盛依法用之此藥便是療金瘡花蕊石散尋常人自宜時時收蓄防急一親戚婦人産後胞衣不下血漲迷悶不省人事告之曰死矣豫曰此血脹也可用花蕊石散救之因以一錢童便調灌下即蘇其胎衣與惡水旋即下而無恙芎藭散治胎衣不下芎藭當歸焙各半兩榆白皮一兩銼為細末每服二錢食前用生地黃汁同溫酒調下必效方牛膝湯治胎衣不出臍腹堅脹急痛即殺人服此藥胞即爛下死胎亦下牛膝瞿麥各四兩當歸三兩通草六兩滑石八兩葵子五兩上細切以水九升煮取三升分三服若衣不下腹滿即殺人宜服此藥衣即爛出也牛膝散治妊娠五六月墮胎胞衣不出牛膝川芎朴硝蒲黃各七錢半桂心半兩當歸一兩半上為粗末每服四錢水一盞薑三片生地黃一分煎至六分去滓溫頻服千金備急丹治産後惡血衝心胎衣不下腹中血塊以錦紋大黃一兩為細末用釅醋半升同煎如膏丸如桐子大溫醋湯吞五丸或七丸須臾惡血即下愈保命治胎衣不下或子死腹中或血衝上昏悶或血暴下及胎幹不能生産半夏湯主之方見前催生下胎丸半夏白散各半兩上細末丸如桐子大食後半夏湯下三十丸漸加至五十丸如未效者須廣大其藥榆白皮散主之又不效用大聖散主之有宿熱者宜服人參荊芥散治胞衣不出若腹脹則殺人黑豆一合炒令熟上入醋一盞煎三五沸去豆分為三服酒煮亦可必效方治胎衣不下服蒲黃如棗大集驗千金崔氏方並同又方生地黃汁一升苦酒三合暖服之又方牛膝一兩葵子一合杵碎以水一盞半煎至一盞去滓分二服廣濟治胎衣不出方以灶突中土三指撮以水服之集驗千金備急同又方伏龍肝一大塊研碎用好醋調令相合納臍中續煎生甘草湯三四合服又方醋湯飲之出又方雞子一枚苦酒一合和飲之立出延年方治胎衣不出腹脹則殺人吞雞子黃三個仍解發刺喉中令嘔即出若困極以水煮螻蛄一枚二十沸灌入口汁下即出崔氏同救急方赤小豆男七粒女十四粒東流順水吞下療胞衣不下方栝蔞實一個取子研令細上酒童便各半盞相和煎至七分去滓溫服如無實根亦得又方紅花一兩酒煮濃汁服又方以鹿角鎊屑研細三分煮蔥白湯調下凡欲産時必先脫常所著衣以籠灶胞衣自下仍易産廣濟方胞衣不出取夫單衣蓋井上立出又方取産母鞋底火炙熱尉小腹上下二七次又方取路傍破草鞋前截連鼻燒灰童便和酒調下又方皂角刺燒為末每服一錢溫酒調下寶慶方云婦人百病莫甚於生産産科之難臨産莫重於催生既産莫甚於胞衣不下惟有花蕊石散一藥最為緊要如黑神散琥珀散諸方之類雖皆有驗然鄉居或遠於藥局倉卒之間無法可施今有一妙法若産訖胞衣不下停待稍久非特産母疲倦又且血流入胞中為血所脹上衝心胸喘急疼痛必致危篤若有此證宜急斷臍帶以少物系墜以物系墜之時切宜用心先系然後截斷不爾則胞上掩心而死使其子血脈不潮入胞中則胞衣自當痿縮而下縱淹延數日亦不害人只要産母心懷安泰終自下矣纍試有驗不可輕信坐婆妄用手法多有因此而亡者慎之慎之針灸胞衣不下三陰交中極各瀉之標幽又法照海內關甲女子字難若胞不出崑崙主之血暈厥逆附金匱問曰新産婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難按産婦鬱冒即今世所謂血暈也大全産後血暈者由敗血流入肝經眼黑花頭目旋暈不能起坐甚致昏悶不省人事謂之血暈細酒調黑神散最佳庸醫或作暗風中風治之凡暈血熱乘虛逆上湊心故昏迷不省氣閉欲絶是也然其由有三有用心使力過多而暈有下血多而暈有下血少而暈其暈雖同治之則異當詳番之下血多而暈者但昏悶煩乳而已當以補血清心藥下血少而暈者乃惡露不下上搶於心心下滿急神昏口噤絶不知人當以破血行血藥古法有云産婦才分娩訖預燒稱錘或黃石子硬炭燒令通赤置器中急於床前以醋沃之得醋氣可除血暈産後一月時作為妙崔氏云凡暈者皆是虛熱血氣奔送腹中空所致欲分娩者第一須先取釅醋以塗口鼻仍置醋於傍使聞其氣兼細細飲之此為上法如覺暈即以醋噀面蘇來即飲醋仍少與解之一云仍少與水解之一法燒乾漆令煙濃熏産母面即醒如無干漆取舊漆器火燒煙燻亦妙郭稽中論曰産後血暈者何答曰産後氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花極甚者令人悶絶不知人口噤神昏氣冷醫者不識呼為暗風若作此治之病必難愈但服清魂散即省薛産後元氣虧損惡露乘虛上攻眼花頭暈或心下滿悶神昏口噤或痰壅盛者急用失笑散主之若血下多而暈或神昏煩亂者大劑芎歸湯補之或蕓薹子散或童子小便有痰加二陳湯若因勞心力而致者宜補中益氣湯加香附若因氣血虛極不省人事用清魂散繼以芎歸湯及大補氣血之劑凡産可用醋漆器熏或用半夏末冷水和丸入鼻孔中並無前患丹溪先生云血暈因氣血俱虛痰火泛上宜以二陳導痰或加減硃砂安神丸以麥門冬湯下亦可大凡産後口眼喎斜等證當大補氣血為主而兼以治痰若脾胃虛而不能固者用六君子湯至五七個月當服安胎飲至八九個月再加大腹皮黃楊腦如臨産時更宜服保生無憂散庶無前患家人婦産後小腹作痛忽牙關緊急灌以失笑散良久而蘇又用四物加炮薑白朮陳皮而愈一産婦兩手麻木服愈風丹天麻丸遍身皆麻神思倦怠晡熱作渴自汗盜汗此氣血俱虛也用十全大補加炮薑數劑諸證悉退卻去炮薑又數劑而愈但內熱此血虛也用逍遙散而痊一婦八月胎下墜或動面黃體倦飲食少思此脾氣虛弱用補中益氣湯倍白朮加蘇梗三十餘劑而安産後眩暈胸滿咳嗽用四物加茯苓半夏桔梗而愈一産婦因産飲酒惡露甚多患血暈口出酒氣此血得酒熱而妄行虛而作暈也以佛手散加乾葛二錢一劑而痊酒性慓悍入月及産後不宜飲恐致前證産室人衆喧嚷氣熱亦致此證丹溪治一婦面白形長心郁半夜生産侵晨暈厥急灸氣海十五壯而蘇後以參術等藥服兩月而安此陽虛也奉化陸嚴治新昌徐氏婦病産後暴死但胸膈微熱陸診之曰此血閟也用紅花數十斤以大鍋煮之候湯沸以木桶盛之將病者寢其上熏之湯氣微復加之有頃婦人指動半日遂蘇此與許胤宗治王太后之意同清魂散澤蘭葉人參各二錢半川芎半兩荊芥一兩一方有甘草二錢上為末用溫酒熱湯各半盞調一錢急灌之下咽眼即開氣定即醒保命荊芥散治産後風虛血暈精神昏昧荊芥一兩三錢桃仁炒五錢上細末熟水下三錢微喘加杏仁炒甘草各三錢衍羲治産後血暈用荊芥穗為末童便調下二三錢極妙産後血暈身痙直戴眼口角與目外眵向上牽急不知人取雞子一枚去殼取清以荊芥末二錢調服遂仍依次調治若無他疾則不須治甚為敏捷上荊芥例氣虛人不可服來蘇散治臨産用力太過氣血暈悶不省人事木香不見火神麯炒陳皮去白白芍藥阿膠蛤粉炒麥糵炒黃耆去蘆生薑炒黑各一錢糯米一撮苧根洗淨一錢半甘草炙半錢上作一服水二盅煎至一盅斡開口灌下連進為愈芎歸湯治産後去血過多血暈不省川芎當歸各等分上作一服水二盅煎至一盅食前服腹中刺痛加白芍藥口乾煩渴加烏梅麥門冬發寒熱加白芍藥水停心下加茯苓生薑虛煩不得眠加人參竹葉芎歸加芍藥湯治産後去血過多而暈方見産後血不止保命集治産後血暈危困生地黃汁一大盞當歸赤芍藥各二錢半銼上水煎三五沸溫服如覺煩熱去當歸入童子小便半盞服之廣濟治産後血暈心悶不識人或神言鬼語氣急欲絶芍藥甘草各一兩丹參七錢半併為㕮咀生地黃汁一升生薑汁白蜜各三合上水二升先煎前藥取八合下二汁及蜜和勻分兩服梅師治産後余血攻心或下血不止心悶面青身冷氣欲絶新羊血一盞飲之妙日三服産後忽冒悶汗出不識人者暴虛故也破雞子三枚吞之便醒若未醒可與童便一升甚驗若産後去血多者又增此疾與雞子不醒者可急作竹瀝汁一服五合須臾不定再與五合頻與三五服瘥又方松煙墨二錢燒通紅窨滅為末溫酒或醋湯調服半匕丹婦人産後血暈此乃虛火載血漸漸暈將上來用鹿角燒灰出火毒研極細用好酒童便調灌下一呷即醒此物行血極效獨行散治産後血暈昏迷不省衝心悶絶五靈脂二兩半生半炒上為細末每服二錢溫酒調下口噤者拗開口灌之入喉即愈一方加荊芥為末童便調服如血崩不止加當歸酒童便煎不拘時服治下胎或産後血上衝心已死用鬱金燒存性為末二錢釅醋一合調灌之立活産後血暈心悶氣絶紅花一兩搗為末分作二服酒二盅煎取一盅並服如口噤斡開灌之效一方用紅花三兩新者無灰酒童便各半升煮取一盞服肘後治血暈蘇木三兩細銼水五升煮取二升分再服瘥無蘇木取緋衣煮汁飲之亦得聖惠治産後血暈不知人及狂語麒麟竭一兩細研為末非時以溫酒調下二錢匕奪命散治産後血暈血入心經語言顛倒健忘失志及産後百病沒藥血竭各等分上研細為末才産下便用童便細酒各半盞煎一兩沸調下二錢良久再服其惡血自循下行更不衝上免生百疾專治婦人方只用白湯調五羊洪運使子舍孺人産後語言顛倒譫語不已如有神靈服諸藥無效召陳診之六脈和平陳以此藥兩服愈紅花散保命治産後血昏血暈血崩及月事不勻遠年乾血氣乾荷葉牡丹皮川當歸紅花蒲黃炒各等分上細末每半酒煎和渣溫服如胎衣不下榆白皮湯調半兩上破血輕劑牡丹散三因治産後血暈悶絶口噤則斡開口灌之牡丹皮大黃煨芒硝各一兩冬瓜子半合桃仁三十粒去皮尖上銼每服五錢水三盅煎一盅半去滓入硝又煎分二服産書治産後心煩手腳煩熱氣力欲盡血暈連心頭硬及寒熱不禁接骨木破之如算子一握以水一升煎取半升分溫二服或小便數惡血不止服之即瘥此水煎三遍其力一般此是起死之方上重劑血點滴不出者宜用花蕊石散治産後氣欲絶惡血奔心欲死者但以童便調一錢服之取下惡物為妙胞衣不下黑神散治産後血暈用細酒調服佳産後通用方上方寒多者用之治産後血暈心悶亂恍惚如見鬼生益母草汁三合如無根亦可生地黃汁二合童便一合雞子清三枚上以前三味煎三四沸後入雞子清攪停作一服治産後血暈狂語不識人狂亂童便二合生地黃汁一合赤馬通七枚紅雪八分上以上二味浸赤馬通絞去滓下紅雪溫為兩服上方熱多者用之仲景云産婦鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之病解能食七八日更發熱者此為胃實大承氣湯主之今按鬱冒即暈也觀此則産後血暈有汗下和解三法當分表裡虛實精而別之張氏方治産後血暈全不省人事極危殆者上切韭菜入有嘴瓷瓶內煎熱醋沃之便密扎瓶口以瓶嘴向産婦鼻孔令醋氣透入須先扶病人起坐惡血衝心故有此證韭能去心之滯血加以醋氣運達之用無不效又方半夏洗不以多少為末丸如大豆納鼻中即蘇亦療五絶治胎後血上衝心生薑五片切以水八升煮取三升分三服崔氏療産乳暈絶方以洗兒水飲三合良或惡血服少許良醋墨産後通用方針灸摘産後血暈不省人事三里支溝三陰交心術無此一穴標幽又法陰交陽別世又法神門內關不應取後穴關元灸厥逆産後手足厥逆肩井主之一婦人産後日食茶粥二十餘碗至一月後遍身冰冷數塊人以指按其冷處即冷從指下上應至心如是者二年諸治不效以八物湯去地黃加橘紅入薑汁竹瀝一酒盅十服乃溫血不下全夫惡露不下者由産後臟腑勞傷氣血虛損或胞絡挾於宿冷或産後當風取涼風冷乘虛而搏於血血則壅滯不宣積蓄在內故令惡露不下也薛前症若惡露不下用失笑散見後心痛若氣滯血凝用花蕊石散胞衣不下一産婦患前證服峻厲之劑惡露隨下久而昏憒以手護其腹余曰此脾氣復傷作痛故用手護也以人參理中湯加肉桂二劑補之而愈大全療産後三四日惡露不下芍藥十分知母八分生薑當歸蒲黃各四分紅花二分荷葉中心蒂七枚生地黃汁二合上細切以水二升煎至七合去滓服荷葉散療産後惡露不下腹中疼痛心神煩悶乾荷葉二兩鬼箭羽桃仁劉寄奴蒲黃各一兩上為粗末每服三錢以童便一大盞薑二片生地黃一分捶碎同煎至六分去滓無時熱服廣濟療産後惡露不多下方川牛膝大黃各二兩牡丹皮當歸各一兩半芍藥蒲黃桂心各一兩上為末以生地黃汁調酒服方寸匕日二服血下愈沒藥丸治産後惡露方行而忽然斷絶驟作寒熱臍腹百脈皆痛如錐刺非常此由冷熱不調或思慮動作氣所擁遏血蓄經絡當歸一兩桂心芍藥各半兩桃仁去皮尖炒研沒藥研各二錢半虻蟲去足翅炒水蛭炒焦各三十枚上為末醋糊丸如豌豆大醋湯下三丸千金備急丹見胞衣不下保命治婦人惡血不下當歸炒芫花炒等分上為細末每服三錢酒下又方用好墨醋焠末以童便酒下妙梅師治産後血不下蒲黃三兩水三升煮取一升頓服本事方治産後血不下益母草搗絞汁每服一小盅入酒一合攪勻溫服千金治産後血不去麻子五升酒一升浸一宿明旦去渣溫服一升不瘥再服一升不吐不下不得與男子通一月將養如初瘥黑龍丸見通用方內生料五積散治産後惡露不快腹中疼痛或腹內有塊及發寒熱並加醋少許煎通口服亦能療血崩血不止大夫産後惡露不絶者由産後傷於經血虛損不足或分解之時惡血不盡在於腹中而臟腑挾於宿冷致氣血不調故令惡露淋瀝不絶也薛前證若肝氣熱而不能主血用六味地黃丸若肝氣虛不能藏血用逍遙散若脾氣虛而不能攝血用六君子湯胃氣下陷而不能統血用補中益氣湯若脾經鬱熱而血不歸源用加味歸脾湯若肝經怒火而血妄行用加味四物湯若氣血俱虛用十全大補湯若肝經風邪而血沸騰用一味防風丸一産婦惡露淋漓體倦面黃食少惡寒晝夜不寐驚悸汗出此脾經虛熱用加味歸脾湯而痊後因怒脅脹作嘔少食用六君加柴胡治之而痊芎歸加芍藥湯治産後血崩眩暈不知人事川芎當歸芍藥各等分上㕮咀每服四錢以水一盅半煎至七分去滓無時熱服云岐治産後血崩如豆汁紫黑過多者四物湯加蒲黃生地黃汁阿膠薊根艾白芷煎服療産後七八日惡露不止敗醬草當歸各六分芍藥續斷各八分川芎竹茹各四分生地黃炒乾十二分上細銼以水二升煮取八合空心頓服丹二七孺人産後冒寒哭多血再下身瞤脈沉當歸白朮陳皮川芎乾薑黃芩各二錢芍藥一錢炙甘草少許上分二帖水煎服王孺人因憂慮墮胎後兩月餘血不止腹痛此體虛氣滯惡物行不盡陳皮一錢白朮二錢芍藥一錢木通川芎五分甘草二分炙作湯下五芝丸六十粒食前服獨聖湯療産後亡血過多心腹徹痛然後血下久而不止亦治赤白帶下年深諸藥不能療者良驗貫衆狀如刺蝟者一個全用只揉去毛花蔓用之不銼斷上用好醋蘸濕慢火炙令香熟候冷為細末用米飲調下二錢空心食前服千金治産後惡血不盡或經月或半歲者升麻三兩清酒五升煮取二升半分溫再服牡蠣散治産後惡露淋瀝不絶心悶短氣四肢乏弱頭目昏重煩熱不思飲食面黃體瘦牡蠣煅川芎熟地黃白茯苓龍骨各一兩續斷當歸艾葉酒炒人參五味子地榆各半兩甘草二錢半上為末每服二錢水一中盞生薑三片棗一枚煎至六分去滓食前服産書産後猶有餘血水氣者宜服豆淋酒黑豆五升熬令煙盡於瓷器內以酒一斗淬之蓋豆淋酒治汙血又能發表也治産後惡血不絶崩血不可禁腹中絞痛氣息急治蓐中三十六疾廣濟方亂髮燒一兩阿膠二兩代赭石乾薑各三兩馬蹄殼一枚燒乾地黃四兩牛角䚡五兩酥炙上為細末煉蜜丸如梧桐子大每服三四十丸空心米飲下日二服返魂丹見前胎産大法文仲葛氏治惡露不絶方以鋸截桑木取屑五指撮酒服之又方炙桑白皮煮水飲之祕録治胎落下血不止以桑木中蠹蟲燒末酒服方寸匕日二服療産後泄血不止無禁度及治腹痛胸膈悶以薑黃為末酒服方寸匕日三四服胡氏云薑黃治惡露不止療産後血不止虛羸逮死亦治血氣蒲黃二兩水二升煎八合頓服心痛大全産後心痛為陰血虧損隨火上衝心絡名曰心胞絡痛宜大岩蜜湯治之若寒傷心經名曰真心痛朝發夕死夕發朝死無藥可救薛前證若陽氣虛寒用岩蜜湯溫之瘀血上衝用失笑散散之血既散而痛仍作用八珍湯補之大凡心腹作痛以手按之卻不痛此血虛也須用補養之劑一産婦患前證昏憒口噤冷汗不止手足厥逆用六君子加附子一錢以回其陽二劑頓蘇又以十全大補湯養其血氣而安一産婦患前證手不敢近腹用失笑散一服下瘀血而愈次日腹痛亦用前藥而安一産婦患前證用大黃等藥其血雖下復患頭痛發熱惡寒次日昏憒自以兩手堅護其腹不得診脈視其面色青白余謂脾氣虛寒而痛也用六君子湯加薑桂而痛止又用八珍湯加薑桂調理而安七氣手拈散治産後心氣攻痛玄胡索小蘹香白芍藥乾漆炒枳殼各二錢黃連石菖蒲香附子蘇葉各一錢半沒藥乳香各一錢甘草六分上銼散分作二服每服用水一盞半薑三片煎至七分空心服大岩蜜湯生乾地黃當歸獨活吳茱萸芍藥乾薑甘草桂心小草各一兩細辛半兩上為散每服半兩水三盞煎至一盞去滓稍熱服評曰産後心痛雖非産蓐常疾痛或有九痛未必便是血痛設是岩蜜湯豈可用熟地黃熟地黃泥血安能去痛此方本出千金用生乾地黃耳茱萸一升合準五兩乾薑三兩細辛治停寒在下焦方本一兩卻減半兩制奇制偶量病淺深自有品數不可妄意加減然以岩蜜湯治血痛不若失笑散更捷失笑散治心腹痛欲死百藥不效服此頓愈此方與紫金丸大同小異五靈脂蒲黃各等分上為末先用釅醋調二錢熬膏入水一盞煎至七分食前熱服良驗經心録蜀椒湯療産後心痛此大寒所為蜀椒二合芍藥三兩半夏當歸桂心人參甘草茯苓各二兩生薑汁五合蜜一升上切以水九升煮椒令沸下諸藥煮取三升半去滓下薑汁及蜜更煎取三升服五合至六合火龍散亦治産後心痛方見胎前心痛治産後血不盡心腹痛荷葉熬令香為末水煎下方寸匕聖惠治産後惡血衝心痛氣悶欲絶用桂心三兩搗羅為散狗膽汁和丸如櫻桃大不拘時候熱酒磨下二丸玄胡索散手拈散俱心腹痛腹痛薛産後小腹作痛俗名兒枕塊用失笑散行散之若惡露既去而仍痛用四神散調補之若不應用八珍湯若痛而噁心或欲作嘔用六君子湯若痛而泄瀉用六君子湯送四神丸若泄瀉痛而或後重用補中益氣湯送四神丸若胸膈飽脹或惡食吞酸或腹痛手不可按此是飲食所致當用二陳加山楂白朮以消導若食既消而仍痛或按之不痛或更加頭痛煩熱作渴惡寒欲嘔等證此是中氣被傷宜補脾胃為主若發熱腹痛按之痛甚不惡食不吞酸此是瘀血停滯用失笑散以消之若止是發熱頭痛或兼腹痛按之卻不痛此是血虛用四物加炮薑參術以補之病機要云胎産之病從厥陰經論之無犯胃氣及上中二焦為之三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脈數而已動於脾利小便則內亡津液胃中枯燥製藥之法能不犯三禁則榮衛自和而寒熱止矣如發渴用白虎氣弱用黃耆血刺痛則用當歸腹中痛則加芍藥宜詳察脈證而用之丹溪先生云産後當大補氣血為先雖有雜證從末治之一切病多是血虛皆不可發表一産婦腹痛發熱氣口脈大余以為飲食停滯不信乃破血補虛反寒熱頭痛嘔吐涎沫又用降火化痰理氣四肢逆冷泄瀉下墜始悔問余曰何也余曰此脾胃虛之變症也法當溫補遂用六君加炮薑二錢肉桂木香各一錢四劑諸證悉退再用補中益氣之劑元氣悉復一婦人産後腹痛後重去痢無度形體倦怠飲食不甘懷抱久郁患繭唇寐而盜汗如雨竟夜不敢寐神思消爍余曰氣血虛而有熱用當歸六黃湯內黃芩連柏炒黑一劑汗頓止再劑全止乃用歸脾湯八珍散兼服元氣漸復而愈一産婦小腹作痛服行氣破血之藥不效其脈洪數此瘀血內潰為膿也以瓜子仁湯二劑痛止更以太乙膏下膿而愈産後多有此病縱非癰用之更效一産婦小腹痛小便不利用薏苡仁湯二劑痛止更以四物加紅花桃仁下瘀血而愈大抵此證皆因榮衛不調或瘀血停滯所致若脈洪數已有膿脈但數微有膿脈遲緊乃瘀血下之即愈若腹脹大轉側作水聲或膿從臍出或從大便出宜用蠟礬丸太乙膏及托裡藥一産婦小腹作痛有塊脈芤而澀以四物加玄胡紅花桃仁牛膝木香治之而愈一婦産後小腹患痛服瓜子仁湯下瘀血而痊凡瘀血停滯宜急治之緩則腐化為膿最難治療若流注關節則患骨疽失治多為敗證一婦人寒月中産後腹大痛覺有塊百方不治一人教以羊肉四兩熟地黃二兩生薑一兩水煎服之二三次愈大兒枕者由母胎中宿有血塊因産時其血破散與兒俱下則無患也若産婦臟腑風冷使血凝滯在於小腹不能流通則令結聚疼痛名之曰兒枕也延胡索散治産後兒枕腹痛延胡索當歸各一兩真琥珀蒲黃炒各二錢半赤芍藥半兩桂心半兩紅藍花二錢上為細末以童便合酒溫調三錢食前服療新産後七八日腹痛兩脅痛當歸劉寄奴苦梗各十二分延胡索別為末桂心陳皮各四分茯苓芍藥各八分上㕮咀以水二升煮取八合調延胡索末空心服療先患冷氣因産後發腹痛川芎桂心當歸吳茱萸茯苓芍藥甘草各六分桃仁十分上㕮咀以水七升煮取二升去滓分三服丹産後三日血塊痛發熱五靈脂略炒牡丹皮沒藥滑石上研細分五帖豆淋酒調下之食前馮宅産後發熱腹中痛有塊自汗惡寒曾服黑神散白朮芍藥三錢滑石五錢黃芩牡丹皮各二錢半人參川芎當歸尾陳皮荊芥乾薑各一錢甘草少許治血瘕痛無定處童便三升生地黃汁生藕汁各一升生薑汁二升上先煎三味約三分減二次下薑汁慢火煎如稀餳每取一合溫酒調下黑神散療産後血塊痛經脈行後腹疼並經脈不調熟地黃一斤陳生薑半斤上二味同和炒乾為末每服二錢用烏梅調下常服酒調經脈不通烏梅荊芥酒調下一方用山楂濃煎汁入砂糖少許再煎熱服治兒枕痛乃血瘕也用真蒲黃研細調酒服二錢如躁渴者新汲水調下又方隔年蟹殼燒灰酒調下治産後兒枕大痛黑白散烏金石醋煅七次另研寒水石煅存性為末上各收之痛時各抄一錢半米飲調下痛止勿服未止再服海藏云四物加玄胡索沒藥白芷湯治産後敗血作痛通治婦人諸疾四物苦楝湯雜病腹痛一方治臍下痛不可忍四物湯加玄胡索二錢半服之紫金丸治産後臍下痛即失笑散醋為丸是也立效散治産枕痛不可忍用五靈脂慢火炒乾為末溫酒下二錢立瘥惡露不盡金匱産後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜即愈宜大承氣湯主之熱在裡結在膀胱也大全産後惡血雖常通行或因外感五邪內傷七氣致令斬然而止余血壅滯所下不盡故令腹痛當審其因而治之一産婦小腹痛甚牙關緊急此瘀血內停灌以失笑散下血而蘇又用四物加炮薑白朮陳皮而愈一婦人經水來比常度過多不止遂用澀藥止之致腹作痛此乃氣血凝滯也用失笑散二服而愈地黃散治産後惡血不盡腹中疼痛生地黃炒當歸各二錢生薑半兩切如芡實大新瓦上焙令焦黑上為細末每服二錢空心薑酒調下當歸血竭丸治婦人産後惡露不下結聚成塊心胸痞悶及臍下堅痛當歸血竭芍藥蓬朮炮各二兩五靈脂四兩上為細末醋糊和丸如梧桐子大每服五十丸食前溫酒送下溫隱居澤蘭湯治産後惡露不盡腹痛往來兼胸滿少氣澤蘭熬生乾地黃當歸各七錢半芍藥生薑細切龜頭大新瓦上炒焦各二兩半甘草一兩半大棗十四枚細切水九升煮三升分三服欲死塗身得瘥卷荷散治産後血上衝心血刺血暈血氣腹痛惡露不快卷荷初出水者紅花當歸各一兩蒲黃膈紙炒牡丹皮各半兩上為細末每服二錢空心鹽酒調下一臘內童子小便調又方産後下血不盡腹內堅痛不可忍當歸芍藥桂心各三兩桃仁一百二十粒制上水六升煮二升溫分兩服未瘥加大黃又方産後血結下不盡腹中絞痛不止大黃別浸生乾地黃當歸各十分川芎桂心芍藥各八分甘草黃芩各六分桃仁四十九粒制細切水七升煮二升半入大黃煎三沸分溫三服又産後血下不盡腹中痛無計青木香當歸牛膝川芎黃耆芍藥各八分大黃十三分浸芒硝十二分細切水七升煮二升半入大黃更三沸分三服又産後惡露不盡結聚小腹疼痛當歸七錢半制香附子一兩琥珀沒藥青皮赤芍藥木香桂心各半兩上為細末以烏豆淋酒調二錢産寶治産後余血作疼兼塊者桂心薑黃各等分為細末酒調方寸匕血下盡妙産乳方蕓薹散産後惡露不盡血結刺痛名血母塊兼治心腹諸疾蕓薹子隔紙炒當歸桂心赤芍藥各等分細末酒調二錢産後可常服黑神散治産後惡露不盡心胸痞悶臍腹撮痛汙血諸疾産後通用方丹治産後惡露未盡小腹作痛五靈脂末香附末上合和醋為丸甚者加留尖桃仁一方加蛤粉救急療惡露不盡腹脹痛取亂髮如雞子大灰水洗垢淨燒存性末之酒調服二錢又療産後血不盡心腹痛悶方取荷葉燒灰存性熱湯和服煮取汁飲之亦良又方以鐵稱錘一枚燒赤投酒中酒準五升用此酒煮當歸三兩取二升去滓分溫再服千金同一方無當歸大全以惡露不盡腹痛及兒枕心腹刺痛小腹疼痛寒疝分為四門由母胎中宿有血塊産後不與兒俱下而仍在腹作痛謂之兒枕其惡露下不快而作痛者胎中原無積聚不為兒枕也若惡露已盡或由它故腹痛如仲景枳實芍藥散證或由血虛腹痛如仲景當歸生薑羊肉湯證自當別論故復臚列諸名方於後若服枳實芍藥散不愈仍當求責瘀血也故下瘀血湯諸方附焉而補虛諸方終之不復立寒疝條金匱云産後腹痛煩滿不得臥枳實芍藥散主之枳實芍藥散方枳實燒令黑勿太過芍藥各等分上二味杵為散服方寸匕日三服並主癰膿以麥粥下之薛前證若因氣滯用延胡索散若因外寒用五積散若因怒氣用四物加木香柴胡若因血虛用四物參朮炮薑若因陽氣虛弱用四君當歸炮薑若因脾虛血弱用六君當歸炮薑治之一産婦患前證或作嘔或昏憒此脾氣虛寒用人參理中湯漸愈又以補中益氣湯加茯苓半夏全愈後復作痛而兼喘仍用補中益氣湯培補脾肺而瘥師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之下瘀血湯方大黃二兩桃仁二十枚蟅蟲二十枚熬去足上三味末之煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝保命方治血暈血結或聚於胸中或偏於小腹或連於脅肋四物湯四兩倍當歸川芎加鬼箭羽紅花玄胡各一兩同為粗末加下四味煎調沒藥散服虻蟲一錢去翅足炒水蛭一錢炒麝香少許沒藥三錢上為末入前藥調服血下痛止只服一服千金桃仁芍藥湯治産後腹痛桃仁半升芍藥川芎當歸桂心乾漆碎熬甘草各二兩細切水八升煮二升半分三服延胡索散治産後臍下痛延胡索桂心各半兩當歸一兩上為細末熱酒調下二錢香桂散治産後臍下疼痛不止川芎當歸各二錢半桂心半兩上為細末分為三服每服酒一盞煎三五沸更入童便少許煎至七分溫服甚者不過再服即瘥又方釜底墨醋炒令乾延胡索劉寄奴桂心菴䕡子上等分為末熱酒調下二錢紫金丸治産後惡露不快腰痛小腹如刺時作寒熱頭痛不思飲食亦治久有瘀血月水不調黃瘦不思飲食並能治之亦可療心痛與失笑散同五靈脂水淘去砂石焙乾稱炒為末真蒲黃上以好米醋調五靈脂慢火熬成膏次以蒲黃末搜和丸如櫻桃大每服一丸水與童便各半盞煎至七分令藥化溫服之少頃再一服惡露即下久有瘀血成塊月信不利者並用酒磨下當歸養血丸治産後惡血不散發渴心腹疼痛及惡露不快臍下急痛連及腰腳疼痛當歸赤芍藥牡丹皮延胡索各二兩桂心一兩為末煉蜜丸梧子大空心酒下三四十丸痛甚者細嚼下金匱産後腹中㽱痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足當歸生薑羊肉湯當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮白朮加生薑者亦加水五升煮取三升二合服之衍一婦人産當寒月寒氣入産門臍下脹滿手不得犯此寒疝也醫將治之以抵當湯謂其有瘀血也豫教之曰非其治也可服張仲景羊肉湯少減作二服遂愈産後六七日忽然臍腹痛皆由呼吸之間冷氣乘虛而入宜服當歸建中湯四順理中丸共研再丸作小丸飯飲吞下極妙仲景內補當歸建中湯治婦人産後虛羸不足腹中刺痛不止吸吸少氣或苦少腹中急痛引腰背不能飲食産後一月日得服四五劑為善令人強壯當歸四兩桂枝三兩芍藥六兩生薑三兩甘草二兩大棗十二枚上六味以水一斗煮取三升分溫三服一日令盡若大虛加飴糖六兩湯成內於火上暖令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成內阿膠服之濟生增損四物湯治産後陰陽不和乍寒乍熱惡露停滯亦令寒熱但看小腹急痛為異當歸酒浸白芍藥川芎人參各一兩甘草炙半兩乾薑一兩上㕮咀每服四錢薑三片水煎無時熱服千金治産後余疾腹中絞痛瘦乏不下食當歸黃耆芍藥各六分乾地黃白朮各八分桂心甘草各四分大棗十四枚上㕮咀水二升煮取八合空心服忌生蔥丹溪云局方五積散治産後余血作痛以蒼朮為君麻黃為臣厚朴枳實為使雖有當歸芍藥之補血僅及蒼朮三分之一不思産後之婦有何寒邪血氣未充似難發汗借曰藥性溫和可以推陳致新豈可用麻黃之悍附以蒼朮枳朴之散乎虛而又虛禍不旋踵矣附腸中癢治婦人産後腸中癢不可忍以針線袋安所臥褥下勿令人知又方取箭簳及鍭安所臥席下勿令婦知脅脹痛大産後兩脅脹滿氣痛由膀胱宿有停水因産後惡露下不盡水壅痞與氣相搏積在膀胱故令脅肋脹滿氣與水相激故令痛也薛前證若肝經血瘀用玄胡索散若肝經氣滯用四君青皮柴胡若肝經血虛用四物參朮柴胡氣血俱虛用八珍柴胡若腎水不足不能生肝用六味丸若肺金勢盛剋制肝木用瀉白散仍參前各論主之一産婦因怒兩脅脹痛吐血甚多發熱惡寒胸腹脹痛余以為氣血俱虛用八珍加柴胡丹皮炮薑而血頓止又用十全大補湯而寒熱漸退此證苟非用薑桂辛溫助脾肺以行藥勢不惟無以施其功而反助其脹耳經效療産後血氣脅肋脹痛當歸十二分芍藥苦梗檳榔枳殼各八分桂心青木香柴胡各六分上㕮咀以水二升煎取八合去滓空心分溫二服療産後惡露不下血氣壅痞脅脹痛不下食蘇木紫葛各十二分芍藥當歸各八分桂心蒲黃各六分生地黃汁三合上㕮咀以水二升煎取七合下蒲黃分兩服當歸散治産後腹痛脅肋脹滿當歸乾薑等分上為末每服三錢水一盞煎八分入鹽醋少許食前熱服選奇方用酒煎經效理血氣煩悶脅脅脹滿及痛芍藥八分蒲黃延胡索各四分當歸六分荷葉蒂炙三枚上水二升煎取七合後入蒲黃空心分作兩服廣濟療産後腹痛氣脹脅下悶不下食兼微利茯苓人參當歸甘草各六分生薑陳皮各四分厚朴八分上㕮咀以水二升煎取八合去滓分溫服抵聖湯治産後腹脅悶滿或嘔吐者赤芍藥半夏澤蘭葉陳皮人參甘草等分上㕮咀每四錢薑五片煎溫服腰痛大腎主腰腳産後腰痛者為女人腎位繫於胞産則勞傷腎氣損動胞絡虛未平復而風冷客之冷氣乘腰故令腰痛也若寒冷邪氣連滯背脊則痛久未已後忽有娠必致損動蓋胞絡屬腎腎主腰故也薛前證真氣虛邪乘之者用當歸黃耆湯或十全大補為主佐以寄生湯如不應用十全大補加附子一産婦腰痛腹脹善噫諸藥皆嘔余以為脾虛血弱用白朮一味炒黃每劑一兩米泔煎時飲匙許四劑後漸安百餘劑而愈療産後風冷腰痛不可轉側四肢沉重行步艱難獨活川芎芍藥炒黃桂心續斷生薑桑寄生各六分當歸防風各八分上㕮咀以水三升煮取一升去滓空心分二服千金大豆酒療産後中風腰背強痛中風煩熱苦渴頭身皆重此因風冷及傷寒所致用大豆五升炒令煙出以酒一升投之密蓋令溫去豆服一升日夜數服臥取微汗避風亦有加羌活服者亦佳生料五積散加桃仁煎亦妙保命治血癖腹乃刺刺腰痛用四物湯細末三兩加酒煮玄胡索末二兩每服三錢酒下廣濟療産後虛冷血氣流入腰腿痛不可轉敗醬當歸各八分川芎桂心芍藥各六分上㕮咀水二升煮取八合分溫二服忌蔥救急療婦人産後余血不盡血流入腰腳疼痛胸滿氣急兩脅痛方生薑一斤淡竹葉一升切上二味以水二升煮取一升去滓分溫二服生地黃湯廣濟療産後三日患腰疼腹中余血未盡並手腳疼不下食生地黃汁一升芍藥甘草各二兩丹參四兩蜜一合生薑汁半合上以水三升煮取一升去滓納地黃汁蜜薑汁微火煎一兩沸一服三合日二夜三利一兩行中間進食與藥更進服如神湯方見腰痛産後惡露方行忽然漸少斷絶不來腰中重痛下注兩股痛如錐刀刺痛入骨中此由血滯於經絡不即通之有大痛處必作癰疽宜桃仁湯恐作癰者預服五香連翹湯桃仁湯方桃仁去皮尖蘇木生地黃各半兩虻蟲去足翅炒水蛭炒各三十枚上為粗末每服三錢水一盞煎至六分去滓溫服無時惡露下即住服五香連翹湯方一方有大黃一兩木香沉香丁香乳香麝香升麻獨活桑寄生連翹木通各二兩共為粗末每服五錢水二盞煎一盞去滓入竹瀝少許溫服紫金丸治産後惡露不快腰痛小腹如刺寒熱腹痛久有瘀血月水不調亦可治心痛方見前當歸黃耆湯治産後腰痛不可轉側自汗壯熱身體強氣短黃耆芍藥各二兩當歸三兩上銼每服四錢薑四片水煎溫服頭痛大夫人頭者諸陽之會也凡産後五臟皆虛胃氣虧弱飲食不充穀氣尚乏則令虛熱陽氣不守上湊於頭陽實陰虛則令頭痛也又有産後敗血頭痛不可不知黑龍丹言之甚詳薛前證若中氣虛用補中益氣湯加蔓荊子若血虛用四物加參術血氣俱虛用八珍湯若因風寒所傷用補中益氣湯加川芎一産婦患頭痛日用補中益氣湯不缺已三年矣稍勞則惡寒內熱為陽氣虛以前湯加附子一錢數劑不發一婦人産後頭痛面青二年矣日服四物等藥余謂腎水不能生肝木而血虛用六味丸加五味子兩月而痊川芎散治産後頭痛真天台烏藥皮大川芎等分上為細末每服三錢燒紅稱錘淬酒調服一奇散治同前取當歸川芎為細末每服二錢水一盞煎七分溫服芎附散治産後敗血作梗頭痛諸藥不效者大附子一枚釅醋一碗用火四畔炙透蘸醋令盡去皮臍加川芎一兩併為末每服一錢又作二錢茶清調下郭茂恂嫂金華君産七日不食始言頭痛頭痛已又心痛作既而目睛痛如割如刺更作更止相去無瞬息間每頭痛甚欲取大石壓良久漸定心痛作則以十指抓壁血流滿掌痛定目復痛又以兩手自剜取之如是十日不已衆醫無計進黑龍丹半粒疾少間中夜再服下瞑目寢如平時至清晨下一行約三升許如蝗蟲子三疾減半巳刻又行如前則頓愈矣黑龍丹見前産後通用方丹一婦年三十餘産後身熱頭痛肚痛陳皮白朮白芍藥各二錢黃芩二錢半川芎一錢乾薑牡丹皮甘草各一錢半荊芥半錢上分四帖水煎服加減四物湯保命治産後頭痛血虛痰癖寒厥皆令頭痛蒼朮一兩六錢羌活川芎防風香附炒白芷各一兩石膏二兩半細辛一兩半當歸甘草各半兩上粗末每用一兩水煎不拘時服如有汗者知氣弱頭痛也方中加芍藥三兩桂一兩半生薑煎如痰癖頭痛加半夏三兩茯苓一兩生薑煎如熱痰頭痛加白芷三兩石膏三兩知母一兩如寒厥頭痛加天麻三兩附子一兩半生薑三片煎服腳氣大全産後熱悶氣上轉為腳氣者何答曰産臥血虛生熱復因春夏取涼過多地之蒸濕因足履之所以著為腳氣其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也可服小續命湯方見雜病中風兩三劑必愈若醫者誤以逐敗血藥攻之則血去而疾益增矣陳無擇評曰腳氣固是常病未聞産後能轉為者往往讀千金見産婦多有此疾之語便出是證文辭害意蓋可見矣設是熱悶氣上如何便服續命湯此藥本主少陽經中風非均治諸經腳氣要須依腳氣方論陰陽經絡調之此涉專門未易輕論既非産後要病更不繁引陳無擇雖有此論然小續命湯加減與之用無不效故百問云寒中三陽所患必冷小續命湯主之加生薑汁更快暑中三陰所患必熱小續命湯去附子減桂一半大煩躁者紫雪最良豫取百問中加減法庶使後人均得治療如無紫雪用真薄荷煎冷水嚼下婁云諸方必與四物湯各半服之薛前證當補氣血為主佐以小續命湯寄生湯如不應用大防風湯一産婦患前證或用獨活寄生湯而痊後復作服前湯其汗如水更加口噤吐痰余用十全大補湯培養血氣漸愈後飲食日少肌體日瘦吐痰如湧此命門火衰脾土虛寒用八味丸及加味歸脾湯諸證漸退肌肉漸生獨活寄生湯治肝腎虛弱或久履濕冷之地或洗足當風濕毒內攻兩脛緩縱攣痛痹弱或皮肉紫破足膝攣重又專治産後腳氣川獨活三兩桑寄生如無以續斷代杜仲炒牛膝去蘆酒浸細辛官桂不見火白茯苓防風川芎當歸人參熟地黃酒洗芍藥秦艽各二兩甘草炙一兩上為㕮咀每服四錢薑五片水煎溫服遍身疼痛大産後遍身疼痛者何答曰産後百節開張血脈流散遇氣弱則經絡肉分之間血多留滯纍日不散則骨節不利筋脈急引故腰背不得轉側手足不能動搖身熱頭痛也若醫以為傷寒治之則汗出而筋脈動惕手足厥冷變生他病但服趁痛散除之薛前證若以手按而痛甚是血滯也用四物炮薑紅花桃仁澤蘭補而散之若按而痛稍緩此是血虛也用四物炮薑人參白朮補而養之一産婦身腹作痛發熱不食煩躁不寐盜汗脅痛服解散祛血之藥不時昏憒六脈洪大如無用補中益氣加炮薑半夏一劑頓退二三又劑寢食甘美但背強而痛用八珍散大補湯調理而安一産婦遍身頭項作痛惡寒拘急脈浮緊此風寒之證也用五積散一劑汗出而愈但倦怠發熱此邪氣去而真氣虛也用八珍湯調補而痊一婦六月産後多汗人倦不敢袒被故汗出被裡冷則浸漬得風濕疼痛遂以羌活續斷湯數服而愈趁痛散云岐治産後氣弱血滯遍身疼痛及身熱頭疼牛膝當歸桂心白朮黃耆獨活生薑各半兩甘草薤白各二錢半上㕮咀每服半兩水參盞煎至一盞半去渣食前服陳無擇評曰趁痛散不特治産後氣弱血滯兼能治太陽經感風頭疼腰背痛自汗發熱若其感寒傷食憂恐驚怒皆致身疼發熱頭痛況有蓐勞諸證尤甚趁痛散皆不能療不若五積散入醋煎用卻不妨五積散加酒煎治感寒頭痛身疼方見傷寒門恐與四物各半服之穩當加桃仁煎治腰痛逐敗血去風濕大治産後遍身青腫疼痛及衆疾牛膝大麥糵各等分上為細末以新瓦罐子中填一重麥糵一重牛膝如此填滿用鹽泥固濟火煅過赤放冷研為散但是産後諸疾熱酒調二錢下活血丹蒼朮四物各半湯並見雜病身痛烏金散治産後骨節四肢疼痛見後狂言譫語中風大夫産後中風者由産時傷動血氣勞損腑臟未曾平復起早勞動致使氣虛而風邪乘虛入之故中風風邪冷氣客於皮膚經絡但疼痹羸乏不任少氣大凡筋脈挾寒則攣急喎僻挾溫則縱緩虛弱若入諸臟恍惚驚悸隨其所傷腑臟經絡而生病焉郭稽中論曰産後中風者何答曰産後五七日內強力下床或一月之內傷於房室或懷憂怒擾蕩沖和或因食生硬傷動臟腑得病之初眼澀口噤肌肉瞤搐漸至腰脊筋急強直者不可治此乃人作非偶爾中風所得也薛前證果外邪所屬形氣不足病氣有餘當補元氣為主稍佐以治病之藥若強力不休月內入房屬形氣俱不足當純補元氣多有復蘇者若誤投風藥乃促其危也丹産後中風口眼喎斜必用大補氣血然後治痰當以左右手脈分其氣血多少以治切不可作中風治用小續命湯及發表治風之藥防風湯治産後中風背項強急胸滿短氣防風獨活各去蘆葛根各五兩當歸人參各去蘆白芍藥甘草炙各二兩上為㕮咀每服八錢水一盞半棗子二枚掰破同煎至一盞去滓溫服不拘時川芎散治産後中風身背拘急有如繩束川芎羌活去蘆酸棗仁羚羊角屑芍藥各四兩桑白皮一兩半防風去蘆一兩二錢為㕮咀每服一兩水二大盞煎至一盞半去滓不拘時服日進三服經效茯苓湯治産後風虛頭痛語言謇澀茯苓去皮防風去蘆乾葛各八錢麥門冬去心一兩芍藥黃芩各六錢犀角屑四錢甘草炙二兩上㕮咀每服一兩水一大盞半煎至一盞去滓溫服不拘時鹿肉湯治産後中風頭痛壯熱言語謇澀鹿肉三斤阿膠炒脹黃芩茯神去木黃耆蜜炙甘草炙白芍藥人參獨活各去蘆各三兩桂心乾地黃川芎各二兩半夏湯洗一兩上為㕮咀每服五錢水四盞鹿肉五錢薑五片同煎至二盞去鹿肉再煎至盞半入阿膠消化去柤溫服不拘時日進二服云岐治産後中風半身手足不遂言語謇澀恍忽多忘精神不定獨活當歸芍藥防風川芎玄參天麻各五錢桂心三錢上㕮咀以水八升煮取二升半分為三服覺效更作一劑又作丸每服二十丸如有熱加葛根五錢有冷加白朮五錢若有氣證加生薑一兩半若手足不遂加牛膝一錢半萆薢三錢黃耆四錢若腹痛加當歸芍藥各七錢半若不食加人參五錢玄參一兩若寒中三陰所患必冷小續命湯加生薑煎若暑中三陽所患必熱小續命湯去附子減桂心一半加薄荷煎保命血氣湯治産後諸風痿攣無力秦艽羌活防風白芷川芎芍藥當歸白朮茯苓熟地黃各等分上為末一半蜜丸一半散酒調下五七十丸妙治産後風虛五緩六急手足頑痹氣血不調大豆一升炒令熟熱投三升酒中蜜封飲之小品治産後中風語澀四肢拘急羌活三兩為末每服五錢水酒各半盞煎去滓溫服華他愈風散治婦人産後中風口噤手足瘛瘲如角弓或産後血暈不省人事四肢強直或心眼倒築吐瀉欲死用荊芥穗微焙為末每服三錢豆淋酒調服或童子小便服之口噤則挑齒灌之齦噤則灌入鼻中其效如神大抵産後大眩則汗出而腠理疏則易於中風也時珍曰此方諸書盛稱其妙姚僧坦集驗方以酒服名如聖散云藥下可立待應效陳氏方名舉卿古拜散蕭存敬方用古老錢煎湯服名一捻金王貺指迷方加當歸等分水煎服許叔微本事方云此藥委有奇效神聖之功一婦人産後睡久及醒則昏昏如醉不省人事醫用此藥及交加散云服後當睡必以左手搔頭用之果然咱殷産寶方云此病多因怒氣傷肝或憂氣內郁或坐草受風而成急宜服此藥也戴氏證治要訣名獨行散賈似道悅生隨抄呼為再生丹上産後中風用續命湯及羌活等發散之藥必詳氣血以四物四君子相與各半停對分兩服之可也虛極生風大産後下血過多虛極生風者何答曰婦人以榮血為主因産血下太多氣無所主唇青肉冷汗出目眩神昏命在須臾者此但虛極生風也如此則急服濟危上丹若以風藥治之則誤矣薛前證若心脾血氣俱虛用十全大補湯如不應加附子釣藤鉤若肝經血虛用逍遙散加釣藤鉤經云脾之榮在唇心之液為汗若心脾二臟虛極急用參附湯救之一婦人患前證或用諸補劑四肢逆冷自汗泄瀉腸鳴腹痛余以陽氣虛寒用六君子薑附各加至五錢不應以參附各一兩始應良久不服仍腸鳴腹痛復灸關元穴百餘壯及服十全大補湯方效濟危上丹乳香五靈脂硫黃玄精石同研極細阿膠炒脹卷柏生用桑寄生陳皮去白各等分上將上四味同研停於銀石器內微火炒勿焦了再研極細後入余藥為末拌勻生地黃汁和丸如梧子大每服二十丸溫酒或當歸酒送下食前當歸建中湯見産後腹痛口噤大夫産後中風口噤者是血氣虛而風入於頷頰夾口之筋也手三陽之筋結入於頷産則勞損腑臟傷於筋脈風若乘之其三陽之筋脈則偏持之筋得風冷則急故令口噤也葛根湯治産後中風口噤仆地頭目眩暈痰盛氣急及治産後諸疾葛根生薑各六兩獨活四兩當歸三兩各去蘆甘草炙桂心白茯苓去皮石膏人參去蘆白朮防風各去蘆川芎各二兩上為㕮咀每服五錢水二盞煎至一盞半去滓溫服無時日進二服乾葛湯深師療産後中風口噤不能言獨活去蘆二兩乾葛一兩半甘草半兩炙生薑一兩二錢半上為㕮咀每服一兩水二大盞煎至一大盞去滓溫服無時天麻散治産後中風口噤天麻七錢半白附子炮天南星炮半夏湯洗七遍去滑薑製乾蠍炒各半兩上為細末每服一錢生薑薄荷酒調下斡開口灌之不拘時當歸散治婦人産後中風牙關緊急不省人事口吐涎沫手足瘛瘲當歸去蘆荊芥穗各等分上為細末每服二錢水一盞酒半盞煎至一盞灌之如牙關緊急斡開微微灌之但下咽即生屢用救人大有神效伏龍肝散治産後中風口噤不能語言腰背疼痛伏龍肝一兩半乾薑半兩炮為細末每服二錢溫酒調下不拘時日進二服交加散治産前後百病兼治婦人榮衛不通經脈不調腹中撮痛氣多血少結聚為瘕産後中風並宜服之生地黃一升研取自然汁生薑十二兩研取自然汁上先將地黃汁炒生薑滓生薑汁炒地黃滓各稍干焙為細末每服三錢溫酒調下尋常腹痛亦宜服産後尤不可離角弓反張大夫産後角弓反張者是體虛受風風入諸陽之經也入陰陽經絡周環於身風邪乘虛入於諸陽之經則腰背反折攣急如角弓之狀也薛前證因氣血耗損腠理不密汗出過多而患之者乃虛象也宜固氣血為主佐以本方丹溪云産後當大補氣血為先雖有他證以末治之如惡寒發熱等證乃氣血虛甚之極也宜大劑參耆歸朮肉桂以培養之如不應急用炮附子再不應用人參一兩炮附子二三錢名參附湯若猶未應乃藥力未能及也宜多用之愈風散當歸湯羌活酒並見前羚羊角散治産後中風身體反張羚羊角屑當歸各七錢半獨活防風各去蘆麻黃去節各一兩人參去蘆赤芍藥細辛去苗桂心各半兩上為㕮咀每服八錢水一大盞半生薑五片煎至一大盞去滓溫服不拘時小品療産後中風虛人不可服他藥者一物獨活湯主之及一物白鮮湯主之亦可與獨活合煮之川獨活三兩細切上水三升煮取一升分服耐酒者亦可酒水煮一物白鮮湯用白鮮皮亦依獨活法産後中風痙口噤面青手足急強者以竹瀝二升分為五服溫溫頻服大效治産後中風角弓反張口噤不語方川烏五兩銼如豆大上取黑豆半升同炒半黑以酒三升傾放鐺內急攪以絹濾取酒微溫服一小盞取汗若口不開者斡開口灌之未效加烏雞糞一合炒熟入酒中服之以瘥為度千金雞矢醴療産後中風及男子諸風併産後百疾神效方又治産後中風口噤拘困篤腰背強直時時反折烏雞屎三升大豆二升上先炒豆令聲絶次炒雞屎令黃以酒一升先淋雞屎取汁淋大豆每服一升重者凡四五服極妙張文仲療産後中風風痙遍身冷直口噤不識人方白朮四兩細切以酒三升煮取一升頓服效汗出多而變痙大産後血虛腠理不密故多汗因遇風邪搏之則變痙痙者口噤不開背強而直如髮間狀搖頭馬鳴身反折須臾十發氣息如絶宜速斡口灌小續命湯稍緩即汗止如兩手摸控者不可治也薛産後發痙因去血過多元氣虧極或外邪相搏以致牙關緊急四肢痙強或腰背反張肢體抽搐若有汗而不惡寒者曰柔痙若無汗而惡寒曰剛痙然産後患之實由亡血過多筋無所養而致故傷寒汗下過多潰瘍膿血大泄多患之乃敗證也若大補血氣多保無虞若攻風邪死無疑矣一産婦牙關緊急腰背反張四肢抽搐兩目連札余以為去血過多元氣虧損陰火熾盛用十全大補加炮薑一劑而蘇又數劑而安余在吳江史萬湖第入更時聞喧嚷云某家人婦忽僕牙關緊急已死矣詢云是新産婦出直廚余意其勞傷血氣而發痙也急用十全大補加附子煎滾令人推正其身一人以手夾正其面卻挖開其口將藥灌之不咽藥已冷令側其面出之仍正其面復灌以熱藥又冷又灌如此五次方咽下隨灌以熟藥遂蘇夷堅志云杜壬治郝質子婦産四日瘛瘲戴眼弓背反張壬以為痙病與大豆紫湯獨活湯而愈政和間余妻方分娩猶在蓐中忽作此證頭足反接相去幾二尺家人驚駭以數婢強拗之不直適記所云而藥草有獨活乃急為之召醫未至連進三劑遂能直醫至即愈矣更不須用大豆紫湯古人處方神驗屢矣小續命湯治産後中風及剛痙柔痙陳臨川云雖然陳無擇評曰産後汗出多變痙亦令服續命湯此又難信既汗多如何更服麻黃官桂防己黃芩輩不若大豆紫湯為佳局方大聖散亦良藥也愚觀朱奉議云凡剛柔二痙小續命湯並可加減與之若柔痙自汗者去麻黃加葛根之説朱奉議必有所據雖大豆紫湯大聖散良亦不可偏見曲説有妨古人之意大豆紫湯治中風頭眩惡風自汗吐冷水及産後百病或中風痱痙背強口噤直視煩熱脈緊大者不治小品方主産後中風困篤背強口噤或但煩躁或頭身皆重或身重癢發嘔吐直視並宜服之川獨活去蘆一兩半大豆半升酒三升上先用酒浸獨活煎一兩沸別炒大豆極焦煙出急投酒中密封候冷去豆每服一二合許得少汗則愈日進十服此藥能去風消血結如妊娠折傷胎死腹中服此得瘥陳臨川云凡産後口噤腰背強直角弓反張皆名曰痙又名曰痓古人察有汗無汗以分剛柔陰陽而治今産寶諸書有中風口噤一門又有角弓反張一門其實一也如憎寒發熱有類傷寒皆不論及豈可只以一二藥治之大豆湯治産後中風發則仆地不省人事及妊娠挾風兼治蓐草之間諸般病證大豆五升炒黃獨活去蘆葛根各八兩防己去皮六兩上㕮咀每服五錢酒二盞煎至一盞半去渣溫服不拘時日三服羚羊角飲子治産後氣實腹中堅硬兩脅脹滿心中煩熱渴欲飲水欲成剛痓中風之疾羚羊角半兩鎊防風羌活桔梗並去蘆敗醬各八錢桂心柴胡去蘆大黃浸過煨各一兩二錢為㕮咀每服五錢水一大盞半同煎至一盞去渣溫服不拘時候更服地黃酒用地黃切一升炒令黑瓷瓶中下熱酒三升密封口煮令減半任意服之防風當歸散防風當歸川芎地黃各一兩上銼每服一兩水三盞煎至二盞溫服婁氏云續命湯大豆紫湯舉卿古拜散太陽厥陰藥也邪實脈浮弦有力者固宜但産後血氣太虛之人不宜輕發其表但用防風當歸散治之為妙瘛瘲薛瘛者筋脈拘急也瘲者筋脈張縱也經云肝主筋而藏血蓋肝氣為陽為火肝血為陰為水前證因産後陰血去多陽火熾盛筋無所養而然耳故癰疽膿水過多金瘡出血過甚則陽隨陰散亦多致此治法當用八珍加丹皮釣藤以生陰血則陽火自退諸證自愈如不應當用四君芎歸丹皮釣藤以補脾土蓋血生於至陰至陰者脾土也故小兒吐瀉之後脾胃虧損亦多患之乃虛象也無風可逐無痰可消若屬陽氣脫陷者用補中益氣加薑桂陽氣虛敗者用十全大補加桂附亦有復生者此等證候若肢體惡寒脈微細者此為真狀若脈浮大發熱煩渴此為假象惟當固本為善若無力抽搐戴眼反折汗出如珠流者皆不治一産婦因勞兩臂不能屈服蘇合香丸肢體痿軟汗出如水余謂前藥辛香耗散真氣腠理虛而津液妄泄也先用十全大補湯加五味子補實腠理收斂真氣汗頓止又佐以四君子調補元氣漸愈用逍遙散大補湯調理而痊一産婦先胸脅乳內脹痛後因怒口噤吐痰臂不能伸小便自遺左三部脈弦余謂此肝經血虛而風火所致不能養筋先用加味逍遙散治之臂能屈伸又以補肝散六味丸諸證悉愈一婦人發瘛遺尿自汗面赤或時面青飲食如故肝脈弦緊余曰此肝經血燥風熱名瘛也肝主小便其色青人心則赤法當滋陰血清肝火遂用加味逍遙散不數劑諸證悉退而安一婦人産後血風患此以小續命湯數服而安産後因虛傷風瘛瘲同傷寒表證未傳入里宜服防風湯防風湯治風虛發熱項背拘攣關節不隨恍惚狂言來去無時不自覺悟亦治腳氣緩弱甚效此藥溫和不虛人秦艽去苗土獨活去蘆麻黃去節半夏湯洗七次切片防風去蘆各二兩升麻防己白朮石膏煅芍藥白者黃芩甘草當歸去蘆遠志去骨人參去蘆各一兩上為粗末入半夏片令勻每服四錢水二中盞生薑七八片煎至一盞去滓取清汁六分入麝香末少許食後臨臥帶熱服海藏愈風湯即華他愈風散交加散即當歸散並見産後中風增損柴胡湯治産後感異證手足牽搐涎潮昏悶柴胡三錢黃芩一錢二分人參甘草炙半夏各一錢半知母一錢石膏二錢黃耆二錢半上㕮咀分二服水二盞薑三片棗二枚煎八分不拘時服秦艽湯前證已去次服此藥去其風邪秦艽芍藥柴胡各一錢七分甘草炙一錢三分黃芩防風各一錢二分人參半夏各一錢上為㕮咀分二帖每帖水二盞薑三片煎八分食遠服拘攣大産後中風筋脈四肢攣急者是氣血不足臟腑俱虛月內未滿起早勞役動傷臟腑虛損未復為風所乘風邪冷氣初客於皮膚經絡則令人頑痹不仁羸乏少氣風氣入於筋脈挾寒則攣急也薛肝屬木而主筋前證若肝經風熱血燥用加味逍遙散如不應當用六味地黃丸以補腎水經云風客淫氣精乃亡邪傷肝也仍參前雜證諸風血方論治之一産婦筋攣臂軟肌肉掣動此氣血俱虛而自熱也用十全大補湯而安一産婦手麻服愈風丹遍身皆麻神思倦怠余謂氣血虛弱用十全大補加炮薑數劑漸愈去薑又數劑及逍遙散而痊芎藭散治産後中風四肢筋脈攣急疼痛背項強急芎藭羌活當歸各去蘆酸棗仁炒羚羊角屑各七錢半防風去蘆牛蒡子各一兩炒桂心赤芍藥各半兩上為㕮咀每服八錢水一大盞半煎至一大盞去柤溫服不拘時薛前方如未應當用八珍湯更不應用十全大補湯防己膏治産後中風四肢筋脈攣急身體麻痹並宜用之漢防已去皮半斤茵芋五兩上為㕮咀用酒五升浸藥一宿取豬肪脂一斤文武火熬三上三下成膏攤在紙花上貼病人患處以熱手不住摩膏上不語大人心有七孔三毛産後虛弱多致停積敗血閉於心竅神志不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故令不語但服七珍散薛經云大腸之脈散舌下又云脾之脈是動則病舌本強不能言又云腎之別脈上入於心系舌本虛則不能言竊謂前證若心腎氣虛用七珍散腎虛風熱地黃飲大腸風熱加味逍遙散加防風白芷脾經風熱秦艽升麻湯肝經風熱柴胡清肝散加防風白芷脾氣鬱結加味歸脾湯加升麻肝木太過小柴胡加釣藤鉤脾受土侮六君加升麻白芷釣藤鉤肝脾血虛用佛手散脾氣虛用四君子氣血俱虛八珍湯如不應用獨參湯更不應急加附子補其氣而生其血若竟用血藥則誤矣一産婦不語用七珍散而愈後復不語內熱晡熱肢體倦怠飲食不進用加味歸脾湯為主佐以七珍散而愈後因怒不語口噤腰背反張手足發搐或小便見血面赤或青或黃或時兼赤余曰面青肝之本色也黃者脾氣虛也赤者心血虛也用八珍湯加釣藤鉤茯苓遠志漸愈又用加味歸脾湯而痊七珍散人參石菖蒲生地黃川芎各一兩細辛一錢防風辰砂別研各半兩上為極細末每服一錢薄荷湯調下無時胡氏孤鳳散治産後閉目不語用生白礬末每服一錢熱水調下治産後不語人參石蓮肉不去心石菖蒲各等分上每服五錢水煎逐血補心湯治産後失音不語紅花赤芍藥生地黃桔梗蘇葉前胡茯苓防風牛膽南星黃連粉葛各二錢當歸三錢薄荷人參升麻各一錢五分半夏二錢五分甘草一錢上銼為散分作二服每服水一盅半薑三片煎至七分空心服滓再煎服狂言譫語大夫産後語言顛倒或狂言譫語如見鬼神者其源不一須仔細辨證用藥治療産後驚風言語亂道如見鬼神精神不定者研好硃砂酒調下龍虎丹方見局方三丸作一服兼琥珀地黃丸服之一則因産後心虛敗血停積上干於心而狂言獨語者當在乍見鬼神條求之二則産後臟虛心神驚悸志意不安言語錯亂不自覺知神思不安者當在驚悸條求之三則宿有風毒因産心虛氣弱腰背強直或歌哭嗔笑言語亂道當作風痙治療當在心驚中風條求之四則産後心虛中風心神恍惚言語錯亂當在中風恍惚倏求之五則産後多因敗血迷亂心經而顛狂言語錯亂無常或暈悶者當於本卷血暈類中求之六則因産後感冒風寒惡露斬然不行憎寒發熱如瘧晝日明瞭暮則譫語如見鬼狀當作熱入血室治之宜琥珀地黃丸及四物湯只用生乾地黃加北柴胡等分煎服如不退者以小柴胡湯加生乾地黃如黃芩分兩煎服愈雖然以上諸證大抵胎前産後自有專門一定之法毫髮不同如産後首當逐散生新然後仔細詳辨疾證不可妄立名色自生新意加減方藥大宜對證依古法施治未有不安者也薛前證當固胃氣為主而佐以見證之藥若一於攻痰則誤矣一産婦形體甚倦時發譫語用柏子散稍愈又用加味歸脾湯而愈又因怒仍狂言脅痛小便下血用加味逍遙散以清肝火養肝血頓瘥又佐以加味歸脾湯而安云岐奪命散血暈治産後敗血衝心發熱狂言奔走脈虛大者乾荷葉生乾地黃牡丹皮等分上三味濃煎湯調生蒲黃末二錢匕一服即定局方妙香散治産後心神顛倒語言錯亂如見鬼神用生乾地黃當歸二味煎湯調服立效烏金散治産後三五日或半月之間忽狂言亂語目見神鬼等證當歸遠志肉川芎酸棗仁白朮赤芍藥香附子辰砂另研入熟地黃羌活防風各二錢茯神二錢半半夏三錢全蠍麥門冬人參牛膝天麻各一錢甘草九分陳皮白芷各一錢五分上銼散作二服水一盅半薑三片蔥三枝入金銀同煎一碗不拘時溫服四物補心湯治産後言語恍惚顛倒錯亂當歸五錢川芎生地黃白芍藥茯神半夏桔梗白朮各四錢陳皮三錢甘草一錢上銼為散分作六服每服用水一盅薑三片煎至七分空心溫服滓再煎服有熱加酒炒黃連二錢無熱不用顛狂大療産後因驚敗血衝心昏悶發狂如有鬼祟宜用局方大聖澤蘭散宜自合者方有效加好辰砂研令極細每服加一字許煎酸棗仁湯調下一服可安薛前證乃血虛神不守舍非補養元氣不可仍參後各門互用一産婦患前證或用大澤蘭湯而愈後又怔忡妄言其痰甚多用茯苓散補其心虛頓愈又用八珍散加遠志茯神養其氣血而瘥一産婦亦患此證用化痰安神等藥病益甚神思消爍余以為心脾血氣不足用大劑參朮芎歸茯神酸棗仁四斤余而安乃以歸脾湯五十餘劑而愈大聖澤蘭散治婦人血海虛冷久無子息及産後敗血衝心中風口噤子死腹中掰開口灌藥須臾生下便得無恙治墮胎腹中攻刺疼痛橫生逆産胎衣不下血運血癖血滯血崩血入四肢應血臟有患及諸種風氣或傷寒吐逆咳嗽寒熱往來遍身生瘡頭痛惡心經脈不調赤白帶下乳生惡氣胎臟虛冷數曾墮胎崩中不定因此成疾室女經脈不通並宜服之常服暖子宮和血氣悅顏色退風冷消除萬病兼療丈夫五勞七傷虛損等病澤蘭葉石膏研各二兩卷柏去根白茯苓去皮防風去廬厚朴去粗皮薑汁炙細辛去苗柏子仁微炒桔梗吳茱萸湯洗七次焙炒各一兩五味子揀淨人參藁本去苗乾薑炮川椒去目閉口微炒出汗白芷白朮黃耆去苗川烏頭炮去皮臍丹參各七錢半蕪荑微炒赤甘草炙川芎芍藥當歸各一兩七錢半白薇阿膠碎炒燥各半兩肉桂一兩二錢半生乾地黃一兩半上為細末每服二錢空心臨臥熱酒調下若急疾不拘時日三服何氏方治産後因敗血及邪氣入心如見祟物顛狂大辰砂一二錢重研令極細人乳三四茶腳許調仍掘紫項活地龍一條入藥候地龍滾三滾取出地龍不用不令帶藥出但欲得地龍身上涎耳卻入無灰酒與前乳汁相和七八分盞重湯溫遇疾作分三二服乍見鬼神大心主身之血脈因産傷耗血脈心氣虛則敗血停積上干於心心不受觸遂致心中煩躁臥起不安乍見鬼神言語顛錯醫人不識呼為風邪如此治疾必不得愈但服調經散每服加龍腦一捻得睡即安薛前證若敗血停滯用調經散若血虛發熱用八珍加炮薑若心血虛損用柏子仁散大抵此證皆心脾血少所致但調補胃氣則痰清而神自安矣若果系鬼祟所附即灸鬼哭可愈其或不起者多因豁痰降火攻伐之過也一産婦患前證或用調經散愈而復作仍服前藥益甚痰涎上湧朝寒暮熱余朝用八珍散夕用加味歸脾湯各五十餘劑而愈云岐治産後發熱狂言奔走脈虛大者四物湯加柴胡如不愈加甘草柴胡生地黃等分煎服亦可廣濟治産後血暈心悶不識人神言鬼語氣急欲絶見血暈調經散沒藥琥珀並細研桂心各一錢芍藥當歸各二錢半麝香研細辛各半錢上為末每服半錢生薑汁溫酒各少許調服茯神散治産後血邪心神恍惚言語失度睡臥不安茯神一兩去皮木人參龍齒研虎珀研赤芍藥黃耆牛膝各七錢半生地黃一兩半桂心半兩上為末每服三錢水一盞煎至七分不拘時去渣溫服治方産一日言語顛倒用蘇合香丸一錢以童便調服即蘇柏子仁散治産後狂言亂語皆因內虛敗血挾邪氣攻心柏子仁遠志去心人參桑寄生防風琥珀別研當歸焙生地黃焙甘草各等分上為粗末先用白羊心一個切片以水一大盞半先煮至九分去羊心入藥末五錢煎至六分去渣無時服與前顛狂譫語門參看驚悸大産後臟虛心神驚悸者由體虛心氣不足心之經為風邪所乘也或恐懼憂迫令心氣受於風邪邪搏於心則驚不自安若驚不已則悸動不定其狀目睛不轉而不能動診其脈動而弱者驚悸也動則為驚弱則為悸矣薛按人之所主者心心之所主者血心血一虛神氣不守此驚悸所由作也當補氣血為主一産婦患前證二度服琥珀地黃丸局方妙香散隨效再患服之其症益甚而脈浮大按之如無發熱惡寒此血氣俱虛用十全大補加味歸脾二湯各百餘劑而愈後遇驚恐勞怒復作仍服前藥而安大産後心悶氣絶眼張口噤遍身強直腰背反偃狀如癇疾心忪驚悸言語錯亂皆是宿有風毒因産心氣虛弱發成風痙薛按仲景先生云有汗為柔痙用桂枝湯無汗為剛痙用麻黃湯然産後得此血氣俱乏之敗證也不可與傷寒例看丹溪先生云産後當大補氣血為主可用十全大補湯以補元氣如不應急加附子更不應是藥力弗逮也仍用參附湯多服余常治大虛之證參耆數斤附子數枚方愈一産婦患此不省人事言語妄甚惡風寒喜熱飲形氣倦怠脈虛浮無力余謂血氣虛寒用十全大補湯二十餘劑不應又二十餘劑稍緩乃漸加附子至一錢服數劑諸證減一二又二十餘劑十退三四乃去附子五分數劑諸證頓退而安又發仍服前藥加附子三五分而愈白茯苓散治産後心神驚悸言語失常心神昏憒白茯苓去皮熟地黃人參去蘆各一兩半遠志去心白芍藥黃耆去蘆桂心當歸炒去蘆甘草炙麥門冬各一兩去心石菖蒲桑寄生各七錢半上為㕮咀每服八錢水一大盞半生薑五片棗三枚竹葉三七片煎至一大盞去渣溫服無時熟乾地黃散治産後心虛驚悸神思不安熟乾地黃二兩黃耆去蘆白薇龍齒另研各一兩人參去蘆茯神去木羌活遠志肉各七錢半桂心防風去蘆甘草炙各半兩上為㕮咀每服五錢水一大盞半生薑五片棗三枚煎至一大盞去渣溫服不拘時一方無黃耆有荊芥産乳七寶散初産後服之調和血氣補虛安心神鎮驚悸硃砂水飛桂心當歸去蘆川芎人參去蘆白茯苓去皮羚羊角燒存性各二錢乾薑一錢為細末每服一錢用羌活豆淋酒調下將護産婦用之不飲酒用清米飲調下如覺心煩熱悶以麥門冬去心煎湯調下若心下煩悶而痛用童便調下若覺心胸煩熱即減薑桂覺寒卻加之腹痛加當歸心悶加羚羊角心虛氣怯加桂心不思飲食或噁心加人參虛煩加茯苓以意斟酌日二夜一服之海藏大效牡丹散治血臟虛風及頭目不利不思飲食手足煩熱肢節拘急疼痛胸膈不利大腸不調陰陽相干心驚怯悸或時旋暈牡丹皮川芎枳殼麩炒各一兩陳皮玄胡索甘草羌活半夏湯洗各半兩木香訶子肉芍藥各七錢半三稜炒乾薑炮桂心各五錢當歸一兩半白朮炒三錢上為細末每服二錢水一盞半煎五七沸食前溫服益血海退血風勞攻注消寒痰實脾胃理血氣攻刺及氣虛惡寒潮熱證至妙遠志丸治産後臟虛不足心神驚悸志意不安腹中急痛或時怕怖夜臥不安遠志麥門冬各去心黃耆當歸炒人參白朮獨活各去蘆白茯苓去皮桂心柏子仁石菖蒲熟乾地黃山茱萸鍾乳粉阿膠碎炒各一兩上為細末煉蜜和搗五七百下丸如梧桐子大每服三十丸溫酒送下不拘時候日進二服白茯苓丸治産後心虛驚悸神志不安白茯苓去皮熟乾地黃各一兩人參去蘆桂心遠志去心石菖蒲柏子仁琥珀各半兩另研細上為細末煉蜜和搗三二百下丸如梧子大每服三十丸不拘時粥飲送下上方俱用桂中無熱而脈遲且微者宜之人參散治産後臟腑虛心怔驚悸言語錯亂人參去蘆麥門冬去心各八錢牛黃研白薇各二錢茯神去木獨活防風各去蘆遠志去心生地黃硃砂水飛天竺黃另研甘草炙龍齒研各四錢龍腦另研麝香細研各一錢上為細末每服二錢薄荷酒調下不拘時琥珀地黃散治血虛多驚及産後敗血諸疾辰砂琥珀沒藥並細研當歸各等分上為細末每服二錢空心白湯調下日三服茯苓散療産後狂語志意不定精神昏亂心氣虛風邪所致茯苓一方用茯神生地黃各三兩遠志白薇龍齒各二兩五錢防風人參獨活各二兩以上共為末上以銀一大斤水一斗五升煮取七升下諸藥煮取三升溫分三服忌菘菜豬肉生冷一方治産後風邪所幹心神恍惚志意不定加荊芥二兩甘草一兩二錢半療産後多虛羸弱若大汗利皆至於死此重虛故也若中風語謬昏悶不知人者宜服此人參茯苓羌活大棗遠志各二兩竹瀝一升上用水六升煮取三升下竹瀝更煎取二升半分三服抱膽丸治産後血虛驚氣入心及顛癇風狂或室女經脈通行驚邪蘊結水銀二兩黑鉛一兩半硃砂一兩另細研乳香一兩另細研上將黑鉛入銚子內溶化下水銀結成砂子次下硃砂滴乳末乘熱用柳木槌研勻丸如芡實大每服一丸空心金銀薄荷湯化下得睡切莫驚動覺來即安妙香散亦善恍惚大産後中風恍惚者由心主血血氣通於榮衛臟腑遍循經絡産則血氣俱傷五臟皆虛榮衛不足即為風邪所乘則令心神恍惚不定也薛前證當大補血氣為主而佐以後方為善蓋風為虛極之假象也固其本源諸病自退若專治風則速其危矣一産婦患前證盜汗自汗發熱晡熱面色黃白四肢畏冷此氣血俱虛用八珍湯不應更用十全大補加味歸脾二湯始應後因勞怒發厥昏憒左目牽緊兩唇抽動小便自遺余謂肝火熾盛用十全大補加釣藤山梔而安再用十全大補湯辰砂遠志丸而愈千金療産後暴苦心悸不定言語錯亂恍惚皆因心虛所致茯苓三兩芍藥二兩甘草桂心當歸各一兩生薑一兩半麥門冬去心一升大棗三十枚上為散水三升煎取一升去渣分作兩服經效療産後心虛忪悸志意不定煩躁恍惚茯神當歸黃芩麥門冬去心甘草人參芍藥酸棗仁白鮮皮各三兩大棗七枚上為粗末水二升煮取七合去渣溫服琥珀散治産後中風恍惚語澀心神煩悶四肢不隨琥珀另研茯神去木各一兩遠志去心石菖蒲黃耆防風獨活人參各去蘆麥門冬去心芎藭桑寄生赤芍藥羚羊角屑各半兩甘草二錢半炙上為㕮咀每服五錢水一中盞半煎至一大盞去渣溫服不拘時遠志散治産後中風心神恍惚言語錯亂煩悶睡臥不安遠志去心防風去蘆各一兩麥門冬去心酸棗仁炒桑寄生獨活去蘆桂心當歸去蘆炒茯神去木羚羊角屑各七錢半甘草炙半兩上為㕮咀每服五錢煎服法同前天麻丸療産後中風恍惚語澀四肢不隨天麻硃砂水飛防風羌活去蘆各一兩殭蠶炒七錢半乾蠍炒白附子炮五靈脂炒各半兩雄雀糞炒牛黃另研各二錢半上為細末糯米飯為丸如梧子大每服二三十丸薄荷酒送下日進二服辰砂遠志丸主産後中風消風化痰安神鎮心石菖蒲遠志肉甘草煮人參茯神去木辰砂各五錢川芎山藥鐵粉麥門冬去心細辛天麻半夏湯泡南星白附子各一兩上為末薑汁煮糊丸如緑豆大別以硃砂為衣每服三十丸夜臥生薑湯吞下虛煩薛論見發熱條四物湯加獲神遠志治産後虛煩十全大補湯尤效大余血奔心蓋是分解了不便與童子小便並擀心下及臥太速兼食不相宜之物所致但能依方療之無不痊可療産後余血不盡奔衝心煩悶腹痛川芎生乾地黃枳殼芍藥各等分為末上酒服方寸匕日二服集驗療産後血氣煩方千金同生地黃汁清酒各一升上相和煎一沸分為兩服廣濟療血氣煩悶方生藕汁飲二升效竹瀝亦得療産後七日內宿血不散時時衝心迷悶荷葉一兩七錢半延胡索二兩地黃汁二合上水二升煮二味取八合下延胡索分三服空心忌肉食一日療産後余血攻心或下血不止心悶面青冷氣欲絶羊血一盞頓服若不定更服立效經效療産後氣虛冷搏於血血氣結滯上衝心腹脹滿當歸桂心川芎吳茱萸橘皮生薑各一兩芍藥二兩上㕮咀以水三升煮取一升去渣空心服治産後余血奔心用陳白梅捶碎渴煎湯飲金黃散治産後惡血衝心時發煩躁玄胡索蒲黃各半兩桂心二錢半上為細末烏梅煎湯冷調下二錢沒藥丸治産後心胸煩躁惡血不快沒藥研蠻薑延胡索乾漆炒當歸桂心牛膝牡丹皮乾薑各等分上為細末醋煮麵糊丸如梧桐子大煎曲湯下十丸至十五丸補遺治産後余血衝心煩悶腹痛用蒲黃不以多少隔紙炒每一錢東流水煎湯調下又失笑散亦佳治産後短氣欲絶心中煩悶竹葉湯竹葉切細麥門冬小麥各一升甘草一兩生薑二兩大棗十二枚上切以水一斗煮竹葉小麥至八升去渣納余藥煮取三升去渣溫服虛悸加人參二兩少氣力加糯米五合甘竹茹湯治産後內虛煩熱短氣方甘竹茹一升人參茯苓甘草各一兩黃芩三兩上㕮咀以水六升煮取二升去渣分三服日三人參當歸湯治産後去血過多血虛則陰虛陰虛生內熱令人心煩短氣自汗頭痛熟地黃人參去蘆當歸身去蘆肉桂去粗皮麥門冬去心各二錢白芍藥炒二錢半血熱甚者加生地黃二錢水二盅粳米一合竹葉十片煎至一盅食遠服薤白湯治産後胸中煩熱逆氣方薤白半夏甘草人參各一兩栝蔞根二兩麥門冬半升上㕮咀以水一斗三升煮取四升去渣分五服日三夜二熱甚加知母一兩云岐治産後虛煩不得眠芍藥梔豉湯芍藥當歸梔子各五錢香豉半合上如梔子豉湯修服産後傷寒便同下後變證此方雖云岐法不若仲景酸棗湯穩當仲景二物黃芩湯婦人在草褥自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之小柴胡湯見傷寒少陽病黃芩一兩苦參二兩乾地黃四兩上三味以水八升煮取二升溫服一升多吐下蟲婦人産中虛煩亂嘔逆安中益氣竹皮大丸主之生竹茹石膏各二分桂枝白薇各一分甘草七分上五味末之棗肉和丸彈子大每以飲服一丸日三夜二服有熱者倍白薇煩喘者加柏實一分陳尋常治諸虛煩熱者以竹葉石膏湯溫膽湯殊不知産後與尋常不同如石膏等藥不宜輕用用之必死經驗方治産後煩躁禹餘糧一枚狀如酸餡者入地埋一半四面築緊用炭一稱發頂火一斤煅去火三分耗二為度用濕沙土罨一宿方取出打去外面一層只用里內細研水淘澄五七度將紙襯干再研數千遍用甘草煎湯調二錢匕一服立效渴熊産後心煩發渴宜清心連子飲雜病白濁薛前證若出血過多虛火上炎用童子小便或四物白朮麥門丹皮若胃氣虛而有熱用竹葉歸耆湯若血虛發熱用八珍加麥門五味若血脫髮熱煩躁用當歸補血湯若胃氣虛弱用補中益氣湯或七味白朮散一産婦患前證朝寒暮熱肚腹作痛以手按之不痛余以為血氣俱虛用八珍之類治之彼反行逐血更加發熱煩躁余用當歸補血湯熱躁漸止用八珍麥門五味氣血漸復熟地黃湯治産後虛渴不止少氣腳弱眼眩飲食無味熟地黃酒洗淨蒸焙一錢半人參去蘆麥門冬去心各二錢栝蔞根二錢甘草炙半錢上作一服水二盅糯米一撮生薑三片紅棗三枚同煎至一盅不拘時服産寶療産後大渴不止蘆根切一升栝蔞人參甘草茯苓各三兩大棗二十枚麥門冬生四兩上以水九升煮取三升分三服頓服四劑即瘥忌菘菜黃芩散楊氏治産後血渴飲水不止黃芩麥門冬各等分㕮咀每服三錢水盞半煎至八分去渣溫服無時栝蔞根湯集驗療産後血渴栝蔞根四兩麥門冬去心人參各三兩生乾地黃甘草各二兩土瓜根五兩大棗二十枚産寶無地黃麥門冬有牡蠣粉等分㕮咀以水八升煮取二升半分三服千金竹葉湯療産後虛渴少氣力竹葉三升甘草人參茯苓各一兩小麥五合生薑半夏各三兩麥門冬五兩大棗十五枚上㕮咀以水九升先煮竹葉小麥薑棗取七升去渣納藥再煎取二升去渣一服五合日三夜一七味白朮散治中氣虛弱津液短少口乾作渴或因吐瀉所致者人參白朮炒木香白茯苓甘草炒藿香乾葛各一錢上水煎服竹葉歸耆湯治胃氣虛弱口乾作渴惡冷飲食者竹葉一錢半黃耆二錢白朮人參當作各一錢麥門冬去心七分甘草炒五分上水煎服玄胡索散治産後失血渴不止鬱金乾葛桂心青皮枳殼玄胡索上各等分以好醋浸一宿焙乾末之每服二錢陳皮湯調下日三夜一桃花散治産後不煩而渴新石灰一兩黃丹五錢上為細末渴時井水調下一錢本治産後出血太多虛煩發渴用真正蒲黃末二錢白湯調下如渴燥甚井花水下治産後中風煩渴用紅花子五合微炒研碎以水煎濃徐徐呷之療血渴及産後渴疾用蓮子心生取為細末米飲調下二錢效自汗大夫虛汗不止者由陰氣虛而陽氣加之裡虛表實陽氣獨發於外故汗出也血為陰産則傷血是為陰氣虛也氣為陽其氣實者陽加於陰故令汗出而陰氣虛弱不復者則汗出不止也凡産後血氣皆虛故多汗因之遇風則變成痙縱不成痙亦虛乏短氣身體柴瘦唇口乾燥久則經水斷絶由津液竭故也薛按前證屬血氣俱虛急用十全大補湯如不應用參附耆附等湯若汗多亡陽發痙尤當用前藥王海藏先生云頭汗出至頸而還額上偏多蓋額為六陽之所會也由虛熱熏蒸而出竊謂前證當以部位分之額左屬肝額右屬肺鼻屬脾頤屬腎額屬心治者審之一産婦略聞音響其汗如水而昏憒諸藥到口即嘔余以為脾氣虛敗用參附末為細丸時含三五粒隨液咽下乃漸加之至錢許卻服參附湯而痊一産婦盜汗不止遂致廢寐神思疲甚口乾引飲余謂血虛有熱用當歸補血湯以代茶又以當歸六黃湯納黃芩連柏炒黑倍加人參五味子二劑而愈大凡産後忽冒悶汗出不識人治用雞子及竹瀝二法見前血暈薛前證屬大虛宜固元氣為主其汗不止必變柔痙東垣先生云婦人分娩及半産漏下昏冒目瞑蓋因血暴亡而火上熾但補其血則神自昌若常時血下當補而升舉其氣陽得血而神安則目明矣今立一方以補手足厥陰之血兼益陽氣名曰全生活血湯全生活血湯治發熱自汗盜汗目䀮䀮四肢無力口乾頭暈行步欹側升麻芍藥炒各三錢柴胡當歸防風羌活獨活葛根甘草炒各二錢川芎藁本各一錢五分生地黃熟地黃各一錢細辛蔓荊子各五分紅花三分上每服五錢水煎熱服麻黃根散二方治産後虛汗不止當歸黃耆麻黃根牡蠣煅為粉人參粉草各等分上㕮咀每服四錢水一盞煎至七分去渣溫服又方當歸黃耆各一兩麻黃根二兩上㕮咀每服三錢水一盞煎七分去渣服千金療産後風虛汗出不止小便難四肢拘急難以屈伸甘草炙一兩附子半個炮去皮尖桂心芍藥各一兩半上㕮咀每服三錢水一盞生薑四片棗一枚煎七分去渣空心溫服忌豬肉冷水生蔥等物經效療産後汗出不止黃耆十二分白朮牡蠣煅茯苓防風麥門冬去心生地黃各八分大棗七枚上㕮咀水二升煮取七合去渣空心分溫兩服療産後血氣暴虛汗出淡竹葉煎湯三合微溫服之須臾再服又方馬齒莧研取汁三大合煮一沸投蜜匙許冷停頓服無新者用乾者煮汁入蜜服止汗散治産後盜汗不止一應汗多者皆可服牡蠣煅研粉小麥面炒令黃色碾為粉上等分和勻煮生豬肉汁調下二錢無時人參湯治産後諸虛不足發熱盜汗人參當歸各等分上為末以豬腰子一隻去脂膜切小片子以水三升糯米半合蔥白兩條煮米熟取清汁一盞入藥二錢煎至八分溫服不拘時當歸六黃湯治氣血虛熱盜汗不止不應加人參白朮心血不足加酸棗仁炒當歸熟地黃自制黃耆炒各二錢生地黃黃柏炒黑黃芩炒黑黃連炒黑各一錢上水煎服參附湯治陽氣虛寒自汗惡寒或手足逆冷大便自利或臍腹疼痛吃逆不食或汗多發痙等證人參一兩附子炮五錢上作一服薑棗水煎徐徐服去人參加黃耆名耆附湯耆附湯治陽氣虛脫惡寒自汗或口噤痰湧四肢逆冷或吐瀉腹痛飲食不入及一切虛寒等證黃耆一兩附子炮五錢上作一劑薑棗水煎服如不應倍加附子方得全濟當歸補血湯見前十全大補湯見下虛羸黃疸丹治一婦人四月內産發黃四肢倦怠食少經事不來時發熱脈弦白朮一兩人參秦艽牡丹皮生地黃木通柴胡芍藥各半兩川芎黃芩乾葛各一錢甘草五分上分十二帖水煎食前熱服發熱薛産後虛煩發熱乃陽隨陰散氣血俱虛若惡寒發熱煩躁作渴急用十全大補湯若熱愈甚急加桂附若作渴面赤宜用當歸補血湯若誤認為火證投以涼劑禍在反掌王太僕先生云如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止不時而熱是無火也當治其心如大熱而甚寒之不寒是無水也熱動復止攸忽往來時動時止是無水也當助其腎故心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不勝寒是無火也寒不勝熱是無水也治法前證無水者六味丸無火者八味丸氣血俱虛者八珍湯與十全大補湯大尹俞君之內産後發熱晡熱吐血便血兼盜汗小便頻數胸脅脹痛肚腹痞悶余曰此諸臟虛損也治當固本為善自恃知醫用降火之劑更加瀉利腸鳴嘔吐不食腹痛足冷始信余言診其脈或浮洪或沉細或如無其面或青黃或赤白此虛寒假熱之狀時雖仲夏當舍時從證先用六君子湯加炮薑肉桂數劑胃氣漸復諸證漸退更佐以十全大補湯半載全愈儒者楊敬之內人所患同前但唾痰涎或用溫補化痰之劑不應面色黧黑兩尺浮大按之微細此因命門火虛不能生脾土脾土不能生諸臟而為患也用八味丸補土之母而痊一婦産後三日起早況氣血未定遂感身熱目暗如風狀即以清魂散二服得微汗而愈滑伯仁治一産婦惡露不行臍腹痛頭疼寒熱衆皆以為感寒溫以薑附益大熱手足搐搦語譫目攛診其脈弦而洪數面赤目閉語喃喃不可辨舌黑如炲燥無津潤胸腹按之不勝手蓋燥劑搏其血內熱而風生血蓄而為痛也曰此産後熱入血室因而生風即先為清熱降火治風涼血兩服頗爽繼以琥珀牛黃等稍解人事後以張從正三和散行血破瘀三四服惡露大下如初時産已十日矣於是諸證悉平一婦盛暑月中産三日發熱其脈虛疾而大惡露不行敗血攻心狂言叫呼奔走拿捉不住以乾荷葉生地黃牡丹皮濃煎湯調下生蒲黃二錢一服即定惡露旋下而安一婦産後時發昏瞀身熱汗多眩暈口渴或時頭痛惡心醫用四物涼血之劑病不減又用小柴胡病益甚石山至診得浮洪搏指汪曰産後而得是脈又且汗多而脈不為汗衰法在不治所幸者不喘不泄耳其脈如是蓋涼藥所激也用人參三錢黃耆二錢甘草當歸各七分白朮門冬各一錢乾薑陳皮黃芩各五分煎服五劑脈斂而病漸安王僉憲宜人産後因沐浴發熱嘔惡渴欲引冷水瓜果譫語若狂飲食不進體素豐厚不受補醫用清涼熱增劇診得六脈浮大洪數汪曰産後暴損氣血孤陽外浮內真寒而外假熱宜大補氣血與八珍湯加炮薑八分熱減大半病人自以素不宜參耆不肯再服過一日復大熱如火復與前劑潛加參耆炮薑連進二三服熱退身涼而愈當歸養血丸産後腹痛當歸黃耆湯腰痛當歸補血湯當歸散並見胎自墮半産條大全人參湯見上自汗羅氏犀角飲子治産後亡津液虛損時自汗出發熱困倦唇口乾燥犀角麥門冬白朮各半兩柴胡一兩枳殼麩炒地骨皮生地黃甘草炒當歸人參茯苓黃芩黃耆各七錢上㕮咀每服四錢薑三片浮麥七十粒水煎服三之一湯治産後虛勞發熱日久不安柴胡黃芩人參半夏川芎當歸芍藥熟地黃甘草各一錢半作一服水二盅薑三片紅棗一枚煎一盅無時服三分散治産後日久虛勞發熱川芎當歸芍藥熟地黃白朮白茯苓黃耆各一錢柴胡人參各一錢半黃芩半夏甘草各半錢上作一服水二盅生薑三片紅棗一枚煎至一盅食前服加味逍遙散治産後發熱口乾作渴唇裂生瘡當歸白芍藥乾葛各二錢生地黃川芎黃芩各一錢半人參九分麥門冬九分柴胡一錢烏梅二個甘草六分上銼散分作二服用水一盅煎至染分空心服婁産後發熱多屬虛寒惟乾薑加入補藥中神效此丹溪法也人參當歸湯治産後去血過多血虛則陰虛陰虛則生內熱心胸煩滿呼吸短氣頭痛悶亂晡時轉甚與大病後虛煩相類方見前産後虛煩往來寒熱郭産後乍寒乍熱者何答曰陰陽不和敗血不散能令乍寒乍熱産後血氣虛損陰陽不和陰勝則乍寒陽勝則乍熱陰陽相乘則或寒或熱若因産勞傷臟腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫人若誤作瘧疾治之則謬矣陰陽不和宜增損四物湯敗血不散宜奪命丹又問二者何以別之時有刺痛者敗血也但寒熱無他證者陰陽不和也增損四物湯不一皆隨病加減薛産後寒熱因氣血虛弱或脾胃虧損乃不足之證經云陰虛則發熱陽虛則惡寒若兼大便不通尤屬氣血虛弱切不可用發表降火若寸口脈微名陽氣不足陰氣上入於陽中則惡寒用補中益氣湯尺部脈弱名陰氣不足陽氣下陷於陰中則發熱用六味地黃丸大抵陰不足陽往從之則陽內陷而發熱陽不足陰往從之則陰上入而惡寒此陰陽不歸其分以致寒熱交爭故惡寒而發熱也當用八珍湯若病後四肢發熱或形氣倦怠此元氣未復濕熱乘之故耳宜補中益氣湯若肌熱大渴引飲目赤面紅此血虛發熱用當歸補血湯若認為實則誤矣一産婦惡寒發熱用十全大補加炮薑治之而愈但飲食不甘肢體倦怠用補中益氣而安又飲食後犯怒惡寒發熱抽搐咬牙難候其脈視其面色青中隱黃欲按其腹以手護之此肝木侮脾土飲食停滯而作用六君加木香一劑而安一産婦惡寒發熱余欲用八珍加炮薑治之其家知醫以為風寒用小柴胡湯余曰寒熱不時乃氣血虛也不信仍服一劑汗出不止譫語不絶煩熱作渴肢體抽搐余用十全大補湯二劑益甚脈洪大重按如無仍以前湯加附子四劑稍緩數劑而安吳茭山治一婦人産後去血過多食後著惱頭疼身痛寒熱如瘧左手弦大微有寒邪右手弦滑不勻食飲痰火也二者因虛而得宜養正祛邪遂以茯苓補心湯去地黃加羌活青皮蔥棗三服汗出身涼其患漸瘥然後以八物湯調理半月後全愈一婦産後惡露未盡瘀血入絡又感寒邪身熱如瘧即以生料五積散五帖惡露自下而寒熱除又一婦産後惡露未盡因起抹身寒氣客於經絡乍寒乍熱脈緊而弦以蔥白散二帖安一少婦初産四日冷物傷脾胃但覺身分不快嘔逆飲食少思心腹滿悶時或腹脅刺痛晨惡寒晚潮熱夜則恍惚譫語晝則抽搐頗類風狀變異多端諸醫莫測或作虛風或云血凝實熱用甘溫而行血以寒涼退實熱如此半月不效汪至見醫滿座亦踞縮診其脈弦而緊遂令按之小腹急痛知瘀血未盡也思患者大勢惡露已下未必還有餘血偶因寒涼所傷瘀血停滯下焦日久客於經絡所以變生諸證須得大調經散倍入琥珀化諸惡血成水其患方愈遂合前藥服之五日後行惡水鬥許臭不可近患人覺倦病勢漸減然後以人參養榮湯數十帖月餘如初云産後往來寒熱四物內加小柴胡湯保治日久虛勞微有寒熱脈沉而數宜柴胡四物湯川芎當歸芍藥熟地黃各一錢半柴胡八錢人參黃芩甘草半夏各三錢上為末水煎服云産後往來寒熱脈弦者少陽也小柴胡加生地黃湯柴胡二兩黃芩五錢人參三錢半夏一兩半湯洗大棗三枚生地黃梔子枳殼麩炒各五錢上如前煎服增損柴胡湯治産後虛發寒熱飲食少腹脹柴胡人參甘草半夏陳皮川芎白芍藥各等分為㕮咀上每服三錢薑五片棗二枚水同煎食後日二服增損四物湯方見本卷腹痛評曰乍寒乍熱榮衛不和難以輕議若其敗血不散豈止入脾肺二臟邪大抵一陰閉一陽即作寒熱陰勝故寒陽勝故熱只可云敗血循經流入閉諸陰則寒閉諸陽則熱血氣與衛氣解則休遇再會而復作大調經散五積散入醋煎佳云岐熟地黃散治産後蓐勞皆由體虛氣力未壯勞復所起四肢煩疼時發寒熱不思飲食熟地黃人參白芍藥白茯苓白朮續斷各一兩黃耆桂心五味子當歸川芎各七錢半大全方有麥門冬七錢半上㕮咀每服四錢薑三片棗一枚水煎服一方無桂心五味續斷有柴胡黃芩半夏各七錢半作散黃耆丸治産後蓐勞寒熱進退頭目眩痛骨節痠疼氣力羸乏黃耆鱉甲當歸炒各一兩桂心白芍藥續斷川芎牛膝蓯蓉沉香柏子仁枳殼各七錢半五味子熟地黃各半兩共為細末上煉蜜和丸梧子大每服四五十丸食後粥飲下大調經散治産後血虛惡露未消氣為敗濁凝滯榮衛不調陰陽相乘憎寒發熱或自汗或腫滿皆氣血未平之所為也大豆一兩半炒去皮茯神一兩真琥珀一錢上為細末濃煎烏豆紫蘇湯調下加減烏金散治産後寒熱似瘧厚朴柴胡黃芩麻黃各二錢陳皮當歸川芎桔梗茯苓各一錢五分桂枝蒼朮白芷枳殼各一錢羌活草果半夏各二錢甘草九分白芍藥熟地黃各一錢五分上銼為散分作兩服每服用水一盅半薑三片蔥三莖煎至一盅不拘時服有汗多當歸川芎白芍藥熟地黃有脹多厚朴陳皮有熱多柴胡黃芩有寒多蒼朮草果桂枝有痰多半夏桔梗茯苓有頭痛多川芎白芷羌活有瀉去枳殼甘草不用如方用有餘血塊在腹作潮熱疼痛加三稜莪朮多用玄胡索八角蘹香遍身痛加羌活獨活寒熱往來加黃芩柴胡産寶療産後惡寒壯熱一夜三五度發惡語口中生瘡時時乾嘔困乏悶絶人參獨活白鮮皮葛根防風青竹茹遠志各一兩半茯神二兩白斂二兩半玄參三兩竹瀝二升半上取銀一斤水一斗五升煮取七升下諸藥重煮取三升分溫三服忌魚酒濕面等知母湯治産後乍寒乍熱通身溫壯胸心煩悶知母三兩芍藥黃芩各二兩桂心甘草各一兩以上為㕮咀上水五升煮取二升半分三服一方不用桂心用生地黃瘧婁産後瘧疾多由汙血挾寒熱而作大法宜柴胡四物湯調之熱多者草果飲子寒多者生熟飲子薛産後瘧疾因脾胃虛弱飲食停滯或因外邪所感或鬱怒傷脾或暑邪所伏審系飲食用六君加桔梗蒼朮藿香如外邪多而飲食少用藿香正氣散如外邪少而飲食多用人參養胃湯飲食勞役用補中益氣湯氣血虛弱用十全大補加炮薑虛寒用六君加薑桂元氣脫陷急加附子大凡久瘧多屬元氣虛寒蓋氣虛則寒血虛則熱胃虛則惡寒陰火下流則寒熱交作或吐瀉不食腹痛煩渴發熱譫語或手足逆冷寒戰如栗雖見百證當峻溫補其病自退若誤用清脾截瘧之類多致不起一産婦患瘧發熱作渴胸膈脹滿遍身作痛三日不食咽酸嘔氣此是飲食所傷脾胃不能消化用六君加神麯山楂四劑而不作酸乃去神麯山楂又數劑而飲食進其大便不通至三十五日計進飲食七十餘碗腹始悶令用獵膽汁導而通之其糞且不甚燥一産婦患瘧久不愈百病蜂起其脈或洪大或微細或弦緊或沉伏難以名狀用六君加炮薑二十餘劑脈證稍得又用參術煎膏佐以歸脾湯百餘劑而瘥一産婦朝寒暮熱或不時寒熱久不愈用六君子補中益氣兼服百餘劑而尋愈草果飲子治婦人産後瘧疾寒熱相半者或多熱者宜此半夏湯泡赤茯苓甘草炙草果炮去皮川芎陳皮白芷各二錢青皮去白良薑紫蘇各二錢半乾葛四錢上㕮咀每服三錢水一大盞薑三片棗二個同煎至七分去渣當發日侵早連進三服無有不安生熟飲子治産後瘧疾多寒者肉豆蔻草果仁厚朴生去粗皮半夏陳皮甘草大棗去核生薑上八味等分細銼和勻一半生一半用濕綿紙裹煨令香熟去紙與一半生者和勻每服稱五錢重水二盞煎至七分食前一服食後一服補遺産後瘧疾熱多寒少者清脾湯寒多熱少者養胃湯久而不已者七寶飲截之方並見雜病瘧蓐勞夫産後蓐勞者此由生産日淺血氣虛弱飲食未平復不滿日月氣血虛羸將養失所而風冷客之風冷搏於氣血則不能溫於肌膚使人虛乏勞倦乍臥乍起顏容憔悴食飲不消風冷邪氣而感於肺肺受微寒故咳嗽口乾遂覺頭昏百節疼痛榮衛受於風邪流注臟腑須臾頻發時有盜汗寒熱如瘧背膊煩悶四肢不舉沉重著床此則蓐勞之候也又曰婦人因産理不順疲極筋力憂勞心慮致令虛羸喘乏寒熱如瘧頭痛自汗肢體倦怠咳嗽痰逆腹中絞刺名曰蓐勞薛按前證當扶養正氣為主用六君子湯加當歸若脾肺氣虛而咳嗽口乾用補中益氣加麥門五味若因中氣虛而口乾頭暈用補中益氣加蔓荊子若肝經血虛而肢體作痛用四物參術若因肝腎虛弱而自汗盜汗寒熱往來者用六味丸加五味子若因脾虛血弱肚腹作痛月經不調用八珍湯倍加白朮若因脾虛血燥皮膚瘙癢用加味逍遙散大抵此證多因脾胃虛弱飲食減少以致諸經疲憊而作當補脾胃飲食一進精氣生化諸臟有所倚賴其病自愈矣仍參虛煩發熱方論主治汪一婦産未滿月因怒氣血流如水三日方止隨又勞苦四肢無力睡而汗出日晡潮熱口乾五心如炙諸醫皆用柴芩薄荷之類其熱愈熾診其脈弦大無力此蓐勞也以四物湯一兩入胡黃連秦艽青蒿各半錢數服熱退身涼後以黃連八珍丸一料而安石子湯療産後虛羸喘乏乍寒乍熱如瘧四肢疼痛面色痿黃名曰蓐勞豬石子一雙去脂膜四破香豉一方無此有知母蔥白切粳米當歸芍藥各二兩上㕮咀分兩劑每劑用水三升煮取一小碗去渣分三服廣濟無芍藥有人參增損柴胡湯見前往來寒熱豬腰子粥治蓐勞發熱用豬腰子一枚去白膜切作柳葉片以鹽酒拌先用粳米一合入蔥椒煮粥鹽醋和將腰子鋪碗底以熱粥蓋之如作盦生狀空心服人參鱉甲散治蓐勞皆由在産內未滿百日體中虛損血氣尚弱失於將理或勞動作傷致成蓐勞其狀虛羸乍起乍臥飲食不消時有咳嗽頭目昏痛發歇無常夜有盜汗寒熱如瘧背膊拘急沉困在床服此大效人參桂心當歸桑寄生白茯苓白芍藥桃仁麥門冬去心熟地黃甘草各半兩續斷二錢半牛膝七錢半鱉甲黃耆各一兩上為細末每服先以豬腎一對去筋膜以水兩大盞生薑半分棗三枚煎至一盞去豬腎薑棗然後入藥末二錢蔥白三寸烏梅一個荊芥五穗煎至七分去渣空心晚食前溫服此藥神妙許仁則療産後日淺久坐視聽言語多或運用氣力遂覺項膊肢節皮肉痛乍寒乍熱此為蓐勞豬腎一雙去脂膜四破當歸芍藥生薑各二兩蔥白切桂心各一兩上水八升煮腎取六升下藥煮取二升分溫二服熟地黃散見前往來寒熱白茯苓散治蓐勞緣生産日淺久坐多語運動用力致頭目四肢疼痛寒熱如瘧狀宜此白茯苓一兩當歸川芎桂心白芍藥黃耆人參各半兩熟乾地黃一兩㕮咀先以水二盞入豬腎一雙去脂膜切薑三片棗三枚煎一盞去三物入藥半兩煎七分去渣食前分溫三服黃耆丸往來寒熱胡氏牡丹散治産後虛羸發熱自汗欲變蓐勞或血氣所搏經候不調或寒熱羸瘦白芍藥當歸五加皮地骨皮人參各半兩沒藥桂心各二錢牡丹皮三錢上為細末每服二錢水酒各半盞如不飲酒只用水一盞開元錢一枚麻油蘸之同煎七分去渣通口服煎不得攪吃不得吹黃耆煮散治産後蓐勞肌膚黃瘦面無顏色或憎寒壯熱四肢痠疼心煩頭痛鱉甲醋炙黃耆各一兩桂心當歸炒桑寄生白茯苓白芍藥人參熟地黃麥門冬去心甘草炙各半兩牛膝七錢半上為細末每服用豬石子一對去脂膜切破先以水一盞入薑半分棗三枚煎至七分去石子薑棗卻下藥五錢更煎至四分去渣空心晚食前溫服二渣並煎黃耆建中湯治産後諸虛不足發熱或惡寒腹痛黃耆炒肉桂各一兩白芍藥炒二兩甘草炒七錢每服五錢薑棗水煎服日二三服虛甚者加附子紫河車丸治蓐勞及産後虛弱大效貓犬産兒即食其胞衣故無産疾方見虛勞虛羸産寶云産後虛羸者皆由産後虧損血氣所致須當慎起居節飲食六淫七情調養百日庶保無疾若中年及難産者毋論日期必須調養平復方可涉喧否則氣血復傷虛羸之證作矣薛前證産傷氣血者用八珍湯飲食傷胃者用四君子湯停食傷脾者用六君子湯勞傷元氣者用補中益氣湯若噯氣覺有藥味者此藥復傷胃也但用四君子湯徐徐少飲以調脾胃若胃氣一健血氣自生諸證自愈矣丹産後補虛人參白朮各一錢黃耆歸身尾各五分川芎半兩陳皮三分上水煎服如有寒加乾薑三分茯苓一錢保命三元湯治産日久虛勞而脈浮大者即小柴胡合四物也治産後日久虛勞針灸不效者三合散此四君子四物小柴胡三方合和是也白朮川當歸芍藥黃耆茯苓熟地黃各一兩柴胡人參各一兩半黃芩半夏甘草各六錢川芎一兩上為粗末每服一兩水一盅半煎服日三當歸羊肉湯治産後雖無疾者但覺虛弱兼心腹痛肥羊肉一斤去脂水一斗煮取八升去肉當歸五兩黃耆四兩生薑六兩上以肉汁煮三味取二升五合分為四服若覺惡露不盡加桂三兩惡露下多加芎三兩有寒加茱萸一兩有氣加細辛二兩有熱加生地黃汁二合保命治産婦虛勞不能食十全散即十全大補湯十全大補湯治諸臟虧損氣血俱虛惡寒發熱或自汗盜汗便血吐血或大便不實飲食少思或胸腹作痛口舌生瘡或耳目不明牙齒不固人參白朮白茯苓黃耆當歸熟地黃酒洗蒸焙白芍藥炒川芎各一錢肉桂甘草炙各五分上薑棗水煎服當歸建中湯見前腹痛云岐治産後虛損飲食不下四物加建中人參白朮茯苓主之療産後大虛心腹急痛血氣上搶心氣息乏補益方黃耆白朮當歸人參甘草各二兩生薑四兩先以白羊肉三斤去膜水一斗九升煮肉取汁五升下諸藥煮三升分三服冷勞大夫産則血氣勞傷臟腑虛弱而風冷客之冷搏於血氣血氣不能溫於肌膚使人虛乏疲頓致羸損不平復若久不平復風冷入於子臟則胞臟冷使人無子薛前證若血氣虛弱用八珍湯血氣虛寒用十全大補湯胃氣虛弱用補中益氣湯脾氣虛弱用六君子湯命門火衰用八味丸肝脾血虛用加味逍遙散肝脾鬱怒用加味歸脾湯産寶療産後風虛羸瘦勞弱不生肌肉黃耆當歸芍藥人參各三分桂心甘草川芎生薑各四分大棗十二枚上九味水七升煮三升分溫三服療産後虛勞骨節疼痛頭痛汗不出當歸人參生薑各二兩黃耆三兩淡豉三合豬腎二枚粳米三合薤白三合上水一斗五升先煮豬腎取六升下諸藥煮取二升分為三服又方豬腎一雙煮入蔥豉作臛如常食之痞悶郭問産後口乾痞悶者何答産後榮衛大虛血氣未定食麵太早胃不能消化面毒結聚於胃脘上熏胸中是以口乾燥渴心下痞悶醫者不識認為胸膈壅滯以藥下之萬不得一但服見晛丸則愈陳無擇評曰産後口乾痞悶未必只因食麵或産母內積憂煩外傷燥熱飲食甘肥使口乾痞悶當隨其所因調之可也心煩宜四物湯去地黃加人參烏梅煎若外傷燥熱看屬何經當隨經為治難以備舉飲食所傷見晛丸卻能作效薛前證若宿食停滯用六君枳實神麯若因肉食所致更加山楂若因魚鱠之類再加陳皮其物既消而仍痞或反作痛作嘔此脾胃受傷用六君子湯或咽酸噯腐加炮薑作瀉更加升麻如不應佐以四神丸或間用補中益氣湯一婦人食角黍煩渴痞悶腹痛大便欲去不去服消導之藥不應飲食日減肌體日瘦半年矣余謂此食積為患用大酒麴炒為末溫酒調服二錢俄而腹鳴良久仍下粽而愈一婦人食魚鮓腹痛患痢諸藥不應用陳皮白朮等分為末以陳皮湯送下數劑而愈見晛丸薑黃炒三稜醋炒畢澄茄陳皮去白良薑人參蓬莪朮酒炒各等分上為細末用蘿蔔搗爛絞取汁煮麵糊丸如梧子大每服三十丸蘿蔔湯下白湯亦可腹脹郭産後腹脹滿悶嘔吐不定者何答曰敗血散於脾胃脾受之則不能運化精微而成腹脹胃受之則不能受納水穀而生吐逆醫者不識若以尋常治脹止吐藥治之病與藥不相干轉更傷動正氣疾愈難治但服抵聖湯則愈薛前證若敗血傷於脾胃宜用前方若飲食停於脾宜用六君厚朴若飲食傷於胃宜用六君子湯大凡損其脾者當節其飲食為善一産婦患前證或用抵當湯敗血已下前證益甚小腹重墜似欲去後余謂此脾氣虛而下陷用補中益氣湯加炮薑溫補脾氣重墜如失又用六君子湯而安抵聖湯入生薑半兩焙乾水煎方見胎前腹脹薛氏云此方最宜用之局方平胃散加人參亦可水腫郭産後四肢浮腫者敗血乘虛停積循經流入四肢留淫日深卻還不得腐壞如水故令面黃四肢浮腫醫人不識便作水氣治之凡治水多用導水藥極虛人夫産後既虛又以藥虛之是謂重虛往往多致夭枉但服小調經散血行腫消則愈陳無擇曰産後浮腫多端有自懷妊腫至産後不退者亦有産後失於將理外感寒暑風濕內則喜怒憂驚血與氣搏留滯經絡氣分血分不可不辨要當隨所因脈證治之宜得其情小調經散治血分固效但力淺難憑不若吳茱萸湯枳朮湯奪魂散大調經散皆要藥也又論曰夫産後勞傷血氣腠理虛則為風邪所乘邪搏於氣不得宣越故令虛腫輕浮是邪搏於氣氣腫也若皮膚如熟李狀則變為水腫氣腫者發汗即愈水腫者利小便瘥也潔古如産後風寒在表面目四肢浮腫宜局方七聖丸白湯下日加以利為度如浮腫至膝喘嗽加木香檳榔倍之謂氣多也如浮腫又頭痛昏冒加羌活川芎謂風多也如只浮腫止七聖丸本方服東垣中滿分消丸雜病脹滿用四物湯吞之丹産後腫必用大補氣血為主少佐以蒼朮茯苓使水自利薛前證若寒水侮土宜養脾肺若氣虛浮腫宜益脾胃若水氣浮腫宜補中氣當參雜證本門主治一産婦飲食少思服消導之劑四肢浮腫余謂中氣不足朝用補中益氣湯夕用六君子湯而愈後因怒腹脹誤服沉香化氣丸吐瀉不止飲食不進小便不利肚腹四肢浮腫用金匱加減腎氣丸而愈一産婦泄瀉四肢面目浮腫喘促惡寒余謂脾肺虛寒用六君加薑桂而泄瀉愈用補中益氣而脾胃健杜張宣徽侍寵産後半月忽患浮腫急召産科醫治經半月不瘥病勢轉劇召杜治之杜至曰諸醫作何病張曰皆雲水氣浮腫杜曰非也且水氣發咳嗽小便澀是也今愛寵小便不澀不作咳嗽惟手足寒乃血臟虛氣塞不通流面生浮腫遂用益血和氣藥治之旬日病去七八經半月全愈所用之藥乃靈苑方牡丹散也其方云治血臟風虛冷今産科家多用此藥治産後諸病如神更名損金湯者是也牡丹散見血暈一婦産後四肢浮腫寒熱往來蓋因敗血流入經絡滲入四肢氣喘咳嗽胸膈不利口吐酸水兩脅疼痛遂用旋覆花湯微汗漸解頻服小調經用澤蘭梗煎湯調下腫氣漸消大調經散治産後腫滿喘急煩渴小便不利方見産後寒熱小調經散沒藥琥珀桂心芍藥當歸各一錢細辛麝香各半錢上為細末每服半錢薑汁溫酒各少許調停服治産後遍身青腫疼痛及産後血水疾出婦人經驗方乾漆大麥糵等分上各為細末以新瓦罐子中鋪一重麥糵一重乾漆如此填滿用鹽泥固濟火煅通赤放冷研為散但是産後諸疾熱酒調下二錢經云産後肌浮柑皮酒服橘皮為末每服二錢酒調白朮湯治心腹堅大如盤邊如旋盤水飲所作名曰氣分枳實一兩半白朮三兩上㕮咀每服四錢水一盞半煎至七分去滓溫服腹中耎即當散也丹婦人産後浮腫小便少口渴惡寒無力脈皆沉此體虛而有濕熱之積必上焦滿悶宜補中導水行氣可也白朮二兩半陳皮一兩川芎半兩木通六錢茯苓三錢上用水煎下與點丸二十五丸黃芩為末粥丸名與點丸亦名清金丸奪魂散治産後虛腫喘促利小便則愈生薑三兩取汁白麵三兩大半夏七枚上以生薑汁搜麵裹半夏為七餅子煨焦熟為末水調一盞小便利為效張氏方治産後血虛風腫水腫澤蘭葉防己等分上為末每服二錢溫酒調下不飲者醋湯調亦可漢防己散此藥虛人戒服漢防己豬苓枳殼桑白皮各一兩商陸甘草各七錢半上為粗末每服四錢水一盞半薑三片煎至七分去滓空心溫服七聖丸雜病大便不通加減吳茱萸湯治婦人臟氣本虛宿挾風冷胸膈滿痛腹脅絞刺嘔吐噁心飲食減少身面虛浮惡寒戰栗或泄瀉不止少氣羸困及因生産臟氣暴虛邪冷內勝宿疾轉增吳茱萸一兩半苦梗乾薑甘草麥門冬防風半夏細辛當歸赤茯苓牡丹皮桂心各半兩上為粗末每服四錢水一盞半煎至七分去滓食前熱服金匱加減腎氣丸方見雜病水腫加味八物湯治産後遍身浮腫氣急潮熱人參白茯苓熟地黃小蘹香各三錢白朮川芎各四錢當歸白芍藥香附子各五錢甘草黃芩柴胡各一錢上銼散分作六七服每服水一盅半薑三片煎至七分空心熱服盡此藥方服調經丸若肚痛加延胡索乾漆枳殼各三錢若嘔吐噁心加良薑砂仁各二錢若手足麻痹加肉桂一錢半若咳嗽加五味子款冬花杏仁積聚血瘕即兒枕宜參看大夫積者陰氣也五臟所生聚者陽氣也六臟所成皆由飲食不節寒熱不調致五臟之氣積六腑之氣聚積者痛不離其部聚者其痛無有常處所以然者積為陰氣陰性沉伏故痛不離其部聚為陽氣陽性浮動故痛無常處産後血氣傷於臟腑臟腑虛弱為風冷所乘搏於臟腑與血氣相結故成積聚癥塊也薛前證乃真氣虧損邪氣乘之況産後得之尤當固真氣為主若求旦夕之效而攻其邪則速其危矣當參前雜證積聚諸方論治之一産婦腹中似有一塊或時作痛而轉動按之不痛面色痿黃痛則㿠白脈浮而澀余謂此肝氣虛而血弱也不信乃用破血行氣痛益甚轉動無常又認以為血鱉專用破血驅逐之藥痛攻兩脅肚腹尤甚益信為鱉確服下蟲等藥去血甚多形氣愈虛肢節間各結小核隱於肉裡以為鱉子畏藥而走於外余曰肝藏血而養諸筋此因肝血復損筋涸而攣結耳蓋肢節胸項皆屬肝膽部分養其脾土補金水以滋肝血則筋自舒遂用八珍湯逍遙散歸脾湯加減調治而愈一婦月經不調兩拗腫脹小便澀滯腹中一塊作痛或上攻脅腹或下攻小腹發熱晡熱惡寒肌膚消瘦飲食無味殊類瘵證久而不愈余謂肝脾血氣虧損用八珍湯逍遙散歸脾湯隨證互服而愈大新産後有血與氣相搏而痛者謂之瘕瘕之言假也謂其痛浮假無定處也此由夙有風冷血氣不治至産血下則少故致此病也不急治則多成積結妨害月水輕則痞澀重則不通也薛前證乃寒邪乘客氣血壅結此因氣病而血病也當補養胃氣調和月經寬緩靜養為善難經云任脈之病男子為七疝女子為瘕聚當參前後各論治之丹南山婦人年三十八於九月二十三日月經行比前過後十日得草藥以敗血海為下胎之謀有數滴血下因此腹痛在小腹下有塊如碗大不可按湯尉則痛稍定大小便抽痛小便澀大便略下少赤積垢食不進口略渴發熱此胃氣為草藥所敗加以受傷之血妄行而不得泄所以為病也砂仁甘草炙川芎黃芩各三分滑石一錢半牛膝二錢桃仁七粒上水酒煎服芍藥湯保命治産後諸積不可攻宜養陰去熱其病自安芍藥一斤黃芩茯苓各六兩上銼散每以半兩水煎溫服日三丹産後消血塊滑石三錢沒藥血竭各二錢上為細末醋糊丸如惡露不下以五靈脂為細末麵糊丸白朮湯陳皮湯任下又方消血塊香附童便浸桃仁去皮留尖等分為末醋糊丸治血瘕作痛臍下脹滿或月經不行發熱體倦當歸二兩桂心芍藥血竭蒲黃炒各一兩半延胡索炒一兩上為末每服二錢空心熱酒調下葛氏方治證同前桂心為末每服一錢空心酒調下産寶療血瘕痛無定處童便三升生地黃汁生藕汁各一升生薑汁三升上先煎前三味約三分減二次下薑汁慢火煎如稀餳每服取一合暖酒調下千金療血瘕先乾地黃一兩烏賊魚骨二兩上為細末空心溫酒調服二錢匕四神散治産後瘀血不消積聚作塊心腹切痛川芎當歸去蘆乾薑炮赤芍藥各等分上為細末每服二錢食遠用溫酒調服桂心丸治産後血氣不散積聚成塊上攻心腹或成寒熱四肢羸瘦煩疼桂心當歸赤芍藥牡丹皮沒藥檳榔各半兩青皮乾漆炒煙盡各七錢半大黃桃仁去皮尖三稜煨玄胡索鱉甲酥炙厚朴制各一兩上為細末煉蜜和丸梧子大每服三四十丸食前用溫酒送下霍亂大産後霍亂氣血俱傷臟腑虛損或飲食不消觸冒風冷所致陰陽不順清濁相干氣亂於腸胃之間真邪相搏冷熱不調上吐下痢故曰霍亂也經云渴而飲水者五苓散寒多不飲水者理中丸大段虛冷者加附子來復丹亦妙薛一産婦停食霍亂用藿香正氣散之類已愈後胸腹膨脹飲食稍過即嘔吐或作瀉余謂此脾胃俱虛用六君子湯加木香治之漸愈後因飲食失調兼恚怒患霍亂胸腹大痛手足逆冷用附子散又用八味丸以補土母而康設泥痛無補法而用辛散或用平補之劑必致不起一産婦吐瀉咽酸面目浮腫此脾氣虛寒先用六君加炮薑為主佐以越鞠丸而咽酸愈又用補中益氣加茯苓半夏而脾胃康白朮散治産後霍亂吐利腹痛煩渴手足逆冷白朮橘紅麥門冬去心乾薑人參各一兩甘草半兩為粗末每服四錢水一盞生薑五片煎去渣溫服溫中散治産後霍亂吐瀉不止人參白朮當歸草豆蔻仁乾薑各一兩厚朴一兩半制上為粗末每服三錢水煎服附子散療産後霍亂不止手足逆冷附子炮白朮當歸吳茱萸洗桂心人參丁香橘紅甘草各半兩上為細末每服二錢粥飲調下不拘時高良薑散治産後霍亂吐利腹中㽱痛良薑當歸草豆蔻仁上等分為細末每服二錢用粥飲調下上二方非真寒不可用局方參苓白朮散療産後霍亂吐利身熱帶渴者良方見雜病泄瀉若吐逆不受湯藥以伏龍肝細末三錢米湯調下即受余詳雜病霍亂門嘔吐大夫胃為水穀之海水穀之精以為血氣榮潤臟腑因産則臟腑傷動有時而氣獨盛者則氣乘腸胃腸胃燥澀其氣則逆故嘔逆不下食也薛前證若因飲食過時用四君子湯飲食過多用六君子湯飲食過時而兼勞役用補中益氣若因飲食停滯用人參養胃湯脾胃氣虛用六君子湯胃氣虛寒加炮薑木香寒水侮土用益黃散肝木侮脾土用六君升麻柴胡命門火衰不能生土用八味丸嘔吐泄瀉手足俱冷或肚腹作痛乃陽氣虛寒急用附子理中湯多有生者一産婦朝吐痰夜發熱晝夜無寐或用清痰降火肌體日瘦飲食日少前證愈甚余曰早間吐痰脾氣虛也夜間發熱肝血虛也晝夜無寐脾血耗也遂用六君子湯加味逍遙散加味歸脾湯以次調理而痊開胃散治産後胃氣不和嘔吐不止全不納食宜服此訶子肉一兩半人參一兩甘草半兩上三味為細末別以半夏半分生薑一分薤白二七莖水一大盞煎至六分去渣分為兩服療産後嘔逆不止鄭知縣傳橘紅一兩半夏曲甘草各半兩藿香三兩上為細末每服二錢水一盞半薑三片煎至六分溫服無時治産後更無他疾但多嘔逆不能食白朮一兩二錢半生薑一兩半上細切酒水各二升煎取一升分三服産後嘔逆不已四君子湯加陳皮半夏藿香砂仁石蓮散治産後咳逆嘔吐心怔目暈石蓮子去殼一兩半白茯苓一兩丁香五錢上為細末米飲調服三錢無時內熱嘔吐服前藥不效者以枇杷葉去毛蜜炙茅根各五錢煎濃湯入蘆根汁半盞和勻服吃逆大夫肺主氣五臟六腑俱稟於氣産後則氣血傷臟腑皆損而風冷搏於氣氣則逆上而又脾虛聚冷胃中伏寒因食熱物冷熱氣相沖擊使氣厥而不順則吃逆也脾者主中焦為三焦之關五臟之倉廩貯積水穀若陰陽氣虛使榮衛氣厥逆則致生斯病也經云吃噫者胃寒所生服藥無效者灸期門三壯必愈期門穴乃胃之大絡薛前證屬胃氣虛寒之惡候如用後方未應急投參附湯亦有復生者參附湯見前自汗丁香散治産後心煩咳噫不止丁香白豆蔻仁各半兩伏龍肝一兩上為細末煎桃仁吳茱萸湯調下一錢如人行五里再服石蓮散見嘔吐産寶療産後吃逆三日不止欲死方桂心半兩薑汁三合上同煎取二合以大火炙手摩背熱時塗藥汁盡妙治産後吃逆方用乾柿一枚切碎以水一盞煎至六分熱呷之又方古壁鏡窠三四個水一小盞煎至半小盞熱服羌活散靈苑治吃逆羌活附子炮蘹香炒各半兩木香白薑炮各二錢半上五味為未每服二錢水一盞鹽一捻煎十數沸熱服一服止補遺治産後吃逆橘皮湯及大小橘皮湯皆效上諸方當審寒熱虛實用之如寒者宜丁香薑桂熱者宜乾柿竹茹實者宜香附橘皮虛者宜人參甚則附子佐之誤施則有噬臍之悔慎之咳嗽大夫肺者主氣因産後血虛肺經一感微邪便成咳嗽或風或熱或寒或濕皆令人咳嗽也若産後吃鹽太早而咳嗽者難治産後血氣不通咳嗽者何答曰産後咳嗽多因食熱面壅滯或熱病或有氣塊發時衝心痛氣急咳嗽四肢寒熱心悶口乾或時煩躁睡夢驚悸氣虛肢體無力宜服局方黑神散五積散加棗煎服薛産後咳嗽或因陰血耗損或因肺氣虧傷或陰火上炎或風寒所感主治之法若陰血虛者用芎歸熟地參術肺氣傷者用四君芎歸桔梗陰火上炎者六味地黃加參術風寒所感者補中益氣加桔梗紫蘇若瘀血入肺發喘急用二味參蘇飲多有得生者若兼口鼻起黑或鼻出血急用前飲亦有得生者然而所患悉因胃氣不足蓋胃為五臟之根本人身之根蒂胃氣一虛五臟失所百病生焉但患者多謂腠理不密所致殊不知肺屬辛金生於己土亦因土虛不能生金而腠理不密外邪所感其陰火上炎亦壯土金生腎水以制火為善若徑治其病則誤矣一産婦咳嗽聲重鼻塞流涕此風寒所感用參蘇飲一盅頓愈六七乃與補中益氣加桔梗茯苓半夏一劑而痊又與六君加黃耆以實其腠理而安一産婦咳嗽痰盛面赤口乾內熱晡熱徹作無時此陰火上炎當補脾腎遂用補中益氣湯六味地黃丸而愈一産婦咳而腹滿不食涕唾面腫氣逆此病在胃關於肺用異功散而愈旋覆湯即旋覆花湯見喘有汗者去麻黃知母飲治産後惡露上攻流入於肺經咳嗽宜服此藥若傷風痰嗽卻以尋常傷風藥主治一名二母散知母貝母白茯苓人參各二錢桃仁杏仁並生去皮尖各一錢上作一服水二盅煎至一盅食後服集驗療産後感風傷寒咳嗽多痰唾黏甘草苦梗各一兩半款冬花一兩生麥門冬生地黃各三兩蔥白一握豉二合舊方無蔥白與豉上㕮咀水二升煮取八合去渣食後分兩服經效療咳嗽多痰唾黏氣急前胡五味子紫菀貝母各一兩半桑白皮茯苓各二兩淡竹葉二十片上㕮咀水二升煎取八合去渣食後分兩服療産後咳嗽氣喘百部根苦梗各六分桑白皮二十分干百合赤茯苓各八分上㕮咀水二升煮取七合去渣食後分兩服自制噙化丸見前雜病咳嗽喘婁産後喘極危多死也郭産後喉中氣急喘促者何答曰榮者血也衛者氣也榮行脈中衛行脈外相隨上下謂之榮衛因産所下過多榮血暴竭衛氣無主獨聚肺中故令喘也此名孤陽絶陰為難治若惡露不快敗血停凝上熏於肺亦令喘急但服奪命丹胞衣不下血去喘自定陳無擇評曰産後喘急固可畏若是敗血上熏於肺猶可責效奪命丹若感風寒或因憂怒飲食鹹冷等奪命丹未可均濟況孤陽絶陰乎若榮血暴絶宜大料煮芎藭湯亦可救傷風寒宜旋覆花湯性理郁發宜小調經散用桑白皮杏仁煎湯調下傷食宜服見晛丸五積散芎藭湯薛前證若脾肺氣虛弱用六君桔梗若兼外邪更加紫蘇若中氣虛寒用補中益氣加炮薑肉桂若陽氣虛脫更加附子若瘀血入肺急用二味參蘇飲一産婦喘促自汗手足俱冷常以手護臍腹此陽氣虛脫用參附湯四劑而愈浦江吳輝妻孕時足腫七月初旬産後二月洗浴即氣喘但坐不得臥者五個月惡風得暖稍寬兩關脈動尺寸皆虛百藥不效用牡丹皮桃仁桂枝茯苓乾薑枳實厚朴桑白皮紫蘇五味栝蔞仁煎湯服之即寬二三服得臥其痰如失蓋作汙血感寒治之也血竭散治産後敗血衝心胸滿上喘命在須臾宜服真血竭如無紫礦代沒藥上等分研細頻節再研取盡為度每服二錢用童便合好酒半大盞煎一沸溫調下方産下一服上床良久再服其惡血自循經下行更不衝上免生百病云岐參蘇飲治産後血入於肺面黑髮喘欲死者人參一兩為末蘇木二兩上以水兩碗煮取蘇木一碗以下去渣調參末隨時加減服神效旋覆花湯治産後傷風寒喘咳嗽痰涎壅盛坐臥不寧旋覆花赤芍藥荊芥穗半夏曲前胡甘草炙茯苓五味子杏仁去皮尖麩炒麻黃各等分一方芍藥茯苓多一倍上㕮咀每服四錢水一盞半生薑三片棗一枚煎至七分去渣食前溫服有汗者不宜服若傷鹹冷飲食而喘者宜見晛丸見前痞悶五味子湯治産後喘促脈伏而厥五味子杵炒人參杏仁各二錢麥門冬去心陳皮各一錢上薑三片棗二枚水煎服大補湯治産後百日外面青浮腫唇白氣急有汗乃大虛之證急宜服此當歸頭大川芎大白朮白芍藥白茯苓多人參多黃耆多五味子熟地黃乾薑上下甘草少上銼散水煎服此二帖不退即加川烏木香另磨入服有瀉加訶子肉豆蔻粟殼鼻衄郭産後口鼻黑氣起及鼻衄者何答曰陽明者經脈之海起於鼻交頞中還出頰口交人中左之右右之左産後氣虛血散榮衛不理散亂入於諸經卻還不得故令口鼻氣起及變鼻衄此緣産後虛熱變生此證胃絶肺敗不可治經驗方云急取緋線一條併産婦頂心發兩條緊扎中指節上即止無藥可治亦禳厭之一端也薛按胃脈俠口繞承漿蓋鼻準屬脾土鼻孔屬肺金誠胃虛肺損氣脫血死之證急用二味參蘇飲加附子五錢亦有得生者汪一婦産後血逆上行鼻衄口乾心躁舌黑蓋因瘀血上升遂用益母丸二丸童便化下鼻衄漸止下血漸通血崩陳産後血崩者何答曰産臥傷耗經脈未得平復勞役損動致血暴崩淋瀝不止或因酸鹹不節傷蠹榮衛衰弱亦變崩中若小腹滿痛肝經已壞為難治急服固經丸以止之陳無擇評曰血崩不是輕病況産後有此是謂重傷恐不止鹹酸不節而能致之多因驚憂恚怒臟氣不平或産後服斷血藥早致惡血不消鬱滿作堅亦成崩中固經丸自難責效不若大料煮芎藭湯加芍藥候定續次隨證諸藥治之為得薛前證若血滯小腹脹滿用失笑散血少小腹虛痞芎藭湯肝火血妄行加味逍遙散脾郁不統血加味歸脾湯脾氣虛不攝血補中益氣湯厚味積熱傷血清胃散加槐花風熱相搏傷血四君子防風枳殼一産婦血崩小腹脹痛用破氣行血之劑其崩如湧四肢不收惡寒嘔吐大便頻瀉余用六君加炮黑乾薑四劑稍愈又以十全大補三十餘劑而痊一産婦血崩因怒其血如湧仆地口噤目斜手足抽搐此肝經血耗生風余用六味丸料一劑諸證悉退但食少晡熱佐以四君柴胡牡丹皮而愈固經丸艾葉赤石脂煅補骨脂炒木賊各半兩附子一枚炮上為末陳米飯和丸如梧子大每服二十丸食前溫酒下米飲亦可芎藭湯加芍藥方芎藭當歸芍藥各等分上㕮咀每服四錢水一盞半煎至七分去渣熱服無時熟乾地黃散治産後崩中頭目旋運神思昏迷四肢煩亂不知人事熟乾地黃伏龍肝黃耆赤石脂各一兩阿膠甘草白朮艾葉炒川芎人參各半兩當歸七錢半上㕮咀每服四錢水一盞半薑三片煎至七分去渣溫服白芍藥散治産後崩中下血淋瀝不絶黃瘦虛損白芍藥牡蠣乾薑熟乾地黃桂心黃耆烏賊魚骨鹿角膠龍骨各一兩上為末每服二錢食前溫酒下又方赤石脂熟地黃各一兩鹿茸牡蠣當歸各半兩上為細末食前以粥飲調下二錢阿膠丸治産後崩中下血不止虛羸無力阿膠赤石脂各一兩半續斷川芎當歸甘草丹參各一兩龍骨鹿茸酥炙烏賊魚骨鱉甲炙各二兩共為細末上煉蜜丸如梧桐子大空心溫酒下二三十丸菖蒲酒治産後崩中下血不止菖蒲一兩半細銼以酒二盞煮取一盞去渣分溫三服食前瑞蓮散治産後惡血崩漏狀如泉水瑞蓮百枚燒存性棕櫚燒存性當歸桂心各一兩鯉魚鱗燒川芎各七錢半檳榔二枚上為細末每服三錢煨薑酒調下如未止更進一服或非時血崩無藥可治但進三服即止補遺治産後血崩香附子炒赤二兩蓮蓬殼五枚燒存性上為末米飲調下二錢産後血崩素有熱者奇效四物湯良方見血崩月水不調大産後月水不調者由産傷動血氣虛損未復而風邪冷熱之氣客於經絡乍冷乍熱冷則血結熱則血消故令血或多或少或在月前或在月後故名不調也薛前證若過期而作痛者氣血俱虛也八珍加柴胡丹皮不及期而來血熱也四物山梔柴胡將來而作痛者血實也四物加桃仁紅花過期而來者血虛也四物加參術紫黑成塊者血熱也四物加炒梔炒連丹皮作痛而色淡者痰多也四物合二陳治當臨證制宜一産婦月經不調內熱燥渴服寒涼之劑血更如崩腹脹寒熱作嘔少食用六君子二十餘劑諸病悉愈以加味逍遙散調理而安琥珀散治産後經脈不調四肢煩疼飲食全少日漸羸瘦琥珀牛膝生乾地黃當歸各一兩桃仁赤芍藥各半兩上為粗末每服三錢水一盞薑三片煎至六分去渣服薑黃丸治産後虛乏不足胸心短氣腹內緊急腰背疼痛月水不調食少煩渴四肢無力薑黃當歸熟地黃牡丹皮厚朴制桂心川芎續斷桃仁白朮各一兩赤芍藥木香各七錢半羚羊角屑二錢半上為細末煉蜜丸如梧子大每服三十丸食前溫酒下月水不通大夫産傷動於血氣其後虛損未復而為風冷所傷血之為性得冷則凝結故風冷傷於經血結於胞絡之間故令月水不通也凡血結月水不通則成血瘕水血相併復遇脾胃衰弱肌肉虛者則為水腫也婦人衝任之脈為經絡之海皆起於胞內而手太陽小腸之經手少陰心之經此二經上為乳汁下為月水若産後月水不通者蓋新産之後勞傷氣血或去血過多乳汁通行自是不通若乳子歲半或一歲之內而月經不行此是常候即非病也何必通之諺云奶假是也若半歲而行者或四五個月便經行者皆是少壯血盛之人注受極易産乳必衆其子失乳必四肢尪羸肚大青筋頭大發焦好啖泥土病名無辜若經血有餘者不可以藥止之若産後一二歲月經不通而無疾苦何必服藥或勞傷氣血衝任脈虛氣血衰少而不能行者但服健脾胃資氣血之藥自然通行若用牛膝紅花蘇木乾漆虻蟲水蛭等藥以通之則為害滋大經水枯竭則無以滋養其能行乎初虞世所謂譬猶索萬金於乞丐之手雖捶楚並下而不可得也後之學者更宜詳番而療之薛前證脾胃虛弱用六君子湯若兼鬱火傷脾用歸脾湯加丹皮山梔若怒火傷血宜用四物合小柴胡氣血俱虛用八珍牡丹皮仍參前論主之一産婦月經年餘不通內熱晡熱服分氣丸經行不止惡寒作渴食少倦怠胸滿氣壅朝用加味逍遙散夕用四君子湯月許諸證稍愈佐以八珍湯兼服兩月而愈以上三證宜於調經門中參看通用瀉利郭産後腹痛及瀉利者何答曰産後腸胃虛怯寒邪易侵若未滿月飲冷當風乘虛襲留於肓膜散於腹脅故腹痛作陳或如錐刀所刺流入大腸水穀不化洞泄腸鳴或下赤白胠脅填脹或痛走不定急服調中湯立愈若醫者以為積滯取之禍不旋踵謹之謹之陳無擇評曰産後下痢非止一證當隨所因而調之既云飲冷當風何所不至寒熱風濕本屬外因喜怒憂思還從內性況勞逸飢飽皆能致病若其洞泄可服調中湯赤白滯下非此能愈各隨門類別有正方薛産後瀉痢或因飲食傷損脾土或脾土虛不能消食當審而治之若米食所傷用六君加谷糵若麵食所傷用六君加麥糵若肉食所傷用六君加山楂神麯凡兼嘔吐皆加藿香若兼咽酸或嘔吐用前藥送越鞠丸若肝木來侮脾土用六君加柴胡炮薑若寒水反來侮土用錢氏益黃散若久瀉或元氣下陷兼補中益氣湯以升發陽氣若瀉痢色黃乃脾土真氣宜加木香肉果若脾土虛寒當用六君子加木香薑桂若脾腎虛寒用補中益氣及四神丸若屬命門火衰而脾土虛寒用八味丸以補土母若小便澀滯肢體漸腫或兼喘咳用金匱腎氣丸以補脾腎利水道若胃氣虛弱而四肢浮腫治須補胃為主若久而不愈或非飲食所傷而致乃屬腎氣虧損蓋胞胎主於任而繫於腎況九月十月乃腎與膀胱所養必用四神六味八味三藥以補腎若用分利導水之劑是虛其虛也一産婦瀉痢發熱作渴吐痰甚多肌體消瘦飲食少思或胸膈痞滿或小腹脹墜年餘矣余以為脾胃瀉朝用二神丸夕用六君子三月餘而痊一婦産後泄瀉兼嘔吐咽酸面目浮腫此脾氣虛寒先用六君加炮薑為主佐以越鞠丸而咽酸愈又用補中益氣加茯苓半夏而脾胃康一産婦瀉利年餘形體骨立內熱晡熱自汗盜汗口舌糜爛日吐痰三碗許脈洪大重按全無此命門火衰脾土虛寒而假熱吐痰者乃脾虛不能統攝歸源也用八味丸補火以生土用補中益氣湯兼補肺金而脾胃健一産婦腹痛後重去痢無度形體倦怠飲食不進與死為鄰此脾腎俱虛用四神丸十全大補湯而愈但飲食難化肢體倦怠用補中益氣湯而康一婦人五月患痢日夜無度小腹墜痛發熱惡寒用六君子湯送香連丸二服漸愈仍以前湯送四神丸四服全愈至七月終怠惰嗜臥四肢不收體重節痛口舌乾燥飲食無味大便不實小便頻數灑淅惡寒悽慘不樂此肺之脾胃俱虛而陽氣寒不伸也用升陽益胃湯而痊汪石山治一婦産後滑泄勺水粒米弗容時即泄下如此半月餘衆皆危之或用五苓散平胃散病益甚汪診之脈皆濡緩而弱曰此産中勞力以傷其胃也若用湯藥愈滋胃濕非所宜也令以參苓白朮散除砂仁加陳皮肉豆蔻煎薑棗湯調服旬余而安丹治産後泄瀉惡露不行此余血滲入大腸為瀉洞泄不禁下青白黑色用荊芥大者四五穗於盞內燒灰不得犯油火入麝香研湯三呷調下此藥雖微能治大病方名的奇散産後泄方茯苓川芎黃芩白朮乾薑滑石陳皮芍藥炒各上水煎服之調中湯高良薑當歸桂心芍藥附子炮川芎各一兩甘草半兩上為粗末每服三錢匕水三盞煎至一盞去渣熱服上方惟寒中洞泄者宜之其腸胃有熱者當服黃連而愈如如金丸香連丸之類若戊己丸固腸丸四神丸五味子丸之類皆産後大便不實必用之藥已詳載雜病及前泄瀉門中茲不贅引赤白痢大産後痢疾者由産勞傷臟腑不足日月未滿虛乏未復或勞動太早或誤食生冷若行起太早則外傷風冷乘虛入於腸胃若誤食生冷難化之物傷於脾胃皆令洞泄水瀉甚者變為痢也若血滲入大腸則為血痢難治世謂之産子痢也得冷則白或如魚腦得熱則赤黃或為驟血若冷熱相搏則下痢赤白或膿血相雜若下痢青色則極冷也若飲食不進便利無常日夜無度産後本虛更加久痢不止無力瘦乏愈見羸弱謂之虛羸下痢又有産後氣宇不順而下痢赤白謂之氣痢治之之法熱則涼之冷則溫之冷熱相搏則調之滑者澀之虛羸者補之水穀不分者當利小便若産婦性情執著不能寬解須當順其氣未有不安者也薛前證白屬氣分而赤屬血分也其論詳見瀉利一産婦食雞子腹中作痛面色青黃服平胃二陳更下痢腹脹用流氣飲子又小腹一塊不時上攻飲食愈少此脾胃虛寒肝木克侮所致用補中益氣加木香吳茱漸愈又用八珍大補兼服調理尋愈一婦産後痢未至月滿因食冷物及酒冷熱與血攻擊滯下純血纏墜極痛其脈大無力口乾用黃芩芍藥湯三服而安熊治産後赤白痢證用四君子湯加黃耆粟殼神效云救急散治産後赤白痢腹中絞痛芍藥阿膠艾葉熟地黃各一兩甘草當歸各三兩上㕮咀水煎分二服空心飲大當歸芍藥散治妊娠腹中絞痛心下急痛及療産後血暈崩中久痢方見血崩療妊娠血痢用阿膠二兩以酒一升半煮一升頓服産後諸痢煮薤白食之又方羊腎脂炒薤白空心食之甚佳經治産後胎前痢疾敗龜甲一枚米醋炙研為末醋湯調下丹溪云龜甲大補陰治勞倦丹婦人患墮胎後膈滿食少痢不止脈虛左手尤甚滑石白芍藥炒蒼朮各五錢白朮二錢五分訶子二錢煨乾薑四錢茯苓一錢上為細末調下保和丸四五十粒云産後血痢臍腹疼痛四物湯加槐花黃連御米殼等藥黃連丸治産後赤白痢腹中攪痛不可忍黃連四兩阿膠蒲黃梔子仁各一兩當歸二兩半黃芩黃柏各二兩上為末煉蜜丸如桐子大每服六七十丸米飲吞下日三夜一仲産後下痢虛極白頭翁加甘草阿膠湯主之脈經作熱痢重下新産虛極者白頭翁阿膠各二兩黃連黃柏秦皮各三兩甘草二兩上以水七升煮取二升半納膠令消盡溫分三服婦人臨産痢疾山梔不拘多少燒灰為細末空心溫熟水調下一錢甚者不過五服産後血痢小便不通臍腹疼痛用生馬齒莧搗汁二大合煎一沸下蜜一合調頓服梅治産後血泄不禁余血作痛兼塊桂心乾薑等分為末空心酒調服方寸匕大療産後痢日五十行者取木里蛀蟲糞屑炒黃急以水沃之令稠稀得所服之即瘥聖治産後諸痢方取蒼耳葉搗汁半盞日三四溫服渴産後下痢作渴者水穀之精化為血氣津液以養臟腑臟腑虛燥故痢而渴若引飲則難止反溢水氣脾胃既虛不能剋水水自流溢浸漬皮膚則令人腫但止其渴痢則自瘥薛前證若渴而不喜冷飲屬胃氣虛不能生津液宜用七味白朮散夜間發熱口渴屬腎水弱而不能潤宜用六味丸並佐以益氣湯以滋化源一産婦瀉痢發熱作渴吐痰肌體消瘦飲食少思或胸膈痞悶或小腹脹墜年餘矣余以為脾腎之瀉朝用二神丸夕用六君子三月餘而痊一産婦患前證形體倦怠飲食不進與死為鄰此脾胃俱虛也用四神丸十全大補湯而愈必效療産後痢而渴飲無度數麥門冬三兩烏梅二十個細銼水一升煮取七合細呷經效療産後久痢津液涸渴不止龍骨十二分厚朴茯苓黃耆麥門冬人參各八分生薑六分大棗十四個並細銼上以水一大升煮取七合空心分兩服療産後痢日久津液枯竭四肢浮腫口乾舌燥古今録驗冬瓜一枚黃泥糊厚五寸煨爛熟去皮絞汁服之瘥補遺人參白朮散治産後痢津液竭渴不止方見胎前霍亂大便祕澀郭産後大便祕澀者何答曰産臥水血俱下腸胃虛竭津液不足是以大便祕澀不通也若過五六日腹中悶脹者此乃燥屎在臟腑以其乾澀未能出耳宜服麻仁丸以津潤之若誤以為有熱投之寒藥則陽消陰長變證百出性命危矣薛産後大便不通因去血過多大腸乾涸或血虛火燥乾涸不可計其日期飲食數多用藥通之潤之必待腹滿覺脹自欲去而不能者乃結在直腸宜用豬膽汁潤之若服苦參藥潤通反傷中焦元氣或愈加難通或通而瀉不能止必成敗證若屬血虛火燥用加味逍遙散氣血俱虛八珍湯慎不可用麻子杏仁枳殼之類一産婦大便不通七日矣飲食如常腹中如故余曰飲食所入雖倍常數腹不滿脹用八珍加桃仁杏仁至二十一日腹滿欲去用豬膽汁潤之先去幹糞五七塊後皆常糞而安一産婦大便八日不通用通利之藥中脘作痛飲食甚少或云通則不痛痛則不通乃用蜜導之大便不禁吃逆不食余曰此脾腎復傷用六君加吳茱肉果骨脂五味數劑喜其年壯而愈不然多致不起一産婦大便祕結小腹脹痛用大黃等藥致吐瀉不食腹痛胸痞余用六君子加木香炮薑治之而愈一婦人大便祕澀諸藥不應苦不可言令飲人乳而愈麻仁丸麻仁研如泥枳殼人參各一兩大黃半兩上為末煉蜜丸如梧桐子大空心溫酒下二十丸未通漸加丸數不可太過評曰産後不得利利者百無一生去血過多臟燥大便祕澀則固當滑之大黃似難輕用唯蔥涎調臘茶為丸復以臘茶下之必通豫常用局方四物湯以生地黃易熟地黃加青皮去白煎服甚效本事婦人産後有三種疾鬱冒則多汗汗多則大便祕故難於用藥惟麻子蘇子粥最為穩當用紫蘇子大麻子二味各半合洗淨研極細用水再研取汁一盞分二次煮粥啜下此粥不唯産後可服大抵老人諸虛風祕皆宜服之當有一人母年八十四忽爾腹滿頭疼噁心不食召醫數人議皆用補脾進食治風清利頭目等藥數日雖愈全不入食其家憂惶余辨説前藥皆誤矣此證正是老人風祕臟腑壅滯聚於胸中則腹脹噁心不思飲食又上至於顛則頭痛神不清也若臟腑流暢諸疾悉去矣豫令作此粥兩啜而氣泄先下結糞如胡椒者十餘枚後漸得通利不用藥而自愈矣丹産後祕結不通膨滿者氣急坐臥俱難用大麥糵炒黃為末酒下一合神效出兵部手集大小便不通大産後大小便不通者腸胃本挾於熱因産血水俱下津液燥竭腸胃痞澀熱氣結於腸胃故令大小便不通也薛嘗治一産婦大小便不通諸藥不應將危矣令飲牛乳一日稍通三日而痊人乳尤善桃花散治膀胱氣滯血澀大小便祕桃仁葵子滑石檳榔各等分上為細末每服二錢空心蔥白湯調下療産後大小便不利下血車前子黃芩蒲黃牡蠣生地黃芍藥各一兩五錢上為細末空心米飲服方寸匕忌面蒜通氣散治産後大小便不通亦可用封臍法見前雜證大便不通心治婦人産後忽小腹脹如蠱大小便不通氣海三里關元三陰交陰谷主之遺屎薛産後遺屎若脾腎虛弱用還少丹仍以補中益氣湯為主虛寒加肉豆蔻補骨脂或四神丸若脾腎虛寒用八味丸兼四神丸仍佐以前二方按産後遺屎乃腎氣不固宜五味子丸主之雜病泄瀉一産婦大便不實飲食少思或侵晨遺屎此中氣虛寒脾腎不足用補中益氣送四神丸而痊一産婦小便出糞名大小腸交乃氣血俱虛失行常道先用六君子湯二劑又用五苓散二劑而痊尋常腸交亦可用廣濟療産後遺糞方取故燕窠中草燒為末以酒調下半盞亦治男子集驗方療産後遺糞亦治男子礬石枯牡蠣煅各等分上為末酒服方寸匕日三服補遺療産後遺糞不知出時方白蘞芍藥各等分為末酒服方寸匕補遺治産後遺糞不知覺可服固腸丸方見前雜症泄瀉條華他云病人臥遺屎不覺者死淋閟大産後諸淋因産有熱氣客於脬中內虛則起數熱則小便澀痛故謂之淋又有因産損氣虛則挾熱熱則搏於血即流滲於胞中故血隨小便出而為血淋淋者淋瀝之謂也三因論曰治諸産前後淋祕其法不同産前當安胎産後當去血如其冷熱膏石氣淋等為治則一但量其虛實而用之瞿麥蒲黃最是産後要藥唯當尋究其所因則不失機要矣薛按前證若膀胱虛熱用六味丸若陰虛而陽無以化用滋陰腎氣丸蓋土生金金生水當滋化源也一産婦小水淋瀝或時自出用分利降火之劑二年不愈余以為脾腎之氣虛用補中益氣湯六味地黃丸而痊茅根湯治産後諸淋無問冷熱膏石氣結悉主之白茅根八兩瞿麥穗白茯苓各四兩葵子人參各二兩蒲黃桃膠滑石甘草各一兩紫貝十枚煅石首魚頭中石二十枚燒上銼散每服四大錢水一盞半薑三片燈心二十莖煎至七分去滓溫服亦可為末木通煎湯調下二錢如氣壅閉木通橘皮煎湯調下滑石散千金療産後淋滑石一兩二錢半研通草車前子葵子各一兩上為末以漿水調服方寸匕至二匕為妙張不愚療産後小便不通淋閉方陳皮一兩去白為末空心溫酒調下二錢一服便通療卒不得小便方杏仁十四枚去皮尖上炒為末和飲頓服通療産後淋小便痛及血淋白茅根五兩瞿麥車前子各二兩鯉魚齒一百枚為末通草三兩冬葵子二合上水二升煮取一升入魚齒末空心服治産後小便不通腹脹如鼓悶亂不醒蓋緣未産之前內積冷氣遂致産時尿胞運動不順用鹽於産臍中填可與臍平卻用蔥白剝去粗皮十餘根作一縛切作一指厚安鹽上用大艾炷滿蔥餅子大小以火灸之覺熱氣直入腹內即時便通神驗不可具述出産乳集小便數大夫産後小便數者乃氣虛不能制故也薛前證若因穩婆不慎以致胞損而小便淋瀝者用八珍湯以補氣血若因膀胱氣虛而小便頻數當補脾肺若膀胱陰虛而小便淋瀝須補肺腎一産婦小便頻數時復寒戰乃屬脾肺虛弱用補中益氣湯加山茱山藥為主佐以桑螵蛸散而愈後患發熱晡熱盜汗自汗月水不調用加味逍遙散而安一産婦患前證吐痰發熱日晡作渴此膀胱陰虛用補中益氣湯以六味丸而愈又患痢後小便頻數手足俱冷屬陽氣虛寒用前湯及八味丸而瘳桑螵蛸散千金治産後小便數及遺尿桑螵蛸三十枚煨鹿茸酥炙黃耆各三兩牡蠣煨人參厚朴赤石脂各二兩上為末空心粥飲調下二錢外臺無厚朴石脂有甘草生薑栝蔞湯集驗療産後小便數兼渴桑螵蛸甘草並炙黃連生薑各二兩栝蔞根三兩人參三兩大棗五十枚上細切用水七升煮二升半分三服忌豬肉冷水補遺療産後小便數或遺尿益智仁為末米飲調服小便不禁陳婦人産蓐産理不順致傷膀胱遺尿無時丹嘗見收生者不謹損破産婦尿脬致病淋瀝遂成廢疾一日有徐婦年壯難産得此因思肌肉破傷在外者宜可補完胞雖在腹恐亦可治遂診其脈虛甚豫曰難産之由多是氣虛産後血氣尤虛試與峻補因以參耆為君芎歸為臣桃仁陳皮黃耆茯苓為佐煎以豬羊胞中湯極飢時飲之但劑小率用一兩至一月而安蓋令氣血驟長其胞自完恐稍緩亦難成功矣喬町婦人産後尿不禁面微浮略發熱於午後此膀胱為坐婆所傷黃耆歸身尾芍藥各一錢半白朮一錢人參陳皮各五分甘草炙少許上水煎熱服之薛前證若脾肺陽虛用補中益氣湯若肝腎陰虛用六味地黃丸若肝腎之氣虛寒用八味地黃丸一産婦小便不禁二年不愈面色或青赤或黃白此肝脾氣虛血熱用加味逍遙散為主漸愈佐以六味地黃丸而痊後因怒小便自遺大便不實左目頓緊面色頓赤仍用前散佐以六君子湯以清肝火生肝血培脾土而痊廣濟療産後小便不禁雞尾毛燒存性酒調下一匕日三服千金治産後遺尿不知出白薇芍藥各等分為末酒服方寸匕日三又方桑螵蛸半兩炒龍骨一兩上為末食前粥飲調下二錢固脬散治婦人臨産時傷手脬破小便不禁黃絲絹自然黃者染黃者不用三尺以炭灰汁煮極爛以清水洗去灰令淨入黃蠟半兩蜜一兩白茅根二錢馬屁勃末二錢上用水二升再煎至一盞空心頓服服時飲氣服之不得作聲如作聲無效補遺補脬飲治産後傷動脬破終日不小便但淋濕不幹生絲絹黃色者一尺白牡丹根皮木白芨各一錢用水一碗煎至絹爛如餳服之勿作聲作聲無效雞內金散治産後溺床失禁以雞䏶胵一具並腸洗燒為末酒調服方寸匕小便出血大産後小便出血者因血氣虛而熱乘之血得熱則流散滲於胞內故血隨小便出薛一産婦尿血面黃脅脹少食此肝木乘脾土也用加味逍遙補中益氣兼服而愈後為懷抱不樂食少體倦驚悸無寐血仍作用加味歸脾湯二十餘劑將愈惑於衆論服犀角地黃湯諸證復作仍服前湯而愈治小便利血方亂髮湯洗垢膩淨上燒研為末米飲調服方寸匕又方用滑石研發灰等分每服一錢地黃汁調下崔氏方療産後血滲入大小腸蜜一大合車前草搗汁一升上相和煎沸分兩服補遺方治産後小便出血川牛膝去蘆水煎服又方生地黃汁半升生薑自然汁半合上相和服之大便下血薛産後便血或飲食起居或六淫七情以致元氣虧損陽絡外傷治法若因膏粱積熱用加味清胃散若因醇酒濕毒葛花解酲湯若因怒動肝火六君加芍藥柴胡芎歸若因鬱結傷脾加味歸脾湯若因思慮傷心妙香散若因大腸風熱四物加側柏荊防枳殼槐花若因大腸血熱四物加芩連若因腸胃虛弱六君加升麻柴胡若因腸胃虛寒六君加肉蔻木香若因元氣下陷補中益氣加茯苓半夏若因氣虛用六君升麻若因血虛用四物氣血俱虛用八珍俱加柴胡升麻大凡病久或元氣虛弱見病百端皆因脾胃虧損內真寒而外假熱但用六君子或補中益氣加炮薑溫補脾氣諸證悉退若四肢畏冷屬陽氣虛寒急加附子病因多端當臨證制宜庶無誤矣一産婦糞後下血諸藥不應飲食少思肢體倦怠此中氣虛弱用補中益氣加吳茱炒黃連五分四劑頓止但怔忡少寐盜汗未止用歸脾湯治之而痊一婦人但怒便血寒熱口苦或胸脅脹痛或小腹痞悶此木乘土用六君加山梔柴胡而愈又用補中益氣加味逍遙二藥而不復作一婦人久下血在糞前屬脾胃虛寒元氣下陷用補中益氣湯加連炒吳茱一錢數劑稍緩乃加生吳茱五分數劑而愈一婦人産後便血口乾飲湯胸脅膨滿小腹悶墜內熱晡熱飲食不甘體倦面黃日晡則赤灑淅惡寒此脾肺氣虛先用六君加炮薑木香諸證漸愈用補中益氣將愈用歸脾湯全愈後飲食失節勞役兼怒氣發熱血崩夜間熱甚譫語不絶此熱入血室用加味小柴胡二劑而熱退用補中益氣而血止用逍遙散歸脾湯調理而康陰脫産門不閉三因婦人趣産勞力努咽太過致陰下脫若脫肛狀及陰下挺出逼迫腫痛舉重房勞皆能發作清水續續小便淋露硫黃散治産後勞傷陰脫硫黃烏賊魚骨各半兩五味子二錢半上為末摻患處桃仁膏治産後陰腫妨悶桃仁去皮尖枯礬五倍子各等分上以下二味為末研桃仁為膏拌勻敷之硫黃湯治産勞玉門開而不閉硫黃四兩吳茱萸菟絲子各一兩半蛇床子二兩上每服四錢水一碗煎數沸濾渣洗玉門日再洗尉法單炒蛇床子乘熱布裹尉患處亦治産後陰痛當歸散治陰下脫當歸黃芩各二兩芍藥一兩錢半蝟皮燒存性半兩牡蠣二兩半為末每服二錢溫酒米湯任意調下忌登高舉重丹溪一婦人三十餘歲生女二日後産戶一物如手帕下有帕尖約重一斤豫思之此因胎前勞乏傷氣成肝痿所致卻喜血不甚虛其時歲暮天寒恐冷干壞了急與炙黃耆半錢人參一錢白朮五分當歸一錢半升麻五分三帖連服之即收上得汗通身乃安但下裔沾席處乾者落一片約五六兩重蓋脂膜也食進得眠診其脈皆澀左略弦視其形卻實與白朮芍藥各錢半陳皮一錢生薑一片煎二三帖以養之一婦人産子後陰戶中下一物如合鉢狀有二歧其夫來求治豫思之此子宮也必氣血弱而下墜遂用升麻當歸黃耆大料二帖與之半日後其夫復來曰服二次後覺響一聲視之已收陰戶訖但因經宿幹著席上破一片如掌心大在席某妻在家哭泣恐傷破不可復生豫思之此非腸胃乃胎膏也肌肉破尚可復完若氣血充盛必可生滿遂用四物湯加人參與一百帖三年後復有子治子宮下用黃耆一錢半人參一錢當歸七分升麻三分甘草二分作一帖水一盅煎至五分去渣食前服卻用五倍子末泡湯洗又用未敷之如此數次宜多服藥永不下薛玉門不閉氣血虛弱也用十全大補湯腫脹焮痛肝經虛熱也加味逍遙散若因憂怒肝脾氣血傷也加味歸脾湯若因暴怒肝火血傷也龍膽瀉肝湯一産婦玉門不閉發熱惡寒用十全大補加五味子數劑而寒熱退用補中益氣加五味子數劑而玉門閉一婦人脾胃素弱兼有肝火産後玉門腫痛寒熱作渴嘔吐不食外敷大黃等藥內用驅利之劑腫及於臀諸證蜂起此真氣虛而邪氣盛也先用六君子以固腸胃次用補中益氣以升陽氣不數劑而全愈一産婦患此失治腫潰不已形體消瘦飲食少思朝寒暮熱自汗盜汗半年矣用補中益氣湯加茯苓半夏膿水漸少飲食漸進又用歸脾湯共五十餘劑而愈一産婦玉門不閉小便淋瀝腹內一塊攻走脅下或脹或痛用加味逍遙散加車前子而愈一婦人子宮腫大二日方人損落一片殊類豬肝面黃體倦飲食無味內熱晡熱自汗盜汗用十全大補湯二十餘劑諸證悉愈仍復生育治産後陰腫下脫內出玉門不閉石灰一升炒極熱湯二升投灰中適溫冷澄清坐水中以浸玉門斯須平復如故又方以鐵精粉上推內之又灸臍下橫紋五七壯一法用鐵精羊脂二味攪令稠布裹炙熱尉推內之鐵精是鍛鐵爐中飛出如塵紫色而輕虛可以瑩磨器皿者子母療産後陰下脫燒兔頭末敷之補遺治産後生腸不收用枳殼煎湯浸良久即入又方五倍子白礬煎湯浸亦良又方酸篤草俗名老鴉酸煎湯用草坐不開孔才熏收一半稍溫下手洗並收入而安又方子宮脫出以溫水洗軟卻用雄鼠糞燒煙燻入又法萆麻子十四粒去殼搗爛塗頂心如入即洗去東婦人胞胎門落頽不收常濕神關玉泉五十壯身交臍下指縫中灸五十壯三報又法玉泉傍開三寸灸隨年壯三報女人陰門冷腫皈來三十壯甲婦人陰挺出四肢淫濼身悶少海主之一作照海陰中肉線一婦産後水道中出肉線一條長三四尺動之則痛欲絶先服失笑散數次以帶皮薑三斤研爛入清油二斤煎油干為度用絹兜起肉線屈曲於水道邊以前薑熏之冷則尉之一日夜縮其大半二日即盡入再服失笑散芎歸湯調理之如肉線斷則不可治矣陰蝕大凡婦人少陰脈數而滑者陰中必生瘡名曰𧈟瘡或痛或癢如蟲行狀淋露膿汁陰蝕幾盡者此皆由心神煩郁胃氣虛弱致氣血留滯故經云諸痛癢瘡皆屬於心又云陽明主肌肉痛癢皆屬於心治之當補心養胃外以熏洗坐導藥治之乃可薛前證乃肝脾鬱結之證木旺生蟲耳宜解鬱清肝備見前雜證陰中生瘡類一産婦素有肝火患此內潰癢痛食少熱渴小水淋瀝用加味逍遙散加味歸脾湯兼服間以蘆薈丸外以鶴蝨草煎洗而愈千金方蒲黃三升水銀一兩二味研勻以粉上又方肥豬肉十斤水一碩煮水浸冷即易不過三兩度洗拓湯方甘草乾漆各一兩黃芩乾地黃當歸芍藥各二兩龜甲五兩上細切以水七升煮耗一半以綿帛納湯中以拓瘡處良久即易日二度每拓湯可人行十里許即裛干捻取甘濕散薄敷瘡上使遍可經半日又以湯拓拓訖如前敷藥余家婢遇此疾醫療不瘥蝕處作兩瘡深半寸余因檢得此方仍以自處蚺蛇膽散不經七日瘡乃平復甚效凡治數十人應手而瘥請廣布之甘濕散又名蚺蛇膽散療疳蟲陰蝕蚺蛇膽真者青木香石硫黃鐵精麝香各四分臨時分之多少入緣麝香闢蛇毒若先以相和蛇膽即無力也舊用五月五日蛤蟆上六味各等分為末更細研有患取如三棋子和井花水日再服訖先令便利了即以後方桃枝熏下部訖然後取藥如棋子安竹管里吹入下部中亦用再度老少量減其熏法每日一度不用再為之良療疳蟲蝕下部及五臟方取桃東南枝三七枚輕捶頭使散以綿纏之又搗石硫黃為末將此綿纏桃枝捻轉之令末少厚又截一短竹筒先納下部中以所捻藥桃枝熟燃熏之文仲療陰蝕欲盡者方以蛤蟆兔尿等分為末敷之良狼牙湯古今録驗療婦人陰蝕其中爛傷膿水淋漓臭穢狼牙三兩上㕮咀以水四升煮取半升去滓納苦酒如雞子中黃大沸湯一杯消盡夜適寒溫以綿纏箸頭大如繭濡湯以瀝瘡中日四五度即瘥補遺治産後陰戶生瘡青黛黃丹水粉五倍子等分為末用賣肉鋪上拭肉巾燒為末和前藥先以荊芥薄荷柏葉煎湯洗淨後摻藥如瘡干可用油調末塗之又方平胃散加貫衆末每二錢熟煮豬肝拌藥納陰戶中乳少大凡婦人乳汁或行或不行者皆由氣血虛弱經絡不調所致也乳汁勿令投於地蟲蟻食之令乳無汁若乳盈溢可潑東壁上佳或有産後必有乳若乳雖脹而産後臖作者此年少之人初經産乳有風熱耳須服清利之藥則乳行若纍經産而無乳者亡津液故也須服滋溢之藥以動之若雖有乳卻又不甚多者須服通經之藥以動之仍以羹臛引之蓋婦人之乳資於衝脈與胃經通故也有屢經産而乳汁常多者亦婦人血氣不衰使然也大抵婦人素有疾在衝任經者乳汁少而其色帶黃所生之子怯弱而多疾三因産婦有二種乳脈不行有氣血盛而壅閉不行者有血少氣弱澀而不行者虛當補之盛當疏之盛者當用通草漏蘆土瓜根輩虛者當用煉成鍾乳粉豬蹄鯽魚之屬概可見矣薛前證若氣血虛弱而不能化生宜壯脾胃怒動肝膽而乳腫汁出宜清肝火夫乳汁乃氣血所化在上為乳在下為經若屢産無乳或大便澀滯當滋化源漏蘆散療乳婦氣脈壅塞乳汁不行及經絡凝滯奶乳脹痛留蓄邪毒或作癰腫此藥服之自然內消乳汁通行漏蘆二兩半蛇蛻十條炙栝蔞十枚急火燒焦存性上為末溫酒調下二錢無時候服藥後即以豬蹄羹投之經驗方有牡蠣燒存性一方只用牡蠣煅末酒調又方葵菜子炒香縮砂仁各等分上為細末每服二錢熱酒調下滋益氣脈榮衛行津液上蔡張不愚方常用極有驗産寶療産後乳無汁方土瓜根漏蘆各三兩甘草二兩通草四兩上水八升煎取二升分溫三服忌如常法一方加桂心併為末酒服方寸匕産書下乳汁土瓜根為末酒調服一錢日三四服下乳汁以京三稜三個水二碗煎取一碗洗取汁下為度極妙湧泉散成都教授單驤方療産乳無汁亦治乳結癰腫穿山甲洗淨一兩灰炒燥為細末酒調服方寸匕必用方云漏蘆栝蔞皆要藥或云多食豬蹄羹栝蔞取子淨洗炒令香熟捶破取仁瓦上攤浥令白色研為細末溫酒調下一錢服了合面臥少時未效再作一方栝蔞一枚熟搗以白酒一斗煮取四升去渣溫飲一升日三成煉鍾乳散療乳婦氣少血衰脈澀不行乳汁絶少成煉鍾乳粉研細濃煎漏蘆湯調下二錢靈苑下乳汁立效方粳米糯米各半合萵苣子一合並淘淨生甘草半兩用水二升煎汁一升去滓分三服立下又方豬蹄一雙通草四兩水一斗煮作羹食之妙薛一産婦因乳少服藥通之致乳房腫脹發熱作渴余謂血氣虛以玉露散補之而愈玉露散治乳脈不行身體壯熱疼痛頭目昏痛大便澀滯等證川芎桔梗白芷各二錢芍藥當歸各一錢半人參白茯苓甘草各一錢上作一服水二盅煎至一盅食後服如頭熱甚大便祕者加大黃三錢羅氏湧泉散治婦人乳汁因氣絶少瞿麥穗麥門冬去心龍骨穿山甲炮黃王不留行各等分上為細末每服一錢熱酒調下後吃豬蹄羹少許又用木梳於左右乳上各梳三二十梳日三服依前法又方治奶汁少栝蔞根薄荷干身等分上為粗末先吃羊蹄汁一碗次服藥後再吃蔥絲羊羹湯少許立效有人乳汁不行已十七日諸藥無效遇有人送赤豆一斗遂時常煮粥食之當夜乳脈通行又方麥門冬不拘多少去心焙為末以酒磨犀角約一錢許暖犀角酒調門冬末二錢服之不過兩服乳汁便下乳汁自出大産後乳汁自出蓋是身虛所致宜服補藥以止之若乳多溫滿急痛者溫帛尉之産寶有是論卻無方以治之若有此證但以漏蘆散亦可有未産前乳汁自出者謂之乳泣生子多不育經書未嘗論及薛前證氣血俱虛用十全大補湯肝經血熱用加味逍遙散肝經怒火用四物參朮柴梔肝脾鬱怒用加味歸脾湯一産婦勞役忽乳汁如湧昏昧吐痰此陽氣虛而厥也灌以獨參湯而蘇更以十全大補湯數劑而安若婦人氣血方盛乳房作脹或無兒飲脹痛憎寒發熱用麥芽二三兩炒熟水煎服立消其耗散血氣如此何脾胃虛弱飲食不消方中多用之漏蘆散見前吹奶大産後吹奶者因兒吃奶之次兒忽自睡呼氣不通乳不時泄蓄積在內遂成腫硬壅閉乳道津液不通傷結疼痛亦有不癢不痛腫硬如石名曰吹奶若不急治腫甚成癰産後吹奶最宜急治不爾結癰逮至死者速服皂角散栝蔞散敷以天南星散以手揉之則散矣薛前證用藥切不可損其氣血余詳外科乳癰條栝蔞散方乳香一錢研栝蔞實一個研勻溫酒煎服天南星散南星為末溫湯調以鵝翎蘸塗患處皂角散歌曰婦人吹奶治如何皂角燒灰蛤粉和熱酒一杯調八字須臾揉散笑呵呵治奶結硬疼痛百藥煎為細末每服三錢酒一盞煎數沸熱服乳硬作痛嫩桑葉生研以米飲調攤紙花貼腫處補遺治産後吹奶結實腫痛用陳皮一兩甘草一錢水二碗煎至一碗分兩服次用荊芥羌活獨活煎湯熏洗即散妒乳夫妒乳者由新産後兒未能飲之及乳不泄或乳脹捏其汁不盡皆令乳汁蓄結與血氣相搏即壯熱大渴引飲牢強掣痛手不得近是也初覺便知以手捋捏去汁更令旁人助吮引之不爾或作瘡有膿其熱勢盛必成癰也輕則為吹乳妒乳重則為癰雖有專門不可不知連翹湯治産後妒乳並癰連翹升麻芒硝玄參芍藥白蘞防風射干大黃杏仁甘草各一錢上作一服水二盅煎至一盅食後服療産後婦乳初結脹不消令敗乳自退方栝蔞一個半生半炒大粉草一寸半生半炙生薑一塊半生半煨上同銼用酒一碗煮取一盞去渣服之其痛一會不可忍即搜去敗乳臨臥再一服順所患處乳側臥於床上令其藥行故也療産後吹乳作癰葵莖及子上搗篩為散酒服方寸匕即愈又方雞屎干為末酒服方寸匕須臾三服愈又方皂角十條以酒一升揉取汁消石半兩煎成膏敷之療乳腫將次結成癰方上以馬溺塗之立愈補遺療産後吹奶妒奶但未結成癰或成癰未作有膿者蔓荊子搗爛酒服仍以渣敷患處又方用赤小豆酒研爛溫酒服滓封患處又方仙人掌草一握小酒糟一塊生薑一大塊同研爛入桂末少許炒酒服留滓罨患處集驗論曰凡婦人女子乳頭生小淺熱瘡搔之黃汁出浸淫為長百種療不瘥者動經年月名為妒乳病婦人飲兒者乳皆欲斷世謂苟抄乳是也宜以赤龍皮湯及天麻湯洗之敷二物飛烏膏及飛烏散佳始作者可敷以黃芩漏蘆散黃連胡粉散並佳赤龍皮湯槲皮三升切上以水一斗煮五升夏冷用秋冬溫之分以洗乳天麻湯天麻草五升切上以水一斗半煎取一斗隨寒溫分洗乳以殺癢也此草葉如麻葉冬生夏著花赤如鼠尾花亦以洗浸淫黃爛熱瘡癢疽濕陰蝕瘡小兒頭瘡洗畢敷膏散飛烏膏散方用燒硃砂作水銀上黑煙名維粉者三兩熬令焦燥礬石三兩燒粉上二味以絹篩細以甲煎和之令如脂以敷乳瘡日三作者不須和有汁自著可用散亦敷諸熱瘡黃爛浸淫汁瘡蜜瘡丈夫陰蝕癢濕諸小兒頭瘡疳蝕口浸淫瘡蝸瘡等並以此敷之又黃連胡粉膏散方黃連二兩胡粉二兩半水銀一兩同研令消散上三味搗黃連為末三物相和皮裹熟挼之自和合也縱不成一家且得水銀細散人粉中以敷乳瘡諸濕癢黃爛肥瘡若著甲煎為膏千金同補遺婦人乳頭小淺瘡爛癢以芙蓉花或葉乾為末摻之又有婦人乳頭裂痛取秋後冷落茄子花裂開者陰乾燒存性水調塗之
