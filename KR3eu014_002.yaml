男子婦人肢體倦疼虛勞寒熱用青蒿八九月間將成實時採去枝梗以蒿用童子小便浸三日曬乾為末每服二錢烏梅一個煎至七分服上三方熱多者宜之師尼寡婦異乎妻妾之治羅劉宋褚澄療師尼寡婦別制方者蓋有謂也此二種寡居獨陰無陽欲心萌而多不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為勞嘗讀史記倉公傳載濟北王侍人韓女病腰背痛寒熱眾醫皆以為寒熱病治之不瘥倉公曰此病得之欲男子不可得也眾曰何以知欲男子不可得倉公曰診其脈肝脈弦出寸口是以知之蓋男子以精為主婦人以血為主男子精盛以思室婦人血盛以懷胎夫肝攝血者也是厥陰肝脈弦出寸口上魚際則陰盛可知故知褚氏之言信有謂矣大師尼寡婦與室女出嫁愆期者多因欲心萌而不遂懨懨成病乍寒乍熱久則為勞又有經閉白淫痰逆頭風膈氣痞悶面䵟瘦瘠等證皆寡婦之病也薛前證若肝脈弦出魚際用小柴胡加生地黃送下生地黃丸久而血虛佐以四物湯若兼怒動肝火而寒熱者佐以加味逍遙散若兼虧損肝經而寒熱者佐以八珍湯若兼虧損元氣而寒熱者佐以補中益氣湯若兼郁傷脾氣而寒熱者佐以濟生歸脾湯一婦人因夫經商久不歸發寒熱月經旬日方止服降火涼血藥反潮熱內熱自汗盜汗月經頻數余曰熱汗氣血虛也經頻肝脾虛也用歸脾湯六味丸而愈嘗治兼證既愈而寒熱不衰當仍用本證藥一婦人年三十有七早孀居兩腿骨作痛晡熱體倦月經不調或發寒熱數年矣一日頸項兩側結核兩脅脹痛此係肝經鬱火而成也先用小柴胡湯合四物數劑肝症頓愈又用加味逍遙散加澤蘭乳香沒藥三十劑血症漸痊再用加味歸脾湯年餘而安一孀婦兩腿作痛或用除濕化痰等藥遍身作痛而無定處此血症也不信乃服流氣飲之類而歿一放出宮人年四十餘臀腿內股作痛晡熱口乾月經不調此係肝經血少不能養經絡而然也宜加味逍遙散加澤蘭葉五十帖諸症稍緩又以歸脾湯二百餘劑而痊一放出宮人臀腿腫痛內熱晡熱惡寒體倦咳嗽胸痞月經過期而少彼以為氣毒流注服清熱理氣之劑益甚此肝經瘀血停留所致蓋肝經上貫鬲布脅肋循喉嚨下循膕內臁繞陰器抵少腹主治之法但當補其所不勝而制其所勝補者脾也制者肝也經曰虛即補之實則瀉之此定法也彼不信仍服前藥遂致不起本生地黃丸許學士治一尼患惡風體倦乍寒乍熱面赤心悸或時自汗是時疫氣大行醫見其寒熱作傷寒治之用大小柴胡湯雜進數日病急召予診之三部無寒邪脈但厥陰弦長而上魚際宜服抑陰等藥故制此方生地黃二兩柴胡秦艽黃芩各半兩芍藥一兩上為細末煉蜜丸如桐子大每服三十丸用烏梅湯吞下日三服不拘時惡寒大婦人惡寒者亦有陰陽二證發熱而惡寒者發於陽也無熱而惡寒者發於陰也發於陽者宜解表脈必浮數發於陰者宜溫里脈必沉細又有汗後利後惡寒及背惡寒以上疾證方治並載百問不復繁引僕嘗治一婦人但惡寒別無他證六脈平靜遂用敗毒散而安此藥能去表中風邪故也經云惡寒家慎不可過當覆衣被及近火氣寒熱相搏脈道沉伏愈令病人寒不可遏但去被撤火兼以和表之藥自然不惡寒矣婦人惡寒尤不可近火寒氣入腹血室結聚針藥所不能治矣薛前證若怠惰嗜臥灑淅惡寒乃陽不能伸發用升陽益胃湯若勞傷形氣而惡寒乃無陽以護衛用補中益氣湯若飲食傷脾胃而惡寒乃元氣虛損用六君子湯若加煩躁妄言或欲飲水仍進前劑但加薑桂若體倦煩渴頭痛自汗用補中益氣湯加五味麥門東垣云晝則發熱惡寒是陰氣上溢於陽分也夜則惡寒是陰血自旺於陰分也海藏云六月大熱之氣反得大寒之證當舍時從證治以薑桂之類丹溪云久病惡寒乃痰鬱於脾抑遏陽氣不得外泄治當解鬱中風藥隱云婦人中風角弓反張風痹手足不隨偏枯口噤口眼喎斜風眩頭痛血風心神驚悸癲狂骨節風血風走注瘙癢癮疹風痰諸證雖各有方論亦要先明其大體察脈之虛實辨證之冷熱相人強弱入臟入腑在絡在經首以方調治未要猛速用藥今之治法先宜順氣然後治風萬不失一蓋有中風中寒中暍中痰中氣皆能令人涎潮昏塞所謂朱紫相凌玉石不分醫者不可不詳而究之如中風若作中氣治之十愈八九中氣若作中風治之十無一生所以疑惑之間不問中風中氣首以蘇合香丸五積散加麝煎如中痰則有參蘇飲如中寒則有理中湯如中暍則有白虎湯如的然是中風有三生飲木香煮散排風續命風引大小竹瀝大八風湯辨其冷熱虛實而投之未有不安者也然此疾積襲之久非一日所能致今人服藥三五服便責無效其責醫者亦速矣正宜大劑久服方有其效孟子曰七年之病求三年之艾也大夫中風者虛風中於人也風是四時八方之氣常以冬至之日自坎而起候其八方之風從其鄉來者主長養萬物若不從其鄉來者名為虛風賊害萬物人體虛者則中之當時雖不即發停在肌膚後或重傷於風前後重沓因體虛則發入臟腑俞俞皆在背中風多從俞入隨所中之俞而乃發病婦人血氣虛損故令中風也當察口眼開闔以別重輕涎沫有無以明證治如眼開口閉手足不開涎不作聲者可治如眼閉口開聲如鼾睡遺尿不覺者死按卒僕暴厥之證不論男子婦人是風是寒是氣是食是痰是濕但要分得閉與脫二證明白如牙關緊閉兩手握固即是閉證宜蘇合香丸三生飲之類開之若口開手撒即是脫證宜用大劑黃耆人參煎濃湯灌之雖曰在法不治亦十救五六若誤服蘇合香丸之類即不可救矣蓋斬關奪門之藥原為閉證設若施之脫證是人既入井而又下之石也薛中風者即內經所謂偏枯風痱風懿風痹是也而有中腑中臟中血脈之分焉夫中腑者為在表中臟者為在裡中血脈者為在中在表者宜微汗在裡者宜微下在中者宜調榮中腑者多著四肢如手足拘急不仁惡風寒此數者病淺皆易治用加減續命湯之類中臟者多滯九竅如眼瞀者中於肝舌不能言者中於心唇緩便秘者中於脾鼻塞者中於肺耳聾者中於腎此數者病深多難治中血脈者外無六經之證內無便溺之阻肢不能舉口不能言用大秦艽湯主之中腑者多兼中臟如左關脈浮弦面目青左脅偏痛筋脈拘急目瞤頭目眩手足不收坐踞不得此中膽兼中肝也用犀角散之類如左寸脈浮洪面舌赤汗多惡風心神顛倒言語謇澀舌強口乾忪悸恍惚此中小腸兼中心也用麻黃散之類如右關脈浮緩或浮大面唇黃汗多惡風口喎語澀身重怠惰嗜臥肌膚不仁皮肉瞤動腹膨不食此中胃兼中脾也用防風散之類如右寸脈浮澀而短面色白鼻流清涕多喘胸中冒悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也用五味子湯之類如左尺脈浮滑面目黧黑腰脊痛引小腹不能俯仰兩耳虛鳴骨節疼痛足痿善恐此中膀胱兼中腎也用獨活散之類此皆言真中風也而有氣血之分焉蓋氣虛而中者由元氣虛而賊風襲之則右手足不仁用六君子湯加釣藤薑汁竹瀝血虛而中者由陰血虛而賊風襲之則左手足不仁用四物湯加釣藤竹瀝薑汁氣血俱虛而中者則左右手足皆不仁也用八珍湯加釣藤薑汁竹瀝其與中風相類者則有中寒中濕中火中氣食厥勞傷房勞等證如中於寒者謂冬月卒中寒氣昏冒口噤肢攣惡寒脈浮緊用麻黃桂枝理中湯之類中於暑者謂夏月卒冒炎暑昏冒痿厥吐瀉喘滿用十味香薷飲之類中於濕者丹溪所謂東南之人多因濕土生痰痰生熱熱生風也用清燥湯之類加竹瀝薑汁中於火者河間所謂非肝木之風內中六淫之邪外侵良由五志過極火盛水衰熱氣拂鬱昏冒而卒僕也用六味丸四君子獨參湯之類內有恚怒傷肝火動上炎者用柴胡湯之類中於氣者由七情過極氣厥昏冒或牙關緊急用蘇合香丸之類誤作風治者死食厥者過於飲食胃氣自傷不能運化故昏冒也用六君子加木香勞傷者過於勞役耗損元氣脾胃虛衰不任風寒故昏冒也用補中益氣湯房勞者因腎虛精耗氣不歸源故昏冒也用六味丸此皆類中風者也夫內經主於風河間主於火東垣主於氣丹溪主於濕愚之斯論僭補前人之闕也若夫地之南北人之虛實固有不同其男子女人大略相似當與後論參看通變治之內方並見雜病中風靳閣老夫人先胸脅脹痛後四肢不收自汗如水小便自遺大便不實口緊目瞤飲食頗進十餘日矣或以為中臟公甚憂余曰非也若風既中臟真氣既脫惡證既見禍在反掌焉能延之乃候其色面目俱赤面時或青診其脈左三部洪數惟肝尤甚余曰胸乳脹痛肝經血虛肝氣痞塞也四肢不收肝經血虛不能養筋也自汗不止肝經風熱津液妄泄也小便自遺肝經熱甚陰挺失職也大便不實肝木熾盛克脾土也遂用犀角散四劑諸證頓愈又用加味逍遙散調理而安後因鬱怒前證復作兼發熱嘔吐飲食少思月經不止此木盛剋土而脾不能攝血也用加味歸脾湯為主佐以加味逍遙散調補肝脾之氣清和肝脾之血而愈後每遇怒或睡中手足抽搐復用前藥即愈大參朱云溪母於九月內忽仆地痰昧不省人事唇口喎斜左目緊小或用痰血之劑其熱稍緩至次年四月初其病復作仍進前藥勢亦漸緩至六月終病乃大作小便自遺或謂風中於臟以為不治余診之左關弦洪而數此屬肝火血燥也遂用六味丸加五味子麥門芎歸一劑而飲食頓進小便頓調隨用補中益氣加茯苓山梔釣藤丹皮而安至十月復以傷食腹痛作瀉左目仍小兩關尺脈弦洪鼓指余以六君加木香吳茱升麻柴胡一劑而痛瀉俱緩復以六君加肉果故紙一劑諸脈頓平痛瀉俱止余謂左關弦洪由肝火血燥故左目緊小右關弦洪由肝邪乘脾故唇口喎邪腹痛作瀉二尺鼓指由元氣下陷設以目緊口喎誤作風中投以風藥以腹痛泄瀉誤作積滯投以峻劑復耗元氣為害甚矣後以陽虛惡寒圍火過熱致痰喘誤服寒劑而卒一婦人因怒仆地語言謇澀口眼喎斜四肢拘急汗出遺尿六脈洪大肝脈尤甚皆由肝火熾盛蓋肝主小便因熱甚而自遺也用加味逍遙散加釣藤及六味丸尋愈一老婦兩臂不遂語言謇澀服祛風之藥反致筋攣骨痛余謂此肝火血虛所致用八珍湯補氣血用地黃丸補腎水佐以排風湯年餘而愈一婦人經行口眼歪斜痰涎壅盛此血虛而肝火動用加味逍遙散加丹皮治之尋愈後因飲食停滯日吐痰涎此脾氣虛不能攝涎歸經也用六君子二十餘劑而安一婦人因怒口眼喎斜痰涎上湧口噤發搐此脾肺氣虛而肝木旺用六君子加木香釣藤柴胡治之漸愈又用加味歸脾湯調理而安一產婦勤於女工忽仆地牙關緊急痰喘氣粗四肢不遂此氣血虛而發痙朝用補中益氣加茯苓半夏夕用八珍加半夏各三十餘劑不應此氣血之未復藥之未及也仍用前二湯又五十餘劑尋愈一婦人素性急患肝風之證常服搜風順氣丸秦艽湯之類後因大怒吐血唇口牽緊小便頻數或時自遺余以為肝火旺而血妄行遂用小柴胡湯加山梔牡丹皮漸愈五年之後又大怒吐血誤服降火祛風化痰之劑大便頻數胸滿少食用清氣化痰之劑嘔而不食頭暈口乾不時吐痰用導痰降火之類痰出如湧四肢常冷余曰嘔而不食胃氣虛弱也頭暈口乾中氣不能上升也痰出如湧脾氣不能攝涎也四肢逆冷脾氣不能運行也用補中益氣加茯苓半夏治之諸證漸愈又用加味歸脾湯兼服而安陳癸丑春有一婦人年四十二三其證語言氣短足弱行得數步則口若含霜七十日內三次經行則口冷頭目眩暈足冷則透心冷痛每行則口中冷氣不相續有時鼻中熱面赤翕然而熱身體不仁不能行步手足不隨不能俯仰冷痹骨疼有時悲傷夢與前夫相隨則上氣奄然而極心驚志意不定恍惚多忘卻能食如此僅一年許醫者投熱藥則面翕然而熱氣滿胸中咽中窒塞悶絕投冷藥則瀉又一醫者以十全湯服之則發煩躁心驚而跳一醫以雙和湯服之覺面上與腹中如火燂心愈驚欲吐不吐大便秘裡急後重求僕診之六脈弦緩喜見於春此是可治之疾未供藥間忽然吐瀉瀉後覺肛門如火雖瀉卻不多僕且與俞山人降氣湯八服次日診之脈差有力云服藥後覺鼻熱心煩悶齒噤與參蘇飲八服黃連丸一兩越三日云服藥後如故與茯苓補心湯服皆無效僕以脈證詳之只是排風湯甚對或曰何以知之一能飲食此風飢也二七十日三次經行此是榮經有風血得風散也三頭目眩暈此肝風也四面赤翕然而熱悲傷此心風也五身體不仁不能行步夢與前夫相隨此脾風也六手足不隨腰痛難俯仰冷痹骨疼此腎風也因令人心驚恍忽多忘真排風湯證也或曰風脈當浮今脈弦緩微弱恐非風也予曰風無一定之脈大抵此證腎虛生風然排風湯藥品有十全大補湯料亦有平補之資卻不僭燥供十服越三日云服有效脈亦差勝只是腹中如煙生微熱大便秘此真是風證再與排風湯服加牛黃清心丸皂角丸助之越三日云服前藥大煩躁發熱諸證悉除只是足弱不能支持與秘傳降氣湯十服諸證悉退只是夢裡虛驚大便滑泄頻數脈尚弱與五積散加人參鹽煎兼感應丸即愈但頭眩痛重不能久立久坐再與排風湯脫然而安矣繆安人年六十忽中風不省人事無汗有痰眾醫為不可治召僕診之脈浮緩脾脈溢關此真風脈先以參蘇飲六服寬氣下痰次以木香煮散而愈馬觀文夫人於七月間病氣弱倦怠四肢厥逆惡寒有汗少飲食一醫謂伏暑一醫謂虛寒治皆無效召僕診之六脈雖弱而兩關差甚焉問是何證僕曰六脈雖弱而關獨甚此中焦寒也中焦脾也脾胃既寒不但有此證必有腹痛吐瀉今四肢厥冷脾屬四肢是脾胃虛冷無疑焉曰未見腹痛吐瀉之證合用何治僕曰宜附子理中湯未服藥間旋即腹痛而瀉莫不神之即投此藥而瘥防風散治婦人中風言語謇澀四肢拘急身體壯熱頭疼目眩心胸不利防風去蘆一兩石膏二兩半麻黃去節漢防己去皮各七錢半細辛去苗黃芩川升麻當歸去蘆桂心芎藭赤茯苓去皮甘草炙羌活去蘆各半兩上為粗散每服八錢水一中盞半煎至一大盞去滓入淡竹瀝一合更煎一兩沸溫服不拘時芎藭散治婦人卒中風四肢不仁善笑不息芎藭一兩半石膏二兩半當歸去蘆炒麻黃去節秦艽去蘆乾薑炮桂心各一兩杏仁二十枚麩炒黃芩一兩上為粗末每服八錢水一中盞半煎至一大盞去滓溫服不拘時候日進二三服附子散治婦人中風筋脈拘急四肢疼痛言語謇澀心胸不利附子炮去皮臍細辛各七錢半當歸去蘆炒芎藭前胡去蘆枳殼麩炒去穰黃芩白鮮皮茯神去木羌活去蘆杏仁麩炒漢防己去皮甘草炙麻黃去節桂心各一兩上為粗末每服五錢水一中盞半生薑五片煎至一大盞去滓不拘時溫服羌活散治婦人中風筋脈拘急肢節痠疼言語謇澀頭目不利羌活去蘆天麻各一兩芎藭酸棗仁各七錢半微炒蔓荊子白附子炮柏子仁牛膝酒浸桂心薏苡仁當歸去蘆炒羚羊角屑烏蛇肉酒拌炒令黃蟬殼炒各半兩麝香另研一錢半為細末入研麝香勻每服一錢豆淋酒調下無時南星散治婦人中風牙關緊急四肢強直心胸痰涎咽膈不利天南星生薑制麻黃半夏湯洗七次薑製赤箭各半兩川烏頭炮去皮臍桂心蠍梢各二錢半生用麝香半錢研為細末入研麝香令勻每服一錢豆淋酒調下日進二服不拘時候木香煮散治左癱右瘓並素有風濕諸藥不效常服調氣進食寬中羌活麻黃去節各一兩防風七錢半白朮陳皮黑附子炮南木香檳榔牛膝大川烏炮草豆蔻連皮煨杏仁去皮麩炒人參白茯苓川芎當歸甘草桂心各半兩上㕮咀每服四錢水一大盞半生薑五片煎至八分去滓熱服大便不通加大黃心腹脹加苦葶藶滑石膈上壅滯咳嗽氣促加半夏川升麻天門冬知母上古方專主婦人中風故收之率用麻黃桂心非真中外邪不宜輕用只以薛氏法調之為善其餘證治方藥詳見雜病本門男婦初無二治也角弓反張大夫婦人角弓反張者是體虛受風風入諸陽之經人之陰陽經絡周環於身風乘虛入於諸陽之經則腰背反折攣急如角弓之狀宜服小續命湯薛仲景先生云太陽病發汗大多致痙風病下之則痙三因方云氣血內虛風寒濕熱所中則痙以風能散氣故有汗而不惡寒曰柔痙寒能澀血故無汗而惡寒曰剛痙非專於風濕因內虛發汗亡血筋無所榮而然乃虛象也竊謂傷寒汗下過度與產婦潰瘍等病及因克伐之劑傷損氣血而變若金衰木旺先用瀉青丸幼科肝臟後用異功散幼科吐瀉腎水虛用六味丸雜病虛勞肝火旺先用加味小柴胡湯熱入血室次用加味四物湯發熱用加味逍遙散若木侮脾土用補中益氣湯雜病傷勞倦加芍藥山梔脾經鬱結用加味歸脾湯雜病健忘脾土濕熱用大承氣湯傷寒胃實大凡病後氣血虛弱用參朮濃煎佐以薑汁竹瀝時時用之如不應用十全大補湯雜病虛勞更不應加附子或用參附湯緩則不救人參一兩附子二錢水煎服白殭蠶散治婦人中風角弓反張口噤不能言皮膚頑麻筋脈抽掣白殭蠶一兩炒麝香二錢半另研烏蛇肉炒令黃蟬殼炒桑螵蛸炒犀角屑天麻獨活去蘆天南星炮川烏頭炮去皮臍白附子炮硃砂另研水飛防風去蘆各半兩上為細末入研藥令勻每服二錢溫酒調下不拘時日三服羚羊角散治婦人中風角弓反張筋脈拘急言語謇澀心神煩悶羚羊角屑鹿角膠搗碎炒令黃燥赤箭酸棗仁炒薏苡仁各一兩白附子炮芎藭當歸炒去蘆人參去蘆各七錢半羌活去蘆白鮮皮地骨皮柏子仁蔓荊子犀角屑各半兩牛黃另研麝香各二錢半另研上為細末入研藥令勻每服一錢煎薄荷湯調下日進三服無時紫湯治婦人中風腰脊反張如弓之狀雞糞白一合炒微黃大豆二合炒熟防風一兩去蘆上為粗末每服五錢酒水各一中盞煎至六分去滓溫服不拘時候烏蛇丸治婦人中風角弓反張或身體強直牙關緊急烏蛇肉酒浸犀角屑白附子炮天麻各一兩半夏湯洗七遍生薑制天南星炮麻黃去節桂心獨活去蘆白殭蠶炒晚蠶砂炒乾蠍微炒各半兩麝香二錢半另細研上為細末入研麝令勻煉蜜和搗二三百下丸如梧桐子大每服三十丸豆淋酒送下日二服無時余並詳雜病痙門口噤夫婦人中風口噤者是體虛受風風入頷頰夾口之筋也手三陽之筋結入於頷頰足陽明之筋上夾於口而風挾冷乘虛入其筋則筋攣故引牙關急而口噤也薛前證若風邪客於手足陽明經口眼喎斜用秦艽升麻湯雜病中風若風熱傷氣用省風湯雜病中風當與後方同用一婦人因怒經事淋瀝半月方竭遇怒其經即至甚則口噤筋攣鼻衄頭痛痰痙搐搦瞳子上視此肝火熾甚以小柴胡湯傷寒少陽加熱地山梔釣藤治之後不復發一婦人素陰虛患遍身瘙癢誤服祛風之藥口噤抽搐肝脈洪數余曰肝血為陰為水肝氣為陽為火此乃肝經血虛火盛耳宜助陰血抑肝火用四物麥門五味子柴胡山梔生甘草熱搐頓止又以八珍黃耆麥門五味釣藤炙草調理而痊天南星散治婦人中風口噤四肢拘急或痰氣上壅天南星薑汁炒黃白附子炮黑附子炮烏蛇肉酒炙全蠍炒等分上為細末每服半錢以生薑汁溫酒調不拘時拗開口灌之走馬散治婦人中風口噤四肢強直附子炮去皮臍天麻各半兩桂心石膏研如面麻黃去節川烏頭炮去皮臍天南星炮蠍梢各二錢半麝另細研半錢上為細末入麝香研令勻每服二錢豆淋酒調下不拘時斡開口灌之烏蛇散治婦人中風口噤烏蛇肉酒浸乾蠍炒白殭蠶炒天南星炮天麻各半兩膩粉半錢另研上為細末入膩粉研勻每服二錢生薑酒調下斡開口灌之白朮酒治婦人中風口噤言語不得白朮銼黑豆各三兩炒熟上以酒四升煎至二升去滓分四服斡開口灌之治婦人中風口噤舌本縮語言難芥子一升細研以醋三升煎至一升塗頰頷下效不語巢氏論曰脾脈絡胃夾咽連舌本散舌下心之別脈系舌本今心脾二臟受風邪故舌強不得語也喉嚨者氣之所以上下也會厭者音聲之戶舌者聲之機唇者聲之扇風寒客於會厭之間故卒然無音皆由風邪所傷故謂之中風失音不語經云醉臥當風使人發喑不能言也薛前證若因痰迷心竅當清心火若因濕痰舌強當清脾熱若因風熱牙關緊急當清肝火若因風痰塞喉當導痰涎若因虛火上炎當壯水之主若因氣虛厥逆當益火之源若因腎虛舌暗而不語當補腎氣一婦人因怒仆地痰湧不語灌牛黃清心丸稍蘇用神仙解語丹加山梔柴胡桔梗漸愈又用六君柴胡山梔枳殼而痊一婦人忽然不語半年矣諸藥不應兩尺浮數先用六味丸料加肉桂數劑稍愈乃以地黃飲子二十餘劑而痊男子多有此證亦以此藥治之諸方並見雜證中風神仙解語丹治心脾經受風言語謇澀舌強不轉涎唾溢盛及療淫邪搏陰神內鬱塞心脈閉滯暴不能言白附子炮石菖蒲去毛遠志去心甘草水煮十沸天麻全蠍酒炒羌活白殭蠶炒南星牛膽釀如無只煨各一兩木香半兩上為細末水煮曲糊丸如梧桐子大量入辰砂為衣每服二十丸至三十丸生薄荷湯吞下無時防風湯治中風內虛腳弱語謇石斛一兩半酒炒乾地黃杜仲去粗皮切薑汁炒丹參各一兩二錢半防風川芎麥門冬去心桂心川獨活各一兩上㕮咀每服五錢水一盞半棗二枚煎至八分去滓溫服竹瀝湯治中風入肝脾經年四肢不遂舌強語謇威靈仙附子炮苦梗蔓荊子防風枳殼去穰麩炒川芎當歸各等分上㕮咀每服四錢水一盞竹瀝半盞姜三片煎至八分溫服一日四服忌茶地黃飲子等方詳雜病本門風痹手足不隨夫婦人風痹者由風寒濕三氣合而為痹風多者為風痹其狀肌膚盡痛諸陽之經皆起於手足而循行於身體風寒之氣客於肌膚始為痹復傷陽經隨其虛處而停滯與血氣相搏血氣行則遲緩故風痹而復手足不隨也薛經云邪之所湊其氣必虛前證若風邪淫旺或怒動肝火血燥筋攣用加味逍遙散脾肺氣虛肌膚不仁手足麻木用三痹湯若腎水虧損不能滋養筋骨或肝脾血虛而筋痿痹用六味丸服燥藥而筋攣者用四物生甘草氣血俱虛用八珍湯何醫林集要等方新刊丹溪心法附錄云若人大拇指麻木不仁或手足少力或肌肉微掣三年內必有大風之證宜先服八風湯天麻丸防風通聖散以預防之殊不知河間云風者病之末也所以中風有癱瘓者非謂肝木之風內中亦非六淫風邪外襲良由五志過極心火熾盛腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏憒筋骨無用而卒倒無知也治當以固元氣為主若遽服八風等藥則反傷元氣適足以招風取中一婦人因怒吐痰胸滿服二陳順氣化痰之劑半身不遂內熱口乾形氣殊倦余視之乃肝火熾盛而侮脾土也用逍遙散補中益氣湯六味地黃丸喜其慎疾年餘而愈一孀婦胸脅脹痛內熱晡熱月經不調肢體痠麻不時吐痰或用清氣化痰藥喉間不利白帶腹脹又用清熱理氣藥胸膈不寬肢體時麻余曰此本鬱怒傷肝脾前藥傷甚耳朝用歸脾湯以解鬱結生脾氣夕用加味逍遙散以生肝血清肝火百餘劑而愈後因怒肢體復麻用補中益氣加山梔茯苓半夏而痊後復怒病再作月經如注脈浮洪而數此肝火傷脾不能攝血所致也用六君芎歸炮姜一劑而血止用補中益氣加炮薑茯苓半夏四劑而胃醒更用歸脾湯逍遙散調理而痊一婦人頭暈吐痰用化痰理氣藥肢體或麻服祛風化痰藥肢體常麻手足或冷或熱此脾土虛而不能生肺金用補中益氣加茯苓半夏炮姜二十餘劑脾氣漸復諸證稍愈更用加味逍遙散三十餘劑而愈後因怒吐痰自服清氣化痰丸飲食不進吐痰甚多胸脅脹滿余用六君子倍加參朮少加木香數劑而康三痹湯治血氣凝滯手足拘攣風痹氣痹等疾川續斷杜仲銼薑汁炒去絲防風去蘆桂心華陰細辛人參去蘆白茯苓去皮當歸去蘆白芍藥甘草各一兩炙秦艽去蘆生地黃川芎川獨活各半兩去蘆黃耆去蘆川牛膝酒浸各一兩上㕮咀或為末每服八錢水二盞生薑五片棗一枚煎至一盞去滓熱服無時候但腹稍空服有人病左臂不隨後已痊平而手指不便無力試諸藥不效服此藥一料而愈獨活湯治婦人風痹手足不隨身體疼痛言語謇澀筋脈拘急並宜服之獨活去蘆桑寄生牛膝酒浸秦艽去蘆赤茯苓去皮桂心防風去蘆附子炮去皮臍當歸炒去蘆生乾地黃各一兩杜仲銼炒去絲細辛去苗芎藭赤芍藥各七錢半甘草炙半兩上為㕮咀每服八錢水一中盞半煎至一大盞去滓溫服無時烏蛇散治婦人風痹手足頑麻筋脈搐搦口眼不正言語謇澀烏蛇肉酒拌炒土蜂兒炒天南星炮天雄炮去皮臍赤箭麻黃去節薏苡仁芎藭各一兩羚羊角屑乾蠍微炒桑螵蛸微炒桂心硃砂研水飛各半兩當歸炒去蘆酸棗仁炒柏子仁各七錢半為細末入硃砂藥研勻每服一錢食前溫酒調下東垣羌活湯治濕熱身重或眩暈麻木小便赤澀下焦痿軟不能行履羌活防風柴胡各一錢藁本獨活茯苓澤瀉豬苓黃耆炒甘草炙陳皮黃柏酒炒黑黃連炒蒼朮升麻川芎各五分上水煎服甘草附子湯治風濕相搏骨節煩疼不時抽痛不能伸屈抑之則痛劇汗出短氣小便不利惡風不欲去衣或微腫痛甘草炙一兩附子一枚重一兩三四錢者方是炮去皮尖不真不效白朮炒一兩桂枝二兩上每服五錢水煎八珍湯治肝脾氣血俱虛不能養筋以致筋攣骨痛或不能行履或發熱晡熱寒熱往來等證加味逍遙散治肝經風熱血燥筋攣肢體不遂內熱晡熱等證八珍方見雜病虛勞本方見本科調經自汗藥隱老人云尋古治中風方續命排風越婢等悉能除去而千金多用麻黃令人不得慮虛凡以風邪不得汗則不能泄也然此治中風無汗者為宜若治自汗者更用麻黃則津液轉使脫泄反為大害中風自汗仲景雖處以桂枝湯至於不住發搐口眼瞤動遍身汗出者豈勝對治當此之時獨活湯續命煮散復榮衛卻風邪不可闕也薛前證若腠理不固而自汗者用桂枝湯或防風白朮牡蠣湯若過服風藥而自汗者用白朮防風湯若陽氣虛弱而自汗者用耆附湯若兼盜汗用補中益氣湯送六味丸如不應用當歸六黃湯獨活湯治風虛昏憒不自知覺手足瘛瘲坐臥不能或發寒熱血虛不能服發汗藥及中風自汗尤宜服之川獨活羌活人參防風當歸五味各去蘆細辛去苗茯神去木半夏湯洗七次切片子桂心白薇遠志去心菖蒲川芎各半兩甘草七錢半炙上㕮咀每服八錢水一盞半姜五片煎七分去滓溫服不拘時候續命煮散治風氣留滯心中昏憒四肢無力口眼瞤動有時搐搦亡失津液渴欲引飲此能扶榮衛去虛風中風自汗及產後中風自汗尤宜服之防風獨活當歸人參細辛葛根芍藥川芎甘草熟地黃半夏遠志去心荊芥穗各半兩桂心七錢半上㕮咀每服五錢水一盞生薑三大片煎至七分去滓溫服不拘時汗多不止者加牡蠣粉一分半補遺防風白朮牡蠣散治中風自汗不止白朮牡蠣煅防風各等分為末酒調下米飲亦可日三服汗即止如不止可服黃耆建中湯賊風偏枯藥隱老人云偏枯者其狀半身不隨肌肉枯瘦骨間疼痛神智如常名曰偏枯也原其疾之由皆因陰陽偏虧臟腑怯弱經絡空虛血氣不足當風沖坐風邪乘虛而入內經云汗出偏沮使人偏枯詳其義理如樹木或有一邊津液不蔭注而先枯槁然後被風所害人之身體或有一邊血氣不能榮養而先枯槁然後被風所苦其理顯然王子亨云舟行於水人處於風水能泛舟而亦能覆舟風能養體而亦能害體蓋謂船漏水入體漏風傷古人有云醫風先醫血血行風自滅是也治之先宜養血然後驅風無不愈者宜用大八風湯增損茵芋酒續斷湯大賊風偏枯者是體偏虛受風風客於半身也人有勞傷血氣半身偏虛者風乘虛入客於半體名為偏風也其風邪入深真氣去邪氣留發為偏枯此由血氣衰損為風所客令血氣不相周榮於肌故令偏枯也薛醫風先醫血此論得之大抵此證多因胎前產後失於調養以致精血乾涸肝木枯槁治法當滋其化源考之生氣通天論曰風客淫氣精乃亡邪傷肝也陰陽應象大論曰風氣通於肝風搏則熱盛熱盛則水乾水乾則氣不榮故精乃亡此風病之所由作也一婦人性善怒常自汗月經先期余以為肝火血熱不信乃泛用降火之劑反致月經過期復因勞怒口噤呻吟肢體不遂六脈洪大面目赤色用八珍麥門五味子山梔丹皮數劑漸愈兼用逍遙散六味丸各三十餘劑全愈大八風湯治中風偏枯失音半身不隨時復恍惚當歸去蘆杏仁麩炒甘草炙桂心乾薑炮各二兩五味子升麻各半兩川烏頭炮去皮臍黃芩芍藥獨活防風各去蘆川芎麻黃去節秦艽人參各去蘆石斛去根切酒浸炒茯神去木石膏黃耆去蘆紫菀各一兩大豆三兩去皮炒上為㕮咀每服五錢水兩盞酒一合煎至一盞去滓溫服恍惚者不用酒煎一方無茯神有遠志赤茯苓增損茵芋酒治半身不遂肌肉乾燥漸漸細瘦或時㾓痛病名偏枯茵芋葉川烏頭炮去皮尖石楠葉防風川椒炒出汗女萎附子炮北細辛獨活卷柏肉桂天雄炮去皮秦艽防己各一兩躑躅花炒當歸生乾地黃各二兩芍藥一兩上㕮咀酒二斗漬之冬七日夏三日春秋各五日初服一合漸增之以知為度令酒氣相續續斷湯治偏枯少血當歸三兩去蘆陳皮去白芍藥細辛各一兩去苗生乾地黃二兩上㕮咀每服五錢水二盞煎至八分去滓溫服臟寒多利者入熟附子一兩和前藥服之補遺全生虎骨散治半身不遂肌肉乾瘦忌用麻黃髮汗恐津液枯竭惟當潤筋養血消風當歸二兩赤芍藥續斷酒浸炒白朮藁本虎骨炙各五兩烏蛇肉炙半兩上為末每服二錢酒調下骨痛加生地一兩自利加天雄半兩虎脛骨酒治中風偏枯四肢不隨一切風痹筋脈攣拳石斛石楠葉防風虎脛骨炙當歸茵芋葉杜仲酒炒牛膝酒浸炒續斷酒浸炒芎藭巴戟去心狗脊去毛各一兩上以絹囊盛藥用酒一斗漬十日每服一盞溫飲偏風口喎夫婦人偏風口喎者是體虛受風風入於夾口之筋也足陽明之筋上夾於口其筋偏虛風因虛而乘之使其筋偏急不調故令口喎僻也薛一婦人懷抱鬱結筋攣骨痛喉間似有一核服烏藥順氣等藥口眼歪斜臂難伸舉痰涎愈多內熱晡熱食少體倦余以為鬱火傷脾血燥生風用加味歸脾湯二十劑形體漸健飲食漸進又用加味逍遙散十餘劑痰熱少退喉核少消更用升陽益胃湯數劑諸證漸愈但臂不能伸此肝經血少而筋攣耳用六味地黃丸以滋腎水生肝血而愈防風湯治卒然口喎斜言語牽急防風去蘆一兩羌活去蘆半兩甘草二錢半炙上為㕮咀每服五錢水二盞煎至一盞去滓入麝香研一字溫服深師續命湯療中風口僻噤諸疾卒死不知人補虛起死神方人參防己麻黃去根節芍藥川芎甘草黃芩白朮各半兩桂心附子炮防風各一兩生薑五兩上切以水一斗二升煮取三升分為三服不瘥更作忌海藻菘菜桃李蔥生菜雀肉豬肉防風散治婦人中風言語謇澀肢節疼痛皮膚不仁防風羌活各去蘆當歸去蘆炒天南星炮天麻桂心芎藭烏蛇肉酒浸白殭蠶炒桑螵蛸炒各半兩麝香研硃砂細研化飛各二錢半麻黃七錢半去根節為細末入研藥令勻每服一錢溫酒調下不拘時千金方炒大豆三升令焦以酒三升淋取汁頓服治口眼喎斜用蓖麻子七粒去皮研細作餅子安在手心右喎安左手左喎安右手卻用銅盂盛湯坐於藥上才正即洗去一用巴豆不用蓖麻出本草飛屍血厥夫飛屍者遊走皮膚穿臟腑每發刺痛變作無常遁屍者附骨入肉攻鑿血脈每發不可得近見屍喪聞哀哭便發風屍者淫濯四肢不知痛之所在每發昏沉得風雪便作沉屍者纏骨結臟衝心脅每發絞切遇寒冷便作注屍者舉身沉重精神錯亂常覺昏發每節氣至變輒成大惡皆宜用忍冬葉銼數斛煮令濃取汁煎之服如雞子大日三服人平居無疾苦忽如死人身不動搖默默不知人目閉不能開口噤不能言或微知人惡聞人聲但如眩冒移時方寤此由汗過多血少氣並於血陽獨上而不下氣壅塞而不行故身如死氣過血還陰陽復通故移時方寤名曰鬱冒亦名血厥婦人多有之宜服白薇湯倉公散丹溪云凡人忽手足逆冷肌膚起如米粒頭面青黑精神恍惚或錯言妄語或牙關緊急或昏寐仆倒吊死問喪入廟登墓多有此病先以蘇合香丸灌之次服調氣散雜病中氣平胃散雜病中食玉機微義云卒厥飛屍客忤鬼擊口噤用麻黃湯傷寒太陽寒厥表熱裡寒則下利清穀食入則吐脈沉手足冷用四逆湯傷寒厥熱厥腹滿身重難轉面垢譫語遺溺手足厥冷自汗脈沉滑用白虎湯雜病發熱錦衣楊永興舉家避眚有僕沉醉失避者既而神思昏昧遍身青傷各煎金銀藤即忍冬葉湯灌之愈一婦人忽昏憒發譫語自云為前謀賴某人銀兩某神責我將你起解往城隍理問兩腳踝膝臀處皆青腫痛不可忍口稱苦楚次日方蘇痛尚不止用金銀藤兩許水煎服即愈一婦人入古墓患前證以紫金錠磨汁灌之即蘇通政餘子華太常汪用之皆因往吊而卒死喪家想即是證也太乙神精丹方見雜病譫妄蘇合香丸方見雜病卒中雄朱散方見雜病譫妄白薇湯白薇當歸各一兩人參半兩甘草二錢半上㕮咀每服五錢水二盞煎至一盞溫服倉公散治卒鬼擊鬼疰鬼刺心腹如刺下血即死不知人及臥魘齒腳趾不覺者並諸毒氣等疾瓜蒂末九籥衛生方無瓜蒂末有皂角末藜蘆末雄黃研礬石煅研各等分上為細末研停用少許吹入鼻中得嚏氣通便活未嚏再吹以得嚏為度此藥能起死人恐皂角者為正補遺內鼻散治屍厥脈動而無氣氣閉不通靜而若死名卒厥石菖蒲去毛為末上每用二字內鼻中吹之令入仍以桂末安舌下硫黃散治屍厥奄然死去四肢厥冷不省人事腹中氣走如雷鳴焰硝半兩硫黃一兩上細研分三服酒調灌下如人行五里又進一服不過三服即蘇瘛瘲薛醫藥綱目云瘛者筋脈急也瘲者筋脈緩也急則引而縮緩則縱而伸或縮或伸動而不止者名曰瘛瘲俗謂之發搐是也凡癲癇風痙破傷風三證皆能瘛瘲但癲癇則仆地不省風痙瘛瘲則角弓反張破傷風瘛瘲則有瘡口竊謂瘛者屬肝經風熱血燥或肝火妄動血傷瘲者屬肝經血氣不足或肝火汗多亡血以致手足伸縮不已抽搐不利若因風熱血燥用羚羊角散妊娠痙加釣藤山梔若肝火妄動用加味四物湯即四物加柴胡丹皮山梔加釣藤鉤山梔若肝經血氣不足用八珍湯即雜病虛勞門八物湯加釣藤鉤山梔若肝火亡血用加味逍遙散調經加釣藤鉤山梔如不應須用六味丸雜病虛勞以補腎水生肝木為主佐以前劑治之若其脈長弦者是肝之本脈則易治其脈短澀者是肺金克肝木也則難治其面色青中見黑者是水生木也當自愈青中見白者是金剋木也必難愈一婦人素口苦月經不調或寒熱妊娠五月兩臂或拘急或緩縱此肝火傷血所致也用四物加柴胡山梔丹皮釣藤鉤而愈一妊婦因怒寒熱頸項動掉四肢抽搐此肝火血虛風熱用加味逍遙加釣藤鉤數劑痊顫振黃帝曰人之顫者何氣使然岐伯曰胃氣不實則諸脈虛諸脈虛則筋脈懈墜筋脈懈墜則行陰用力不復故為顫因其所在補分肉間醫學綱目云顫振與瘛瘲相類瘛瘲則手足牽引而或伸或屈顫振則但顫動而不伸屈也胃虛有痰用參術以補氣茯苓半夏以行痰如實熱積滯用張子和三法薛顫振者掉眩也易曰鼓萬物者莫疾乎風鼓之為言動也大抵掉眩乃風木之搖運也諸風掉眩皆屬於肝治法若肝木實熱用瀉青丸幼科肝肝木虛熱用六味丸雜病虛勞肺金克肝木用瀉白散雜病發熱肝木虛弱用逍遙散調經加參朮釣藤鉤脾血虛弱用六君子湯雜病虛勞加芎歸釣藤鉤胃氣虛弱用補中益氣湯難病傷勞倦加釣藤鉤若產後顫振乃氣血虧損虛火益盛而生風也切不可以風為論必當大補斯無誤矣一婦人性善怒發熱經水非過期則不及肢體倦怠飲食少思而顫振余謂脾氣不足肝經血少而火盛也午前以調中益氣湯加茯苓貝母送六味丸午後以逍遙散送六味丸兩月餘而愈一婦人身顫振口妄言諸藥不效余以為鬱怒所致詢其故蓋為素嫌其夫而含怒久矣投以小柴胡湯傷寒少陽稍可又用加味歸脾湯歸牌湯加柴胡山梔而愈交加散治瘛瘲或顫振或產後不省人事口吐痰涎當歸荊芥穗各等分上為細末每服三錢水一盞酒少許煎至七分灌下咽即有生理增損柴胡湯治產後或經適斷致手足牽搐咬牙昏冒異證柴胡八錢黃耆炒五錢黃芩炒石膏各四錢半夏三錢知母甘草炙各二錢上為粗末每服半兩姜五片棗四枚水煎溫服本事青鹽丸治肝腎虛損腰膝無力顫振嚲曳蘹香末三兩菟絲子四兩乾山藥二兩末青鹽一兩研上先將菟絲子洗淨無灰酒浸曬七日冬天近火煨炙乾另為細末和勻酒糊丸梧子大每服五七十丸溫酒或鹽湯下常服壯筋力進飲食一婦人素患足嚲曳服此藥履地如故本事星附散治中風能言而手足嚲曳脈虛浮而數天南星制同半夏半夏薄切片薑汁浸透黑附子炮白附子炮川烏頭炮白殭蠶炒沒藥人參白茯苓各等分上為粗末每服二錢酒水各一盞同煎至八分去滓熱進三二服汗出即瘥在桐廬有患此證用前藥三服得汗手足即能舉動三因獨活散治氣虛感風或驚恐相乘肝膽受邪使上氣不守正位致頭招搖手足顫掉漸成目昏獨活地骨皮細辛芎藭菊花甘味者防風去叉甘草炙等分上為粗末每服三錢水盞半煎至一盞去滓煎取清汁六分入竹瀝少許再煎一二沸食後溫服日二服世傳茯苓丸治手臂抽牽或戰掉不能舉物服此藥立愈又治脾氣虛弱痰邪相搏停伏中脘以致臂內筋脈攣急而痛茯苓半夏薑製各二兩枳殼麩炒半兩風化朴硝一兩上為末薑汁糊丸桐子大每服二十丸食後薑湯下驚悸失血心神不安婦人血風驚悸者是風乘於心故也心藏神為諸臟之主若血氣調和則心神安定若虛損則心神虛弱致風邪乘虛襲之故驚而悸動不定也其驚悸不止則變惚恍而憂懼也排風湯亦可用薛丹溪先生云驚悸者血虛用硃砂安神丸痰迷心竅用定志丸怔忡者屬火屬痰思慮便動者屬虛時作時止者火動也假如病因驚而到驚則神出其舍痰乘而入矣蓋人之所主者心心之所養者血心血一虛神氣不守此驚悸之所由生也治當調養心血和平心氣而已金氏婦暑月赴筵因坐次失序自愧成病言語失倫兩脈弦數予曰當補脾導痰清熱不信以數巫者噴水咒之而死或謂病既無邪以邪治之何至於死予曰暑月赴筵外受蒸熱辛辣適口內傷鬱熱而況舊有積痰加之愧悶其痰愈盛又驚以法尺益驚其神而氣血不寧噴以法水閉其肌膚而汗不得泄內燔則陰既銷而陽不能獨立不死何待故滑伯仁先生云若膽氣虛寒用茯神湯膽氣實熱用酸棗仁丸心氣虛熱用定志膏茯苓補心湯心氣實熱用硃砂安神丸茯神散文學歸云橋內人月事不及期忽崩血昏憒發熱不寐或謂血熱妄行投以寒劑益甚或謂胎成受傷投以止血亦不效余曰此脾氣虛弱無以統攝故耳法當補脾而血自止用補中益氣湯雜病傷勞倦加炮姜不數劑而驗惟終夜少寐驚悸別服八物湯不效余曰雜矣乃與歸脾湯雜病健忘加炮姜以補心脾遂如初一婦人勞則心跳怔忡寒熱往來用歸脾湯為主佐以八珍湯諸證漸愈又用加味逍遙散寧志丸而安後復作服歸脾定志二藥即愈一婦人患驚悸怔忡日晡發熱月經過期飲食少思用八珍湯加遠志山藥酸棗仁三十餘劑漸愈佐以歸脾湯全愈後因勞發熱食少體倦用補中益氣湯又因怒適月經去血不止前證復作先以加味逍遙散熱退經止又用養心湯治之而痊一婦人驚悸怔忡無寐自汗盜汗飲食不甘怠惰嗜臥用歸脾湯而愈至年餘懷抱鬱結患前證兼衄血便血仍用前湯而愈茯神散治婦人血風五臟大虛驚悸安神定志茯神去木人參去蘆龍齒另研獨活去蘆酸棗仁各一兩微炒防風去蘆遠志去心桂心細辛去苗白朮去蘆各七錢半甘草炙乾薑炮各半兩上㕮咀每服五錢水一中盞半煎至一大盞去滓溫服不拘時候龍齒丸治婦人血風上攻心神恍惚驚悸眠臥不安龍齒另研茯神去木各一兩硃砂研水飛人參去蘆當歸去蘆天麻各七錢半檳榔防風去蘆生乾地黃犀角屑各半兩遠志去心赤箭各二錢半麝香一錢另研上為細末煉蜜和搗三五百下丸如梧桐子大每服三十丸薄荷湯送下不拘時朱賁琥珀散治婦人血風驚悸琥珀研沒藥研木香當歸芍藥白芷羌活乾地黃延胡索川芎各半兩土瓜根牡丹皮去心白朮桂心各一兩上為末每服一錢水一盞煎至七分加酒一分再煎少時熱服重者數服效茯苓補心湯治心氣不足善悲愁怒衄血面黃五心煩熱或咽喉痛舌本作強茯苓四兩桂心甘草炒麥門冬去心各三兩紫石英煅人參各一兩大棗二十枚赤小豆二十四粒上用水七升煎二升半分三服茯神湯治膽氣虛冷頭痛目眩心神恐畏不能獨處胸中煩悶茯神去木酸棗仁炒黃耆炒柏子仁炒白芍藥炒五味子杵炒各一兩桂心熟地黃自制人參甘草炒各半兩上每五錢姜水煎服酸棗仁丸治膽氣實熱不得睡臥神思不安驚悸怔忡茯神去木酸棗仁炒遠志去心柏子仁炒防風各一兩枳殼麩炒生地黃杵膏各半兩青竹茹二錢五分上為末煉蜜丸梧桐子大每服七八十丸白湯下定志丸治心神虛怯神思不安或語言鬼怪喜笑驚悸人參茯苓各一兩五錢菖蒲遠志去心各一兩上為末蜜丸如前服養心湯治心血虛驚悸怔忡不寧或盜汗無寐發熱煩躁黃耆炒白茯苓茯神去木半夏曲當歸酒拌川芎各半兩辣桂去皮柏子仁酸棗仁炒五味子杵炒人參各三錢甘草炙四錢上每服三五錢薑棗水煎服硃砂安神丸治心經血虛頭暈心神驚悸等證硃砂飛過五錢黃連酒洗六錢甘草炙五分生地黃當歸各一錢五分上為末飯糊為丸每服十五丸如一二服不應當服歸脾湯補之治要茯苓散治心經實熱口乾煩渴眠臥不安或心神恍惚茯神麥門冬各一兩半去心通草升麻各一兩二錢半大棗十二枚紫菀桂心各七錢半知母一兩赤石脂一兩七錢半淡竹茹五錢上每服一兩水煎失血心神不安薛前證若脾肝鬱熱用加味逍遙散脾肝鬱結用加味歸脾湯脾胃虛弱氣血不足用八珍湯十全大補湯脾肺虛弱氣血不足用補中益氣湯六君子湯痰氣鬱滯用六君桔梗貝母如不應審系氣虛但補脾胃如不應用獨參湯如惡寒發熱屬氣血俱虛內熱晡熱屬血虛作渴面赤是血脫煩躁皆宜甘苦之劑以補陽氣而生陰血經云血脫補氣若用寒涼之劑以降火則誤矣仍審所屬之因治之寧志膏治婦人因失血過多心神不安言語失常不得睡臥辰砂研酸棗仁炒人參白茯神去木琥珀各一分研滴乳香一錢研上為末和停每服一錢濃煎燈心棗湯空心調下一方無茯神琥珀蜜丸如彈子大薄荷湯化下一丸茯苓補心湯婦人以血旺氣衰為本心主血肝藏血今血衰而氣盛者由心氣虛耗不能主血又不能制乎肺金使肺金得以乘乎肝木肝之虧損則血不能藏漸致枯涸不榮經絡故月事不調矣此方專補心元之虛抑其肺氣之乘調和榮衛滋養血脈其疾自然平復矣即參蘇飲內除木香與四物湯對分勻和以薑棗煎每服四錢食前溫服參蘇飲方見發熱四物湯方見通治妙香散治心氣不足精神恍惚虛煩少睡盜汗等證甘草炒五錢遠志去心炒山藥薑汁炙茯苓茯神去木黃耆各一兩人參桔梗各五錢辰砂另研三錢麝香另研二錢木香二錢五分上為細末每服二錢溫酒調下半夏湯治膽腑實熱精神恍惚寒熱泄瀉或寢汗憎風善太息半夏一錢五分黃芩遠志去骨各一錢生地黃二錢秫米一合酸棗仁少三錢縮砂仁一錢五分上作一劑長流水煎服獨參湯治元氣虛弱惡寒發熱或作渴煩躁痰喘氣促或氣虛卒中不語口噤或痰涎上湧手足逆冷或難產產後不省喘急用好人參二兩或三四兩加炮姜五錢水煎徐徐服蓋人參性寒故以姜佐之如不應急加附子顛狂大夫婦人顛狂病者由血氣虛受風邪所為也人稟陰陽之氣而生而風邪入並於陰則為顛入並於陽則為狂陰之與陽有虛有實隨其虛時為邪所並則發也顛者卒發意不樂直視仆地吐涎沫口喎目急手足撩戾無所覺知良久乃蘇狂者少臥不飢自高賢也自辨智也自貴倨也妄笑好歌樂妄行不休故曰顛狂也素問云陽厥狂怒飲以鐵落狂怒出於肝經肝屬木鐵落金也以金制木之意予嘗治一女人眼見鬼物言語失常循衣直視眾醫多用心藥治之無效予投養正丹二帖煎乳香湯送下以三生飲佐之立愈又一男子亦曾病此證亦用此藥收效且養正丹與百一方抱膽丸無異抱膽丸內無硫黃有乳香也薛劉宗厚先生云有在母腹中受驚者或有聞大驚而得者蓋驚則神不守舍舍空則痰涎歸之或飲食失節胃氣有傷痰停胸膈而作當尋火尋痰固元氣若頑痰膠固上膈必先用吐法若在腸胃亦須下之竊謂此證若因元氣虛弱或痰盛發熱等皆是虛象如慢驚證無風可祛無痰可逐但補脾胃生氣健旺神智自清痰涎自化若誤用辛散祛逐腦麝之劑必為敗證一婦人素清苦因驚而顛或用風痰等藥愈甚余用參耆歸術濃煎佐以薑汁竹瀝服三斤余方愈防風散治婦人風邪顛狂或啼泣不止或歌笑無度或心神恐懼或言語失常防風茯神去木獨活人參遠志去心龍齒研菖蒲去毛石膏牡蠣各一兩秦艽禹餘糧桂心各半兩甘草七錢半蛇蛻一尺炙上為粗末每服三錢水一盞半煎七分去滓溫服又方羚羊角屑人參生乾地黃各七錢半獨活遠志去心菖蒲去毛防風各半兩茯神去木石膏麥門冬去心龍齒別研白鮮皮各一兩上為粗末每服三錢水煎溫服無時牛黃清心丸亦可用方見雜病中風余詳雜病本門血風煩悶大婦人血風煩悶者由腑臟勞傷血氣虛而風邪入之搏於血脈使氣不通而痞澀則生於熱或肢節煩疼口乾少臥皆因虛弱而氣血壅滯故煩悶也薛前證多屬肝脾血虛發熱宜參照前寒熱方論主治酸棗仁散治婦人血風煩悶四肢疼痛心神多躁飲食減少並皆治之酸棗仁赤芍藥赤茯苓去皮當歸去蘆紅花子生乾地黃羚羊角屑各七錢半防風去叉羌活去蘆牛膝酒浸芎藭桂心地骨皮麥門冬去心甘草各半兩炙上為㕮咀每服八錢水一中盞半生薑七片薄荷七葉煎至一大盞去滓溫服不拘時紫石英散治婦人血風煩悶心神恍惚睡臥不安紫石英一兩茯神去木麥門冬去心人參去蘆遠志去心酸棗仁當歸去蘆黃芩各七錢半羚羊角屑防風去蘆黃耆各半兩甘草炙二錢半上為㕮咀每服五錢水一中盞半生薑五片棗二枚煎至一大盞去滓溫服不拘時當歸散治婦人血風潮熱當歸去蘆二兩芍藥玄胡索熟地黃各一兩大黃蒸七錢半桂心半兩甘草炙二錢半上為細末每服一錢水一盞入干胭脂一錢同煎至六分去滓食後溫服赤芍藥散治婦人氣血不和心胸煩悶不思飲食四肢少力頭目昏眩身體疼痛牡丹皮白茯苓赤芍藥白芷甘草各二兩柴胡一兩半上為細末每服二錢水一盞生薑一片棗一枚同煎至七分溫服食後臨臥血風攻脾不能食大脾屬於土脾為中州意智之臟也其肝心肺腎皆受脾之精氣以榮養焉脾與胃為表裡脾主化谷納食胃為水穀之海故經言四時皆以胃氣為本也婦人氣血不調臟腑勞損風邪冷氣蘊蓄在內攻於脾胃脾胃既虛為邪所乘則不能消任五穀故不能食也薛經云胃乃脾之剛脾乃胃之柔傷胃則脾無所稟受傷脾則不能為胃運化是以脾胃為之表裡藉飲食以滋養百脈者也竊謂前證若飲食所傷六君子湯雜病虛勞勞役所傷補中益氣湯雜病傷勞倦若風寒所傷用人參理中湯雜病霍亂木旺乘土六君加柴胡嘔吐腹痛或大便不實前湯加木香胸膈虛痞或肚腹不利六君子湯鬱怒傷損肝脾歸脾湯雜病健忘命門火衰八味丸雜病虛勞仍審諸經錯雜之邪而治之假如不能食而肌肉削乃脾胃經本病右關脈緩而弱乃脾胃之本脈若見弦緊或四肢滿閉淋溲便難轉筋此肝之脾胃病也若兼洪大或肌熱煩熱面赤此心之脾胃病也若兼浮澀或氣短喘急咳嗽痰盛此肺之脾胃病也若兼沉細或善恐善欠此腎之脾胃病也各當於本經藥中加兼證之藥此東垣先生之治法也一婦人停食飽悶或用人參養胃湯木香檳榔丸而泄瀉吐痰腹中成塊又與二陳黃連厚朴反加腹脹不食余以為脾胃氣虛不能消磨用補中益氣加茯苓半夏五十餘劑脾胃健而諸證痊一婦人飲食每用碗許若稍加非大便不實必吞酸噯腐或用二陳黃連枳實反加內熱作嘔余曰此末傳寒中不信仍作火治虛證悉至月經不止余用六君加炮薑木香數劑諸證漸退又以補中益氣加炮薑木香茯苓半夏數劑全愈後因飲食勞倦兼以怒氣飲食頓少元氣頓怯仍用前藥更加發熱脈洪大按之而虛兩尺如無此命門火衰用補中益氣加薑桂及八味丸兼服兩月餘諸證尋愈此證若因中氣虛弱用人參理中湯或六君子加木香炮姜不應用左金丸兩脅脹痛或越鞠丸雜病郁虛寒加附子理中湯中寒無有不愈一婦人飲食後或腹脹或吞酸自服枳朮丸飲食日少胸膈痞滿腿內痠痛畏見風寒或用養胃湯腿痛浮腫益盛月經不行余以為鬱結所傷脾虛濕熱下注侵晨用四君子芎歸二陳午後以前湯送越鞠丸諸證漸愈又用歸脾八珍二湯兼服兩月餘而經行一婦人胸滿少食或腹脹吞酸或經候不調此中氣虛而不能施化也用補中益氣加砂仁香附煨姜而飲食進更以六君芎歸貝母桔梗而經自調一婦人年三十餘忽不進食日飲清茶水果三年餘矣余謂脾氣鬱結用歸脾加吳茱萸四劑遂飲食如常若人脾腎虛而不飲食當以四神丸治之一婦人不進飲食二年矣日飲清茶果品之類肝脾二脈弦浮按之微而結滯余謂肝脾氣鬱用六君木香吳茱下痰積甚多飲食頓進形體始瘦臥床月餘仍服六君之類而康草豆蔻散治婦人血風冷氣攻脾胃嘔逆不納飲食草豆蔻去皮白茯苓去皮枇杷葉炙半夏湯洗七次切作片各七錢半高良薑白朮去蘆縮砂仁桂心木香青橘皮去白甘草炙各半兩人參去蘆一兩上㕮咀每服五錢水一中盞半生薑七片煎至一大盞去滓溫服不拘時候訶梨勒散治婦人血風氣攻脾胃腹脅妨悶四肢煩疼或時痰逆不下飲食訶梨勒皮陳橘皮各一兩去白半夏湯洗七次切片人參去蘆桂心白朮去蘆細辛去苗土當歸炒去蘆甘草炙各半兩藿香赤茯苓去皮芎藭各七錢半上制煎服法同前神麯丸治婦人血風氣攻脾胃腹脅脹滿不思飲食神麯白朮去蘆附子炮去皮臍枳實麩炒去穰訶梨勒皮桂心食茱萸木香陳橘皮去白人參去蘆各一兩桔梗去蘆乾薑炮各半兩上為細末酒煮麵糊和丸如梧桐子大每服三十丸空心食前生薑湯下日進二服進食散李潛云治脾胃虛寒不思飲食及久病人脾胃虛全不入食者只兩服能食陳雲此方既有川烏治血風攻脾不食豈無良驗青皮陳皮粉草桂心良薑各二錢半川烏頭炮去皮尖草豆蔻仁各三枚訶子去核五枚為細末每服一錢水一盞生薑三片煎七分溫服身體骨節疼痛大婦人血風身體骨節疼痛者由體虛氣血不調為風所侵故也其狀風邪在於皮膚肌肉歷於骨節邪氣與正氣交擊故令疼痛也薛東垣先生云飲食失節脾胃虛弱乃血所生病故口中津液不行若火熱來乘土位故肢體發熱作渴若肝經血熱用四物雜病虛勞羌活黃芩黃柏肝經血虛用逍遙散調經山梔川芎風濕兼痰用四物南星半夏羌活蒼朮風濕傷脾用羌活勝濕湯雜病腰痛暑濕傷氣用清燥湯雜病傷暑氣鬱肝脾用四君木香枳殼檳榔胃氣受傷用補只益氣湯雜病傷勞倦瘀血流注用四物桃仁紅花骨痛筋攣用當歸沒藥丸木條倦怠無力用補中益氣羌活川芎一婦人自汗盜汗發熱晡熱體倦少食月經不調吐痰甚多二年後遍身作痛陰雨益甚此氣虛而風寒所乘用小續命湯疼痛頓止又用補中益氣加味歸脾三十餘劑諸證悉愈一婦人月經不調且素有痛風遇勞必作用眾手重按痛稍止此氣血俱虛用十全大補雜病虛勞加獨活而痛痊用六味丸雜病虛勞逍遙散而經調一婦人肢體作痛面色痿黃時或赤白發熱惡寒吐瀉食少腹痛脅脹月經不時或如崩漏或痰盛喘嗽頭目眩痛或五心煩熱口渴飲湯或健忘驚悸盜汗無寐等證臥床年許悉屬肝脾虧損氣血不足所致用十全大補加味歸脾兼服月餘諸證悉痊芎藭散治婦人血風身體骨節疼痛心膈壅滯少思飲食川芎一兩赤茯苓去皮赤芍藥酸棗仁炒桂心當歸去蘆木香牛膝酒浸各七錢半羌活去蘆枳殼去穰麩炒甘草各半兩炙上為㕮咀每服三錢水一大盞半姜五片煎至一大盞去滓熱服不拘時候海桐皮散治婦人血風身體骨節疼痛海桐皮桂心白芷當歸去蘆漏蘆川芎羚羊角屑各一兩赤芍藥沒藥另研川大黃炒木香檳榔各半兩上為細末每服二錢溫酒調下不拘時虎骨散治婦人血風攻疰身體疼痛虎脛骨一兩半酥炙麝香二錢半另研桂心川芎海桐皮當歸去蘆牛膝酒浸天麻附子炮去皮臍骨碎補沒藥另研琥珀另研各一兩羌活去蘆木香各半兩上為細末入研藥令勻每服二錢溫酒調下不拘時候日進二服何首烏散治婦人血風身體骨節疼痛或手足麻痹腰骻沉重牽拽不隨並皆治之何首烏羌活去蘆當歸炒去蘆赤箭附子炮去皮臍桂心赤芍藥芎藭羚羊角屑各七錢半威靈仙牛膝酒浸各一兩防風半兩去蘆上為細末每服二錢豆淋酒調下不拘時通靈丸治男子婦人手足疼痛風走注痛不可忍白附子炮殭蠶炒各一兩全蠍半兩炒麝香另研一字上為細末煉蜜和丸如梧子大每服二三十丸溫酒送下日進三服不拘時當歸沒藥丸治婦人血風血氣腹脅刺痛筋攣骨痹手足麻木皮膚瘙癢並宜服之當歸去蘆五靈脂炒各一兩沒藥半兩另研上為細末醋糊和丸如梧子大每服三十丸空心溫酒送下生薑湯亦可日進二服四生丸治血風骨節疼痛舉臂不起行履艱難遍身麻痹白殭蠶炒地龍去土白附子生五靈脂炒草烏頭去皮尖生各等分上為細末以米糊和丸梧子大每服二十丸溫酒送下或作末酒調半錢亦可日進二服不拘時候羚羊角散治血風身體疼痛手足無力心神壅悶羚羊角屑酸棗仁炒生乾地黃檳榔各一兩五加皮防風赤芍藥當歸骨碎補炒去毛海桐皮川芎各七錢半甘草半兩上為末每服二錢溫酒調下羌活勝濕湯治頭痛脊痛腰似折項似拔羌活獨活各一錢藁本防風甘草炙各半錢蔓荊子川芎各二分上水煎服如身重腰沉沉然是濕熱也加黃柏一錢附子半錢蒼朮二錢走疰痛大夫婦人體虛受風邪之氣隨血而行或淫溢皮膚卒然掣痛遊走無有常處故名為走疰也加減小續命湯主之薛東垣云若人身體沉重走疰疼痛此濕熱相搏或風熱鬱而不得伸附著於有形也是證多因飲食起居失節或因七情勞役失宜脾胃虧損腠理不密外邪所侵以致內熱晡熱自汗盜汗或經候不調飲食不甘治法濕熱腫痛者清燥湯雜病傷暑兼痰佐以二陳湯雜病痰飲肝火作痛者加味逍遙散脾郁作痛者加味歸脾湯血虛作痛者四物湯氣虛作痛者四君子湯氣血俱虛者八珍湯俱加羌活川芎月經先期而痛者加味逍遙散頭眩倦怠而痛者補中益氣湯大抵按之痛甚者病氣實按之痛緩者元氣虛勞役而痛者亦元氣虛也飲食失宜而痛者脾氣虛也惱怒而痛者肝火盛也若晝輕而夜重者血分病也一婦人歷節發熱作渴飲食少思月經過期其脈舉之洪大按之微細用附子八物湯四劑而痛止用加味逍遙而元氣復用六味丸而月經調一婦人體肥胖素有熱月經先期患痛風下體微腫痛甚則小便頻數身重脈緩此風濕血虛有熱用羌活勝濕湯二劑腫痛漸愈用清燥湯數劑小便漸清用加味逍遙散內熱漸愈又為飲食停滯發熱仍痛面目浮腫用六君加柴胡升麻而愈又因怒氣小腹痞悶寒熱嘔吐用前藥加山梔木香而安惟小腹下墜似欲去後此脾氣下陷用補中益氣而愈後因勞役怒氣作嘔吐痰遍身腫痛經行寒熱此肝木侮脾土用六君加柴胡山梔腫痛嘔吐悉退後用補中益氣而安一婦人飲食少思畏風寒患痛風嘔吐寒熱脈弦緊用附子八物湯而四肢痛愈用獨活寄生湯而腰痛漸痊惟兩膝腫痛用大防風湯而痛漸愈用歸脾逍遙而元氣復沒藥散治婦人血風走疰肢節疼痛發時來往不定沒藥另研乳香另研芎藭當歸炒去蘆桂心漏蘆去蘆木香各半兩白芷琥珀另研地龍去土微炒各七錢半安息香另研麝香另細研各二錢半為細末入研藥拌勻每服一錢溫酒調下不拘時琥珀散治婦人血風走疰疼痛來往疼痛琥珀另研當歸去蘆牛膝酒浸羌活去蘆川大黃銼微炒各七錢半桂心一兩沒藥另研血竭另研乾漆炒煙盡玄胡索防風去蘆羚羊角屑各半兩上為細末每服二錢溫酒調下不拘時日進二服虎骨散治婦人血風走疰疼痛痛不可忍虎脛骨二兩酥炙乾蠍炒琥珀另研各半兩當歸炒威靈仙牛膝酒浸羌活去蘆桂心各一兩漏蘆去蘆芎藭沒藥另研各七錢半上為細末每服二錢溫酒調下不拘時候日進二服雄黃散治婦人血風走疰疼痛雄黃研水飛血竭另研赤箭側子炮去皮臍桂心沒藥另研木香白芥子地龍炒去土蛜𧌴各半兩生用麝香二錢半另研烏蛇二兩酒浸去皮骨炒微黃上為細末入研藥更研令勻每服二錢熱酒調下不拘時候日進二服漏蘆散治婦人血風走疰疼痛無有常處漏蘆當歸牛膝各三分桂心地龍去土防風羌活白芷沒藥研甜瓜子各半兩虎脛骨酥炙敗龜板醋炙各一兩上為細末每服二錢熱酒調下無時四生丸見前麝香丸治白虎歷節諸風疼痛遊走不定狀如蟲齧晝靜夜劇及一切手足不測疼痛大八角川烏頭三枚去皮尖生用生全蠍二十個生黑豆二十粒生地龍去土半兩為細末入麝香一字同研停糯米糊為丸如綠豆大每服七丸甚者十丸夜臥令膈空溫酒吞下微出冷汗一身便瘥許學士云予得此方凡是歷節及不測疼痛一二服便瘥在歙州日有一貴家婦人遍身走注疼痛至夜則發如蟲齧其肌多作鬼邪治予曰此正歷節病也三服效芍藥知母湯三因治諸肢節疼痛身體尫羸腳腫如脫頭眩短氣溫溫欲吐桂心知母防風各四兩芍藥麻黃去根節甘草各三兩附子二兩炮上㕮咀每服四錢水一盞半生薑五片煎七分去滓空心服一方有白朮川芎杏仁半夏附子八物湯治風歷節疼痛四肢如錘鍛不可忍附子乾薑芍藥茯苓人參甘草桂心各三兩白朮四兩上㕮咀每服四大錢水二盞煎七分去滓食前服一方去桂用乾地黃二兩獨活寄生湯方見雜病腰痛小續命湯治白虎歷節痛不可忍方見雜病中風陳一婦人先自兩足踝骨痛不可忍次日流上於膝三日流於髀骨甚疼至於肩肩流於肘肘流於後谿或如錘鍛或如蟲竄痛不可忍晝靜夜劇服諸藥無效召僕診之六脈緊予曰此真歷節證也非解散之藥不能愈但用小續命湯一劑而痊又鄧安人夏月亦病歷節痛不可忍諸藥無效召僕診之人迎與心脈虛此因中暑而得合先服酒蒸黃連丸眾醫莫不笑用此藥服一帖即愈自後與人良驗治婦人血風走疰腰膝骨節疼痛不可忍附子生薰陸香杏仁研桂心當歸蕓薹子芫花巴豆去皮各一兩松脂一兩半上為細末熔黃蠟五兩攪和諸藥捏作片子包裹痛處立效又方芫花桂心各一兩漢椒二兩桑根白皮三兩蕓薹子柳蚛屑各五兩上為細末用醋一升拌和蒸令熱用青布裹熨痛處冷即更入醋蒸用之治婦人血風走疰腰胯腳膝疼痛天仙子川烏頭生附子生各一兩上為細末以酒煎成膏攤於帛上敷貼痛處多年者不過三上效頭目眩暈大婦人頭眩由氣虛風入於腦循脈引於目系目系急而然也邪甚則必癲素問云頭痛癲疾下虛上實過在足少陰巨陽甚則入腎徇蒙招搖目瞑耳聾下實上虛過在足少陽厥陰甚則在肝下虛者腎虛也故腎厥則頭痛上虛者肝虛也故肝虛則暈徇蒙者如以物蒙其首招搖不定目眩耳聾皆暈之狀故肝厥頭痛不同也薛丹溪先生云眩者言其黑運旋轉其狀目閉眼暗身轉耳聾如立舟船之上起則欲倒蓋虛極乘寒得之亦不可一途而取軌也若風則有汗寒則掣痛暑則熱悶濕則重滯此四氣乘虛而眩暈也若鬱結生痰而眩暈者此七情虛火上逆也若淫欲過度而眩暈者此腎虛氣不歸源也若吐衄漏崩而眩暈者此肝虛不能攝血也有早起眩暈須臾自定者元氣虛也正元飲雜病自汗下黑錫丹雜病頭痛傷濕頭暈用腎著湯雜病傷濕加川芎有痰用青州白丸子雜病中風頭風風熱也久則目昏偏頭風相火也久則目緊便澀皆宜出血以開表之竊謂前證肝虛頭暈用釣藤散腎虛頭暈六味丸雜病虛勞頭暈吐痰養正丹不應八味丸雜病虛勞血虛四物參苓白朮不應當歸補血湯雜病勞倦氣虛四君歸耆不應補中益氣湯雜病勞倦肝木實瀉青丸雜病頭痛虛用地黃丸雜病虛勞不應川芎散脾氣虛二陳參朮柴胡升麻不應益氣湯加茯苓半夏脾胃有痰半夏白朮天麻湯風痰上湧四神散發熱惡寒八物湯雜病虛勞七情氣逆四七湯傷濕而暈除濕湯雜病中濕一婦素頭暈不時而作月經遲而少此中氣虛弱不能上升而頭暈不能下化而經少用補中益氣湯而愈後因勞仆地月經如湧此勞傷火動用前湯加五味子一劑而愈前證雖雲氣無所附實因脾胃虧損耳一婦人內熱口乾勞則頭暈吐痰帶下詳下嘈雜門養正丹治虛風頭眩吐涎不已蓋此藥升降陰陽補接真氣非止頭眩而已黑鉛水銀硫黃研硃砂研各一兩上用建盞一隻火上熔鉛成汁次下水銀用柳杖子打停取下歇少時入二味打停候冷取下研為粉以糯米軟飯丸如綠豆大每服三十丸棗湯吞下空心食前日二服釣藤散本事治肝厥頭暈清頭目釣藤陳皮去白半夏湯洗七次切片子麥門冬去心茯苓去皮茯神去木人參去蘆甘菊花防風去蘆各半兩甘草二錢半炙石膏一兩上㕮咀每服四錢水一盞半生薑七片煎至一盞去滓熱服日進二服獨活散治婦人風眩頭疼嘔逆身體時痛情思昏悶獨活一兩白朮去蘆防風去蘆細辛去苗人參去蘆芎藭荊芥各七錢半半夏湯洗七次切片子炙甘草赤芍藥各半兩石膏二兩上㕮咀每服八錢水一中盞半生薑七片薄荷七葉煎至一大盞去滓溫服不拘時川芎散治風眩頭暈川芎山藥白茯神去木甘菊花野菊不用人參各半兩去蘆山茱萸肉一兩上為細末每服二錢溫酒調下不拘時候日進三服四神散治婦人血風眩暈頭痛菊花當歸去蘆旋覆花荊芥穗各等分上為細末每服二錢水一盞蔥白三寸茶末一錢煎至七分通口服良久去枕仰臥少時斗門方治血風頭旋或不知人事用喝起草嫩心陰乾為末酒服二錢其功甚效即前蒼耳散治頭旋如天動地轉名曰心眩膽礬一兩細研用麵餅劑一個拌勻勒如骰子大瓦上焙乾每服一骰為末燈心竹茹煎湯調下此去痰之法當審而用之頭痛薛東垣云足太陽頭痛脈浮緊惡風寒川芎羌活獨活麻黃為主手少陽經頭痛脈弦細往來寒熱柴胡為主足陽明頭痛身熱目疼鼻乾惡寒發熱脈浮緩而長升麻湯升麻葛根或石膏白芷為主手太陽頭痛有痰體重或腹痛為痰癖脈沉緩蒼朮半夏南星為主足少陰經頭痛足寒氣逆為寒厥脈沉細麻黃附子細辛湯傷寒太陽為主足厥陰頭項痛或吐涎沫厥冷脈浮緩吳茱萸湯傷寒吐主之諸血虛頭痛當歸川芎為主諸氣虛頭痛人參黃耆為主氣血俱虛頭痛調中益氣湯雜病勞倦少加川芎蔓荊細辛痰厥頭痛半夏白朮天麻湯雜病眩暈厥逆頭痛羌活附子湯雜病頭病如濕氣在頭者以苦吐之不可執方而治若脈雜亂而病見不一且補胃為主一婦人因勞耳鳴頭痛體倦用補中益氣加麥門五味而痊三年後得子因飲食勞倦前證益甚月經不調晡熱內熱自汗盜汗用六味地黃丸補中益氣湯頓愈經云頭痛耳鳴九竅不利腸胃之所生也故脾胃一虛耳目九竅皆為之病一婦人兩眉稜痛後及太陽面青善怒此肝經風熱之證用選奇湯雜病頭痛合逍遙散調經加山梔天麻黃耆半夏黃芩而愈此證失治多致傷目或兩耳出膿則危矣旋覆花湯許叔微云婦人患頭風者十居其半每發必掉眩如在車船上蓋因血虛肝有風邪襲之爾予嘗處旋覆花湯此方修合服之比他藥甚效川芎當歸去蘆羌活去蘆旋覆花細辛去苗蔓荊子防風去蘆石膏藁本去蘆荊芥穗半夏曲乾地黃甘草炙各半兩上㕮咀每服五錢水一盞半生薑五片煎至七分去滓溫服日進二服七生丸治男子婦人八般頭風及一切頭痛痰厥氣厥飲厥傷寒傷風頭痛不可忍者並皆治之川烏頭草烏頭天南星三味並生去皮半夏冷水洗去滑川芎白芷石膏並生用各等分上為細末研韭菜自然汁丸如梧桐子大每服七丸加至十丸嚼生蔥茶送下食後日進二服陳嘗治鄧安人頭痛如破諸藥無效加北細辛等分全蠍減半為丸服二十粒即愈藥隱老人云若頭痛連齒時發時止連年不已此由風寒中於骨髓留而不去腦為髓海故頭痛齒亦痛謂之厥逆頭痛宜白附子散灸曲鬢穴此穴在耳上將耳掩前正尖上可灸七壯左痛灸左右痛灸右白附子散白附子炮一兩烏頭炮去皮臍天南星炮麻黃不去根節各半兩乾薑炮辰砂研各二錢半全蠍炒五枚麝香另研一字上為細末每服一錢溫酒調下不拘時候治頭風痛不可忍硝石人中白腦子各等分上研令極細每用一字搐入鼻中川芎茶調散治諸風上攻頭目昏重偏正頭痛薄荷八兩川芎荊芥各四兩羌活白芷防風甘草炙各二兩細辛一兩上為末每服二錢食後茶清調下如聖餅子和劑治男婦氣厥上盛下虛痰飲風寒伏留陽經偏正頭疼痛連腦顛吐逆噁心目瞑耳聾常服清頭目消風化痰暖胃防風生半夏天麻各半兩天南星洗川烏去皮尖乾薑各一兩川芎甘草炙各二兩為細末湯浸蒸餅和丸芡實大捻作餅子日乾每服五餅同荊芥穗三五莖細嚼茶酒湯任下無時若頭痛筋攣骨重少氣噦噫腹滿時驚不嗜臥咳嗽煩冤其脈舉之則弦按之石堅由腎氣不足而內著其氣逆而上行謂之腎厥頭痛宜玉真丸與硫黃丸玉真丸硫黃研三兩硝石二分研石膏煅研半夏湯洗為末各一兩上研令停勻生薑自然汁打糊丸如梧子大生薑湯下三十丸一方無半夏有天南星硫黃丸治頭痛不可忍或頭風年深暴患無所不治服此除根硝石一兩硫黃二兩上研令極細滴水丸如指頭大空心蠟茶清嚼下一丸百一方云中暑者以冰水服之下咽即灑然治傷冷以艾湯下裕陵傳王荊公偏頭疼方云是禁中秘方用生蘆菔汁一蜆殼仰臥注鼻中左痛注左右痛注右或兩鼻皆注亦可數十年患皆一注而愈心痛大夫婦人血氣心痛者由臟腑虛血氣不調風冷邪氣乘於心也其痛發有死者有不死者成證者心為諸臟之主而主於神其正經不可傷傷之而痛者名為真心痛朝發夕死夕發旦死心之支別絡為風冷所乘而痛者故痛發乍輕乍甚而成證者也薛前證若寒邪所傷溫散之飲食停滯消導之肝火妄動辛平之脾氣鬱結和解之仍與後六證方藥同用一婦人久患心痛飲食少思諸藥到口即吐予以為脾土虛弱用白朮一味同黃土炒去土每服一兩以米泔煎濃徐服少許數日後自能大飲用三斤余而安上舍陳履學長子室素怯弱產後患疥瘡年餘不愈因執喪旬月每欲眩僕一日感氣忽患心脾高腫作疼手不可按而嘔吐不止六脈微細或見其形實誤認諸痛不可補氣乃用青皮木香五味吳茱萸等藥而愈繼復患瘧且墮胎又投理氣行血之藥病雖去元氣轉脫再投參耆補劑不應矣六脈如絲欲絕迎予至診之曰形雖實而脈虛極反用理氣之劑損其真氣故也連投參耆歸朮附子薑桂二劑間用八味丸五日寢食漸甘六脈全復此證若心脾疼痛時即服此等藥瘧亦不作矣大烏藥散治婦人血氣攻心痛發歇不定烏藥莪朮桂心當歸炒桃仁青皮木香各等分為末每服二錢熱酒調下阿魏丸治婦人血氣攻心疼痛及一切積冷氣當歸桂心青皮附子炮阿魏麵裹煨以面熟為度白朮川芎各一兩吳茱萸炮木香乾薑各三分檳榔肉豆蔻煨延胡索莪朮各一兩硃砂細研半兩上為末先以醋一升煎阿魏成膏和藥末搗三百杵丸如梧桐子大每服二十丸食前熱酒下雞舌香散治男子婦人九種心痛一切冷氣良薑銼細麻油炒桂心赤芍藥各等分上為細末每服二錢水一盞入鹽木瓜三片同煎七分溫服鹽湯點亦可血氣疝瘕痛用熟醋湯調下忌生冷應痛散治心脾痛不可忍者婦人脾血氣作心脾痛尤效前方同只無桂心用醋煎醋湯點亦可乙丑年春初次女年十五經脈未行初一日心痛如刺吐飲不止脈沉緩弦細以蘇合香丸神保丸沉香丸理中丸訶子散七氣湯皆無效余思之此證非蟲即飲作疾非局方九痛丸則不可遂合與服一二丸即愈矣陳氏二神丸治婦人血氣不和作痛不止及下血無時月水不調真蒲黃炒蓽茇鹽炒上等分為細末煉蜜丸如梧子大每服三十丸空心溫酒下如不能飲米飲吞下兩服即止陳日華抽刀散治婦人血風血氣等疾武興戎司機宜侯愷云見一道人用此方療病不一而足遂以為獻真是奇妙五靈脂炒一兩莪朮桂心蕓薹子炒各半兩上為末每服二大錢酒半盞水半盞煎至八分疾作熱服失笑散見產後心痛訶子散見霍亂亦妙靈苑方治婦人卒血氣心痛只用生五靈脂為細末每服一錢酒一盞煎沸熱服局方四七湯加良薑又沉香降氣湯分心氣飲皆治心痛良三方並見雜病諸氣心腹痛大婦人血氣心腹疼痛由臟腑虛弱風邪乘於其間與真氣相擊而痛其痛隨氣上下或上衝於心或下攻於腹故云血氣攻心腹痛也薛前證若氣滯血瘀用沒藥散勞傷元氣用補中益氣湯雜病傷勞倦肝脾鬱結用四七湯雜病氣怒動肝火用小柴胡湯熱入血室肝脾血虛用四物湯通治脾肺氣虛用四君子湯雜病虛勞中氣虛弱用補中益氣湯氣血俱虛用八珍湯即雜病虛勞八物湯一婦人每怒心腹作痛久而不愈此肝火傷脾氣也用炒山梔一兩生薑五片煎服而痛止更以二陳加山梔桔梗乃不再發一婦人懷抱鬱結不時心腹作痛諸藥不應用歸脾湯雜病健忘倍加炒山梔而愈陳湖陸小村母久患心腹疼痛每作必胸滿嘔吐手足俱冷面赤唇麻咽乾舌燥寒熱不時月餘竟夕不安其脈洪大眾以痰火治之屢止屢作迨乙巳春發頻而甚仍用前藥反劇此寒涼損真之故內真寒而外假熱也且脈息洪弦而有怪狀乃脾氣虧損肝木乘之而然當溫補胃氣遂用補中益氣湯加半夏茯苓吳茱萸木香一服熟寐徹曉洪脈頓斂怪脈頓除諸證釋然三神丸治室女血氣腹中刺痛痛引心端經行澀少或月水不調以致疼痛橘皮二兩焙當歸酒浸炒玄胡索醋煮各一兩上為細末煉蜜和丸如梧桐子大每服五十丸空心溫酒送下沒藥散治一切血氣臍腹撮痛及產後惡露不下兒枕塊痛沒藥血竭桂心玄胡索當歸蒲黃紅花乾漆炒煙盡木香芍藥各等分上為細末每服二錢食前溫酒調下大延胡索散治婦人血氣攻心腹疼痛延胡索當歸川芎桂心各七錢半木香枳殼赤芍藥桃仁各半兩熟地黃一兩上㕮咀每服三錢水一盞姜三片煎至七分去滓熱服琥珀散治婦人血氣攻心腹煩躁悶亂疼痛不止琥珀另研沒藥另研當歸炒赤芍藥牡丹皮延胡索蒲黃莪朮桂心各等分上為末每服一錢溫酒調下瑞金散治婦人血氣撮痛月經不行預先嘔吐疼痛玄胡索牡丹皮紅花各一錢片薑黃二錢半赤芍藥莪朮川芎當歸各一錢半官桂半錢作一服水一盅酒一盅同煎至一盅食前服牡丹散治婦人久虛羸瘦血塊走注心腹疼痛不思飲食牡丹皮玄胡索官桂各一錢京三稜當歸各一錢半莪朮赤芍藥牛膝各二錢上煎服法同前八仙散治血氣心腹㽲痛立驗當歸厚朴芍藥枳殼制人參各四分甘草茯苓各五分肉豆蔻二分上為末水二升煮取八合空心分三服又八仙散靈苑治證同前棕櫚二兩當歸一兩並銼碎一處燒成炭細研麝香一錢細研上同研令停每服一錢溫酒調下玄胡索湯治婦人室女七情所感血與氣並心腹疼痛或連腰脅甚作搐搦一切血氣經候不調並宜服之玄胡索蒲黃赤芍藥片薑黃當歸去蘆各一錢半乳香木香不見火官桂不見火沒藥各一錢甘草半錢上作一服水二盅生薑三片煎至一盅食前服大效琥珀散靈苑治婦人心膈迷悶腹臟掐撮疼痛氣急氣悶月信不調等疾烏藥莪朮各二兩當歸一兩上並生為細末溫酒調二錢服服後以食壓之忌生冷油膩等物如是產後諸疾炒生薑酒調下治血氣不調臍下痛桑耳菴䕡子桂心土瓜根川芎各四分甘草二分牛膝赤茯苓各五分大黃白芍藥各六分乾地黃八分上為末煉蜜丸如梧桐子大醋湯吞下二十丸蠲痛散治婦人血氣刺痛荔枝核燒存性半兩香附子去毛炒一兩上為細末鹽湯米飲調下二錢不拘時候沒藥散治婦人血氣疼痛不可忍者出博濟方紅花沒藥研延胡索炒當歸各等分上為末每服二錢童便半盞酒半盞同煎至六分熱服用燒赤秤錘淬過調服亦可常服只用溫酒菖蒲丸治婦人脾血積氣及心脾疼菖蒲九節者六兩吳茱萸炮香附子炒去毛各四兩上三味並銼細以釅醋五升煮乾為度焙乾研細末以好神麯打糊為丸如梧桐子大空心食前以淡薑湯吞下四五十丸日三服橘皮湯下亦好手拈散治血氣心腹疼痛草果玄胡索五靈脂沒藥各等分為末每二錢溫酒調服木香枳朮丸破滯氣消飲食開胃進食消化痰涎木香枳實炒各一兩白朮二兩上每服五錢薑棗水煎服木香化滯湯治脾胃虛弱飲食停滯腹脹作痛或心下痞滿不思飲食若憂怒飲食而致者尤宜用之木香紅花各三錢橘皮當歸尾枳實炒各二錢柴胡四錢草豆蔻甘草炙各半兩半夏一兩上每服三五錢姜水煎服小腹痛大婦人小腹疼痛者此由胞絡之間夙有風冷搏於血氣停結小腹因風虛發動與血相擊故痛也薛前證若氣寒血結用威靈仙散氣滯血凝用當歸散肝經血虛用四物湯通治加參朮柴胡肝經濕熱用龍膽瀉肝湯雜病淋肝脾氣虛用六君子湯雜病虛勞加柴胡芍藥肝脾虛寒用六君子加柴胡肉桂若兼嘔吐加木香四肢逆冷再加炮姜通府張孟威云其妹小腹痛服附子理中湯附子服過八十餘枚此乃沉寒痼冷之甚不多有者大威靈仙散治婦人久冷氣滯血刺小腹疼痛威靈仙一兩當歸沒藥木香桂心各半兩上為細末無時熱酒調下一錢服忌茶當歸散治婦人久積血氣㽲刺小腹疼痛四肢無力不能飲食當歸炒赤芍藥劉寄奴沒藥枳殼延胡索各等分上為細末熱酒調下一錢無時候追氣丸靈苑治婦人血刺小腹疼痛不可忍蕓薹子微炒桂心各一兩良薑半兩為細末醋糊丸如梧桐子大每服五丸不拘時淡醋湯下常服補血虛破氣塊甚有效石灰散治婦人血氣痛不可忍者陳五婆方上取豬貼脊血半盞於湯上暖用杖子攪停後用石灰於火上燒令黃為末羅過灰一錢同血攪停放溫服立愈予嘗用紫金皮為細末醋糊丸如櫻桃大又治婦人血氣小腹疼痛以溫酒磨下一丸及有心腹痛者亦良吳茱萸湯治婦人素虛又為風冷乘氣停滯腹脅刺痛吳茱萸湯洗當歸去蘆各二錢桔梗去蘆細辛去苗防風去蘆乾薑炮各一錢熟地黃二錢半甘草炙半錢上作一服水二盅煎至一盅空心服椒紅丸治婦人血氣不調臟腑積冷臍腹㽲痛肌體日瘦椒紅沉香當歸去蘆訶梨勒煨去核蓬朮附子炮去皮臍白朮各一兩肉豆蔻良薑丁香各半兩麝香另研二錢半上為細末煉蜜和丸如梧子大每服三十丸空心用溫酒送下大腹皮飲治婦人血癖單腹痛大腹皮防己木通桑白皮厚朴栝蔞黃耆陳皮枳殼麩炒大黃蒸各一錢青皮一錢半五味子半錢上作一服水二盅煎至一盅入酒半盞再煎一二沸去滓食前服項筋強痛陳良甫云婦人項筋拘攣強痛每得此疾療之似易而實難然方冊中所載亦少縱有言之議論亦略以予考之然既有是疾必有是方何古人言此疾證尚且略又無的然之論詳之必是挾諸疾而生所以絕無專門予因暇日摭古名方以備檢閱然自明學識淺鄙未必全備博學之士見其遺缺尚冀補而完之夫頸項之處乃屬足太陽膀胱之經又許太學云是足少陰腎之經蓋腎與膀胱為表裡故也以感外邪論之則有太陽經先因感風又感寒濕致令外證發熱惡寒與傷寒相似頸項強急腰身反張如中風狀瘛瘲口噤其身體𠘧𠘧古人以強直為痙其脈沉遲弦細新產血虛多汗出喜中風亦有此證詳見產後中風茲不贅錄又有挫枕轉項不得者與三五七散追風散仍與急風散搽項上若因被風吹頭目昏眩太陽並腦俱痛項背筋脈拘急可與蠍附散都梁丸許太學治項筋強痛不可轉側以木瓜煎薛前證若因肝木自旺用瀉青丸頭痛精血不足六味丸雜病虛勞風熱淫肝加味逍遙散調經怒動肝火加味小柴胡湯熱入血室肝經血虛加味四物湯即四物加柴胡丹皮山梔腎不能生肝六味丸膀胱氣滯羌活勝濕湯雜病腰痛大抵肝火旺則肝血虛而筋燥頸項強急或腰背反張或四肢攣拳或頸項等處結核一婦人耳內或耳後項側作痛寒熱口苦月經不調此肝膽經火兼傷脾胃用四君加柴胡升麻黃耆芍藥而愈後因勞役怒氣嘔吐脅脹用六君子湯加山梔柴胡而安一婦人因怒寒熱作渴左目緊小頭頸動掉四肢抽搐遍身疼痛此血虛肝熱則生風也用加味逍遙加釣藤鉤數劑諸證漸愈又用八珍湯而痊追風散治年深日近偏正頭疼又治肝臟久虛血氣衰弱風毒之氣上攻頭痛頭眩目暈心忪煩熱百節痠疼腦昏目痛鼻塞聲重項背拘急皮膚瘙癢面上遊風狀若蟲行及一切頭風兼療婦人血風攻疰頭目昏痛皆治之川烏炮去尖皮臍防風去蘆石膏煅川芎甘草炙荊芥穗白殭蠶炒去絲各一兩天南星炮羌活天麻地龍白附子炮全蠍去尾針白芷各半兩草烏頭炮去皮臍尖沒藥研乳香研雄黃研各二錢半上為細末每服半錢入好茶少許同調食後及臨臥服常服清頭目利咽膈消風化痰急風散草烏頭三兩一半燒存性於酒內蘸令冷餘一半生用丹砂另研一兩水飛黑豆二錢五分同草烏一處為末麝香另研二錢半上為細末入研藥勻停酒調塗痛處蠍附散治一切風邪頭痛夾腦風痰涎壅盛嘔逆噁心口吐清水暗風旋暈眼見黑花牙關緊急口眼喎斜面目瞤動頭項拘急肩背引疼耳癢目昏四肢麻木及沐浴出暴感風邪頭目昏痛兩太陽疼遠年頭風服諸藥無效並皆治之全蠍炮雄黃水飛硃砂各一錢半水飛附子炮去皮臍川烏頭炮去皮臍麻黃去節天南星薑製防風去蘆白殭蠶炒各三錢藁本去蘆土白芷各半兩上為細末每服半錢蔥茶調下食後孕婦不可服京城之醫用此藥兼嚼如聖餅子治眼羞明多淚見物不明有效一方用白附子蠍梢木瓜煎宣州木瓜二枚切頂作蓋刳去瓤沒藥二兩另研乳香二錢半另研上二味入木瓜中用蓋子合了竹籤定之飯上蒸三四次爛研成膏子每服三匙生地黃汁半盞無灰好酒二盞調和服之有人患此病自午後發黃昏時定予曰此患必先從足起經言十二經絡各有筋惟足下少陰之筋自足至頭大抵筋者肝之合也日中至黃昏天之陽陽中之陰也又曰陽中之陰肺也自離至兌陰旺陽弱之時故靈寶秘法云離至乾腎氣絕而肝氣弱肝腎二臟受陰氣故發於是時予授此方三服而愈餘證治論方俱詳雜病本門兩脅脹痛大夫婦人兩脅脹痛者由臟腑虛弱氣血不調風冷之氣客於腸胃傷於胞絡之間與血氣相搏壅寒不宣邪正交爭衝擊故令兩脅脹痛也薛東垣先生云胸脅作痛口苦舌乾寒熱往來發嘔發吐四肢滿悶淋溲便難腹中急痛此肝木之妄行也竊謂前證若暴怒傷血用小柴胡芎歸山梔氣虛用四物參朮柴梔若久怒傷氣用六君芎歸山梔若氣血俱虛用六味地黃丸若經行腹痛寒熱晡熱或月經不調發熱痰咳少食嗜臥體痛用八珍柴胡丹皮若脅脹發熱口渴唾痰或小便淋瀝頸項結核或盜汗便血諸血失音用六味丸若兩脅作脹視物不明或筋脈拘急面色青小腹痛或小便不調用補肝散若概用香燥之劑反傷清和之氣則血無所生諸證作焉丹溪先生云右脅痛用推氣散小龍薈丸當歸龍薈丸控涎丹抑青丸十棗湯皆病氣元氣俱實之劑用者審之一婦人性急吐血發熱兩脅脹痛日晡益甚此怒氣傷肝氣血俱虛也朝用逍遙散倍加炒黑山梔黃柏貝母桔梗麥門冬夕以歸脾湯送地黃丸而愈一孀婦內熱晡熱肢體痠麻不時吐痰或用清氣化痰藥喉間不利白帶腹脹用行氣散血藥胸痛不利肢體時麻此鬱怒傷肝脾而藥益甚也予則朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以清肝火生肝血百餘劑而愈後因怒飲食日少肢體時麻此乃肝火侮土用補中益氣加山梔茯苓半夏而痊又飲食失調兼有怒氣肢體麻甚月經如注脈浮洪而數此脾受肝傷不能統血則致崩肝氣虧損陰血而脈大繼用六君加芎歸炮姜而血崩止又用補中益氣加炮薑茯苓半夏而元氣復更用歸脾湯逍遙散調理而康靈寶散治婦人血氣攻刺痛引兩脅丁香木香乳香玄胡索當歸白芍藥各等分上為細末每服二錢食前溫酒調下草豆蔻散治婦人脾胃虛氣攻兩脅脹痛草豆蔻訶子肉各一兩桂心苦梗厚朴各三分甘草一分川芎當歸乾薑檳榔各半兩上為粗末每服四錢水一盞煎七分去滓食前熱服菴䕡子散治婦人臟腑虛冷宿冷氣攻兩脅脹痛坐臥不安菴䕡子延胡索桃仁琥珀當歸桂心各一兩赤芍藥木香沒藥各半兩上為末每服二錢溫酒調下人參紫金丸治婦人榮衛不和心腹刺痛胸膈脹滿不進飲食紫金皮蒼朮石菖蒲各一兩香附子二兩人參半兩木香三錢上為末米糊丸如梧子大食後薑湯吞下三十丸氣針丸治久積風壅疏利氣滯空胸膈止刺痛木香青皮去白大黃炮檳榔各一兩黑牽牛二兩半生半炒上為末煉蜜丸如梧子大溫水下三十丸鄧安人年五十忽然氣痛投神保丸愈不一二日再痛再服神保丸六七十粒大腑不通其疾轉甚亦有要用沉香木香薑桂芍藥而未敢投痛甚則築心築背築之兩脅似有兩柴十字插定心脅叫聲徹天召予診之六脈沉伏乍來乍去眾問何如予曰夫九痛之脈不可准也但以證辨用藥觀其人質肥偉問其大腑數日不通余曰實痛也其不必脹但以人按之痛甚手不可向邇此大實也經云大滿大實者可下之用氣針丸五六百粒是晚愈又己未在金陵有家提幹巽內人病心脅脹痛眾醫投木香沉香檳榔大腹芍藥薑桂之類益甚召予診之六脈弦緊而和不似病脈但診之時兩手如火以此知其實痛也眾問如何治療僕曰大凡心腹刺痛不可便作虛冷治之有二醫答曰非冷即何熱即生風冷生氣是也予曰不然難經云虛則癢實則痛又仲景云腹痛者桂枝加芍藥湯痛甚者桂枝加大黃湯提幹曰荊布素弱予曰有可辨處遇痛時使一婢按之若痛止是虛寒證也按之轉甚手不可近此實痛也即令婢按之手不可近叫呼異常予曰此實熱無可疑者當用大柴胡湯治之眾不從予責狀而投之八服愈論脅肋痛服木通散亦可治男子心下脅肋少腹疼痛皆素有積寒而溫暖湯散亦可主治甚者以溫藥下之心下與小腹痛諸書並有效方而脅肋下痛鮮獲治法木通散治脅肋苦痛偏效並心下脅肋並少腹牽引痛者皆主之木通去皮節青皮去白川楝子去皮核各一兩以上三味用巴豆半兩炒黃去巴豆不用蘿蔔子炒舶上蘹香一兩炒莪朮木香滑石各半兩上為細末煎蔥白酒調三錢一服愈甚者不過再服三腕散治中焦虛痞兩脅氣痛面目手足浮腫大便秘澀兼治腳氣大腹皮紫蘇沉香乾木瓜獨活各一兩白朮川芎木香甘草陳皮檳榔各三分上㕮咀每服三錢水一盞煎至七分去滓空心熱服日中再服戊午秋在京城有一婦人中焦虛痞腹膨脹痛大便秘結六脈虛弱諸醫服藥無效予投此藥不終劑而愈補遺局方青木香丸沉香降氣湯小烏沉湯四磨湯皆可用薛左金丸一名四金丸治肝火胸脅脹痛或發寒熱或頭目作痛或大便不實或小便淋秘或小腹疼痛及一切肝火之證黃連炒六兩吳茱萸一兩湯煮片時用上為末粥丸白朮陳皮湯下當歸龍薈丸治肝經實火胸脅脹痛或大便秘結小便澀滯凡屬肝經實火皆宜用之當歸龍膽草炒焦梔子仁炒黃連炒黃芩炒各一兩大黃炒蘆薈青黛各五錢木香二錢半麝香另研五分上為末用神麯糊丸桐子大每服二十丸薑湯下補肝散治肝腎二經氣血虧損脅脹作痛或脅脹頭暈寒熱發熱或遍身作痛經候不調山茱萸肉當歸五味子炒杵山藥黃耆炒川芎木瓜各半兩熟地黃自制白朮炒各一錢獨活酸棗仁炒各四兩上為末每服五錢棗水煎服腰痛藥隱老人論曰夫腎主於腰女人腎臟繫於胞絡若腎氣虛弱外感六淫內傷七情皆致腰痛古方亦有五種之說如風腰痛宜小續命湯加桃仁杜仲煎服脾胃氣痞及寒濕腰痛宜五積散雜病中寒加桃仁如虛損及五種腰痛服青娥丸雜病腰痛神應丸同上皆可用也如氣滯腰痛服如神湯必效薛陳無擇先生云若形體虛羸面色黧黑腿足痿軟不能行立此失志所為也腹急脅脹目視䀮䀮宗筋弛縱白淫下注此鬱結所為也肌肉不仁飲食不化腸胃脹滿閉墜腰脅此憂思所為也皆屬內若腰冷作痛身重不渴小便自利飲食如故因勞汗出腰痠脅痛或墜墮血滯或房勞精竭皆屬不內外因也竊謂前證失志腎虛熱者六味丸雜病虛勞腎虛寒者八味丸雜病虛勞鬱怒傷肝實用龍膽瀉肝湯雜病淋虛用六味丸補肝散雜病腰痛憂慮傷脾者歸脾湯雜病健忘逍遙散調經腎著者寒則朮附湯雜病傷濕虛則腎著湯同上腰膝痛者寄生湯養腎散雜病腰痛瘀血滯者如神湯舒筋散房勞腰痛者青娥丸十補丸見前虛勞一婦人腰痛三年矣每痛必面青頭暈目緊余以為肝脾氣虛用補肝散而愈三年後因勞役患頭痛兼噁心用補中益氣湯雜病傷勞倦加茯苓半夏蔓荊子而愈一婦人苦腰痛數年不愈余用白朮一味大劑服不三月而痊乃胃氣虛閉之證故用白朮也如神湯治男子婦人氣虛腰痛一方有杜仲無當歸玄胡索當歸去蘆桂心等分上為細末每服三錢溫酒調下甚者不過數服獨活寄生湯夫腰痛者皆由腎氣虛弱臥冷濕地當風所得不時速治喜流入腳膝為偏枯冷痹緩弱疼重或腰痛拘攣腳膝重痹宜急服之獨活三兩桑寄生續斷杜仲炒去絲北細辛川牛膝秦艽茯苓白芍藥桂心川芎防風人參熟地黃當歸各二兩上㕮咀每服三錢水一盞煎至七分去滓溫服空心氣虛下利除地黃並治新產腹痛不得轉動及腰腳攣痛痹弱不得屈伸此藥最能除風消血肘後有附子故無寄生人參當歸粉草近人將治歷節風腳氣流注亦效舒筋散治腰痛神效閃挫亦良玄胡索炒杜仲薑汁炒官桂去粗皮羌活芍藥各等分上為末酒調下二錢又方橘核炒香研酒去渣下青木香丸方見又方天羅布瓜子仁炒焦擂酒熱服留渣炒熱封痛處效腰腳疼痛夫腎主於腰腳女人腎臟繫於胞絡若勞傷腎氣虛弱而風冷客於胞絡邪氣與真氣交爭故令腰腳疼痛也治當以補元氣為主佐以祛邪之劑薛前證若真陽衰敗寒邪乘襲手足俱冷頭痛惡寒或嘔吐腹痛等證宜用本方若氣血虛弱寒邪所感惡寒發熱頭痛作渴或嘔吐腹痛等證宜用五積散雜病中寒若元氣虛弱濕熱所傷兩脛腫痛寒熱身疼或嘔吐不食等證宜用檳蘇敗毒散雜病傷濕若脾胃虛弱元氣下陷寒熱嘔吐發熱頭痛喘渴體倦等證宜用補中益氣湯雜病傷勞倦若足三陰精血虧損陰火內動內熱晡熱作渴痰甚小便頻數等證宜用六味地黃丸雜病虛勞若足三陰陽氣虛敗惡寒發熱手足俱冷吐痰不食二便滑數等證宜用八味地黃丸雜病虛勞一婦人先腰胯作痛後兩腿亦痛余以為足三陰虛寒外邪所傷用小續命湯及獨活寄生湯或作或止所用飲食極熱腹中方快余曰邪氣去而元氣虛寒也診其脈果沉細用養腎散本條漸愈又用十補丸虛勞而痊一婦人所患同前但發熱作渴喜冷飲食脈洪數按之遲澀余以為血虛有熱用羚羊角散身體痛去檳榔加白朮茯苓數劑更用加味逍遙散結核而瘥一婦人患前證時或腿膝作痛脈浮數按之遲緩此元氣虛而風濕所乘用獨活寄生湯頓愈又用八珍湯而安一婦人因怒患前證寒熱往來口苦不食晡熱內熱余以為肝火血虛先用小柴胡湯加山梔頓愈又用加味逍遙散而瘳一婦人患前證寒熱頭痛殊類傷寒此寒邪之證用檳蘇敗毒散而安又用補中益氣調補而愈虎骨丸治婦人血風攻注腰腳骨節疼痛不可忍虎脛骨酥炙敗龜酥炙檳榔牛膝酒浸各一兩當歸去蘆炒川大黃炒木香桃仁浸炒海桐皮各七錢半防風去蘆叉附子炮去皮臍赤芍藥桂心血竭沒藥另研地龍去土炒各半兩上為細末煉蜜和搗三五百下丸如梧桐子大每服三十丸空心食前溫酒下日二服仙靈脾散治婦人血風攻注腰腳疼痛仙靈脾桃仁麩炒檳榔各一兩羌活去蘆海桐皮牛膝酒浸當歸去蘆炒芎藭骨碎補玄胡索桂心枳殼去瓤麩炒木香菴䕡子各七錢半菴術炒半兩麝香另研二錢半上為細末每服二錢食前用豆淋酒調下日進二服藁本散治婦人血風流注腰腳疼痛不可忍藁本去蘆土一兩半狗脊天麻骨碎補桂心沒藥另研血竭研蟬殼微炒各一兩虎脛骨醋炙敗龜醋炙穿山甲各二兩醋炙麝香半兩另研上為細末入麝香拌勻每服二錢生薑豆淋酒調下空心食前日二服敗龜散治婦人風毒流注腰腳疼痛行步艱難敗龜酥炙虎脛骨酥炙各二兩白殭蠶炒薏苡仁當歸去蘆杜仲銼炒去絲各一兩地龍炒去土桂心乳香另研各二錢半沒藥半兩另研上為細末每服二錢食前溫薄荷酒調下骨碎補散治婦人血風氣攻腰腳疼痛腹脅拘急並宜服之骨碎補炒萆薢酒浸牛膝酒浸桃仁麩炒海桐皮當歸去蘆桂心檳榔各一兩赤芍藥附子炮去皮臍川芎各七錢半枳殼半兩去穰麩炒上為㕮咀每服五錢水一大盞半生薑三片棗一枚煎至一大盞去滓溫服附子散治婦人腰腳積年疼痛不瘥附子炮去皮臍桂心沒藥另研威靈仙乾漆炒去煙牛膝酒浸各一兩上為細末每服二錢溫酒調下食前日進二服養腎散治腎經虛弱風寒所侵以致腰腳疼痛不能步履蒼朮一兩乾蠍三錢天麻草烏頭炮去皮尖黑附子炮去皮臍各二錢上為末每服一錢酒調服麻痹少時隨愈孕婦勿服此治風寒傷腎膀胱虛寒之良藥用之得宜殊有神效臂痛大夫婦人臂痛筋脈攣急不得屈伸遇寒則劇由肝虛為風寒邪氣流於血脈客於經絡搏於筋筋不榮則乾急而痛其脈緊細宜服柏子仁丸舒筋湯若臂痛不能舉或左或右時復轉移一臂由中脘伏痰脾氣滯而不行上與氣相搏四肢皆屬於脾脾氣滯而氣不下上攻於臂故痛其脈沉細宜茯苓丸控涎丹薛前證若肝血虛用加味逍遙散中氣虛用補中益氣湯血氣俱虛用八珍湯風熱血燥用秦艽地黃湯脾腎虛寒用柏子仁丸脾胃實熱用茯苓丸水不能生木用六味丸逍遙散怒動肝火用小柴胡加川芎當歸眩暈晡熱用四物柴梔丹皮晡熱月經不調用加味逍遙散食少體倦無寐盜汗用加味歸脾湯先太宜人遍身作痛筋骨尤甚不能屈伸口乾目赤頭眩痰壅胸膈不利小便赤短夜間殊甚遍身作癢如蟲行此屬肝腎氣虛而熱也用六味地黃丸料加山梔柴胡而愈柏子仁丸指迷柏子仁乾地黃各二兩自制茯苓枳殼去穰麩炒覆盆子炒北五味子杵炒附子炮石斛去根切酒蒸炒鹿茸酥炙酸棗仁炒桂心沉香黃耆蜜水炙各一兩一方云等分上為細末煉蜜為丸如梧桐子大空心酒下三十丸舒筋湯治臂痛又名五痹湯亦治腰下疾片子薑黃四兩甘草羌活各一兩白朮海桐皮當歸赤芍藥各二兩上為粗末每服三錢水一盞半煎七分去滓溫服如腰以下疾空心服腰以上疾食後服茯苓丸治臂痛不能舉手或左或右時復轉移由伏痰在內中脘停滯脾氣不行上與氣搏四肢屬脾脾滯而氣不升故上行攻臂其脈沉細者是也後人謂此臂痛乃痰證也用以治痰無不效者予嘗以此藥治人隨服隨愈世所謂痰藥多矣未有立效如茯苓丸速也茯苓一兩半夏二兩枳殼半兩去穰麩炒風化朴硝半兩上為末薑汁煮糊丸如梧子大生薑湯下二十丸食後服控涎丹凡人忽患胸背手足頸項腰胯隱痛不可忍連筋骨牽引釣痛坐臥不寧時時走易不定俗醫不曉謂之走疰便用藥及針灸皆無益又疑是風毒結聚欲為癰疽亂以藥貼亦非也此乃痰涎伏在心膈上下變為此疾或令人頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠黏夜間喉中如鋸聲多流唾涎手腳重腿冷脾氣脈不通誤認為癱瘓亦非也凡有此疾但以此藥不過數服即愈甘遂去心大戟去皮真白芥子炒各等分上為細末糊丸如梧桐子大臨臥淡薑湯下五七丸如疾猛再加至十丸白芥子散治臂痛牽引背胛或輟或作由榮衛循行失度痰滯經絡或似癱瘓真白芥子木鱉子各三兩麩炒沒藥另研桂心木香各半兩上為末每服一錢溫酒下愚按前三方脾氣虛弱者必佐以六君子湯中氣虛弱者必佐以補中益氣湯氣血虛者必佐以八珍湯脾氣鬱滯者必佐以歸脾湯肝經怒氣者必佐以逍遙散若專用前方治之胃氣益虛病氣益甚不可不謹流氣飲治七情氣滯胸脅悶痞咽喉不利嘔喘面浮二便不調或氣攻肩背脅肋作痛或腳氣喘急腹脹便閉元氣充實者宜用此藥慎之紫蘇葉黃耆炒青皮去白當歸半夏薑製烏藥芍藥炒茯苓桔梗防風各五錢川芎陳皮各七錢五分枳實麩炒木香各二錢五分甘草炙一兩二錢半大腹子薑製一兩上每服半兩薑棗水煎服四物湯治血滯中風血虛手足不遂如臂痛加紅花煎交加散加木瓜牛膝治冷痹肩臂作痛即人參敗毒和五積散烏藥順氣散加羌活木瓜治外邪氣滯筋骨作痛或痰氣不利方見雜病中氣秦艽地黃湯治肝膽經風熱血燥肩臂疼痛或筋脈引急或時牽痛其內證發熱或寒熱晡熱月經不調或肢體痠痛等證秦艽熟地黃自制當歸各一錢川芎芍藥牡丹皮白朮茯苓各一錢五分釣藤鉤一錢柴胡甘草炙各三分上水煎服腳氣陳臨川云凡頭痛身熱肢節痛大便秘或嘔逆而腳屈弱者腳氣也輕者可與香蘇散加木瓜檳榔生薑煎服然後隨證治之要知有腳氣之人先從腳起或先緩弱疼痹或行起忽倒或兩脛腫滿或腳膝枯細或心中忪悸或小腹不仁皮頑不知疼痛或舉體轉筋或見食嘔逆惡聞食氣或胸滿氣急或遍體痠痛皆腳氣之候黃帝所謂緩風濕痹是也頑弱為緩風疼痛為濕痹寒中三陽所患必冷小續命湯主之煎成入生薑自然汁最妙暑中三陰所患必熱小續命湯去附子減桂一半主之大煩躁者紫雪最良若無紫雪以百合薄荷煎冷水調服極妙大便秘者脾約丸麻仁丸三和散主之仍針灸為佳服補藥與湯淋洗皆醫家之大禁也夫婦人腳氣與丈夫不同男子則腎臟虛弱為風濕所乘女子以胞絡氣虛為風毒所搏是以胞絡屬於腎也腎主於腰腳又肝脾腎三臟經絡起於足十趾若臟腑虛損則風邪先客於腳從下而上動於氣故名腳氣也此皆由體虛或當風取涼或久坐卑濕或產後勞損或恚怒悲傷肝則心氣不足致月候不通因其虛傷風毒傳入筋骨則令皮膚不仁筋骨疼痛肢體不隨筋脈拘攣或時冷疼或發腫滿或兩腳痹弱或舉體轉筋目眩心煩見食嘔吐精神昏憒肢節煩疼小便赤黃大便秘澀如此證候其婦人腳氣療之與丈夫不同以其氣血不調胎妊產損傷之是以療寡婦及尼與妻妾殊別即其義也薛嚴用和先生云前證初患不覺因他病乃發先從腳起或緩弱痹痛不能行履或兩脛腫滿或足膝細小或心中怔忡或小腹不仁或舉體轉筋或見食作嘔或胸滿氣急遍體痠痛其脈浮而弦者因於風濡而弱者因於濕洪而數者因於熱遲而澀者因於寒男子由於腎氣虧損女子血海虛弱七情所致竊謂前證若足三陰虛弱用還少丹雜病虛勞若脾氣虛寒用八味丸雜病虛勞若飲食停滯臀腿痠脹浮腫作痛此脾氣下陷用六君子雜病虛勞少加柴胡升麻不應須用八味丸若發熱口渴月經不調兩腿無力此足三陰血虛火燥用六味八味二丸兼服前證西方之人多患之因素食乳酪脾胃壅滯脛足腫滿至於南方亦有因膏粱厚味濕熱下注而患者故古人謂之壅疾所用之方多疏通發散之劑然感於房勞過度虧損三陰治法又當以固本為主故六物附子為元氣虛弱寒邪內侵之聖藥大腹皮散治婦人風毒腳氣肢節煩疼心神昏悶並宜服之大腹皮桑白皮木通去皮羌活去蘆赤芍藥荊芥獨活去蘆青橘皮去白乾木瓜各一兩枳殼去瓤麩炒紫蘇葉各二兩上㕮咀每服八錢水一中盞半生薑五片蔥白七寸煎至一大盞去滓食前溫服紫蘇飲治婦人風毒腳氣心腹痞塞痰飲停積不思飲食腳重虛腫紫蘇葉木通去皮茴香桑根白皮各一兩獨活去蘆羌活去蘆乾木瓜青橘皮去白甘草炙各半兩大腹皮半兩枳殼去瓤麩炒二兩荊芥半兩上㕮咀每服八錢水一大盞半生薑五片連須蔥白一莖煎至一大盞去滓溫服不拘時日進二服四白散治男子婦人血虛發熱夜多盜汗不進飲食四肢羸瘦筋脈拘攣腳痛不能行立黃耆去蘆厚朴薑製益智仁陳皮去白藿香白扁豆白朮去蘆各一兩白茯苓去皮白豆蔻仁人參去蘆甘草炙天台烏藥各半兩芍藥一兩半檀香沉香各二錢半上為細末每服三錢水一盞生薑三片棗子一枚煎至七分和柤溫服日進二服諸證減退只有腳攣痛不能行服蒼朮丸治之蒼朮丸大治乾溼腳氣筋脈拘攣疼痛不能行履兼補下部乳香另研沒藥各二錢另研川牛膝酒浸青鹽各半兩研熟艾四錢米糨過研末全蠍一錢炒研川烏頭三錢炮去皮臍上件為細末入研藥令勻用大木瓜一枚切一頭留作蓋去穰入上件藥於木瓜內將蓋簽定安於黑豆中蒸令極爛取出去皮連藥研成膏卻入生蒼朮末不以多少拌令得所丸如梧桐子大每服五十丸空心用木瓜湯下或溫鹽酒亦得日進三服忌血與蒜餘證方淪並詳雜病本門癮疹瘙癢大夫婦人體虛為風邪氣客於皮膚復傷風寒所以則發風瘙癮疹若赤疹者由寒濕客於肌中極熱熱結則成赤疹也得大熱則發取冷則瘥也白疹者由風氣客於肌中熱熱與風相搏則成白疹也得天陰雨寒則發出風傷亦發得晴暖則減著衣暖亦瘥脈浮而洪浮即為風洪則為氣風氣相搏則生癮疹身體瘙癢凡人汗出不可當風露臥及浴後出早使人身振寒熱以生風疹也藥隱老人云治婦人遍身時發瘙癢或赤腫癮疹五心煩熱血風攻疰與人參荊芥散虛勞血風消風散雜病頭痛四物湯通治加荊芥或人參當歸散或逍遙散兼服導赤丸如不通者食後服皂角丸氣虛老人不可久服如服皂角丸不退者此凝滯熱甚者宜先服青木香丸三兩服以開氣道服蒺藜散立效薛前證有身發疙瘩或如丹毒癢痛不常或膿水淋漓發熱煩渴或頭目昏眩日晡益甚或寒熱發熱月經不調皆肝經風熱血燥用加味逍遙散調經為主佐以四君芎歸若忿怒身發疙瘩痛癢寒熱乃肝火血燥用加味小柴胡湯熱入血室氣血俱虛用八珍加柴胡牡丹皮若夜間發熱作渴譫語乃熱入血室用小柴胡湯加生地黃血虛四物合小柴胡後用加味逍遙散調理若鬱結食少體倦內熱晡熱乃脾經血燥用加味歸脾湯寒熱加山梔熟地黃若遊走瘙癢乃血風走注用何首烏散血虛逍遙散風熱消風散若專用風藥復傷陰血必致筋攣等證一婦人身發疙瘩或如丹毒癢痛不常搔碎成瘡膿水淋漓發熱煩渴頭目眩暈日晡益甚此血虛內熱之證也以當歸飲加柴胡山梔仁治之而愈一婦人患前證肢體疼痛頭目不清自汗盜汗月水不調肚腹作痛食少倦怠先用人參荊芥散後用逍遙散治之而痊一婦人因忿怒身發疙瘩憎寒發熱余謂肝火用小柴胡湯加山梔黃連治之而愈後口苦脅痛小便淋漓復用前藥全愈一婦人患前症發熱夜間譫語此血分有熱以小柴胡湯加生地黃治之而安後用四物加柴胡山梔丹皮而熱退又用逍遙散全愈一室女年十四歲天癸未至身發赤斑癢痛左關脈弦數此因肝火血熱以小柴胡湯加山梔生地黃牡丹皮治之而愈若因怒而致者又當治以前藥何首烏散治婦人血風皮膚瘙癢心神煩悶及血風遊走不定並宜服之何首烏防風白蒺藜枳殼天麻殭蠶胡麻茺蔚子蔓荊子各等分上為細末每服二錢煎茵陳湯調下無時蒺藜散治婦人風瘙皮膚中如蟲行及生癮疹搔之作瘡面腫心煩並宜服之白蒺藜炒莽草炒羚羊角屑各七錢半黃芩人參去蘆苦參去蘆蛇床子秦艽去蘆防風去蘆麻黃去節當歸炒去蘆甘草炙枳殼麩炒去穰細草去苗各半兩上㕮咀每服五錢水一中盞半煎至一大盞去滓溫服不拘時日進二服治婦人風癢癮疹不瘥蒼耳花葉子各等分上為細末每服二錢豆淋酒調下不拘時候日進二服治癮疹上用白蜜不以多少好酒調下已試有驗治皮膚有風熱遍身生癮疹牛蒡子水煮一兩淨曬乾炒令香浮萍蒸過焙乾等分上為細末每服二錢薄荷湯調下日二服又治風氣客於皮膚搔之不已蟬蛻洗大葉薄荷上等分為細末每服二三錢溫酒調下無時又方露蜂房洗過蜜炙令焦蛇蛻洗炙令焦各等分上為細末每服一二錢溫酒調下不拘時治婦人風瘙癮疹身癢不止宜用淋漬方馬藺茺蔚子白礬白蒺藜茵芋羊桃根凌霄花各二兩蒴藋根蓖麻葉各一兩上㕮咀以水二斗煮取一斗去柤於避風處洗之又方凌霄花三兩蒴藋根半斤上件藥以水七升煮取三升濾去滓入白礬末二兩攪勻以綿漬頻拭於疹上後煮槐柳湯浴之又方以醋漿水磨白礬塗之
