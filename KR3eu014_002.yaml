body:
  text: 卷之二雜症門上雜證男女一也此二卷方論出女科書多雜病書所遺故存之耳虛勞勞倦所傷用補中益氣湯證治乃暴病也失治而有發熱潮熱盜汗咳嗽諸證出焉謂之虛勞又復失治而有皮聚毛落飲食不為肌膚骨髓中熱經閉不行諸證出焉謂之瘵骨蒸熱至於傳屍之疾別自一種其源不起於勞𧮬其流或至於滅門余於雜病首冊則既條分而備列矣然男以精為主女以血為主其致病既殊其施治亦異故應別著方法而陳氏良方分勞瘵骨蒸勞血風勞氣虛風勞冷勞熱勞客熱等門未免惑亂後人靡所適從今釐正如下醫者更參雜病虛勞傳屍勞二門而用之則無道少之患矣初病大法保治婦人虛勞局方中謂首尾六合如大聖散熟地黃丸是治無熱虛勞也中道藥牡丹煎丸空心食前人參荊芥散臨臥食後是治有熱虛勞也戴有病後血虛者有本體血虛者其人往來寒熱或五心發熱言語無力面色痿黃頭目昏暈變生諸疾芎歸湯加羊肉少許或十全大補湯四物湯養榮湯服之血虛而氣旺者宜抑氣湯即香附末增損四物湯易簡方治婦人氣血不足四肢惰怠乏力少氣兼治產後下血過多榮沖虛損陰陽不和乍寒乍熱當歸川芎人參乾薑炮甘草炙白芍藥各等分上㕮咀每服四錢水一盞煎至六分去滓熱服六神湯御藥院方治脾氣不和榮衛不足怠惰困倦不嗜飲食服之補養真氣進美飲食充澤肌膚當歸熟地黃白芍藥川芎黃耆地骨皮各等分上為粗末每服五錢水一盞半煎至八分去滓空心溫服加減大建中湯普濟治婦人胎前產後一切虛損月水不調臍腹㽲痛往來寒熱自汗口乾煩渴芍藥二兩當歸川芎黃耆桂各一兩甘草炙白朮各七錢半上為末每服二錢半水一盞半薑棗煎六分去滓溫服食前清氣湯普濟治肌熱骨瘦者陰衰陽盛也是氣弱而血熱則外蒸肌肉內蒸骨髓煩渴口乾頰赤頭疼飲食無味心神驚悸肢體痠疼或時盜汗或時咳嗽或月家斷絕或經極少俗謂血勞產後白蓐勞及羸瘦之人與清氣湯羊乳丸治之紫蘇子五味子大腹子枳殼桑白皮微炒菖蒲地骨皮白朮柴胡秦艽獨活乾葛甘草炙各等分上㕮咀每服五錢水一盞入紫蘇七片烏梅一個煎至七分溫服黃耆散一名防風湯治勞氣食後身疼倦夜間盜汗此因失血榮衛損也黃耆一兩白芍藥防風當歸乾地黃各七錢五分甘草半兩上㕮咀每服五錢水一盞姜三片棗一枚煎至七分去滓溫服食前四白散治男子婦人血虛發熱夜多盜汗不進飲食四肢羸瘦骨節拘攣腳痛不能行黃耆厚朴益智仁藿香白朮白扁豆陳皮各一兩半夏白茯苓人參白豆蔻仁天台烏藥甘草各半兩京南芍藥檀香沉香各一兩上為細末每服四錢水一盞姜三片棗一個煎至七分溫服桔梗飲子大全良方治心氣不足解勞倦益血黃耆人參麥門冬苦梗甘草各一兩青皮半兩上為末每服三錢水一盞煎至七分溫服如聖散大全良方治婦人所稟血氣不足不耐寒暑易冒疾傷月水不調久而心虛狀若心勞四肢倦怠筋骨少力盜汗易驚或時不寧五心煩熱肌膚不長間作頭昏飲食無味胸膈不利或產前產後受病並可服之北柴胡白茯苓甘草熟地黃人參當歸各一兩鱉甲胡黃連沉香知母各半兩桑寄生乾葛各七錢半上為細末每服二錢水一盞烏梅一個棗二枚麥門冬數粒煎至八分服無時劫勞散治心腎俱虛勞嗽二三聲無痰遇夜發熱熱過即冷時有盜汗四肢倦怠體劣黃瘦飲食減少夜臥恍惚神氣不寧睡多異夢此藥能治微嗽有唾唾中有紅線名曰肺痿失治便成羸劣之疾白芍藥六兩綿黃耆蜜炙四兩甘草炙人參去蘆酒洗當歸去蘆半夏白茯苓去皮熟地黃洗淨焙乾五味子阿膠各二兩炒上㕮咀每服三錢水一盞生薑七片棗三枚煎至九分溫服無時日三筒骨煎大全良方治諸虛疾羸瘦乏力腰背引痛心煩喘嗽唾膿嘔血頑涎壅盛睡臥有妨胸滿氣促夜多盜汗發焦耳鳴皮寒骨熱一切五勞七傷骨蒸等候並皆療治地骨皮粉草北柴胡前胡烏藥麻黃不去節乾葛青蒿苦梗知母天仙藤條黃芩各一兩人參生乾地黃秦艽鱉甲黃耆各半兩上㕮咀每服三錢水一盞酒一分豬筒骨一莖炙焦分為四服桃柳枝各七寸杏仁五粒去皮尖捶碎煎至七分去滓溫服加烏梅半個尤妙一方加當歸芍藥滋血湯治婦人經候不通或血聚肢體麻木肌熱身重倦怠少力將成勞瘵不可妄行破血宜滋養潤利見經閉補中丸余居士選方治婦人虛損諸疾白朮地黃各一兩川芎白芍藥當歸黃耆人參陳皮各半兩上為細末煉蜜丸如梧桐子大每服五七十丸溫水下溫中丸普濟治衝任虛損血氣虧傷月水斷續來不應期或多或少腹中㽲痛不實寒熱煩壅咽燥舌乾心神松悸頭目眩暈肢體倦怠腰背引痛筋脈拘急帶下赤白飲食進退或發寒熱生地黃生薑二味各一斤切碎各研取汁將薑汁炒地黃滓卻將地黃汁炒生薑滓白芍藥二兩人參去蘆蒲黃炒當歸酒洗琥珀另研白茯苓去皮黃耆蜜炙延胡索炒麥門冬去心烏梅肉焙各一兩上為末別用白艾葉一斤水一斗煎取濃汁熬成膏和前藥丸如梧桐子大每服五十丸溫米飲下空心食前人參丸十便良方養陰生血補虛人參鹿角膠炒熟地黃芍藥當歸白朮川芎各等分上為末煉蜜丸如梧桐子大每服三十丸空心米飲下秘方十補丸治婦人諸虛百損榮衛不調形體羸瘦面黃背倦口苦舌乾心忪多汗血衰氣盛寒熱往來一切血崩帶下墜胎落孕此藥皆治孕婦服之尤有神效熟乾地黃淨洗酒浸蒸過焙乾秤重四兩肉蓯蓉酒浸焙乾人參綿黃耆去蘆蜜炙川芎當歸去蘆酒浸焙白芍藥洗白茯苓白朮去蘆洗淨炒各二兩甘草炙半兩肉桂一兩去皮上為細末用好酒調山藥末打糊為丸如梧桐子大每服六七十丸食前米湯或溫酒下五聖丸調益榮衛滋養氣血治衝任虛損月水不調臍腹㽲痛崩中漏下血瘕塊硬發渴疼痛妊娠宿冷將理失宜胎動不安血下不止及產後乘虛風寒內搏惡露不下結生瘕聚小腹堅痛時作寒熱當歸川芎白芍藥熟乾地黃各一兩生乾地黃二兩上為細末酒煮麵糊為丸如梧桐子大每服六七十丸食前溫酒下七補丸十便良方治婦人氣血虛弱衝任不和腹中經結狀若懷孕月候尚來未分經脈宜服此方當歸芍藥川芎各三分白芷白朮熟地黃阿膠炒各二分上為細末煉蜜丸如梧桐子大每服五六十丸空心米飲下羊乳丸治虛勞羸瘦秦艽柴胡地骨皮山茱萸肉黃耆蜜炙地黃酒浸蒸過各等分上為末煉蜜丸如梧桐子大每服五十丸煎人參湯下不拘時候日進三服人參鱉甲丸普濟治婦人一切虛損肌肉瘦瘁盜汗心忪咳嗽上氣經脈不調或作寒熱不思飲食杏仁湯浸去皮尖炒人參當歸赤芍藥甘草炙柴胡桔梗去蘆各一兩地骨皮宣黃連去須胡黃連各七錢半肉桂去粗皮木香各半兩麝香另研半錢鱉甲一枚重二兩者醋炙黃色上為細末用青蒿一斤研爛絞汁童子小便五升酒五升同熬至二升次入真酥三兩白沙蜜三兩再熬成膏冷方下眾藥末搜和令勻丸如梧桐子大每服五十丸溫酒送下無時艾前丸東垣治婦人諸虛北艾葉大當歸各二兩香附子四兩上醋煮半日焙乾為末再用醋煮糊丸艾醋湯下耆味丸東垣補虛敗黃耆四兩鹽水浸火炙北五味二兩上為末秫米糊丸空心鹽酒下無熱虛勞大婦人冷勞屬血氣不足臟腑虛寒以致臍下冷痛手足時寒月經失常飲食不消或時嘔吐惡寒發熱骨節痠疼肌膚羸瘦面色痿黃也薛前證有內外真寒然有內外真熱亦有內真熱而外假寒者又有內真寒而外假熱者若飲食難化大便不實腸鳴腹痛飲食畏寒手足逆冷面黃嘔吐畏見風寒此內外真寒之證也宜用附子理中湯以回陽八味地黃丸以壯火若飲食如常大便堅實胸腹痞脹飲食喜冷手足煩熱面赤嘔吐不畏風寒此內外真熱之證也宜用黃連解毒湯以消陽六味丸以壯水若飲食如常大便堅實胸腹痞脹飲食喜寒手足逆冷面黃嘔吐畏見風寒此內真熱而外假寒也亦用解毒湯六味丸若飲食少思大便不實吞酸噯氣胸腹痞滿手足逆冷面赤嘔吐畏見風寒此內真寒而外假熱也亦用附子理中湯與八味丸當求其屬而治之經曰益火之源以消陰翳壯水之主以制陽光使不知真水火之不足泛以寒熱藥治之則舊疾未去新病復生矣夫所謂屬者猶主也謂心腎也求其屬也者言水火不足而求之於心腎也火之源者陽氣之根即心是也水之主者陰氣之根即腎是也非謂火為心原為肝水為腎主為肺也一婦食少作嘔口吐痰涎面黃腹痛月經不調手足逆冷此內外俱寒之證以六君加附子木香治之而愈一婦忽嘔吐酸水內熱作渴飲食不進惟喜冷水面色青赤投之以藥入口即吐此內外真熱之證積十餘日以黃連一味煎湯飲之徐加白朮茯苓仍加陳皮當歸炙甘草至月餘始進米飲稀粥調理而愈一婦內熱作渴大便秘結畏惡風寒手足逆冷此內真熱而外假寒先用黃連解毒湯後用六味丸而愈一婦初患痰喘熱渴醫以降火散氣治之肌日削而氣日索延至甲辰木旺痰盛身熱口腐腹脹神昏絕食幾死此虛熱無火投以壯水生土之劑隨服隨效越數歲夏初坐則頭墜不能起視臥則背冷覺風透體煩熱暈眩咳嘔痰湧手足麻冷此內真寒外假熱之證也遂以大補姜附之劑投之不三四服而大勢已平仍以前藥加減而愈韓懋治其嫂年三十餘十八胎九殞八夭會家難作驚憂過甚遂昏昏不省人事口唇舌皆瘡或至封喉下部虛脫白帶如注如此四十餘日或時少蘇至欲自縊悲不能堪醫或投涼劑解其上則下部疾愈甚或投熱劑及以湯藥熏蒸其下則熱暈欲絕此亡陽證也急以鹽煮大附子九錢為君制以薄荷防風佐以薑桂芎歸之屬水煎入井冰冷與之未盡劑鼾睡通宵覺即能識人或曰此何謂也曰方書有之假對假真對真爾上乃假熱故以假冷之藥從之下乃真冷故以真熱之藥反之斯上下和而病解矣續以女金丹錯綜以三二方不但去其疾且調治元氣無何連生二子以上論及治驗有無當於虛勞者而實治寒熱變通之大法不可不察也局大聖散治婦人血海虛冷久無子息及產後敗血衝心中風口噤子死腹中掰開口灌藥須臾生下便得無恙治墜胎腹中攻刺疼痛橫生逆產胎衣不下血運血癖血滯血崩血入四肢應血臟有患及諸種風氣或傷寒吐逆咳嗽寒熱往來遍身生瘡頭痛惡心經脈不調赤白帶下乳生惡氣胎臟虛冷數曾墜胎崩中不定因此成疾室女經脈不通並宜服之常服暖子宮和血氣悅顏色退風冷消除萬病兼療丈夫五勞七傷虛損等病澤蘭葉石膏研各二兩卷柏去根白茯苓去皮防風去蘆厚朴去粗皮薑汁炙細辛去苗柏子仁微炒桔梗吳茱萸湯洗七次焙炒各一兩五味子揀淨人參藁本去苗乾薑炮川椒去目閉口者微炒出汗白芷白朮黃耆去苗川烏炮去皮臍丹參各三分蕪荑微炒赤甘草炙川芎芍藥當歸各一兩三分白薇阿膠碎炒燥各半兩肉桂一兩一分生乾地黃一兩半上為細末每服二錢空心臨臥熱酒調下若急疾有患不拘時候日三服渾身碎痛飲子治婦人勞倦虎骨五錢防風藁本甘草白芷茯苓各二錢當歸芍藥續斷白朮附子各二錢上為粗末薑棗煎服不拘時十全大補湯治婦人冷勞最妙方見雜病虛勞當歸木香湯治婦人血氣虛勞令人頭目昏眩語聲沉重舌根強硬言語謇澀口苦不食白日困睡夜有虛汗神思恍惚夢寢驚悸面色痿黃頻發喘嗽遍身疼痛腳氣走注四肢沉重背胛拘急時發寒熱五心煩躁唇乾多渴胸膈不利咽喉噎塞尫羸瘦弱經曰大脈為勞宜服當歸青皮五加皮海桐皮陳皮丁皮桑白皮