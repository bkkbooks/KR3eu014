body:
  text: 卷之一治法通論保婦人童幼天癸未行之間皆屬少陰天癸既行皆屬厥陰天癸既絶乃屬太陰經也治胎産之病從厥陰者是祖氣生化之原也厥陰與少陽相表裡故治法無犯胃氣及上二焦為三禁不可汗不可下不可利小便若發汗者同傷寒下早之證利大便則脈數而已動於脾利小便則內亡津液胃中枯燥製藥之法能不犯此三禁則榮衛自和而寒熱止矣外則和於榮衛則內調於清便先將此法為初治次後詳而論之見證消息同壞證傷寒為之緩治或小便不利大便祕結或積熱於腸胃之間或已成痿或散血氣而為浮腫蓋産理多門故曰同傷寒壞證如發渴而用白虎氣弱而用黃耆血刺痛而用當歸腹痛而加芍藥以上例證不犯三禁謂産後之久病也若産後暴病又不可拘也如産後熱入血室者用桃仁承氣抵當湯等藥胃堅燥者大承氣不可以泄藥言之産後世人多用烏金四物湯是不分四時之寒熱不分血氣之虛實盲然一概用藥如此而愈加增劇是誤也大抵産病天行則增損柴胡雜症則加減四物又春夏從柴胡秋冬從四物藥性寒熱病證虛實不可不察也四物湯常宜服餌今立四時增損法於後養血四物湯益榮衛滋氣血治月水不調臍腹㽲痛婦人經病或前或後或多或少疼痛不一腰足腹中痛或崩中漏下或半産惡露過多或停留不出妊娠腹痛下血胎不安産後血塊不散或亡血過多惡露不止四物湯加茱萸煎服若入陽臟少使茱萸陰臟多使茱萸一方加香附熟地黃補血如臍下痛非此不能除乃通腎經之藥也川芎治風泄肝木如血虛頭痛非此不能除乃通肝經之藥也芍藥和血理脾如腹中虛痛非此不能除乃通脾經之藥也當歸和血如血刺痛刺如刀割非此不能除乃通心經之藥也上為粗末水煎服春倍川芎一曰春二曰脈弦三曰頭痛夏倍芍藥一曰夏二曰脈洪三曰泄秋倍地黃一曰秋二曰脈澀三曰血虛冬倍當歸一曰冬二曰脈沉三曰寒而不食若春則防風四物加防風倍川芎若夏則黃芩四物加黃芩倍芍藥若秋則門冬四物加天門冬倍地黃若冬則桂枝四物加桂枝倍當歸若血虛而腹痛微汗而惡風四物加朮桂謂之腹痛六合若風眩運加秦艽羌活謂之風六合若氣虛弱起則無力尩然而倒加厚朴陳皮謂之氣六合氣不足而用泄氣之藥可乎當以參耆易之若發熱而煩不能睡臥者加黃連梔子謂之熱六合若虛寒脈微自汗氣難布息清便自調加乾薑附子謂之寒六合若中濕身沉重無力身涼微汗加白朮茯苓謂之濕六合若婦人筋骨肢節疼及頭痛脈弦憎寒如瘧宜治風六合或傷損氣血乘虛而暈者四物湯四兩羌活防風各一兩若血氣上衝心腹脅下滿悶宜治氣六合四物湯四兩木香檳榔各一兩若臍下虛冷腹痛及腰脊間悶痛宜玄胡六合小腹痛同用四物湯四兩玄胡苦楝各一兩碎炒焦若氣衝經脈故月事頻並臍下多痛宜芍藥六合四物湯四兩芍藥倍加黃耆一兩若經事欲行臍腹絞痛臨經痛者血澀也宜八物湯四物湯四兩玄胡檳榔苦楝碎炒焦木香各一兩若婦人血虛心腹㽲痛不可忍者去地黃加乾薑名四神湯補下元加乾薑半兩甘草七分氣築小腹痛加玄胡索煎服若腹中刺痛惡物不下倍加當歸芍藥若腹痛作聲經脈不快加熟地黃一倍添桂心半倍煎經行腹痛腰背痛加蕓薹牛膝紅花吳茱萸菴䕡甘草銀器燈心熱服若經水澀少宜四物湯內加葵花煎又加紅花血見愁若經水少而色和者四物湯加熱地黃當歸各一兩若經水暴下四物湯內加黃芩若腹痛加黃連如夏月不去黃芩若經水如黑豆汁者加黃芩黃連各一兩若經水過多別無餘證宜黃芩六合湯四物湯四兩黃芩白朮各一兩經血淋漓不斷加干瑞蓮房炒入藥陰陽交合經脈行加赤石脂黃耆肉桂百草霜藕節敗棕灰肉豆蔻當歸木香龍骨白朮茯苓地榆若經水適來適斷或有寒熱往來者先服小柴胡湯去其寒熱後以四物湯和之如寒熱不退勿服四物是謂變證表邪猶在不能效也依前論中變證隨證用藥調治若血崩者加生地黃蒲黃補血住崩加百草霜棕灰首綿灰蒲黃炒過龍骨白姜血成片加地黃藕節黑血片人參白朮若血臟虛冷崩中去血過多加阿膠艾月水不調血崩或多少或前後嘔逆心膨陳艾黃耆若赤白帶下宜香桂六合四物湯四兩桂枝香附各五錢四物湯為細末煉蜜丸梧子大空心米飲下三四十丸治年高婦人白帶良驗白淫濁龍骨地黃當歸五色研麝香好酒鮮紅溫酒鹽湯帶下加肉桂蒲黃百草霜甘草黑豆白朮玄胡索白薑龍骨空心鹽酒下白帶加白龍骨酒下若婦人血積者加廣朮京三稜桂乾漆炒煙盡各一兩若經血凝滯腹內血氣作疼加廣朮官桂等分用之王石膚云熟地黃滯血安能止痛不若以五靈脂代之血滯不通加桃仁紅花各二錢半經閉加枳殼大黃荊芥黃芩青皮滑石木通瞿麥海金沙山梔子車前子血寒加甘草烏梅柴胡桃柳枝月經久閉加肉桂甘草黃耆姜錢棗子木通紅花月水不通加野苧根牛膝紅花蘇木舊酒水同煎血氣不調加吳茱萸一兩甘草半兩四物湯加甘草半兩為細末煉蜜丸每兩作八丸酒醋共半盞煎湯同化調下名當歸煎去敗血生好血如人行五里再進一服無時若虛熱病四物湯與參蘇飲相合名補心湯主之添柴胡名五神湯大能補虛退虛熱潮熱加黃芩地骨皮柴胡一方加柴胡乾葛黃芩人參虛熱口乾加麥門冬黃芩一兩虛渴加人參乾葛烏梅栝蔞根虛而多汗加煅牡蠣麻黃根各半兩虛寒潮熱加柴胡地骨皮白朮茯苓甘草秦艽知母黃芩麥芽貝母人參烏梅棗子若四肢腫痛不能舉動宜與蒼朮各半湯主之若大便燥結四物湯與調胃承氣湯各半名玉燭散主之若流濕潤燥宜四物理中各半湯若氣血俱虛四物與四君子湯各半名八珍湯主之加縮砂仁保胎氣令人有子若熱加黃芩若因熱生風者加川芎柴胡防風一方無血氣勞加荊芥柴胡血風兩脅築痛或盤腸成塊加大黃蓽茇乳香血弱生風四肢痹疼行步艱難加人參乳香沒藥麝香甘草五靈脂羌獨活防風荊芥地龍南星白附子澤蘭為末蜜丸木瓜鹽湯下血風膨脹加甘草木香枳殼馬兜鈴葶藶紫蘇藿香地黃空心服臟腑祕加大黃桃仁滑泄加官桂附子虛瀉加人參川芎白芷蒲黃炒阿膠白朮茱萸續斷乾薑附子肉桂黃耆赤石脂甘草蜜丸鹽梅湯下嘔加白朮人參一方有生薑嘔吐不止加藿香白朮半兩人參二錢半嘔逆飲食不入加白朮乳香甘草人參縮砂益智仁胡椒若咳嗽加桑白皮半夏人參生薑北五味子甘草感風勞嗽加款冬花知母阿膠半夏麻黃甘草馬兜鈴黃芩杏仁柴胡姜錢訶子烏梅若發寒熱加乾生薑牡丹皮柴胡一方加芍藥如寒熱往來加炮乾薑牡丹皮各一分若平常些少虛眩肢體瘦倦月信不通只用生薑薄荷此是婦人常服之藥蓋味寡而性緩效遲而功深若大渴加知母石膏若水停心下微吐逆者加豬苓茯苓防己若心腹脹滿加枳殼青皮虛汗加麻黃根汗多加浮麥大便下血四肢寒膨脹腸胃有風槐花積殼漏蘆荊芥木香白雞冠花木通紅內消紫草石榴皮陳皮青皮黃芩甘草白茅根槐角腸風下血加槐角槐花枳殼荊芥黃芩大腹皮紅內消地榆石楠葉白雞冠花為散煎一半為末空心鹽湯舊酒調下鼻衄吐血加竹青蒲黃藕節半夏丁香訶子桂花紅棗飛羅面白茅根蚌粉若頭昏項強加人參黃芩若虛寒似傷寒者加人參柴胡防風若虛煩不得睡加竹葉人參若諸痛有濕者四物與白朮相半加天麻茯苓穿山甲用酒煎服治老人風祕加青皮等分煎服治瘡疾荊芥酒煎常服奶癰加連翹茨菰子紅內消白芷菰片荊芥牛膝山蜈蚣乳香沒藥漏蘆生地黃赤眼頭風疾加薄荷清茶赤眼生風加防風黃芩風瘡赤腫加荊芥牛蒡子何首烏甘草防風羌活地黃鹽酒腳腫加大腹皮赤小豆茯苓皮生薑皮若婦人傷寒汗下後飲食減少血虛者宜八物湯四物湯四兩黃耆白朮茯苓甘草各一兩若妊娠傷寒中風表虛自汗頭痛項強身熱惡寒脈浮而弱太陽經病宜表虛六合湯四物湯四兩桂枝地骨皮各七錢若妊娠傷寒頭痛身熱無汗脈浮緊太陽經病宜表實六合四物湯四兩麻黃細辛各半兩若妊娠傷寒中風濕之氣肢節煩疼脈浮而熱頭痛此太陽標病也宜風濕六合湯四物湯四兩防風蒼朮各七錢若妊娠傷寒下後過經不愈溫毒發斑如錦紋宜升麻六合四物湯四兩升麻連翹各七錢若妊娠傷寒胸脅滿痛脈弦少陽頭昏項強宜柴胡六合四物湯四兩柴胡黃芩各七錢若妊娠傷寒大便硬小便赤氣滿而脈沉數陽明太陽本病也急下之宜大黃六合四物湯四兩大黃半兩桃仁十個去皮尖麩炒若妊娠傷寒汗下後咳嗽不止宜人參六合湯四物湯四兩人參五味子各半兩若妊娠傷寒汗下後虛痞脹滿者陽明本虛也宜厚朴六合湯亦治咳嗽喘滿四物湯四兩厚朴枳實麩炒各半兩若妊娠傷寒汗下後不得眠者宜梔子六合湯四物湯四兩梔子黃芩各半兩若妊娠傷寒身熱大渴蒸蒸而煩脈長而大者宜石膏六合四物湯四兩石膏知母各半兩若妊娠傷寒小便不利太陽本病宜茯苓六合湯四物湯四兩茯苓澤瀉各半兩若妊娠傷寒太陽本病小便赤如血狀者宜琥珀六合湯四物湯四兩琥珀茯苓各半兩若妊娠傷寒汗下後血漏不止胎氣損者宜膠艾六合湯四物湯四兩阿膠艾各半兩一方加甘草同上一方加乾薑甘草黃耆若妊娠傷寒四肢拘急身涼微汗腹中痛脈沉而遲少陰病也宜附子六合湯四物湯四兩附子炮去皮臍桂各半兩若妊娠傷寒蓄血證不宜墮胎藥下之宜四物大黃湯四物湯四兩生地黃大黃酒浸各半兩四物與麻黃桂枝白虎柴胡理中四逆茱萸承氣涼膈等皆可作各半湯不能殫述此易老用藥大略也安胎及漏胎下血加阿膠大艾甘草蒲黃炒過若胎動不安下血不止每服加艾葉五七片更加蔥白阿膠末黃耆減四味之半當歸只用小半如疾勢甚者以四味各半兩細銼以水四盞熟艾一塊如雞子大阿膠五七片煎至二盞半去滓分作四服一日令盡一方加粉草乾薑黃耆日二三服至二臘以一七日為一臘胎前産後每日可一二服亦治血痢不止腹痛難忍宜加阿膠艾葉煎服名六物湯如氣虛血海不調不妨一方四物加黃耆柏葉阿膠甘草續斷平常經血淋瀝不斷或多或少或赤或白非時漏下多服有效受胎小腸氣痛加木香懷香胎前嗽加枳殼甘草款冬知母馬兜鈴半夏木通葶藶人參苦梗麥門冬胎氣衝肝腰腳痹行步艱難加枳殼木通連翹荊芥地黃羌獨山梔甘草燈心空心服妊娠心煩加竹茹一塊如有敗血則用當歸近上節白芍藥以赤易熟地黃以生者妊娠作惡生寒面青不思飲食惟悴加陳皮枳殼白朮茯苓甘草損孕下血不止頭痛寒熱耳鳴氣血勞傷所致加黃芩荊芥生地黃赤芍藥生薑臨産小腹緊痛加紅花滑石甘草燈心葵子産後惡露腹痛不止加桃仁蘇木牛膝産後腹痛血塊攻腸加大艾沒藥好酒若因産後欲推陳致新補血海治諸疾加生薑煎若産後被驚氣滯種種積滯敗血一月內惡物微少敗血作病或脹或疼胸膈痞悶或發寒熱四肢疼痛加玄胡索沒藥香白芷與四物等分為細末淡醋湯或童子小便酒調下如血風於産後乘虛發作或産後傷風頭疼發熱百骨節痛每四物湯一兩加荊芥穗天麻香附子石膏藿香各二錢五分每服三錢水一盞煎至七分服産後傷風頭痛加石膏一兩甘草半兩若産後虛勞日久而脈浮疾者宜柴胡四物湯乃本方與小柴胡湯合用也若産後諸證各隨六經以四物與仲景藥各半服之甚效産後虛憊發熱煩悶加生地黃産後腹脹加枳殼肉桂各三錢産