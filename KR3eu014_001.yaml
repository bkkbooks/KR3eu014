茯苓半夏湯或二陳湯下若因房勞動胎下血名曰傷胎溫酒下若妊娠數經墮胎多至半産漏下用溫酒服氣順攝血自然胎息安固若妊娠日月不足而一向似欲産者以真知母煎湯下若妊娠胎上逼心胎不近下川芎煎湯下若妊娠至七八月常服養胎益血安和子臟仍令易産以枳殼糯米煎湯下但糯米飲下亦得若産後用名勝金丹治産後一切諸疾並以溫酒或米飲下若補理血虛血勞血氣血風等病名益陰丹以溫酒米飲下若女人血冷面白脫色青筋迸露以酒服良驗若調理經候滋養少女名金叉煎丸是經候不調月水湛濁腹常刺痛及室女血弱陰虛經脈不勻並依前酒飲送下又一等少女經脈已行一二次復至一二年又不行或有四季一行或有三五個月復至此本血脈柔弱木克故行脈斷續宜以此藥順氣潤血血旺自通不必攻之不爾成血癥積塊成血劫勞氣傳為骨蒸勞瘵兼百一方沉香勝金丹滋血湯佐之若婦人時行雜病用大聖通真丸治諸中風中噤角弓反張手足嚲曳並以羌活同黑豆炒酒下兼以小續命湯烏荊丸之類又婦人漏下五色及治血少氣寒面色青白及産後百日內常服能除宿血生養新血兼益氣補虛調和衝任不生諸疾皆以溫酒米飲下前蒲黃黑神散其中藥品佐助溫和看不上眼而自有妙理與大局方法不同臨産對證且如妊娠一節至精才媾一氣方凝經云祕法潮養胞源稍著寒溫即致損墜故經云舉寒為痛傷熱而驚峻僭湯劑勿可妄用怒傷胎氣及其生産之後百節開張去血過多津液燥少陰陽俱虛臟腑怯弱偶有疾傷即成危殆故經云犯時微若秋毫感病重於嵩嶽故涼冷之劑剛燥之藥尤戒輕用轉生他病若委有冒風感熱之疾亦是和解隨證調理縱有虛寒極冷之候亦宜用性溫平和之藥救療漸次加進大溫藥調治切戒粗疏若依此說則産後胎前百無一失不可取目前之急亂投湯劑反致其禍罪福非輕切須記之抑氣養血莪朮散隨證斟量加大莪朮煨川芎當歸去泥郭地黃酒蒸洗白芷茴香楊芍藥甘草各一兩上為細末每服二錢鹽酒調下月水不調銀器燈心安胎黃耆生地黃補虛調氣生薑紅棗遍身虛腫當歸酒小便不通滑石末心虛硃砂研末調敗血衝心腹疼如刀刺燒稱錘紅淬酒如不退五靈脂酒血閉身疼炒薑酒吐酸水丁香七粒煎湯血風上攻眼目浮腫荊芥小腹痛木瓜渾身浮腫薑湯或蔥湯胃虛噁心藿香頭面腫赤豆荊芥湯下血不止木香湯冷嗽桑白皮乾柿頭痛川芎細辛血風潮熱生薑紅棗虛汗麻黃根吐不止青陳皮血風腰痛蕓薹子錘碎女人血結不通手發攣急不知其數薺菜一撮順流水挪汁手足痹樟柳根浸酒女人血氣成塊築心銀子燈心血崩赤白帶真龍骨末好紅酒調血風中心狂言亂語渾身壯熱桃柳枝七寸血刺成塊不散菴䕡女人癖氣膈氣炒茴香酒婦人不問虛熱傷風潮熱憎寒一切百病先以三服隨證湯引投之服以他藥調理無不應驗冷嗽豬血心燥豬肝酒催生順流水滑石禹餘糧榆白皮坯子乳香葵子酸車草汁煎湯黃柞葉垂下者胎衣不下再加莪朮地黃竹青行血菴䕡生地黃紅花蘇木陳艾減楊芍藥加赤芍藥梢玉仙散治婦人諸疾香附子瓦器炒黑色勿焦白芍藥各一兩甘草一錢上為細末每服三錢沸湯下血崩不止竹葉煎湯下月水不行手足熱加生薑炒當歸煎木通湯下月水不勻當歸酒下頻頻下血不住米飲下氣痛及老婦人忽下血加炒薑黃炒陳皮湯任下理氣活血消積濟陰丹治婦人血海虛冷久無子息及産後敗血衝心中風口噤子死腹中擘開口灌藥須臾生下便得無羌治墮胎腹中攻刺痛橫生逆産胎衣不下血暈血癖血崩血滯血入四肢一應血臟有患及諸種風氣或傷風吐逆咳嗽寒熱往來遍身生瘡頭痛惡心經脈不調赤白帶下乳生惡氣胎臟虛冷數曾隋胎崩中不定因此成疾室女經脈不通並宜服之常服暖子宮和血氣悅顏色退風冷能消除萬病三稜二兩蓬朮一兩切片煨蒼朮泔浸去皮枳殼去穰大艾去梗劉寄奴香附子淨敗姜各一兩半烏豆三合以上九味以谷醋三升煮乾取出焙乾當歸身酒蒸橘皮去白細紅者佳白芍藥各一兩半蒲黃隔紙炒牡丹皮去骨官桂去粗皮赤芍藥片薑黃青皮去白各一兩生地黃酒浸熟地黃酒浸川芎各七錢半玄胡索炒五靈脂酒煮白朮煨各半兩上為細末以糯米粉谷醋打糊為丸如梧桐子大每服五十丸空心沉香湯送下蘇湯鹽湯下亦可南嶽魏夫人濟陰丹治婦人血氣久冷無子及數經墜胎皆因衝任之脈虛損胞內宿挾疾病經水不時暴下不止月內再行或前或後或崩中漏下三十六疾積聚癥瘕臍下冷痛小便白濁以上諸疾皆令孕育不成以致絶嗣此藥治産後百病百晬內常服除宿血生新血令人有子亦生子充實亦治男子亡血諸疾木香炮京墨煨茯苓桃仁去皮尖麩炒各一兩蠶布燒藁本秦艽石斛酒浸炒桔梗炒人參甘草各二兩牡丹皮去心乾薑炮細辛桂心當歸川芎各半兩蒼朮米泔浸八兩大豆卷炒半升川椒去目併合口炒出汗山藥各三兩澤蘭葉熟地黃酒浸蒸焙香附子炒各四兩糯米炒一升上為細末煉蜜和丸每兩作六丸如彈子大每服一丸細嚼溫酒送下淡醋湯化服亦可空心食前服或以醋糊為丸如梧桐子大每服五十丸依前服亦可理氣行血皺血丸治婦人血海虛冷百病變生氣血不調時發寒熱或下血過多或久閉不通崩中不止帶下赤白癥瘕癖塊攻刺疼痛小便緊滿脅肋脹痛腰重腳弱面黃體虛飲食減少漸成勞狀及經脈不調胎氣多損産前産後一切病患無不治療菊花去梗茴香玄胡索炒香附炒酒浸一宿焙肉桂去粗皮當歸芍藥熟地黃牛膝蒲黃蓬朮各三兩上為細末用烏豆一升醋煮候乾為末再入醋二碗煮至一碗留為糊丸如梧桐子大每服二十丸溫酒或醋湯送下血氣攻刺炒薑酒下癥瘕絞痛當歸酒下忌鴨肉羊血此藥暖子宮令人有子及治皺血損調衝任暖血海及胞絡傷損宿瘀乾血理氣和血加味五積散蒼朮一兩米泔浸炒白姜陳皮各一兩三錢厚朴去粗皮薑汁炒半夏洗枳殼炒楊芍藥香附子炒去毛桔梗人參去蘆茯苓去皮川白芷川芎當歸去土茴香炒木香肉桂粉草各一兩上銼碎生薑木瓜入鹽煎服陰證傷寒生薑附子血脈不勻紫蘇氣嗽烏梅姜錢勻經棗子姜錢補益血海蘇鹽産後生薑醋炒陳艾胃冷不納食陳皮縮砂赤白帶陳米冷氣疾木香茱萸心燥背筋急頭暈腰腳痠生地黃當歸脾虛蘇葉粉草月中被驚或因爭觸心頭結塊五膈五噎茴香棗子口苦舌乾吞酸噫氣此為胃冷生薑鹽腰痛桃仁木瓜杜仲川續斷身疼秦艽諸虛脾胃不和羸瘦冷氣蘇鹽冷瀉炒過生薑烏梅肉豆蔻陳米各煎湯養血潤燥卷柏丸治婦人衝任本虛血海不足不能流通經絡月水不調赤白帶下三十六疾並皆治之常服和經絡暖五臟潤肌膚長髮去䵟除風令人有子卷柏去根當歸洗焙艾葉炒各二兩熟地黃洗焙川芎白芷柏子仁微炒肉蓯蓉牡丹皮各一兩上為細末煉蜜和丸如梧桐子大每服五十丸用溫酒或米飲送下空心食前服溫經之劑氣血攻補備焉烏雞煎丸和劑治婦人胎前産後諸般疾患並皆治之烏雄雞一隻烏藥石床牡丹皮人參白朮黃耆各一兩蒼朮米泔浸切焙一兩半海桐皮肉桂去粗皮附子炮去皮臍白芍藥蓬莪朮川烏炮紅花陳皮各二兩玄胡索肉豆蔻木香琥珀熟地黃洗焙草果各半兩上細銼用烏雄雞一隻湯捋去毛及腸肚將上件藥安放雞肚中用新瓷瓶以好酒一斗同煮令乾去雞骨以油單盛焙乾為細末煉蜜和丸如梧桐子大每服三十丸胎前産後傷寒蜜糖酒下胎前氣悶壯熱炒薑酒下赤白帶下生薑地黃酒下産後敗血注心童子小便炒薑酒下産後血塊填築心腹疼痛玄胡索酒下胎前嘔逆薑湯下催生炒蜀葵子酒下安胎鹽酒下室女經脈當通不通四肢疼痛煎紅花酒下血氣攻刺心腹疼痛煎當歸酒下血暈棕櫚燒灰酒調吞下血邪研硃砂麝香酒下血悶煎烏梅湯研硃砂下子宮久冷溫酒或棗湯下空心日一服血風勞人參酒吞下小腹㽲痛炒茴香鹽酒吞下血散四肢遍身虛浮黃腫赤小豆酒下常服溫酒醋湯任下並空心食前服溫經澀脫小白薇丸和劑治婦人衝任虛損子臟受寒久無子息及斷續不産此由上熱下冷百病滋生或月水崩下帶漏五色腰腹疼重面黃肌瘦或因産乳不能將護路廁太早或久坐濕地或冷風從下入血臟既虛風邪內乘或月水當行失於調攝傷動胞絡陰陽不和上焦虛陽壅燥下藏邪冷結伏致使胎孕不成冷極傷敗月水不勻飲食減少夜多盜汗面上䵟𪒟齒搖發落腳膝疼重舉動少力並宜服之覆盆子去梗菖蒲微炒遠志去心桃仁去皮尖麩炒黃白茯苓去皮藁本去苗卷柏去根肉桂去粗皮人參白芷各三分白龍骨川椒去目併合口者炒出汗白薇去苗各一兩乾薑炮細辛去苗蛇床子炒當歸去蘆車前子芎藭各半兩熟地黃麥門冬去心各一兩半上為細末煉蜜和丸如梧桐子大每服三十丸空心用溫酒或米飲送下此藥常服壯筋骨益血氣暖子宮除風冷令人有子白堊丹和劑治婦人三十六病崩中漏下身瘦手足熱惡風怯寒咳逆煩滿抑息短氣心脅腰背肚腹與子臟相引痛漏下五色心常恐懼遇恚怒憂勞即發皆是內傷所致白堊牡蠣煅研細辛禹餘糧火煅紅醋淬研龍骨煅研附子炮去皮臍石葦去毛烏賊魚骨煅黃連去毛茯苓去毛肉桂去粗皮瞿麥穗白蘞芍藥白芷白石脂煆當歸去苗乾薑炮人參甘草炙各一兩川椒去目併合口者炒出汗半兩上為細末煉蜜和丸如梧桐子大每服三十丸空心用溫酒送下一方無人參溫經養血琥珀澤蘭煎和劑治婦人三十六種血氣八風五痹七癥八瘕心腹刺痛中風癱瘓手足痠疼乳中結瘀妊娠胎動胎死不出産衣不下敗血湊心頭旋眼花血疰四肢渾身浮腫衝任久虛絶産無嗣早晚服食或因有子經脈不調赤白帶下噁心嘔逆身體瘦倦懷入月一日一服滑胎易産琥珀澤蘭葉去梗牡丹皮去心紫巴戟去心糯米炒茴香五味子去梗五加皮劉寄奴草去枝白芷川當歸酒浸赤芍藥金叉石斛去根酒浸川芎白芍藥生地黃洗焙熟地黃洗焙人參白朮附子艾葉醋炒糯米糊調成餅焙乾為末各一兩上為細末煉蜜和丸如彈子大每服一丸食前用溫酒磨化服漏胎刺痛煮糯米飲下寒熱往來四肢煩疼煎青蒿酒下婦人室女經閉煎紅花酒下血暈不省人事童子小便和暖酒下催生雞子清和酒下血氣血塊攻刺心腹燒稱錘淬酒下傷寒及中風口噤煎麻黃湯下以被蓋出汗即愈心驚悸及頭痛薄荷酒下咳嗽煎桑白皮湯下血風攻疰渾身瘙癢頭面麻痹炒黑豆浸酒下産後産前常服不生諸疾甚效溫經理氣和血內灸散和劑治婦人産前産後一切血疾血崩虛憊腹脅滿痛氣逆嘔吐冷血冷氣凝積塊硬刺痛泄下青白或下五色腹中虛鳴氣滿堅脹瀝血腰疼口吐清水頻産血衰顏色青黃勞傷劣弱月水不調下血墮胎血迷血暈血瘕時發疼痛頭目眩暈惡血上心悶絶昏迷惡露不幹體虛多汗手足逆冷並宜服之茴香藿香丁皮熟地黃洗焙肉桂去皮各一兩半川芎藁本黃耆去蘆乾薑炮各二兩木香一兩陳皮去白四兩白芍藥十兩當歸去蘆山藥白朮白芷甘草炙赤各八兩上為末每服三錢水一大盞入生薑五片艾一團同煎至七分空心食前熱服溫酒調亦得如産後下血過多加蒲黃煎惡露不快加當歸紅花煎水瀉加肉豆蔻末煎嘔吐加藿香生薑煎上熱下冷加荊芥煎但是腹中虛冷血氣不和並宜服之産後每日一服則百病不生丈夫虛冷氣刺心腹疼痛尤宜服之和血溫經勝金丸治婦人久虛無子及産前後一切病患兼治男子下虛無力此藥能安胎催生妊胎臨月服五七丸産時減痛婦人無子是子宮冷如服二十丸男女自至又治積年血風腳手麻痹半身不遂赤白帶下血如山崩及治産後腹中結痛吐逆心痛子死腹中繞臍痛氣滿煩悶失蓋汗不出月水不通四肢浮腫無力血勞虛勞小便不禁中風不語口噤産後痢疾消渴眼前見鬼迷暈敗血上衝寒熱頭痛面色痿黃淋瀝諸疾血下無度血痢不止飲食無味産後傷寒虛煩勞悶産後血癖産後羸瘦凡婦人衆疾不問年深日近並宜服之一方名不換金丸治婦人諸虛不足心腹疼痛藁本當歸石脂赤白皆可白芍藥人參白薇川芎不見火牡丹皮桂心白芷白朮米泔浸白茯苓玄胡甘草炙沒藥各一兩江西安撫司甘草沒藥減半上為細末煉蜜和丸如彈子大每服一丸溫酒化下初産子用熱醋湯下食前服此方系王承宣德祖傳渠家凡婦懷身便服此藥甚有神效常服尤妙系在京師於能家傳一方有沉香無沒藥一方有附子無沉香溫經理氣沉香煎丸沉香二錢半丁香一兩麝香二兩白朮七錢官桂乾薑縮砂仁白豆蔻檳榔各五錢半青皮南木香肉豆蔻胡椒人參生薑屑訶子肉陳皮甘草各半兩上為細末煉蜜和丸如棗子大每服一丸細嚼生薑湯下溫紅酒亦可空心食前日進三服澀脫燥濕溫中龍骨散治腹下十二經絶産一曰白帶二曰赤帶三曰經水不利四曰陰胎五曰子臟堅六曰臟癖七曰陰陽患痛八曰內強九曰腹寒十曰臟閉十一曰五臟痠痛十二曰夢與鬼交並宜服之龍骨三兩半夏黃柏灶中黃土桂心乾薑各二兩石韋滑石各一兩烏賊魚骨代赭各四兩白殭蠶五枚上治下篩酒服方寸匕日三白多者加烏賊骨殭蠶各二兩赤多者加代赭五兩小腹冷加黃柏二兩子臟堅加乾薑官桂各二兩以上各隨病增之服藥三月有子即住藥太過多生兩子當審方取好藥寡婦童女不可妄服治錯雜之邪妙應丹治婦人衆疾無所不治晚蠶砂炒鯉魚鱗燒為末當歸去蘆石膏煅研澤蘭去梗附子炮去皮臍木香炮各二兩熟地黃酒洗蒸焙防風去蘆蕪荑炒馬牙硝柏子仁微炒別研川芎人參黃耆蟬蛻去足洗焙白薇檳榔不見火川椒微炒各一兩吳茱萸湯泡七次紅花炒各半兩藁本去苗白姜炮厚朴去粗皮薑製甘草炙各三兩上為細末煉蜜搜和杵數千下丸如彈子大每服一丸血瘕塊病綿灰酒下催生細嚼溫酒下血勞血虛桔梗酒下血崩棕櫚灰酒下血氣痛炒白姜酒下血風荊芥酒下血暈悶絶胎死腹中胞衣不下並用生地黃汁童子小便酒各一盞煎二沸調下常服醋湯溫酒化下並空心食前服攻積萬應紫菀丸療臍腹久患痃癖如碗大及諸黃病每地氣起時上氣衝心繞臍絞痛一切蟲咬十種水病十種蠱病反胃吐食嘔逆噁心飲食不消天行時病婦人多年月水不通或腹如懷孕多血天陰即發又治十二種風頑痹不知年歲晝夜不安夢與鬼交頭白多屑或哭或笑如鬼魅所著腹中積聚腹痛及治小兒驚癇大人癲狂一切風及無孕婦人身上頑麻狀如蟲行四肢俱腫呻吟等疾並皆治之功效不可具述紫菀去苗土柴胡去須菖蒲吳茱萸湯泡七次焙乾厚朴薑製各一兩桔梗去蘆茯苓去皮皂角去皮子炙黃連去須桂枝乾薑炮各八分川烏泡去皮七錢羌活去蘆獨活去蘆防風去蘆巴豆去皮出油人參去蘆蜀椒去目並閉口者微炒出汗各半兩上為細末研勻煉蜜和丸如梧桐子大每服三丸漸加至五七丸食後臨臥生薑湯送下初有孕者不宜服痔漏腸風酒下赤白痢訶子湯下膿血痢米飲湯下墮傷血悶四肢不收酒下蛔蟲咬心檳榔湯下氣噎憂噎荷葉湯下打撲傷損酒下中毒帚灰甘草湯下一切風升麻湯下寸白蟲擯榔湯下霍亂乾薑湯下咳嗽杏仁湯下腰腎痛豆淋酒下陰毒傷寒溫酒下吐逆生薑湯下食飲氣塊麵湯下時氣井花水下脾風陳皮湯下頭痛茶下心痛溫酒下大小便不通燈草湯下因物所傷以本物湯下吐水藜蘆湯下熱病乾薑湯下小兒天風吊搐防風湯下防己亦可小兒疳痢蔥白湯下小兒乳食傷白湯下月信不通煎紅花酒下婦人腹痛川芎湯下懷孕半年後漏胎艾湯下有子氣衝心酒下産血暈溫酒下血氣痛當歸酒下産後心腹脹滿豆淋湯下難産益智湯下産後血痢當歸湯下赤白帶下酒煎艾湯下解內外傷寒粥飲下室女血氣不通酒下子死葵子湯下溫白丸治婦人諸疾繼續而生帶下淋瀝五邪失心憂愁思慮意思不樂飲食無味月水不調及腹中一切疾病有似懷孕連年纍月羸瘦困弊或歌或哭者或如鬼所使但服此藥無不愈者桔梗柴胡菖蒲吳茱萸湯泡七次焙乾紫菀去苗土黃連去毛肉桂去粗皮厚朴去粗皮薑汁炙人參去蘆茯苓去皮皂角去皮子炙蜀椒去目併合口炒出汗巴豆去皮心膜出油炒細研各半兩川烏炮去皮臍二兩半上為細末研勻煉蜜丸梧子大每服三丸漸加至五七丸食後臨臥薑湯送下調經門經候總論良岐伯曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下天謂天真之氣癸謂壬癸之水壬為陽水配丁而化木癸為陰水合戊而化火故曰水火者陰陽之徵兆也女子陰類故得癸焉沖為血海任主胞胎二脈流通經血漸盈應時而下天真氣降與之從事故曰天癸也常以三旬一見以像月盈則虧不失其期又名月信也若遇經行最宜謹慎否則與産後證相類若被驚恐勞役則血氣錯亂經脈不行多致勞瘵等疾若逆於頭面肢體之間則重痛不寧若怒氣傷肝則頭暈脅痛嘔血而瘰癧癰瘍若經血內滲則竅穴淋瀝無已凡此六淫外侵而變證百出犯時微若秋毫成患重如山嶽可不畏哉薛血者水穀之精氣也和調五臟灑陳六腑在男子則化為精在婦人上為乳汁下為血海故雖心主血肝藏血亦皆統攝於脾補脾和胃血自生矣凡經行之際禁用苦寒辛散之藥飲食亦然良婦人月水不調由風邪乘虛客於胞中而傷衝任之脈損手太陽少陰之經蓋衝任之脈皆起於胞中為經絡之海與手太陽小腸手少陰心經為表裡上為乳汁下為月水然月水為經絡之餘苟能調攝得宜則經應以時矣薛經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行東垣先生謂脾為生化之原心統諸經之血誠哉是言也竊謂心脾平和則經候如常苟或七情內傷六淫外侵飲食失節起居失宜脾胃虛損心火妄動則月經不調矣有先期而至者有後期而至者其說詳見後條蓋血生於脾土故云脾統血凡血病當用苦甘之劑以助陽氣而生陰血也辨色丹經水者陰血也陰必從陽故其色紅稟火色也血為氣之配氣熱則熱氣寒則寒氣升則升氣降則降氣凝則凝氣滯則滯氣清則清氣濁則濁往往見有成塊者氣之凝也將行而痛者氣之滯也來後作痛者氣血俱虛也色淡者亦虛也而有水混之也錯經妄行者氣之亂也紫者氣之熱也黑者熱之甚也今人但見其紫者黑者作痛者成塊者率指為風冷而行溫熱之劑則禍不旋踵矣良由病源論月水諸病皆曰風冷秉之宜其相習而成俗也或曰黑北方水色也紫淡於黑非冷而何豫曰經曰亢則害承乃制熱甚者必兼水化所以熱則紫甚則黑也況婦人性執而見鄙嗜欲加倍臟腑厥陽之火無日不起非熱而何若曰風冷必須外得設或有之蓋千百一二者也冷證外邪初感入經必痛或不痛者久則鬱而變熱矣且寒則凝既行而紫黑故非寒也海四物加黃芩黃連湯治經水如黑豆汁四物湯四兩黃芩黃連各一兩上為末醋糊丸服丹月經黑口渴倦怠形短色黑脈不勻似數赤芍藥香附米各半兩黃柏炒黃芩各三錢甘草二錢上為末醋糊丸白湯下五六十丸永康胡八娘子二十歲二月經事不來忽行小腹痛有塊血紫色白芍藥白朮陳皮各半兩黃芩川芎木通各二錢甘草炙少許何孺人氣滯血澀脈不澀經不調或前或後紫色口苦兩大腿外臁麻木有時癢生瘡大便祕滯麻子仁桃仁芍藥各二兩枳殼白朮歸頭威靈仙訶子肉生地黃陳皮各五錢大黃煅七錢各為末粥丸如桐子大白湯下五六十丸丹經水色淡者氣血俱虛也宜八物湯之類八物者四物四君子也如兼它證隨證加藥樓婦人年四十八因有白帶口渴月經多初血黑色後來血淡倦怠食少臍上急白朮一錢半白芍藥陳皮各一錢木通枳殼黃芩各五分縮砂仁甘草炙各三分紅花豆許上煎湯下保和丸三十丸抑青丸二十丸審多少婦人病多是月經乍多乍少或前或後將發疼痛醫者不審一例呼為經病不知陽勝陰陰勝陽所以服藥無效蓋陰氣乘陽則包藏寒氣血不運行經所謂天寒地凍水凝成冰故令乍少而在月後若陽氣乘陰則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前當和血氣平陰陽斯為福也陽勝陰月候多者當歸飲當歸飲抑陽助陰調理經脈當歸微炒地黃酒蒸焙川芎白朮白芍藥黃芩各等分每服三錢水一盞半煎至八分空心溫服陰勝陽月候少者七沸湯七沸湯治榮衛虛經水愆期或多或少腹痛當歸川芎白芍藥蓬朮熟地黃川薑木香各等分每服四錢水一盞半煎至八分溫服經水過多為虛熱為氣虛不能攝血海四物加黃芩白朮湯治經水過多四物湯四兩黃芩白朮各一兩丹經水過多黃芩炒芍藥炒龜板炙各一兩椿樹根皮七錢半黃柏炒三錢香附二錢半上為末酒糊丸空心白湯下五六十丸丹一婦人脈弦而大不數形肥初夏時倦怠月經來時多此稟受弱氣不足攝血故行多白朮一錢半黃耆生陳皮各一錢人參五分甘草炙三分經水澀少為虛為澀虛則補之澀則濡之海四物加葵花湯治經水澀少四物湯四兩葵花一兩一方又加紅花血見愁四物湯加熟地黃當歸湯治經水少而色和四物湯四兩熟地黃當歸各一兩脈師曰有一婦人來診言經水少不如前者何也師曰曾更下利若汗出小便利者可何以故師曰亡其津液故令經水反少設經下多於前者當所苦困當言恐大便難身無復汗也先期後期王子亨曰經者常候也謂候其一身之陰陽愆伏知其安危故每月一至太過不及皆為不調陽太過則先期而至陰不及則後時而來其有乍多乍少斷絶不行崩漏不止皆由陰陽衰盛所致丹經不及期者血熱四物湯加黃連肥人不及日數而多痰者血虛有熱南星白朮蒼朮黃連香附川芎作丸薛先期而至者有因脾經血燥者宜加味逍遙散有因脾經鬱滯者宜歸脾湯方見雜病健忘門有因肝經怒火者宜加味小柴胡湯方見傷寒少陽病有因血分有熱者宜加味四物湯即四物加柴胡丹皮山梔有因勞役火動者宜補中益氣湯方見雜病勞倦門先期湯治經水先期而來宜涼血固經生地黃川當歸白芍藥各二錢黃柏知母各一錢條芩黃連川芎阿膠炒各八分艾葉香附炙甘草各七分水二盅煎一盅食煎溫服金匱土瓜根散治帶下經水不利小腹滿痛經一月再見者土瓜根芍藥桂枝䗪蟲各七錢半上四味杵為散酒服方寸匕日三服按仲景此方乃破堅下血之劑則經不及期有汗血者矣前論所未及也欲知汗血有無須以小腹滿痛與不滿痛別之丹經水過期血少川芎當歸人參白朮與痰藥過期色淡者痰多也二陳湯加芎歸過期色紫有塊血熱也必作痛四物湯加香附黃連薛過期而至者有因脾經血虛者宜人參養榮湯有因肝經血少者宜六味地黃丸有因氣虛血弱者宜八珍湯三方並見雜病虛勞門過期飲治經水過期不行乃血虛氣滯之故法當補血行氣熟地黃白芍藥當歸香附各二錢川芎一錢紅花七分桃仁泥六分蓬莪朮木通各五分甘草肉桂各四分水二盅煎一盅食前溫服滋血湯治婦人心肺虛損血脈虛弱月水過期人參山藥黃耆各一錢白茯苓去皮川芎當歸白芍藥熟地黃各一錢半上作一服水二盅煎至一盅食前服脈師曰脈微血氣俱虛年少者亡血也乳子下利為可否者此為居經三月一來師曰寸口脈微而澀微則衛氣不足澀則血氣無餘衛不足其息短其形躁血不足其形逆榮衛俱虛言語謬誤趺陽脈浮而澀澀則衛氣虛虛則短氣咽燥而口苦胃氣澀則失液少陰脈微而遲微則無精遲則陰中寒澀則血不來此為居經三月一來問曰婦人妊娠三月師脈之言此婦人非軀今月經當下其脈何類何以別之師曰寸口脈衛浮而大榮反而弱浮大則氣強反弱則少血孤陽獨呼陰不能吸二氣不停衛降榮竭陰為積寒陽為聚熱陽盛不潤經絡不足陰虛陽往一作實故令少血時發灑淅咽燥汗出或溲稠數多唾涎沫此令重虛津液漏泄故知非軀蓄煩滿血月稟一經三月一來陰盛則瀉名曰居經謂右脈浮大左脈反弱也調經平劑簡易方當歸散治經脈不勻或三四月不行或一月再至當歸川芎白芍藥炒黃芩炒各一兩白朮山茱萸肉一兩半上為細末空心溫酒調下二錢日三服如冷去黃芩加肉桂一兩人參養血丸和劑治女人稟受素弱血氣虛損常服補衝任調經候暖下元生血氣烏梅肉三兩熟地黃五兩當歸二兩人參川芎赤芍藥蒲黃炒各一兩上為細末煉蜜丸梧子大每服八十丸溫酒米飲任下逍遙散和劑治血虛煩熱月水不調臍腹脹痛痰嗽潮熱當歸白朮白芍藥柴胡茯苓各一兩甘草炙半兩上㕮咀每服半兩入薑薄荷葉煎服薛新甫加牡丹皮山梔炒各五分名加味逍遙散神巧萬全方無當歸芍藥甘草有人參黃耆各等分增損四物湯治月事不調心腹疼痛補血溫經駐顏川芎當歸芍藥熟地黃牡丹皮白朮各一錢半地骨皮一錢上作一服用水二盅煎至一盅食前服濟生方論曰內經云百病皆生於氣經有所謂七氣有所謂九氣喜怒憂思悲恐驚者七氣也七情之外益之以寒熱二證而為九氣也氣之為病男子婦人皆有之惟婦人血氣為患尤甚蓋人身血隨氣行氣一壅滯則血與氣並或月事不調心腹作痛或月事將行預先作痛或月事已行淋瀝不斷心腹作痛或遵腰脅或引背膂上下攻刺吐逆不食甚則手足搐搦狀類驚癇或作寒熱或為癥瘕肌肉消瘦非特不能受孕久而不治轉而為瘵疾者多矣戴復庵云婦人每月經水應期而下不使有餘猶太陰之缺也其有或先或後或少或多或欲來先病或遇來而斷續皆謂之不調和氣飲加香附子半錢兼咽獨附丸升麻和氣飲見雜病水腫門淡寮煮附丸治經候不調血氣刺痛腹脅膨脹頭暈噁心崩漏帶下並宜服之香附子擦去皮不以多少米醋浸一日用瓦銚煮令醋盡上醋糊為丸梧子大日乾每五十丸淡醋湯下一方香附一斤艾葉四兩當歸二兩制同名艾附丸沉香降氣散順氣道通血脈烏藥木香香附子縮砂仁甘草各等分上為細末每服二錢空心鹽湯調下嚴氏抑氣散治婦人氣盛於血變生諸證頭暈膈滿香附子四兩茯神甘草炙各一兩陳皮二兩上為末每二錢食前沸湯調下紺珠正氣天香湯治婦人一切氣氣上湊心心胸攻築脅肋刺痛月水不調臺烏藥二錢香附子八錢陳皮蘇葉各一錢乾薑半錢上㕮咀每七八錢水煎服上抑氣例煮附丸醋製佐以當歸則氣中之血藥也今世以童便酒醋鹽水四制而以四物佐之皆本於此人人知之故不著氣鬱多者宜於雜病氣證門中選用不必拘此東垣益胃升陽湯治婦人經候不調或血脫後脈弱食少水泄日二三行黃耆二錢白朮三錢炒曲一錢半當歸身陳皮炙甘草人參各一錢升麻柴胡各半錢黃芩半錢秋去之上㕮咀每服半兩水煎腹痛加芍藥嗽去人參補中益氣湯治婦人室女經候不調脈微食少體倦或熱方見雜病首冊勞倦門四君子湯六君子湯方見雜病首冊虛勞門上補氣例調經暖劑大溫經湯金匱治衝任虛損月候不調或來多不已或過期不行或崩中去血過多或經損娠瘀血停留小腹急痛五心煩熱並皆治之吳茱萸湯泡牡丹皮白芍藥肉桂去粗皮人參當歸去蘆芎藭阿膠碎炒甘草炙各一錢麥門冬去心二錢半夏二錢半上作一服用水二盅生薑五片煎至一盅食前服小溫經湯簡易治經候不調血臟冷痛當歸附子炮各等分上㕮咀每服三錢水一盞煎八分空心溫服溫經湯和劑治婦人血海虛寒月水不調川芎當歸芍藥蓬朮各一錢半人參牛膝各二錢桂心牡丹皮各一錢甘草半錢水二盅煎至一盅不拘時服滋血湯滋養榮血補婦人治血海久冷當歸一錢半川芎麥門冬去心牡丹皮人參芍藥琥珀另研各一錢半夏曲官桂阿膠炒酸棗仁甘草各半錢上作一服水二盅生薑三片煎至一盅食前服加味吳茱萸湯治衝任衰弱月候愆期或前或後或崩漏不止赤白帶下小腹急痛每至經脈行時頭眩飲食或少氣滿心怯肌肉不澤悉皆治之半夏二錢吳茱萸當歸各一錢半麥門冬去心乾薑白茯苓苦梗南木香防風牡丹皮甘草各一錢官桂北細辛各半錢上作一服水二盅生薑三片紅棗一枚煎至一盅食前服桃仁散治婦人月水不調或淋瀝不斷斷後復來狀如瀉水四體虛倦不能飲食腹中堅痛不可行動月水或前或後或經月不來多思酸物桃仁半夏當歸川牛膝桂心人參蒲黃牡丹皮川芎澤蘭葉各一錢赤芍藥生地黃各一錢半粉草半錢上作一服水二盅生薑三片煎至一盅食前服薑黃散治血臟久冷月水不調臍腹刺痛薑黃片子者白芍藥各二錢玄胡索牡丹皮當歸各一錢半蓬朮紅花桂心川芎各一錢上作一服水二盅酒半盅煎至一盅不拘時服紫石英丸本事治婦人病多是月經乍多乍少或前或後時發疼痛醫者一例呼為經病不曾說是陰勝陽是陽勝陰所以服藥少效蓋陰氣乘陽則胞寒氣冷血不運行經所謂天寒地凍水凝成冰故令乍少而在月後若陽氣乘陰則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前當和其陰陽調其血氣使不相乘以平為期宜服此丸紫石英細研水飛川烏炮杜仲炒去絲禹餘糧煅醋淬遠志去心澤瀉桑寄生桂心龍骨別研當歸人參肉蓯蓉酒浸石斛乾薑炮五味子甘草炙各一兩牡蠣煅川椒去目併合口者不用炒出汗各半兩上為細末煉蜜和丸如梧桐子大每服二十丸食前用米飲湯下暖宮丸治衝任虛損下焦久冷月事不調不成孕育崩漏下血赤白帶下並皆治之生硫黃六兩赤石脂火煅海螵蛸附子炮去皮臍各三兩禹餘糧九兩火煅醋淬上為細末醋糊為丸如梧桐子大每服三十丸空心用溫酒或醋湯送下內補當歸丸治血氣虛損月水不調或崩中漏下去血過多肌體羸困及月水將行腰腿重痛並皆治之當歸去蘆炒阿膠炒白芷續斷乾薑炮芎藭甘草炙各四兩熟地黃半兩焙附子炮去皮臍白芍藥肉桂各二兩吳茱萸湯泡焙白朮各三兩蒲黃八錢炒上為細末煉蜜和丸如梧桐子大每服五十丸空心用溫酒送下熟乾地黃丸治婦人風虛勞冷胃弱水穀不化或腸虛受冷大便時泄或月水不調淋瀝不止或閉斷不通結聚癥瘕久不成胎一切諸虛之證熟地黃五味子各一兩半柏子仁炒另研牛膝去苗酒浸焙芎藭禹餘糧火煅醋淬白茯苓去皮肉蓯蓉酒浸卷柏去根山藥厚朴去粗皮制乾薑炮白芷細辛去苗防風以上各一兩赤石脂二兩煅另研杜仲去粗皮炙蕪荑炒人參去蘆川椒去目併合口者蛇床子艾葉炒續斷各七錢半紫石英煅另研水飛石膏煅另研各三兩當歸去蘆炒澤蘭去梗官桂去粗皮各二兩二錢半石斛一兩一錢半甘草炙一兩七錢半上為細末煉蜜為丸如梧桐子大每服五十丸空心用溫酒或米飲送下禹餘糧丸治血虛煩熱月水不調赤白帶下漸成崩漏禹餘糧火煅醋淬白石脂各一兩附子炮去皮臍鱉甲去裙醋炙桑寄生白朮厚朴去粗皮制當歸去蘆柏葉炒乾薑炮各一兩白芍藥狗脊去毛各七錢半吳茱萸湯泡焙半兩上為細末煉蜜和丸如梧桐子大每服五十丸空心用溫酒或米飲湯送下鹿茸丸治衝任虛損又為風寒所乘尺脈微小甚者可灸關元穴鹿茸炙赤石脂禹餘糧各一兩續斷二兩柏葉附子炮熟地黃當歸酒浸艾葉各七錢半上為末酒糊丸梧子大每服五十丸空心溫酒下按此足少陰厥陰藥也今人多用之故收入治血虛濕勝帶下甚捷升陽舉經湯東垣治經水不調右尺脈按之空虛是氣血俱脫大寒證輕手其脈數疾舉指弦緊或澀皆陽脫之證陰火亦亡見熱證於口鼻眼或渴此皆陰躁陽欲去也當溫之降之引之燥之此法大升浮血氣補命門之下脫也諸藥言根近苗處去苗便是柴胡根當歸根白朮黃耆各三錢藁本去土羌活根防風根各二錢紅花白芍藥各五分獨活根一錢半桃仁去皮尖研十枚細辛六分川芎熟地黃水中沉者人參去蘆黑附子炮去皮臍甘草梢炙各一錢肉桂去粗皮秋冬五分夏不用上為粗末每服二錢水二盞煎至八分空心稍熱服調經破血之劑紅花當歸散治婦人血臟虛竭或積瘀血經候不調或斷續不定時作腹痛腰胯重疼攻刺小腹緊硬及室女月水不通並皆治之紅花紫葳牛膝白芷蘇木捶碎各一錢桂心一錢半當歸尾劉寄奴各二錢赤芍藥三錢甘草半錢上作一服水一盅酒一盅同煎至一盅空心服大玄胡索散治婦人經病併産後腹痛或腹滿喘悶或癥瘕癖塊及一切心腹暴痛玄胡索赤芍藥川楝子去核蓬莪朮京三稜煨厚朴薑製當歸黃芩川芎桔梗檳榔各一錢木香官桂去粗皮甘草各半錢大黃二錢上作一服水二盅煎至一盅食前服鱉甲丸治婦人月經不調肌肉黃瘁脅下積氣結痛時發刺痛漸成勞狀鱉甲去裙醋炙桂心三稜醋煮炒牡丹皮牛膝去苗琥珀訶子取肉桃仁去皮尖雙仁者麩炒土瓜根大黃煨以上各等分上為細末煉蜜為丸如梧桐子大每服十五丸食前用桃仁湯送下針灸心月經不調陰獨三分此穴大效須待經定為度在足四指間三壯東又法內踝下白肉際青脈上灸隨年壯集又法中極三陰交腎俞氣海心經閉久忽大崩復又斷絶復又大行不調者豐隆六分止血石門五分斷經婦人五旬經斷後再行或多或少或瘀或紅並下腹中氣滿如胎孕天樞中脘氣海各五分立愈甲婦人漏下苦血閉不通逆氣脹血海主之女子胞中痛月水不以時休止天樞主之千金作腹脹腸鳴氣上衝胸小腹脹滿痛引陰中月水至則腰脊痛胞中瘕子門有寒引臏髀水道主之千金引臏髀作大小便不通身痛産寶經水者行氣血通陰陽以榮於身者也氣血盛陰陽和則形體通或外虧衛氣之充養內乏榮血之灌溉血氣不足經候欲行身體先痛也越痛散治血氣虛寒身體作痛虎骨五銖茯苓甘草藁本防風白芷當歸芍藥續斷白朮附子各三銖上為粗末每服五錢水二盞姜五片棗二枚煎至一盞不拘時服腹痛良婦人經來腹痛由風冷客於胞絡衝任或傷手太陽少陰經用溫經湯桂枝桃仁湯若憂思氣鬱而血滯用桂枝桃仁湯地黃通經丸方見經閉若血結而成塊用萬病丸薛前證若風寒傷脾者六君子加炮姜方見雜病虛勞思慮傷血者四物加參術方見雜病虛勞思慮傷氣者歸脾加柴梔方見雜病健忘鬱怒傷血者歸脾逍遙兼服余參前後論治之戴經事來而腹痛者經事不來而腹亦痛者皆血之不調故也欲調其血先調其氣四物湯加吳茱萸半錢香附子一錢和氣飲加茱萸半錢亦可用痛甚者玄胡索湯然又恐感外邪傷飲食致痛痛不因血尤宜詳審和氣飲卻能兼治因冷而節因節而痛宜大溫經湯冷甚者去麥門冬不用丹抑氣丸治臨經之時腹痛以四物湯加玄胡索陳皮牡丹皮甘草痛甚以豆淋酒痛少以童便煮香附入條芩為丸經水將來而痛者四物湯加桃仁香附黃連海八物湯治經事將行臍腹絞痛臨經痛者血澀故也川芎二錢當歸芍藥熟地黃各二錢木香檳榔玄胡索苦楝碎炒焦各一錢上作一服水二盅煎至一盅食前服本治婦人月經壅滯每發心腹臍㽲痛不可忍及治産後惡露不快血上搶心迷悶不省氣絶欲死者琥珀散京三稜蓬莪朮赤芍藥劉寄奴牡丹皮熟地黃官桂菊花真蒲黃當歸各一兩濟生方無菊花蒲黃有玄胡索烏藥上前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為末每服二錢溫酒調下空心食前服一方不用菊花蒲黃用烏藥玄胡索亦佳豫家之祕方也若是尋常血氣痛只一服産後血衝心二服便下常服尤佳豫前後救人急切不少此藥亦宜多合以濟人大交加散治榮衛不和月經湛濁逐散惡血腹痛經血諸疾並皆治之生薑二斤搗取汁存滓用生地黃二斤取汁存滓白芍藥當歸桂心各一兩紅花炒無惡血不用沒藥另研各半兩玄胡索醋紙包煨熱用布擦去皮蒲黃隔紙炒各一兩上將地黃汁炒生薑滓生薑汁炒地黃滓各焙乾用諸藥為細末每服三錢溫酒調下若月經不依常蘇木煎酒調下若腰痛糖酒調下交加地黃丸治婦人經不調血塊氣痞肚腹疼痛生地黃搗汁存滓老生薑搗汁存滓各一斤玄胡索當歸川芎芍藥各二兩明沒藥木香各一兩桃仁去皮尖人參各半兩香附半斤上為末先以生薑汁浸地黃滓以地黃汁浸生薑滓曬乾皆以汁盡為度共十一味作一處曬乾研為末醋糊為丸空心以薑湯下大交加散治婦人榮衛不通經脈不調腹中撮痛氣多血少結聚為癥産後中風生地黃生薑各五兩各研取汁上交互取汁浸一夕各炒黃漬汁盡為度末之尋常腹痛酒調下三錢産後尤不可闕溫經湯方見前云桂枝桃仁湯治經候前先腹痛不可忍桂枝芍藥生地黃各二兩桃仁四十枚甘草一兩上為粗末每服五錢水二盞姜三片棗一枚同煎去滓溫服玄胡索湯濟生治婦人室女七情傷感遂使血與氣並心腹作痛或連腰脅或引背膂上下攻刺甚作搐搦經候不調但是一切血氣疼痛並可服之當歸去蘆酒浸銼炒玄胡索炒去皮蒲黃炒赤芍藥官桂不見火各半兩片子薑黃洗乳香沒藥木香不見火各三錢甘草炙二錢半上㕮咀每服四錢水一盞半生薑七片煎至七分去滓食前溫服吐逆加半夏橘紅各半兩丹瘀血香附子醋煮四兩桃仁去皮尖牡丹皮大黃蒸當歸各一兩川芎紅花各半兩瓦龍子煅醋煮一晝夜二兩上炊餅為丸如桐子大空心溫酒下三五十丸三神丸治室女血氣相搏腹中刺痛痛引心端經行澀少或經事不調以致疼痛橘紅二兩玄胡索去皮醋煮當歸去蘆酒浸銼略炒各一兩上為細末酒煮米糊為丸如梧桐子大每服七十丸加至百丸空心艾湯送下米飲亦得垣柴胡丁香湯治婦人年三十歲臨經預先臍腰痛甚則腹中亦痛經縮二三日柴胡羌活丁香全蠍當歸身生地黃上都作一服水四盞煎至一盞去渣稍熱食前服沒藥除痛散逐寒邪療腹痛蓬朮炮一兩當歸焙玄胡索五靈指肉桂去粗皮良薑炒蒲黃炒甘草炙沒藥各半兩上為末每服五錢溫酒調服婁一婦人三十歲每因浴後必用冷水淋通身又嘗大驚遂患經來時必先少腹大痛口吐涎水然後經行行後又吐水二日其痛直至六七日經水止時方住百藥不效豫診其脈寸滑大而弦關尺皆弦大而急尺小於關關小於寸所謂前大後小也遂用香附三兩半夏二兩茯苓黃芩各一兩半枳實玄胡牡丹皮人參當歸白朮桃仁各一兩黃連七錢川楝遠志甘草各半兩桂三錢茱萸一錢半分十五帖水煎入生薑汁兩蜆殼熱服後用熱湯洗浴得微汗乃已忌當風坐臥手足見水並吃生冷服三十帖全愈半年後又因驚憂前病復舉腰腹時痛小便淋閉心惕惕跳驚悸豫意其表已解病獨在裡先與灸少衝勞宮崑崙三陰交止悸定痛次用桃仁承氣大下之下後用香附三兩蓬朮當歸身各一兩半三稜玄胡索桂大黃青皮俱醋製青木香蘹香滑石木通桃仁各一兩烏藥甘草縮砂檳榔苦楝肉各半兩木香吳茱萸各二錢分作二十帖入新取牛膝濕者二錢生薑五片用荷葉湯煎服服訖漸安上行血例加味烏沉湯治婦人經水欲來臍腹㽲痛烏藥縮砂木香玄胡索各一兩香附炒去毛二兩甘草一兩半上細銼每服七錢水一盞半生薑三片煎至七分不拘時溫服上抑氣例薛一婦人經行腹痛食則嘔吐肢體倦怠發熱作渴此乃素稟氣血不足用八珍湯二十餘帖而愈後生子二年而經不行前證仍作服八珍湯逍遙散百餘劑方愈八珍湯即雜病虛勞門八物湯上補虛例汪一婦人瘦小年二十餘經水紫色或前或後臨行腹痛惡寒喜熱或時感寒腹亦作痛脈皆細濡近滑兩尺重按略洪而滑此血熱也或謂惡寒如此何謂為熱曰熱極似寒也遂用酒煮黃連四兩香附歸身尾各二兩五靈指一兩為末粥丸空腹吞之而愈一婦年二十一歲六月經行腹痛如刮難忍求死脈得細軟而駛尺則沉弱而近駛汪曰細軟屬濕數則為熱尺沉屬鬱滯也以酒煮黃連半斤炒香附六兩五靈脂半炒半生三兩歸身尾二兩為末粥丸空心湯下三四錢服至五六料越九年得一子又越四年經行兩月不斷腹中微痛又服前丸而愈續後經行六七日經止則流清水腹中微痛又服前丸而痛亦止又經住只有七八日若至行時或大行五六日續則適來適斷或微紅或淡紅行後常流清水小腹大痛漸連遍身胸背腰腿骨里皆痛自巳至酉乃止痛則遍身冷熱汗大出汗止痛減尚能飲食自始痛至今歷十五年前藥屢服屢效今罔效者何也汪復診之脈皆洪滑無力幸其尚有精神汪曰此非舊日比矣舊乃鬱熱今則虛寒東垣曰始為熱中終為寒中是也經曰脈至而從按之不鼓乃陰盛隔陽當作寒治且始病時而形斂小今則形肥大矣醫書曰瘦人血熱肥人氣虛豈可同一治耶所可慮者汗大泄而脈不為汗衰血大崩而脈不為血減耳其痛日重夜輕知由陽虛不能健運故亦凝滯而作痛以證參脈宜用助陽若得脈減痛輕方為佳兆遂投參耆歸術大劑加桂附一帖來早再診脈皆稍寧服至二三十帖時當二月至五月病且愈蓋病有始終寒熱之異藥有前後用舍不同形有肥瘦壯少不等豈可以一方而通治哉丹經過後而作痛者乃虛中有熱所以作痛新荷姐頭痛口乾經行後身痛腰甚痛生地黃白朮芍藥各一錢芎藭歸身尾各五分黃柏炒甘草炙各三分上用水入少酒煎服按經後腹痛為虛明甚若脈不數證無頭熱未可斷其為熱也無熱八珍為宜有熱逍遙為宜上寒熱例發熱吳茭山治一婦經血過多五心煩熱日晡潮熱諸藥不效以四物加胡黃連三服而愈薛新甫治一婦人發熱口乾月經不調兩腿無力服祛風滲濕之劑腿痛體倦二膝浮腫經事不通薛作肝脾腎三經血虛火燥證名鶴膝風用六味八味二丸兼服兩月形體漸健飲食漸進膝腫漸消不半載而痊前證若脾腎虛寒腿足軟痛或足膝枯細用八味丸若飲食過多腿足或臀內酸脹或浮腫作痛用補中益氣加茯苓半夏主之一婦人經候過期發熱倦怠或用四物黃連之類反兩月一度且少而成塊又用峻藥通之兩目如帛所蔽薛曰脾為諸陰之首目為血脈之宗此脾傷五臟皆為失所不能歸於目矣遂用補中益氣濟生歸脾二湯專主脾胃年餘尋愈一婦人月事未期而至發熱自汗服清熱止汗之劑反作渴頭痛手掉身麻此因肝經風熱用柴胡炒芩連炒山梔歸芍生地丹皮各一錢參耆苓術各一錢五分川芎七分甘草五分二劑其汗全止更以補中益氣而愈凡發熱久者陽氣亦自病須調補之一婦人氣血素虛經行不調飲食少思日晡熱甚用十全大補加山茱萸山藥丹皮麥門冬五味子而愈次年秋患寒熱或用清脾飲而元氣愈弱仍以前藥而愈一婦人素勤苦冬初患咳嗽發熱久而吐血盜汗經水兩三月一至遍身作痛或用化痰降火藥口噤筋攣此血虛而藥益損耳用加減八味丸及補中益氣加麥門五味山藥治之年餘而痊寒熱經水適來適斷者或有往來寒熱者先服小柴胡湯以去其寒熱後以四物湯和之本婦人血脈不調往來寒熱狀如勞倦當歸川芎甘草黃耆官桂去粗皮各一兩熟地黃白朮白芍藥各二兩柴胡阿膠各半兩為細末每服五錢棗一枚水煎空心溫服白湯點服亦得常服不生帶下調血脈養子宮終身無病太倉公治一女病腰背痛寒熱衆醫皆以為寒熱也公診之曰內寒月事不下也即竄以藥旋下病已病得之欲男子不可得也所以知其病者診其脈時切之腎脈也嗇而不屬嗇而不屬者其來難堅故曰月不下肝脈弦出左口故曰欲男子不可得也蓋男子以精為主婦人以血為主男子精盛則思室女子月盛則懷胎夫肝攝血者也厥陰弦出寸部又上魚際則陰血盛可知矣別詳師尼寡婦條內薛新甫治一婦人耳內或耳後項側作痛寒熱口苦月經不調此肝火氣滯而血凝用小柴胡加山梔川芎丹皮治之諸證悉退月事不行而寒熱者詳經閉門熱入血室良婦人傷寒傷風發熱經水適來晝則安靜暮則譫語有如瘧狀此為熱入血室治者無犯胃氣及上二焦宜服小柴胡湯若脈遲身涼當刺期門穴下針病入五吸停針良久徐徐出針凡針期門穴必瀉勿補肥人二寸瘦人寸半也薛前證若因勞役或怒氣發熱適遇經行而患前證者亦用小柴胡湯加生地黃治之血虛用四物加柴胡若病既愈而熱未已或元氣素弱並用補中益氣湯脾氣素郁用濟生歸脾湯血氣素虛用十全大補湯許學士治一婦病傷寒發寒熱遇夜則如見鬼狀經六七日忽然昏塞涎響如引鋸牙關緊急瞑目不知人病勢危困許視之曰得病之初曾值月經來否其家云經水方來病作而經遂止得一二日發寒熱晝雖靜夜則有鬼祟從日昨不省人事許曰此乃熱入血室證仲景云婦人中風發熱惡寒經水適來晝則明瞭暮則譫語如見鬼狀發作有時此名熱入血室醫者不曉以剛劑與之逐致胸膈不利涎潮上脘喘急息高昏冒不知人當先化其痰後除其熱乃急以一呷散投之兩時頃涎下得睡省人事次授以小柴胡湯加生地黃三服而熱除不汗而自解矣一婦人患熱入血室證醫者不識用補血調氣藥治之數日遂成血結胸或勤用前藥許公曰小柴胡已遲不可行也無已刺期門穴斯可矣豫不能針請善針者治之如言而愈或問熱入血室何為而成結胸也許曰邪氣傳入經絡與正氣相搏上下流行遇經水適來適斷邪氣乘虛入於血室血為邪所迫上入肝經肝受邪則譫語而見鬼復入膻中則血結於胸中矣何以言之婦人平居水養木血養肝方未受孕則下行之為月水既孕則中蓄之以養胎及已産則上壅之以為乳皆血也今邪逐血並歸於肝經聚於膻中結於乳下故手觸之則痛非藥可及故當刺期門也虞恆德治一少婦夏月行經得傷寒似瘧譫語狂亂諸醫皆以傷寒內熱投雙解散解毒湯服之大汗如雨反如風狀次以牛黃丸金石之藥愈投愈劇一日延虞診視脈弦而大虞思傷寒內熱狂亂六陽俱病豈不口乾舌黑況脈不數病體捫之或熱或靜其腹急痛意必有內傷在前傷寒在後今傷寒得汗雖已內傷則尚存故也因細問之患者曰正行經時因飲食後多汗用冷水抹身因得此證方知冷水外閉其汗內阻其血邪熱入室經血未盡血得邪熱乍靜乍亂寒熱譫語掉眩類風須得玉燭散下之而愈下後譫語已定次以四物小柴胡湯調理五日熱退身涼其患遂瘳衍義云一婦人溫病已十二日診之其脈六七至而澀寸稍大尺稍小發寒熱頭赤口乾不了了耳聾問之病數日經水乃行此屬少陽熱入血室也若治不對病則必死乃按其證與小柴胡湯服之二日又與小柴胡湯加官桂乾薑一日寒熱遂止又云臍下急痛又與抵當丸微利臍下痛痊身漸涼脈漸勻尚不了了乃復與小柴胡湯次日但胸中熱躁口鼻乾又少與調胃承氣湯不得利次日心下痛又與大陷胸湯半服利三行次日虛煩不寧時妄有所見復狂言雖知其尚有燥屎以其極虛不敢攻之遂與竹葉湯去其煩熱其夜大便自通至晚兩次中有燥屎數枚而狂言虛煩盡解但咳嗽唾沫此肺虛也若不治恐乘虛而成肺痿遂與小柴胡湯去人參大棗生薑加乾薑五味子湯一日咳減二日而病悉愈以上皆用仲景方薛立齊治一婦人經行感冒風寒日間安靜至夜譫語用小柴胡加生地治之頓安但內熱頭暈用補中益氣加蔓荊子而愈後因惱怒寒熱譫語胸脅脹痛小便頻數月經先期此是肝火血熱妄行用加味逍遙加生地黃而愈一婦人因怒寒熱頭痛譫語日晡至夜益甚而經暴至蓋肝藏血此怒動火而血妄行用加味逍遙散加生地黃治之神思頓清但食少體倦月經未已蓋脾統血此脾氣虛不能攝血用補中益氣治之月經漸止一婦人懷抱素郁感冒經行譫語服發散之劑不應用寒涼降火前證益甚更加月經不止肚腹作痛嘔吐不食痰涎自出此脾胃虛寒用香砂六君脾胃漸健諸證漸退又用歸脾湯而全愈加味小柴胡湯治婦人傷風續得寒熱發作有時經水適斷此為熱入血室其血必結致如瘧狀柴胡三錢半夏黃芩各二錢生地黃人參各一錢半甘草半錢作一服水二盅姜五片棗二枚煎一盅不拘時服乾薑柴胡湯治婦人傷寒經脈方來熱入血室寒熱如瘧或狂言見鬼柴胡一錢桂枝三分栝蔞根五分牡蠣煅乾薑炮甘草炒各三分上水煎服汗出而愈海蛤散治婦人傷寒血結胸膈宜服此藥及針期門穴海蛤滑石煅水飛甘草各五錢芒硝一兩上為末每服二錢用雞子清調下小腸通利其結血自散更用桂枝紅花湯發其汗則愈方見泄瀉汪石山治一婦經行必瀉三日然後行診其脈皆濡弱此脾虛也脾屬血屬濕經水將動脾血先已流注血海然後下流為經脾血既虧則虛而不能運行其濕令作參苓白朮散每服二錢一日米飲調下二三次月餘經行不瀉矣一婦年逾四十形長色脆病經不調右脈浮軟而大左脈虛軟而小近駛當時經前作泄今年四月感風咳嗽用湯洗浴汗多因泄一月六月復因洗浴發瘧六七次瘧雖止而神思不爽至八月盡而經水過多白帶時下瀉泄遂覺右腳疼痛舊曾閃肭腳跟今則假此延痛臀腿腰脅尻骨頸項右邊筋皆掣痛或咳嗽一聲則腰眼痛如腰札日輕夜重叫號不已幸痛稍止飲食如常今詳月水過多白帶時下日輕夜重瀉泄無時亦屬下多亡陰宜作血虛論治服四物止痛之劑益甚九月汪復診視始悟此病乃合仲景所謂陽生則陰長之法矣夫經水多白帶下常泄瀉皆由陽虛陷下而然命曰陽脫是也日輕夜重蓋日陽旺而得健運之職故血亦無凝滯之患而日故輕也夜則陰旺而陽不得其任失其健運之常血亦隨滯故夜重也遂以參術助陽之藥煎服五七帖痛減此亦病證之變治法殊常故記之月水不斷婦人月水不斷淋瀝無時或因勞損氣血而傷衝任或因經行而合陰陽皆令氣虛不能攝血若時止時行腹痛脈沉細此寒熱邪氣客於胞中非因虛弱也薛前證若鬱結傷脾用歸脾湯恚怒傷肝逍遙散肝火妄動加味四物湯脾氣虛弱六君子湯元氣下陷補中益氣湯熱傷元氣前湯加五味麥門炒黑黃柏儒者錢思習子室年三十餘無嗣月經淋瀝無期夫婦異處幾年矣思習欲為娶妾以謀諸餘余謂此鬱怒傷肝脾虛火動而血不歸經乃肝不能藏脾不能攝也當清肝火補脾氣遂與加味歸脾逍遙二藥四劑送至其家仍告其姑曰服此病自愈而當受胎妾可無娶也果病愈次年生子一婦人性急每怒非太陽耳項喉齒胸乳作痛則胸滿吞酸吐瀉少食經行不止此皆肝火之證肝自病則外證見土受克則內證作余先以四物加白朮茯苓柴胡炒梔炒龍膽清肝養血次用四君子加柴胡芍藥神麯吳茱萸炒黃連以培土製肝漸愈惟月經不止是血分有熱脾氣尚虛以逍遙散倍用白朮茯苓陳皮又以補中益氣加酒炒芍藥兼服而安一婦人多怒經行旬余方止後淋瀝無期肌體倦瘦口乾內熱盜汗如洗日晡熱甚皆由肝脾虧損無以生髮元氣用參耆歸朮茯神遠志棗仁麥門五味丹皮龍眼肉炙草柴胡升麻治之獲痊一婦人懷抱不舒腹脹少寐飲食素少痰涎上湧月經頻數余曰脾統血而主涎此鬱悶傷脾不能攝血歸源耳用補中益氣濟生歸脾而愈膠艾湯治勞傷血氣衝任虛損月水過多淋瀝不斷阿膠炒川芎甘草炙各二兩當歸艾葉炒各三兩熟地黃白芍藥各四兩上㕮咀每服半兩水煎一方有黃耆續斷丸大全治月水不斷口乾心煩四肢羸乏飲食減少川續斷當歸烏賊骨黃耆牛角䚡燒五味子甘草龍骨煅研赤石脂熟地黃各一兩地榆半兩艾葉附子乾薑川芎各七錢半上為末煉蜜丸梧子大每服三十丸空心溫酒下禹餘糧丸治久冷月水不斷面黃肌瘦虛煩減食禹餘糧二兩鹿角膠七錢半粉炒紫石英續斷赤石脂熟地黃川芎各一兩乾薑黃耆艾葉柏葉炒當歸炒人參白茯苓各半兩上為末煉蜜丸梧子大每三十丸空心米飲下牡蠣丸治血海虛損月水不斷牡蠣粉赤石脂代赭石各一兩阿膠川芎當歸鹿茸續斷乾薑各三兩甘草二錢半上為末煉蜜丸梧子大每服三十丸空心溫酒下經驗方治經血不止黃芩五分當歸柏葉蒲黃各四分生薑二分艾葉一分生地黃二十四分伏龍肝十二分上㕮咀用水二升煎取八合分二服又經血不止詩云婦人經血久淋漓舊蕊蓮蓬燒作灰熱酒一杯調八字自然安樂更無疑又方蓮蓬殼拒霜花二味等分為末每服二錢空心米飲調下伏龍肝散和劑治血氣勞傷衝任脈虛經血非時注下或如豆汁或成血片或五色相親臍腹冷痛月經不止伏龍肝麥門冬去心赤石脂各一錢熟地黃艾葉炒各一錢半當歸去蘆炒川芎各二錢半肉桂去粗皮乾薑炮甘草各半錢上作一服水二盅紅棗二枚煎至一盅食前服固經丸治經水過多不止乃陰虛挾熱所致法當補陰清熱黃柏三兩龜板炙四兩黃芩二兩白芍藥三兩樗根皮一兩半香附子童便制一兩半上為細末酒糊丸梧子大每以空心食前白湯下五七十丸月水不利良婦人月水不利者由勞傷氣血體虛而風冷客於胞內傷於衝任之脈故也若寸脈弦關脈沉是肝病也兼主腹痛孔竅生瘡尺脈滑血氣實經絡不利或尺脈絶不至兼主小腹引腰痛氣攻胸隔也薛前證屬肝膽二經蓋肝膽相為表裡多因恚怒所傷若本經風熱用補肝散方見脅痛門血虛用四物加酸棗仁若腎水不足用六味丸若患諸瘡瘍治見後牛膝散治月水不利臍腹作痛或小腹引腰氣攻胸膈牛膝酒製一兩桂心赤芍藥桃仁去皮尖玄胡索炒當歸酒浸牡丹皮木香各七錢半上為末每服一錢空心溫酒調下牡丹散治月候不利腹臍疼痛不欲食牡丹皮大黃炒各一兩赤茯苓桃仁生地黃當歸桂心赤芍藥白朮各七錢半石韋去毛木香各半兩上㕮咀每服三錢水一盞姜三片煎七分空心溫服産寶方治女人月經不利臍下氣脹上攻欲嘔不得睡當歸四錢乾漆三錢炒令煙盡上為細末蜜丸梧子大空心溫酒下十五丸養榮湯治婦人血海虛弱心中恍惚時多驚悸或發虛熱經候不調白芍藥川芎熟地黃薑黃當歸川薑青橘皮五加皮牡丹皮海桐皮白芷各等分每服五錢水一盞半生薑五片烏梅一個煎至一盞溫服不拘時送紫桂丸五十粒紫桂丸方見帶下過期不止産寶云男子生於寅寅屬木陽中有陰故男子得八數女子生於申申屬金陰中有陽女子得七數男以氣為主八八則卦數已盡盡則陽精痿女以血為主七七則卦數已終終則經水絶任衝脈虛衰天癸絶地道不通而無子矣或勞傷過度喜怒不時經脈衰微之際又為邪氣攻衝所以當止不止而崩下也許學士云婦人經脈過期不及腰腹疼痛或七七數盡而月經下者宜用當歸散治之當歸散治婦人天癸已過期經脈不勻或三四月不行或一月再至腰腹疼痛素問云七損八益謂女子七數盡而經不依時者血有餘也不可止之但令得依時不腰痛為善方見前調經平劑條竹芩心丸治婦人四十九歲以後天癸當住每月卻行或過多不止用黃芩心枝條者二兩米泔浸七日炙乾又浸又炙如此七次為末醋丸如桐子大每服七十丸空心溫酒送下日進二服上二方熱者宜之茸附湯補任沖調血氣乾薑四兩肉桂去粗皮附子龍骨生用防風各一兩牡蠣煅當歸各二兩鹿茸三兩酒炙每服半兩水二盅煎八分溫服補中芎藭湯治風虛冷熱勞傷衝任月水不調崩中暴下産後失血過多虛羸腹痛或妊娠胎動不安下血當歸乾薑炮各三兩川芎蜜炙黃耆甘草炙吳茱萸炮黃杜仲炒熟地黃人參各一兩每服三錢水一盅半煎一盅空心服上二方寒者宜之蓋亦有血海虛寒而不禁者也薛前證若肝腎虛熱用當歸散肝血虛熱四物加柴梔丹皮肝火內動小柴胡加山梔丹皮肝火血燥加味逍遙散脾經鬱火加味歸脾湯肝脾鬱火歸脾逍遙兼服肝腎虧損歸脾六味兼服仍與前後月經不調治驗同用一婦人年五十內熱晡熱經水兩三月一至此血虛有熱用逍遙散加山茱萸治之而愈後有痰作渴或小便不調或頭暈白帶用六味丸而安脈問曰婦人年五十數一朝而清血二三日不止何以治之師曰此婦人前絶生經水不下今反清血此為居經不須治當自止經水下常五日止者五日愈經閉內經陰陽別論云二陽之病發心脾有不得隱曲女子不月其傳為風消為息賁者死不治潔古曰女子月事不來者先瀉心火血自下也內經曰二陽之病發心脾有不得隱曲故女子不月其傳為風消王啓玄注曰大腸胃熱也心脾受之心主血心病則血不流脾主味脾病則味不化味不化則精不足故其病則不能隱曲脾土已虧則風邪勝而氣愈消也又經曰月事不來者胞脈閉也胞脈屬於心絡於胞中今氣上迫肺心氣不得下通故月事不來先服降心火之劑後服局方中五補丸後以衛生湯治脾養血也李東垣曰經閉不行有三補前人之闕婦人脾胃久虛形體羸弱氣血俱衰而致經水斷絶不行或病中消胃熱善食漸瘦津液不生夫經者血脈津液所化津液既絶為熱所爍肌肉漸瘦時見渴燥血海枯竭名曰血枯經絶宜瀉胃之燥熱補益氣血經自行矣此病或經適行而有子子亦不成而為胎病者有矣此中焦胃熱結也或心包絡脈洪數躁作時見大便祕澀小便雖清不利而經水閉絶不行此乃血海乾枯宜調血脈除包絡中火邪而經自行矣此下焦胞脈熱結也或因勞心心火上行月事不來者胞脈閉也包脈者屬於心而絡於胞中今氣上迫肺心氣不得下通故月事不來宜安心補血瀉火經自行矣此上焦心肺熱結也裴澤之夫人病寒熱月事不至者數年又加喘嗽醫者率以蛤蚧桂附投之曰不然夫人病陰為陽所搏溫劑太過故無益反害投以涼劑涼血和血藥則行矣已而果然五補丸局方補諸虛安五臟堅骨髓養精神熟地黃人參牛膝酒浸去蘆焙乾白茯苓地骨皮各等分上為細末煉蜜丸如梧子大每服三五十丸溫酒下空心服衛生湯當歸白芍藥各二兩黃耆三兩甘草一兩上為末每服半兩水二盞煎至一盞溫服空心如虛者加人參一兩上東垣潔古治血枯之法皆主於補血瀉火也補血者四物之類瀉火者東垣分上中下故火在中則善食消渴治以調胃承氣之類火在下則大小祕澀治以玉燭之類玉燭者四物與調胃承氣等分也火在上則得於勞心治以芩連及三和之類三和者四物涼膈當歸等分也潔古先服降心火之劑者蓋亦芩連三和玉燭之類後服五補衛生者亦補氣之劑也素帝曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之岐伯曰病名血枯此得之少年時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也帝曰治之奈何岐伯曰以四烏賊骨一蘆茹二味併合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也腹中論王注云烏賊魚骨主血閉蘆茹主散惡血雀卵主血痿鮑魚主瘀血河間宣明論方烏賊骨蘆茹各等分雀卵不拘數和丸小豆大每服五丸至十丸煎鮑魚湯下食後日三服壓以美膳上岐伯河間治血枯之法丹血枯經閉者四物湯加桃仁紅花陰虛經脈久不通小便短澀身疼者四物加蒼朮牛膝陳皮生甘草作湯又用蒼莎丸加蒼耳酒芍藥為丸就煎前藥吞下上丹溪治血枯大法薛夫經水陰血也屬衝任二脈主上為乳汁下為月水其為患有因脾虛而不能生血者有因脾郁傷而血耗損者有因胃火而血消爍者有因脾胃損而血少者有因勞傷心而血少者有因怒傷肝而血少者有因腎水不能生肝而血少者有因肺氣虛不能行血而閉者治療之法若脾虛而不行者調而補之脾鬱而不行者解而補之胃火而不行者清而補之脾胃損而不行者溫而補之勞傷心血而不行者靜而補之怒傷肝而不行者和而補之肺氣虛而不行者補脾胃腎虛而不行者補脾肺經云損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精審而治之庶無誤矣一婦人停食飽悶發熱或用人參養胃湯益甚再用木香檳榔丸泄瀉吐痰腹中成塊飲食少思又用二陳黃連厚朴之類前證益甚腹脹不食月經不至余以為胃氣虧損用補中益氣加茯苓半夏三十餘劑脾胃健而諸證愈又二十餘劑而經自行一婦人飲食後或腹脹或吞酸彼服枳朮丸吞酸益甚飲食日少胸膈痞滿腿內痠痛畏見風寒又服養胃湯一劑腿內作痛又一劑腿膝浮腫月經不行余謂鬱結所傷脾虛濕熱下注侵晨用四君二陳芎歸午後以前湯送越鞠丸飲食漸進諸證漸愈又用歸脾八珍二湯兼服兩月餘而經行一婦人性沉多慮月經不行胸滿少食或作脹或吞酸余以為中氣虛寒用補中益氣加砂仁香附煨姜二劑胸膈和而飲食進更以六君加芎歸貝母桔梗生薑大棗數劑脾胃健而經自調矣一婦人素有胃火或用清胃散而安後因勞役燥渴內熱肌肉消瘦月經不行余謂此胃火消爍陰血用逍遙散加丹皮炒梔以清胃熱用八珍湯加茯苓遠志以養脾血而經自行矣一婦人久患瘧形體怯弱內熱晡熱自汗盜汗飲食少思月事不行或用通經丸虛證大具余曰此因虛而致瘧因瘧以閉經也用補中益氣及六味地黃丸各百餘劑瘧愈而經行一婦人久患瘧瘧作則經不行形虛脈大頭痛懶食大便泄瀉小便淋瀝口乾唇裂內熱腹膨蓋由久瘧正氣已虛陰火獨旺用補中益氣湯治之尋愈惟不時頭痛乃加蔓荊子而痛止又兼用六味地黃丸而經行一婦人因勞耳鳴頭痛體倦此元氣不足用補中益氣加麥門五味而痊三年後得子因飲食勞倦月經不行晡熱內熱自汗盜汗用六味地黃丸補中益氣湯頓愈一婦人胃氣素弱為哭母吐血咳嗽發熱盜汗經水三月不行余以為悲則傷肺思則傷脾遂朝服補中益氣加桔梗貝母知母夕用歸脾湯送地黃丸而愈一癧婦少寐經水兩月餘一至誤服通經丸展轉無寐午前惡寒午後發熱余以為思慮虧損脾血用歸脾湯作丸午前以六君送下午後以逍遙散送下兩月餘得寐半載經行如期年餘而瘡愈上薛氏治血枯大法以補養真元為主蓋本易水師弟之旨而廣之王道也脈問曰婦人病下利而經水反斷者何也師曰但當止利經自當下勿怪所以利不止而血斷者但下利亡津液故經斷利止津液復經當自下問曰婦人病經水斷一二月而反經來今脈反微澀何也師曰此前月中若當下利故令妨經利止月經當自下此非軀也婦人血下咽乾而不渴其經必斷此榮不足本自有微寒故不引飲渴而引飲者津液得通榮衛自和其經必復下仲婦人之病因虛積冷結氣為證經水斷絶至有歷年血寒積結胞門寒傷經絡凝堅在上嘔吐涎沫久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與臟相連或結熱中病在關元脈數無瘡肌若魚鱗時著男子非止女身在下未多經候不勻令陰掣痛少腹惡寒或引腰脊下根氣衝氣衝急痛膝脛疼煩奄忽眩冒狀如厥顛或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辨記勿謂不然丹經候過期不行杜牛膝搗汁大半盅以玄胡末一錢香附末枳殼末各半錢早調服大萬病丸治經事不來繞臍痛乾漆杵碎炒煙盡牛膝去苗酒浸一宿焙乾各一兩上為末以生地黃汁一升入二味藥末銀器內慢火熬可丸即丸如桐子大每服二丸空心米飲或溫酒下土牛膝散治婦人室女血閉不通五心煩熱土牛膝當歸尾各一兩桃仁去皮麩炒另研紅花各半兩上為細末每服二錢空心溫酒下當歸乾漆丸療月經不利臍下憋逆氣脹滿見調經門月水不利治月經壅滯臍腹㽲痛當歸玄胡索上為粗末每服三錢姜三片水一盅半煎至七分去滓稍熱服當歸散治血脈不通當歸穿山甲灰炒蒲黃炒各半兩辰砂另研一錢麝香少許上為細末研勻每服二錢食前熱酒調下琥珀散治心膈迷悶腹臟撮痛氣急氣悶月信不通等疾天台烏藥二兩當歸莪朮各一兩上為細末每服二錢溫酒調下後以食壓之忌生冷油膩産後諸疾炒薑酒調下小腸移熱於大腸為伏瘕為沉王注云血澀不利則月事沉滯而不行聖治婦人月水澀滯不快結成瘕塊筋脹大欲死用馬鞭草根苗五斤銼細水五斗煎至一斗去渣別以淨器盛熬成膏食前溫酒調下半匙本草云馬鞭草辛涼破血瘕羅血極膏治婦人乾血氣以川大黃為末用釅醋熬成膏子丸如雞頭大每服一丸酒化開臨臥溫服大便利一二行後紅脈自下是婦人之仙藥也加當歸頭仲婦人經水不利抵當湯主之亦治男子膀胱滿急有瘀血者方見傷寒蓄血産寶方治月經不通腹中痛牛膝六分大黃桃仁去皮尖炒細辛各五分川芎當歸各四分水蛭三分糯米炒黃上為細末煉蜜丸梧子大每服二十丸空心溫酒下千金桃仁煎治血積癥瘕月水不行大黃濕紙裹蒸朴硝桃仁制炒各二兩虻蟲一兩去足翅炒黑上為細末醋二升半銀石器中慢火熬膏卻入大黃桃仁虻蟲末不住攪度可丸卻入朴硝再攪良久出之丸如梧子大五更初溫酒下五丸至日午取下如赤豆汁雞肝蛤蟆衣樣候鮮紅住服仍以調氣藥補之三稜丸治婦人經脈不通氣痛帶下兼治血瘕三稜醋炒川芎牛膝玄胡索蓬朮醋炒蒲黃菴䕡牡丹皮芫花醋炒白芷當歸地龍去土酒浸炒乾薑炮各一兩大黃二兩為末以米醋熬成膏和藥上為細末以大黃膏和丸如梧子大每服三五十丸空心醋湯下或紅花煎酒下上經一節方七首皆治汙血有熱而經閉前一方輕劑後六方重劑也云紅花當歸散治婦人經候不行或積瘀血腰腹疼痛及室女月經不通紅花當歸尾紫葳牛膝甘草蘇木細銼各二兩赤芍藥九兩劉寄奴五兩桂心白芷各一兩半上為細末空心熱酒調三錢服之食前臨臥再服若久血不行濃煎紅花酒下孕婦休服一名凌霄花散即紫葳牛膝散見調經門月水不利條溫經湯見前調經門桂枝桃仁湯治婦人月事不通小腹膨脹疼痛見前調經門腹痛條牡丹散見前調經門月水不利條通經丸本事治婦人室女月候不通或成血瘕本草入雞子清同丸畏漆入腸胃生瘡也桂心青皮去白大黃炮乾薑炮川椒炒出汗川烏炮蓬莪朮乾漆炒煙盡當歸桃仁制炒各等分上為末先將四錢用米醋熬成膏和餘六錢末成劑臼中杵丸如桐子大曬乾每服二十丸用淡醋湯下加至三十丸溫酒亦得空心食前服濟生去川烏加紅花等分滋血湯治勞動致臟腑衝任氣虛不能約制經血以致崩中或下鮮血或下五色連日不止淋漓不斷形羸血劣倦怠困乏月水閉絶馬鞭草牛膝荊芥穗各二兩當歸肉桂牡丹皮赤芍藥川芎各一兩上每服四錢烏梅一個水二盞煎一盞食前服日進四五服服至半月或一月經脈自通上方七首皆治汙血有寒而經閉前四方輕劑後二方重劑也大治月水不通屢試有驗厚朴不以多少薑汁炙香細切濃煎去渣空心服不過三四劑瘥形實氣盛者宜之丹積痰傷經不行夜則妄語栝蔞子一兩黃連半兩吳茱萸十兩桃仁五十粒紅曲二錢縮砂三兩山楂末一兩上生薑汁研炊餅為丸軀脂滿經閉導痰湯加芎連不可服地黃如用薑汁拌炒導痰湯即二陳加枳實黃連是也楊村婦人年二十餘兩年經閉食少乏力黃連二錢白朮一錢半陳皮滑石各一錢黃芩半錢木通三分桃仁十二個甘草炙少許此方分兩有訛上丹溪治痰結胸腹而經閉之法皆用輕劑導痰降火也經云氣上迫肺則心氣不得下通故月事不來今用連朴之類導痰降火使不上迫於肺故心氣下通而月事來也丹溪治一婦人久瘧食少經閉兩手無脈每日與三花神佑丸十餘粒津咽之月餘食進脈出又半月脈愈又一月經行亦此意也詳見久瘧豫嘗體丹溪之意治陳氏婦二十餘歲形肥痞塞不食每日臥至未牌吃一盞薄粥吃粥後必吐水半碗仍復臥經不通三月矣前番曾暗通黑色脈之辰時寸關滑皆有力午後關滑寸不滑詢之因乘怒飲食而然遂以白朮一兩半厚朴黃連枳實各一兩半夏茯苓陳皮山楂人參滑石各八錢縮砂香附桃仁各半兩紅花二錢分作十帖每日服一帖各入薑汁二蜆殼間三日以神佑丸神祕沉香丸微下之至十二日吐止食漸進四十日平復如故又汪氏婦三十餘形瘦亦痞不食吐水經不通以前藥方加參朮歸為君煎熟入竹瀝半盞薑汁服之但不用神佑丸下亦平復若咳嗽寒熱而經閉者當於咳門濕痰條求之子和凡婦人月事不來用茶調散吐之次用玉燭散芎歸湯三和湯桂苓白朮散之類降心火益腎水開胃進食分陰陽利水道之藥也一婦人月事不行寒熱往來口乾頰赤飲食少旦暮間咳一二聲諸醫皆用虻蟲水蛭乾漆硇砂芫青紅娘子沒藥血竭之類惟戴人不然曰古方雖有此法奈病人服之必臍腹發痛飲食不進乃命止藥飲食少進內經曰二陽之病發心脾心受之則血不流故女子不月既心受積熱宜抑火升水流濕潤燥開胃誘食乃湧出痰一二升下泄水五六行濕水上下皆去血氣自然湍流月事不為水濕所隔自依期而至矣亦不用虻蟲水蛭之類有毒之藥如用之則月經總來小溲反閉他證生矣凡精血不足宜補之以食大忌有毒之藥偏勝而致夭閼多矣一婦人年三十四歲經水不行寒熱往來面色痿黃唇焦頰赤時咳三二聲問其所服之藥黑神散烏金丸四物湯燒肝散鱉甲散建中湯寧肺散針艾千百轉劇家人意倦不欲求治戴人憫之先湧痰五六升午前湧畢午後食進餘證悉除後三日復輕湧之又去痰一二升食益進不數日又下通經散瀉訖一二升後數日去死皮數重小者如麩片大者如葦膜不月餘經水自行神氣大康矣月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也全文見水腫大室女月水不來用雄鼠屎一兩燒存性為細末空心溫酒調下一錢神效海掌中金丸治婦人乾血氣穿山甲炮甘草苦丁香川椒苦葶藶白附子豬牙皂角草烏頭各三錢巴豆一錢全用研上為細末以生蔥絞汁和丸彈子大每用一丸新綿包之納陰中一日即白二日即赤三日即血神效仲婦人經水閉不利臟堅癖不止中有乾血下白物礬石丸主之礬石三錢燒杏仁一分上二味末之煉蜜丸棗核大內臟中劇者再納之室女經閉成勞寇宗奭曰夫人之生以氣血為本人之病未有不先傷其氣血者若室女童男積想在心思慮過度多致勞損男子則神色消散女子則月水先閉蓋憂愁思慮則傷心而血逆竭神色先散月水先閉且心病則不能養脾故不嗜食脾虛則金虧故發嗽腎水絶則木氣不榮而四肢干痿故多怒鬢髮焦筋骨痿若五臟傳遍則死自能改易心志用藥扶持庶可保生切不可用青蒿虻蟲等涼血行血宜用柏子仁丸澤蘭湯益陰血制虛火薛經云五穀入於胃其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸榮氣者泌其津液注之於脈化以為血以榮四末內養五臟六腑若服苦寒之劑復傷胃氣必致不起一室女年十七癧久不愈天癸未通發熱咳嗽飲食少思欲用通經丸余曰此蓋因稟氣不足陰血未充故耳但養氣血益津液其經自行彼惑於速效仍用之余曰非其治也此乃剽悍之劑大助陽火陰血得之則妄行脾胃得之則愈虛後果經血妄行飲食愈少遂致不救柏子仁丸大全治如上證兼服澤蘭湯柏子仁炒別研牛膝卷柏各半兩澤蘭葉續斷各二兩熟地黃三兩為細末煉蜜丸如梧子大空心米飲下三十丸澤蘭湯澤蘭葉三兩當歸芍藥各一兩甘草半兩為粗末每服五錢水二盞煎一盞溫服沉香鱉甲散室女經候凝滯或頭目昏悶停痰五心虛煩少食多困沉香甘草炙檳榔各三分木香常山當歸柴胡人參半夏桂心生地黃白茯苓青皮淨陳皮各一兩鱉甲一兩半上為細末每二錢姜二片水煎七分空心溫服劫勞散療心腎俱虛水火不交初則微嗽遇夜發熱即冷有盜汗倦怠瘦弱減食恍惚或微嗽唾中有紅線名曰肺痿為不治白芍藥六兩黃耆甘草人參當歸半夏白茯苓北五味子阿膠炒熟地黃洗各二兩上㕮咀每三大錢水盞半姜十二片棗三枚煎溫服百藥不效一料除根麥煎散治少男室女骨蒸婦人血風攻疰四肢心胸煩壅口臭肌熱盜汗鱉甲大黃煨常山赤茯苓柴胡白朮當歸乾漆炒煙盡生地黃石膏各一兩甘草半兩上為細末每服二錢水一盞小麥五十粒食後臨臥溫服有虛汗加麻黃根一兩牡丹散和劑治血氣虛損內則月水不行外發潮熱肢體羸困漸成骨蒸乾漆炒二兩蘇木蓬莪朮鬼箭各一分甘草當歸桂心牡丹皮芍藥延胡索炒淨陳皮紅花烏藥沒藥別研各一兩上㕮咀每服三錢水一盞煎七分溫服無時六神湯御藥治血氣不足肌體煩熱四物湯加黃耆地骨皮各等分㕮咀水煎又治衝任虛損月水不行肌膚髮熱如瘵狀四物湯各一兩柴胡半兩黃芩一分水煎桃仁散治婦人女子血閉不通五心煩熱紅花當歸桃仁炒牛膝各等分上為末每服三錢酒調下空心服脈師曰有一婦人將一女子年十五所來診言女子年十四時經水自下今經反斷其母言恐怖師曰若是夫人親女必夫人年十四時亦以經水下所以斷此為避年勿怪後當自下此真氣猶怯稟賦素弱而然也宜固天元真氣使水升火降則五臟自和而經脈通矣又方鹿茸山茱萸當歸各四兩麝香一兩為細末入麝香拌勻和酒糊為丸每服百丸或五十丸溫酒鹽湯任下針灸心經脈不通已有寒熱此穴大效三陰交三分立有效如疼時乃經脈要通也摘經脈不通心術同曲池支溝三里三陰交此四穴壅塞不通則瀉之如虛耗不行則補之集月經斷絶中極三陰交腎俞合谷東又法四滿在丹田傍一寸半心經脈不通變成瘕證飲食如常腹漸大如蠱氣海用針通管去其瀉水惡物陰交取法亦如上去其惡物甲月水不通奔泄氣上下引腰脊痛氣穴主之女子不下月水照海主之婦人少腹堅痛月水不通帶脈主之月水不利見血而有身則反敗及乳腫臨泣主之診腎脈微澀為不月血崩殺血心痛附大法丹紫色成塊者血熱四物加黃連柴胡之類氣虛血虛者皆於四物內加參耆急則治其標白芷湯調百草霜甚者棕櫚灰後用四物加炒乾姜調理因勞者用人參帶升補藥因熱者用黃芩因寒者用炒乾姜戴血大至曰崩中或清或濁或純下瘀血或腐勢不可止證狀非一所感亦異甚則頭目昏暈四肢厥冷並宜膠艾湯咽震靈丹佐以三灰散或以童子小便煎理中湯或以沉香降氣湯加入百草霜米飲調下血崩甚而腹痛人多疑惡血未盡又見血色瘀黑愈信惡血之說不敢止截大凡血之為患欲出未出之際停在腹中即成瘀色難盡以瘀為惡又焉知瘀之不為虛冷乎若必待見瘀血之後截之恐並與人無之矣此腹痛更有說瘀而腹痛血通而痛止崩而腹痛血住則痛止宜芎歸湯加乾薑熟附一錢止其血而痛自止仍以刺花繡拭黑片燒灰研末米飲調下一方以毛蟹殼燒存性米飲下亦有以早黃麻根燒灰為末米飲下薛經云陰虛陽搏謂之崩又云陽絡傷則血外溢陰絡傷則血內溢又云脾統血肝藏血其為患因脾胃虛損不能攝血歸源或因肝經有火血得熱而下行或因肝經有風血得風而妄行或因怒動肝火血熱而沸騰或因脾經鬱結血傷而不歸經或因悲哀太過胞絡傷而下崩治療之法脾胃虛弱者六君子湯加當歸川芎柴胡脾胃虛陷者補中益氣湯加酒炒芍藥山梔肝經血熱者四物湯加柴胡山梔苓術肝經風熱者加味逍遙散或小柴胡湯加山梔芍藥丹皮若怒動肝火亦用前藥脾經鬱火者歸脾湯加山梔柴胡丹皮哀傷胞絡者四君子湯加柴胡升麻山梔故東垣丹溪諸先生云凡下血證須用四君子以收功斯言厥有旨哉若大去血後毋以脈診當急用獨參湯救之其發熱潮熱咳嗽脈數乃是元氣虛弱假熱之脈也尤當用人參之類此等證候無不由脾胃先損故脈洪大察其有胃氣受補則可救設用寒涼之藥復傷脾胃生氣反不能攝血歸源是速其危也經驗簡要治崩中等證冷者脈緊細手足寒紅去淡黑或五色當歸建中加白龍骨血竭附子下紫石英丸震靈丹灸火熱者脈洪四肢溫心煩口苦燥血沸而成用黃芩湯荊芥散或清心蓮子飲加竹瀝生地黃汁甚者生地黃汁磨京墨百草霜冷服虛者膠艾湯加麥門冬鹿茸龍骨酸棗仁或養榮湯加龍骨血竭送震靈丹實者腹中痛煮附丸四物湯加香附子心虛者恍忽多夢健忘舌強小便多面紅盜汗柏子仁湯酸棗仁湯加龍骨京墨百草霜吞靈砂丹又靈砂當歸蓮肉龍骨棗肉丸參湯送下崩中作麝香當歸香者心氣已散急服靈砂龍骨等有田婦崩中斷下者用大蕪根酒煎清早服生麥中如蓬蒿花或云即薊根也産寶分陰崩陽崩受熱而赤謂之陽崩受冷而白謂之陰崩膠艾湯治陽崩不止小腹疼痛見前月水不斷條固經丸治陰崩不止艾葉醋炒鹿角霜伏龍肝乾薑各等分為末上熔鹿角膠和藥乘熱丸食後淡醋湯下五十丸丹溪云涎郁胸中清氣不升故經脈壅遏而降下非開涎不足以行氣非氣升則血不能歸隧道此論血泄之義甚明蓋開胸膈濁涎則清氣升清氣升則血歸隧道不崩矣故其證或腹滿如孕或臍腹㽲痛或血結成片或血出則快止則悶或臍上動其治法宜開結痰行滯氣消汙血開痰江氏婦三十歲墜胎後血不止食少中滿倦怠不起躁煩六脈沉伏而數重取微弦豫作怒氣傷肝感動胃氣二陳加川芎白朮縮砂二十帖而安仲旋覆花湯治半産漏下脈弦而大旋覆花三兩蔥十四莖新絳少許上三味以水三升煮取一升頓服之本草云旋覆主留飲結氣半夏丸直指治下血吐血崩中帶下痰喘急滿虛腫亦消宿瘀百病圓白半夏刮淨捶扁薑汁調飛白麵作餅包炙黃色去面取半夏作末米糊為丸緑豆大每服十丸溫熟水下芎歸湯沉香降氣湯各半煎送下止血之要藥千治婦人崩中下血不止以衣中白魚殭蠶等分為末以井花水服之日三服瘥上三方開痰行氣羅備金散治婦人血崩不止香附子四兩炒當歸尾一兩二錢五靈脂一兩炒上為細末每服五錢醋湯調空心服立效本治下血不止或成五色崩漏用香附子舂去皮毛中斷之略炒為末每服二錢清米飲調下此方徐朝奉傳其內人有是疾遍服藥不效後服此遂愈久服為佳亦治産後腹痛大是婦人仙藥常服益血調氣大煮附丸見前調經平劑一方用香附子白芷為丸縮砂散治血崩用縮砂仁不以多少於新瓦上炒香為細末米飲調下三錢上四方行滯氣消汙血世治血崩用乾荷葉濃煎湯一碗空心服之立愈或調醋炒香附末尤妙五靈脂散治婦人血崩及治男子脾積氣五靈脂不以多少炒令煙盡研末上為末每服一錢溫酒調下此藥兼能解毒及蛇蠍蜈松咬塗傷處立愈一方每服三錢水酒童便各半盞煎至八分通口服名抽刀散治産後有病服三服散惡血或心腹脅肋腳痛不可忍者或止用童子小便尤佳或中風即入草烏頭半錢同煎亦治腸風下血如不飲酒者煎烏梅柏葉湯調下如心煩口乾渴者加蒲黃炒減半一方燒存性霹靂酒下然此藥氣惡難吃燒之存性極妙一方治婦人經血不止加當歸兩片酒一盅與藥末同煎服昔親戚黃守正卿為和劑局日內子凌夫人忽苦此疾危殆百藥不效偶得此方旋服遂愈云治血崩不止五靈脂二錢炒熱加當歸酒同煎或水酒童便各半盞同煎服一方五靈脂半生半熟為末酒調服一方水煎五靈脂半乾去渣澄清再煎成膏入神麯末為丸如桐子大空心溫酒下二三十丸便止又方鹿茸醋炙當歸各二錢蒲黃半兩炒上為末溫酒調下五錢匕日三服仲桂枝茯苓丸治婦人有癥在臍上動下血不止方見胎動下血上四方消汙血補養垣當歸芍藥湯治婦人經脈漏下不止其色鮮紅時值七月處暑之間先因勞役脾胃虛弱氣短逆自汗不止身熱悶亂惡見飲食亦不思食沉困懶倦四肢無力大便時瀉後復因心氣不足其經脈再下不止惟覺氣下脫其元氣逆上全無惟覺心腹中氣不行氣短少不能言是無力以言非懶語也此藥主之黃耆一兩半白朮蒼朮泔浸去皮當歸身白芍藥各五錢甘草炙生地黃各三分柴胡二分熟地黃陳皮去白各五分上十味為粗末作二服水煎去滓熱服空心一服之後漸減次日諸證悉去頓喜飲食所以者何蓋氣通而聞飲食之香得平康故也薛一婦人面黃或赤覺腰間或臍下作痛四肢困倦煩熱不安經行先發寒熱兩肋如束血湧如崩此脾胃虧損元氣下陷與相火濕熱所致用補中益氣加防風芍藥炒黑黃柏間以歸脾湯調補而血始歸經汪石山治一婦年逾四十形色蒼紫忽病血崩醫者或用涼血或用止澀俱罔效診之六脈皆沉濡而緩按之無力乃氣病非血病也當用甘溫之劑健脾理胃使胃氣上騰血循經絡則元復崩矣遂用補中益氣湯多加參耆兼服參苓白朮散崩果愈金匱膠艾湯治勞傷血氣月水過多淋瀝漏下連日不止臍腹疼痛及妊娠將攝失宜胎動不安腹痛下墜或勞傷胞絡胞阻漏血腰痛悶亂或因損動胎上搶心奔沖短氣及因産乳衝任氣虛不能約制延引日月漸成羸瘦方見前月水不斷條薛一婦人久患血崩肢體消瘦飲食到口但聞腥臊口出津液強食少許腹中作脹此血枯之證肺肝脾胃虧損之患用八珍湯烏賊魚骨丸兼服兩月而經行百餘劑而康寧如舊矣柏子仁湯治婦人憂思過度勞傷心經不能藏血遂致崩中下血不止柏子仁炒香附子炒去毛芎藭鹿茸火燎去毛酒蒸焙茯神去皮木當歸各一錢半阿膠小草各一錢川續斷二錢甘草炙半錢上作一服水二盅生薑五片煎至一盅空心服補脾升陽垣經水漏不住有二補前人之闕婦人脾胃虛損致命門脈沉細而數疾或沉弦而洪大有力寸關脈亦然皆由脾胃有虧下陷於腎與相火相合濕熱下迫經漏不止其色紫黑如夏月腐肉之臭中有白帶者脈必弦細寒作於中有赤帶者其脈洪數病熱明矣必腰痛或臍下痛臨經欲行而先發寒熱往來兩脅急縮兼脾胃證出見或四肢困熱心煩悶不得眠臥心下急宜大補脾胃而升降氣血可一服而愈或先貴而後賤或先富而後貧病名脫營者心氣不足其火大熾旺於血脈之中又致脾胃飲食失節火乘其中形質肌肉顏色似不病者此心病也不形於脈故脾胃飲食不調其證顯矣而經水不時而下或適來適斷暴下不止治當先說惡死之言勸論令懼死而心不動以大補氣血之劑補養脾胃微加鎮墜心火之藥治其心補陰瀉陽經自止矣痿論云悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也故經曰大經空虛發則肌痹傳為脈痿此之謂也益胃升陽湯治血脫益氣古人之法也先補胃氣以助生長故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理也故先理胃氣人之一身納穀為寶黃耆二錢人參有嗽者去之神麯炒各一錢半升麻柴胡各五分白朮三錢當歸身酒浸甘草炙陳皮各一錢生黃芩二錢瀉盛暑之伏金肺逆秋涼不用一方用生地黃上為粗末每服三錢或五錢如食添再加之如食減已定三錢內更減之不可多服每服二錢水煎去滓熱服如腹痛每服加白芍藥二分中桂少許如渴口乾加乾葛二分如嗽去人參服不計時候蓋先服此益胃氣升陽湯不止卻服後方柴胡調經湯大舉大升之也升陽宣德侯經歷家人病崩漏醫莫能效切脈之後且以紙疏其證至四十餘種為制調經升陽除濕湯療之明日而十減其八前後五六日良愈調經升陽除濕湯治女子漏下惡血月事不調或暴崩不止多下水漿之物皆由飲食不節或勞傷形體或素有心氣不足因飲酒勞倦致令心火乘脾其人必怠情嗜臥四肢不收困倦乏力無氣以動氣短上氣逆急上衝其脈緩而弦急按之洪大皆中指下得之脾土受邪也脾主滋榮周身者也心主血血主脈二者受邪病皆在脈脈者血之府也脈者人之神也心不主令胞絡代之故曰心之脈主屬心系心系者胞絡命門之脈也主月事主孕皆由脾胃虛而心胞乘之故漏下血水不調也況脾胃為血氣陰陽之根蒂當除濕去熱益風氣上伸以勝其濕又云火鬱則發之柴胡防風甘草炙藁本升麻各一錢羌活蒼朮黃耆各一錢半獨活當歸酒浸各五分蔓荊子七分上㕮咀水五大盞煎至一大盞去滓稍熱服空心服藥畢待少時以早膳壓之可一服而已如灸足太陰脾經中血海穴二七壯或三七壯立已此藥乃從權衡之法用風勝濕為胃氣下陷而氣迫於下以救其血之暴崩也若病愈經血惡物已盡主病雖除後必須以黃耆甘草人參當歸之類數服以補之於補氣升陽湯中加和血藥是也若經血氣惡物下之不絶尤宜救其根源治其本經只益脾胃退心火之亢乃治其根蒂也若遇夏月白帶下脫漏不止宜用此湯一服立止柴胡調經湯治經水不止鮮血項筋急腦痛脊骨強痛不思飲食羌活獨活藁本升麻各五分蒼朮一錢柴胡根七分葛根當歸身甘草炙各三分紅花少許上㕮咀作一服水煎去滓稍熱空心服微汗立止一婦人經候黑血凝結成塊左廂有血瘕水瀉不止穀食有時一化有時不化至今歲四月血塊暴下並水注俱作是前後二陰有形之血脫竭於下既久經候尤不調水瀉日見三兩行食罷心煩不快飲食減少甚至瘦弱東垣先生曰夫聖人治病必本四時升降浮沉之理權變之宜若不本四時以順為逆非其治也且治之大法必先歲氣無伐天和無盛盛無虛虛遺人夭殃無致邪無失正絶人長命故聖人云陽盛陰虛下之則愈汗之則死陰盛陽虛汗之則愈下之則死大抵聖人立法各自有義且如升陽或發散之劑是助春夏之陽氣令其上升乃瀉秋冬收藏殞殺寒涼之氣此病是也當用此法治之乃升降浮沉之至理也夫天地之氣以升降浮沉乃從四時如治病逆之則殺人矣故經云順天者昌逆天者亡可不畏哉夫人之身亦有天地四時之氣不可止認在外人體亦同天地也今經漏不止是前陰之氣血已下脫矣水瀉又數年不愈是後陰之氣血又下陷矣後陰者主有形之物也前陰者精氣之門戶俱下竭是病人周身之氣常行秋冬之令陰主殺此等收藏之病是也陽生陰長春夏是也在人身之中令氣升浮者穀氣上行是也既病則周身血氣皆不生長穀氣又不升其肌肉消少是兩儀之氣俱將絶矣既下元二陰俱脫血氣消竭假令當日元是熱證令下焦久脫已化為寒矣此病久沉久降寒濕太勝當急救之瀉寒以熱除濕以燥大升大舉以助生長補養氣血不致偏枯聖人立治之法云濕氣大勝以所勝助之助甲風木上升是也故經云風勝濕是以所勝平之也當調和胃氣次用白朮之類以燥其濕而滋元氣如其不止後用風藥以風勝濕此之謂也此藥便是大舉大升以助春夏二濕之久陷下之至治也又一本云此病次用四物隨濕證加減大獨聖散治婦人血崩不止用防風去蘆不以多少為細末酒煮白麵清調下二錢空心食前日二服更以面作糊酒投之極驗治血崩夏枯草為細末每服二錢米飲調下無時服千治崩中不止芎藭八兩清酒五升煎至二升半分三服不耐者徐徐進之衍義云芎不可久服令人暴死上大舉大升之劑治崩脈沉弦而洪或沉細而數者皆胃氣下陷也或崩而又久瀉者亦胃氣下陷也故舉之升之其病愈也養血行氣加減四物湯治室女二七天癸至亦有當時未至而後至者亦有卒然暴下淋瀝不止至有若崩漏者失血過多變生諸證悉宜服之川芎熟地黃洗焙川當歸去蘆酒潤切焙白芍藥各一兩香附子炒去毛一兩半上㕮咀每服四錢水一盞半生薑五片煎至七分去滓食前溫服如血色鮮而不止者去熟地黃加生地黃煎服補中去積丁未年冬郭大方來說其妻經水暴崩不止先曾殞身失血自後一次經數日而來今次不止其人心窄性急多驚以豫料之他日必因心氣不足飲食失節得之大方曰容到彼診得掌中寒脈沉細而緩間而沉數九竅微不利四肢無力上喘氣短促口鼻氣皆不調果有心氣不足飲食失節脾胃虛弱之證胃脘當心而痛左脅下急縮有積當臍有動氣腹中鳴下氣大便難諸虛證極多不能盡録擬先治其本餘證可以皆去與安心定志鎮墜其驚調和脾胃大益元氣補其血脈養其心神以大熱之劑去其冬寒凝在皮膚內少加生地黃去命門相火不令四肢痿弱黃耆當歸人參湯黃耆人參麻黃不去節實表閉汗黃連鎮心驚各一錢當歸一錢半草豆蔻七分神麯消食去脾胃寒桂枝必先歲氣無伐天和也陳皮各五分杏仁九個研如泥生地黃三分去腎火大去冬月相火之旺上為粗末水三大盞先煮麻黃數沸去滓入前藥同煎至一大盞於巳午之前食消盡服之其胃脘痛乃胃上有客寒與大熱藥草豆蔻丸一十五丸其痛立止再與肝之積藥除其積之根源而愈地黃丸治足三陰虧損經行數日不止或兼帶下無子熟地黃自制山茱萸肉蕪荑仁白芍藥微炒代赭石各一兩乾薑炮白殭蠶炒厚朴薑製各三錢上為末蜜丸桐子大每服五十丸空心溫酒下日三服上虛挾積滯而崩嘗治一老婦人血崩不止流流不絶滿床皆血起床不得者三月矣腹滿如孕豫作虛挾痰積汙血治之用四物四兩參術各一兩甘草半兩以治虛香附三兩半夏一兩半茯苓陳皮枳實縮砂玄胡各一兩以破痰積汙血分二十帖每帖煎乾加荷葉側柏葉湯再煎服之服盡良愈今再不發神效涼劑素陰虛陽搏謂之崩垣涼血地黃湯治婦人血崩不止腎水陰虛不能鎮守包絡相火故血走而崩也生地黃當歸尾各半錢黃連黃柏知母藁本川芎升麻各二分紅花少許柴胡防風川羌話黃芩細辛荊芥穗蔓荊子甘草炙各一分㕮咀作一服水三盞煎至一盞去滓空心稍熱服足太陰脾之經中血海二穴在膝臏上內廉白肉際二寸中治女子漏中惡血月事不調逆氣腹脹其脈緩者是也灸三壯足少陰腎之經中陰谷二穴在膝內輔骨後大筋下小筋上按之應手屈膝取之治膝如錐不得屈伸舌縱涎流煩逆溺難少腹急引陰痛股內痛婦人漏下不止腹脹滿不得息小便黃如蠱女子如妊身可灸三壯大小薊湯治崩漏不止色明如水得溫則煩悶者此陽傷於陰令人下血當補其陰脈數疾小者順大者逆小薊莖葉研取汁生地黃研取汁各一盞白朮半兩銼上三件入水一盞煎減一半去滓溫服芎藭酒治崩中晝夜不止醫不能治芎藭一兩生地黃汁一盞上用酒五盞煮芎藭一盞去滓下地黃汁再煎二三沸分為三服治崩中去血不止大小薊根五兩白茅根三兩上二味細切用酒五升煮取四升去渣分四服丹漏下乃熱兼虛四物加黃連奇效四物湯治有熱久患血崩當歸頭尾俱用白芍藥大川芎熟地黃洗焙大艾葉阿膠蛤粉炒如珠子黃芩去黑者各半兩上銼碎每服四錢水一盞半生薑五片煎七分空心溫服有一醫療血崩往㕮咀藥鋪市藥其方則四物湯加阿膠大艾也就鋪分作八服又為鋪索黃芩半兩加入藥內鋪家亦醫者曰此藥何為加黃芩醫曰非汝所知吾與此藥正以黃芩為主夫心主血血得熱則行得寒則止病者一服而愈服至八服至今無恙又見數婦血崩者亦用此醫以黃連解毒湯加大艾治無不效者又當量其虛實用之云金華散治血室有熱崩下不止服溫藥不效者延胡索瞿麥穗當歸乾薑牡丹皮各一兩石膏二兩桂心別研威靈仙各七錢半蒲黃半兩上為細末每服三錢水一盞半空心溫服日二治崩中下血方崩中藥多是用止血藥及補血藥惟此方治陽乘陰所謂天暑地熱經水沸溢者黃芩不以多少上為細末每服一錢霹靂酒調下一方荊芥煎湯下近朝有王御醫直夜有一宮女血如山崩其時暑月藥笥中只有大順散兩帖以冷水調服旋即奏效以此知醫者要在權變也治漏下五色亦治嘔血令人黃瘦虛弱上用地榆三兩銼碎以醋一升煮十餘沸去滓食前稍熱服一合本草注云地榆主帶下十二病一曰多赤二曰多白三曰月水不通四曰陰蝕五曰子臟堅六曰子門澼七曰合陰陽患痛八曰小腹寒痛九曰子門閉十曰子宮冷十一曰夢與鬼交十二曰五臟不定一方竹葉水煎服代茶甚解熱丹經水多去不能住以三補丸加莎根龜板金毛狗脊三補丸者芩連柏也子和孟官人母年五十餘血崩一載僉用澤蘭丸黑神散保安丸白薇散補之不效戴人見之曰天癸已盡本不當下血蓋血得熱而流散非寒也夫女子血崩多因大悲哭悲甚則肺葉布心系為之急血不禁而下崩內經曰陰虛陽搏謂之崩陰脈不足陽脈有餘數則內崩血乃下流舉世以虛損治之莫有知其非者可服大劑大劑者黃連解毒湯是也次以香附二兩炒白芍藥二兩焙當歸二兩焙三味同為細末水調下又服擯榔丸不旬日而安西園公治一婦人年六十二歲血崩不止投黃連解毒湯四帖後服涼膈散合四物六帖即愈此婦因悲哀太過則心悶急肺布葉舉而上焦不通熱氣在中血走而崩故效薛一婦人年將七十素有肝脾之證每作則飲食不進或胸膈不利或中脘作痛或大便作瀉或小便不利余用逍遙散加山梔茯神遠志木香而愈後憂女孀居不時吐紫血其病每作先倦怠而後發熱經曰積憂傷肺積思傷脾肺布葉舉是令子母俱病不能攝血歸經而致前證遂以前藥加炒黑黃連三分吳茱萸二分頓愈復因怒吐赤血甚多躁渴垂死此血脫也法當補氣乃用人參一兩苓朮當歸各三錢陳皮炮黑乾薑各二錢炙草木香各一錢一劑頓止一婦人年六十四久鬱怒頭痛寒熱春間乳內時痛服流氣飲之類益甚不時有血如經行又大驚恐飲食不進夜寐不寧乳腫及兩脅焮痛如炙午後色赤余以為肝脾鬱火血燥先以逍遙散加酒炒黑龍膽一錢山梔一錢半二劑腫痛頓退又二劑而全消再用歸脾加炒梔貝母諸證悉愈一婦人因怒崩血久不已面青黃而或赤此肝木製脾土而血虛也用小柴胡合四物以清肝火生肝血又用歸脾補中二湯以益脾氣生肝血而瘥此證若因肝經有風熱而血不寧者用防風一味為丸以兼證之藥煎送或肝經火動而血不寧者用條芩炒為丸以兼證之藥煎送無有不效一婦人性急每怒非太陽耳項喉齒胸乳作痛則胸滿吞酸吐瀉少食經行不止此皆肝火之證肝自病則外證見土受克則內證作若自病見用四物加白朮茯苓柴胡炒梔炒龍膽若內證作用四君子加柴胡芍藥神麯吳茱萸炒過黃連諸證漸愈惟月經不止是血分有熱脾氣尚虛以逍遙散倍用白朮茯苓陳皮又以補中益氣加酒炒芍藥兼服而調溫劑垣丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所得經隔少時其脈兩尺俱弦緊而洪按之無力其證自覺臍下如冰求厚衣被以御其寒白帶白滑之物雖多間下如屋漏水下時有鮮血不多右尺脈時微洪屋漏水多暴下者是急弦脈為寒多而洪脈時見乃熱少合而言之急弦者北方寒水多也洪脈時出者命門包絡之火也黑物多赤物少合成屋漏水之狀也川芎丁香各四分熟地黃以瀉大洪脈白芍藥各三分阿膠炒六分另後入當歸身一錢二分生艾葉一錢後入為細末作一服水二盞煎至五沸去滓入膠艾再上火煎至一大盞空心宿食消盡帶熱服三服效大治血崩熟艾如雞子大阿膠半兩乾薑一錢上粗末用水五盞先煎艾葉姜至二盞半入膠消溫分二服空心服芎藭湯一名芎藭溫中湯治帶下漏血不止及風虛冷熱勞損衝任月水不調崩中暴下腰重裡急淋瀝不斷及産後失血過多虛羸腹痛或妊娠胎動不安下血連日小便頻數肢體煩倦頭運目暗不欲飲食芎藭黃耆芍藥乾地黃吳茱萸甘草各二兩當歸乾薑各一兩上㕮咀以水一斗煮取三升分三服若月經後因有赤白不止者除地黃茱萸加杜仲人參各二兩斷下湯治衝任氣虛崩中漏下經脈不調每遇月候將來臍腹腰腳先痛漸減飲食四肢乏力及帶下三十六疾悉能療之人參去蘆熟地黃洗焙艾葉醋炒各一兩烏賊骨燒灰當歸酒洗各二兩川芎七錢乾薑炮半兩阿膠蛤粉炒成珠七錢半上㕮咀每服五錢水一盞半煎至七分去滓食前溫服治崩漏方四物湯一兩人參二錢吳茱萸一錢上銼碎每服半兩薑棗煎服食前五六服寒熱腹痛皆退崩漏未止續服後熟附丸熟附丸熟附子木賊去節龍骨煅赤石脂煅各半兩川芎當歸各一兩上為細末醋糊為丸如梧子大每服五六十丸食前米飲下一婦人年五十以上經斷七年忽然經行遂成崩漏發熱腹痛兩月不瘥豫診其脈虛細疾數豫曰此乃陰虛而致宜服此藥鹿茸丸治經候過多其色瘀黑甚者崩下吸吸少氣臍腹冷極則汗出如雨尺脈微小由衝任虛衰為風冷客乘胞中氣不能固可灸關元百壯在臍下正中三寸鹿茸燎去毛酥炙赤石脂制禹餘糧制各一兩艾葉一方無柏葉附子炮各半兩熟地黃當歸續斷各二兩上為細末酒糊和丸梧子大每服三十丸空心溫酒下一方煉蜜丸亦可赤龍丹治崩中不止禹餘糧炒烏賊骨鹿茸龍骨石燕煅阿膠當歸乾薑各等分上為末酒醋糊為丸每服五十丸溫酒下紫金散治月水過多崩漏帶下淋瀝不斷腰腹重痛一切五色帶疾禹餘糧煅赤醋淬七次細研水飛浥干稱三兩白芍藥川芎熟地黃附子當歸各一兩乾薑炮肉桂各半兩赤石脂龍骨各煅並一兩別研上為細末每服二錢入麝香少許米飲空心調下白芷暖宮丸暖血海實衝任治子宮虛弱風寒客滯斷緒不成孕育及數墜胎或帶下赤白漏下五色虛眩少氣胸腹滿痛心下煩悸自汗下血過多禹餘糧制一兩乾薑炮芍藥白芷川椒制阿膠粉炒艾葉制川芎各七錢半上為細末蜜丸梧子大每服四十丸米飲溫酒醋湯任下和劑震靈丹治崩中下血不止或脈虛細手足或冷以芎歸湯加木香煎送下或陳皮香附子煎湯下三丸或靈砂丹亦可兼治暴驚風九竅出血獨參湯下方見雜病泄瀉門又方治崩中不止丁香二兩為細末用酒三升煮取一升空心頓服必效方用丁香百顆酒煎服又方益智炒為細末鹽米飲調下和劑暖宮丸內補當歸丸熟乾地黃丸濟陰丹禹餘糧丸內灸散皺血丸紫石英丸上諸方並治崩中帶漏並見前通治門及調經門薛表弟方健甫內五十歲辛丑患血崩諸藥罔效壬寅八月身熱體痛頭暈涕出吐痰少食衆作火治展轉發熱絶粒數日余診之曰脾胃久虛過服寒藥中病未已寒病復起遂用八味丸料一服翌早遂索粥數匙再服食倍熱減痛止乃服八味丸而愈癸卯秋因勞役憂怒甲辰夏病復作胸飽發熱脊痛腰疼神氣怫鬱或作內傷或作中暑崩血便血煩渴引飲粒米不進昏憒時作脈洪大按之微弱此無根之火內虛寒而外假熱也以十全大補加附子一劑遂食粥三四匙崩血漸減日服八味丸始得全愈大尹王天成之內久患崩自服四物涼血之劑或作或輟因怒發熱其血不止服前藥不應乃主降火更加腹脅大痛手足俱冷余曰此脾胃虛寒所致先用附子理中湯體熱痛止又用濟生歸脾補中益氣二湯崩血頓愈若泥痛無補法則誤矣錦衣楊永興之內患前證過服寒涼之劑其證益甚更加肚腹痞悶飲食不入發熱煩躁脈洪大而虛余曰此脾經氣血虛而發躁也當急用八珍湯加炮姜以溫補之緩則不救不信乃服止血降火之劑虛證蜂起始信余言緩不及治矣澀劑大治崩中下血不止小腹痛芍藥一兩炒黃柏葉六兩微炒丹溪云柏葉性多燥上用水一升煎取六合入酒五合煎取七合空心分為二服一方為細末酒調二錢一方有鹿角膠等分酒調治白帶臍腹痛世牡蠣散治月水不止衆藥不愈者牡蠣火煅研細用醋調成丸再煅過通紅候冷研細出火毒卻用醋調艾末熬成膏和丸如桐子大每服五十丸醋艾湯下燥劑云柏黃散療經血不止黃芩一兩二錢半側柏葉蒲黃各一兩伏龍肝二兩上㕮咀水二升煎取八合分為二服又方治患崩中不止結作血片如雞肝色碎爛芎藭十二分阿膠青竹茹各八分續斷地榆小薊根各三分當歸六分生地黃伏龍肝各十一分上用水九盞煮取三盞去滓分三服衍治婦人血露蠶砂一兩炒伏龍肝半兩阿膠一兩同為末溫酒調空心二三錢以知為度大全名無比散無阿膠羅伏龍肝散治氣血勞傷衝任脈虛經云非時忽然崩下或如豆汁或成血片或五色相雜或赤白相兼臍腹冷痛經久未止令人黃瘦口乾飲食減少四肢無力虛煩驚悸伏龍肝一兩甘草半兩赤石脂一兩芎藭三兩肉桂半兩熟地黃艾葉微炒各二兩當歸乾薑各七錢半麥門冬去心一兩半上為粗末每服四錢棗一枚水同煎地榆散治婦人崩中漏下不止地榆銼蒲黃白芍藥白茯苓柏葉微炒蟹爪微炒熟地黃鹿角膠搗碎炒令黃燥漏蘆各一兩芎藭當歸銼炒各七錢半伏龍肝一兩半乾薑炮桂心甘草銼炙赤各半兩上銼碎每服三錢水一中盞入竹茹一分煎至七分去滓食前溫服上五方伏龍肝例蓋燥可去濕也前二方去濕熱後二方去寒濕按伏龍肝為止血之聖藥先賢治崩用旋覆花半夏治膈間濕痰而崩止者亦此意補澀鹿茸散治崩中漏下不止虛損羸瘦鹿茸二兩去毛塗酥炙微黃白龍骨鱉甲塗酥炙令黃去裙熟地黃白芍藥白石脂烏賊魚骨炙黃續斷各一兩肉蓯蓉一兩半酒浸一宿刮去皺皮炙乾上為細末每服二錢食前粥飲調下柏葉散治婦人崩中漏下不問年月遠近漸至黃瘦四肢無力腹內疼痛不思飲食柏葉續斷川芎生地黃當歸龜甲鱉甲各一兩半禹餘糧二兩半阿膠牡蠣地榆赤石脂艾葉鹿茸各一兩上為細末每服二錢食前粥飲調下一方有丹參加鹿茸煉蜜和丸如梧子大每服三四十丸空心用溫酒送下或醋湯亦可補宮丸治婦人諸虛不足久不妊娠骨熱形羸崩中帶下白薇牡蠣白芍藥鹿角霜山藥白朮白茯苓烏賊魚骨白芷各等分上為細末麵糊和丸如梧子大每服五十丸空心用米飲送下鎮宮丸治婦人崩漏不止或下五色或赤白不定或如豆汁或狀如豚肝或下瘀血臍腹脹痛頭暈眼花久而不止令人黃瘦口乾胸煩不食代赭石火煅醋淬紫石英禹餘糧制並同上香附子醋煮各二兩陽起石火鍛細研鹿茸燎去毛醋蒸焙茯神去皮木阿膠銼碎蛤粉炒成珠當歸去蘆酒浸蒲黃炒芎藭各一兩血竭半兩別研上為細末用艾煎醋汁煮糯米粉糊丸如梧子大每服七十丸空心米飲下血見黑則止治暴崩下血京墨為末二錢匕同燒露蜂房為末三指撮酒調服又方百草霜二錢狗膽汁拌定分作二服當歸酒調下世治血崩用葫蘆去子穰實荊芥穗燒存性飲湯調服治室女血崩不以冷熱皆可服荊芥蓮房殼各等分各燒灰存性上為細末每服二錢空心米飲調下十灰丸治崩中下血不止錦灰黃絹灰馬尾灰艾葉灰藕節灰蓮房灰油發灰赤松皮灰棕櫚灰蒲黃灰各等分上研勻用醋煮糯米糊和丸如梧子大每服七十丸加至一百丸空心米飲送下十灰散治下血不止錦片木賊棕櫚柏葉艾葉乾漆鯽魚鱗鯉魚鱗血餘當歸以上逐味火化存性各等分研末麝香少許研上研勻每服二錢空心溫酒調服一笑散治婦人血崩上用新綿一口燒灰研末空心酒調下立止治婦人經年血崩香附子二兩炒赤蓮殼五枚燒存性上為細末每服二錢空心陳米飲調下世香礬散治血崩香附子不以多少極酸醋浸一宿炒焦為灰存性每一兩入白礬末二錢米飲調服空心神效一法用荷葉湯尤妙大用香附子去毛炒焦黑存性為細末用極熱酒調下二錢放溫服不過兩服立愈昏迷甚者三錢匕如血山崩不止者亦能解之米飲調亦可許學士云治下血不止或成五色崩漏香附子是婦人仙藥也砂仁不以多少新瓦上炒黑為末米飲調一方益智仁炒黑為末鹽米飲調下世婦人血崩不止用檳榔燒灰存性碾末以溫酒調下甚妙大五靈脂散治婦人血崩諸藥不止者五靈脂炒令煙盡為末每服一錢溫酒調下一法每服一錢水酒童便各半盞煎服名抽刀散琥珀散治崩暴不止赤芍藥香附子枯荷葉男子發皂莢水洗當歸棕櫚炒焦存性烏紗帽是漆紗頭巾取陽氣上衝故也上等分除棕櫚外其餘並用粗片新瓦上煅成黑灰存性三分為細末每服五錢空心童便調下如人行十里再一服七八服即止若産後血去多加米醋京墨麝香少許一法先以五積散加醋煎投一二服次服五靈脂散衍黃牛角腮用尖燒為黑灰微存性治婦人血崩大便血及冷痢白痢大治漏下不止者鹿角燒灰細研食前溫酒調下二錢又方桃仁燒灰研細食前溫酒調下二錢又方乳發皂角水洗淨燒為細末空心溫酒調二錢世治血久崩夏枯草燒存性為末空心米飲調下此用灰與前用草不同大荊芥散治婦人崩中不止用好麻油點燈多著燈心就上燒荊芥焦色為細末每服三錢童便調下簡治婦人漏下血不絶槐花鵝不以多少燒作灰細研食前溫酒調二錢匕産寶治崩中不止不問年月遠近用槐耳燒作灰為末以酒服方寸匕大神應散治血崩不止桂心不以多少炒極焦存性為末每服一二錢米飲調下楊氏家藏黑金散治婦人血氣虛損經候不調崩中漏下鯉魚皮黃牛角腮棕櫚皮破故紙乳發各一兩烏賊魚骨熟地黃乾薑炮當歸洗焙木賊各半兩上銼拌入瓷瓶內鹽泥固濟候乾炭火五斤煅通赤煙盡埋土內令冷取研細每三錢入麝少許米飲空心調下如聖散治血山崩棕櫚烏梅肉各一兩乾薑一兩五錢並燒存性上為細末每服二錢烏梅酒調下空心食前服久患不過三服愈治血崩屢效方當歸白芍藥乾薑棕櫚各等分上各煅存性研為細末醋調以有節朱箸左攪四十九轉食前服又方用棕櫚白礬煅為末酒調二錢服烏金散治血崩不止棕櫚毛燒存性一兩龍骨煅過二錢上為細末研勻每三錢空心好酒調服二服立止梅飲子治婦人血崩上以鹽白梅燒灰存性為末空心米飲調下治婦人血崩方上用烏梅燒灰研末以烏梅湯調下酒調亦可又方烏梅肥大者半斤以酸醋浸經一宿取出去核研為膏百草霜研細上搗和丸如梧桐子大每服三四十丸空心以淡醋湯送下日進一服上三十二方皆燒灰黑藥經云北方黑色入通於腎皆通腎經之藥也夫血者心之色也血見黑即止者由腎水能制心火故也海治崩不定或淋淫經年者白礬溶開成汁一兩沒藥一錢硇砂黃丹各五分上件將白礬溶開成汁下余藥細末一處攪勻就成丸子如彈子大每用一丸新綿裹納陰中立效運氣運氣血崩皆屬風火經云少陽司天之政初之氣風勝乃搖候乃大溫其病血崩是也針灸摘經血過多不止並崩中心術同三陰交行間各針訖灸之通里足小指上二寸刺二分灸二七壯桑漏下不止心術摘英同三陰交太衝東胞門不閉漏下惡血不禁氣門在關元傍三寸刺入五分集血崩並漏下中極補子宮二寸半敗血不止三陰交百勞風門中極腎俞膏肓曲池絶骨甲婦人不字陰暴出經水漏然谷主之婦人漏血腹脹滿不得息小便黃陰谷主之千金云漏血少腹滿如阻體寒熱腹偏腫女子血不通會陰主之女子漏血太衝主之脈問曰五崩何等類師曰白崩者形如涕赤崩者形如絳黃崩者形如爛瓜青崩者形如藍色黑崩者形如衃血也寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名曰革婦人則半産漏下又見諸見血仲寸口脈微而緩微者衛氣疏疏則其膚空緩者胃弱不實則谷消而水化也谷入於胃脈道乃行水入於經其血乃成榮盛則其膚必疏三焦絶經名曰血崩脈診婦人漏下赤白日下血數升脈急疾者死遲者生診婦人漏下赤白不止脈小虛滑者生大緊實數者死尺寸脈虛者漏血脈浮者俱不治峻實其下亦有得全者良婦人衝任二脈為經脈之海外循經絡內榮臟腑若陰陽和平經下依時若勞傷不能約制則忽然暴下甚則昏悶若寸脈微遲為寒在上焦則吐血衄血尺脈微遲為寒在下焦則崩血便血大抵數小為順洪大為逆大法當調補脾胃為主殺血心痛良婦人血崩而心痛甚名曰殺血心痛由心脾血虛也若小産去血過多而心痛甚者亦然用烏賊魚骨炒為末醋湯調下失笑散亦效薛前證若陰血耗散用烏賊丸收斂之若瘀血不散用失笑散行散之若心血虛弱用芎歸湯補養之若鬱結傷血用歸脾湯調補之一婦人血崩兼心痛三年矣諸藥不應每痛甚虛證悉具面色痿黃余曰心主血蓋由去血過多心無所養以致作痛宜用十全大補湯參術倍之三十餘劑稍愈百餘劑全愈赤白帶下嚴巢氏病源論婦人有三十六疾者七癥八瘕九痛十二帶下也而帶下不顯其證今人唯知赤白二帶耳此由勞傷衝任風冷據於胞絡婦人平居血欲常多氣欲常少百疾不生或氣倍於血氣倍生寒血不化赤遂成白帶若氣平血少血少生熱血不化經遂成赤帶寒熱交併則赤白俱下其脈右手尺浮浮為陽陽絶者無子若足冷帶下輕則漏下甚則崩中皆心不榮血肝不藏血所致其脈寸口弦而大弦則為減大則為芤減為寒芤為虛寒虛相搏其脈為革主半産漏下又尺寸脈虛者漏血漏血脈浮者不可治産寶帶下三十六疾者是十二癥九痛七害五傷三固謂之三十六疾也十二癥者是所下之物一者如膏二者如青血三如紫汁四如赤皮五如膿痂六如豆汁七如葵羹八如凝血九如清血似水十如米泔十一如月浣十二如經度不應期也九痛者一陰中痛二陰中淋痛三小便痛四寒冷痛五月來時腹痛六氣滿來時足痛七汗出陰中如蟲齒痛八脅下皮痛九腰痛七害者一害食二害氣三害冷四害勞五害房六害妊七害睡五傷者一竅孔痛二寒冷痛三小腹痛四臟不仁五子門不正引背痛三固者月水閉塞不通其餘二者文缺不載而仲景所說三十六種疾皆由子臟冷熱勞損而夾下起於陰內也丹赤白帶羅先生法或十棗湯方見傷寒脅滿病或神佑丸方見雜病痰飲或玉燭散即四物加調胃承氣皆可用之虛者不可峻攻實者可行血虛加減四物湯氣虛以朮參陳皮間與之赤屬血白屬氣主治燥濕為先濕甚者固腸丸方見後相火動者諸藥中加炒柏滑者加龍骨赤石脂滯者加葵花白者治白帶赤者治赤帶性躁者加黃連寒月少加薑附臨機應變先須斷厚味帶下與夢遺同法治之肥人有帶多是濕痰用海石半夏南星炒柏青黛蒼朮川芎瘦人帶病少如有多是熱用炒柏蛤粉滑石川芎青黛樗皮帶漏俱是胃中痰積流下滲膀胱出於大腸小腸宜升提甚者上必用吐以提其氣下用二陳湯加白朮蒼朮仍用丸子戴赤白帶下皆因七情內傷或下元虛冷感非一端大率下白帶多間有下赤者並宜順氣散吞震靈丹仍佐艾附丸或米飲調沙參末帶下不止成尩羸者四物湯加煅牡蠣粉半錢吞固陽丸多服取效固陽丸方見雜病遺精門有帶疾愈後一二月或再發半年一發先血而後下帶來不可遏停蓄未幾又復傾瀉此名漏帶最為難治下截之血小腹主之有因血虛而虛熱陷入小腸致小便澀痛色白如泔或成沙粒皆不可作淋治用冷劑宜以四物湯五苓飲各半帖和煎良婦人帶下其名有五因經行産後風邪入胞門傳於臟腑而致之若傷足厥陰肝經色如青泥傷手少陰心經色如紅津傷手太陰肺經形如白涕傷足太陰脾經黃如爛瓜傷足少陰腎經黑如衃血人有帶脈橫於腰間如束帶之狀病生於此故名為帶薛徐用誠先生云前證白屬氣而赤屬血東垣先生云血崩久則亡陽故白滑之物下流未必全拘於帶脈亦有濕痰流注下焦或腎肝陰淫之濕勝或因驚恐而木乘土位濁液下流或思慕為筋痿戴人以六脈滑大有力用宣導之法此瀉其實也東垣以脈微細沉緊或洪大而虛用補陽調經乃兼責其虛也丹溪用海石南星椿根皮之類乃治其濕痰也竊謂前證皆當壯脾胃升陽氣為主佐以各經見證之藥色青者屬肝用小柴胡加山梔防風濕熱壅滯小便赤澀用龍膽瀉肝湯肝血不足或燥熱風熱用六味丸色赤者屬心用小柴胡加黃連山梔當歸思慮過傷用妙香散等藥色白者屬肺用補中益氣加山梔色黃者屬脾用六君子加山梔柴胡不應用歸脾湯色黑者屬腎用六味丸氣血俱虛八珍湯陽氣下陷補中益氣湯濕痰下注前湯加茯苓半夏蒼朮黃柏氣虛痰飲下注四七湯送六味丸不可拘肥人多痰瘦人多火而以燥濕瀉火之藥輕治之也潔治帶下少腹冤結而痛者先以十棗湯下之次服苦楝丸大玄胡散調之是先攻後補之法也治結痰白帶以小胃丹半飢半飽津液下數丸候鬱積行欲服補藥白朮一兩蒼朮半兩紅白葵花二錢半白芍藥七錢半上蒸餅為丸空心煎四物湯下二十丸陶遵道外姑年七十形瘦善啖白帶食前薑湯吞大補丸五十丸一二次午膳後及臨臥時各與小胃丹十五丸愈子和頃頓丘一婦人病帶下連綿不絶白物或來已三載矣命豫脈之診其兩手脈俱滑大而有力得六七至常上熱口乾眩暈時嘔酢水余知其實有寒痰在胸中以瓜蒂散吐出冷痰二三升皆酢水也間如黃涎狀如爛膠次以漿粥養其胃氣又次用導水禹攻以瀉其下然後以淡劑滲泄之藥利其水道不數日而愈息城李左衙之妻病白帶如水窈漏中綿綿不絶臭穢之氣不可近面黃食減已三年矣諸醫皆云積冷陽起石硫黃薑附之藥重重燥補汙水轉多戴人斷之曰此帶濁水本熱乘太陽經其寒水不禁固故如此也夫水自高而趨下宜先絶其上源乃湧痰二三升次日下沃水斗余行三遍汗出周身至明旦病人云汙已不下矣次用寒涼之劑服及半載産一男燥劑有濕痰而弱不禁攻者燥之熱濕宜涼燥寒濕宜溫燥樗皮丸治赤白帶有濕熱者芍藥五錢良薑三錢燒灰黃柏二錢各炒成灰椿根皮一兩半上為末粥丸每服三五十丸空心米飲吞下赤白帶因濕熱勝而下者蒼朮鹽炒白芍藥各一兩枳殼三錢椿根皮炒二兩乾薑煨二兩地榆半兩甘草三錢滑石一兩炒為末粥丸米飲下治帶下椿根皮二兩神麯炒麥皮曲炒黃柏炒各一兩芍藥一兩半滑石枳殼各半兩蒼朮一兩上為末糊丸桐子大每服五十丸空心下固腸丸治濕氣下利大便血白帶去脾胃陳積之後用此以燥下濕亦不曾單用看病作湯使椿根皮為末粥糊為丸此藥性涼而燥須炒用一方加滑石一半治白帶因七情所傷脈數者黃連炒側柏葉酒蒸黃柏炒各半兩香附子醋炒白朮炒各一兩白芷燒存性木香各三錢椿根皮二兩炒白芍藥一兩上為末飯粥為丸米飲湯送下上五方治帶椿皮例涼燥之劑濕熱盛者宜之後一方有黃連香附木香故可治七情所傷大乳香散治赤白帶下草果一枚去皮入麝香一小塊用麵餅裹火炮焦黃留性取出和麵用之上為細末每服二錢陳皮飲調下重者三錢丹帶下不止用椒目白芷治白帶用椒目為末米飲調服治帶下方上用雲母粉溫水調下三錢立見神效伏龍肝散治赤白帶下久患不瘥尩悴乏力六脈微濡棕櫚不拘多少燒赤急以盆蓋蔭冷存性伏龍肝於灶直下去取赤土炒令煙盡屋梁上懸塵炒令煙盡出火毒上等分研勻入腦麝各少許每服三錢溫酒或淡醋湯下患十年者半月可安馬蹄丸治白漏不絶白馬蹄禹餘糧各四兩龍骨三兩烏賊魚骨白殭蠶赤石脂各二兩上為細末煉蜜和丸如梧桐子大每服十丸空心酒送下不止加三十丸又方治白帶用白芷以石灰炒去皮茜草少許粥糊丸服大白芷散治赤白帶下白芷二兩海螵蛸二個煅胎髮一團煅上為細末空心溫酒調下二錢丹赤白帶用生狗頭骨燒灰存性酒調服或入藥服潤劑帶下久而枯涸者濡之凡大補氣血皆所以濡之如以四物湯為末煉蜜丸梧子大空心米飲下三四十丸以療年高婦人白帶良驗皆潤劑也以另有補劑故止著葵花郁李仁之例於此條耳補經固真湯白文舉正室白帶常漏久矣服諸藥不效診得心胞尺脈極微其白帶流而不止叔和脈經云崩中日久為白帶漏下多時骨水枯言崩中者始病血崩不已久下則血少復亡其陽故白滑之物下流不止是本經血海將枯津液復亡枯乾不能滋養筋骨以本經行經藥為引用為使以大辛甘油膩之藥潤其枯燥而滋溢津液以大辛熱之氣味補其陽道生其血脈以苦寒之藥泄其肺而救其上熱傷氣以人參補之以微苦溫之藥佐而益元氣名曰補經固真湯人參二錢橘皮不去白半錢乾薑末二錢白葵花十六朵去萼碎柴胡甘草炙郁李仁去皮尖研生黃芩各一錢另銼上除黃芩外以水三大盞煎至一盞七分再入黃芩同煎至一盞去滓空心帶熱服候少時以早膳壓之補真潤腸湯治白帶下陰戶中痛控心而急痛身黃皮緩身重如山陰中如冰一名助陽湯柴胡一錢二分良薑二錢白葵花七朵防風郁李仁乾薑甘草各一錢陳皮生黃芩各五分上為細末銼散只作一服水二盞煎至一盞去滓食前熱服上葵花郁李仁之滑以潤燥蓋枯涸滯著者宜之補劑脈微食少及久病曾經攻下者俱作虛治有熱用涼補無熱用溫補丹治白帶龜板炙枳子各二兩黃柏一兩炒白芍藥七錢半乾薑炒二錢半香附子山茱萸苦參樗皮貝母各半兩上為末以酒糊為丸空心米飲下治赤白帶龜板二兩塗酒炙黃柏一兩炒乾薑炒一錢枳子二錢半上為末酒糊為丸日二服每服七十丸又方治帶下脈數者枸杞根一斤生地黃五兩上二味以水一斗煮取五升分三服上三方治帶龜板黃柏地黃例腎水真陰虛者宜之丹胡安人白帶下月經甚多食少倦怠面黃經中有如血塊者有如筋膜者與參術等補血氣調脾胃後諸證皆退惟帶未止以樗皮丸主之方見前上法治帶下虛而有熱者若虛而有寒脈微面白不澤無力以言者東垣補經固真湯丁香膠艾湯香桂六合湯是也溫補白蘞丸濟生治室女衝任虛寒帶下純白鹿茸酒蒸焙二兩白蘞狗脊燎毛制各一兩上為細末艾煎醋汁打糯米糊丸如梧子大每服五十丸空心溫酒送下當歸煎治赤白帶下腹內疼痛不欲飲食日漸羸瘦當歸酒浸赤芍藥牡蠣火煅取粉熟地黃酒蒸焙阿膠白芍藥續斷酒浸各一兩地榆半兩上為末醋糊丸如梧子大每五十丸空心米飲下韓山妻年三十餘十八胎九殞八夭會先君松潘難作賤兄弟皆西奔妻驚憂過甚遂昏昏不省人事口唇舌皆瘡或至封喉下部虛脫白帶如注如此四十餘日或時少醒至欲自縊自悲不能堪醫或投涼劑解其上則下部疾愈甚或投熱劑及以湯藥熏蒸其下則熱暈欲絶四弟還脈之始知為亡陽證也大哭曰宗嗣未立幾誤殺吾嫂急以鹽煮大附子九錢為君制以薄荷防風佐以薑桂芎歸之屬水煎入井冰冷與之未盡劑鼾鼻熟睡通宵覺即能識人時止一嗣子二女相抱痛哭疏戚皆悲執友趙憲長驚曰君何術也弟曰方書有之假對假真對真爾上乃假熱故以假冷之藥從之下乃真冷故以真熱之藥反之斯上下和而病解矣繼後主以女金丹錯綜以二三方不但去其疾且調治元氣庚午生一子今應襲也壬申生一子去年又患瘧疾十三月亦主以養元氣調生氣待飲食大進然後劫以毒藥吐下塊物甚多投以附子湯三錢而愈不責效旦暮間其用女金丹即勝金丸也得之異人倍加香附而視氣血之偏者又加薑黃條芩倍川芎之屬取效甚多豫念無子者往往有之翻思豫得子之難其苦何如乃次第録其方並女金丹以濟人云雪翁識女金丹方見求子門薛一孀婦腹脹脅痛內熱晡熱月經不調肢體痠麻不時吐痰或用清氣化痰喉間不利帶下青黃腹脅膨脹又用行氣之劑胸膈不利肢體如麻此乃鬱怒傷損肝脾朝用歸脾湯以解脾郁生脾氣夕用加味逍遙散以生肝血清肝火百餘劑而愈一婦人久瘧兼帶發熱口乾體倦用七味白朮散加麥門五味大劑煎與恣飲再發稍可乃用補中益氣加茯苓半夏十餘劑而愈一婦人頭暈吐痰胸滿氣喘得食稍緩苦於白帶二十餘年矣諸藥不應此氣虛而痰飲也痰飲愈而帶自愈遂朝用六君子湯夕用六味地黃丸不月而驗一婦人耳鳴胸痞內熱口乾喉中若有一核吞吐不利月經不調兼之帶下余以為肝脾鬱結用歸脾湯加半夏山梔升麻柴胡間以四七湯下白丸子而愈一婦人吞酸飽滿食少便泄月經不調服清氣化痰丸兩膝漸腫寒熱往來帶下黃白面痿體倦此脾胃俱虛濕痰下注用補中益氣倍用參術加茯苓半夏炮姜而愈一婦人帶下四肢無力余曰四肢者土也此脾胃虛弱濕痰下注以補中益氣濟生歸脾二藥治之而愈一婦人帶下黃白怒則胸隔不利飲食少思或用消導利氣之藥痰喘胸滿大便下血余曰此因脾氣虧損不能攝血歸源用補中益氣加茯苓半夏炮姜四劑頓減又用八珍加柴胡山梔而痊補澀溫牡蠣散治帶下兼經水過多或暴下片血不限年月遠近牡蠣龍骨赤石脂肉蓯蓉酒浸切焙石斛去根烏賊骨去甲黃耆銼各一兩半牛角腮灰阿膠炒燥熟地黃焙芍藥炒各二兩乾薑炮當歸切焙人參白朮桑耳各一兩二錢半桂去粗皮芎藭附子炮去皮臍艾葉炒各一兩上為細末每服三錢平旦米飲調服日再茯苓散治婦人血傷兼帶下積久不止面黃體瘦漸成虛勞腰腳沉重胎氣多損白茯苓去黑皮木香熟地黃焙訶黎勒皮柏子仁研杜仲去粗皮炙青橘皮去白焙烏賊魚骨去甲五加皮銼艾葉燒灰菖蒲牛角腮灰秦艽去苗土赤石脂菟絲子酒浸另搗當歸切焙各一兩上為細末每服二錢溫酒調下糯米飲亦得或有胎息用鯉魚糯米粥下藥卷柏丸治婦人室女腹臟冷熱相攻心腹絞痛腰腿疼赤白帶下面色痿黃四肢羸乏卷柏醋炙鹿茸醋炙白石脂赤石脂各火煅醋淬七次芎藭艾葉醋炒桑寄生代赭石火煅醋淬七次鱉甲醋炙當歸去蘆酒浸炒地榆各一兩木香不見火龍骨各半兩乾薑炮七錢半黃耆去蘆蜜炙熟地黃洗各一兩半上為細末醋煮糯米糊和丸如梧桐子大每服七十丸空心米飲送下艾煎丸百一治婦人一切虛寒胎前産後赤白帶下或成血瘕久服此藥自然融化伏道艾揉去塵土擇淨枝梗取葉稱五兩先用大肥淮棗一十二兩砂瓶內煮爛去核同艾葉一處捶爛如泥捻作薄餅子猛火焙乾乘熱急碾為末大漢椒去目枝梗及合口者淨稱五兩以阿膠二兩米醋三升同椒於砂瓶內煮極干取出焙乾燥碾為細末當歸去蘆酒浸白芍藥川芎白薇附子大者炮去皮臍卷柏取青葉澤蘭去枝粳取葉以上各焙乾稱用熟地黃如鋪上買者須淨洗漉去浮者曬乾酒浸蒸曬再入酒浸蒸五七次如糖煎香美方可用亦焙乾稱各一兩上同為細末與前艾末椒末拌勻米醋煮糊和丸如梧桐子大每服五七十丸至百丸二百丸空心艾醋湯送下一婦人因産後虛寒嘔惡不食腹痛如割時作寒熱復出盜汗瘦悴骨立臍腹之左結成硬塊其大如掌冰冷雖盛暑此處獨無汗每塊微動則痛不可忍百藥治不效夢中忽有人授以此方因服之噁心寒熱盜汗輒止盡一料遂平復獨血塊如故服至五六料其塊自融化而出如魚凍沉香牡丹丸治婦人血海久虛經候不利赤白帶下血氣衝心多發刺痛四肢煩困沉香七錢半牡丹皮去心赤芍藥吳茱萸湯泡去苦炒當歸桂心川芎黃耆去蘆蜜炙人參茯苓山藥川巴戟去心白朮橘紅木香乾生薑白龍骨牛膝去苗酒洗枳殼去穰麩炒肉豆蔻厚朴制各半兩上為細末煉蜜和丸如梧桐子大每服二十丸空心溫酒下若心腹痛白芷煎酒下紫桂丸補益血海治衝任氣虛經脈不調腰痛腹痛冷滯崩漏禹餘糧火煅醋淬七次三兩龍骨艾葉醋炒赤石脂牡蠣煅地榆各二兩牡丹皮厚朴當歸阿膠蛤粉炒成珠子吳茱萸湯洗香白芷肉桂去粗皮各一兩附子炮半兩上為末麵糊為丸梧桐子大每服三十丸濃煎醋湯下澀劑固真丸治白帶久下不止臍腹冷痛其寒捫之如冰陰中亦然目中溜火上壅視物䀮䀮無所見齒皆惡熱飲痛須得黃連末擦之其痛乃止惟喜干食大惡湯飲此病皆寒濕乘其胞內故喜干而惡濕肝經陰火上溢走於標故上壅而目中溜火腎水侵肝而上溢故目中䀮䀮無所見齒惡熱飲者是少陽陽明經中伏火也當大瀉寒濕以丸藥治之故曰寒在下焦治主宜緩大忌湯散以酒製白石脂白龍骨以枯其濕以炮乾薑大辛熱瀉寒水以黃柏之大寒為因用又為嚮導治法云古者雖有重罪不絶人之後又為之伏其所主先其所因之意又瀉齒中惡熱飲也以柴胡為本經之使以芍藥半錢以導之又恐辛熱之藥太甚損其肝經故微瀉之以當歸身之辛溫大和其血脈此用藥之法備矣白石脂燒赤水飛研細曬乾柴胡各一錢白龍骨二錢酒煮水飛當歸酒洗三錢乾薑炮四錢黃柏酒洗白芍各五分上為細末水煮稀糊為丸如雞頭大每服三十丸空心宿食消盡煎白沸湯放溫送下無令胃中停住待少時以早膳壓之是不令熱藥犯胃忌生冷硬物與酒濕面上石脂龍骨之澀以去脫蓋濕多滑脫者宜之治婦人赤白帶下不問遠年近日並皆治之龍骨半兩舶上硫黃三錢上為細末每服半錢空心無灰酒下茅花散治婦人血崩不止赤白帶下茅花一握棕樹皮三寸嫩荷葉三張甘草節二寸上為細末空心酒調半匙服山治赤白帶下舊蓮房為末入麝香空心米飲下涼劑少腹熱痛為熱瘕以劉河間法治之保赤者熱入小腸白者熱入大腸原其本皆濕熱結於脈故津液湧溢是為赤白帶下本不病結緣五經脈虛結熱屈滯於帶故女子臍下痛陰中綿綿而下也經曰任脈為病男子內結七疝女子帶下瘕聚王注云任脈自胞上過帶脈貫於臍上故男子內結七疝女子帶下帶脈起於季脅章門似束帶狀今濕熱冤結不散故為病也經曰脾傳之腎名曰疝瘕小腸冤結而痛出白一名曰蠱所以為帶下冤結也冤屈也屈滯而病熱不散先以十棗湯下之後服苦楝丸大延胡散調下之熱去濕除病自愈矣十棗湯見前注大延胡散方見調經門破血條苦楝丸治婦人赤白帶苦楝碎酒浸蘹香炒當歸各等分上為末酒糊丸每服三五十丸空心溫酒下如腰腿疼四物湯四兩加羌活防風各一兩煎湯送下大地榆膏治赤白帶下骨立者地榆一斤用水三升煎至一半去渣再煎如稠餳絞淨空心服三合日二服治漏下五色地榆三兩銼用醋一升煮十餘沸去滓稍熱食前服一合千治婦人赤白帶下三葉酸漿草陰乾為末空心溫酒下三錢匕上三方治帶地榆例寒澀之劑亦濕熱盛而滑脫者宜之按三葉酸漿草葉細如萍叢生莖端有三葉俗又名布穀飯布穀者鳩也蓋鳩常食之故又名鳩漿草衍義誤人苦草耽條即曰三葉酸漿草豈苦草耽即酸漿歟苦草耽有子大如金柑味酸可食故亦名酸漿非三葉也三葉酸漿小草布地而生葉皆三瓣惟開黃花其莖葉皆酸者按地榆本血分之藥而其性寒故凡血分有熱而妄行者能止之非澀劑也丹治赤白帶下腰痛或少腹痛有熱者樗皮二兩延胡索桃仁側柏葉川楝肉蘹香當歸各半兩香附子八錢官桂去粗皮烏藥各三錢麥皮曲一兩炒上末之酒糊為丸每服五六十丸神效麒麟竭湯治婦人血傷赤白帶下小腹疼痛麒麟竭黃柏去粗皮炙地榆各一兩禹餘糧火煅醋淬七次赤芍藥炒各一兩半熟地黃切炒四兩一作生乾地黃上銼碎每服三錢水一盞煎至七分去滓不拘時服一方為細末粥飲調下二錢治白崩方棕櫚燒灰絲瓜俗云魚鰦夏月人家栽作涼棚者是也上等分為細末空心酒調下豆花散治婦人白崩上用白扁豆花焙乾為末炒米煮飲入燒鹽空心服數次即效紫花勿用溫劑調經補真湯冬後一月微有地泥冰泮其白帶再來陰戶中寒一服立止大進飲食麻黃半錢不去節杏仁三枚桂枝少許甘草炙五分良薑一錢黃耆七分人參當歸身白朮各五分蒼朮二分澤瀉一錢羌活四分防風二錢柴胡四分獨活藁本各二分升麻根黃芩各五分乾薑二分炮白葵花七朵去萼上除黃芩麻黃外都為粗末先將二味水二盞煎麻黃一味令沸掠去沫入余藥同煎至二盞又再入生黃芩煎至一盞去滓稍熱服空心宿食消盡日高服之一時許可食早膳本治婦人月經不調每行數日不止兼有白帶漸漸瘦悴飲食少味纍年無子地黃丸熟地黃二兩山茱萸白蕪荑乾薑白芍藥微炒代赭石醋淬各一兩厚朴白殭蠶各半兩上細末煉蜜丸如桐子大每服四五十丸空心酒下日三服此龐老方婦人有白帶是第一等病令人不産育宜急治之此扁鵲過邯鄲聞貴婦人所以專為帶下醫也垣桂附湯治白帶腥臭多悲不樂大寒肉桂一錢附子三錢黃柏知母各五分為粗末作一服水二盞煎至一盞法如常食遠熱服如少食常飽有時似腹脹加白芍藥半錢如不思飲食加五味子二十個如煩惱面上麻木如蟲行乃胃中元氣極虛加黃耆一錢人參七分甘草二分升麻半錢海香附六合湯治赤白帶下即四物加蘹香桂也大治赤白帶下年月深久不瘥白芍藥二兩乾薑半兩上各炒黃色同為末空心米飲調下二錢日二服二豆散治耳鳴心躁腰腳疼重腹內虛鳴臍下虛冷頻下白水如疳湛濁證白豆蔻肉豆蔻丁香白茯苓巴戟丁皮蒼朮黑附子火煨桂心各一兩人參白朮山藥桔梗蘹香粉草各半兩上銼碎每服三錢水一盞半生薑三片紫蘇葉三片同煎至七分去滓空心溫服鶴頂丸治帶下之證有三未嫁之女月經初下止而即得或浴之以冷水或熱而扇或當風此室女病帶下之由有家之婦陰陽過多即傷胞絡風邪乘虛而入胞經觸冷遂使穢液與血水相連而下之産後帶下由亡血失氣傷動包絡門開而外風襲肌體虛而冷風入冷風與熱氣相連故成液而下冷則多白而熱則多赤冷熱相交赤白俱下當歸七錢半酒浸附子半兩炮去皮龍骨鹽泥煅吳茱萸湯泡去涎赤石脂火煅醋淬乾薑炮各一兩半牡蠣一兩三錢鹽泥煅艾葉一兩以醋半盞煮乾為末上為細末研勻醋糊和丸如梧子大以赤石脂末為衣每服五十丸空心用艾葉鹽湯烏梅煎湯下濟生白堊丸治婦人白帶久而不止腰膝冷痛日漸羸困白堊煅禹餘糧鱉甲烏賊骨各用醋淬及炙當歸酒浸鵲巢灰乾薑紫石英醋煅淬七次附子炮狗脊制淨川芎鹿茸醋炙各一兩香附醋煮二兩以上併為末用醋煮糯米糊丸如梧子大每服七十丸溫酒下養氣活血丹治勞傷衝任赤白帶下大艾葉炒焦取末五兩乾薑炒末二兩半上二味用醋二升無灰酒二升生薑自然汁二升將薑艾末調於銀器用慢火熬成膏附子白芍藥白朮橘紅川芎當歸巴戟去心糯米炒人參五味子各二兩上為細末入前膏內並炒熱熟白麵二兩半和為劑杵千下丸梧子大每服五十丸溫酒或米飲下茱萸浴湯治下焦虛冷臍腹疼痛帶下五色月水崩漏淋瀝不斷吳茱萸湯泡杜仲炒去絲蛇床子五味子丁皮各一兩木香丁香各半兩上銼如麻豆大每用半兩以生絹袋盛水三大碗煎數沸乘熱熏下部通手淋浴早晚二次熏洗垣坐藥龍鹽膏丁香木香川烏頭炮各一錢半全蠍五枚龍骨當歸尾蘹香炒黃鹽酒防己肉桂紅豆各二錢玄胡索五錢厚朴三錢良薑木通各一錢枯礬半錢上為末煉蜜丸彈子大綿裹留絲在外納陰戶內又方勝陰丹為上藥力小再取三錢內加行性熱藥三奈子川烏頭大椒各五分柴胡羌活各二錢全蠍三個大蒜一錢破故紙與蒜同焙一錢甘松三分升麻枯白礬各二分麝香少許上為細末同前法用制又方回陽丹全蠍升麻甘松各二分草烏頭羌活各三分大椒三奈子蓽茇枯礬各五分川烏頭柴胡各七分水蛭三條炒焦虻蟲三個去翅足炒大蒜破故紙各二錢炒黃鹽一錢必用之藥去之則不效上為極細末依前制如指尖大用綿裹納陰戶中覺臍下暖為效酒煮當歸丸治癲癇白帶下疰腳氣腰以下如在冰雪中以火焙炕重厚綿衣蓋上猶冷不任寒之極也面白如枯魚之象肌如刀削消瘦之速也小便不止與白帶長流而不禁固自不知覺面白目青藍如菜色目䀮䀮無所見身重如山行步欹側不能安地腿膝枯細大便祕結口不能言無力之極食不下心下痞煩心懊憹不任其苦面停垢背惡寒小便遺而不知此上中下三陽真氣俱竭故噦嘔不止胃寒之極也其脈沉厥緊而澀按之空虛若脈洪大而澀按之無力猶為中寒之證況按之虛空者乎按之不鼓是為陰寒之極也其空虛乃氣血俱虛之極也當歸一兩蘹香半兩黑附子炮去皮臍良薑各七錢上四味銼如麻豆大以好酒一升半同煎煮至酒盡為度炭火焙乾同為極細末入炒黃鹽丁香各半兩全蠍三錢柴胡二錢升麻根木香各一錢苦楝子甘草炙各半錢玄胡索四錢上與前四味藥末同為細末酒煮麵糊為丸如桐子大每服二十丸空心宿食消盡淡醋湯下忌油膩冷物酒面當歸附子湯治臍下冷痛赤白帶下柴胡七分良薑乾薑附子各一錢升麻蠍梢各五分甘草炙六分炒黃鹽三分當歸二錢黃柏少許上件併為粗末上用五錢水二盞煎至一盞去滓熱服為丸亦得上炒鹽例東垣回陽丹注云必用炒黃鹽無則不效蓋寒疝之要藥也排膿治帶下並腸有敗膿淋露不已腥穢殊甚遂至臍腹更增冷痛此蓋敗膿血所致卒無已期須以此排膿白芷一兩單葉紅蜀葵根二兩白芍藥白礬各半兩礬燒枯另研余為末同以蠟丸如桐子大空肚及飯前米飲下十丸或十五丸候膿盡仍別以補藥佐之大伏龍肝散治婦人赤白帶下久不瘥肌瘦瘁黃有人經年崩漏不止諸藥不效脈濡微與此伏龍肝散兼白礬丸服之愈方見前白礬丸白礬四兩附子二兩黃狗骨頭四兩燒灰以上併為末上粥丸桐子大每服三十丸消瘀血仲問曰婦人年五十所病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之溫經湯吳茱萸三兩當歸芎藭芍藥人參桂枝阿膠牡丹皮生薑甘草各二兩半夏半升麥門冬一升上十二味以水一斗煮取三升分溫三服亦主婦人少腹寒久不受胎兼取崩中去血或月水來過多及至期不來丹治赤白帶用五靈脂半生半熟為末酒調服益母散治帶下赤白惡露下不止益母草開花時採搗為細末空心溫酒下二錢日三服香礬散神效方見崩中血見黑止條即醋炒香附灰也丹赤白帶皆屬於血有出於大小腸之分黃荊子炒焦為末米飲調服大治帶下用芍藥炒黑為末每服三錢匕調酒下治婦人赤白帶下不問年月深遠日漸羸瘦起止不得用刺薊根不以多少曝乾稱每一斤以童子小便五升浸一伏時取出曬乾上為細末每服二錢食前暖酒調下玳瑁丸治赤白帶下不止玳瑁續斷各一兩安息香麒麟竭乳香沒藥各半兩故錦灰七錢半上為細末以蜜及安息香熬和藥末丸如緑豆大每服三十丸食前溫酒送下室女帶下産寶第十四問未出女子有三病何也答曰女子一病者經水初下陰中熱或當風臥或扇風二病者太衝脈盛氣盛則內熱以冷水洗之三病者或見丹下驚怖者若三者一有所受後必有帶下之證也神仙聚寶丹治婦人血海虛寒外乘風冷搏結不散積聚成塊或成堅瘕及血氣攻注腹脅疼痛小便急脹或虛鳴嘔吐涎沫頭旋眼花腿膝重痛面色痿黃肢體浮腫月候欲行先若重病或多或少帶下赤白崩漏不止驚怖健忘小便頻數或白時見虛熱盜汗羸瘦此藥不問胎前産後室女並皆治之常服安心去邪逐敗血養新血令有子木香另研琥珀另研當歸焙作末沒藥合末各一兩滴乳二錢半研麝香研辰砂研各一錢上為末滴冷熱杵為丸每一兩作十五丸每服一丸溫酒磨下胎息不順腹內疼痛一切産難酒和童便磨下産後血暈敗血奔心口噤舌強或惡露未盡發渴面浮煎烏梅湯和童便磨下室女月候不調溫酒磨下半丸産後血氣不調童便磨下不拘時服崔氏四花穴治赤白帶如神取穴法見玉赤白帶中極二寸半赤瀉白補白環俞一寸半瀉六吸補一吸撮又法中極白環俞各十五壯腎俞二寸半灸隨年壯集又法氣海中極白環俞不效取後穴三陽交補多瀉少灸七壯三陰交東又法榮池三分灸三十壯在內踝前後兩邊池中脈一名陰陽穴又法陰陽在足拇指下屈里表頭白肉際是也又法三陰交五分灸交儀二寸灸漏陰在內踝下五分微有動脈是穴刺入一分灸三十壯桑赤帶心術如下赤帶不已漸漸如蠱亦用此法氣海六分中極委中各五分白帶心術如下白帶不已漸漸如蠱亦用此法曲骨承陰各七分中極在兩傍柱骨下六分心婦人得子多變成白水淋漓而下經久身面虛腫陰谷二寸半絶骨二寸半如喘滿魚際透大淵左右共四十九呼治肺經水氣極妙海帶病太陰主之灸章門穴麥粒大各三壯效甲婦人下赤白沃後陰中干痛惡合陰陽少腹䐜堅小便閉曲骨主之女子赤白帶腰腧主之女子赤淫大赫主之女子絶子陰挺出不禁白瀝上窖主之女子赤白瀝心下積脹次窖主之女子赤淫時白氣癃月事少中窖主之女子下蒼汁不禁赤瀝陰中癢痛引少腹控䏚不可俯仰下窖主之女子疝少腹腫赤白淫時多時少蠡溝主之月事不利見赤白而有身及前陰寒行間主之女子疝及少腹腫溏泄癃遺溺陰痛面塵黑目下眥痛太衝主之女子俠臍疝中封主之女子疝瘕按之如以湯沃兩股中小腹腫陰挺出痛經水來下陰中腫或癢漉清汁若葵羹血閉曲泉主之婦人下赤白裡急瘛瘲五樞主之素腎脈小急肝脈小急心脈小急不鼓皆為瘕大奇論王注云小急為寒甚不鼓則血不流血不流而寒薄故血內凝而為瘕也三陽急為瘕三陰急為疝王注云太陽受寒血聚為瘕太陰受寒血聚為疝脈急者曰疝瘕少腹痛平人氣象論脈師曰婦人帶下六極之病脈浮則為腸鳴腹滿緊則為腹中痛數則為陰中癢痛則生瘡弦則陰疼掣痛婦人帶下脈浮惡寒者不治胎前白帶丹治有孕白帶蒼朮三錢山茱萸去核白芍藥各二錢半黃芩炒白芷各二錢樗根皮炒黃連炒黃柏炒各一錢半上為末糊丸空心溫酒下五十丸白濁白淫大婦人小便白濁白淫者皆由心腎不交養水火不升降或因勞傷於腎腎氣虛冷故也腎主水而開竅在陰陰為溲便之道胞冷腎損故有白濁白淫宜服局方金鎖正元丹雜病遺精或因心虛而得者宜服平補鎮心丹雜病驚降心丹威喜丸雜病遺精若因思慮過當致使陰陽不分清濁相干而成白濁者然思則傷脾故也宜用四七湯雜病氣吞白丸子雜病中風此藥極能分利更宜小烏沉湯雜病鼻衄每帖加茯苓一錢重者益智二十枚去殼碾鹽煎服薛前證若元氣下陷用補中益氣湯脾胃虧損六君加升麻柴胡脾經鬱結歸脾加黃柏山梔肝經怒火龍膽瀉肝湯虛則用加味逍遙散宜與帶下參看主治一婦人善怒或小腹痞悶或寒熱往來或小便頻數時下白淫藥久不愈面青口苦余以為積憤而不能發散所致用龍膽瀉肝湯而愈用加味逍遙散八珍湯而安薑黃散治血臟久冷腹脹疼痛小便濃白如泔片薑黃二兩大附子炮一兩柳桂赤芍藥紅藍子三稜各半兩木香牡丹皮芫花醋浸炒郁李仁去皮沒藥各二錢半上為細末每服一錢酒煎服如腹痛用當歸沒藥為末以水七分酒三分同煎熱服內金鹿茸丸治婦人勞傷血脈胞絡受寒小便白濁日夜無度臍腹疼痛腰膝無力雞內金鹿茸黃耆肉蓯蓉五味子遠志肉牡蠣桑螵蛸龍骨附子各等分上為細末煉蜜和丸如梧子大每服五十丸食前用溫酒或米飲送下二豆散治耳鳴心躁腰腳疼重腹內虛鳴臍下冷痛頻下白水如泔名湛濁證方見前赤白帶下烏金散治身熱口燥氣塊築痛下黃水如葵汁百草霜炒紫金皮米泔浸煮炒黃粉草炙各等分上為末每服二錢艾湯或醋湯空心調下心嘈豬血入鹽酒下白帶用鯉魚一尾去腸不去鱗將油發一團入魚肚內黃泥固濟炭火內煅存性去泥研魚為末每用一錢以陳酒調同前藥服四七湯煎成送下青州白丸子常服最效加味四七湯治婦女小便不順甚者陰戶疼痛半夏湯洗七次一兩厚朴薑汁製赤茯苓香附子炒各五錢紫蘇甘草各二錢上㕮咀分四帖每服水二盅姜五片煎八分去滓加琥珀末一錢調服鎖精丸治小便白濁破故紙炒青鹽白茯苓五味子各等分為末酒糊丸空心鹽湯或酒任下三十丸固精丸治下虛胞寒小便白濁或如泔或如凝脂腰重牡蠣煅粉菟絲子酒蒸焙韭子炒龍骨五味子白茯苓桑螵蛸酒炙白石脂各等分為末酒糊丸梧桐子大每服七十丸空心鹽湯下治婦人久積虛寒小便白濁滑數不禁上用鹿茸屑炒黃為細末每服二錢空心溫酒調下又方用雞䏶胵炙為末空心酒調服二錢
