body:
  text: 自序婦人有專治方舊矣史稱扁鵲患苦百出過邯鄲聞貴婦人即為帶下醫語兼長也然帶下直婦人一病耳調經雜證懷子免身療治萬方一帶下寧渠盡之乎世所傳張長沙雜病方論三卷婦人居一焉其方用之奇驗奈弗廣何孫真人著千金方特以婦人為首蓋易基乾坤詩首關睢之義其說曰特須教子女學習此三卷婦人方令其精曉即於倉卒之秋何憂畏也而精於醫者未之深許也唐大中初白敏中守成都其家有因免乳死者訪問名醫得昝殷備集驗方三百七十八首以獻是為產寶宋時濮陽李師聖得產論二十一篇有說無方醫學教授郭稽中以方附焉而陳言無擇於三因方評其得失確矣婺醫杜荍又附益之是為產育寶慶集臨川陳自明良甫以為諸書綱領散漫而無統節目諄略而未備醫者局於簡易不能深求遍覽有才進一方不效輒束手者有無方可據揣摩臆度者乃採摭諸家之善附以家傳驗方編葺成篇凡八門門數十餘體總二百六十餘論論後列方綱領節目燦然可觀是為大全良方良方出而閨閫之調將大備矣然其論多采巢氏病源什九歸諸風冷藥偏獷熱未有條分縷析其宜不者近代薛己新甫始取良方增注其立論酌寒熱之中大抵依於養脾胃補氣血不以去病為事可謂救時之良醫也已第陳氏所葺多上古專科禁方具有源流本末不可昧也而薛氏一切以己意芟除變亂使古方自此湮沒余重惜之故於是編務存陳氏之舊而刪其偏駁者然亦存什之六七而已至薛氏之說則盡收之取其以養正為主且簡而易守雖子女學習無難也若易水瀫水師弟則後長沙而精於醫者一方一論具掇是中乃它書所無有挾是而過邯鄲庶無道少之患哉其積德求子與夫安產藏衣吉凶方位皆非醫家事故削不載云稿成而兵憲蔡虛臺公明府塗振任公助之貲刻行之以為此亦二公仁政萬分之一遂不復辭萬曆丁未早秋念西居士王肯堂宇泰甫書於無住庵
