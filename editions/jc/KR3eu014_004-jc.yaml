body:
  text: 卷之四胎前門求子胡氏孝曰男女交姤其所以凝結而成胎者雖不離乎精血猶為後天滓質之物而一點先天真一之靈氣萌於情欲之感者妙合於其間朱子所謂稟於有生之初悟真篇所謂生身受氣初者是也醫之上工因人無子語男則主於精語女則主於血著論立方男以補腎為要女以調經為先而又參之以補氣行氣之說察其脈絡究其虧盈審而治之夫然後一舉可孕天下之男無不父女無不母矣診脈陳楚良曰人身氣血各有虛實寒熱之異惟察脈可知舍脈而獨言藥者妄也脈有十二經應十二時一日一周與天同運循環無端其至也即不宜太過而數數則熱矣又不宜不及而遲遲則寒矣不宜太有力而實實非正氣能自實也正氣虛而火邪來乘以實之也治法先當散郁以伐其邪邪去而後正可補也不宜太無力而虛虛乃正氣正血虛也治法惟當補其氣血耳亦有男婦上熱下寒表實裡虛而未得子者法當臨睡時服涼膈之藥以清其上每晨食未入口時服補藥以溫其下暫進升散之藥以達其表久服厚味之藥以實其里又有女人氣多血少寒熱不調月水違期或後或先白帶頻下而無子者皆當診脈而以活法治之務欲使其夫婦之脈皆和平有力不熱不寒交合有期不妄用精必能生子子不殤妖故欲得子者必須對脈立方因病用藥仲男子脈浮弱而澀為無子精氣清冷脈婦人少腹冷惡寒久年少者得之此為無子年大者得之絕產脈微弱而澀年少得此為無子中年得此為絕產肥人脈細胞有寒故令少子其色黃者胸上有寒少陰脈浮而緊緊則疝瘕腹中痛半產而墮傷浮則亡血絕產惡寒調經婁胎前之道始於求子求子之法莫先調經每見婦人之無子者其經必或前或後或多或少或將行作痛或行後作痛或紫或黑或淡或凝而不調不調則血氣乖爭不能成孕矣詳夫不調之由其或前或後及行後作痛者虛也其少而淡者血虛也多者氣虛也其將行作痛及凝塊不散者滯也紫黑色者滯而挾熱也治法血虛者四物氣虛者四物加參耆滯者香附縮砂木香檳榔桃仁玄胡滯久而沉痼者吐之下之脈證熱者四物加芩連脈證寒者四物加桂附及紫石英之類是也直至積去滯行虛回然後血氣和平能孕子也予每治經不調者只一味香附末醋為丸服之亦百發百中也素問云督脈生病女子不孕婦人經事不調即非受孕光景縱使受之亦不全美宜服加味六味地黃丸熟地黃四兩山茱萸肉山藥各二兩牡丹皮白茯苓各一兩五錢澤瀉香附米童便浸三次炒各一兩蘄艾葉去筋醋煮五錢上為末煉蜜丸如梧子大每服七十丸白沸湯送下隨後證作湯使或另作煎劑服經水過期者乃血虛也宜四物湯加參耆陳皮白朮服之若肥白人是痰多宜二陳加南星蒼朮滑石芎歸香附之類經水不及期者血熱也四物加芩連肥人亦兼痰治色紫黑者同血熱論經將行而作疼者氣滯也用歸身尾香附米及桃仁紅花黃連以行之或加四物莪朮玄胡索木香熱加黃芩柴胡經行後作疼者血氣虛也八物湯丹婦人肥盛者多不能孕育以身中有脂膜閉塞子宮以致經事不行瘦弱婦人不能孕育以子宮無血精氣不聚故也肥人無子宜先用調理藥當歸一兩酒洗茯苓二兩川芎七錢半白芍藥白朮半夏湯洗香附米陳皮甘草各一兩作十帖每帖姜三片水煎吞後丸子白朮二兩半夏曲川芎香附米各一兩神麯炒茯苓各半兩橘紅四錢甘草二錢以上併為末粥丸每服八十丸如熱多者加黃連枳實各一兩服前藥訖卻服後螽斯丸附子茯苓各六錢厚朴杜仲桂心秦艽白薇半夏乾薑牛膝沙參各二錢人參四錢細辛五錢上為末煉蜜和丸小豆大每服五丸空心酒下加至十丸不妨覺有娠三月後不可更服忌食牛馬肉則難產當出月按此方即秦桂丸也丹溪忌服之者蓋忌於瘦人無血者若肥人濕多者又兼前調理藥而所服丸數十減其九只服五分無妨也上三方得之於丹溪之子朱懋誠者累試有效抑氣散治婦人氣盛於血所以無子尋常頭眩暈膈滿體疼怔忡皆可服香附子炒淨二兩陳皮焙二兩茯神甘草炙各一兩上為細末每服二三錢不拘時白湯調下海大五補丸天門冬麥門冬去心菖蒲茯苓人參益智枸杞子地骨皮遠志肉熟地黃各等分上為細末煉蜜丸如桐子大空心酒下三十丸服本方數服後以七宣丸泄之增損三才丸天門冬酒浸去心熟地黃酒蒸人參去蘆遠志去骨五味子茯苓酒浸鹿角酥炙一法加白馬莖酥炙一法加麥門冬令人有力一法加續斷以續筋骨一法加沉香暖下焦虛冷上為細末煉蜜和杵千下丸如桐子大每服五十丸空心好酒下年老欲補加混元衣全個入藥混元衣者是胎衣頭生兒者方佳用酒浸曬乾細銼為末紫石門冬丸又名紫石英丸紫石英鐘乳石鵝管通明者二味各七日研之得上浮即熟天門冬以上各三兩當歸芎藭紫葳卷柏肉桂乾地黃牡蒙禹餘糧煅醋淬石斛辛夷以上各二兩人參桑寄生續斷細辛厚朴薑製乾薑食茱萸艾葉白薇薯蕷烏賊骨甘草炙以上各一兩半柏子仁一兩上件搗羅為末煉蜜丸如梧桐子大酒服十丸三日漸增至三十丸以腹中熱為度不禁房室夫行不在不可服禁如藥法比來服者不至盡劑即有娠此方舊用烏頭牡丹牛膝據藥證此三物俱墮胎求子藥中用之蓋胎未著之時若服之已著已著而未覺服之未已反為害也今悉去之增鍾乳艾葉白薇茲無疑矣白薇丸治婦人無子或斷緒上熱下冷百病皆主之白薇熟乾地黃川椒去目及閉口者微炒出汗白龍骨以上各一兩麥門冬去心焙一兩半藁本卷柏白芷覆盆子桃仁湯浸去皮尖雙仁麩炒微黃人參桂心菖蒲白茯苓遠志去心以上各七錢半車前子當歸銼微炒芎藭蛇床子細辛乾薑炮製各半兩上件藥杵羅為末煉蜜為丸梧子大每服三十丸空心日午以溫酒下三十丸予之故友江君雅曾仲容俱無嗣因以此方贈之逾年而皆有子後有艾君肅黃翰公者亦然故述之趙氏蓯蓉菟絲子丸肉蓯蓉一兩三錢覆盆子蛇床子川芎當歸菟絲子各一兩二錢白芍藥一兩牡蠣鹽泥固濟煅烏賊魚骨各八錢五味子防風各六錢條苓五錢艾葉三錢此方不寒不熱助陰生子前藥俱焙乾為末煉蜜丸如桐子每服三四十丸清鹽湯下早晚皆可服加味香附丸男服聚精丸女服此香附一斤四兩老酒浸兩宿炒搗碎再焙乾磨為末四兩米醋浸同上四兩童便浸同上四兩用山梔四兩煎濃汁去渣入香附浸同上澤蘭淨葉六兩酒洗海螵蛸六兩搗稍碎炒當歸四兩酒洗川芎三兩白芍藥四兩酒炒懷熟地八兩搗膏焙乾各為末用浮小麥粉酒醋水打糊為丸如綠豆大每日早晚服兩次忌食萊菔及牛肉生冷調經丸香附半斤童便酒醋各浸一分生一分俱酒炒川杜仲薑汁炒半斤大川芎白芍藥當歸去尾懷生地廣陳皮小茴香酒炒延胡索略炒肉蓯蓉酒浸舊青皮麩炒臺烏藥炒枯黃芩酒炒烏賊魚骨酥炙以上各四兩上十四味足秤真正好料醋和麵打糊為丸如梧桐子大每服百丸空心好酒送下一方無陳皮地黃有人參黃耆各二兩正元丹調經種子香附一斤同艾三兩先以醋同浸一宿然後分開制之酒鹽酥童便各制四兩阿膠蛤粉炒二兩枳殼四兩半生用半麩炒懷生地酒洗熟地酒浸當歸身酒洗川芎炒各四兩白芍藥八兩半生半酒炒加白茯苓琥珀治帶末之醋糊丸如桐子大空心鹽湯吞五六十丸子和戴人過譙都營中飲會有一卒說出妻事戴人問其故答曰吾婦為室女時心下有冷積如覆盆按之如水聲以熱手熨之如冰娶來已十五年矣恐斷吾嗣是以去之戴人曰公勿黜也如用吾藥病可除孕可得卒從之戴人診其脈寸脈沉而遲尺脈洪大有力非無子之候也可不逾年而孕其良人嘆曰試之先以三聖散吐涎一斗心下平軟次服白朮調中湯五苓散後以四物湯和之不再月氣血合度數月而娠一子戴人常曰用吾此法無不子之婦此言不誣一婦人年三十四歲夢與鬼神交驚怕異常及見神堂陰司舟楫橋梁如此一十五年竟無妊娠巫祈覡禱無所不至鑽肌炙肉孔穴萬千黃瘦發熱引飲中滿足腫委命於天一日苦請戴人戴人曰陽火盛於上陰水盛於下見鬼神者陰之靈神堂者陰之所舟楫橋梁水之用兩手寸脈皆沉而伏知胸中有實痰也凡三湧三泄三汗不旬日而無夢一月而有娠大蕩胞湯治婦人立身以來全不產育及斷絕久不產三十年者宜服朴硝牡丹皮當歸大黃蒸一飯久桃仁去皮尖各三兩細辛厚朴薑汁炙桔梗赤芍藥人參茯苓桂心甘草牛膝去苗陳橘皮以上各二兩附子炮一兩半虻蟲去翅足炒焦水蛭炒枯各十枚上件以清酒五升水六合煮取三升分四服日三夜一每相去三辰少時更服如常覆被少時取汗汗不出冬月著火籠必下積血及冷赤膿如赤小豆汁本為婦人子宮內有此惡物冷然或天陰臍下痛或月水不調為有冷血不受胎若斟酌下盡氣久弱大困不堪更服亦可二三服即止如大悶不堪可食酢飲冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著坐導藥坐導藥治全不產及斷緒服前蕩胞湯惡物不盡用此方皂角去皮子吳茱萸當歸各二兩細辛去苗五味子乾薑炮各一兩黃葵花白礬枯戎鹽蜀椒各半兩上為細末以絹袋大如指長三寸余盛藥令滿縛定納婦人陰中坐臥任意勿行走小便時去之更安一日一度易新者必下清黃冷汁汁盡止若未見病出可十日安之本為子宮有冷惡物故令無子值天陰冷則發疼痛須候病出盡方已不可中輟每日早晚用蕒菜煎湯薰之丹秦桂丸論無子之因多起於婦人醫者不求其因起於何處遍閱古方惟秦桂丸其辭確其意專用溫熱藥近乎人情欣然受之銳然服之甘受燔灼之禍猶懵然不悔何者陽精之施陰血能攝之精成其子血成其胞胎孕乃成今婦人之無子者率由血少不足以攝精也血之少也固非一端然欲得子者必須調補陰血使無虧欠乃可推其有餘以成胎孕何乃輕用熱劑煎熬臟腑血氣沸騰禍不旋踵矣或曰春氣溫和則萬物發生冬氣寒凜則萬物消隕非秦桂丸之溫熱何以得子臟溫暖而成胎耶予曰詩曰婦人和平則樂有子和則血氣均平則陰陽不爭今得此藥經血必轉紫黑漸成衰少或先或後始則飲食驟進久則口苦而干陰陽不平血氣不和疾病蜂起焉能成胎縱然成胎生子亦多病而不壽以秦桂丸耗損天真之陰也戒之慎之按秦桂丸施於肥人而少其丸數兼服調理補藥亦無妨但忌施於瘦人火多者也東婦人無子胞門在關內左邊二寸灸五十壯又法氣門在關元傍各開三寸灸五十壯集又法子宮在中極傍各開三寸針入二寸灸三七壯中極垣又法關元二十壯三報穴甲絕子灸臍中令人有子女子手腳拘攣腹滿疝月水不下乳余疾絕子陰癢陰交主之腹滿疝積聚余疾絕子陰癢刺石門千金云奔豚上少腹堅痛下引陰中不得小便女子絕子衃血在內不下關元主之千金云轉胞不得溺小腹滿名石水痛婦人子門不端少腹苦寒陰癢及痛經閉不通中極主之婦人無子湧泉主之大疝絕子築賓主之絕子商丘主之穴在內踝前宛宛中婦人絕產若未曾產陰廉主之刺入分半灸下一寸養精袁了凡先生云聚精之道一曰寡欲二曰節勞三曰息怒四曰戒酒五曰慎味今之談養生者多言採陰補陽久戰不泄此為大謬腎為精之府凡男女交接必擾其腎腎動則精血隨之而流外雖不泄精已離宮雖能堅忍者亦必有真精數點隨陽之痿而溢出此其驗也如火之有煙焰豈有復反於薪者哉是故貴寡欲精成於血不獨房室之交損吾之精凡日用損血之事皆當深戒如目勞於視則血以視耗耳勞於聽則血以聽耗心勞于思則血以思耗吾隨事而節之則血得其養而與日俱積矣是故貴節勞主閉藏者腎也司疏泄者肝也二臟皆有相火而其繫上屬於心心君火也怒則傷肝而相火動動則疏泄者用事而閉藏不得其職雖不交合亦暗流而潛耗矣是故當息怒人身之血各歸其舍則常凝酒能動血人飲酒則面赤手足俱紅是擾其血而奔馳之也血氣既衰之人數月無房事精始厚而可用然使一夜大醉精隨薄矣是故宜戒酒內經云精不足者補之以味然醲郁之味不能生精惟恬澹之味乃能補精耳蓋萬物皆有真味調和勝而真味衰矣不論腥素淡煮之得法自有一段沖和恬澹之氣益人腸胃洪範論味而曰稼穡作甘世間之物惟五穀得味之正但能淡食穀味最能養精又凡煮粥飯而中有厚汁滾作一團者此米之精液所聚也食之最能生精試之有效煉精有訣全在腎家下手內腎一竅名玄關外腎一竅名牝戶真精未泄乾體未破則外腎陽氣至子時而興人身之氣與天地之氣兩相吻合精泄體破而吾身陽生之候漸晚有醜而生者次則寅而生者又次則卯而生者有終不生者始與天地不相應矣煉之之訣須半夜子時即披衣起坐兩手搓極熱以一手將外腎兜住以一手掩臍而凝神於內腎久久習之而精旺矣葆真丸專治九醜之疾言莖弱而不振振而不豐豐而不循循而不實實而不堅堅而不久久而無精精而無子謂之九醜之疾此藥補十二經絡起陰發陽能令陽氣入胸安魂定魄開三焦積聚消五穀進食強陰益子精安五臟除心中伏熱強筋骨輕身明目去冷除風無所不治此藥平補多服常服最妙七十歲老人尚能育子非常之力及治五勞七傷無子嗣者鹿角膠半斤銼作豆大就用鹿角霜拌炒成珠研細杜仲去粗皮切碎用生薑汁一兩同蜜少許拌炒斷絲三兩乾山藥白茯苓去粗皮人乳拌曬乾凡五七次熟地黃各二兩菟絲子酒蒸搗焙山茱萸肉各一兩半北五味子川牛膝去蘆酒蒸益智仁去殼遠志泔煮去骨小蘹香青鹽三錢同炒川楝子去皮核取淨肉酥炙川巴戟酒浸去心以上各一兩破故紙胡蘆巴同故紙入羊腸內煮焙乾各一兩柏子仁去殼另研如泥半兩穿山甲酥炙沉香各三錢全蠍去毒一錢半上件各制度為極細末以好嫩肉蓯蓉四兩酒洗淨去鱗甲皮垢開心如有黃白膜亦去之取淨二兩好酒煮成膏同煉蜜和前藥末搗千餘下丸如桐子大每服五十丸淡秋石湯溫酒任下以乾物壓之漸加至百丸服七日四肢光澤唇臉赤色手足溫和面目滋潤又能消食理脾輕身和氣語言清亮是其效也千金種子丹此方服之令人多子並治虛損夢遺白濁脫卸男子服沙苑蒺藜取淨末四兩如蠶種同州者佳再以重羅羅二兩極細末二兩粗末用水一大碗熬膏伺候蓮鬚四兩極細末金色者固精紅色者敗精山茱萸極細末三兩須得一斤用鮮紅有肉者佳去核取肉制末覆盆子南者佳去核取細末二兩雞頭實五百個去殼如大小不一等取細末四兩龍骨五錢五色者佳火煅煅法以小砂鍋入龍骨鍋內連鍋煅通赤去火毒方用上用伏蜜一斤煉以紙黏去浮沫數次無沫滴水中成珠者伺候止用四兩將前五味重羅過先以蒺藜膏和作一塊再入煉蜜石臼內搗千餘下丸如豌豆大每服三十丸空心鹽湯送下忌欲事二十目此藥延年益壽令人多子不可盡述聚精丸男服黃魚鰾膠白淨者一斤切碎用蛤粉炒成珠以無聲為度沙苑蒺藜八兩馬乳浸兩宿隔湯蒸一炷香久取起焙乾上為末煉蜜丸如梧子大每服八十丸空心溫酒白湯任下忌食魚及牛肉五子衍宗丸男服此藥添精補髓疏利腎氣不問下焦虛實寒熱服之自能平秘舊稱古今第一種子方有人世服此藥子孫蕃遂成村落之說嘉靖丁亥於廣信鄭中丞宅得之張神仙四世孫子及數人用之殊驗甘州枸杞子菟絲子酒蒸搗成餅各八兩遼五味子一兩覆盆子四兩酒洗去目車前子炒二兩上五品俱擇道地精新者焙曬乾共為細末煉蜜丸如桐子大每服空心九十丸上床時五十丸白沸湯或鹽湯送下冬月用溫酒送下修合日春取丙丁己午夏取戊己辰戌丑未秋取壬癸亥子冬取甲乙寅卯忌師尼鰥寡之人及雞犬六畜見之十子丸四明沈嘉則無子七十外服之連舉子槐角子和何首烏蒸七次覆盆子枸杞子去枯者及蒂桑堪子冬青子四味共蒸各四兩菟絲子制去殼酒蒸柏子仁酒浸蒸沒石子照雷公制蛇床子蒸北五味子去枯者打碎蜜蒸以上各二兩上為末煉蜜丸如梧桐子大每服五六十丸淡鹽湯下乾點心壓之趙氏加味六子丸菟絲子淘洗酒蒸川牛膝去蘆酒蒸麥門冬去心酒蒸山茱萸取肉原蠶蛾五味子各一兩三錢蛇床子酒蒸一兩六錢車前子淘洗一兩七錢大甘草炙一兩沙苑蒺藜馬乳浸蒸覆盆子各二兩二錢破故紙二兩三錢淘洗炒肉蓯蓉二兩五錢酒浸去鱗腎雖屬水不宜太冷精寒則難成孕如天地寒冷則草木必無萌芽也此方極意斟酌不寒不熱得其中和修合服之如一陽初動萬物化生二三月後必孕成矣前藥俱焙乾銼碎為末煉蜜丸如桐子大每服三十丸或四十丸清鹽湯送下早晚皆服針灸治男子無子者用熟艾一團用鹽填臍滿卻於鹽上隨鹽大小做艾丸灸之如痛即換鹽直灸至艾盡為度如一日灸不盡二日三日灸之曾效知時袁了凡先生云天地生物必有絪縕之時萬物化生必有樂育之時如貓犬至微將受妊也其雌必狂呼而奔跳以絪縕樂育之氣觸之而不能自止耳此天然之節候生化之真機也世人種子有云三十時辰兩日半二十八九君須算此特言其大概耳非的論也丹經云一月止有一日一日止有一時凡婦人一月經行一度必有一日絪縕之候於一時辰間氣蒸而熱昏而悶有欲交接不可忍之狀此的候也於此時逆而取之則成丹順而施之則成胎矣其曰三日月出庚又曰溫溫鉛鼎光透簾幃皆言其景象也當其欲情濃動之時子宮內有如蓮花蕊者不拘經淨幾日自然挺出陰中如蓮蕊初開內人洗下體以手探之自知也但含羞不肯言耳男子預密告之令其自言一舉即中矣成胎丹溪云成胎以精血之後先分男女者褚澄之論也愚竊惑焉後閱東垣方有曰經水斷後一二日血海始淨精勝其血感者成男四五日後血脈已旺精不勝血感者成女此論亦為未瑩何以言之易曰乾道成男坤道成女夫乾坤陰陽之性情也左右陰陽之道路也男女陰陽之儀象也父精母血因感而會精之泄陽之施也血能攝之陰之化也精成其骨此萬物之資始於乾元也血成其胞萬物之資生於坤元也陰陽交姤胎孕乃凝胎之所居名曰子宮一系在下上有兩歧一達於左一達於右精勝其血及剛日陽時感者則陽為之主受氣於左子宮而男形成精不勝血及柔日陰時感者則陰為之主受氣於右子宮而女形成或曰分男分女吾知之矣其有雙胎者將何如曰精氣有餘歧而分之血因分而攝之故也若夫男女同孕者剛日陽時柔日陰時感則陰陽混雜不屬左不屬右受氣於兩歧之間者也亦有三胎四胎五胎六胎者猶是而已或曰其有男不可為父女不可為母與男女之兼形者又若何而分之耶予曰男不可為父得陽道之虧者也女子不可為母得陰道之塞者也兼形者由陰為駁氣所乘而為狀不一以女兼男形者有二一則遇男為妻遇女為夫一則可妻而不可夫又有下為女體上具男之全形此又駁之甚者也或曰駁氣所乘獨見於陰而所成之形又若是之不同耶予曰陰體虛駁氣易於乘也駁氣所乘陰陽相混無所為主不可屬左不可屬右受氣於兩歧之間隨所得駁氣之輕重而成形故所兼之形有不可得而同也婁全善云丹溪此論極造精微發前人之未發是知男女之分已定於萬物資始乾元之際陰陽交姤之時昧者不悟是理妄有轉女為男之法惑矣夫萬物皆資始於乾元獨男女之分不資始於乾元乎袁先生云巢氏論婦人妊娠一月名始胚足厥陰脈養之二月名始膏足少陽脈養之三月名始胎手心脈養之四月始受水精以行血脈手少陽脈養之五月始受火精以成其氣足太陰養之六月始受金精以成其筋足陽明脈養之七月始受木精以成其骨手太陰脈養之八月始受土精以成膚革手陽明脈養之九月始受石精以成毛髮足少陰脈養之十月臟腑關節人神俱備此其大略也若求其細則受胎在腹七日一變展轉相成各有生相大集經備矣今婦人墮胎在三月五月七月者多在二四六月者少臟陰而腑陽三月屬心五月屬脾七月屬肺皆在五臟之脈陰常易虧故多墮耳如昔曾三月墮胎則心脈受傷須先調心不然至三月復墮昔曾五月墮胎則脾脈受傷後至五月復墮宜先治脾惟有一月之內墮胎則人皆不知有胎但知不受妊不知其受而墮也一月屬肝怒則墮多洗下體則竅開亦墮一次既墮則肝脈受傷他次亦墮今之無子者大半是一月墮胎非盡不受妊也故凡初交之後最宜將息勿復交接以擾其子宮勿令怒勿令勞勿令舉重勿令洗浴而又多服養肝平氣之藥胎可固矣程鳴謙云褚澄氏言男女交合陰血先至陽精後沖而男形成陽精先入陰血後參而女形成信斯言也人有精先泄而生男精後泄而生女者獨何歟東垣曰經水才斷一二日血海始淨感者成男四五日血脈已旺感者成女至於六七日後則雖交感亦不成胎信斯言也人有經始斷交合生女經久斷交合生男者亦有四五日以前交合無孕八九日以後交合有孕者獨何歟俞子木撰廣嗣要略著方立圖謂實陽能入虛陰實陰不能受陽即東垣之故見也又謂微陽不能射陰弱陰不能攝陽信斯言也世有尪羸之夫怯弱之婦屢屢受胎雖欲止之而不能止者亦有血氣方剛精力過人顧乃艱於育嗣而莫之救者獨何歟朱丹溪論治專以婦人經水為主然富貴之家侍妾已多其中寧無月水當期者乎有已經前夫頻頻生育而娶此以圖其易者顧亦不能得胎更遣與他人轉盼生男矣豈不能受孕於此而能受孕於彼乎愚以為父母之生子如天地之生物易曰坤道其順乎承天而時行夫知地之生物不過順承乎天則知母之生子亦不過順承乎父而已知母之順承乎父則種子者果以婦人為主乎以男子為主乎然所謂主於男子者不拘老少不拘強弱不拘康寧病患不拘精易泄難泄只以交感之時百脈齊到為善耳交感而百脈齊到雖老雖弱雖病患雖易泄亦可以成胎交感而百脈參差雖少雖強雖康寧雖難泄亦難以成胎矣婦人所構之血固由於百脈合聚較之男子之精不能無輕重之分也孔子贊乾元資始曰大贊坤元資生曰至得無意乎若男女之辨又不以精血先後為拘不以經盡幾日為拘不以夜半前後交感為拘不以父強母弱母強父弱為拘只以精血各由百脈之齊到者別勝負耳是故精之百脈齊到有以勝乎血則成男矣血之百脈齊到有以勝乎精則成女矣至有既孕而小產者有產而不育有育而不壽者有壽而黃耆無疆者則亦精血之堅脆分為修短耳世人不察其精血之堅脆已定於稟受之初乃以小產專責之母以不育專付之兒以壽夭專諉之數不亦謬乎候胎診婦人懷軀七月而不可知時時衄血而轉筋者此為軀也衄時嚏而動者非軀也素問云婦人足少陰脈動甚者任子也平人氣象論謂太谿脈也全元起本作足少陰王冰本作手太陰當從全本王注云動脈者如豆厥厥動搖也一說動甚謂動搖大甚也陰搏陽別謂之有子陰陽別論王注云陰謂尺中也搏謂搏觸於手也尺脈搏擊與寸脈殊別則為有孕之兆脈妊娠初時寸微小呼吸五至三月而尺數也脈滑疾重以手按之散者胎已三月也脈重手按之不散但疾不滑者五月也此即陰搏陽別之義言尺脈滑數寸脈微小而尺與寸脈別者孕脈也尺脈左偏大為男右偏大為女左右俱大產二子大者如實狀亦陰搏陽別之義謂尺脈實大與寸脈殊別但分男左女右也婦人妊娠四月欲知男女法左疾為男右疾為女俱疾為生二子王子亨云妊娠三部俱滑而疾在左為男在上為女遣妊娠人面南行還復呼之左回首者是男右回首者是女看上圊時夫從後急呼之左回首者是男右回首者是女也婁全善云按丹溪云男受胎在左子宮女受胎在右子宮斯言大契是說也蓋男胎在左則左重故回首時慎護重處而就左也女胎在右則右重故回首時慎護重處而就右也推之於脈其義亦然胎在左則血氣護胎而盛於左故脈亦從之而左疾為男左大為男也胎在右則血氣護胎而盛於右故脈亦從之而右疾為女右大為女也亦猶經云陰搏陽別謂之有子言受胎處在臍腹之下則血氣護胎而盛於下故陰之尺脈鼓搏有力而與陽之寸脈殊別也又如癰癤發上則血氣從上而寸脈盛發下則血氣從下而尺脈盛發左則血氣從左而左脈盛發右則血氣從右而右脈盛也丹溪以左大順男右大順女為醫人之左右手蓋智者之一失也診婦人有妊歌肝為血兮肺為氣血為榮兮氣為衛陰陽配耦不參差兩臟通和皆類例血衰氣旺定無孕血王氣衰應有體肝藏血為榮屬陰肺主氣為衛屬陽陰陽配耦者是夫婦匹配偶合構精乃有子也若血少氣盛則無娠孕若血盛氣少則有孕也寸微關滑尺帶數流利往來並雀啄小兒之脈已見形數月懷耽猶未覺寸脈微關脈滑尺脈帶數及流利雀啄皆是經脈閉塞不行成胎以上之脈皆是血多氣少之脈是懷小兒之脈已見形狀也左疾為男上為女流利相通速來去兩手關脈大相應已形亦在前通語左手脈疾為懷男右手脈疾為懷女及兩脈流行滑利相通疾速來去是或兩手關部脈洪大相應是其胎已有形狀也左手帶縱兩個兒縱者夫行乘妻水行乘火金行乘木即鬼賊脈也名曰縱見在左手則懷兩個男兒也右手帶橫一雙女橫者妻乘夫也是火行乘水木行乘金即所勝脈也名曰橫見於右手則懷一雙女子也左手脈逆生三男逆者子乘母也是水行乘金火行乘木即已生脈也名曰逆見於右手則懷三個男兒也右手脈順還三女順者母乘子也是金行乘水木行乘火即生已之脈也名曰順見於右手則懷三個女兒也寸關尺部皆相應一男一女分形證寸關尺部脈大小遲疾相應者是懷一男一女形證之脈也謂關前為陽關後為陰陰陽脈相應故懷一男一女也有時子死母身存或即母亡存子命此二句之文無辨子母存亡之法往來三部通流利滑數相參皆替替陽實陰虛脈得明遍滿胸膛皆逆氣若寸關尺三部通行流利皆替替有力而滑數皆是陽實陰虛之脈主妊婦逆氣遍滿胸膛而不順也左手太陽浮大男左手寸口為太陽其脈浮大則是懷男之脈右手太陰沉細女右手寸口為太陰其脈沉細是懷女脈也諸陽為男諸陰女指下分明長記取諸陽脈皆為男即浮大疾數滑實之類是也當懷男子諸陰脈者即沉細之類是也當懷女子三部沉正等無絕尺內不止真胎婦寸關尺三部脈沉浮正直齊等舉按無絕斷及尺內舉按不止住者真的懷胎婦也夫乘妻兮縱氣霧經云縱者夫乘妻也水行乘火金行乘木即鬼賊脈也縱氣霧霧露也又上下也謂夫之陽氣乘妻之陰氣二氣上下相逐如霧潤結子也妻乘夫兮橫氣助橫者妻乘夫也見前注謂兩旁橫氣相佐助也子乘母兮逆氣參逆者子乘母也謂子氣犯母氣相乘逆行之氣相參合也母乘子兮順氣護是母氣乘於子氣為順氣相護衛也凡胎聚縱橫逆順四氣以榮養方以成形也小兒日足胎成聚身熱脈亂無所苦婦人懷小兒五個月是以數足胎成就而結聚也必母身體壯熱當見脈躁亂非病苦之證謂五月胎已成受火精以成氣故身熱脈亂是無病也汗出不食吐逆時精神結備其中住謂妊娠受五行精氣以成形稟二經以榮其母懷妊至五月其胎雖成其氣未備故胎氣未安上衝心胸則汗出不食吐逆名曰惡阻俗呼選飯唯思酸辛之味以調胎氣也滑疾不散三月胎妊娠三月名始胎此是未有定義心胞脈養之故脈見滑疾流利為少氣多血不散為血氣盛則始結為胎也但疾不散五月母其脈但疾數而不散者是五個月懷胎之母也弦緊牢強滑利安沉細而微歸泉路孕婦之脈宜弦緊牢強滑利為安吉之脈若沉細而微謂脈與形不相應故云死也前文雖云太陰沉細又云諸陰為女其說似有相違謂三部脈皆不沉細及微故不同也驗胎法海神方驗胎散婦人三兩個月月經不行疑是兩身卻疑血滯心煩寒熱恍惚此藥可驗取之內也外已有身病無邪脈以素問脈法推之十得八九矣真雀腦芎一兩當歸全用重一兩者只用七錢上為細末分作兩服濃煎好艾湯一盞調下或好酒調服亦得可待三兩個時辰間覺腹臍微動仍頻即有胎也動罷即愈安穩無虞如不是胎即不動所滯惡物自行母亦安也如服藥不覺效再煎紅花湯調下必有神效靈苑治婦人經脈住三個月驗胎法真川芎為細末濃煎艾湯下一匕投腹內漸動是有胎也探胎散婦人胎氣有無疑惑之間以此探之有胎則吐無則不吐皂角去皮甘草炙各一錢黃連半錢上為細末作一服溫酒調服博陵醫之神者曰郝翁士人陳堯遵妻病眾醫以為勞傷郝曰亟屏藥是為娠證且賀君得男子已而果然又二婦人妊一喑嘿不能言郝曰兒胎大經壅兒生經行則言矣不可毒以藥一極壯健郝診其脈曰母氣已死所以生者反恃兒氣耳如期子生母死孕婦不語非病也聞如此者不須服藥臨產日但服保生丸四物湯之類產後便語亦自然之理非藥之力也一婦暴渴惟飲五味汁名醫耿隅診其脈曰此血欲凝非疾也已而果孕古方有血欲凝而渴飲五味之證不可不知也潘璟診虞部員外郎張咸之妻孕五歲南陵尉富昌齡妻孕二歲團練使劉彝孫妾孕十有四月皆未育溫叟視之曰疾也凡醫妄以為有孕爾於是與破血攻毒大劑飲之虞部妻墮肉塊百餘有眉目狀昌齡妻夢二童子色漆黑倉卒怖悸疾走而去孫妾墮大蛇猶蜿蜒未死三婦皆無恙陳鬥岩治葉南洲妻經閉五月下白或赤午後發熱咳嗽嘔吐醫謂勞瘵陳視曰兩尺脈皆實此必有孕外受風邪搏激故耳飲清和之劑而安半年生一子胎產大法潔治胎產之病從厥陰經論之無犯胃氣及上三焦謂之三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脈數而已動於脾利小便則內亡津液胃中枯燥製藥之法能不犯三禁則榮衛自和而寒熱止矣如發渴則白虎氣弱則黃耆血刺痛而和以當歸腹中疼而加之芍藥大抵產病天行從增損柴胡雜證從增損四物宜詳察脈證而用之大抵外則和於榮衛內則調於清便同傷寒壞證治之李仲南胎前病唯當安胎順氣若外感四氣內傷七情以成他病治法與男子無異當於各證類中求之但胎前治他證者動胎之劑切須審詳爾丹胎前當清熱養血產前安胎白朮黃芩妙藥也胎前將臨月以三補丸加炒香附炒白芍藥蒸餅丸服又抑熱以三補用生地黃膏丸芩連柏為末地黃膏丸之有孕八九個月必順氣枳殼蘇莖前至八九月因火動胎逆上作喘急者可用條芩香附之類為末調下條芩於水中沉取重者用之固胎地黃半錢當歸身尾人參白芍陳皮各一錢白朮一錢半甘草三分黃芩川芎各半錢黃連炒柏各少許桑上羊兒藤即金銀花七葉完者糯米十四粒㕮咀煎服血虛不安者用阿膠痛者用縮砂行血氣故也夷堅志云政和中蔡魯公之孫婦有孕及期而病國醫皆以為陽證傷寒懼胎墮不敢投以涼劑張銳至視之曰兒處胎十月將生矣何藥之能敗即以常法與藥且使倍服之半日而兒生病亦失去明日其婦大泄而喉閉不入食眾醫復指其疵且曰二疾如冰炭又產蓐甫近雖司命無如之何矣張曰無庸憂也將使即日愈乃取藥數十粒使吞之咽喉即通下泄亦止及滿月魯公酌酒為壽曰君術通神吾不敢知敢問一藥而愈二疾何也張曰此於經無所載特以意處之曏者所用藥乃附子理中丸裹以紫雪爾方喉閉不通非至寒藥不為用既以下咽則消釋無餘其得至腹中者附子力也故一服而兩疾愈公大加嘆異汪機治一婦常患橫生逆產七八胎矣子皆不育汪診脈皆細澀頗弦曰此氣血兩虛兼熱也或曰氣血有餘方成妊娠氣血既虧安能胎耶汪曰觀其形長瘦而脈細濡屬於氣血兩虛色青脈弦屬於肝火時熾而兩尺浮滑似血虛為輕而氣虛為重也宜以補陰丸除陳皮倍加香附參耆蜜丸服之常令接續逾年臨產果順而育一子保生丸局方養胎益血安和子臟治妊娠將理失宜或因勞役胎動不安腰腹痛重胞阻漏胎惡露時下子臟挾疾久不成胎或受妊不能固養痿燥不長過年不產日月雖滿轉動無力或致損墮及臨產節適乖宜驚動太早產時未至惡露先下胎胞枯燥致令產難或橫或逆痛極悶亂連日不產子死腹中腹上冰冷口唇青黑吐出冷沫新產惡血上衝運悶不省喘促汗出及瘀血未盡臍腹㽲痛寒熱往來或因產勞損虛羸未復面黃體瘦心忪盜汗飲食不進漸成蓐勞入月常服壯氣養胎正順產理潤胎易產產後常服滋養血氣和調陰陽密腠理實腑臟治風虛除痼冷大麻仁去殼一兩半貝母黃芩大豆黃卷粳米甘草炙微赤乾薑炮肉桂去粗皮石斛去根石膏細研秦椒微炒出汗各一兩當歸去蘆炒半兩上為細末煉蜜和丸如彈子大每服一丸並用溫酒或棗湯化下嚼咽亦得空心食前服交感地黃煎丸治婦人產前產後眼見黑花或即發狂如見鬼狀胞衣不下失音不語心腹脹滿水穀不化口乾煩渴寒熱往來口內生瘡咽中腫痛心虛忪悸夜不得眠產後中風角弓反張面赤牙關緊急崩中下血如豚肝狀臍腹㽲痛血多血少結為癥瘕恍惚昏迷四肢腫滿產前胎不安產後血刺痛皆治之生地黃淨洗研以布絞汁留滓以生薑汁炒地黃滓以地黃汁炒生薑滓各至干為末生薑淨洗爛研以布絞汁留滓各二斤當歸去蘆延胡索拌糯米炒赤去米琥珀別研各一兩蒲黃炒香四兩上為末蜜丸彈子大當歸湯化一丸食前服琥珀丸治婦人胎前產後百病及療三十六種血冷七疝八瘕心腹刺痛卒中癱瘓半身不遂八風十二痹手足痠疼乳中毒結瘀血懷胎驚動傷犯不安死胎不出並胎衣不下並宜服之琥珀另研辰砂另研阿膠碎炒五味子揀淨石斛去根附子炮去皮臍肉桂去粗皮沉香不見火川芎各半兩牛膝去蘆酒浸當歸去須炒肉蓯蓉酒浸炒人參續斷沒藥研熟地黃木香不見火各一兩上為細末煉蜜和丸如彈子大每服一丸空心暖酒化下午後食前再服能生新血去惡血若腹脅疼痛繞臍如刀刺及嘔逆上氣築心痰毒不思飲食用薑汁少許和酒化服諸痢及赤白帶下血冷崩中下血漏胎下血用生薑與艾銼炒令赤色入酒同煎數沸去滓調服泄瀉不止陳米飲化服澀尿諸淋煎通草燈心湯服血暈不知人煎當歸酒調服上熱下冷煎人參湯服遍身虛腫水氣煎赤小豆湯服產內二毒傷寒及中風角弓反張如板硬煎麻黃湯服以衣被蓋出汗月經不通或間雜五色頻並而下斷續不止飲食無味肌膚瘦劣面赤唇焦乍寒乍熱四肢煩疼五心燥熱黑䵟遍身血斑赤腫走注及血風勞傷無力用童子小便入薑汁少許調服常服以童便為妙若恐噁心和以半酒如懷胎婦於臨月一日一服至產下不覺疼痛或服至五服十服日倍飲食是藥力也其功不能具述龍鬚湯治胎前產後身疼保室論云身疼者肌體不實而受風邪客於經絡邪氣與正氣相搏交擊於骨肉之間故身疼而不動用龍鬚湯主之若妊娠而患身體疼者必因勞役過多致使然也不爾經絡受風寒愈痛丸防風湯主之產者若因勞役身疼而不能動轉者良由產後百節開張血脈流走氣弱則骨肉之間血多凝滯是故百節經脈緊急腰背不能轉側手足不能動搖身熱若納炭頭如釘釘醫者不識妄為傷寒發汗變生他證宜服黃耆一兩蜜炙當歸去蘆酒浸牛膝洗去苗酒浸一宿如急用酒蒸熟為度白朮防風去蘆獨活去蘆甘草各二錢半上㕮咀每服半兩水五盞生薑十片薤白一握同煎至三盞去滓不拘時服佛手散治產前產後腹痛體熱頭疼及才產未進別物即先服此藥逐敗血生新血能除諸疾川芎二兩當歸三兩上為細末每服二錢水一盞酒二分同煎七分溫服一方為粗末每服四錢水七分酒三分同煎至七分熱服未產前先安排此藥將兩服藥煎之產了速進之三日內日二服三日外一服一方名芎歸湯只此二味等分㕮咀水煎專治失血傷胎去血產後去血崩中去血金瘡去血拔牙去血不止一切去血過多心煩眩暈悶絕不省人事頭重目暗舉頭欲倒悉能治之若產後眩暈宜加芍藥服之一名桂香散治產後腹疼不可忍者加桂心等分酒與童子小便合煎服之立效一名當歸湯治妊娠子死或未死胎動不安每服用酒水合煎連進數服胎若已死服之便下若未死其胎即安此經累效萬不失一一名琥珀散臨月服之只縮胎易產兼治產後諸疾一名羊肉湯治虛損羸乏腹中㽲痛往來寒熱吸吸少氣不能支持頭眩自汗腹內拘急每服用精羊肉一兩生薑十片水二盞煎至六分溫服一名君臣散治婦人室女心腹㽲痛經脈不調用水煎服若妊婦胎氣不安產後諸疾加酒煎服一名芎當散治婦人血氣上喘下腫二味等分為細末每服二錢空心煎艾湯調下又治產後損身血衝心及腹脹氣絕者神驗難生倒橫子死腹中先用黑大豆一大合炒熟水一盞入童子小便一盞藥末四錢同煎至一盞以上分為二服未效再作產後惡血注心迷悶喘急腹痛依前用黑豆加生薑自然汁半合煎服治臟毒每服一錢半入炒槐花末半錢水一盞煎至六分無時服三日取下血塊即愈如產後頭疼加荊芥煎如吐血亦宜服之若產難多用百草霜香白芷等分為末名烏金散每服二錢童子小便好醋各一合沸湯浸服止一服見效甚者再服已分娩矣一法以五積散加醋煎服亦能催生崩中漏下失血過多久不能止用芎歸湯療之不止者宜以香附子炒去皮毛為細末每一兩入甘草末一錢清米飲點服名順元湯有白帶者於順元湯內加芍藥半兩或謂香附耗氣則不然許學士謂滋血養氣婦人仙藥雖羸人亦宜服之兼治男女吐衄便利及諸證失血用此藥佐以米飲丸百草霜末每服百餘丸或以其他燒灰藥皆能作效不可遽以燥澀之劑止之必致壅遏腐敗必生他證大抵血不能行氣使之然者氣得其平則血循故道必無妄行之患矣香附子善能導氣用之勿疑也返魂丹治婦人胎前產後諸疾危證上用赤箭即野天麻葉似艾葉開紫花如紅蓼花子名茺蔚子又名益母草又名大札又名貞蔚又名負擔端五日採取陰乾用葉及花子以瓷器研為細末煉蜜和丸如彈子大隨後治證嚼服其根燒存性為末酒調服功與黑神散不相上下如胎前臍腹作痛或作聲者溫米飲下胎前產後臍腹刺痛胎動不安下血不止水煎秦艽糯米湯下或當歸湯變可如產時先用一丸以童子小便化下安魂定魄自然氣血調順諸病不生又能破血止痛養脈息調經絡溫酒下產後胎衣不下血在胞中及橫生不順死胎經日不下者脹滿腹中心悶心痛炒鹽湯下產後中風牙關緊急半身不遂失音不語童子小便無灰酒各半下產後咳嗽胸膈不利噁心口吐酸水面目浮腫兩脅痛舉動失力者溫酒下產後兩太陽痛呵欠心忡氣短肌體羸瘦不思飲食血風身熱手足頑麻百節疼痛溫米飲湯下產後眼前黑暗血暈血熱口渴煩悶如見鬼神狂言不省人事薄荷自然汁如無生者濃煎薄荷湯下及童子小便酒各半亦可產後面垢顏赤五心煩熱或結成血塊臍腹奔痛時發寒熱有冷汗者童子小便酒各半下溫薄荷自然汁亦可產後余血惡露不盡結滯臍腹刺痛惡物上衝心胸悶者童子小便酒各半下產後大小便不通煩躁口苦者薄荷自然汁下如無生者濃煎薄荷湯下產後瀉血者水煎棗湯下產後白帶下者煎膠艾湯下月水不調溫酒下血崩漏下溫酒下婦人久無子息溫酒下服之十丸至二十丸亦能注喜一子死腹中蓋因卒病臟腑熱極蒸其胎是以子死也蓋子死不居子宮或墮胎於腹間冷痛小便沫出腹脹四肢逆冷爪甲青者是也或臨產之時此藥安魂定魄血氣自然調順諸疾不生破血補虛止痛養血氣調經絡酒童子小便各七分化下二難產者胎以食母之血十月滿足則余血結成塊俗呼為兒枕欲產之時血塊先動敗血裹其子是以難產或產後惡物不盡臍腹刺痛惡物上衝心胸主悶用童便酒各七分化下三垢面顏赤胎衣不下既產了臟腑虛羸五心煩躁血流入衣中則難出發寒熱有冷汗出但去其敗血其衣自出如帶斷了服此藥下或橫生不順心悶欲死者童便酒各七分化下薄荷自然汁鹽湯亦可四產後三日起臥不得眼前黑暗生花蓋產後血氣未定運走五臟入肝則目昏俗為暗風醫家以風治之或血熱口乾煩渴心悶亂如見鬼神狂言妄語不省人事童便酒各七分薄荷自然汁亦可五產後口乾心悶及煩渴者血氣未定即食熱面積滯在內以致熱躁煩渴者俗為胸膈壅盛或兩太陽穴痛呵欠怔忡氣短身體羸瘦不思飲食血風身熱手足頑麻百節疼痛甚者溫米飲童便各七分化下六產後四肢浮腫及寒熱者蓋因敗血流入五臟滲入四肢停留日久化為膿狀氣喘或小便澀或咳嗽胸膈不利噁心口吐酸水兩肋疼痛舉動乏力溫酒化下七產後寒熱往來蓋因敗血入心則熱入脾則寒狀如瘧臍腹作痛或作聲溫米飲化下桂技枝亦可八產後中風牙關緊急半身不遂失音不語童便酒各七分化下九產後痢未經月滿或誤食物下與血相攻擊前所積受濕以此敗血相攻棗湯下十產後大便秘結口苦煩渴非時不語乃敗血衝心蔽其心孔重便酒各七分化下薄荷汁亦可十一產後遍身疼痛百節開張血乘虛流入腸中停留不散臍腹疼痛米飲化下十二產後崩中漏下不止蓋是傷酸物狀如雞肝脊背倦悶煎糯米秦艽湯化下當歸桂枝湯亦可十三產後未經月滿血氣不通蓋是月水未還或食熱面壅結成塊喘嗽四肢無力多睡而汗出不止月水不調為骨蒸勞便服此藥童便酒各七分化下十四產後吐逆不止蓋因敗血停於脾胃即發吐逆胸膈虛脹俗為反胃溫酒化下十五產後鼻衄口乾舌黑蓋因心臟熱則舌黑鼻衄也童便酒各七分化下十六產後赤白帶下煎秦艽湯下十七產後氣急喉中貓聲者蓋因敗血衝心入喉中萬無一瘥矣十八產後中風者蓋因未經七日勞重則百日之中傷房事中風初病之狀眼澀腰強筋急角弓反張牙關緊急若此者皆自傷犯耳十九產後面色黑及遍身生黑靨者乃敗血入皮膚萬無一瘥矣內灸散治婦人產前產後一切血疾血崩虛憊腹肋㽲痛氣逆嘔吐冷血冷氣凝積塊硬刺痛泄下青白或下五色腹中虛鳴氣滿堅脹瀝血腰疼口吐青水頻產血衰顏色青黃勞傷劣弱月經不調下血墮胎血迷血暈血瘕時發疼痛頭目眩暈惡血上心悶絕昏迷惡露不幹體虛多汗手足逆冷並宜服之藿香葉肉桂去粗皮熟乾地黃洗焙丁香皮各一兩半甘草炙赤山藥當歸去蘆洗白朮白芷各八兩藁本去蘆銼乾薑炮川芎黃耆去蘆各二兩木香一兩陳皮去白四兩白芍藥十兩茴香一兩半上銼散每服三錢水一大盞入生薑五片艾一團同煎至七分空心食前熱服為末溫酒調下亦得如產後下血過多加蒲黃煎服惡露不快加當歸紅花煎服水瀉加肉豆蔻末煎服嘔吐加藿香生薑煎上熱下冷加荊芥煎但是腹中虛冷血氣不和並宜服產後每日一服則百病不生丈夫虛冷氣刺心腹疼痛尤宜服之食忌一受孕之後切宜忌不可食之物非惟有感動胎氣之戒然於物理亦有厭忌者設或不能禁忌非特延月難產亦能令兒破形母損可不戒哉食雞肉糯米合食令子生寸白蟲食羊肝令子多厄食鯉魚鱠及雞子令兒成疳多瘡食犬肉令子無聲音食兔肉令子唇缺食鱉令子項短及損胎食鴨子共桑椹同食令子倒生心寒食螃蟹令子橫生食雀肉合豆醬食之令子面生䵟𪒟黑子食豆醬合藿香食之墮胎食水漿絕產食雀肉令子不恥多淫食山羊肉令子多病食生薑令子多指生瘡食蛤蟆鱔魚令兒喑啞食驢騾馬肉延月難產如此之類無不驗者則知聖人胎教之法矣藥忌蚖螌水蛭地膽蟲烏頭附子配天雄躑躅野葛螻蛄類烏喙側子及虻蟲牛黃水銀並巴豆大戟蛇蛻及蜈蚣牛膝藜蘆並薏苡金石錫粉及雌雄牙硝芒硝牡丹桂蜥蜴飛生及䗪蟲代赭蚱蟬胡粉麝芫花薇銜草三稜槐子牽牛並皂角桃仁蠐螬和茅根攪根硇砂與乾漆亭長波流菵草中瞿麥䕡茹蟹爪甲蝟皮赤箭赤頭紅馬刀石蠶衣魚等半夏南星通草同乾薑蒜雞及雞子驢肉兔肉不須供切須婦人產前忌此歌宜記在心胸起居忌便產須知云勿亂服藥勿過飲酒勿妄針灸勿向非常地便勿舉重登高涉險心有大驚犯之產難子疾病勿多睡臥時時行步體虛腎氣不足生子解顱腦破不合宜溫補脾胃不和榮衛虛怯子必羸瘦自家及鄰家修造動土犯其胎氣令子破形殞命刀犯者形必傷泥犯者竅必塞打擊者色青黯繫縛者相拘攣有此等驗如影響切宜避之逐月養胎法北齊名醫徐之才云妊娠一月名始胚飲食精熟酸美受御宜食大麥毋食腥辛是謂才正妊娠一月足厥陰脈養不可針灸其經如大敦行間太衝中封五里中郄等穴是也足厥陰內屬於肝肝主筋及血一月之時血行痞澀不為力事寢必安靜無令恐畏妊娠一月陰陽新合為胎寒多為痛熱多卒驚舉重腰痛腹滿胞急卒有所下當預安之宜服烏雌雞湯烏雌雞一隻治如食法茯苓阿膠各二兩吳茱萸一升麥門冬五合去心人參芍藥白朮各三兩甘草生薑各一兩上㕮咀以水一斗二升煮雞取汁六升去雞下藥煎取三升納酒三升並膠烊盡取三升放溫每服一升日三補胎湯若曾傷一月胎者當預服此細辛一兩防風二兩乾地黃白朮各三兩生薑四兩吳茱萸大麥各五合烏梅一升上八味㕮咀以水七升煮取二升半分三服先食服寒多者倍細辛茱萸熱多渴者去之加栝蔞根二兩若有所思去大麥加柏子仁三合一方有人參一兩妊娠二月名始膏無食辛臊居必靜處男子勿勞百節皆痛是為胎始結妊娠二月足少陽脈養不可針灸其經如膽竅丘墟付陽絕骨外立陽陵泉等穴是也足少陽內屬於膽膽主精二月之時兒精成於胞里當慎護驚動也妊娠二月始陰陽踞經有寒多壞不成有熱即萎悴中風寒有所動搖心滿臍下懸急腰背強痛卒有所下乍寒乍熱宜服艾葉湯艾葉丹參當歸麻黃各二兩人參阿膠各三兩甘草一兩生薑六兩大棗十二枚上九味㕮咀以酒三升水一斗煮減半去滓內膠煎取三升分三服一方用烏雌雞一隻宿肥者治如食法割頭取血納三升酒中相和次以水一斗二升先煮取汁去雞納藥煎取三升納血酒並膠煎取三升分溫三服黃連湯若曾傷二月胎者當預服此黃連人參各一兩吳茱萸五合生薑三兩生地黃五兩一方用阿膠上五味㕮咀以酢漿七升煮取三升分四服日三夜一十日一修合若頗覺不安加烏梅一升加烏梅者不用漿直用水耳一方用當歸半兩妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視壁玉欲子賢良端坐清虛是謂外象而內感者也妊娠三月手心主脈養不可針灸其經如中衝勞宮大陵內關間使郄門曲澤等穴是也手心主內屬於心無悲哀思慮驚動妊娠三月為定形有寒大便青有熱小便難不赤即黃卒驚恐憂愁嗔怒喜頓僕動於經脈腹滿繞臍苦痛或腰背卒有所下宜服雄雞湯雄雞一隻治如食法黃芩白朮生薑各一兩麥門冬五合芍藥大棗十二枚掰甘草人參茯苓阿膠各二兩上為㕮咀以水一斗三升煮雞減半出雞納藥煮取半納清酒三升並膠煎取三升分三服一日令盡當溫臥一方用當歸芎各二兩不用黃芩生薑茯神湯曾傷三月胎者當預服此方茯神丹參龍骨各一兩阿膠當歸甘草人參各二兩大棗二十一枚掰赤小豆二百粒上九味㕮咀以酢漿一斗煮取三升分四服先食服七日後服一劑腰痛者加桑寄生二兩深師有薤白二兩麻子一升丹一婦人但有孕至三個月左右必墮其脈左手大而無力重取則澀知其血少也以其妙年只補中氣使血自榮時初夏教以濃煎白朮湯下黃芩末一錢與數十帖得保全而生因思之墮於納熱而虛者於理為多曰熱曰虛當分輕重蓋孕至三月上屬相火所以易墮不然何以黃芩熟艾阿膠為安胎妙藥也婦人經候三月驗法川芎生末濃煎湯空心下一匙腹中微動者是有胎妊娠四月始受水精以成血脈食宜稻粳羹宜魚雁是謂盛血氣以通耳目而行經絡妊娠四月手少陽脈養不可針灸其經如關衝陽池內關三陽天井曲垣等穴是也手少陽內輸三焦四月之時兒六腑順成當靜形體和心志節飲食妊娠四月有寒心下慍慍欲嘔胸膈滿不欲食有熱小便難數數如淋狀臍下苦急卒風寒頸項強痛寒熱或驚動身軀腰背腹育往來有時胎上迫胸心煩不得安卒有所下宜服菊花湯菊花雞子大一枚麥門冬一升大棗十二枚人參一兩半甘草當歸各二兩麻黃阿膠各三兩半夏四兩生薑五兩上十味㕮咀以水八升煮減半納清酒三升並阿膠煎取三升分三服溫臥當汗以粉粉之護風寒四五日一方用烏雌雞一隻煮汁煎藥調中湯若曾傷四月胎者當預服此白芍藥生薑各四兩厚朴生李根白皮枳實白朮柴胡各三兩續斷芎藭甘草各一兩當歸一兩半烏梅一升上十二味㕮咀以水一斗煮取三升分四服日三夜一八日後復服一劑妊娠五月始受火精以成其氣臥必晏起沐浴浣衣深其居處厚其衣服朝吸天光以避寒殃其食稻麥其羹牛羊和以茱萸調以五味是謂養氣以定五臟妊娠五月足太陰脈養不可針灸其經如隱白大都公孫商丘三陰交漏谷陰陵泉等穴是也足太陰內輸於脾五月之時兒四肢皆成無大飢無甚飽無食乾燥無自炙熱無大勞倦妊娠五月有熱苦頭眩心亂嘔吐有寒苦腹滿痛小便數卒有恐怖四肢疼痛寒熱胎動無常處腹痛悶頓欲僕卒有所下宜服阿膠湯阿膠四兩人參一兩生薑六兩當歸芍藥甘草黃芩各二兩旋覆花二合吳茱萸七合麥門冬一升上十味㕮咀以水九升煮藥減半內清酒三升並膠微火煎取三升半分四服日三夜一先食服便愈不瘥再服一方用烏雌雞一隻割取咽血納酒中以水煮雞汁煎藥減半納酒並膠煎取三升半分四服安中湯曾傷五月胎者當預服此黃芩一兩當歸芎藭乾地黃人參各二兩甘草芍藥各三兩生薑六兩麥門冬一升五味子大麻仁各五合大棗三十五枚上十二味㕮咀以水七升清酒五升煮取三升半分四服日三夜一七日復服一劑安胎當歸湯若妊娠五月舉動驚愕胎不安小腹痛引腰胳小便下血當歸阿膠炒川芎人參各一兩大棗十二枚艾葉一把上以酒水各三升煮至三升納膠令烊分三服一方有甘草無參棗妊娠六月始受金精以成其筋身欲微勞無得靜處出遊於野數觀走犬及視走馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂妊娠六月足陽明脈養不可針灸其經如厲兌豐隆陰市上下廉三里等穴是也足陽明內屬於胃主其口目六月之時兒口目皆成調五味食甘美無太飽妊娠六月卒有所動不安寒熱往來腹內脹滿身體腫驚怖忽有所下腹痛如欲產手足煩疼宜服麥門冬湯麥門冬一升人參甘草黃芩各二兩乾地黃三兩阿膠四兩生薑六兩大棗十五枚上八味以水七升煮減半納清酒二升並膠煎取三升分三服中間迸糜粥一方用烏雌雞一隻煮汁煎藥柴胡湯若曾傷六月胎者當預服此方柴胡四兩蓯蓉一兩白朮芍藥一作紫葳甘草麥門冬芎藭各二兩生薑六兩乾地黃五兩大棗三十枚上㕮咀以水一斗煮取三升分四服日三夜一中間進糜粥勿食生冷及堅硬之物七日更服一劑一方有黃芩二兩旋覆花湯集驗療妊娠六七月胎不安常處亦治阻病旋覆花一兩厚朴制白朮枳殼黃芩炒茯苓各三兩半夏炒一方無芍藥生薑各二兩上以水一斗煮取二升半分五服先食服日三夜二忌羊肉餳醋桃李雀肉妊娠七月始受木精以成其骨勞身搖肢無使定止動作屈伸以運血氣居處必燥飲食避寒常食稻粳以密腠理是謂養骨而堅齒妊娠七月手太陰脈養不可針灸其經如少商魚際列缺尺澤天府等穴是也手太陰內屬於肺主皮毛七月之時兒皮毛已成無大言無號哭無薄衣無洗浴無寒飲妊娠七月忽驚恐搖動腹痛卒有所下手足厥冷脈若傷寒煩熱腹滿短氣常苦頸項及腰背強蔥白湯主之蔥白長三四寸十四莖半夏麥門冬各一升旋覆花二合黃芩一兩人參一兩半甘草當歸黃耆各三兩阿膠四兩生薑八兩上十一味㕮咀以水二升煮減半納清酒三升及膠煎取四升每服一升日三夜一溫臥當汗出若不出者加麻黃二兩煮服如前法若秋後勿強責汗一方以黃雌雞一隻割咽取血納酒中煮雞取汁以煎藥杏仁湯若曾傷七月胎者當預服此杏仁甘草各二兩紫菀一兩鍾乳乾薑各三兩麥門冬吳茱萸一升粳米五合五味子三合上九味㕮咀以水八升煮取三升半分四服日三夜一中間進食七日服一劑一方用白雞一隻煮汁煎藥妊娠八月始受土精以成膚革和心靜息無使氣極是謂密腠理而光澤顏色妊娠八月手陽明脈養不可針灸其經如商陽二間合谷上下廉三里曲池肩並肩髃等穴是也手陽明內屬於大腸主九竅八月之時兒九竅皆成無食燥物無輒失食無忍大起妊娠八月中風寒有所犯觸身體盡痛乍寒乍熱胎動不安常苦頭眩痛繞臍下寒時時小便白如米汁或青或黃或使寒慄腰背苦冷而痛目䀮䀮芍藥湯主之芍藥生薑各四兩厚朴二兩甘草當歸白朮人參各三兩薤白切一升上八味㕮咀以水五升清酒四升合煮取三升分三服日再夜一一方用烏雌雞煮汁以煎藥葵子湯若曾傷八月胎者當預服此葵子二升甘草厚朴各二兩白朮柴胡各三兩芍藥四兩生薑六兩大棗二十枚上八味㕮咀以水九升煮取三升分三服日三凡十日一劑一方用烏雌雞一隻煮汁煎藥丹溪縮胎丸八九個月用之黃芩夏一兩秋七錢冬半兩酒炒白朮二兩陳皮三兩去白茯苓七錢半上為末粥丸桐子大妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自持而待之是謂養毛髮致才力妊娠九月足少陰脈養不可針灸其經如湧泉然谷太谿交信築賓伏溜等穴是也足少陰內屬於腎腎主續縷九月之時兒脈續縷皆成無處濕冷無著炙衣妊娠九月若卒得下痢腹滿懸急胎上衝心腰背痛不可轉側短氣宜服半夏湯半夏麥門冬吳茱萸當歸阿膠各三兩乾薑一兩大棗十二枚上七味㕮咀以水九升煮取三升去滓納白蜜八合微火上溫服四服痢即止一方用烏雌雞一隻煮汁煎藥豬腎湯若曾傷九月胎者當預服此豬腎一具茯苓桑寄生乾薑乾地黃芎藭各三兩白朮四兩附子中者一枚大豆三合麥門冬一升上㕮咀以水一斗煮腎令熟去腎納諸藥煎取三升半分四服日三夜一十日更一劑丹溪縮胎丸九個月用之黃芩一兩宜熱藥不宜涼藥怯人減半枳殼炒七錢半滑石七錢半臨月十日前小便多時加此一味白朮一兩上為末粥丸如桐子大每服三十丸空心熱湯下妊娠十月五臟俱備六腑齊通納天地氣于丹田故使關節人神皆備但俟時而生妊娠一月始胚二月始膏三月始胞四月形體成五月能動六月筋骨立七月毛髮生八月臟腑具九月穀氣入胃十月諸神備日滿即產矣宜服滑胎藥入月即服滑胎枳殼散瘦胎易生湖陽公主每產累日不下南山道士進此方商州枳殼二兩粉草一兩上為細末百沸湯點二錢服空心日三服凡懷孕七八個月以上服之令兒易生初生胎小微黑百日以後漸漸變白此雖孫真人滑胎易產方然抑陽降氣為眾方之冠此方分兩出必用方以此為正一方枳殼六兩甘草一兩故加枳殼減甘草蓋未產人甘草性寒故而未產前一月日可三服忌登高廁一方有糯米半升淘洗控干同炒為末米飲或白湯調下一二錢溫隱居加當歸木香各等分張氏方治妊娠胎肥壅隘動止艱辛臨月服之縮胎易產兼治腸中諸疾下氣寬膈枳殼五兩甘草一兩半香附子三兩炒去毛為末姜煎湯點亦可如丈夫婦人冷氣攻刺脅肋疼痛者用蔥白三寸同煎服婦人脾寒血氣成塊作痛熱酒調服大小便不通白牽牛末煎湯調服選奇方香附子枳殼各二兩甘草半兩內補丸治妊婦衝任脈虛補血安胎熟地黃二兩當歸微炒一兩上為細末煉蜜和丸如梧子大溫酒下三四十丸許學士云大率婦人妊娠唯在抑陽助陰素問云陰搏陽別謂之有子蓋關前為陽關後為陰尺中之脈按之搏手不絕者妊身也婦人平居陽氣微盛無害及其妊子則方閉經隧以養胎若陽氣盛搏之則經脈妄行胎乃不固素問所謂陰虛陽搏謂之崩也抑陽助陰之方甚多然胎前藥唯惡群隊若陰陽交錯別生他病唯是枳殼散所以抑陽四物湯所以助陰故爾然枳殼散差寒若單服之恐有胎寒腹痛之疾以內補丸佐之則陽不致強陰不致弱陰陽調停有益胎嗣此前人未嘗論及也易產滑胎散其藥性滑利小便以車前子為末酒調服方寸匕不能飲者水調詩云采采芣苡能令婦人樂有子矣陸機注云治婦人產難故也神寢丸瘦胎滑利易產臨入月服之極有神效知蘄州施少卿方蘄州徐太丞傳通明乳香別研半兩枳殼一兩上為細末煉蜜丸如梧子大空心溫酒吞下三十丸懷孕九月以後方可服崔氏方名寐生丸乳香只二錢半酒糊丸榆白皮散治妊娠滑胎易生榆白皮甘草各二兩葵子一兩上為粗末每服二錢水一盞煎至七分去滓溫服一方無榆皮名葵子散主孕九個月將產消息豬肚一具全如法用蔥五味煮熟食食如不盡更食以盡為度不得與別人食無效保氣飲安胎寬氣進食瘦胎易產設或居處失宜偶然頓僕胎動胎痛漏胎下血兼服佛手散見胎產大法神寢丸枳殼散並見上此三方入月內大宜常服香附子四兩山藥二兩縮砂仁一兩粉草一兩二錢半益智仁紫蘇葉各半兩木香四錢上為細末以白湯點服二錢無憂散治妊娠身居富貴口厭肥甘憂喜不常食物不節既飽便臥致令胞胎肥厚根蒂堅牢行動艱難因致臨產難生入月可服無憂散則易生矣當歸川芎白芍藥枳殼乳香各三錢木香甘草血餘即發灰以豶豬心血和之各一錢半上為末每服二錢水煎日進兩服丹溪云世之難產者往往見於鬱悶安佚之人富貴豢養之家若貧賤辛苦者未有也古方書止有瘦胎飲一論而其方為湖陽公主作也實非極至之言何者見其有用此方者其難自若予表妹苦於難產後遇胎孕則觸而去之予甚憫焉視其形惟勤於針指構思旬日忽自悟曰此正與湖陽公主相反彼奉養之人其氣必實耗其氣使平和故易產今形肥知其氣虛久坐知其不運必氣愈弱兒在胞胎因母氣不能自運耳當補其母之氣則兒健易產矣令其有孕至五六個月來告遂於大全方紫蘇飲加補氣藥與數十帖因得男而甚快後遂以此方隨母形色性稟參時令加減與之無不應者因名其方曰達生散縮胎飲即達生散大腹皮三錢人參陳皮紫蘇莖葉各五分白芍白朮歸身尾各一錢甘草二錢炙黃楊樹腦七個或加枳殼縮砂青蔥五葉上作一帖吞下益母丸臨月得二十服易生產後無病按丹溪云難產死胎此血氣滯病也蓋此方補中行滯春加川芎氣虛倍參術氣實倍香附陳皮血虛加當歸地黃形實倍紫蘇性急加黃連熱急加黃芩濕痰加滑石半夏食積加山楂食後易飢加黃楊腦腹痛加木香官桂黃芩冬不用芩黑神丸一名催生丸一名益母丸用益母草研末粥丸治婦人臨月一日三次服之用縮砂飲送下能催生易產產後服能生新血去舊血只以白湯送下虛者煎白朮人參陳皮湯送下惡阻痰逆不食惡阻謂嘔吐噁心頭眩惡食擇食是也千金凡婦人虛羸血氣不足腎氣又弱或當風飲冷太過心下有痰水者欲有胎而喜病阻所謂欲有胎者其人月水尚來顏色肌膚如常但苦沉重憒悶不欲食飲又不知其患所在脈理順時平和則是欲有娠也如此經二月日後便覺不通則結胎也阻病者患心中憒憒頭重眼眩四肢沉重懈惰不欲執作惡聞食氣欲啖鹹酸果實多臥少起世謂惡食其至三四月日以上皆大劇吐逆不能自勝舉也此由經血既閉水漬於臟臟氣不宣通故心煩憒悶氣逆而嘔吐也血脈不通經絡痞澀則四肢沉重挾風則頭目眩也覺如此候者便宜服半夏茯苓湯數劑後將茯苓丸痰水消除便欲食也既得食力體強氣壯力足養胎母便健矣大全妊娠稟受怯弱便有阻病其狀顏色如故脈息和順但覺肢體沉重頭目昏眩擇食惡聞食氣好食鹹酸甚者或作寒熱心中憒悶嘔吐痰水恍惚不能支持巢氏謂之惡阻但證有輕重耳輕者不服藥亦不妨重者須以藥療之千金方以半夏茯苓湯茯苓丸專治阻病然此二藥比來少有服者以半夏有動胎之性蓋胎初結慮其易散此不可不謹也張仲景傷寒論有用黃龍湯者小柴胡湯中去半夏是也此蓋為妊娠而設焉王子亨則有白朮散局方則人參丁香散楊振則有人參橘皮湯齊士明則有醒脾飲皆不用半夏用之多效李茂翁云若左脈弱而嘔服諸藥不止者當服理血歸原藥則愈經云無陰則嘔是也薛前證若中脘停痰用二陳湯加枳殼若飲食停滯用六君子加枳殼若脾胃虛弱用異功散若胃氣不足用人參橘皮湯兼氣惱加枳殼胸脅痞悶再加蘇梗脅痛再加柴胡若飲食少思用六君子加紫蘇枳殼頭暈體倦用六君子湯若脾胃虛弱嘔吐不食用半夏茯苓湯蓋半夏乃健脾氣化痰滯之主藥也脾胃虛弱而嘔吐或痰涎壅滯飲食少思胎不安必用茯苓半夏湯倍加白朮然半夏白朮茯苓陳皮砂仁善能安胎氣健脾胃予嘗用之驗矣痰逆不食證因食停滯用半夏茯苓湯加枳殼兼氣惱更加柴胡因痰壅滯用半夏茯苓湯加白朮因風寒外傷用參蘇飲飲食腹脹用香砂六君子湯寒熱嘔吐人參養胃湯一妊娠嘔吐惡食體倦嗜臥此胃氣虛而惡阻也用人參橘皮湯二劑漸愈又用六君加紫蘇二劑而安一妊娠吞酸噁心時欲作嘔此因脾胃虛而飲食停滯用六君加枳殼香附治之而愈一妊婦停食腹滿嘔吐吞酸作瀉不食余以為飲食停滯兼肝木傷脾土用六君子湯以健脾胃加蒼朮厚朴以消飲食吳茱萸所制黃連以清肝火諸證悉愈又以六君加砂仁調理而脾土乃安一妊婦嘔吐脅脹或寒熱往來面色青黃此木旺而克脾土用六君子加柴胡桔梗枳殼而安一妊婦嘔吐酸水胸滿不食此脾土虛而肝木所侮用六君子加芍藥而愈一妊婦胸腹膨脹吐痰不食此脾胃虛而飲食為痰用半夏茯苓湯漸愈又用六君子加枳殼蘇梗桔梗而飲食如常後因恚怒脅脹不食吐痰噁心用半夏茯苓湯加柴胡山梔而愈汪石山治一婦形質瘦小面色近紫產後年餘經水不通首夏忽病嘔吐手指麻痹拳不能伸展聲音啞小噦不出聲醫皆視為風病危之汪診脈皆細微近滑曰此妊娠惡阻病也眾謂經水不通安有妊理汪曰天下之事有常有變此乃事之變也脈雖細微似近於滑又尺按不絕乃妊娠也遂以四君子加二陳治之諸證俱減尚畏粥湯惟食干糕香燥之物而有生意給事遊讓溪夫人病新愈月餘經事不行嘔噦眩暈飲食艱進醫以為二陽之病發心脾女子不月法在不治江瓘診之尺脈雖小按之滑而不絕此妊而惡阻非凶候也六君加砂仁數服而安後產一女金匱婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之於法六十日當有此證設有醫治逆者卻一月加吐下者則絕之婁全善曰絕之者謂絕止醫治候其自安也予嘗治一二婦阻病吐愈治愈逆因思仲景絕之之旨遂停藥月餘自安真大哉聖賢之言也萬全方云凡妊娠惡食者以所思食任意食之必愈仲景云妊娠嘔吐不止乾薑人參半夏丸主之乾薑人參半夏丸乾薑人參各一兩半夏湯洗去滑二兩上三味末之以生薑汁糊為丸如梧子大飲服十丸日三服半夏茯苓湯治妊娠惡阻嘔吐心煩頭目眩暈惡聞食氣好食酸鹹多臥少起百節煩疼羸瘦有痰胎孕不牢半夏洗一兩二錢半赤茯苓熟地黃各七錢半橘紅旋覆花千金方無旋覆有細辛紫蘇人參芍藥川芎桔梗甘草各半兩上㕮咀每服五錢姜七片水煎空心服兼服茯苓丸若有客熱煩渴口瘡去橘紅細辛加前胡知母七錢半若腹冷下痢去地黃加炒桂心半兩若胃中虛熱大便秘小便赤澀加大黃七錢半去地黃加黃芩二錢五分茯苓丸治妊娠阻病心中煩悶吐痰眩暈先服半夏茯苓湯兩劑後服此藥赤茯苓人參桂心乾薑半夏湯泡七次炒黃橘皮各一兩白朮葛根甘草枳殼各二兩上為細末煉蜜丸如桐子大每服五十丸米飲下日三服一方加麥門冬肘後加五味子療妊娠心胸支滿痰逆不思飲食赤茯苓前胡白朮紫蘇葉各一兩半夏麥門冬人參大腹皮各半兩上為粗末每服四錢水一盞姜五片煎至七分去滓溫服一方無腹皮人參有大腹子檳榔療妊娠心膈氣滯嘔吐不下飲水心神虛煩四肢少力枇杷葉半夏麥門冬人參甘草半兩訶子肉藿香各一兩赤茯苓枳殼陳皮各七錢半上㕮咀每服三錢水一盞姜三片棗一枚煎至七分去滓溫服一方無訶子及棗集驗療婦人妊娠惡阻嘔吐不下食青竹茹橘皮各三兩生薑茯苓各四兩半夏五兩上細切以水六升煮取二升半去滓分三服不瘥頻服忌羊肉餳鮓等物旋覆半夏湯治妊娠惡阻吐逆酸水惡聞食氣多臥少起旋覆花去枝萼川芎細辛去土人參甘草炙各七分當歸去蘆半夏湯泡赤茯苓去皮乾生薑陳皮去白各一錢五分上作一服水二盅姜五片煎至一盅不拘時服旋覆花湯治妊娠六七個月胎不安嘔吐旋覆花五分厚朴白朮枳殼黃芩茯苓各一錢五分半夏芍藥生薑各一錢上作一服水二盅煎至一盅食前服上諸方並用半夏蓋取其辛以散結氣瀉逆氣故嘔惡自止非專為痰設也婁全善曰大全方論半夏動胎而不用仲景方乃用之予治妊娠阻病累用半夏未嘗動胎也經云有故無殞是也白朮散治惡阻吐清水甚者害十餘日水漿不入白朮一兩人參半兩丁香二錢半甘草一錢上為細末每服二錢水一盞姜五片煎至七分溫服人參丁香散二方治妊娠惡阻胃寒嘔逆翻胃吐食及心腹刺痛人參丁香藿香葉各二錢半上為散每服三錢水一盞煎七分去滓溫服無時又方人參丁香柿蒂各二兩甘草良薑各半兩上為細末每服二錢熱湯點下無時醒脾飲子治妊婦阻病嘔逆不食甚者中滿口中無味或作寒熱此出王氏博濟方草豆蔻以濕紙裹灰火中煨令紙干取出去皮用厚朴薑製各半兩乾薑一兩甘草一兩二錢半上為細末每服二大錢水一大盞棗二枚生薑三片煎至八分去滓呷服病輕者只一兩服便能食舊有橘紅二兩治寒熱瘧痢不食後人去橘皮以乾生薑代乾薑治老人氣虛大便秘少津液引飲有奇效產科醫官齊士明依舊用乾薑去橘皮亦名醒脾飲子治阻病極神驗上諸方與前茯苓丸並用丁香乾薑惟中寒脈遲者宜之人參橘皮湯治阻病嘔吐痰水人參橘皮白朮麥門冬去心各一兩甘草三錢厚朴制白茯苓各五錢為粗末每四錢加淡竹茹彈子大姜三片水同煎治妊娠嘔吐不食兼吐痰水生蘆根七分橘紅四分生薑六分檳榔二分枇杷葉三分上切水二盞煎七分空心熱服治妊娠惡食心中煩憒熱悶嘔吐青竹茹麥門冬各三兩前胡二兩橘皮一兩蘆根一握如體熱四肢煩熱者加地骨皮一握上切細以水一大升煮半升去渣分兩服食前上諸方內用門冬竹茹蘆根皆氣涼而性和有熱無寒者通用之平劑也治妊娠惡食古今錄驗方人參四兩厚朴生薑枳殼甘草各二兩水六升煮取三升分三服歸原散治妊娠惡阻嘔吐不止頭痛全不入食服諸藥無效者用此藥理血歸原則愈人參甘草川芎當歸芍藥丁香各半兩白茯苓白朮陳皮各一兩五錢桔梗炒枳殼去瓤炒各二錢半半夏湯洗七次切炒黃一兩上㕮咀每服三錢生薑五片棗一枚水同煎安胎飲治懷胎三月四月至九個月日嘔吐痰水心中憒悶頭重目眩惡聞食氣或胎動不安腰腹疼痛或時下血及妊娠一切疾病並皆治之甘草茯苓當歸熟地黃川芎白朮黃耆白芍藥半夏湯泡七次切炒阿膠切粉炒地榆各等分上㕮咀每服三錢生薑四片水煎溫服無時候一方無半夏地榆有人參桑寄生一方無耆朮半夏地榆有艾葉只是膠艾湯加白茯苓小地黃丸治妊娠噁心嘔吐清水腹疼不食人參去蘆乾薑炮各等分上為細末以生地黃汁和為丸如桐子大每服五十丸食前米飲送下上方並理血之劑李茂翁所謂左脈弱而嘔服諸藥不止者服理血歸原藥則愈即此類是也保生湯治婦人經候不行身無病而似病脈滑大而六脈俱勻乃是孕婦之脈也精神如故惡聞食臭或但嗜一物或大吐或時吐清水此名惡阻切勿作寒病治之宜服此藥如覺噁心嘔吐加丁香生薑煎服溫隱居方人參甘草各二錢半白朮香附子烏藥橘紅各半兩上㕮咀每服三大錢水一盞半姜五片煎至七分去滓溫服無時或作末子調服白朮散治妊娠胎氣不和飲食少進白朮炒紫蘇各一錢人參二錢青皮去白訶子肉川芎各八分甘草炙半錢上作一服水二盅姜三片煎至一盅不拘時服二香散治妊娠胎動不安氣不升降飲食不美嘔吐酸水起坐覺重香附子一兩藿香葉甘草各三錢上為細末每服二錢不拘時沸湯調下補遺予嘗給妊婦惡阻嘔吐不食頭暈不敢行步以苦柚皮濃煎湯飲數盞而愈吐甚者加薑汁又方縮砂仁末每二錢薑湯調下或米飲調上方並理氣之劑氣虛者首二方為宜氣不順者第三方為宜婁一婦人孕三月吐痰水並飲食每日寅卯時作作時覺少腹有氣衝上然後膈滿而吐面赤微躁頭眩臥不起床四肢疼微渴此肝火挾衝脈之火衝上也一日甚一日輕脈和右寸洪大百藥不效將二月予男病偶用沉香磨水化抱龍丸一服膈寬氣不上衝二三服吐止眩減食進而安又應氏婦嘈雜吐食脈壅心下滿塞氣攻背兩肘皆痛要人不住手以熱物摩熨得吐稍疏脈洪大處此方黃連一錢黃芩二錢半各炒白朮半夏各一錢甘草炙縮砂各五分陳皮當歸山梔枳殼炒香附人參蒼朮各一錢茯苓一錢半生薑七片服二帖後嘈雜吐止心滿塞退但於夜間背肘痛用摩熨遂與抱龍丸化服其疾如失丹一婦人年近三十懷孕兩月病嘔吐頭眩自覺不可禁持以人參白朮川芎陳皮茯苓等藥服五七日愈覺沉重召予脈之兩手弦左為甚而且弱予曰此是惡阻病必怒氣所激問之果然肝氣既逆又挾胎氣參術之補大非所宜教以時用茯苓湯下抑青丸二十四粒五帖自覺稍安診其脈略有數狀自言口乾苦稍食粥則口酸予意其為膈間滯氣未盡行教全以川芎陳皮山梔茯苓生薑煎湯下抑青丸十五粒十餘帖餘證皆平但食及常時之半食後覺口酸不食覺易飢予謂肝熱未平則以白湯下抑青丸二十粒二十日而安予又脈之見其兩手脈雖和平而左手弱甚此胎必墮此時肝氣既平參術可用矣遂用始初參術等藥補之預防墮胎以後之虛服之一月胎自墮卻得平穩無事抑青丸一味黃連為丸是也胎動不安大全妊娠胎動不安者由衝任經虛受胎不實者亦有飲酒房室過度損動不安者有誤擊觸而胎動者有喜怒氣宇不舒傷於心肝觸動血脈者有信醫宜服暖補反為藥所害者有因母病而胎動者但治母病其胎自安有胎不堅固動及母疾但當安胎其母自愈當以母形色察之若面赤舌青兒死母活面青舌赤口中沫出母死子活若唇口青兩邊沫出者子母俱死薛前證胎氣鬱滯者用紫蘇飲脾氣虛弱者六君子湯加蘇枳鬱結傷脾者歸脾湯加柴梔鬱怒傷肝脾者四七湯加芎歸怒動肝火者加味小柴胡湯若胎已死急用平胃散加朴硝腐化之永固孕湯地黃川芎黃芩各五分歸身尾人參白芍藥陳皮各一錢白朮一錢半甘草三錢黃柏少許桑上羊食藤圓者七葉糯米十四粒上㕮咀水煎服金匱婦人妊娠宜常服當歸散主之當歸散當歸黃芩芍藥芎藭各四兩白朮半斤上五味杵為散酒飲服方寸匕日再服妊娠常服即易產胎無苦疾產後百病悉主之妊娠養胎白朮散主之白朮散白朮芎藭各一兩蜀椒七錢半去汗牡蠣半兩上四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下毒痛倍加芎藭心煩痛吐不能飲食加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之復不解者小麥汁飲之已後渴者大麥粥服之病雖愈服之勿置集驗方療妊娠二三月上至八九月胎動不安腹痛已有所見方艾葉阿膠當歸川芎各三兩甘草一兩上細切以水八升煮取三升去滓納膠令烊分三服日三千金文仲備急同四物湯加熟艾阿膠茯苓治一切胎動不安安胎當歸湯治妊娠五月舉動驚愕胎動不安下在小腹痛引腰脅小便疼下血見前逐月養胎阿膠散二方治妊娠或因頓僕胎動不安腰痛腹滿或有所下或胎上搶心熟地黃二兩白芍藥艾葉當歸甘草阿膠黃耆各一兩一方有川芎上㕮咀每服半兩姜三片棗一枚水同煎又方治妊娠胎動不安心神虛煩腹內痛阿膠杵碎炒黃燥人參川芎以上各一兩白茯苓麥門冬去心柴胡去苗以上各七錢半甘草炙當歸銼炒黃芩各半兩上件為末每服四錢以水一中盞生薑半分棗三枚同煎六分去滓熱服立效散治婦人胎動不安如重物所墜冷如冰川芎當歸各等分上為粗末秤三錢水煎食前溫服產寶治妊娠無故胎動不安腹內絞痛煩悶當歸桑寄生各一兩川芎七錢半豉八合阿膠五錢蔥十四莖上以水二升煮取八合下膠烊溫分二服空心服一方無豉用銀器煎集驗無寄生豉有續斷七錢半銀多少先煎後入藥養生必用治胎動方救急療胎動去血腰腹痛阿膠川芎當歸青竹茹各二錢上以水十盞納銀一斤煮至五盞去銀入上件藥三味煮至二盞半去滓入膠再煎膠烊分溫三服空心自早至暮盡未效再作寄生湯治胎氣常不安及五個月以後胎不安桑寄生洗銼秦艽阿膠各半兩糯米粉半兩上以新汲水三升先下寄生秦艽二味煮至二升去滓次入阿膠糯米再煮約一升止分三服空心食前日午服之忌酒醋三五日妊娠胎氣至五月以後常不安者服之必效頃見妊婦好飲酒食鹹酸五辛胎必動不可不知黃耆湯治胎動不安腹痛下黃汁糯米一合黃耆川芎各一兩上細銼水二大盞煎至一盞三分溫服順氣飲子產前服之安胎紫蘇葉木香炮人參草豆蔻茯苓各一兩甘草一兩大腹子一兩如氣弱者不用上㕮咀每服三錢水一盞苧根三寸糯米少許煎至七分去滓溫服安胎寄生湯文仲療血流下方桑寄生白朮各一兩二錢半茯苓一兩甘草二兩半上切以水五升煮取二升半分三服若人壯者可加芍藥二兩足水二升若胎不安腹痛端然有所見加乾薑一兩即安忌海藻菘菜酢物桃李雀肉等秦艽湯指迷治胎動不安秦艽阿膠炒艾葉上等分為粗末每服五錢水二盞糯米百粒煎至一盞去滓溫服小品止痛湯療妊娠重下痛引腰背安胎當歸阿膠炙乾地黃黃連芍藥各一兩雞子一枚秫米一升上七味以水七升攪雞子令相得煮秫米令如蟹目沸去滓納諸藥煮取三升分四服忌蕪荑經心錄同黃芩湯治婦人胎孕不安黃芩白朮各半兩當歸二錢上作一服水二盅煎至一盅不拘時服釣藤湯治妊娠八九月胎動不安心腹㽲痛面目青冷汗出氣欲絕此由勞動用力傷胎宮宜急治之釣藤鉤當歸茯神人參各一兩苦梗一兩半桑寄生半兩上為粗末每服五大錢水二盞煎至一盞去滓溫服無時候忌豬肉菘菜若煩熱加石膏二兩半臨產月加桂心一兩刪繁療婦人懷妊胎動不安蔥豉安胎湯香豉一升熬蔥白一升阿膠二兩炙先以水三升煮蔥豉取一升去滓入膠再煎令烊服一日一夜可服三四劑經心錄同始妊娠胎動不安護胎法鯉魚二斤粳米一升蔥一握豉姜上作臛食之每月一度安胎織罩散白藥子一兩白芷半兩上為細末每服二錢煎紫蘇湯調下或胎熱心煩悶入砂糖少許煎銀苧酒治妊娠胎動欲墮腹痛不可忍方苧根二兩銼銀五兩清酒一盞上以水二大盞煎至一大盞去滓分溫二服治胎動不安用好銀煮取水著蔥油作羹食之佳又方川芎二兩蔥白一升上以水七升煮取二升半分溫三服療妊娠後不轉動方阿膠炙一兩桑寄生半兩上為末以酒一升煮五沸下生雞卵一枚酒中分溫二服空心食前小品方無寄生有艾葉只用水煎肘後治胎動不安取苧根如足大指者一尺㕮咀以水五升煮取三升去滓服一方有生薑五片丹溪云苧根大能補陰而行滯血縮砂散治胎動不安墮在須臾者神效方見毒物傷胎又方川芎二兩蔥白五兩水三碗煮二碗半分三服治妊娠因失所動困絕方取竹瀝飲一升立愈鯉魚臛方治妊娠胎動不安心腹刺痛鯉魚一斤修事淨細切阿膠一兩杵碎炒黃燥糯米二合上件以水二升入魚膠米煮令熟入蔥白生薑橘皮鹽少許更煮五七沸食前吃如有所傷且吃五七日效治妊娠胎動煩悶不安甚方取生地黃杵絞汁每服一小盞煎令沸入雞子白一枚攪令勻頓服治妊娠胎動晝夜叫呼口噤唇搴及下重痢不息方艾葉五兩上以好酒五升同煮取四升去滓更煎取一升服口閉者開口灌之藥下即瘥胎上逼心即子懸薛胎上逼心之證若氣逆胎上用紫蘇飲飲食不甘兼以四君子若內熱晡熱兼以逍遙散若胃火所致用四君黃芩枳殼柴梔若脾郁所致用歸脾湯加柴梔枳殼一妊婦每因恚怒其胎上逼左關脈弦洪乃肝火內動用小柴胡加茯苓枳殼山梔而愈但體倦不食用六君子調養脾土加柴胡枳殼調和肝氣乃瘥一妊婦胎上逼胸滿噯氣飲食少思此脾氣鬱滯用紫蘇飲頓安又用四君子加枳殼柴胡山梔而瘥程文彬治孕婦七個月胸膈飽悶氣喘忽吐出一物如小腸寸許舉家驚疑其胎爛程至診得寸口脈洪滑知其氣盛血少胎氣湊上中焦蓄有濕熱濕生痰知所吐之物乃痰結聚病名子懸以紫蘇飲加芩連貝母十劑獲痊本事方紫蘇飲治妊娠胎氣不和懷胎近上脹滿疼痛謂之子懸兼治臨產驚恐氣結連日不下一方無芎名七寶散紫蘇莖葉一兩大腹皮人參川芎陳皮白芍藥各半兩當歸七錢半甘草二錢半上細銼分作三服每服用水一盞半生薑四片蔥白七寸煎至七分去渣空心服曾有一婦累日產不下服遍催生藥不驗予曰此必坐草太早心懷一點懼氣結而不行然非不順也素問云恐則氣下蓋恐則精神怯怯則上焦閉閉則氣還還則下焦脹氣乃不行矣得此藥一服便產及婦人六七月子懸者予用此數數有驗不十服胎便近下陳良甫治一婦有孕七個月遠歸忽然胎上衝心而痛坐臥不安兩醫治之無效遂說胎已死矣用蓖麻子研爛加麝香調貼臍中以下之命在垂亡召陳診視兩尺脈絕他脈平和陳問二醫作何證治之答曰死胎也陳曰何以知之曰兩尺脈沉絕以此知之陳曰此說出何經二醫無答陳曰此子懸也若是胎死卻有辨處面赤舌青子死母活面青舌赤吐沫母死子活唇口俱青母子俱死今面不赤口不青其子未死是胎上逼心宜以紫蘇飲子治之至十服而胎近下矣當歸湯治妊娠胎動蕩心悶絕煩躁口乾橫生倒產上衝下築迷悶唇口青黑手足厥冷產科名保安散一方無甘草有川芎厚朴產寶方有川芎當歸阿膠炒甘草各一兩人參一兩半連根蔥白一根上細銼水二升煎四味至升半去滓下蔥再煎減三合溫服一劑分為二三服大聖散治妊娠忪悸睡夢多驚心腹脹滿連臍急痛胎上逼見驚悸治胎上逼心煩悶方又治妊娠六七月以後胎動困篤用蔥白二七莖濃煮汁飲之若胎未死即安已死即出未效再服婁全善云此方神妙脈浮滑者宜之本草云蔥白通陽氣安胎秘錄治胎動上逼心痛取艾葉如雞子大以頭醋四升煎取二升分溫服又治胎上逼心熱痛下血神麯半斤搗碎和熟水絞取汁三盅無進溫服止治妊娠遍身痛或衝心欲死不能飲食白朮五兩黃芩二兩芍藥四兩上水六升煮取二升半分作三服緣胎有水致痛兼易產文仲葛氏療妊娠卒胎上迫心痛方取弩弦急帶之立愈膠艾湯見血崩保生丸大法妊娠經來漏胎下血脈經婦人經月下但為微少師脈之反言有軀其後審然其脈何類何以別之師曰寸口脈陰陽俱平榮衛調和按之滑浮之則輕陽明少陰各如經法身反灑淅不欲食飲頭痛心亂嘔噦欲吐呼則微數吸則不驚陽多氣溢陰滑氣盛滑則多實六經養成所以月見陰見陽精汁凝胞散散者損墮設復陽盛雙妊二胎今陽不足故令激經也滑脈主血有餘今經又少故知孕也大抵妊娠經來不多而飲食精神如故六脈和緩滑大無病者血盛有餘也兒大能飲自不來矣大全夫妊娠漏胎者謂妊娠數月而經水時下也此由衝任脈虛不能約制手太陽少陰之經血故也衝任之脈為經絡之海起於胞內手太陽小腸脈也手少陰心脈也是二經為表裡上為乳汁下為月水有娠之人經水所以斷者壅之養胎蓄之以為乳汁也衝任氣虛則胞內泄不能制其經血故月水時下亦名胞漏血盡則人斃矣又有因勞役喜怒哀樂不節飲食生冷觸冒風寒遂致胎動若母有宿疾子臟為風冷所乘氣血失度使胎不安故令下血也曾有以娠婦月信不絕而胎不損問產科熊宗古答曰婦人血盛氣衰其有必肥既娠之後月信當來而胎不動若據晚進觀之便以為漏胎若作漏胎治之則胎必墮若不作漏胎治則其未必墮今推宗古之言誠有旨也巢氏云婦人經閉不利別無所苦者是謂有子以其經血蓄之以養胎擁之為乳汁也有子之後蓄以養胎矣豈可復能散動耶所以然者有妊而月信每至是亦未必因血盛也若謂婦人榮經有風則經血喜動以其風勝則可也既榮經為風所勝則所來者非養胎之血以此辨之若作漏胎治之必服保養補胎之藥且胎不損強以藥滋之乃所謂實實虛虛也其胎終墮宜矣若醫者知榮經有風之理專以一藥治風經信可止或不服藥胎亦無恙然而有胎本不固而因房室不節先漏而後墮者須作漏胎治之此又不可不審也丹胎漏因氣虛因血虛因血熱薛前證若因風熱用防風黃芩丸若因血熱用加味逍遙散若因血虛用二黃散若因血去太多用八珍湯未應補中益氣湯若因肝火用柴胡山梔散若因脾火用加味歸脾湯若因事下血作痛用八珍湯加阿膠熟艾若因脾胃虛弱用補中益氣湯加五味子若因脾胃虛陷用前湯倍用升麻柴胡若晡熱內熱宜逍遙散妊娠卒然下血若因怒氣用小柴胡湯若因風熱用一味防風丸若因血熱用一味子芩丸若因脾氣虛弱用六君子湯若因中氣下陷用補中益氣若氣血盛而下血者乃因兒小飲少也不必服藥一妊婦下血服涼血之藥下血益甚食少體倦此脾氣虛而不能攝血余用補中益氣湯而愈後因怒而寒熱其血仍下此肝火旺而血沸騰用加味逍遙散血止用補中益氣湯而安一妊婦下血發熱作渴食少體倦屬脾氣虛而肝火所侮用四君子加柴胡山梔血止因怒復作用六君加柴胡山梔升麻而安一妊娠六月每怒下血甚至寒熱頭痛脅脹腹疼作嘔少食余謂寒熱頭痛乃肝火上衝脅脹腹痛乃肝氣不行作嘔少食乃肝侮脾胃小便下血乃肝氣火血熱用小柴胡加芍藥炒黑山梔茯苓白朮而愈一妊娠六月體倦食少勞役下血用六君加當歸熟地黃柴胡升麻而愈江應宿治王祠部安人孕三月腰腹遞痛漏下不止氣湧脹悶速江診視六脈弦數平昔脈極沉細此必怒動肝火挾相火而生內熱喜脈不滑未至離經猶可保也以條芩白朮枳殼香附茯苓阿膠白芍當歸陳皮煎調鹿角煅酒淬細末一錢更進抑青丸一服痛已數劑平復仲景云婦人有漏下者有半產後因續下血都不絕者有妊娠下血者假令妊娠腹中痛為胞阻芎歸膠艾湯主之方見血崩大全方治妊娠三四月腹痛時時下血續斷二兩艾葉當歸乾地黃各六兩竹茹阿膠雞蘇各一兩水一升煎取六合空心再服廣濟安胎胎病漏血腹痛當歸川芎阿膠炙人參各一兩大棗二十個上切以水三升酒四升煮二升半分三服五日一劑頻服三四劑無妨濟生如聖湯治胎動腹痛或為漏胎鯉魚皮當歸酒浸熟地黃酒蒸白芍藥阿膠蚌粉炒川芎續斷酒浸甘草炙各等分一方有乾薑竹茹上㕮咀每服四錢水一盞苧根少許姜五片煎溫服濟生有續斷無干薑竹茹桑寄生散治胎漏經血妄行淋瀝不已桑寄生當歸去蘆酒浸川芎川續斷酒浸阿膠蛤粉炒香附子炒去毛茯神去木白朮各一錢人參甘草炙各半錢上作一服水二盅生薑五片煎至一盅不拘時服鄭氏人參散治漏胎敗血湊心日漸胎干子母危困人參黃耆炙阿膠炒各五錢竹茹木香炙甘草附子炮各半錢川芎陳皮苧根各二錢半生薑三錢炮黑上㕮咀每四錢糯米三七粒水煎熱服忌生冷雞鴨魚面梅師治胎動下血心腹疼死生不知服此湯活即安死即下即催生佛手散方見胎產大法即川芎當歸等分為散也妊娠無故卒下血不止取阿膠三兩炙搗末酒一升半煎令消一服愈羅氏立聖散治妊娠下血不止雞肝三個用酒一升煮熟共食之大效二黃散治胎漏生地黃熟地黃等分銼水三盞煎半乾去滓服治胎漏下血阿膠二兩搗末生地黃半斤搗取汁以清酒三升絞汁分三服治胎漏下血不止胎干即死宜急治之生地黃汁一升陳酒五合上同煎三五沸溫三服以止為度地黃湯治經血妄行及鼻衄不止生地黃酒擂取汁半兩薄荷三錢甘草一錢上二味為末新汲水合地黃汁調食後服續易簡治漏血用野苧根二兩銼炒家種亦可金銀各一兩許為一劑酒水平煎耗半溫服若閃攧胎動欲漏砂仁皮炒令熱透為末二錢酒或鹽湯下保命枳殼湯治婦人胎漏下血及因事下血枳殼黃芩各半兩白朮一兩上為粗末每服七錢水一盞煎七分食前服子芩丸治肝經有熱妄行下血細條黃芩炒為末每服一錢以秤錘燒赤淬酒熱調服若脾胃虛不宜用防風丸治肝經有風以致血得風而流散不歸經用防風為末每服一錢白湯調服防風黃芩丸治肝經有風熱致血崩便血屎血用條芩炒焦防風等分為末酒糊丸桐子大每服三五十丸食遠或食前米飲或溫酒送下仲景云婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者為癥痼害妊娠六月動者前三月經水利時胎下血者後斷三月衃也所以血不止者其癥不去故也當下其癥桂枝茯苓丸主之桂枝茯苓丸方桂枝茯苓牡丹去心桃仁去皮尖熬芍藥各等分上五味末之煉蜜和丸如兔屎大每日食前服一丸不知加至三丸治胎下血不止取桃樹上幹不落桃子燒灰和水服瘥本草云桃奴破血又治伏梁積氣榆白皮散治妊孕胎漏去血恐其難產常宜服之榆白皮葵根瞿麥各二錢大麻仁去殼木通各一錢牛膝去蘆酒浸焙一錢半上作一服水二盅煎至一盅不拘時服胎漏黃汁下或如豆汁薛前證肝脾濕熱用升陽除濕湯血崩肝脾風熱用加味逍遙散肝脾鬱怒用加味歸脾湯脾胃氣虛用錢氏白朮散若脾氣下陷用補中益氣湯肝經風熱用防風黃芩丸風入腸胃用胃風湯一妊娠因怒胸膈不利飲食少思服消導順氣之劑脾胃愈弱飲食愈少大便不實且無度久而便黃水或帶白視其面色黃中隱白余曰黃色脾虛也白色肺虛也朝以補中益氣湯升補胃氣夕以六君子培補脾氣而愈大全方治妊娠忽然下黃汁如膠或如豆汁胎動腹痛粳米五合黃耆六兩上以水七升煎取二升分為四服銀苧酒見前胎動不安又方用生艾汁二盞阿膠白蜜各一兩煎至七分溫服如無生艾煎乾艾濃汁亦可一方加竹茹一方用酒不用蜜脈經云婦人懷軀六月七月暴下鬥余水其胎必倚而墮此非時孤漿預下故也胎漏徐徐下水今暴下而多故知墮胎也跌撲傷胎毒藥傷胎大妊娠驚胎者乃懷妊將滿胎神已具墜僕傷胎甚至下血不醒若欲驗其子母安否當參第四論治之薛愚按前證若因怒跌僕或手足抽搐用釣藤湯見前若因氣滯用紫蘇飲胎上逼心若因脾胃氣虛用六君子加蘇梗若鬱結傷脾用歸脾湯若鬱怒傷肝脾用四七湯雜病氣加芎歸若去血過多用佛手散如不應膠艾湯氣血虛八珍湯加膠艾催生神妙佛手散治婦人妊娠五七月因事築磕著胎或子死腹中惡露下疼痛不已口噤欲絕用此藥探之若不損則痛止子母俱安若胎損立便逐下本出徐文仲神驗胎動方云治血上衝心腹滿悶者如湯沃雪又治產前產後體熱敗血腹痛又名芎藭湯當歸六兩川芎四兩張氏方等分上為粗末每服三錢水一大盞煎令泣泣欲干投酒一大盞止煎一沸去滓溫服口噤灌之如人行五里再服不過三五服便生一方云此藥治傷胎去血多崩中去血多金瘡去血多拔牙去血多昏暈欲倒者以水煎服或先以漏血腹內疼痛加芍藥官桂減半隨手效余詳胎產大法治妊娠忽因倒地或擎重作勞促損腹中疼痛腫重及子死腹中不出三服立下川芎一兩上為細末以熱酒調服方寸匕日三四服按川芎上竄散氣有服之暴亡者若診其脈舉之有按之無者忌服治妊娠從高墜下腹痛下血煩悶生地黃益母草各一兩當歸黃耆各半兩上㕮咀每服四錢水一盞姜四片煎至六分去滓無時候集驗療妊娠二三月上至七八月頓僕失跌胎動不安傷損腰腹痛欲死若有所見及胎奔上搶心短氣下血不止方乾地黃當歸艾葉各二兩阿膠川芎各三兩上以水七升煮取二升半分作三服腹痛甚加杜仲五加皮各三兩一方無地黃有甘草一方無地黃卻用生薑自然汁一匙地黃汁半合馬通半合煎成藥去滓入此再煎三沸溫服一方有人參白茯苓水煎丹婦人因閃挫傷胎肚疼血崩歸尾陳皮白朮人參茯苓白芍藥川芎各三錢甘草炙五分上㕮咀分四帖水三盞煎取一盞下縮砂末一錢五分炒黑五靈胎一錢竹茹酒治妊娠誤有失墜損血胎損疼痛青竹茹二合好酒一升上煮三五沸分作三服即安秦艽湯療妊娠或因僵仆胎動不安臍腹㽲痛方見胎動不安治妊娠偶有所傷胎動不安疼痛不可忍兼治崩血又兼治子冒又名子癇縮砂不以多少和皮炒令黑色一方用仁熨斗內略炒為細末熱酒調下二錢不飲酒者以米飲調下皆可覺腹中熱則胎已安矣此方神效予常用之有驗補遺安胎散治卒然腰痛下血不已熟地黃艾葉白芍藥川芎黃耆阿膠炒當歸甘草地榆各等分上㕮咀每四錢姜五片棗一枚煎溫服薛若因毒藥用甘草黑豆淡竹葉若因頓僕用阿膠散未應煎送知母丸若因頓僕下血腹痛用佛手散未應用八珍送知母丸血出過多用八珍湯斤許益母草四兩水煎徐徐與服若胎死以朴硝或平胃散下之捷徑方治用毒藥攻胎藥毒衝心外證牙關緊急口不能言兩手強直握拳頭低自汗身微熱外證與中風相似但其脈浮而軟十死一生醫多不識若作中風治之必死無疑用白扁豆二兩生去皮為末新汲水調下即效阿膠散治妊娠不問月數深淺或因頓僕或因毒藥胎動不安腰痛腹滿或有所下或胎上搶心短氣乏力方見前胎動不安妊娠誤服諸藥毒致胎動不安治之方甘草黑豆淡竹葉等分濃煎汁飲之奪命丸治婦人小產下血至多子死腹中其人憎寒手指唇口爪甲青白面色黃黑胎上搶心則悶絕欲死冷汗自出喘滿不食或食毒物或誤服草藥傷動胎氣下血不止胎尚未損服之可安已死服之可下若胎腐爛腹中危甚者立可取出此方的系異人傳授至妙此即仲景茯苓桂枝丸但用淡醋湯嚼下不同耳方即牡丹皮茯苓桂枝桃仁赤芍藥等分是也丹溪亦稱妙心痛大妊娠心痛乃風邪痰飲交結若傷心正經為真心痛朝發夕死夕發旦死若傷心支絡則乍安乍作若傷於子藏則胎動而血下薛前證若飲食所傷用平胃散加枳殼山楂若因錯雜諸邪當審其因而治之一妊婦心痛煩熱作渴用白朮散即愈後因停食其痛仍作胸腹膨滿按之則痛此因飲食停滯用人參養胃湯按之不痛乃脾胃受傷以六君子補之而愈一妊婦心腹作痛胸脅作脹吞酸不食此肝脾氣滯用二陳山楂山梔青皮木香而愈又因怒仍痛胎動不食面色青黃肝脈弦緊脾脈弦長此肝木乘土用六君子湯加升麻柴胡木香而愈火龍散治妊娠心氣疼川楝子茴香炒各三錢艾葉末鹽炒一錢半上作一服水二盅煎至一盅不拘時服產寶治妊娠卒心痛氣欲絕方川芎當歸茯苓厚朴制各一分上水六升煎取二升分二服白朮湯治妊娠卒心痛欲死不可忍者出古今錄驗白朮三兩赤芍藥二兩黃芩一兩半上切以水六升煮取二升半分三服半日令盡微下水令易生忌桃李雀肉等千金療妊娠心痛青竹茹一升羊脂八兩白蜜三兩上三味合煎每服棗核大三枚食前頓服日三服又方青竹茹一升酒二升煮取一升半去滓分溫頓服又方破雞子一枚酒調服之又方大麻子三升研水八升煮取五升分五服又方橘皮三兩豆豉五兩為細末煉蜜為丸如桐子大溫水下二七丸無時候四方並出外室秘要補遺沉香降氣湯茯苓補心湯四七湯紫蘇飲皆可用雷公炮炙論云心痛欲死急覓延胡心腹痛大夫妊娠心腹痛者或由宿有冷疼或新觸風寒皆由臟虛而致發動也邪正相擊而並於氣隨氣上下上衝於心則心痛下攻於腹則腹痛故令心腹痛也妊娠而痛者邪正二氣交攻於內若不時瘥者其痛衝擊胞絡必致動胎甚則傷墮也又云妊娠心腹疼痛多是風寒溫冷痰飲與臟氣相擊故令腹痛攻傷不已則致胎動也薛前證若風寒痰飲用金沸草散雜病咳嗽胎氣鬱結加香附川芎若飲食停滯用六君加紫蘇枳殼若怒動肝火前藥更加柴胡山梔若鬱結傷脾用歸脾湯雜病健忘加枳殼山梔一妊婦心腹作痛吐痰噁心胎氣上攻飲食少思此脾虛氣滯而為痰用六君子加柴胡枳殼諸證漸退飲食漸進又用四君子加枳殼山梔桔梗而安後因怒兩脅氣脹中脘作痛惡寒嘔吐用六君加柴胡升麻木香一劑而愈當歸芍藥散治妊娠腹中絞痛心下急痛及療產後血暈目虛氣乏崩中久痢常服通暢血脈不生癰癤消痰養腎明目益津白芍藥半斤當歸茯苓白朮各四兩澤瀉川芎各二兩一方芎只兩半上為細末每服二錢食前溫酒調服元和紀用經名為六氣經緯丸云能祛風補勞養真陽退邪熱緩中安和神志潤澤容色散寒邪溫瘴時氣安期先生賜李少君久餌之藥後仲景增減為婦人懷妊腹痛方本方用芍藥四兩澤瀉茯苓川芎各一兩當歸白朮各二兩亦可以蜜丸服出三因方阿膠散治妊娠胎動腹中㽲痛不思飲食甘草二錢半白茯苓白朮川芎阿膠各七錢半炒當歸炒陳皮各一兩上㕮咀每服三錢水一盞姜三片棗一枚煎至七分服療妊娠患腹痛並胎動不安蔥白切一升人參厚朴阿膠川芎各二兩當歸三兩上㕮咀以水七升煎取三升分三服一方有甘草無厚朴川芎療妊娠先患冷氣忽中心腹痛如刀芎歸湯川芎人參茯苓吳茱萸苦梗當歸各三兩厚朴制芍藥各二兩上㕮咀以水九升煎取三升分三服氣下即安草豆蔻散治妊娠心腹常痛吃食減少四肢不和全不入食草果仁想是草豆蔻陳橘皮乾地黃白朮各一兩川芎七錢半當歸炒桂心乾薑木香各半兩上為細末每服四錢水一盞棗二枚煎六分熱服古今錄驗療妊娠腹內冷痛忽胎動薤白一升當歸切四兩上以水五升煮取二升作三服亦可小便服相去一炊頃再服千金療妊娠腹中痛方生地黃二斤取汁酒一升合煎減半頓服愈治妊娠胎動欲落腹中痛不可忍上等銀一斤茅根二斤去黑皮以水九升煮銀取五升入清酒一升同煎茅根取三升分三服立安治妊娠四五月忽心腹絞痛大紅棗十四枚燒存性為末童子小便調下治妊娠心腹痛不可忍方鹽一斤燒令赤以兩指取一撮酒調服香術散治妊娠五個月以後常胸腹間氣刺滿痛或腸鳴以至嘔逆減食此由喜怒憂慮過度飲食失節之所致也蔡元度寵人有子夫人怒欲逐之遂病醫官王師復處此方三服而愈廣中莪朮一兩炒丁香半兩粉草二錢半上為細末空心鹽湯點服一大錢覺胸中如物按下之狀愈補遺手拈散四七湯加歸芍四磨湯小烏沉湯安胎飲除地榆以上諸方皆可選用腹痛仲婦人懷胎腹中㽲痛當歸芍藥散主之見前潔地黃當歸湯治婦人有孕胎痛當歸一兩熟地黃二兩上為末作一服水三升煎至一升半去滓頓服仲婦人腹中痛小建中湯主之方見傷寒腹痛云芎歸湯治妊娠先患冷氣忽心腹痛如刀刺見前心腹痛丹孫院君因近喪冒惡氣傷胎肚痛手不可近發熱口中不思食須安胎散滯氣青皮三錢黃芩芍藥各二錢歸尾一錢半川芎一錢木香五分甘草炙少許分二帖水三盞先煮苧根兩大片至二盞去苧根入前藥同煎至一盞熱服治妊娠腹痛用生地黃三斤搗取汁酒一升合煎減半頓服愈脈師曰婦人有胎腹痛其人不安若胎病不動欲知生死令人摸之如覆杯者則男如肘頸參差起者女也冷在何面冷者為死溫者為生小腹痛大妊娠小腹痛者由胞絡虛風寒相搏痛甚亦令胎動也薛前證若風寒所搏用紫蘇飲加生薑氣血虛用八珍湯脾氣虛用六君子湯中氣虛用補中益氣湯若腹脹痛用安胎飲加升麻白朮不應兼補中益氣湯一妊婦小腹作痛其胎不安氣攻左右或時逆上小便不利用小柴胡湯加青皮山梔清肝火而愈後因怒小腹脹滿小便小利水道重墜胎仍不安此亦肝木熾盛所致用龍膽瀉肝湯一劑諸證頓愈乃以四君子加柴胡升麻以培脾土而安療妊娠被驚惱胎向下不安小腹痛連腰下血當歸川芎各八分阿膠炙人參艾葉各四分大棗二十個茯苓十分上細切以水四升煮取二升溫分三服補遺治妊婦小腹痛胎動不安川芎為細末酒調下又方川芎當歸各等分水煎溫服腰腹及背痛大腎主腰足因勞傷損動其經虛則風冷乘之則腰痛冷氣乘虛入腹則腹痛故令腰腹相引而痛其痛不止多動胎氣婦人腎以系胞妊娠而腰痛甚者則胎墮也薛前證若外邪所傷用獨活寄生湯雜病腰痛勞傷元氣用八珍杜仲砂仁膠艾脾腎不足以前藥加白朮補骨脂氣血鬱滯用紫蘇飲加桔梗枳殼肝火所動用小柴胡湯傷寒少陽病加白朮枳殼山梔肝脾鬱結用歸脾湯雜病健忘加柴胡枳殼一妊婦頸項強直腰背作痛此膀胱經風邪所致用拔萃羌活湯雜病腰痛一劑而愈又用獨活寄生湯及八珍湯以祛邪固本而痊石山治一婦懷妊八月嘗病腰痛不能轉側大便燥結醫用人參等補劑痛益加用硝黃通利之藥燥結雖行而痛如故汪診之脈稍洪近駛曰血熱血滯也宜用四物加木香乳沒黃柏火麻仁煎服四五帖痛稍減燥結潤復加發熱面赤或時惡寒仍用前方去乳香沒藥加柴胡黃芩服二帖而寒熱除又背心覺寒腰痛復作汪曰血已利矣可於前方加人參一錢服之而安江篁南治一婦妊娠三個月因閃挫傷損腰痛小腹疼下血內有熱用當歸白朮黃芩上熟地川芎防風砂仁中艾葉上香附下用水煎服血止小腹不痛去砂仁又用雞子黃三個以酒攪化煮熟食之即痊通氣散治妊娠腰痛狀不可忍此藥神效破故紙不以多少瓦上炒香熟為末嚼胡桃肉一個空心溫酒下三錢五加皮散治妊娠腰痛不可忍或連胯痛先服此散杜仲四兩炒五加皮阿膠炙防風金毛狗脊川芎白芍藥細辛萆薢各三兩杏仁八十枚去尖皮麩炒一方有白茯苓無白芍上㕮咀以水九升煮取二升去滓下膠作三服五加皮丸治證同前服前散後次服此丸續斷炒杜仲各二兩半芎藭獨活各三兩五加皮狗脊萆薢芍藥訶子肉各四兩上為細末煉蜜和丸如梧子大空心酒下四十丸日三療觸動胎以致腰痛背痛杜仲五加皮當歸芍藥川芎萆薢各等分上細銼以水七升煮取一升半分溫三服丹仁六嫂有胎腰痛白朮四錢陳皮三錢黃柏炒二錢半人參條芩川芎地黃當歸尾各半兩甘草炙一錢上分四帖水酒煎服療妊娠氣壅攻腰痛不可忍兼治腹痛當歸三兩阿膠甘草各二兩蔥白一升上細銼以水七升煮取三升去滓分溫三服大地黃丸治產前後腰腹疼一切血疼兼治血氣虛四肢不舉骨髓熱疼熟地黃二兩烏梅肉當歸各一兩上為細末煉蜜丸如彈子大每服一丸空心白湯嚼下紫酒治妊娠腰痛如折大黑豆二合炒令香熟以酒一大盞煮取七分去豆空心頓服本治胎動腰痛搶心或下血取蔥白不拘多少濃煮汁飲之療妊娠腰背痛反復不得鹿角長六寸燒令赤酒中淬再燒再淬以角碎為度取所淬酒飲之一方鹿角為末酒服亦可卒腰痛不安或腰痛胎轉搶心下血不止用菖蒲汁酒一升服之妊娠卒胎動不安或但腰痛或胎轉搶心或下血不止艾葉一把如雞子大以酒四升煮取二升分為二服良小品苧根湯療損動胎腰腹痛去血胎動向下方生乾地黃苧根各二兩當歸芍藥阿膠甘草各一兩上細切以水六升煮取二升去滓納膠煎烊分溫三服忌海藻蕪荑心腹脹滿大全夫妊娠心腹脹滿者由腹內素有寒氣致令停飲妊娠重因觸冷飲發動與氣相平故令心腹脹滿也薛前證若外感風寒內傷飲食用藿香正氣散雜病中風若食傷脾胃用六君子湯若陽氣壅滯用紫蘇飲胎上逼心一妊婦飲食停滯心腹脹滿或用人參養胃湯加青皮山楂枳殼其脹益甚其胎上攻噁心不食右關脈浮大按之則弦此脾土不足肝木所侮用六君子加柴胡升麻而愈後小腹痞悶用補中益氣湯升舉脾氣而瘥一妊婦腹脹小便不利吐逆諸醫雜進溫胃寬氣等藥服之反吐轉加脹滿湊心驗之胎死已久服下死胎藥不能通因得鯉魚湯其論曰妊婦通身腫滿或心胸急脹名曰胎水遂去妊婦胸前看之胸肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎此證蓋因懷妊腹大不自知覺人人皆謂妊娠孕如此終不知胎水之患也倉公下氣湯治妊娠心腹脹滿兩脅妨悶不下飲食四肢無力羌活赤芍藥甘草檳榔青皮大腹皮陳皮赤茯苓半夏桑白皮桂心各半兩紫蘇莖二兩㕮咀每服三錢水一盞姜五片棗一個煎七分去滓服無時局方分心氣飲大同小異加燈心煎訶黎勒散療妊娠心腹脹滿氣衝胸膈煩悶四肢少力不思飲食訶黎勒赤茯苓前胡各一兩陳皮大腹皮桑白皮各七錢半枳殼川芎白朮各半兩上為粗末每服四錢水一盞半姜三片棗子一個煎至七分去滓溫服無時安胎和氣飲治胎冷腹脹痛引兩脅小便頻數大便虛滑訶子麵裹煨去核白朮各二錢陳皮去白高良薑炒木香不見火白芍藥陳米炒甘草炙各一錢上作一服水二盞生薑五片煎至一盅不拘時服忌食生冷之物治妊娠心下滿氣急切痛赤茯苓六分桑白皮五分前胡四分郁李仁檳榔各三分上為細末以水一升煮取一半去滓夜臥服紫蘇飲治妊娠心腹脹滿兩脅妨悶見胎上逼心枳殼湯治婦人妊胎腹脹枳殼三兩黃芩一兩為粗末每服五錢水盞半煎溫服如胎前腹滿身體沉重加白朮一兩仲景婦人懷妊六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子臟寒故也當以附子湯溫其臟附子湯方附子二枚炮去皮破八片白朮四兩茯苓芍藥各三兩人參二兩上五味以水八升煮取三升去滓溫服一升日三服婦人傷胎懷身腹滿不得小便從腰以上重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈胎水腫滿產寶論曰夫妊娠腫滿由臟氣本弱因產重虛土不剋水血散入四肢遂致腹脹手足面目皆浮腫小便秘澀陳無擇云凡婦人宿有風寒冷濕妊娠喜腳腫俗呼為皺腳亦有通身腫滿心腹急脹名曰胎水論曰凡妊娠之人無使氣極若心靜氣和則胎氣安穩若中風寒邪氣及有所觸犯則隨邪而生病也凡妊娠經血壅閉以養胎若忽然虛腫乃胎中挾水水血相搏脾胃惡濕主身之肌肉濕漬氣弱則肌肉虛水氣流溢故令身腫滿也然其由有自或因泄瀉下痢臟腑虛滑耗損脾胃或因寒熱瘧疾煩渴引飲太過濕漬脾胃皆能使頭面或手足浮腫也然水漬於胞兒未成形而胎多損壞及其臨產日腳微腫乃胞髒水少血多水出於外故現微腫則易生也宿有寒氣因寒冷所觸故能令腹脹腫滿也產乳集論妊娠自三月成胎之後兩足自腳面漸腫腿膝以來行步艱辛以至喘悶飲食不美似水氣狀至於腳指間有黃水出者謂之子氣直至分娩方消此由婦人素有風氣或衝任經有血風未可妄投湯藥亦恐大段甚者慮將產之際費力有不測之憂故不可不治於未產之前也古方論中少有言者按名醫錄宋少主元徽中與徐文伯微行學針法文伯見一妊婦足腫不能行少主脈之此女形也文伯診之曰此男胎也在左則胎黑色少主怒欲破之文伯惻然曰臣請針之胎遂墮男形而色黑此妊娠足腫之說見於古者今巢氏病源中但有子煩之論千金並產寶方亦略言之劉禹錫續傳廣信方以為妊婦有水氣而成胎太平聖惠亦言之皆非也元豐中淮南陳景初名醫也獨有方論治此病方名初謂之香附散李伯時易名曰天仙藤散也薛前證若胸滿腹脹小便不通遍身浮腫用鯉魚湯脾胃虛弱佐以四君子若面目虛浮肢體如水氣用全生白朮散如未應用六君子湯脾虛濕熱下部作腫用補中益氣加茯苓若飲食失宜嘔吐泄瀉用六君子湯若腿足發腫喘悶不安或指縫出水用天仙藤散脾胃虛弱兼四君子湯如未應用補中益氣湯若脾肺氣滯用加味歸脾湯佐以加味逍遙散一妊婦每胎至五月肢體倦怠飲食無味先兩足腫漸至遍身後及頭面此是脾肺氣虛朝用補中益氣夕用六君子加蘇梗而愈凡治妊娠毋泥月數但見某經證即用本藥為善一妊婦年三十八妊娠水腫以鯉魚湯加五苓散人參濕加蒼朮一錢厚朴陳皮五分蘿蔔子炒車前子滑石各一錢作一帖若喘急加苦葶藶小便不利加木通燈草甚者車前子浚川散其濕毒自消防己治腰以下濕熱腫如內傷胃弱者不可用也天仙藤散天仙藤洗略炒香附子炒陳皮甘草烏藥不必天台者但得軟白辛而香者良上等分淨秤為細末每服三錢水一大盞姜三片木瓜三片紫蘇三葉同煎至七分放溫澄清空心食前服日三服小便利氣脈通體輕腫漸消更不須多服元豐末王荊公居金陵舉家病以詩贈景初曰舉族貧兼病煩君藥石功到家何所寄一一問徵鴻因此見方得於李伯時家傳方錄於臨川張右丞宅產寶療妊娠身腫有水氣心腹脹滿小便少茯苓四兩杏仁檳榔各三兩旋覆花郁李仁各一兩上為粗末以水六升煮取二升去滓分溫三服小便通即瘥崔氏療妊娠體腫有水氣心腹急滿茯苓白朮四兩旋覆花二兩杏仁黃芩各三兩上細切以水七升煮取二升半分溫三服忌桃李雀肉酢物療妊娠遍身洪腫葶藶子散二方葶藶子一兩白朮五兩茯苓桑白皮郁李仁各二兩上為粗末水六升煮取二升分三服小便利即瘥又方澤瀉葶藶各二兩茯苓枳殼白朮各六兩上細切以水六升煮取二升分溫兩服小便利即瘥澤瀉散治妊娠氣壅身體腹脅浮腫喘急大便不通小便赤澀宜服澤瀉木通桑白皮赤茯苓枳殼檳榔各一錢半上作一服水二盅生薑五片煎至一盅食前服防己湯治妊娠脾虛通身浮腫心腹脹滿喘促小便不利防己一錢半桑白皮赤茯苓紫蘇莖葉各二錢木香半錢作一服煎服法同前千金鯉魚湯治妊娠腹大胎間有水氣白朮五兩茯苓四兩當歸芍藥各三兩上細銼片以鯉魚一尾修事如食法煮取汁去魚不用每服四錢入魚汁一盞半生薑七片橘皮少許煎至七分去滓空心服集驗同腎著湯治妊娠腰腳腫茯苓白朮各四兩乾薑甘草各二兩杏仁三兩上㕮咀每服四錢水一盞半煎至七分食前服指迷五皮散治胎水尋常脾虛腫滿亦治大腹皮桑白皮生薑皮茯苓皮橘皮各等分上㕮咀每服半兩水二盞濃磨木香水一呷同煎至八分去滓空心溫服亦治男子脾虛腫滿治妊娠兩腳浮腫名曰脆腳因脾衰不能制水血化成水所致用生料平胃散薑棗水煎服或為末紫蘇葉煎湯調下全生白朮散治妊娠面目虛浮如水腫狀白朮一兩生薑皮大腹皮茯苓皮陳皮各半兩上為細末每服二錢米飲調下不拘時子和治妊娠從腳上至腹腫小便不利微渴豬苓五兩為末以熟水服方寸匕日三服丹子腫多濕用山梔一撮米飲吞下腹內鐘鳴大治孕婦腹內鐘鳴用鼠窟前後土為細末研麝香酒調下二錢其產婦立愈補遺治孕婦腹中兒哭用川黃連濃煎汁令母常呷之薛按產寶云小兒在腹中哭其治法亦用空房中鼠穴土或黃連煎濃汁飲之即止想即是證又云臍帶上疙瘩兒含口中因妊婦登高舉臂脫出兒口以此作聲令妊婦曲腰就地如拾物狀仍入兒口即止然黃連性寒麝香開竅當酌量用之積聚素黃帝問曰婦人重身毒之何如岐伯曰有故無殞亦無殞也帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其大半而止過者死至真要論丹血塊如盤有孕難服峻劑此方主之香附子醋煮四兩桃仁去皮尖一兩海粉醋煮二兩白朮一兩上為末麵糊丸服孕癰治孕癰立效烏藥研出洪軟白香辣者良上用五錢水一盞牛皮膠一片同煎至七分溫服補遺治孕中有癰薏苡仁煮汁飲之薛按孕癰即是腹內患癰如前法不應宜用牡丹皮散或薏苡仁湯方見外科內癰傷食大經云飲食自倍腸胃乃傷又云陰之所生本在五味陰之五宮傷在五味若妊子飲食不節生冷毒物恣性食啖致傷脾胃故妊娠傷食最難得藥唯此二方最穩捷木香丸白朮散薛東垣先生云脾胃之氣壯則過時而不飢多食而不傷蓋胃主司納脾主消化五臟之本也然食倍而傷者乃脾氣虛而不化也若投以峻劑則脾胃復傷而胎亦損矣當審其所因而調治之若飲食停滯或肚腹作痛用平胃散嘔吐噁心加枳殼砂仁吞酸噯腐加黃連三分吳茱萸二分腹滿泄瀉用六君子湯停滯肉食倍加山楂停滯麵食倍加麥糵停滯糯食用白酒麴末一味米食停滯倍加谷糵魚腥所傷倍加陳皮傷辛熱之物加黃連傷生冷之物加砂仁木香如不應更加肉豆蔻補骨脂再不應用四神丸若脾氣下陷用補中益氣湯凡噯覺藥氣且戒藥餌節飲食經云損其脾者調其飲食適其寒溫大凡脾胃虛弱飲食難化以白朮陳皮為末等分陳曲糊丸常服最善枳朮丸但可暫用枳實峻厲能耗真氣治者慎之一妊娠因停食服枳朮丸胸腹不利飲食益少更服消導寬中之劑其胎下墜余謂此脾氣虛而不能承載也用補中益氣及六君子湯中氣漸健其胎漸安又用八珍湯加柴胡升麻調理而痊木香丸治婦人有孕傷食木香二錢三稜人參白茯苓各三錢上為細末麵糊丸如綠豆大熟水吞三四十丸白朮散治妊娠氣不調和飲食易傷白朮炒乾紫蘇各一兩人參白芷炒各七錢半川芎訶子皮青皮各半兩甘草二錢半上為末每服二錢水一盞姜三片煎至七分溫服局方小七香丸雜傷飲食保氣散坐月二方治傷食良效鄭氏勝金散治妊婦因食傷胎傳於脾胃氣虛冷逼小腹脹痛或腰重大便秘吳茱萸酒浸淨陳皮川芎乾薑炮生薑切焙各一錢半炙甘草厚朴薑製各三錢細末每服三錢陳米飲下入鹽煎尤妙濟生加砂仁中惡大夫妊娠忽然心腹刺痛悶絕欲死者謂之中惡邪惡之氣中胎傷於人也所以然者血氣自養而為精神之主若血氣不和則精神衰弱故邪毒之氣得以中之妊娠之病亦致損胎也薛前證當調補正氣為善用金銀藤一味煎湯飲之當歸散治妊娠中惡心腹㽲痛當歸丁香川芎各三兩青橘皮二兩吳茱萸半兩去梗湯泡三次炒黑上為細末無時溫酒調一錢又方生乾地黃一兩枳殼木香各七錢半為細末每服一錢酒調下又方苦梗二兩細銼略炒生薑半兩水煎服之補遺治妊娠中惡心腹絞急切痛如鬼擊之狀不可按摩或吐血或衄血者用熟艾如拳大煮汁頻服又方用鹽一盞水二盞調和服以冷水噀之吐出即安又方灶心土為末每二錢井水調服白湯調亦可又法取汗衣用男子貼體久染汗者佳燒灰存性百沸湯調服中風大論曰夫四時八方之氣為風也常以冬至之日候之若從其鄉來者長養萬物若不從其鄉來者名為虛邪賊害萬物人體虛則中之若風邪客於皮膚入於經絡即頑痹不仁若入於筋脈挾寒則攣急喎僻挾溫客弛縱若入臟腑則恍惚驚悸凡五臟俞皆在背臟腑虛寒邪皆從俞而入隨所傷臟腑經絡而為諸病妊娠中風若不早治則令墮胎也薛按病機機要云風本為熱熱勝則風動宜以靜勝其躁是亦養血也治法須少汗亦宜少下多汗則虛其衛多下則損其榮雖有汗下之戒而有中臟中腑之分中腑者多著四肢則脈浮惡寒拘急不仁中臟者多著九竅則唇緩失音耳聾鼻塞目瞀便秘中腑者宜汗之中臟者宜下之表裡已和宜治在經當以大藥養之此中風要法妊婦患之亦當以此施治而佐以安胎之藥防風散治妊娠中風卒倒心神悶亂口噤不能言四肢急強防風去蘆葛根桑寄生各一兩羚羊角屑細辛去苗當歸去蘆甘菊花漢防己去皮秦艽去蘆桂心茯神去木甘草炙各半兩上為㕮咀每服八錢水一中盞半生薑五片煎至一大盞去滓入竹瀝半合攪勻溫服無時生犀角散治妊娠卒中風不語四肢強直心神惛憒牛犀角屑麻黃去節各一兩防風去蘆赤箭羌活當歸人參各去蘆葛根赤芍藥各七錢半甘草炙秦艽各半兩石膏一兩半上為㕮咀每服八錢煎服法如前防己散治妊娠中風口眼喎斜手足頑痹防己去皮羌活防風各去蘆麻黃去節黃松木節羚羊角屑各一兩桂心荊芥穗薏苡仁桑寄生甘草炙各半兩上㕮咀每服五錢水一中盞半生薑五片煎至一大盞去滓溫服不拘時候獨活散治妊娠因洗頭中風身體強硬牙關緊急失音不語並皆治之獨活去蘆赤箭麻黃去節阿膠各一兩炒烏犀角屑羌活去蘆防風去蘆天蓼木白附子炮各七錢半漢防己去皮桂心芎藭白殭蠶微炒各半兩龍腦二錢半細研上為細末入研藥令勻每服二錢薄荷湯調下不拘時白殭蠶散治妊娠中風口噤心膈痰涎壅滯言語不得四肢強直白殭蠶炒天麻獨活去蘆各一兩麻黃去節一兩半烏犀角屑七錢半白附子炮半夏湯洗七次薑製天南星炮藿香各半兩龍腦二錢半研上為細末入研藥令勻每服一錢生薑薄荷湯調下不拘時日三服赤箭丸治妊娠中風手足不隨筋脈緩急言語謇澀皮膚不仁赤箭萆薢酒浸麻黃去節獨活去蘆鼠黏子熟乾地黃羚羊角屑各一兩阿膠炒防風去蘆芎藭當歸炒去蘆薏苡仁五加皮秦艽去蘆漢防己去皮柏子仁酸棗仁炒丹參去蘆各七錢半上為細末煉蜜和搗三五百下丸如梧子大每服三十丸豆淋酒送下食前白朮酒治妊娠中風口噤語言不得白朮一兩半獨活一兩黑豆一合炒上細銼以酒三升煎取一升半去滓溫分四服口噤者拗口灌之得汗即愈治妊娠因感外風如中風狀不省人事熟艾三兩陳米醋炒令極熱以絹帛裹熨臍下良久即省風痙癇大妊娠體虛受風而傷太陽之經絡後復遇風寒相搏發則口噤背強名之曰痙又云痓其候冒悶不識人須臾自醒良久復作謂之風痙一名子癇亦名子冒甚則反張薛前證若心肝風熱用釣藤湯胎動肝脾血虛加味逍遙散調經肝脾鬱怒加味歸脾湯雜病健忘氣逆痰滯紫蘇飲肝火風熱釣藤散眩暈脾郁痰滯二陳薑汁竹瀝若兼證相雜當參照子煩門羚羊角散治妊娠冒悶角弓反張名曰子癇風痙羚羊角鎊獨活酸棗仁炒五加皮薏苡仁炒防風當歸酒浸川芎茯苓去木杏仁去皮尖各五分木香甘草炙各二分上姜水煎服小品療妊娠忽悶眼不識人須臾醒復發亦有不醒者名為痓病亦名子癇亦名子冒宜葛根湯若竹近可速辦者當先作瀝汁次辦湯也其竹遠不可即辦者當先辦湯此二療會得其一種竹瀝偏療諸痙絕起死也非但偏療妊娠產婦絕死者有效小兒或癇痓金瘡發痓療之亦驗葛根湯方治妊娠臨月因發風痙悶憒不識人吐逆眩倒小醒復發名曰子癇葛根貝母去心牡丹皮木防己防風當歸川芎白茯苓桂心熬澤瀉甘草各二兩獨活石膏碎人參各三兩上細切以水九升煮取三升分三服貝母令人易產若未臨月者以升麻代之忌海藻菘菜酢物按此方犯桂與牡丹不如羚羊角散之妥羌活酒治妊娠中風痙口噤四肢強直角弓反張羌活去蘆一兩半防風去蘆一兩黑豆一合炒去皮上二味為㕮咀好酒五升浸一宿每服用黑豆一合炒令熟投入藥酒一大盞候沸即住去滓分兩服灌之丹治一婦人懷妊六月發癇手足揚直面紫黑色閤眼涎出昏憒不醒人事半時而醒醫與震靈丹五十餘帖其疾時作時止無減證直至臨產方自愈產一女蓐中子母皆安次年其夫疑丹毒必作求治之診其脈浮取弦重取澀按至骨則沉實帶數時正二月因未見其癇發正狀未敢與藥意其舊年癇發時乃五月欲待其時度此疾必作當審諦施治至五月半其疾果作皆是午巳兩時遂教以自制防風通聖散用生甘草加桃仁多紅花少或服或吐至四五劑疾漸疏而輕後發為疥而愈瘛瘲薛瘛者筋脈急而縮也瘲者筋脈緩而伸也一縮一伸手足相引搐搦不已大抵與嬰孩發搐相似謂之瘛瘲也此證多屬風蓋風主搖動駱龍吉云心主脈肝主筋心屬火肝屬木火主熱木主風風火相熾則為瘛瘲也治法若因風熱用釣藤湯加柴胡山梔黃芩白朮以平肝木降心火養氣血若風痰上湧加竹瀝南星半夏若風邪急搐加全蠍殭蠶虧損氣血用八珍湯加釣藤山梔為主若無力抽搐戴眼反折汗出如珠者肝絕也皆不治一妊婦四肢不能伸服祛風燥血之劑遺屎痰甚四肢抽搐余謂肝火血燥用八珍湯加炒黑黃芩為主佐以釣藤湯而安後因怒前證復作小便下血寒熱少寐飲食少思用釣藤散加山梔柴胡而血止用加味逍遙散寒熱退而得寐用六君子湯加芍藥釣藤鉤飲食進而漸愈釣藤湯見胎動不安釣藤散眩暈眩暈消風散治妊娠肝臟熱毒上攻太陽穴胸膈涎壅頭旋目暈或腮項腫核石膏煅防風去蘆川羌活去蘆甘菊花去枝梗川芎羚羊角鎊當歸酒浸去蘆大豆黃卷炒荊芥穗白芷各一錢炙甘草半錢上作一服水二盅好芽茶半錢煎至一盅食遠服犀角散治妊娠婦人諸風熱困倦時發昏眩犀角楝參山梔仁川羌活黃連青黛川芎吳白芷茯苓甘草炙各一錢上作一服水二盅生薑三片竹葉七葉煎至一盅食遠服驚悸吳丞妻孕而驚遂病悸醫以為病在中神越焉無可為沈宗常以為膽傷耳俾服抱膽丸而愈大聖散治妊娠怔悸睡里多驚腹脅膨脹坐臥不寧白茯苓去皮麥門冬去心黃耆去蘆蜜炙當歸去蘆酒浸川芎各一錢半木香不見火人參甘草炙各一錢上作一服水二盅生薑五片煎至一盅服無時抱膽丸雜病癲喑大全孕婦不語非病也間有如此者不須服藥臨產月但服保生丸四物湯之類產下便語得亦自然之理非藥之功也醫家不說與人臨月則與尋常之藥產後能語則以為醫之功豈其功也哉黃帝問曰人有重身九月而喑此為何也岐伯對曰胞之絡脈絕也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言帝曰治之奈何岐伯曰無治也當十月復郝翁治驗見前候胎條煩口乾附大全妊娠苦煩悶者以四月受少陰君火氣以養精六月受少陽相火氣以養氣若母心驚膽寒多有煩悶名曰子煩也產寶云夫妊娠而子煩者是肺臟虛而熱乘於心則令心煩也停痰積飲在心胸之間或衝於心亦令煩也若熱而煩者但熱而已若有痰飲而煩者嘔吐涎沫惡聞食氣煩躁不安也大凡妊娠之人既停痰積飲又寒熱相搏氣鬱不舒或煩躁或嘔吐涎沫劇則胎動不安均謂子煩也薛前證若因內熱用竹葉湯氣滯用紫蘇飲痰滯用二陳白朮黃芩枳殼氣鬱用分氣飲加川芎脾胃虛弱用六君紫蘇山梔一妊婦煩熱吐痰惡食噁心頭暈此脾虛風痰為患用半夏白朮天麻湯雜眩暈以補元氣祛風邪漸愈惟頭暈未痊乃用補中益氣湯加蔓荊子以升補陽氣而愈竹葉湯治妊娠心驚膽怯終日煩悶名曰子煩白茯苓三錢防風麥門冬去心黃芩各二錢上作一服水二盅竹葉五片煎至一盅無時服竹瀝湯出外臺秘要與前竹葉湯同內有竹瀝一合無竹葉又方有知母無黃芩竹茹湯療妊娠煩躁或胎不安用淡青竹刮茹一兩以水一大升煮取四合徐徐服盡為度知母飲治妊娠心脾壅熱咽膈渴苦煩悶多驚知母麥門冬去心赤茯苓各一錢半黃芩黃耆各二錢甘草一錢上作一服水二盅入桑白皮半錢煎至一盞再入竹瀝些少同煎二三沸服無時麥門冬湯治妊娠心驚膽怯煩悶名曰子煩麥門冬去心白茯苓防風各三錢人參一錢半上作一服水二盅生薑五片淡竹葉十葉煎至一盅去滓不拘時服麥門冬散二方治妊娠心煩憒悶虛躁吐逆惡聞食氣頭眩四肢沉重百節疼痛多臥少起麥門冬去心子芩赤茯苓各一兩茯神赤芍藥陳皮人參苦梗桑寄生甘草旋覆花各半兩生地黃七錢半上為粗末每服四錢水一盞姜一錢煎至七分不拘時溫服又方麥門冬苧根各三兩黃芩茯神各一兩甘草炙犀角屑各半兩上㕮咀每服四錢水一盞生地黃一分淡竹葉五片煎至六分去滓溫服效柴胡散治妊娠心煩頭目昏重心胸煩悶不思飲食柴胡一兩半赤茯苓麥門冬各一兩枇杷葉去毛人參橘紅甘草各半兩㕮咀每服四錢水一盞姜三片煎至七分服人參散治妊娠熱氣乘於心脾津液枯少煩躁壅熱乾渴人參麥門冬赤獲苓地骨皮家乾葛黃芩犀角屑各七錢半甘草半兩上㕮咀每服三錢水一盞煎至六分去滓溫服治妊娠心煩熱不止蔥白一握豉二合上以水二大盞煎至一盞半去滓溫分三服一母丸治妊娠因服藥致胎氣不安有似虛煩不得臥巢氏謂之子煩也出產乳知母二兩洗焙上為細末以棗肉為丸如彈子大每服一丸煎人參湯送下醫者不識此證作虛煩治之損動胎氣宜矣煩躁口乾夫足太陰脾之經也其氣通於口手少陰心之經其氣通於舌若妊娠之人臟腑氣虛榮衛不理陰陽隔絕熱乘於心脾津液枯少故令心煩而口乾也薛前證若胃經實火用竹葉石膏湯若胃經虛熱用人參黃耆散若胃經氣虛用補中益氣湯若肺經虛熱用紫蘇飲若肝經火動用加味逍遙散若脾氣鬱結用加味歸脾湯若腎經火動加味地黃丸一妊婦煩熱兼咽間作痛用知母散加山梔以清肺經而愈後內熱咳嗽小便自遺用補中益氣加麥門山梔以補肺氣滋腎水而痊升麻散治妊娠壅熱心神煩躁口乾渴逆川升麻栝蔞根黃芩人參麥門冬柴胡梔子仁犀角屑茯神各一錢知母甘草各半錢上作一服水二盅煎至一盅不拘時服知母散治妊娠煩躁悶亂口乾及胎臟熱知母麥門冬甘草各半兩黃耆子苓赤茯苓各七錢半上㕮咀每服四錢水一盞煎至七分去滓入竹瀝一合更煎三二沸溫服葛根散治婦人妊娠數月胸膈煩躁唇口乾渴身熱少食家葛根野者不用黃芩人參葳蕤黃耆麥門冬甘草等分㕮咀上每服四錢水一盞竹茹一團如錢大煎七分溫服無時人參黃耆散治妊娠身熱煩躁口乾食少人參黃耆家葛根麥門冬赤茯苓秦艽各一兩知母七錢半甘草半兩每服四錢薑水竹葉煎服補遺人參白朮散黃耆六一湯皆良治子煩口乾不得臥用黃連去須細末每服一錢粥飲調下吐血衄血咳唾血大妊娠吐血者皆由臟腑有傷凡憂思驚怒皆傷臟腑氣逆於上血隨而溢心悶胸滿久而不已心悶甚者死妊娠病此多墮胎也薛前證若肝經怒火先用小柴胡山梔生地次用前藥合四物後用加味逍遙散調經肝經風熱防風子芩丸胎漏下血心經有熱硃砂安神丸雜虛煩心氣不足補心湯驚悸思慮傷心妙香散同上胃經有火犀角地黃湯吐血膏粱積熱加味清胃散齒鬱結傷脾加味歸脾湯健忘肺經有火黃芩清肺飲淋閟因氣鬱滯紫蘇飲子胎上逼心氣不攝血用補中益氣湯腎經虛火加味六味丸雜病虛勞局方必勝散治男子婦人血妄流溢吐血衄血嘔血咯血熟乾地黃小蘇並根用人參蒲黃微炒當歸去蘆芎藭烏梅肉各一兩上件藥搗羅為粗散每服五錢水一盞半煎至七分去滓溫服不拘時治吐血不止馬氣勃用生布擦為末濃米飲調下治鼻衄以白茅花濃煎汁服心妊孕寒熱往來咳嗽血痰或嘔吐不食無力或喘滿乳脊相應痛或口中唾如霜雪出語無聲或耳鳴或痰涎日夜數碗誤用熱藥之故也刺風門魂戶各五分支溝間使各相透如寒熱未解百節瘛瘲昏憒再取絕骨五分太谿三分如脈氣未平瀉太淵太白各二分熱府以上穴實瀉虛補治產前病立效此病安後半年必有一變四肢消瘦單腹腫脹即取陰交一穴去其惡物也咳嗽大全夫肺內主氣外司皮毛皮毛不密寒邪乘之則咳嗽秋則肺受之冬則腎受之春則肝受之夏則心受之其嗽不已則傳於腑妊娠病久不已則傷胎也薛前證若秋間風邪傷肺用金沸草散雜咳嗽夏間火邪剋金用人參平肺散雜喘冬間寒邪傷肺用人參敗毒散雜傷濕春間風邪傷肺用參蘇飲雜發熱若脾肺氣虛用六君芎歸桔梗若血虛四物桑白皮杏仁桔梗腎火上炎用六味丸雜虛勞加五味子煎服脾胃氣虛風寒所傷用補中益氣雜勞倦加桑皮杏仁桔梗蓋肺屬辛金生於己土嗽久不愈者多因脾土虛而不能生肺氣而腠理不密以致外邪復感或因肺氣虛不能生水以致陰火上炎所致治法當壯土金生腎水為善一妊娠氣喘痰甚諸藥不效素有帶下始於目下浮兩月餘其面亦然此氣虛而有痰飲也用六味丸料數劑而愈一妊婦嗽則便自出此肺氣不足腎氣虧損不能司攝用補中益氣湯以培土金六味丸加五味以生腎氣而愈一妊婦咳嗽其痰上湧日五六碗許諸藥不應予以為此水泛為痰用六味丸料及四君子湯各一劑稍愈數劑而安一妊婦因怒咳嗽吐痰兩脅作痛此肝火傷肺金以小柴胡湯加山梔枳殼白朮茯苓治之而愈但欲作嘔此肝侮脾也用六君子加升麻柴胡而痊款冬花散治妊娠心膈痰毒壅滯肺氣不順咳嗽頭疼款冬花麻黃貝母煨前胡桑白皮紫菀各半兩旋覆花白朮甘草各二錢半石膏一兩上㕮咀每服四錢水一盞姜三片煎至七分去滓溫服苦梗散治妊娠肺壅咳嗽喘急桔梗紫蘇人參桑白皮貝母甘草各半兩天門冬去心赤茯苓各一兩麻黃七錢半每服四錢水二盅生薑三片煎至一盅不拘時服馬兜鈴散治妊娠胎氣壅滯咳嗽喘急馬兜鈴桔梗人參甘草貝母各半兩陳皮去白大腹子桑白皮紫蘇各一兩五味子二錢半上㕮咀每服四錢姜三片水煎麻黃散治妊娠外傷風冷痰逆咳嗽不食麻黃去節陳皮去白前胡各一兩半夏湯洗炒人參白朮枳殼炒貝母甘草各半兩㕮咀每服四錢蔥白五寸姜三片棗一枚水煎服百合散治妊娠風壅咳嗽痰多喘滿百合蒸紫菀茸洗白芍藥赤茯苓去皮桔梗炒前胡各去蘆貝母去心各一錢半甘草五分作一服水二盅姜五片煎至一盅不拘時服紫菀湯治妊娠咳嗽不止胎不安紫菀一兩桔梗半兩甘草杏仁桑白皮各二錢半天門冬一兩上㕮咀每服三錢竹茹一團水煎去滓入蜜半匙再煎一兩沸溫服局方華蓋散治妊娠咳嗽不止穩重有效見雜病咳嗽喘呂滄洲治經歷哈散侍人病喘不得臥眾作肺氣受風邪治之呂診之氣口盛於人迎一倍厥陰絃動而疾兩尺俱短而離經因告之曰病蓋得之毒藥動血以致胎死不下奔迫而上衝非風寒作喘也乃用催生湯加芎歸煮二三升服之夜半果下一死胎喘即止哈散密囑曰病妾誠有懷以室人見嫉故藥去之眾所不知也眾慚而去平安散治妊娠上氣喘急大便不通嘔吐不食腹脅脹痛川芎木香各一錢半陳皮熟地黃洗乾薑炮生薑厚朴去粗皮制炒甘草各一錢上作一服水二盅入燒鹽一捻煎至一盅不拘時服桔梗湯馬兜鈴散並見前咳嗽條瘧大妊娠病瘧乃夏傷於暑客於皮膚至秋而發陽盛則熱陰盛則寒陰陽相離寒熱俱作其發晏者由風邪客於風府循膂而下衛氣至一日一夜常大會於風府故發日晏與早者衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內上注於伏沖之脈其行九日出缺盆其氣既止故發更早其間日發者風邪內搏五臟橫連募原其道遠其氣深其行遲不能日作也妊娠而發多傷於胎薛前證因脾胃虛弱飲食停滯或外邪所感或鬱怒傷脾或暑邪所伏審系飲食停滯用六君子加桔梗蒼朮藿香外邪多而飲食少用藿香正氣散雜病中風外邪少而飲食多用人參養胃湯雜瘧勞傷元氣用補中益氣湯雜勞倦若鬱怒所傷用小柴胡湯傷寒少陽病兼歸脾湯健忘若木侮土久而不愈用六君子為主佐以安胎藥仍參三陰三陽經而治之一婦人因怒患瘧舉發無期久而不已胸腹不利飲食少思吞酸吐痰用六君子加柴胡山梔二十餘劑尋愈但晡熱少食又用四君子加柴胡升麻為主佐以逍遙散而痊一妊婦瘧久不已噯氣下氣胸腹膨脹食少欲嘔便血少寐此屬肝脾鬱怒用歸脾湯加柴胡山梔漸愈又用六君子湯加柴胡山梔升麻而愈一妊婦患瘧已愈但寒熱少食頭痛晡熱內熱此脾虛血弱也用補中益氣湯加蔓荊子頭痛頓止又用六君子湯加芎歸飲食頓進再用逍遙散加參術而寒熱愈驅邪散治妊娠停食感冷發為瘧疾白朮草果仁高良薑炒縮砂仁藿香葉橘紅白茯苓去皮各一錢半甘草炙五分上作一服水二盅生薑五片紅棗一枚煎一盅不拘時服七寶散治男婦一切瘧疾或先寒後熱或先熱後寒或寒多熱少或熱多寒少或一日一發或一日兩三發或連日發或間日發或三四日一發不問鬼瘧食瘧不伏水土山嵐瘴氣似瘧者並皆治之常山厚朴薑製青皮陳皮並不去白甘草檳榔草果去皮各等分㕮咀每服半兩於未發隔夜用水酒各一盞煎至一大盞去滓露一宿再用酒水煎滓次去滓亦露一宿來日當發之早燙溫面東先服頭藥少頃再服藥滓大有神效予嘗治一妊婦六七個月患瘧先寒後熱六脈浮緊醫用柴胡桂枝無效予曰此非常山不愈眾醫難之越數日疾甚乃從予治以七寶散一服瘥黃帝問婦人重身毒之奈何岐伯曰有故無殞帝曰何謂也岐伯曰大積大聚其可犯也衰其大半而止誠審藥物之性明治療之方何疑攻治哉柴胡散治妊娠瘧疾柴胡二錢生大黃二錢生黃芩一錢半甘草一錢上㕮咀作一服水煎臨發日五更溫服必取利為愈如胎上逼心可服枳殼散忌油麵辛熱等物又方用大黃二兩柴胡一兩半黃芩一兩芍藥一兩為細末清水糊為丸如梧桐子大每服百丸臨發日五更冷湯吞下隔兩時再服五十丸以利為度若妊娠瘧疾發熱口乾渴飲無度者亦用生地黃一兩半黃芩麥門冬去心人參知母各一兩石膏二兩甘草半兩乾葛一兩上㕮咀每服五錢入烏梅半個煎服又方用常山一兩石膏一兩甘草炙黃芩各半兩烏梅七個細切以水酒各一碗浸一宿平旦煎至一碗去滓分二服臨發時服上方犯常山大黃吐下之劑若六脈浮緊有力中有頑痰積熱者用之所謂有故無殞也其他療治方法已備雜證瘧門茲不贅若熱甚恐致動胎者亦如傷寒熱病治法以白藥子伏龍肝等塗臍上下可也霍亂大夫飲食過度觸冒風冷陰陽不和清濁相干謂之霍亂其間或先吐或腹痛吐利是因於熱也若頭痛體疼發熱是挾風邪也若風折皮膚則氣不宣通而風熱上衝為頭痛若風入腸胃則瀉利嘔吐甚則手足逆冷此陽氣暴竭謂之四逆妊娠患之多致傷胎也薛按前證若因內傷飲食外感風寒用藿香正氣散若因飲食停滯用平胃散果脾胃頓傷陽氣虛寒手足逆冷者須用溫補之劑治當詳審毋使動胎也一妊婦霍亂已止但不進飲食口內味酸泛行消導寬中余曰此胃氣傷而虛熱也當用四君子湯彼不信仍服人參養胃湯嘔吐酸水其胎不安是藥復傷也乃與四君子湯俾煎熟令患者先嗅藥氣不作嘔則呷少許恐復嘔則胎為釣動也如是旬余愈人參白朮散白朮茯苓人參甘草木香藿香各半兩乾葛一兩為末沸湯調服二錢吐甚者加生薑汁頻頻飲之人參散治妊娠霍亂吐瀉心煩腹痛人參厚朴薑製橘紅各二錢當歸炒乾薑甘草炙各一錢作一服水二盅姜三片紅棗三枚煎一盅服無時白朮散治妊娠霍亂腹痛吐利不止白朮炒益智仁枳殼麩炒橘紅各七錢半草豆蔻煨去皮良薑炒各半兩上為散每服三錢水煎入姜半分去滓溫服無時木瓜煎治妊娠霍亂吐瀉轉筋入腹則悶絕吳茱萸湯炮七次生薑切各七錢半木瓜切一兩半一方有蘹香七錢半甘草一錢茱萸半兩加紫蘇煎上細銼水二盞煎一盞二分去滓分三服熱服無時縮脾飲解伏熱除煩渴消暑毒止吐利霍亂之後服熱藥太多致煩躁宜沉井水中候冷頻頻服草果仁四兩烏梅肉三兩甘草二兩半上㕮咀每半兩水一碗姜十片煎八分沉冷服妊娠霍亂腹痛四肢冷逆汗出脈虛弱者理中湯治之上四方內用乾薑豆蔻茱萸俱大溫之劑若發熱煩渴脈數陽證者服之即死宜用後方竹茹湯嘔吐益元散桂苓甘露飲冬葵子湯並見雜病霍亂泄瀉薛米食所傷用六君加谷糵麵食所傷用六君加麥糵肉食所傷用六君加山楂若兼寒熱作嘔乃肝木侮脾土用六君加柴胡生薑兼嘔吐腹痛手足逆冷乃寒水侮土六君加薑桂不應用錢氏益黃散幼科脾臟若元氣下陷發熱作渴肢體倦怠用補中益氣湯雜病勞倦若泄瀉色黃乃脾土之真色用六君加木香肉果若作嘔不食腹痛惡寒乃脾土虛寒用六君加木香薑桂若瀉在五更侵晨飲食少思乃脾腎虛弱五更服四神丸泄瀉日間服白朮散如不應或愈而復作或飲食少思急用八味丸雜病虛勞補命門火以生脾土為善邊太常側室妊娠泄瀉自用枳朮黃連之類腹悶吐痰發熱惡寒飲食到口即欲作嘔強匙許即吞酸不快欲用祛痰理氣余曰此因脾胃傷而痰滯中脘若治痰氣復傷脾胃矣遂以參朮炮姜為未丸如黍粒不時含咽三五丸漸加至三日後日進六君子湯而尋愈進士王繳徵之內懷妊泄瀉惡食作嘔余曰脾氣傷也其夫憂之強進米飲余謂飲亦能傷胃且不必強俟脾胃醒宿滯自化飲食自進不信別用人參養胃湯飲之吐水酸苦又欲投降火寒藥余曰若然則胃氣益傷也經云損其脾胃者調其飲食適其寒溫後不藥果愈加味理中湯人參白朮白芍藥白茯苓乾薑黃連藿香葉木香訶子肉肉果甘草各一錢水二盅生薑參片大棗二枚煎一盅飢時服余方並詳第二卷泄瀉及雜病泄瀉門滯下薛治痢之法當參前篇其下黃水乃脾土虧損真色下陷也當升補中氣若黃而兼青乃肝木克脾土宜平肝補脾若黃而兼白乃子令母虛須補脾胃若黃而兼黑是水反侮土矣必溫補脾胃若黃而兼赤乃心母益子但補中益氣若腸胃虛弱風邪客之用胃風湯或胎氣不安急補脾胃而自安矣凡安胎之藥當臨病制宜不必拘用阿膠艾葉之類地官胡成甫之內妊娠久痢自用消導理氣之劑腹內重墜胎氣不安又用阿膠艾葉之類不應余曰腹重墜下元氣虛也胎動不安內熱盛也遂用補中益氣湯而安又用六君子湯全愈壺仙翁治湯總兵夫人妊娠病痢不止翁診其脈虛而滑兩關若澀此由胎氣不和相火炎上而有熱似痢實非也乃用黃芩白朮以安胎四物生地黃以調血數劑而安當歸芍藥湯治妊娠下痢腹痛即當歸芍藥散見前心腹痛本治婦人胎前產後赤白痢生薑年少者百錢老者二百錢取自然汁鴨子一枚上將鴨子打破傾入薑汁內攪勻煎八分入蒲黃三錢再煎五七沸空心熱服立效無妊娠下痢赤白絞刺疼痛雞子一枚烏雞者佳破孔傾出清留黃用之黃丹一錢入雞子殼內同黃攪勻以厚紙糊牢鹽泥固濟火上煨焙乾為細末上每服二錢米飲調下一服愈者是男二服愈者是女大治妊娠素弱頻並下痢腹痛羸瘦面色痿黃不進飲食厚朴一兩半白朮熟地黃川芎白芍藥當歸乾薑人參各一兩訶子三錢甘草一錢上㕮咀每服四錢姜三片水煎又方治妊娠下痢腹痛小便澀當歸黃耆各一兩糯米一合上細切和勻水煎分四服羅大寧散治妊娠下痢赤白灰色泄瀉疼痛垂死者黑豆三十五粒粟殼二兩半生半炒甘草二兩半生半炒上為粗末都作一服生薑三片同煎食前服治妊娠挾熱下痢亦治男子常痢黃連黃柏各一升山梔仁二十枚上㕮咀每服五錢水二盞浸二時久煮十餘沸頓服若嘔加陳皮一兩半生薑三兩黃連湯治妊娠下痢赤白膿血不止黃連二兩厚朴薑製阿膠炙當歸乾薑各一兩半艾葉黃柏各一兩上為細末空心米飲調下方寸匕日三服療妊娠白膿痢腹中冷乾薑四兩赤石脂六兩粳米一升炒黃上用水七升煎取二升溫分三服厚朴散治妊娠下痢黃水不絕厚朴姜炙三兩黃連三兩肉豆蔻一枚連皮用上為粗末水煮頓服草果飲治妊娠臟氣本虛脾胃少弱臟腑虛滑腹臍疼痛日夜無度厚朴薑製二兩肉豆蔻一個麵裹煨上㕮咀每服三錢姜三片水同煎大小便不通大夫妊娠大小便不通由臟腑之熱所致若大腸熱則大便不通小腸熱則小便不利大小腸俱熱則大小便俱不通更推其因而藥之薛前證若大腸血燥用四物湯加條芩桃仁大腸氣滯用紫蘇飲加杏仁條芩腸胃氣虛用六君子加紫蘇杏仁肝脾蘊熱用龍膽瀉肝湯心肝虛熱用加味逍遙散加車前子亞卿李蒲汀側室妊娠大小便不利或用降火理氣之劑元氣反虛肝脈弦急脾脈遲滯視其面色青黃不澤余曰此鬱怒所致也用加味歸脾湯為主佐以加味逍遙散而安主政王天成之內妊娠痢疾愈後二便不通其家世醫自用清熱之劑未效余診其脈浮大而澀此氣血虛也朝用八珍湯加桃仁杏仁夕用加味逍遙散加車前子而瘥小品療妊娠子淋大小便並不利氣急已服豬苓散不瘥宜服甘遂散下之甘遂散方用泰山赤皮甘遂二兩上一味為末以白蜜二合和服如豆大一粒覺心下煩得微下者日一服下之後還服豬苓散不得下日兩服漸加至半錢以微利為度經心錄同此藥太峻不可輕用豬苓散療妊娠小便澀痛兼治胎水豬苓五兩去皮為末白湯調方寸匕加至二匕日三夜二不瘥宜轉下之服前藥葵子湯古今錄驗二方治妊娠得病六七日以上身熱入臟大小便不利安胎除熱葵子二升滑石四兩碎上以水五升煮取一升去滓盡服須臾當下便愈又方葵子一合川朴硝二兩每服三錢水煎溫服治妊娠大小便不通心腹脹滿妨悶不欲飲食手足煩熱檳榔赤茯苓大腹皮木通郁李仁去皮尖北五味各一兩桑寄生甘草苦梗各半兩上為粗末每服三錢水一盞煎至六分溫服治妊娠大小便不通熱閉心膈腹脅脹悶妨害飲食大黃木通檳榔各一兩枳殼七錢半大腹子三枚訶子四個去核半生半煨上為末以童便一盞蔥白二寸同煎至六分調下二錢當歸散治胎前諸疾或因怒中氣衝子臟或沖脬脈腹急肚脹腰腹時疼不思飲食四肢浮腫氣急時喘大便忽難小便忽澀產門忽腫當歸一兩赤茯苓枳殼白芍藥川芎各二兩川白姜炮木香煨粉草各半兩上㕮咀每服三大錢水一盞半生薑三片煎至八分去滓無時溫服如稟受氣弱及南人枳殼減半如氣實及北人於內加分兩服之或連日大便秘澀加蜜同煎初虞世治妊娠大便秘澀方枳殼三兩防風二兩炙草一兩上為細末沸湯點服一二錢空心日三又治虛羸大便秘方枳殼制阿膠炒各等分上為細末煉蜜和劑杵二三千下丸如梧子大別研滑石末為衣溫湯下二十丸半日來未通再服三十丸止於五十丸又方車前子一兩大黃炒半兩上為細末每服三錢空心蜜湯調下大腹皮湯治妊婦大小便不通枳殼大腹皮赤茯苓各一兩甘草二錢上為末蔥白湯調下二錢補遺局方八正散治妊婦心經蘊熱臟腑秘結大腸不通小便赤澀癃閉見雜病淋上陳良甫氏所錄諸方今並存之納甘遂朴硝非至實至危不得已而為之不可輕用其它亦宜審訂而用之仍味薛氏之說而參之以雜病諸方法庶無誤也小便不通大妊娠小便不通為小腸有熱傳於胞而不通耳若兼心肺氣滯則致喘急陳無擇云妊娠胎滿逼胞多致小便不利若心腎氣虛清濁相干則為諸淋若胞系了淚小便不通名曰轉胞若胎滿尿出名曰遺尿丹轉胞病胎婦稟受弱者憂悶多者性急躁者食味厚者大率有之古方皆用滑利疏導藥鮮有應效因思胞為胎所壓展在一邊胞系了戾不通耳胎若舉起懸在中央胞系得疏水道自行然胎之墜下必有其由一日吳宅寵人患此脈之兩手似澀重取則弦左手稍和予曰此得之憂患澀為血少氣多弦為有飲血少則胞弱而不能自舉氣多有飲中焦不清而隘則胞知所避而就下故喜墜遂以四物湯加參朮半夏陳皮生甘草生薑空心飲隨以指探喉中吐出藥汁候少頃氣定又與一帖次日亦然如是八帖而安此法果為的確恐偶中耳後有數人歷歷有效未知果何如耶仲景云婦人本肌盛頭舉身滿今反羸瘦舉中空減胞系了戾亦致胞轉其義未詳必有能知之者一婦人四十一歲妊孕九個月轉胞小便不出三日矣下急腳腫不堪存活來告急予往視之見其形瘁脈之右澀而左稍和此飽食而氣傷胎系弱不能自舉而下墜壓著膀胱偏在一邊氣急為其所閉所以水竅不能出也轉胞之病大率如此予遂制一方補血養氣血氣既正胎系自舉則不下墜方有安之理遂作人參當歸身尾白芍藥白朮帶白陳皮炙甘草半夏生薑煎濃湯與四帖任其叫啖至次早又與四帖藥渣作一帖煎令頓飲之探喉令吐出此藥湯小便立通皆黑水後就此方加大腹皮枳殼青蔥葉縮砂仁二十帖與之以防產前後之虛果得就蓐平安產後亦健一婦人妊娠七八個月患小便不通百醫不能利轉加急脹診其脈細弱予意其血氣虛弱不然水載其胎故胎重墜下壓住膀胱下口因此溺不得出若服補藥升扶胎起則自下藥力未至愈加急滿遂令一老婦用香油塗手自產門入托起其胎溺出如注脹急頓解一面卻以人參黃耆升麻大劑煮服或少有急滿仍用手托放取溺如此三日後胎漸起小便如故薛前證亦有脾肺氣虛不能下輸膀胱者亦有氣熱鬱結膀胱津液不利者亦有金為火爍脾土濕熱甚而不利者更當詳審施治司徒李杏岡仲子室孕五月小便不利諸藥不應余曰非八味丸不能救不信別用分利之藥肚腹腫脹以致不起儒者王文遠室患此小腹腫脹幾至於殆用八味丸一服小便滴瀝再以前丸之料加車前子一劑即利肚腹頓宛而安仲問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈宜腎氣丸主之即八味丸方見雜病虛勞每以酒下十五丸至二十丸日再服產療小便不通及胞轉桑螵蛸搗末米飲服方寸匕日三仲妊娠有水氣重身小便不利灑淅惡寒起即頭眩葵子茯苓散主之葵子一斤茯苓三兩上二味杵為散飲服方寸匕日三服小便利則愈妊娠小便難飲食如故歸母苦參丸主之當歸貝母苦參各四兩上為末煉蜜丸如小豆大飲服三丸加至十丸男子加滑石半兩大治妊娠卒不得小便杏仁一味去皮尖搗丸如綠豆大燈心湯吞七丸立利丹朱宅婦人三十餘歲懷胎四個月大小便閉因與通利冬葵子等藥已通但氣未順此由性急血耗氣亂須和其氣滋其血乃安陳皮青皮芍藥一錢人參歸身尾川芎地黃白朮半兩茯苓木通甘草二分獨聖散治妊娠小便不通上用蔓荊子為末每服二錢食前濃煎蔥白湯調下淋大妊娠小便淋者乃腎與膀胱虛熱不能制水然妊婦胞系於腎腎間虛熱而成斯證甚者心煩悶亂名曰子淋也薛前證若頸項筋攣語澀痰甚用羚羊角散身體痛若小便澀少淋瀝用安榮散若肝經濕熱用龍膽瀉肝湯前陰諸疾若肝經虛熱用加味逍遙散腿足轉筋而小便不利急用八味丸緩則不救若服燥劑而小便頻數或不利用生地黃茯苓牛膝黃柏知母芎歸甘草若頻數而色黃用四物加黃柏知母五味麥門玄參若肺氣虛而短少用補中益氣加山藥麥門若陰挺痿痹而頻數用地黃丸若熱結膀胱而不利用五淋散淋若脾肺燥不能化生宜黃芩清肺飲淋若膀胱陰虛陽無所生用滋腎丸淋若膀胱陽虛陰無所化用腎氣丸一婦人每怒發熱脅脹小便淋澀如遇經行旬余未已受胎三月因怒前證復作朝用加味逍遙散夕用安胎飲各二劑而安五月又怒復下血如經行四日未止仍用前藥而愈一妊娠飲食後因惱怒寒熱嘔吐頭痛惡寒胸腹脹痛大便不實其面青色小便頻數時或有血服安胎止血之劑益甚余曰寒熱嘔吐而腹脹此肝木克脾土而元氣傷也大便不實而面青此飲食傷脾兼肝侮土也小便頻數而有血此肝熱傳胞而兼挺痿也用六君子加枳殼紫蘇山梔二劑脾胃頓醒又用加味逍遙散加紫蘇枳殼二劑小便頓清後節飲食調理而安地膚大黃湯外臺療妊娠子淋宜下川大黃地膚草各三兩知母黃芩豬苓赤芍藥通草川升麻枳實甘草各二兩上㕮咀每服四錢水一盞煎七分去滓溫服療妊娠患淋小便澀不利小腹水道熱痛冬葵子一升芍藥二兩黃芩赤茯苓車前子各三兩上㕮咀以水七升煎至二升溫分三服療妊娠數月小便淋瀝疼痛心煩悶亂不思飲食瞿麥穗赤茯苓桑白皮木通葵子各一兩黃芩芍藥枳殼車前子各半兩上為粗末每服四錢水一盞煎至六分溫服安榮散治妊娠小便澀少遂成淋瀝麥門冬去心通草滑石人參細辛各二錢當歸去蘆酒浸燈草甘草各半錢上為細末每服二錢不拘時麥門煎湯調服大腹皮散治妊娠大小便赤澀大腹皮枳殼去白麩炒甘草炙各一錢赤茯苓去皮三錢上為細末每服二錢不拘時濃煎蔥白湯調下經心錄療妊娠患子淋小便數出少或熱疼痛及子煩地膚子三兩上細切水四升煮取二升半去滓分三服日三服補遺治胎前諸般淋瀝小便不通檳榔赤芍藥各等分上銼每服五錢水煎溫服甚效豬苓散療妊娠子淋小便澀痛方見前大小便不通遺尿薛若脬中有熱宜用加味逍遙散若脾肺氣虛宜用補中益氣湯加益智若肝腎陰虛宜用六味丸一妊婦遺尿內熱肝脈洪數按之微弱或兩太陽作痛脅肋作脹余以為肝火血虛用加味逍遙散六味地黃丸尋愈後又寒熱或發熱或恚怒前證仍作用八珍散逍遙散兼服以清肝火養肝血而痊白薇散療妊娠胎滿不知小便出時見前三卷遺尿桑螵蛸散治妊娠小便不禁桑螵蛸二十枚炙黃上為細末每服二錢空心米飲調下又方益智仁為末米飲下亦效尿血大妊婦勞傷經絡有熱在內熱乘於血血得熱則流溢滲入脬故令尿血也薛前證因怒動火者宜小柴胡湯加山梔因勞動火者宜用補中益氣湯若因厚味積熱宜用清胃散雜病齒加犀角連翹甘草若因肝經血熱宜用加味逍遙散若因脾氣下陷宜用補中益氣湯若因脾虛血熱宜用加味逍遙散一妊婦因怒尿血內熱作渴寒熱往來胸乳間作脹飲食少思肝脈弦弱此肝經血虛而熱也用加味逍遙散六味地黃丸兼服漸愈又用八珍湯加柴胡丹皮山梔而痊千金療妊娠卒下血及子淋方葵子一升研上以水五升煮取二升分溫三服又方生艾葉一斤研冬用乾者亦得上以酒五升煮取二升分三服又方生地黃一升切上以酒四升煮取二升分溫三服亦療落身後血續斷湯治妊娠下血及尿血當歸生地黃各一兩續斷半兩赤芍藥二錢半上為末空心蔥白煎湯調下二錢療妊娠尿血方阿膠熟地黃各等分上為細末空心粥飲調下二錢補遺姜蜜湯治妊娠小便尿血生薑七片蜜半盞白茅根一握上入水濃煎服五苓散去桂加阿膠炒同為粗末每服四錢用車前子白茅根濃煎溫服又方白茅根濃煎湯吞酒蒸黃連丸眼目一婦將臨月忽然兩目失明不見燈火頭痛眩暈項腮腫滿不能轉頸諸治不瘥反加危困偶得消風散服之病減七八獲安分娩其眼吊起人物不辨乃以四物湯加荊芥防風更服眼科天門冬飲子二方間服目漸稍明大忌酒面煎炙雞羊鵝鴨豆腐辛辣熱物並房勞此證因懷妊多居火間衣著太暖伏熱在內或酒面炙爆太過以致胎熱也天門冬飲子治妊娠肝經風熱上攻眼目帶吊失明天門冬去心知母茺蔚子五味子防風去蘆茯苓去皮川羌活去蘆人參各一錢上作一服水二盅生薑三片煎至一盅食後服臟躁悲傷陳良甫記管先生治一妊娠四五個月臟躁悲傷遇晝則慘淒淚下數欠象若神靈如有所憑醫與巫皆無益與仲景大棗湯一投而愈薛前證或因寒水攻心或肺有風邪者治當審察一妊婦無故自悲用大棗湯二劑而愈後復患又用前湯佐以四君子加山梔而安一妊婦悲哀煩躁其夫詢之云我無故但自欲悲耳用淡竹茹湯為主佐以八珍湯而安仲景婦人臟躁悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之甘麥大棗湯方甘草三兩小麥一升大棗十枚上以水六升煮取三升溫分三服亦補脾氣許學士云鄉里有一婦人數欠伸無故悲泣不止或謂之有祟祈禳請禱備至終不應予忽憶金匱有一證云婦人臟躁悲傷欲哭象如神靈所作數欠伸者宜甘麥大棗湯予急令治藥盡劑而愈古人識病制方種種絕妙如此淡竹茹湯治妊婦心虛驚悸臟躁悲傷不止又治虛煩甚效麥門冬去心小麥半夏湯泡各二兩半人參白茯苓各一兩半甘草一兩上銼散每服四錢姜五片棗一枚淡竹茹一團如指大同煎溫服又方治胎臟躁自悲自哭自笑上以紅棗燒存性米飲調下妊病可下胎斷胎大全妊娠羸瘦或挾疾病臟腑虛損氣血枯竭既不能養胎致胎動而不堅固終不能安者則可下之免害妊婦也薛前證宜用腰腹背痛門方論主之其胎果不能安者方可議下慎之慎之鴻臚張淑人痢疾後胎動心神不安肢體殊倦用八珍散二十餘劑漸愈因勞加煩熱頭痛以大劑補中益氣湯加蔓荊子治之熱痛頓止仍用前散又五十餘劑而安其後生產甚易今大中丞許少薇公向令金壇時夫人胎漏療治不止時迫於上許公欲因其勢遂下之謀於余余第令服佛手散以為可安即安不可安即下順其自然而已既數服公憂疑不決女科醫者檢方以進乃用牛膝一兩酒煎服謂牛膝固補下部藥耳用之何害公遂信而服之而胎果下余時有從母之戚未及知比知而馳至則聞盈庭皆桂麝氣蓋因胞衣未下許醫又進香桂散矣血遂暴下如大河決不可復止亟煎獨參湯未成而卒公哀傷甫定而過余謝且念余曰牛膝補藥而能墮胎何也余對曰生則宣而熟則補故破血之與填精如箭鋒相拄豈獨牛膝哉鹿角亦墮胎破血而煎為白膠則安胎止血因其熟而信其生此之謂粗工公嘆恨無已余故特著之以為世戒大全治妊娠母因疾病胎不能安可下之取七月七日法面大全作曲四兩水二大盞煎取一盞三分綿濾去滓分溫三服立下又方大麴五升清酒一斗煮二沸去渣分五服隔宿勿食但再服其子如糜母無疾苦千金不傳炒又方麥糵一升為末和水煮二升服之即下神效又方附子二枚為末以淳苦酒和塗右足去之大良又方取雞子一枚以三指撮鹽放雞子中服之立出按陳良甫所列有牛膝湯桂心散諸方婁全善皆不之取而獨取此數方其見卓矣斷產丹斷子法用白麵曲一升無灰酒五升打作糊煮二升半用絹帛濾去渣作三服候前月經將來日晚下吃一服次日五更吃一服天明吃一服月經即行終身絕子大斷產驗方故蠶紙方圓一尺燒為末酒飲調服終身不復懷孕又方用油煎水銀一日方息空心服棗核大一丸永斷孕不損人四物湯每服五錢加蕓薹子二錢於經行後空心溫服薛前云用蠶故紙尺許燒灰為末產後酒服之血虛者終不復孕大抵斷產之劑多用峻厲往往有不起者是則產之害未若斷產之害也吾聞閣老張羅峰太常李恆齋俱因服斷產之劑自謂形體俱怯遇勞必病有由然矣按夷堅志載東京女子白牡丹以售墮胎藥生得惡報今雖列如上方以備萬一之用用者尚其慎之胎自墮丹陽施陰化胎孕乃成血氣虛損不足營養其胎自墮或勞怒傷情內火便動亦能墮胎推原其本皆因於熱火能消物造化自然病源乃謂風冷傷於子臟而墮此未得病情者也予見賈氏婦但有孕至三月左右必墮診其脈左手大而無力重取則澀知其血少也以其妙年只補中氣使血自榮時正夏初教以濃煎白朮湯下黃芩末一錢服三四十帖遂得保全其生因而思之墮因內熱而虛者於理為多曰熱曰虛當分輕重蓋孕至三月正屬相火所以易墮不然何以黃芩熟艾阿膠等為安胎妙藥耶好生之工幸無輕視一婦年三十餘或經住或成形未具其胎必墮察其性急多怒色黑氣實此相火太盛不能生氣化胎反食氣傷精故也因令住經第二月用黃芩白朮當歸甘草服至三月盡止藥後生一子一婦經住三月後尺脈或澀或微弱其婦卻無病知是子宮真氣不全故陽不施陰不化精血雖凝終不成形至產血塊或產血胞一婦腹漸大如懷子至十月求易產藥察其神色甚困難與之藥不數日生白蟲半桶蓋由婦之元氣太虛精血雖凝不能成胎而為穢腐蘊積之久濕化為熱濕熱生蟲理之所有亦須周十月之氣發動而產終非佳兆其婦不及月死濕熱生蟲譬之溝渠汙濁積久不流則諸蟲生於其間矣汪石山治一婦長瘦色黃白性躁急年三十餘常患墮胎已七八見矣診其脈皆柔軟無力兩尺雖浮而弱不任尋按曰此因胎墮太多氣血耗甚胎無滋養故頻墮譬之水涸而禾枯土削而木倒也況三月五月正屬少陽火動之時加以性躁而急發之故墮多在三五七月也宜大補陰湯去桂加黃柏黃芩煎服仍用研末蜜丸服之庶可保生服半年胎固而生二子錢仲陽治一孕婦病醫言胎且墮錢曰妊者五臟傳養率六旬乃更候其月偏補之何必墮已而母子皆全陳鬥岩治一婦有胎四月墮下逾旬腹腫發熱氣喘脈洪盛面赤口鼻舌青黑陳診之曰脈洪盛者胎未墮也面赤心火盛而血乾也舌青口鼻黑肝既絕而胎死矣內外皆曰胎墮久矣復診色脈如前以蛇蛻煎湯下平胃散加芒硝歸尾一倍服之須臾腹鳴如雷腰腹陣痛復一死胎隨下病亦愈程仁甫治一婦年近四十稟氣素弱自去其胎五日內漸漸腹脹如鼓至心前上吐不能食用補藥不效診六脈微弱但只叫脹死此乃損傷脾氣而作脹然急則治其標若泥丹溪法恐緩不及事矣用桃仁承氣加枳實厚朴倍硝黃煎服四分吐去其一次早仍不通事急又服琥珀丸三錢至申時大通脹減但體倦四肢無力口不知味發熱再用參耆歸芍楂朮陳皮八劑而安江應宿治汪鎬妻三十五歲厭產誤服打胎藥下血如崩旬余腹痛一陣即行或時鼻衄諸藥不效診得六脈數而微弦乃厥陽之火泛逆投四物換生地黃加阿膠炒黑山梔蒲黃一劑愈薛氏云大抵治法須審某月屬某經育養而藥之濟生芎藭補中湯治懷孕血氣虛弱不能衛養以致數月而墮名曰半產每見婦人孕不能滿十月而損墮得服此遂安全芎藭五味子阿膠蛤粉炒乾薑炮各一錢黃耆去蘆蜜炙當歸酒浸白芍藥白朮各一錢半杜仲去粗皮炒去絲人參木香不見火甘草各五分炙上作一服水二盅煎至一盅不拘時服阿膠湯治妊娠數墮胎小腹㽲痛不可忍阿膠炙燥熟乾地黃焙艾葉微炒芎藭當歸切焙杜仲去粗皮炙銼白朮各一兩上㕮咀每服四錢水一盞半棗三枚擘破同煎至八分去滓食前溫服杜仲丸治妊娠三兩個月胎動不安防其欲墮宜預服之杜仲薑製炒去絲續斷酒浸各二兩為末煮棗肉杵丸梧子大每服七十丸米飲下四制艾附丸治婦人數墮胎由氣不升降所以胎氣不固尤宜服此香附杵去毛淨一斤分四分一分酒浸一分醋一分童便一分鹽水各浸七日取出焙乾為細末醋煮糊和丸梧子大每服七十丸空心溫酒下肥人只依本方瘦人加澤蘭葉赤茯苓各二兩一方用香附子一斤艾葉四兩當歸二兩俱用醋煮刪繁方治妊娠懷胎數落而不結實或冷或熱百病之源經心錄同甘草黃耆人參川芎白朮地黃吳茱萸各等分一方有當歸乾薑上為末空心溫酒調二錢忌菘菜桃李雀肉醋物婁按丹溪論俱是虛熱而無寒者今姑存此一方以俟施之於千百而一者也醋附丸治數墮胎方見血崩千金療妊娠三個月胎欲墮方灸膝下一寸七壯妊子不成時時受胎後漏下五色疼痛灸胞門關門左邊二寸名胞門右邊二寸名子戶胎墮後為半產夫妊娠日月未足胎氣未全而產者謂之半產蓋由妊婦衝任氣虛不能滋養於胎胎氣不固或攧撲閃墜致氣血損動或因熱病溫瘧之類皆令半產仲景謂寒虛相搏此名為革婦人則半產漏下是也又云半產俗呼小產或三四月或五六月皆為半產以男女成形故也或因憂恐悲哀暴怒或因勞力打撲損動或觸冒暑熱忌黑神散恐犯熱藥轉生他疾宜玉燭散和經湯之類便產須知云小產不可輕視將養十倍於正產可也又云半產即肌肉腐爛補其虛損生其肌肉益其氣血去其風邪養其臟氣將養過於正產十倍無不平復宜審之薛小產重於大產蓋大產如慄熟自脫小產如生採破其皮殼斷其根蒂也但人輕忽致死者多治法宜補形氣生新血去瘀血若未足月痛而欲產芎歸補中湯倍加知母止之若產而血不止人參黃耆湯補之若產而心腹痛當歸川芎湯主之胎氣弱而小產者八珍湯固之若出血過多而發熱聖愈湯汗不止急用獨參湯發熱煩躁肉瞤筋惕八珍湯大渴面赤脈洪而虛當歸補血湯身熱面赤脈沉而微四君薑附東垣云晝發熱而夜安靜是陽氣自旺於陽分也晝安靜而夜發熱是陽氣下陷於陰中也如晝夜俱發熱者是重陽無陰也當峻補其陰王太僕云如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止時節而動是無火也如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也若陽氣自旺者補中益氣湯陽氣陷於陰者四物二連湯重陽無陰者四物湯無火者八味丸無水者六味丸一妊婦五月服剪紅丸墮胎腹中脹痛服破血藥益甚手按之愈痛余曰此峻藥重傷脾胃受患用八珍倍參耆半夏乳沒二劑痛止數劑全愈史仲子室年甫二十疫胎墮時咳服清肺解表喘急不寐請視余曰脾土虛不能生肺金藥重損之與補中益氣加茯苓半夏五味炮姜四劑漸愈再往視又與八珍加五味及十全大補湯而全愈陳氏婦張素怯弱生女自乳因病疥年餘遂致羸困復因執喪禮勞頓數欲眩僕一日感氣忽患心脾高腫作疼手不可按嘔吐不止六脈微細之極陳翁自以脈雖虛而病形則實誤臆諸痛不可補氣乃用青皮香附吳萸等藥而愈繼復患瘧且墮胎又自投理氣行血之藥病去元氣轉脫再投參耆補劑不應矣六脈如絲欲絕思非附子不能起因亟請薛診之云此由理氣損真之誤也連投參耆歸朮附子薑桂六劑間用八味丸五日眠食漸甘六脈全復薛諭之云向使心脾疼時即服此藥瘧亦不作矣一妊婦墮胎昏憒不省自汗發搐時吐痰自用養血化痰之劑昏憒不省痰涎湧出彼以為中風欲用祛風化痰予曰此屬脾氣虛寒所致遂用十全大補加炮姜二十餘劑尋愈生地黃湯治妊娠胎氣損動氣血不調或攧撲閃墜以致胎墮墮後惡滯不盡腹中㽲痛生乾地黃焙一兩大黃暴煨芍藥白茯苓去黑皮當歸切炒細辛去苗甘草炙黃芩去黑皮桂去粗皮各半兩上㕮咀每服五錢匕水一盞半入生薑大棗拍碎同煎至一盞去滓不拘時溫服人參湯治半產後血下過多心驚體顫頭目運轉或寒或熱臍腹虛脹疼痛人參麥門冬去心焙生乾地黃焙當歸洗焙芍藥黃耆白茯苓去皮甘草炙各一兩㕮咀每服三錢水一盞煎至七分去滓食前溫服大墮胎後復損經脈而下血不止甚則煩悶至死皆以調補胃氣為主薛前證若肝經血熱用四物參朮山梔肝經風熱用防風黃芩丸肝經怒火用加味逍遙散脾經氣虛用四君歸地脾經鬱滯用加味歸脾湯氣滯不和用紫蘇飲骨氣下陷用補中益氣湯人參黃耆湯治小產氣虛血下不止人參黃耆炒當歸白朮炒白芍藥炒艾葉各一錢阿膠炒二錢上作一劑水煎服治妊娠損動下血不止腹痛宜服此阿膠一兩炒艾葉半兩水一大盞煎六分去滓空心服治妊娠損動下血不止方甘草一兩炙阿膠二兩雞子一個上以水二大盞煮甘草一盞三分去滓下雞子膠候膠烊攪勻分三服龍骨散療因損娠下惡血不止龍骨當歸地黃各二兩艾葉一兩炒地榆阿膠芍藥乾薑各一兩半蒲黃一兩二錢半牛角䚡炙焦二兩半共為細末上食前用米飲調下二錢千金療落胎下血不止方上以生地黃汁一小盞調代赭石末一錢日三服治妊娠下血不止疼痛方亦治小便不禁家雞翎燒灰細研以溫酒調下二錢如人行五里再服以效為度千金療妊娠胎墮下血不止方以丹參十二兩細切酒五升煮取三升分三服補遺催生如神散妙又方香附子為末米飲調下當歸酒治妊娠墮胎後血不出當歸炙令香芍藥炒各二兩㕮咀每服三錢匕無灰酒一盞入生地黃汁一合銀器內慢火煎至七分去滓溫服以惡血下為度烏金散治妊娠墮胎後惡血不下兼治諸疾血病好墨二兩折二寸挺子燒通赤用好醋一升蘸七遍又再燒通赤放冷別研為末沒藥研麒麟竭各二錢半麝香一錢上為細末每服溫酒調下一錢匕如血迷心用童便加酒調下二錢匕治妊娠墮胎後血不出少腹滿痛用羚羊角燒灰細研如面每服三錢不拘時以豆淋酒調下治妊娠墮胎下血不盡苦煩滿欲極時發寒熱狂悶鹿角屑一兩熬上用水一大盞煎豉一合取汁六分分三服調鹿角屑二錢服日三須臾血下紅藍花散治墮胎後血不出奔心悶絕不識人紅藍微熬過男子發燒存性京墨燒紅血竭研蒲黃隔紙炒各等分上為細末以童便小半盞調二錢服之立效白蜜湯治墮胎後惡血不出白蜜二兩生地黃取汁一盞酒半盞上汁與酒共入銅器中煎五七沸入蜜攪勻分兩服服三劑百病可愈豬膏飲治墮胎血不出上搶心疼痛煩憒豬膏七合白蜜三合生地黃切二兩上先將豬膏地黃相和煎令赤色去地黃納蜜攪勻分溫二服相次再服當歸湯治妊娠墮胎胞衣不出當歸切炒牛膝酒浸切焙各一兩半木通銼滑石研各二兩冬葵子炒二合瞿麥穗一兩上㕮咀每服三錢水一盞半煎至七分去滓溫服未下再服以下為度地黃湯蒲黃炒生薑切炒各二錢半生地黃半兩以銅竹刀切炒上以無灰酒三盞於銀器內同煎至二盞去滓分三服未下再作服澤蘭湯澤蘭葉切研滑石末各半兩生麻油少許上以水三盞先煎澤蘭至一盞半去滓入滑石末並油更煎三沸頓服之未下更服蒲黃酒作丸名槐子丸蒲黃炒一合槐子十四枚為末上以酒三盞煎至二盞去滓分溫二服未下更作服又治妊娠不足月欲產腹痛為末蜜丸酒下治墮胎胞衣不出腹中㽲痛牽引腰脊下並聖惠用蟻窟土三升炒熱帛裹拓心下胞自出也又方好墨細研末溫酒調下二錢頻服效治妊娠胎死腹中衣不出及產後卒有別病欲至狼狽方刺熱羊血飲一小盞極效又方以水噀其面神驗加醋少許又方洗兒水半盞令母服其衣即出勿令產婦知又方治胞衣未下腹滿則殺人用水一碗煮豬脂一兩煎十數沸和脂服之當下又方出如宜方以雞子一枚取清吞之又方出如宜方用鐵斧燒令通赤投酒中沸定則出飲之當歸川芎湯治小產後瘀血心腹痛或發熱惡寒當歸川芎熟地黃自制白芍藥炒玄胡索炒紅花香附青皮炒澤蘭牡丹皮桃仁各等分上水煎入童便酒各小半盞服若以手按腹愈痛此瘀血為患宜此藥或失笑散消之若按之不痛此是血虛宜四物參苓白朮若痛而作嘔此是胃虛宜六君子若痛而作瀉此是脾虛宜六君子送二神丸芎藭湯治墮胎心腹疼痛芎藭芍藥白朮阿膠炒令燥甘草炙各一兩上㕮咀每服三錢水一盞入艾葉糯米生薑同煎至六分食前服一方無白朮有人參當歸散治產後氣血虛弱惡露內停憎寒發熱當歸白芍藥炒川芎黃芩炒各一兩白朮五錢上為細末溫童便調下二錢聖愈湯治血虛心煩睡臥不寧或五心煩熱熟地黃酒拌蒸半日生地黃酒拌川芎人參各七錢五分當歸酒拌黃耆炒各五錢上水煎服當歸補血湯治肌熱躁熱目赤面紅煩渴引飲晝夜不息脈洪大而虛重按全無此脈虛血虛也若誤服白虎湯必死當歸三錢黃耆一兩上水煎服四物二連湯治血虛發熱或口舌生瘡或晝安夜熱當歸川芎熟地黃芍藥胡黃連宣黃連各一錢上作一劑水煎服東垣云婦人分娩及半產漏下昏冒不省瞑目無所知覺蓋因血暴亡有形血去則心神無所養心與包絡者君火相火也得血則安亡血則危火上熾故令人昏昌火勝其肺瞑目不省人事是陰血暴去不能鎮撫也血已虧損往往用滑石甘草石膏之類乃辛甘大寒文藥能瀉氣中之熱是血虧瀉氣乃陰虧瀉陽使二者俱傷反為不足虛勞之病昏迷不省者上焦心肺之熱也此無形之熱用寒涼之藥驅令下行豈不知上焦之病悉屬於表乃陰證也汗之則愈今反下之幸而不死暴虧氣血必夭天年又不知內經有說病氣不足宜補不宜瀉但瞑目之病悉屬於陰宜汗不宜下又不知傷寒鬱冒得汗則愈是禁用寒涼藥也分娩半產本氣不病是暴去其血亡血補血又何疑焉補其血則神昌常時血下降亡今當補而升舉之心得血而養神不昏矣血若暴下是秋冬之令太旺今舉而升之助其陽則目張神不昏矣今立一方補血養血生血益陽以補手只厥陰之不足也全生活血湯紅花三分蔓荊子細辛各五分生地黃夏月加之熟地黃各一錢蒿本川芎各一錢半防風諸陽既陷何以知之血下脫故也羌活獨活甘草炙柴胡去苗當歸身酒洗葛根各二錢白芍升麻各三錢㕮咀每服五錢水二盞煎至一盞去滓食前稍熱服胎不長大夫妊娠不長者因有宿疾或因失調以致臟腑衰損氣血虛弱而胎不長也當治其疾疚益其氣血則胎自長矣薛前證更當察其經絡審其所因而治之一妊婦胎六月體倦懶食面黃晡熱而胎不長因勞欲墜此脾氣不足也用八珍湯倍加參朮茯苓三十餘劑脾胃漸健胎安而長矣一妊婦因怒寒熱往來內熱晡熱脅痛嘔吐胎至八月而不長此因肝脾鬱怒所致用六君加柴胡山梔枳殼紫蘇桔梗病愈而胎亦長矣安胎白朮散治妊娠宿有冷胎痿不長或失於將理傷胎多墮此藥補榮衛養胎氣白朮川芎各一兩吳茱萸湯泡半兩甘草炙一兩半為細末每服二錢食前溫酒調下忌生冷果實白朮散見前胎動不安黃耆散主妊娠胎不長安胎和氣思食利四肢黃耆白朮陳皮麥門冬白茯苓前胡人參各七錢半川芎甘草各半兩上㕮咀每服三錢水一盞姜三片棗一枚煎至七分去滓溫服人參丸主妊娠胎不長宜服養胎人參白茯苓當歸柴胡刺蘇厚朴桑寄生各一兩枳殼七錢半甘草半兩上為細末煉蜜為丸如梧子大每服二十丸食前溫水吞下集驗治婦人懷胎不長方鯉魚長一尺者去腸肚鱗以水漬沒納鹽及棗煮熟取汁稍稍飲之當胎所腹上當汗出如牛鼻狀雖有所見胎雖不安者十餘日輒一作此令胎長大甚平安附枳實檳榔丸安養胎氣調和經候癥瘕癖塊有似孕婦可以久服血氣通和枳實生用檳榔黃連黃柏黃芩當歸木香阿膠灰炒研各半兩上為細末水和丸如小豆大每服三十丸不拘時用溫米飲送下日月未足欲產過期不產大全婦人懷胎有七月八月而產者有至九月十月而產者有經一年二年乃至四年而後產者各依後法治婁先期欲產者涼血安胎過期不產者補血行滯薛一妊婦八個月胎欲墜似產臥久少安日晡益甚此氣血虛弱朝用補中益氣湯加茯苓半夏隨愈更以八珍湯調理而安集驗知母丸治日月未足而痛如欲產者兼治產難及子煩知母不以多少為細末煉蜜丸如雞頭大溫酒嚼下日三服一方丸如梧子大粥飲下二十丸槐子丸治妊娠月數未足而似欲產腹痛者槐子蒲黃各等分上為細末蜜丸如梧子大溫酒下二十丸以痛止為度又方取蒲黃如棗核大篩過以井花水調服又方梁上塵灶突煤同為末空心溫酒服方寸匕千治日月未足欲產搗菖蒲根汁一二升灌喉中羅治過期不產方四物湯加香附桃仁枳殼縮砂紫蘇水煎服即生鬼胎大全夫人臟腑調和則血氣充實風邪鬼魅不能幹之若榮衛虛損則精神衰弱妖魅鬼精得人於臟狀如懷娠故曰鬼胎也薛前證因七情脾肺虧損氣血虛弱行失常道衝任乖違而致之者乃元氣不足病氣有餘也若見經候不調就行調補庶免此證治法以補元氣為主而佐以雄黃丸之類行散之若脾經鬱結氣逆者用加味歸脾湯調補之若脾虛血不足者用六君芎歸培養之肝火血耗者用加味逍遙散滋抑之肝脾鬱怒者用加味歸脾逍遙二藥兼服腎肝虛弱者用六味地黃丸一婦人經閉八月肚腹漸大面色或青或黃用胎證之藥不應余診視之曰面青脈澀寒熱往來肝經血病也面黃腹大少食體倦脾經血病也此鬱怒傷脾肝之證非胎也不信仍用治胎散之類不驗余用加味歸脾逍遙二藥各二十餘劑諸證稍愈彼欲速效別服通經丸一服下血昏憒自汗惡寒手足俱冷嘔吐不食余用人參炮姜二劑漸愈又用十全大補五十餘劑而安雄黃丸治妊娠是鬼胎致腹中黑血散下腹痛雄黃細研鬼臼去毛莽草丹砂細研巴豆去皮心油獺肝炙令黃各半兩蜥蜴一枚炙黃蜈蚣一條炙黃上為細末蜜丸如梧子大空心溫酒下二丸日兩服後當利如不利加至三丸初下清水次下蟲如馬尾狀無數病極者下蛇蟲或如蛤蟆卵雞子或如白膏或如豆汁其病即除治婦人鬼胎及血氣不可忍方斑蝥去頭足翅炒延胡索炒各三錢上為細末再研如面溫酒調服半錢胎下為度治婦人虛羸有鬼胎癥塊經候不通以芫花根三兩銼炒令黃色為細末桃仁煎湯調下一錢當下惡物補遺治婦人鬼胎如抱一甕吳茱萸川芎秦艽柴胡殭蠶巴戟巴豆不去油芫花醋煮二兩上為末煉蜜丸梧子大每服七丸蜜酒下即出惡物而愈上方俱犯毒藥不可輕用姑以古方存之耳臨產坐草法脈訣欲產之婦脈離經沉細而滑也同名夜半覺痛應分誕來日日午定知生脈經曰離經其脈浮腹痛引腰脊為欲生也但離經者不產也又云其脈離經夜半覺日中則生也經者常也謂離其常處為離經假如孕婦昨日見左沉實為男之脈今日或脈浮是離其尋常之脈而異於昨日又且腹痛知是將誕也通真子引難經一呼三至曰離經為解李晞範又引難經一呼一至曰離經以解沉細而滑皆非也難經言損至二至雖同名離經其脈與理則不同且脈經明言離經其脈浮也不曾引援難經之文合脈訣因其言脈浮又添沉細而滑同名離經蓋以前所診男女脈或云浮大為女若只脈浮為離經若平常見浮大為女之脈安辨離經故又增沉細而滑以見離為浮大之常經為常滑也聖惠方云夜半子時覺腹痛來日午時必定生產謂子午相沖正半日時數也通真子曰夜半痛日午生此言恐未為的又曰腹痛而腰不痛未產也若腹痛運腰痛甚者即產所以然者腎繫於腰胞系於腎故也診其尺脈轉急如切繩轉珠者即產也生產有難易痛來有緊慢安可定以半日當以活法身重體熱寒又頻舌下之脈黑復青反舌上冷子當死腹中須遣母歸冥面赤舌青細尋看母活子死定應難唇口俱青沫又出母子俱死總教拼面青舌赤沫出頻母死子活定知真不信若能看應驗尋之賢哲不虛陣脈指南作面青舌赤蓋面以候母舌以候子今雲子活合以舌赤為是若云舌青則與前面赤舌青母活子死之候相反若胎先下其子得活如未下子母俱亡自身重體熱寒又頻至此並不用脈只以外候參訣子母生死蓋以臨產脈不可定但當以察色而知之楊子建十產論一曰正產者婦人懷胎十月滿足忽腰腹作陣疼痛相次胎氣頓陷至於臍腹痛極乃至腰間重痛穀道挺迸繼之漿破血出兒子遂生名曰正產二曰傷產者蓋一人之生陰注陽定各有時日不可改移今有未產一月以前忽然臍腹疼痛有如欲產仍卻無事是名試月非正產也但一切產母未有正產之候即不可令人抱腰產母亦不可妄亂用力蓋欲產之婦臍腹疼痛兒身未順收生之婦卻教產母虛亂用力兒身才方轉動卻被產母用力一逼使兒錯路忽橫忽倒不能正生皆緣產母用力未當之所致也凡產母用力須待兒子順身臨逼門戶方始用力一送令兒下生此方是產母之用力當也若未有正產之候而用力傷早並妄服藥餌令兒下生譬如堰苗而助長無益而有害矣此名傷產婁上傷產一法最為切要慎勿輕忽也凡十月未足臨產腹痛或作或止或痛不甚者名曰弄痛非正產之候或腹雖痛甚而腰不甚者非正產之候胎高未陷下者非正產之候穀道未挺迸者非正產之候水漿未破血未出者非正產之候漿血雖出而腹不痛者非正產之候凡未有正產候且令扶行熟忍如行不得或憑物坐之或安臥之或服安胎藥一二服得安即止慎勿妄服催生藥餌愴惶致令產母憂恐而挫其志務要產母寬心存養調停亦令坐婆先說解論之如覺心中煩悶可取白蜜一匙新汲水調下切勿亡亂用力先困其母直待子逼門戶腰重痛極眼中如火穀道挺迸時是正產候方可用力並服催生藥也予男婦於未產一月以前腰腹俱痛全似將產其痛至甚但遇巳牌稍止如此者將十餘日計無所出因閱此條遂與安胎藥加參術數服間與肉味養之由是平復不痛又二十餘日始產一男是時若妄動亂用力並服催生等藥立見危亡矣三曰催產者言婦人慾產漿破血下臍腹作陣疼痛極甚腰重穀道挺迸已見是正產之候但兒卻未生即可服藥以催之或有經及數日產母困苦已分明見得是正產之候但兒子難生亦可服藥以助產母之正氣令兒速得下生此名催產四曰凍產者冬月天冷產母經血得冷則凝以致兒子不能生下此害最深若冬月產者下部不可脫去綿衣並不可坐臥寒處當滿房著火常有暖氣令產母背身向火令臍下腿膝間常暖血得熱則流散使兒易生此名凍產薛荊婦孟冬分娩艱難勞傷元氣產子已死用油紙捻燒斷臍帶藉其氣以暖之俄頃忽作聲此兒後無傷食作瀉之證可見前法之功不誣五曰熱產者盛夏之月產婦要溫涼得所不可恣意取涼傷損胎氣亦不可人多熱氣逼襲產母使產母血沸而有發熱頭痛面赤昏昏如醉乃至不知人事此名熱產若夏月風涼陰雨亦不可任意取涼恐生大病六日橫產者兒先露手或先露臂此由產母未當用力而用之過也兒身未順用力一逼遂至身橫不能生下當令產母安然仰臥後令看生之人先推其手令入直上漸漸逼身以中指摩其肩推上而正之或以指攀其耳而正之須是產母仰臥然後推兒直上徐徐正之候其身正煎催生藥一盞吃了方可用力令兒下生此名橫產七曰倒產者產母胎氣不足關鍵不牢用力太早致令兒子不能迴轉便直下先露其足當令產母仰臥令看生之人推其足入去不可令產母用分毫力亦不得驚恐使兒自順云蛇蛻散治妊婦欲產時不肯伸舒行動多曲腰眠臥忍痛兒在腹中不能得轉故腳先出謂之逆生須臾不救母子俱亡用烏蛇蛻一條蟬蛻十四枚血餘一握用胎髮並燒灰存性研分二服溫酒調連進之仰臥少頃或用小絹針於兒腳心刺三五刺用鹽少許塗刺處即時順生母子俱活又法以鹽塗兒足底又可爪甲搔之並以鹽摩母腹上又以手中指取鍋底墨交畫兒足下即順生又方取其父名書兒足下即順生若孕婦橫生不可出者以車前子為末酒服二錢匕又方菟絲子為末酒調服一錢匕米飲調亦得又以百草霜香白芷不見火各等分用童便與好醋各一合調成膏沸湯浸服甚者二服即生若婦人橫逆難產子死腹中先用黑豆一大合炒熟水與重便合煎服神效又方用艾葉半斤酒四升煮取一升服之又以當歸為末酒服方寸匕紫蘇湯調服亦可八曰偏產者兒身未正產母用力一逼致令兒頭偏拄左腿或偏拄右腿故頭雖露偏拄一畔不能生下當令產母仰臥次令看生之人輕輕推兒近上以手正其頭令兒頭頂端正然後令產母用力一送即便生下若是小兒頭後骨偏拄穀道只露其額當令看生之人以綿衣炙溫裹手於穀道外方輕輕推兒頭令正便令產母用力送兒生也此名偏產九曰礙產者兒身已順而露正頂不能生下蓋因兒身迴轉肚帶攀其肩以此露正頂而不能生當令產母仰臥令看生之人輕推兒近上徐徐引手以中指按兒肩下撥其肚帶仍須候兒身正順方令產母用力一送使兒生下此名礙生上橫產倒產偏產礙產四法若看生之人非精良妙手不要依用此法恐恣其愚以傷人命也按倒產者今世往往隨其倒足生下並無後患子母雙全不必依推足上之法亦可又礙產者往往肚帶有纏在兒頂上而兒頭自出在產門外看生之人以手撥其肚帶從兒頭頂過而下之者又有肚帶纏在頂上一匝而兒與胞衣自然同下者皆無妨不必以此礙產法入產門撥下也十曰坐產者兒將欲生其母疲倦久坐椅褥抵其生路急於高處系一手巾令產母以手攀之輕輕屈足坐身令兒生下非坐在物上也此名坐產十一曰盤腸產者臨產母腸先出然後兒生趙都運恭人每產則大腸先出然後產子產後其腸不收甚以為苦醫不能療偶在建昌得坐婆一法而收之其法以醋半盞新汲水七分調停噀產母面每噀一縮三噀收盡此良法也按前證古方以蓖麻子仁四十九粒研塗產母頭頂腸收上急洗去其腸若干以磨刀水少許濕潤之內用磁石煎湯飲之即收上磁石須陰陽家用有驗者若以水噀母面恐驚則氣散丹產後腸不收香油五斤煎熱盛盆中候溫坐油盆中約一食時以皂角末吹入鼻中嚏作立上妙斗門大半夏為末搐鼻中則腸上矣又方以大紙捻蘸香油點燈吹滅以煙燻產母鼻中腸即上矣又方腸出盛以潔淨漆器濃煎黃耆湯浸之腸即上薛欲產之時覺腹內轉動即當正身仰臥待兒轉身向下時作痛試捏產母手中指中節或本節跳動方與臨盆即產矣若初覺不仰臥以待轉胞或未產而水頻下此胞衣已破血水先干必有逆生難產之患若胎衣破而不得分娩者保生無憂散以固其血自然生息如血已耗損用八珍湯料一斤益母草半斤水數碗煎熟不時飲之亦有得生者凡孕婦只腹痛未產也若連腰痛甚者將產也蓋腎候於腰胞系於腎故也凡孕家宜預請有仁心知事穩婆常以恩結其心先與說知倘有生息不順只說未產或遇雙胎只說胎衣未下恐驚則氣散愈難生息余家親驗之大抵難產多患於鬱悶安佚富貴之家治法雖云胎前清氣產後補血不可專執若脾胃不實氣血不充宜預調補不然臨產必有患難如因難產或大寒時急以大油紙捻徐徐燒斷其臍帶雖兒已死令暖氣入腹多得復生切勿用刀斷之催生法大大凡生產自有時候未見時候切不可強服催生滑胎等藥或勢不得已則服之又云切不可坐早及令坐婆亂動手凡催生藥必候腰痛甚胎陷下漿血破方可服大法滑以流通澀滯苦以驅逐閉塞香以開竅逐血氣滯者行氣胞漿先破疲睏者固血丹溪云催生只用佛手散最穩當又效捷方見胎產大法滑劑催生如聖散黃蜀葵子小半合一方二錢重研爛以酒濾去滓溫服神妙或漏血胎干難產痛極者並進三服良久腹中氣寬胎滑即產須見正產候方可服之歌曰黃葵子炒七十粒細研酒調濟君急若遇臨危產難時免得全傢俱哭泣又方以香油白蜜小便和勻各半盞調益母草末服一方止用油蜜小便能下難產又方治橫倒生者明阿膠炒滑石末各一兩葵子二兩上水一盞半煎至一盞去滓分二服治難產五六日不得分娩者疲睏虛乏光明水膠二兩微火焙好酒一升半煎滾入膠候烊再入新雞子一枚鹽一錢匕攪勻放溫令產母坐椅上伸腰大口作二次服覺小便重即生緣坐草早驚動故也苦劑催生柞木飲子治產難或橫或倒死胎爛脹腹中此方屢用神效大柞木枝一大堆長一尺洗淨寸銼生用甘草大者五寸銼作五段上用新汲水三升半同入新瓷瓶內以紙三重封緊文武火煎至一升半令香候產婦腰重痛欲坐草時溫飲一小盞腰末重痛勿服便覺心下開豁如覺渴再飲一盞至三四盞覺下重便生此方最驗梅治難產礙胎在腹中如已見兒胎衣不出或胎死者蒺藜子貝母各四兩為末米飲下一匙如人行四五里許不下再服按苦能下氣柞木蒺藜貝母則又不專於苦要之亦有利竅行血之功茲特因婁氏所編而列之耳香劑乳朱丹用通明乳香研細以豬心血為丸梧子大硃砂為衣日乾每服一粒催生冷酒化下良久未下再服一粒若大段難產以蓮葉心蒂七個水二盞煎至一盞放溫化下一粒良久未下再服其驗如神如胎下胞衣不下者服此便下若胎橫逆不順即先服神應黑散再服此藥催之合藥時要五月五日午時極妙或七月七日三月三日及初上辰日亦可又方通明乳香如皂角子大為末腰痛時用新汲水一小盞入醋少許同煎令產母兩手捉兩石燕坐婆調藥飲水須臾坐草便生無痛楚神良開骨膏五月五日午時作乳香研細滴水丸如芡實大每服一粒無灰酒吞下又方乳香硃砂等分為細末麝香酒調下催生丹一名兔腦丸治產婦生理不順產育艱難或橫或逆十二月兔腦髓去皮膜研如泥母丁香一錢細末乳香二錢半另研麝香另研一字上三味拌勻以兔腦髓和丸雞頭實大陰乾油紙裹每服一丸溫湯下即產兒握藥出如意散臨產腰疼方可服之人參為末乳香各一錢硃砂二錢上同研臨產急用雞子清一個調藥末再用生薑自然汁調開冷服如橫倒等即時端順子母無恙勝金散郭稽中雲產難者因兒轉身將兒枕血塊破碎與胞中敗血壅滯兒身不能便利是以難產急服勝金散消散其血使兒自易生陳無擇云多因兒未轉順坐草太早或努力太過以致胞衣破而血水乾產路澀而兒難下宜先服催生如神散以固其血設或逆生橫產當用前法針刺之麝香一錢研鹽豉一兩以青布裹了燒紅急研細上取秤錘燒赤淬酒中以酒調服一錢行氣催生湯治妊娠欲產痛陣尚疏難產經三兩日不生胎死腹中或產母氣乏委頓產道乾澀才覺痛密破水後便可服蒼朮二兩米泔浸洗銼炒黃小厚枳殼去穰麩炒白桔梗薄陳皮去白楊芍藥川白芷大川芎大當歸去尾各一兩交趾桂去粗皮不見火半夏湯洗粉草麻黃去節軍姜去皮厚朴去粗皮銼薑汁炒南木香不見火杏仁去皮尖另研白茯苓各五錢上為末每服二錢順流水溫暖調下若覺熱悶白蜜湯下或銼散入真米醋一合煎方內用楊芍藥肉桂能開通子宮其餘藥皆助氣之盛關竅自通麻黃內通陽氣陽氣盛則血行血行即產矣外卻寒邪去積聚皆得其宜寒月用之甚確隆暑不宜輕服但以五苓散用葵子燈心煎湯調下卻暑清魂滑胎易產胞漿先破則胎干難產用白蜜清油侵以熱酒令得所頓服胎氣既潤即分娩矣難產縮砂香附醋炒枳殼甘草滑石上為末白湯調服行血本草主難產搗益母草取汁七大合煎減半頓服立產無新者以乾者一大握水七合煮服丹易產天麻丸天麻即益母草六月間帶根花葉採曬乾不以多少為末煉蜜丸龍眼大臨產熟水嚼一丸能除產後百病佛手散方及加減法見胎產大法如聖散專治孕婦難產紫蘇葉當歸各等分上㕮咀每服三五錢用長流水煎服如無流水以水順攪動煎服即下又方取本夫裩帶五寸燒存性酒調服下又方取槐樹東枝令產婦把之易產又方用紫蘇煎湯調益元散服之即產無憂散治胎肥氣逆臨蓐難產當歸去蘆酒浸川芎木香不見火白芍藥枳殼去白鹽炒甘草炙各一錢半乳香另研血餘燒存性另研各半錢上作一服水二盅煎至一盅入乳香血餘和勻不拘時服固血治胞漿先破惡水來多胎幹不得下時須先與四物湯補養血氣次更濃煎蔥湯放冷令坐婆洗產戶須是款曲洗令氣上下通暢更用酥調滑石末塗產戶里次服神妙乳朱丹或葵子如聖散催生如聖散治逆產橫生瘦胎百草霜香白芷不見火為末上二味等分研勻每服二大錢於臨產時以童便並少米醋打為膏沸湯調下集驗用酒童便各半盞同煎才沸即熱服不過再服即產丹溪用芎歸湯調血血得黑則止此藥大能固血免得干生婦人臨產累日氣盡不能生兼惡露出盡胞干終不產者用赤小豆一斗水九升煮令熟去豆滓以阿膠三兩入豆汁溶化每服止半盞未產再服即出破血半夏湯治胎干而不能產半夏曲一兩半大黃五錢肉桂七錢半桃仁三十枚微炒上為粗末先服四物湯一二服次服半夏湯姜三片水煎又方當歸為末酒調方寸匕服之七聖散臨產腰疼方服延胡索沒藥白礬白芷薑黃當歸桂心各等分上為末臨產陣痛時燒鏵刃鐵即犁頭令通赤淬酒調下三錢服一兩杯立產勝金散治難產逐敗血即自生若橫逆則轉正子死腹中則胎軟膨寬即產祖宗秘傳千金不授王不留行酸漿草死胎倍用茺蔚子白蒺藜去刺五靈脂行血宜生用各等分上為散每服三錢取利方水一盞半入白花劉寄奴子一撮同煎溫服大效外取如聖膏治產難並治胞衣不下兼治死胎蓖麻子七粒去殼細研成膏塗腳心胞即下速洗去不洗腸出卻用此膏塗頂上腸自縮入一方蓖麻子百粒雄黃一錢細研用如上法催生萬金不傳遇仙丹蓖麻子十四粒去殼硃砂研雄黃研各一錢半蛇蛻一尺燒存性一方蓖麻子三粒上為末漿水飯和丸如彈子大臨產時先用椒湯淋渫臍下次安藥一丸於臍中用蠟紙數重覆上闊帛束之頭生下急取去藥一丸可用三次三麻四豆脫衣裳研碎將來入麝香若有婦人遭產難貼在臍中兩分張用蓖麻子三粒巴豆四粒去殼入麝研細貼臍中立聖丹治產難危急者寒水石四兩二兩生用二兩煅赤上同研細入硃砂同研如深桃花色每用三分井花水調如薄糊以紙花剪如杏葉大攤上貼臍心候乾再易不過三上便產橫逆惡候死胎不下並治神驗寒水石非方解石即今人謂軟石膏是也此方異人所傳妙雜方圖經云令產婦兩手各握石燕一枚須臾子下救產難經日不生雲母粉半兩溫酒調服入口即產萬不失一陸氏云已救三五百人效治橫逆產理不順用伏龍肝細研每服一錢酒調服其土從兒頭上戴出妙世如神散治催生累效靈妙之理人所難通用實殊效臨產時令人路上尋破草鞋一雙取耳燒灰溫酒調下三錢匕得左足者男右足者女覆者死側者有驚果是神奇用此送催生丸尤妙勝金丹治難產神妙敗兔毫筆頭一枚燒灰研細搗生藕汁一盞下之若產母虛弱及素有冷疾者恐藕冷動氣即於重湯內暖過服立產針灸東婦人將產預先胎破惡水長流坐草早無血可養枯竭獨陰五分在足小指第三節間承陰一寸五分玉催生難產及死胎太衝八分補百息合谷補三陰交五分瀉立時分解足小指節三壯心術多此一穴產子上衝逼心巨闕令正坐用抱頭抱腰微偃針入六分留七呼得氣即瀉立蘇如子掬母心生下手心有針痕子頂母心人中有痕向後枕骨有痕是其驗也神效合谷三分留三呼補之三陰交五分瀉寸吸張仲文橫產難產右腳小指尖頭灸三壯立產集又法獨陰同上法取灸七壯禁刺合谷補三陰交瀉桑難產三陰交治驗淳于意治菑川王美人懷子而不乳召臣意往飲以莨𦿆藥一撮以酒飲之旋乳意復診其脈而脈躁躁者有餘病即飲以消石一劑出血血如豆比五六枚滑伯仁治一婦難產七日而不乳且食甚少伯仁視之以涼粥一盂搗楓葉煎湯調啖之旋乳或詰其理滑曰此婦食甚少未有無穀氣而生者夫楓葉先生先落後生後落故以作湯飲也龐安常治一婦產七日而子不下百治不效龐視之令其家人以湯溫其腰腹自為上下拊摩孕者覺腸胃微痛呻吟間生一男其家驚喜而不知所以龐曰兒已出胞但一手誤執母腸不能脫非符藥所能為吾隔腹捫兒手所在針其虎口痛即縮手所以遽生無他術也取兒視之右手虎口針痕存焉一婦累日產不下服催生藥不效龐曰此必坐草太早心下懷懼氣結而不行非不順也素問云恐則氣下蓋恐則精神怯怯則上焦閉閉則氣逆逆則下焦脹氣乃不行矣以紫蘇飲一服便產及治婦人子懸證紫蘇飲見胎上逼心吳茭山治一婦產難三日不下服破血行經之藥俱罔效吳因制一方以車前子為君冬葵子為臣白芷枳殼為佐使巳服午產眾醫異之吳曰本草謂催生以此為君毛詩採芣苡以防產難是也劉復真遇府判女產不利已斂劉取紅花濃煎扶女於凳上以綿帛蘸湯盦之連以澆帛上以器盛水又暖又淋久而甦醒遂生男子蓋遇嚴冬血冷凝滯不行溫即產見亦神矣哉一醫宿客店值店婦產數日不下下體已冷無藥甚窘以椒橙茱萸等煎湯可下手則和臍腹入門處皆淋洗之氣溫血行遂產交骨不開薛交骨不開產門不閉皆由元氣素弱胎前失於調攝以致血氣不能運達而然也交骨不開陰氣虛也用加味芎歸湯補中益氣湯產門不閉氣血虛也用十全大補湯地官李孟卿娶三十五歲女為繼室妊娠慮其產難索加味芎歸湯四帖備用至期果產門不開止服一帖頓然分娩上舍費懷德之室產門不開兩日未生服前藥一劑即時而產上舍傳此方用之者無有不驗一婦人分娩最易至四十妊娠下血甚多產門不開與前湯一劑又以無憂散斤許煎熟時時飲之以助其血而產加味芎歸湯主交骨不開不能生產川芎當歸各一兩自死龜板一枚酥炙婦人頭髮生男女多者一握燒存性上為散每服五錢水煎服約人行五里即生如胎死亦下灼過龜板亦可下死胎法產難子死腹中者多因驚動太早或觸犯禁忌致令產難胞漿已破無血養胎枯涸而死故也須驗產母舌若青黑其胎死矣當下之大法寒者熱以行之熱者涼以行之燥者滑以潤之危急者毒藥下之熱劑烏金散治難產熱病胎死腹中或因顛仆或從高墜下或房室驚搐或臨產驚動太早觸犯禁忌或產時未到經血先下惡露已盡致胎乾子死身冷不能自出但視產婦面赤舌青是其候也面青舌赤母死子活唇青吐沫子母俱斃又有雙胎或一死一活其候難知臨時觀變可也熟地黃洗切焙乾酒炒真蒲黃大當歸交趾桂楊芍藥軍姜去皮粉草各一兩小黑豆四兩百草霜五錢上為末每用二錢米醋半合許沸湯六七分浸起溫服疑二之際且進佛手散酒水合煎二三服探之若未死子母俱安若胎已死立便逐下的知其胎死進此藥後更進香桂散須臾如手推下常用催生更加好滑石末半兩葵子五十粒捶碎黃柞葉七八片蔥白二寸順流水煎湯調下蓋滑石能利小便柞葉行氣逐血蔥白內通陽氣氣盛血行即產矣大全下死胎方桂枝二錢麝香當門子一個同研暖酒服須臾如手推下一名桂香散此藥比之用水銀等不損血氣趙和叔傳一方單用桂末一錢痛時童便調下名救苦散一穩婆之女勤苦負重妊娠腹中陰冷重墜口中甚穢余意其胎必死令視其舌果青黑與朴硝半兩許服之隨下穢水而愈一婦胎死服朴硝而下穢水肢體倦怠氣息奄奄用四君為主佐以四物薑桂調補而愈寒劑治妊娠三五個月胎死在腹內不出大腹子赤芍藥榆白皮各三兩當歸一兩炒滑石末七錢半瞿麥葵子炒茯苓粉草子芩各半兩上為粗末每服四錢水一盞煎至七分去滓不拘時溫服鄧知縣傳療死胎不出朴硝半兩研細以溫童便調服屢效治死胎不下指甲青舌青脹悶口中作屎臭先以平胃散一帖作兩服每服酒水各一盞煎至一盞卻投朴硝末半兩再煎三五沸溫服其胎化血水下本治子死腹中不出用辰砂一兩水煮四五沸末之然後取酒調服立出外療子死腹中真珠二兩為末酒調服盡立出滑劑千金治小兒死腹中葵子末酒服方寸匕若口噤不開格口灌之藥下即活療妊娠胎死腹中或母疾欲下胎榆白皮煮汁服二升大治子死腹中或半生不下或半著脊骨在草不產血氣上蕩母心面無顏色氣欲絕豬脂一斤白蜜一升醇酒二升上三味合煎取二升分溫二服不能飲隨所能服之婦人良方一字神散治子死胎不下胞破不生此方屢效救人無量鬼臼黃色者不以多少去毛碾為末極細如粉不用羅以手指捻之上每服二錢用無灰酒一盞同煎至八分通口服立效如神世治生產不順胎死腹中胞衣不下臨產危急妙蛇蛻一條全者香油燈上燒研麝香少許上為末童便酒各半盞調一服即生效楊氏療有孕月數未足子死腹中母欲悶絕取大豆一方黑豆三升醋煮濃汁三升頓服立效本事治妊娠熱病胎死腹中鹿角屑一兩水一盞蔥五莖豆豉半合同煎至六分去滓溫分二服又方取死胎烏雞一支去尾細切以水三升煮取二升去雞通手用衣帛蘸摩臍下胎自出
